<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Compliance Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 40px;
        }

        h1, h2, h3 {
            margin-bottom: 0.3rem;
        }

        .muted {
            color: #666;
        }

        .hero {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
            margin-left: 20px;
        }

        .hero-logo {
            width: 136px;
            height: 136px;
            object-fit: contain;
        }

        .hero-title {
            font-size: 330%;
            margin-top: 0;
        }

        .hero-description {
            color: #666;
            line-height: 1.45;
            max-width: 980px;
        }

        .summary {
            margin: 30px 0 30px 6px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 12px;
            min-width: 100px;
            cursor: pointer;
            transition: box-shadow 0.15s, border-color 0.15s;
            display: inline-block;
            text-align: center;
        }

        .card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .card.active {
            border-width: 2px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .card.active.red { border-color: crimson; }
        .card.active.yellow { border-color: orange; }
        .card.active.green { border-color: darkgreen; }
        .card.active.focus { border-color: #f59e0b; }

        .card.focus { background: #fffbeb; margin-right: 24px; }

        .card.maturity { margin-left: 24px; }

        .red { background: #fde8e8; }
        .yellow { background: #fff7d6; }
        .green { background: #e8f7ea; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            padding: 8px;
            vertical-align: top;
            text-align: left;
        }

        .controls {
            margin: 44px 0 24px 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            padding: 8px 12px;
            font-size: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 400px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #1d4ed8;
            box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.15);
        }

        .filter-count {
            color: #666;
            font-size: 14px;
        }

        .control-link {
            color: #1d4ed8;
            text-decoration: none;
        }

        .control-link:hover {
            text-decoration: underline;
        }

        a {
            word-break: break-all;
        }

        .domain-card {
            box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;
            display: inline-block;
            padding: 16px;
            border: 1px solid grey;
            margin: 4px 4px 34px;
            vertical-align: top;
            border-radius: 10px;
            width: calc(33% - 40px);
            min-width: 280px;
        }

        @media (max-width: 800px) {
            .domain-card {
                width: 100%;
                min-width: unset;
            }
        }

        details summary {
            cursor: pointer;
            margin-bottom: 6px;
            font-size: 130%;
        }

        .in-focus {
            background: #fffbeb;
            border: 1px dashed darkred;
        }

        .focus-badge {
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #f59e0b;
            color: white;
            padding: 1px 6px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .status-dot {
            height: 42px;
            width: 42px;
            border-radius: 10px;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div class="hero">
    <img class="hero-logo" id="heroLogo" src="icons/logo.png" alt="Compliance">
    <div>
        <h1 id="heroTitle" class="hero-title">Compliance Dashboard</h1>
        <div id="heroDescription" class="hero-description"></div>
    </div>
</div>

<div style="margin: 20px">
    <div class="summary" id="summary"></div>

    <div class="controls">
        <input type="text" id="searchBox" placeholder="Search controls, domains, owners..."/>
        <span id="filterCount" class="filter-count"></span>
    </div>

    <div id="domains"></div>
</div>

servability are considered, but not consistently built in.", "green": "Teams design with strong default expectations for security, scalability, and observability."}}, {"id": "found-04", "name": "Automation First", "description": "Automate everything that does not require human judgment.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Automation roadmap", "Workflow automation scripts", "Manual toil reduction metrics"], "scoring_criteria": {"red": "Teams still rely heavily on manual repetitive work.", "yellow": "Some repetitive work is automated, but major gaps remain.", "green": "Repetitive engineering work is systematically automated to reduce toil and error."}}, {"id": "found-05", "name": "Outcome Measurement", "description": "Measure outcomes, not just output.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Outcome metrics dashboard", "Engineering KPI review", "Customer-impact scorecards"], "scoring_criteria": {"red": "Success is mostly measured through activity or output counts.", "yellow": "Some outcome measures exist, but they do not consistently guide decisions.", "green": "Teams measure outcomes that connect engineering work to customer and business value."}}, {"id": "found-06", "name": "Learning and Accountability Culture", "description": "Foster a culture of learning, experimentation, and accountability.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Retrospective actions", "Experiment review notes", "Manager expectations for accountability"], "scoring_criteria": {"red": "Teams lack structured learning and accountability for outcomes.", "yellow": "Learning happens, but not consistently or with clear follow-through.", "green": "Teams learn quickly, experiment responsibly, and hold themselves accountable for results."}}]}, {"id": "aidev", "name": "AI-Augmented Development", "description": "Responsible use of AI tools across the software development lifecycle.", "weight": 1.3, "controls": [{"id": "aidev-01", "name": "AI Tool Governance", "description": "Approved AI tools are defined and governed.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Approved AI tools list", "AI governance policy", "Vendor review records"], "scoring_criteria": {"red": "Teams use AI tools without a clear approved set or governance model.", "yellow": "Approved tools exist, but governance is incomplete or weakly enforced.", "green": "AI tools are approved, governed, and reviewed through a clear ownership model."}}, {"id": "aidev-02", "name": "AI Code Usage Guidelines", "description": "Clear guidelines exist for AI-generated code usage and review.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["AI coding policy", "Review checklist", "Engineering handbook entry"], "scoring_criteria": {"red": "No clear expectations exist for how AI-generated code should be used or reviewed.", "yellow": "Guidelines exist but are incomplete or unevenly applied.", "green": "Clear and practical guidelines define acceptable AI-generated code usage and review."}}, {"id": "aidev-03", "name": "Sensitive Data Protection", "description": "Sensitive data is not exposed to external AI systems.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Data handling policy", "Prompt redaction guidance", "DLP controls"], "scor  sizing norms", "PR size metrics", "Delivery playbook"], "scoring_criteria": {"red": "Work items are routinely too large to validate and deliver safely.", "yellow": "Some teams work in small increments, but the practice is uneven.", "green": "Teams consistently deliver in small, testable increments."}}, {"id": "deliv-02", "name": "Definition of Done", "description": "Definition of done includes code, tests, docs, and observability.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Definition of done", "Team working agreements", "Release checklist"], "scoring_criteria": {"red": "Done means code merged, with major quality and operability gaps left open.", "yellow": "Definition of done exists, but its scope is incomplete or weakly enforced.", "green": "Definition of done consistently includes tests, docs, and observability."}}, {"id": "deliv-03", "name": "Flow Metrics Tracking", "description": "Cycle time, lead time, and deployment frequency are tracked.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Flow metrics dashboard", "DORA metrics review", "Monthly engineering report"], "scoring_criteria": {"red": "Delivery flow metrics are not tracked or not trusted.", "yellow": "Some flow metrics are tracked, but coverage or usage is incomplete.", "green": "Teams track and use cycle time, lead time, and deployment frequency."}, "inFocus": true}, {"id": "deliv-04", "name": "Delivery Bottleneck Management", "description": "Bottlenecks in delivery are identified and addressed.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Constraint analysis", "Improvement backlog", "Flow review meeting notes"], "scoring_criteria": {"red": "Delivery bottlenecks are poorly understood and rarely addressed.", "yellow": "Bottlenecks are known but action is slow or inconsistent.", "green": "Teams identify and reduce delivery bottlenecks through regular review."}}, {"id": "deliv-05", "name": "Independent Deployment", "description": "Teams can deploy independently without coordination overhead.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Deployment ownership map", "Service release process", "Platform enablement records"], "scoring_criteria": {"red": "Deployments require broad coordination and create avoidable delays.", "yellow": "Some teams deploy independently, but dependencies still create overhead.", "green": "Teams can deploy with low coordination cost through clear ownership and platform support."}}, {"id": "deliv-06", "name": "Feature Flag Release Decoupling", "description": "Feature flags are used to decouple deploy from release.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Feature flag inventory", "Rollout policy", "Release controls"], "scoring_criteria": {"red": "Deploy and release are tightly coupled for most changes.", "yellow": "Feature flags are available but not used consistently.", "green": "Feature flags are routinely used to separate deployment from release timing."}}]}, {"id": "cicd", "name": "CI/CD and Developer Experience", "description": "Fast and reliable engineering workflow from laptop to production.", "weight": 1.3, "controls": [{"id": "cicd-01", "name": "Fast Reliable Pipelines", "description": "Build and test pipelines run quickly and reliably.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidenc onable Retrospectives", "description": "Retrospectives produce actionable improvements.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Retro action tracker", "Sprint retrospective notes", "Follow-up review"], "scoring_criteria": {"red": "Retrospectives rarely produce meaningful change.", "yellow": "Retrospectives generate actions, but follow-through is inconsistent.", "green": "Retrospectives reliably produce and close actionable improvements."}}, {"id": "improve-02", "name": "Technical Debt Management", "description": "Technical debt is tracked and prioritized.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Tech debt backlog", "Prioritization framework", "Debt review meeting notes"], "scoring_criteria": {"red": "Technical debt is mostly invisible or ignored.", "yellow": "Debt is tracked, but prioritization is inconsistent.", "green": "Technical debt is visible, prioritized, and addressed intentionally."}}, {"id": "improve-03", "name": "Experimentation with Success Criteria", "description": "Experimentation is encouraged with clear success criteria.", "priority": "medium", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Experiment template", "Hypothesis logs", "Outcome reviews"], "scoring_criteria": {"red": "Experimentation happens rarely or without clear learning goals.", "yellow": "Experiments occur, but success criteria or follow-through are weak.", "green": "Experimentation is encouraged and tied to explicit success criteria."}}, {"id": "improve-04", "name": "Pragmatic Emerging Technology Evaluation", "description": "Emerging technologies including AI are evaluated pragmatically.", "priority": "medium", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Technology radar", "Evaluation notes", "Adoption decision records"], "scoring_criteria": {"red": "Technology choices follow hype or inertia rather than pragmatic assessment.", "yellow": "Some technology evaluation happens, but rigor is inconsistent.", "green": "Emerging technologies are evaluated pragmatically against real needs and trade-offs."}}, {"id": "improve-05", "name": "Practice Refinement", "description": "Practices are regularly refined.", "priority": "medium", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Practice review cadence", "Process improvement notes", "Updated team standards"], "scoring_criteria": {"red": "Practices become stale and are rarely revisited.", "yellow": "Practices evolve, but refinement is sporadic.", "green": "Practices are reviewed and refined on a deliberate cadence."}}, {"id": "improve-06", "name": "Customer Impact Focus", "description": "Success is measured by customer impact.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Customer outcome metrics", "Impact review notes", "Engineering-business KPI link"], "scoring_criteria": {"red": "Improvement work is disconnected from customer outcomes.", "yellow": "Customer impact is considered, but not consistently measured.", "green": "Teams judge success through measurable customer impact."}}]}]};
    let activeStatus = '';
    let filterFocus = false;

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatMetadataDescription(metadata) {
        if (!metadata) return "";
        const parts = [];
        if (metadata.version) parts.push(`Version ${metadata.version}`);
        if (metadata.regions && metadata.regions.length) parts.push(`Regions: ${metadata.regions.join(", ")}`);
        if (metadata.primary_regulatory_focus && metadata.primary_regulatory_focus.length) parts.push(`Focus: ${metadata.primary_regulatory_focus.join(", ")}`);
        if (metadata.intended_use && metadata.intended_use.length) parts.push(`Use: ${metadata.intended_use.join(" | ")}`);
        if (metadata.source && metadata.source.title) {
            const sourceLabel = metadata.source.author
                ? `${metadata.source.title} by ${metadata.source.author}`
                : metadata.source.title;
            parts.push(`Source: ${sourceLabel}`);
        }
        return parts.join(" • ");
    }

    function safeScore(control) {
        if (typeof control.score === "number") return control.score;
        return {red: 1, yellow: 2, green: 3}[control.status] || 1;
    }

    function weightedAverage(controls, domainWeight) {
        let weighted = 0, weights = 0;
        controls.forEach(c => {
            const w = (domainWeight || 1) * (c.weight || 1);
            weighted += safeScore(c) * w;
            weights += w;
        });
        return weights ? (weighted / weights) : 0;
    }

    function overallMaturity() {
        let weighted = 0, weights = 0;
        currentData.domains.forEach(d => {
            d.controls.forEach(c => {
                const w = (d.weight || 1) * (c.weight || 1);
                weighted += safeScore(c) * w;
                weights += w;
            });
        });
        return weights ? (weighted / weights) : 0;
    }

    function maturityBand(score) {
        const bands = currentData.scoring_model.overall_maturity_bands || [];
        for (const b of bands) {
            if (score >= b.min && score <= b.max) return b;
        }
        return null;
    }

    function countStatuses() {
        const counts = {red: 0, yellow: 0, green: 0, focus: 0};
        currentData.domains.forEach(d => d.controls.forEach(c => {
            counts[c.status] = (counts[c.status] || 0) + 1;
            if (c.inFocus) counts.focus++;
        }));
        return counts;
    }

    function toggleStatus(status) {
        filterFocus = false;
        activeStatus = activeStatus === status ? '' : status;
        renderSummary();
        renderDomains();
    }

    function toggleFocus() {
        filterFocus = !filterFocus;
        activeStatus = '';
        renderSummary();
        renderDomains();
    }

    function renderSummary() {
        const score = overallMaturity();
        const band = maturityBand(score);
        const counts = countStatuses();
        document.getElementById("summary").innerHTML = `
        <div class="card focus ${filterFocus ? 'active' : ''}" onclick="toggleFocus()">
          <div style="font-size: 200%"><strong>${counts.focus}</strong></div>
          <div>In Focus</div>
        </div>
        <div class="card red ${activeStatus === 'red' ? 'active' : ''}" onclick="toggleStatus('red')">
          <div style="font-size: 200%"><strong>${counts.red}</strong></div>
          <div>Red</div>
        </div>
        <div class="card yellow ${activeStatus === 'yellow' ? 'active' : ''}" onclick="toggleStatus('yellow')">
          <div style="font-size: 200%"><strong>${counts.yellow}</strong></div>
          <div>Yellow</div>
        </div>
        <div class="card green ${activeStatus === 'green' ? 'active' : ''}" onclick="toggleStatus('green')">
          <div style="font-size: 200%"><strong>${counts.green}</strong></div>
          <div>Green</div>
        </div>
        <div class="card maturity" onclick="toggleStatus('')">
          <div style="font-size: 200%"><strong>${score.toFixed(2)} / 3.00</strong></div>
          <div>Overall maturity is ${band ? band.label.toLowerCase() : "unknown"}</div>
        </div>
      `;
    }

    function renderDomains() {
        const q = document.getElementById("searchBox").value.trim().toLowerCase();
        let totalVisible = 0;

        const html = currentData.domains.map(domain => {
            const controls = domain.controls.filter(c => {
                if (filterFocus && !c.inFocus) return false;
                if (activeStatus && c.status !== activeStatus) return false;
                if (q) {
                    const blob = [domain.name, c.id, c.name, c.description, c.owner, c.notes].join(" ").toLowerCase();
                    if (!blob.includes(q)) return false;
                }
                return true;
            });

            if (!controls.length) return "";
            totalVisible += controls.length;

            const avg = weightedAverage(controls);
            return `
          <details open class="domain-card">
            <summary><strong>${domain.name}</strong> <span class="muted" style="font-size: 70%">${avg.toFixed(2)} / 3.00</span></summary>
            <div class="muted">${domain.description || ""}</div>
            <div style="border-bottom: 1px dashed lightgrey; margin-top: 10px"></div>
            <table>
              <tbody>
                ${controls.map(c => `
                  <tr class="${c.inFocus ? 'in-focus' : ''}">
                    <td style="width: 42px"><div class="status-dot ${c.status}"></div></td>
                    <td>
                      <div><strong><a class="control-link" href="landing_pages/${encodeURIComponent(c.id)}.html" target="_blank" rel="noopener noreferrer">${c.name}</a></strong>${c.inFocus ? '<span class="focus-badge">In Focus</span>' : ''}</div>
                      <div class="muted">${c.description || ""}</div>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </details>
        `;
        }).join("");

        document.getElementById("domains").innerHTML = html || "<p class='muted'>No controls match the current filters.</p>";

        const counts = countStatuses();
        const total = counts.red + counts.yellow + counts.green;
        const countEl = document.getElementById("filterCount");
        countEl.textContent = (q || activeStatus || filterFocus)
            ? totalVisible + ' of ' + total + ' controls'
            : total + ' controls';
    }

    // Init
    const metadata = currentData.metadata || {};
    const pageTitle = metadata.title || "Compliance Dashboard";
    document.title = pageTitle;
    document.getElementById("heroTitle").textContent = pageTitle;
    document.getElementById("heroDescription").innerHTML = escapeHtml(formatMetadataDescription(metadata));
    if (metadata.icon) {
        const logo = document.getElementById("heroLogo");
        logo.onerror = function() { this.onerror = null; this.src = 'icons/logo.png'; };
        logo.src = 'icons/' + metadata.icon;
    }
    renderSummary();
    renderDomains();

    document.getElementById("searchBox").addEventListener("input", renderDomains);
</script>
