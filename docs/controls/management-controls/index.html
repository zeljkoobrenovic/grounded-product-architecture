<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Compliance Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 40px;
        }

        h1, h2, h3 {
            margin-bottom: 0.3rem;
        }

        .muted {
            color: #666;
        }

        .hero {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
            margin-left: 20px;
        }

        .hero-logo {
            width: 136px;
            height: 136px;
            object-fit: contain;
        }

        .hero-title {
            font-size: 330%;
            margin-top: 0;
        }

        .hero-description {
            color: #666;
            line-height: 1.45;
            max-width: 980px;
        }

        .summary {
            margin: 30px 0 30px 6px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 12px;
            min-width: 100px;
            cursor: pointer;
            transition: box-shadow 0.15s, border-color 0.15s;
            display: inline-block;
            text-align: center;
        }

        .card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .card.active {
            border-width: 2px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .card.active.red { border-color: crimson; }
        .card.active.yellow { border-color: orange; }
        .card.active.green { border-color: darkgreen; }
        .card.active.focus { border-color: #f59e0b; }

        .card.focus { background: #fffbeb; margin-right: 24px; }

        .card.maturity { margin-left: 24px; }

        .red { background: #fde8e8; }
        .yellow { background: #fff7d6; }
        .green { background: #e8f7ea; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            padding: 8px;
            vertical-align: top;
            text-align: left;
        }

        .controls {
            margin: 44px 0 24px 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            padding: 8px 12px;
            font-size: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 400px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #1d4ed8;
            box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.15);
        }

        .filter-count {
            color: #666;
            font-size: 14px;
        }

        .control-link {
            color: #1d4ed8;
            text-decoration: none;
        }

        .control-link:hover {
            text-decoration: underline;
        }

        a {
            word-break: break-all;
        }

        .domain-card {
            box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;
            display: inline-block;
            padding: 16px;
            border: 1px solid grey;
            margin: 4px 4px 34px;
            vertical-align: top;
            border-radius: 10px;
            width: calc(33% - 40px);
            min-width: 280px;
        }

        @media (max-width: 800px) {
            .domain-card {
                width: 100%;
                min-width: unset;
            }
        }

        details summary {
            cursor: pointer;
            margin-bottom: 6px;
            font-size: 130%;
        }

        .in-focus {
            background: #fffbeb;
            border: 1px dashed darkred;
        }

        .focus-badge {
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #f59e0b;
            color: white;
            padding: 1px 6px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .status-dot {
            height: 42px;
            width: 42px;
            border-radius: 10px;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div class="hero">
    <img class="hero-logo" id="heroLogo" src="icons/logo.png" alt="Compliance">
    <div>
        <h1 id="heroTitle" class="hero-title">Compliance Dashboard</h1>
        <div id="heroDescription" class="hero-description"></div>
    </div>
</div>

<div style="margin: 20px">
    <div class="summary" id="summary"></div>

    <div class="controls">
        <input type="text" id="searchBox" placeholder="Search controls, domains, owners..."/>
        <span id="filterCount" class="filter-count"></span>
    </div>

    <div id="domains"></div>
</div>

<script>
    const currentData = {"metadata": {"title": "Management Practices Checklist", "version": "1.0", "created_at": "2026-03-22T00:00:00+00:00", "icon": "management.png", "intended_use": ["Assess management operating discipline", "Track management-practice controls with evidence", "Assign owners and improvement actions", "Support simple dashboarding and scoring"], "regions": ["Global"], "primary_regulatory_focus": ["Management practice", "People operations", "Performance management", "Organizational clarity", "Hiring and culture"], "status_values": ["red", "yellow", "green"], "default_status": "red"}, "scoring_model": {"status_to_score": {"red": 1, "yellow": 2, "green": 3}, "score_to_status": {"1": "red", "2": "yellow", "3": "green"}, "definitions": {"red": {"score": 1, "label": "Missing or unreliable", "criteria": ["Practice is absent, irregular, or manager-dependent", "Ownership or evidence is unclear", "The team is exposed to avoidable people or delivery risk"]}, "yellow": {"score": 2, "label": "Partial or inconsistent", "criteria": ["Practice exists but is inconsistently applied", "Evidence exists but is fragmented or stale", "Outcomes depend too much on individual manager habits"]}, "green": {"score": 3, "label": "Clear and repeatable", "criteria": ["Practice is documented, habitual, and inspectable", "Evidence is current and easy to review", "Managers and employees can rely on the practice"]}}, "overall_maturity_bands": [{"min": 1.0, "max": 1.5, "status": "red", "label": "Ad hoc / fragile management"}, {"min": 1.6, "max": 2.2, "status": "yellow", "label": "Developing / uneven management discipline"}, {"min": 2.3, "max": 3.0, "status": "green", "label": "Strong / repeatable management practice"}]}, "dashboard_fields": {"control_level": ["id", "name", "description", "priority", "weight", "status", "score", "owner", "last_reviewed", "target_date", "notes", "evidence_links", "evidence_examples", "scoring_criteria"], "domain_level": ["id", "name", "description", "weight", "controls"]}, "domains": [{"id": "legal", "name": "Legal Responsibilities", "description": "Managers understand the basic legal and policy obligations that come with people leadership.", "weight": 1.2, "controls": [{"id": "legal-01", "name": "Manager Legal Responsibilities", "description": "Managers understand their legal responsibilities in the jurisdiction where they manage employees.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Manager legal training record", "People policy handbook", "Jurisdiction-specific guidance for managers"], "scoring_criteria": {"red": "Managers have little clarity on their legal obligations and escalation paths.", "yellow": "Basic guidance exists, but refresh and understanding are inconsistent.", "green": "Managers receive and understand clear legal guidance relevant to their role and location."}}]}, {"id": "drpts", "name": "Direct Report Management", "description": "A reliable manager cadence with each direct report covering support, feedback, goals, and performance.", "weight": 1.4, "controls": [{"id": "drpts-01", "name": "Regular 1:1 Cadence", "description": "Managers hold weekly or biweekly 1:1s with direct reports and rarely reschedule them.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["1:1 schedule for each report", "Reschedule or cancellation rate", "Calendar cadence review"], "scoring_criteria": {"red": "1:1s are irregular, frequently canceled, or treated as optional.", "yellow": "A 1:1 cadence exists, but rescheduling or gaps are still common.", "green": "Managers maintain a dependable 1:1 cadence that employees can count on."}}, {"id": "drpts-02", "name": "Structured 1:1 Agenda", "description": "1:1s use a shared agenda with contributions from both people, notes, and clear action items.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Shared 1:1 document", "Meeting notes with actions", "Agenda template used across the team"], "scoring_criteria": {"red": "1:1s are unstructured and do not reliably produce follow-up.", "yellow": "Some structure exists, but agendas, notes, or actions are inconsistently captured.", "green": "1:1s are structured, bi-directional, and result in clear follow-up."}}, {"id": "drpts-03", "name": "Quarterly Goal Setting", "description": "Managers and direct reports establish and track quarterly goals together.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Quarterly goals by employee", "Goal review notes", "Progress tracker"], "scoring_criteria": {"red": "Direct reports do not have clear or regularly reviewed quarterly goals.", "yellow": "Goals exist, but they are unevenly set or tracked.", "green": "Managers and employees set and review quarterly goals together."}}, {"id": "drpts-04", "name": "Bi-Directional Feedback Cadence", "description": "Managers and direct reports exchange bi-directional feedback every 3 to 6 months.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Feedback schedule", "Feedback prompts or template", "Completed feedback cycle tracker"], "scoring_criteria": {"red": "Feedback is one-way, rare, or only happens when something is wrong.", "yellow": "Feedback cycles happen, but not with enough consistency or depth.", "green": "Feedback is regular, bi-directional, and expected as part of the manager relationship."}}, {"id": "drpts-05", "name": "Formal Performance Conversations", "description": "Managers hold formal performance conversations every 3, 6, or 12 months based on the pace of organizational change.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Performance conversation schedule", "Performance summary template", "Completed review log"], "scoring_criteria": {"red": "Formal performance conversations are infrequent, unclear, or absent.", "yellow": "Performance conversations happen, but cadence or quality is inconsistent.", "green": "Managers hold formal performance conversations at a cadence appropriate to the business context."}, "inFocus": true}, {"id": "drpts-06", "name": "Performance on Results and Behaviors", "description": "Performance conversations cover both what results were achieved and how they were achieved.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Performance review rubric", "Behavior and outcomes guidance", "Example performance write-up"], "scoring_criteria": {"red": "Performance is judged narrowly or informally, without a balanced view of outcomes and behaviors.", "yellow": "Managers discuss both dimensions sometimes, but not in a consistent framework.", "green": "Performance conversations clearly cover both outcomes and the behaviors behind them."}}]}, {"id": "team", "name": "Team Management", "description": "Regular team operating rhythms that support alignment, decisions, and execution.", "weight": 1.2, "controls": [{"id": "team-01", "name": "Regular Team Meeting Cadence", "description": "Managers hold weekly or biweekly team meetings with a dependable cadence.", "priority": "medium", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Team meeting cadence", "Calendar history", "Meeting series attendance"], "scoring_criteria": {"red": "Team meetings are irregular, often canceled, or low priority.", "yellow": "A cadence exists, but reschedules or inconsistency still reduce its value.", "green": "The team meeting cadence is dependable and protected."}}, {"id": "team-02", "name": "Meeting Reliability", "description": "Managers arrive on time for meetings and avoid rescheduling except when necessary.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Meeting punctuality norm", "Reschedule pattern review", "Team feedback on meeting reliability"], "scoring_criteria": {"red": "Managers routinely run late or reschedule, signaling that team time is not protected.", "yellow": "Meetings are usually reliable, but disruptions still happen too often.", "green": "Managers treat team time as a commitment and are consistently reliable."}}, {"id": "team-03", "name": "Effective Use of Team Time", "description": "Team meetings are used to align on plans, make decisions, workshop difficult problems, and support execution.", "priority": "medium", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Team meeting agenda", "Decision log", "Problem-solving session notes"], "scoring_criteria": {"red": "Team meetings consume time without driving clarity, decisions, or support.", "yellow": "Meetings sometimes help the team, but value is inconsistent.", "green": "Team time is used deliberately for alignment, decisions, and unblocking work."}}]}, {"id": "org", "name": "Division and Organizational Clarity", "description": "Foundational people systems that help employees understand roles, growth, and pay.", "weight": 1.3, "controls": [{"id": "org-01", "name": "Clear Job Descriptions", "description": "All actively hired roles have clear job descriptions and an interview rubric.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Current job descriptions", "Interview rubric by role", "Hiring packet review date"], "scoring_criteria": {"red": "Hiring roles are poorly defined and interview quality depends on individual managers.", "yellow": "Job descriptions and rubrics exist for some roles, but not consistently.", "green": "Every active role has a clear description and structured interview rubric."}}, {"id": "org-02", "name": "Job Ladders and Levels", "description": "Job ladders and levels are defined and communicated clearly to employees.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Career ladder document", "Leveling guide", "Employee communication materials"], "scoring_criteria": {"red": "Employees do not have a clear view of roles, expectations, or growth paths.", "yellow": "Some ladder structure exists, but understanding is uneven.", "green": "Job ladders and levels are clear, documented, and understood by employees."}}, {"id": "org-03", "name": "Compensation Philosophy and Framework", "description": "The organization has a compensation philosophy and a transparent compensation framework that employees can understand.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Compensation philosophy document", "Compensation framework or bands", "Employee FAQ or communication deck"], "scoring_criteria": {"red": "Compensation decisions appear opaque or inconsistent to employees.", "yellow": "A framework exists, but managers or employees cannot explain it clearly.", "green": "Compensation philosophy and framework are documented and understandable."}}]}, {"id": "mgr", "name": "Manager Operating Discipline", "description": "Practices that help managers stay aligned, informed, and effective in their own role.", "weight": 1.2, "controls": [{"id": "mgr-01", "name": "Role and Team Clarity", "description": "Managers understand their job description and their team's purpose and responsibilities.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Manager job description", "Team charter", "Responsibility map"], "scoring_criteria": {"red": "Managers have weak clarity on their role or what their team is accountable for.", "yellow": "Role and team purpose are mostly clear, but important gaps remain.", "green": "Managers can clearly explain their role, team purpose, and boundaries."}}, {"id": "mgr-02", "name": "Quarterly Goal Alignment", "description": "Managers have quarterly goals aligned with their own manager.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Manager quarterly goals", "Alignment notes with manager", "Goal review checkpoints"], "scoring_criteria": {"red": "Managers operate without clear aligned quarterly goals.", "yellow": "Goals exist, but alignment or follow-through is inconsistent.", "green": "Managers have aligned quarterly goals and review progress with their manager."}}, {"id": "mgr-03", "name": "Regular 1:1s with Own Manager", "description": "Managers hold regular 1:1s with their own manager.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["1:1 cadence with manager", "Discussion notes", "Follow-up action tracker"], "scoring_criteria": {"red": "Managers do not have a reliable support and alignment cadence with their own manager.", "yellow": "1:1s exist, but they are inconsistent or low-value.", "green": "Managers have a dependable 1:1 cadence with their own manager."}}, {"id": "mgr-04", "name": "Access to Company Context", "description": "Managers have ongoing access to context about company priorities and goals from leaders and peer managers.", "priority": "medium", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Leadership update cadence", "Manager forum or notes", "Company priorities communication"], "scoring_criteria": {"red": "Managers lack enough context to connect team decisions to company priorities.", "yellow": "Some context is available, but not at a useful or reliable cadence.", "green": "Managers regularly receive and use company-level context in their decisions."}}]}, {"id": "cult", "name": "Founder Mindset and Culture", "description": "Management behaviors that create ownership, mission, trust, and broad empowerment.", "weight": 1.2, "controls": [{"id": "cult-01", "name": "Founder Mindset", "description": "Managers act like owners by treating company problems as their problems to solve, not someone else's.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Examples of manager-led problem solving beyond role boundaries", "Cross-functional improvement initiatives", "Decision memos showing ownership"], "scoring_criteria": {"red": "Managers behave narrowly and escalate too quickly instead of taking ownership.", "yellow": "Some managers show strong ownership, but it is not a clear expectation.", "green": "Managers consistently act with company-level ownership and initiative."}}, {"id": "cult-02", "name": "Mission and Meaning", "description": "Managers connect work to a mission that matters rather than treating execution as task administration.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Team charter tied to company mission", "All-hands or team narrative", "Goal-setting examples connected to mission"], "scoring_criteria": {"red": "Work is managed as disconnected tasks with little sense of purpose.", "yellow": "Mission is referenced, but not consistently tied to team priorities.", "green": "Managers consistently connect team work to a mission that matters."}}, {"id": "cult-03", "name": "Trust Freedom and Authority", "description": "Managers give people meaningful trust, freedom, and decision authority rather than controlling every detail.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Decision delegation map", "Examples of employee-owned decisions", "Escalation patterns showing healthy autonomy"], "scoring_criteria": {"red": "Managers over-control work and keep too much authority to themselves.", "yellow": "Some trust is given, but real authority remains narrow.", "green": "People have meaningful autonomy and decision authority, with managers providing support rather than control."}}, {"id": "cult-04", "name": "Low-Status Environment", "description": "Managers reduce status signals and create an environment where ideas can come from anywhere.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Decision forums with broad participation", "Manager behavior examples that remove status barriers", "Employee survey results on voice and inclusion"], "scoring_criteria": {"red": "Status and hierarchy suppress dissent and good ideas.", "yellow": "Leaders want a low-status culture, but behavior is inconsistent.", "green": "Status barriers are actively reduced and people can contribute regardless of level."}}]}, {"id": "hire", "name": "Hiring Excellence", "description": "Practical recruiting and selection disciplines that raise talent quality instead of filling seats quickly.", "weight": 1.4, "controls": [{"id": "hire-01", "name": "Recruiting Investment", "description": "Leadership treats recruiting as a high-leverage investment and funds it before lower-priority HR spend.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Recruiting budget or capacity plan", "Hiring pipeline review", "Leadership review of critical hiring roles"], "scoring_criteria": {"red": "Recruiting is under-resourced and treated as an administrative task.", "yellow": "Recruiting receives some focused investment, but not enough for critical hiring goals.", "green": "Recruiting is treated as a core strategic investment."}}, {"id": "hire-02", "name": "High Hiring Bar", "description": "The company hires slowly enough to maintain a clear quality bar and aims to hire people stronger than the current team in meaningful ways.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Hiring principles", "Offer decline reasons due to quality bar", "Interview debrief notes on strengths added to the team"], "scoring_criteria": {"red": "Hiring decisions prioritize speed or convenience over talent quality.", "yellow": "The company has a stated bar, but it bends too often under pressure.", "green": "Hiring consistently favors exceptional talent over short-term convenience."}}, {"id": "hire-03", "name": "Objective Candidate Assessment", "description": "Candidates are assessed through structured evidence rather than manager preference or intuition alone.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Structured scorecards", "Independent interviewer feedback", "Calibrated debrief process"], "scoring_criteria": {"red": "Candidate decisions are mostly subjective and weakly structured.", "yellow": "Structured assessment exists, but it is not applied consistently.", "green": "Candidate assessment is structured, evidence-based, and reasonably objective."}}, {"id": "hire-04", "name": "Exceptional Candidate Sourcing", "description": "Recruiting uses specific referrals, shared team sourcing effort, and creative outreach to find exceptional candidates.", "priority": "medium", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Specific referral asks", "Sourcing participation from team members", "Creative outreach experiments"], "scoring_criteria": {"red": "Sourcing depends on generic inbound flow or passive recruiting alone.", "yellow": "Some targeted sourcing exists, but effort is inconsistent.", "green": "The company actively uses specific referrals, shared sourcing, and creative outreach to find exceptional people."}}, {"id": "hire-05", "name": "Compelling Candidate Close", "description": "Candidates are given a clear reason to join through mission, role clarity, talent density, and real opportunity.", "priority": "medium", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Candidate close narrative", "Offer acceptance analysis", "Hiring manager close materials"], "scoring_criteria": {"red": "Candidates are expected to join without a thoughtful and differentiated close.", "yellow": "Some teams close well, but the message and experience are inconsistent.", "green": "Candidates receive a clear compelling reason to join."}}]}, {"id": "perf", "name": "Performance and Talent Management", "description": "Performance systems that combine high standards, fairness, development, and differentiated support.", "weight": 1.4, "controls": [{"id": "perf-01", "name": "Goal Quality", "description": "Performance goals are set clearly enough that people know what success looks like and can be evaluated fairly.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Goal-setting rubric", "Examples of well-formed goals", "Goal review notes"], "scoring_criteria": {"red": "Goals are vague, inconsistent, or not useful for evaluation and development.", "yellow": "Some goals are clear, but goal quality varies too much.", "green": "Goals are clear, specific enough to assess, and aligned to team priorities."}}, {"id": "perf-02", "name": "Peer Feedback and Calibration", "description": "Managers gather peer feedback and use calibration to improve consistency in ratings and decisions.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Peer feedback template", "Calibration session notes", "Rating consistency review"], "scoring_criteria": {"red": "Performance decisions are made without enough outside evidence or calibration.", "yellow": "Peer feedback and calibration happen, but not consistently enough.", "green": "Peer feedback and calibration are standard parts of performance decision-making."}}, {"id": "perf-03", "name": "Separate Rewards from Development", "description": "Managers clearly separate compensation or rating discussions from development conversations.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Performance cycle design", "Separate conversation templates", "Manager guidance for development discussions"], "scoring_criteria": {"red": "Development conversations are dominated or distorted by rewards discussions.", "yellow": "The distinction is known, but not consistently practiced.", "green": "Managers separate development coaching from rewards and rating conversations."}}, {"id": "perf-04", "name": "Managing the Two Tails", "description": "Managers actively support struggling employees while also paying close attention to top performers and their growth.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Support plans for struggling employees", "Retention and growth plans for top performers", "Talent review notes"], "scoring_criteria": {"red": "Managers ignore either struggling employees or top performers.", "yellow": "The team addresses one tail better than the other.", "green": "Managers intentionally support both struggling employees and top performers."}}, {"id": "perf-05", "name": "Survey and Checklist Use", "description": "Managers use surveys and checklists to test assumptions, find the truth, and nudge improvement.", "priority": "medium", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Team survey results", "Manager checklist usage", "Follow-up action log"], "scoring_criteria": {"red": "Managers rely mostly on instinct and anecdote to assess team health and performance.", "yellow": "Some survey or checklist use exists, but it is not a standard practice.", "green": "Managers use lightweight surveys and checklists to uncover truth and drive improvement."}}, {"id": "perf-06", "name": "Manager Feedback Example", "description": "Managers set a personal example by sharing feedback they receive and acting visibly on it." oyees in hard moments."}}]}, {"id": "nudg", "name": "Nudging and Practical Change", "description": "Managers use small experiments and thoughtful nudges rather than forcing behavior through blunt mandates alone.", "weight": 1.1, "controls": [{"id": "nudg-01", "name": "Reality-Based Management", "description": "Managers distinguish between current reality and desired future state when designing change.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Current-state assessments", "Gap analysis", "Behavior-change design notes"], "scoring_criteria": {"red": "Managers design change based on what they wish were true, not on current reality.", "yellow": "Reality is considered, but change design still overestimates readiness.", "green": "Managers design change based on the actual current state and likely adoption path."}}, {"id": "nudg-02", "name": "Small Experiments", "description": "Managers run many small experiments to improve culture, process, and employee outcomes.", "priority": "medium", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Experiment log", "Before-and-after measure", "Pilot review notes"], "scoring_criteria": {"red": "Improvement efforts rely mostly on large one-shot changes with little testing.", "yellow": "Some experiments occur, but not as a consistent habit.", "green": "Managers use small experiments regularly to learn and improve."}}, {"id": "nudg-03", "name": "Nudge Over Shove", "description": "Managers shape behavior through smart defaults, examples, and lightweight incentives before using heavy-handed control.", "priority": "medium", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Behavioral design changes", "Default-setting examples", "Adoption improvement metrics"], "scoring_criteria": {"red": "Managers rely too quickly on mandates and pressure to drive change.", "yellow": "Some nudging techniques are used, but not intentionally enough.", "green": "Managers use nudges, defaults, and examples to move behavior effectively."}}]}, {"id": "fail", "name": "Mistakes, Transparency, and Repair", "description": "How managers respond when they or the organization get something wrong.", "weight": 1.2, "controls": [{"id": "fail-01", "name": "Admit Mistakes Transparently", "description": "Managers admit mistakes, are transparent about them, and avoid defensive behavior.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Manager communication after a mistake", "Retrospective notes", "Example of transparent correction"], "scoring_criteria": {"red": "Managers hide mistakes, spin them, or become defensive.", "yellow": "Managers admit mistakes sometimes, but transparency varies with situation.", "green": "Managers acknowledge mistakes quickly and transparently."}}, {"id": "fail-02", "name": "Take Counsel Broadly", "description": "Managers seek input from multiple directions before and after difficult decisions or mistakes.", "priority": "medium", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Decision input log", "Cross-functional consultation notes", "Feedback gathered after a miss"], "scoring_criteria": {"red": "Managers stay in a narrow echo chamber when problems arise.", "yellow": "Managers seek some input, but from too few perspectives.", "green": "Managers seek counsel from multiple directions before and after important decisions."}}, {"id": "fail-03", "name": "Fix What Broke", "description": "Managers follow mistakes through to concrete repair rather than stopping at apology or analysis.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Corrective action plan", "Owner and due-date tracking", "Follow-up confirmation of repair"], "scoring_criteria": {"red": "Mistakes are acknowledged but not repaired thoroughly.", "yellow": "Some corrective work happens, but follow-through is uneven.", "green": "Managers drive concrete repair actions until the underlying problem is addressed."}}, {"id": "fail-04", "name": "Teach the Lesson", "description": "Managers extract and share the lesson from mistakes so the organization improves rather than simply moving on.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Written lesson learned", "Team share-out", "Process or policy update based on the lesson"], "scoring_criteria": {"red": "Mistakes are not turned into shared learning.", "yellow": "Some lessons are captured, but not consistently shared or applied.", "green": "Managers turn mistakes into teachable lessons that improve the wider organization."}}]}]};
    let activeStatus = '';
    let filterFocus = false;

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatMetadataDescription(metadata) {
        if (!metadata) return "";
        const parts = [];
        if (metadata.version) parts.push(`Version ${metadata.version}`);
        if (metadata.regions && metadata.regions.length) parts.push(`Regions: ${metadata.regions.join(", ")}`);
        if (metadata.primary_regulatory_focus && metadata.primary_regulatory_focus.length) parts.push(`Focus: ${metadata.primary_regulatory_focus.join(", ")}`);
        if (metadata.intended_use && metadata.intended_use.length) parts.push(`Use: ${metadata.intended_use.join(" | ")}`);
        if (metadata.source && metadata.source.title) {
            const sourceLabel = metadata.source.author
                ? `${metadata.source.title} by ${metadata.source.author}`
                : metadata.source.title;
            parts.push(`Source: ${sourceLabel}`);
        }
        return parts.join(" • ");
    }

    function safeScore(control) {
        if (typeof control.score === "number") return control.score;
        return {red: 1, yellow: 2, green: 3}[control.status] || 1;
    }

    function weightedAverage(controls, domainWeight) {
        let weighted = 0, weights = 0;
        controls.forEach(c => {
            const w = (domainWeight || 1) * (c.weight || 1);
            weighted += safeScore(c) * w;
            weights += w;
        });
        return weights ? (weighted / weights) : 0;
    }

    function overallMaturity() {
        let weighted = 0, weights = 0;
        currentData.domains.forEach(d => {
            d.controls.forEach(c => {
                const w = (d.weight || 1) * (c.weight || 1);
                weighted += safeScore(c) * w;
                weights += w;
            });
        });
        return weights ? (weighted / weights) : 0;
    }

    function maturityBand(score) {
        const bands = currentData.scoring_model.overall_maturity_bands || [];
        for (const b of bands) {
            if (score >= b.min && score <= b.max) return b;
        }
        return null;
    }

    function countStatuses() {
        const counts = {red: 0, yellow: 0, green: 0, focus: 0};
        currentData.domains.forEach(d => d.controls.forEach(c => {
            counts[c.status] = (counts[c.status] || 0) + 1;
            if (c.inFocus) counts.focus++;
        }));
        return counts;
    }

    function toggleStatus(status) {
        filterFocus = false;
        activeStatus = activeStatus === status ? '' : status;
        renderSummary();
        renderDomains();
    }

    function toggleFocus() {
        filterFocus = !filterFocus;
        activeStatus = '';
        renderSummary();
        renderDomains();
    }

    function renderSummary() {
        const score = overallMaturity();
        const band = maturityBand(score);
        const counts = countStatuses();
        document.getElementById("summary").innerHTML = `
        <div class="card focus ${filterFocus ? 'active' : ''}" onclick="toggleFocus()">
          <div style="font-size: 200%"><strong>${counts.focus}</strong></div>
          <div>In Focus</div>
        </div>
        <div class="card red ${activeStatus === 'red' ? 'active' : ''}" onclick="toggleStatus('red')">
          <div style="font-size: 200%"><strong>${counts.red}</strong></div>
          <div>Red</div>
        </div>
        <div class="card yellow ${activeStatus === 'yellow' ? 'active' : ''}" onclick="toggleStatus('yellow')">
          <div style="font-size: 200%"><strong>${counts.yellow}</strong></div>
          <div>Yellow</div>
        </div>
        <div class="card green ${activeStatus === 'green' ? 'active' : ''}" onclick="toggleStatus('green')">
          <div style="font-size: 200%"><strong>${counts.green}</strong></div>
          <div>Green</div>
        </div>
        <div class="card maturity" onclick="toggleStatus('')">
          <div style="font-size: 200%"><strong>${score.toFixed(2)} / 3.00</strong></div>
          <div>Overall maturity is ${band ? band.label.toLowerCase() : "unknown"}</div>
        </div>
      `;
    }

    function renderDomains() {
        const q = document.getElementById("searchBox").value.trim().toLowerCase();
        let totalVisible = 0;

        const html = currentData.domains.map(domain => {
            const controls = domain.controls.filter(c => {
                if (filterFocus && !c.inFocus) return false;
                if (activeStatus && c.status !== activeStatus) return false;
                if (q) {
                    const blob = [domain.name, c.id, c.name, c.description, c.owner, c.notes].join(" ").toLowerCase();
                    if (!blob.includes(q)) return false;
                }
                return true;
            });

            if (!controls.length) return "";
            totalVisible += controls.length;

            const avg = weightedAverage(controls);
            return `
          <details open class="domain-card">
            <summary><strong>${domain.name}</strong> <span class="muted" style="font-size: 70%">${avg.toFixed(2)} / 3.00</span></summary>
            <div class="muted">${domain.description || ""}</div>
            <div style="border-bottom: 1px dashed lightgrey; margin-top: 10px"></div>
            <table>
              <tbody>
                ${controls.map(c => `
                  <tr class="${c.inFocus ? 'in-focus' : ''}">
                    <td style="width: 42px"><div class="status-dot ${c.status}"></div></td>
                    <td>
                      <div><strong><a class="control-link" href="landing_pages/${encodeURIComponent(c.id)}.html" target="_blank" rel="noopener noreferrer">${c.name}</a></strong>${c.inFocus ? '<span class="focus-badge">In Focus</span>' : ''}</div>
                      <div class="muted">${c.description || ""}</div>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </details>
        `;
        }).join("");

        document.getElementById("domains").innerHTML = html || "<p class='muted'>No controls match the current filters.</p>";

        const counts = countStatuses();
        const total = counts.red + counts.yellow + counts.green;
        const countEl = document.getElementById("filterCount");
        countEl.textContent = (q || activeStatus || filterFocus)
            ? totalVisible + ' of ' + total + ' controls'
            : total + ' controls';
    }

    // Init
    const metadata = currentData.metadata || {};
    const pageTitle = metadata.title || "Compliance Dashboard";
    document.title = pageTitle;
    document.getElementById("heroTitle").textContent = pageTitle;
    document.getElementById("heroDescription").innerHTML = escapeHtml(formatMetadataDescription(metadata));
    if (metadata.icon) {
        const logo = document.getElementById("heroLogo");
        logo.onerror = function() { this.onerror = null; this.src = 'icons/logo.png'; };
        logo.src = 'icons/' + metadata.icon;
    }
    renderSummary();
    renderDomains();

    document.getElementById("searchBox").addEventListener("input", renderDomains);
</script>
