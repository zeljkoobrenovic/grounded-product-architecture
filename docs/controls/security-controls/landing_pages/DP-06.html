<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>International Transfers</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #eef2ff;
            color: #3730a3;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            min-width: 160px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        .stat-value {
            font-size: 24px;
            color: #1d4ed8;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .pill {
            display: inline-block;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .status-pill.red {
            background: #fbd5d5;
        }

        .status-pill.yellow {
            background: #fde68a;
        }

        .status-pill.green {
            background: #bbf7d0;
        }

        .criteria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }

        .criteria-card {
            border: 3px solid #d1d5db;
            border-radius: 10px;
            background-color: white;
            padding: 14px;
            vertical-align: top;
        }

        .criteria-card-inactive {
            border: 3px dashed #d1d5db;
            border-radius: 10px;
            background-color: white;
            padding: 14px;
            opacity: 0.2;
        }

        .criteria-card h3 {
            margin-top: 0;
        }

        .criteria-card.red h3 {
            color: #b91c1c;
        }

        .criteria-card.yellow h3 {
            color: darkorange;
        }

        .criteria-card.green h3 {
            color: #15803d;
        }

        .evidence-item,
        .detail-item {
            margin-bottom: 8px;
            line-height: 1.45;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }

        a {
            color: #1d4ed8;
            word-break: break-all;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 40px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Compliance">
        </td>
        <td>
            <div class="eyebrow">Compliance Control</div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div class="tab">
    <button class="tablinks active" onclick="openTab(event, 'control-tab')">Control</button>
    <button class="tablinks" onclick="openTab(event, 'evidence-tab')">Evidence</button>
</div>
<div id="control-tab" class="tabcontent" style="display:block; padding: 10px"></div>
<div id="evidence-tab" class="tabcontent" style="padding: 10px"></div>

<script>
    const control = {"id": "DP-06", "name": "International Transfers", "description": "Control and document transfers of personal data outside the EEA.", "priority": "High", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["SCCs", "Transfer Impact Assessments", "Vendor transfer register"], "scoring_criteria": {"red": "Cross-border transfers occur without clear safeguards or visibility.", "yellow": "Safeguards exist for major vendors but documentation is partial.", "green": "All relevant transfers are identified, justified, and supported by current safeguards."}};
    const domain = {"id": "DP", "name": "Data Protection & Privacy", "description": "GDPR-focused controls over customer and employee personal data.", "weight": 1.4};

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function listOrEmpty(items, formatter) {
        if (!items || !items.length) return '<div class="detail-item">No details captured.</div>';
        return items.map(formatter).join('');
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'Not set';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    document.getElementById('Title').innerHTML = escapeHtml(control.name || control.id || 'Compliance Control');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domain.name || '')
        + ' | ' + escapeHtml(control.id || '')
        + ' | ' + escapeHtml((control.status || '').toUpperCase())
        + ' | score ' + escapeHtml(control.score || '');

    let controlHtml = '';
    controlHtml += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(control.description || '') + '</div></div>';
    controlHtml += '<div class="section"><div class="section-title">Control Snapshot</div><div class="stats">';
    controlHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(control.priority || 'n/a') + '</div><div class="stat-label">Priority</div></div>';
    controlHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(control.owner || 'Unassigned') + '</div><div class="stat-label">Owner</div></div>';
    controlHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(formatDate(control.last_reviewed)) + '</div><div class="stat-label">Last Reviewed</div></div>';
    controlHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(formatDate(control.target_date)) + '</div><div class="stat-label">Target Date</div></div>';
    controlHtml += '</div></div>';

    if (control.notes) {
        controlHtml += '<div class="section"><div class="section-title">Notes</div><div class="description">' + escapeHtml(control.notes) + '</div></div>';
    }

    controlHtml += '<div class="section"><div class="section-title">Status</div><div class="criteria-grid">';
    ['red', 'yellow', 'green'].forEach(status => {
        const text = control.scoring_criteria && control.scoring_criteria[status]
            ? control.scoring_criteria[status]
            : 'No criteria defined.';
        if (control.status === status) {
            controlHtml += '<div class="criteria-card ' + status + '" style="border: 3px solid black"><h3>' + escapeHtml(status.toUpperCase()) + '</h3><div style="font-size: 90%; color: grey">' + escapeHtml(text) + '</div></div>';
        } else {
            controlHtml += '<div class="criteria-card-inactive"><h3>' + escapeHtml(status.toUpperCase()) + '</h3><div>' + escapeHtml(text) + '</div></div>';
        }
    });
    controlHtml += '</div></div>';

    controlHtml += '<div class="section"><div class="section-title">Evidence Examples</div>';
    controlHtml += listOrEmpty(control.evidence_examples, item => '<div class="evidence-item">' + escapeHtml(item) + '</div>');
    controlHtml += '</div>';

    let evidenceHtml = '';
    evidenceHtml += '<div class="section"><div class="section-title">Evidence Links</div>';
    evidenceHtml += listOrEmpty(control.evidence_links, item => '<div class="evidence-item"><a href="' + escapeHtml(item) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item) + '</a></div>');
    evidenceHtml += '</div>';

    document.getElementById('control-tab').innerHTML = controlHtml;
    document.getElementById('evidence-tab').innerHTML = evidenceHtml;

    function openTab(evt, tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }

        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        document.getElementById(tabName).style.display = 'block';
        evt.currentTarget.className += ' active';
    }
</script>
</body>
</html>
