<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pricing / Promo / Order Integrity</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: white;
            color: grey;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            border: 1px solid grey;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 0px;
        }

        .section {
            padding-top: 8px;
            margin-top: 0;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 6px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            min-width: 160px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        .stat-value {
            font-size: 24px;
            color: #1d4ed8;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .pill {
            display: inline-block;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .status-pill.red {
            background: #fbd5d5;
        }

        .status-pill.yellow {
            background: #fde68a;
        }

        .status-pill.green {
            background: #bbf7d0;
        }

        .criteria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }

        .criteria-card {
            border: 3px solid #d1d5db;
            border-radius: 10px;
            background-color: white;
            padding: 14px;
            vertical-align: top;
        }

        .criteria-card-inactive {
            border: 3px dashed #d1d5db;
            border-radius: 10px;
            background-color: white;
            padding: 14px;
            opacity: 0.2;
        }

        .criteria-card h3 {
            margin-top: 0;
        }

        .criteria-card.red h3 {
            color: #b91c1c;
        }

        .criteria-card.yellow h3 {
            color: darkorange;
        }

        .criteria-card.green h3 {
            color: #15803d;
        }

        .evidence-item,
        .detail-item {
            margin-bottom: 8px;
            line-height: 1.45;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 6px;
            border: 1px solid #ccc;
            border-top: none;
        }

        a {
            color: #1d4ed8;
            word-break: break-all;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body onload="initTab()" onhashchange="initTab()">
<table style="margin-left: 10px">
    <tr>
        <td style="vertical-align: top;">
            <img id="heroLogo" src="../icons/security.png" onerror="this.onerror=null;this.src='../icons/logo.png'" style="vertical-align: top; width:110px; height:110px; margin-right:12px" alt="Logo">
        </td>
        <td>
            <div class="eyebrow">Compliance Control</div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div style="margin: 16px">
    <div class="tab">
        <button id="tab_control-tab" class="tablinks" onclick="openTab('control-tab')">Control</button>
        <button id="tab_evidence-tab" class="tablinks" onclick="openTab('evidence-tab')">Evidence</button>
    </div>
    <div id="control-tab" class="tabcontent" style="padding: 10px"></div>
    <div id="evidence-tab" class="tabcontent" style="padding: 10px"></div>
</div>

<script>
    const control = {"id": "ecom-04", "name": "Pricing / Promo / Order Integrity", "description": "Prevent abuse of business logic, promotions, and order flows.", "priority": "High", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Admin audit logs for price changes", "Promo approval workflow", "Abuse case tests"], "scoring_criteria": {"red": "Key commercial controls are weak and susceptible to manipulation.", "yellow": "Controls exist but are inconsistent or not well audited.", "green": "Integrity controls are defined, logged, and tested against abuse scenarios."}};
    const domain = {"id": "ecom", "name": "eCommerce-Specific Security", "description": "Fraud, bots, account takeover, checkout abuse, and business logic risks.", "weight": 1.4};

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function listOrEmpty(items, formatter) {
        if (!items || !items.length) return '<div class="detail-item">No details captured.</div>';
        return items.map(formatter).join('');
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'Not set';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    document.getElementById('Title').innerHTML = escapeHtml(control.name || control.id || 'Compliance Control');
    document.getElementById('Meta').innerHTML = escapeHtml(domain.name || '');

    let controlHtml = '';
    controlHtml += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(control.description || '') + '</div></div>';
    controlHtml += '<div class="section"><div class="section-title">Control Snapshot</div><div class="stats">';
    controlHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(control.priority || 'n/a') + '</div><div class="stat-label">Priority</div></div>';
    controlHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(control.owner || 'Unassigned') + '</div><div class="stat-label">Owner</div></div>';
    controlHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(formatDate(control.last_reviewed)) + '</div><div class="stat-label">Last Reviewed</div></div>';
    controlHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(formatDate(control.target_date)) + '</div><div class="stat-label">Target Date</div></div>';
    controlHtml += '</div></div>';

    if (control.notes) {
        controlHtml += '<div class="section"><div class="section-title">Notes</div><div class="description">' + escapeHtml(control.notes) + '</div></div>';
    }

    controlHtml += '<div class="section"><div class="section-title">Status</div><div class="criteria-grid">';
    ['red', 'yellow', 'green'].forEach(status => {
        const text = control.scoring_criteria && control.scoring_criteria[status]
            ? control.scoring_criteria[status]
            : 'No criteria defined.';
        if (control.status === status) {
            controlHtml += '<div class="criteria-card ' + status + '" style="border: 3px solid black"><h3>' + escapeHtml(status.toUpperCase()) + '</h3><div style="font-size: 90%; color: grey">' + escapeHtml(text) + '</div></div>';
        } else {
            controlHtml += '<div class="criteria-card-inactive"><h3>' + escapeHtml(status.toUpperCase()) + '</h3><div>' + escapeHtml(text) + '</div></div>';
        }
    });
    controlHtml += '</div></div>';

    controlHtml += '<div class="section"><div class="section-title">Evidence Examples</div>';
    controlHtml += listOrEmpty(control.evidence_examples, item => '<div class="evidence-item">' + escapeHtml(item) + '</div>');
    controlHtml += '</div>';

    let evidenceHtml = '';
    evidenceHtml += '<div class="section"><div class="section-title">Evidence Links</div>';
    evidenceHtml += listOrEmpty(control.evidence_links, item => '<div class="evidence-item"><a href="' + escapeHtml(item) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item) + '</a></div>');
    evidenceHtml += '</div>';

    document.getElementById('control-tab').innerHTML = controlHtml;
    document.getElementById('evidence-tab').innerHTML = evidenceHtml;

    function initTab() {
        let tabName = 'control-tab';
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (document.getElementById('tab_' + hash)) {
                tabName = hash;
            }
        }
        openTab(tabName);
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
    }
</script>
</body>
</html>
