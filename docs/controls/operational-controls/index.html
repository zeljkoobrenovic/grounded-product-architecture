<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Compliance Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 40px;
        }

        h1, h2, h3 {
            margin-bottom: 0.3rem;
        }

        .muted {
            color: #666;
        }

        .hero {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
            margin-left: 20px;
        }

        .hero-logo {
            width: 136px;
            height: 136px;
            object-fit: contain;
            vertical-align: top;
        }

        .hero-copy {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .hero-description {
            color: #666;
            line-height: 1.45;
            max-width: 980px;
        }

        .row {
            margin: 30px 0 30px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 12px;
            min-width: 100px;
            flex: 1;
            cursor: pointer;
            transition: box-shadow 0.15s, border-color 0.15s;
            display: inline-block;
            text-align: center;
        }

        .card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .card.active {
            border-width: 2px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .card.active.red {
            border-color: crimson;
        }

        .card.active.yellow {
            border-color: orange;
        }

        .card.active.green {
            border-color: darkgreen;
        }

        .card.focus {
            background: #fffbeb;
        }

        .card.active.focus {
            border-color: #f59e0b;
        }

        .red {
            background: #fde8e8;
        }

        .yellow {
            background: #fff7d6;
        }

        .green {
            background: #e8f7ea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            padding: 8px;
            vertical-align: top;
            text-align: left;
        }

        th {
            background: #f7f7f7;
        }

        .controls {
            margin-top: 24px;
            margin-left: 6px;
            margin-top: 44px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            padding: 8px 12px;
            font-size: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 400px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #1d4ed8;
            box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.15);
        }

        .filter-count {
            color: #666;
            font-size: 14px;
        }

        .tag {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
        }

        .tag.red {
            background: #fbd5d5;
        }

        .tag.yellow {
            background: #fde68a;
        }

        .tag.green {
            background: #bbf7d0;
        }

        a {
            word-break: break-all;
        }

        .control-link {
            color: #1d4ed8;
            text-decoration: none;
        }

        .control-link:hover {
            text-decoration: underline;
        }

        .domain-card {
            box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;
            display: inline-block;
            padding: 16px;
            border: 1px solid grey;
            margin: 4px 4px 34px;
            vertical-align: top;
            border-radius: 10px;
            width: calc(33% - 40px);
            min-width: 280px;
        }

        @media (max-width: 800px) {
            .domain-card {
                width: 100%;
                min-width: unset;
            }
        }

        details summary {
            cursor: pointer;
            margin-bottom: 6px;
            font-size: 130%;
        }

        .in-focus {
            background: #fffbeb;
            border: 1px dashed darkred;
        }

        .focus-badge {
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #f59e0b;
            color: white;
            padding: 1px 6px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div class="hero" >
    <img class="hero-logo" id="heroLogo" src="icons/logo.png" alt="Compliance">
    <div class="hero-copy">
        <h1 id="heroTitle" style="vertical-align: top; font-size: 330%; margin-top: 0">Compliance Dashboard</h1>
        <div id="heroDescription" class="hero-description"></div>
    </div>
</div>

<div style="margin: 20px">
    <div class="row" id="summary" style="margin-left: 6px"></div>

    <div class="controls">
        <input type="text" id="searchBox" placeholder="Search controls, domains, owners..."/>
        <span id="filterCount" class="filter-count"></span>
    </div>

    <div id="domains"></div>
</div>

ks are automated, but several high-friction workflows remain manual.", "green": "Automation is used systematically to remove recurring manual operational work."}}, {"id": "found-03", "name": "Engineering Process Standardization", "description": "Core processes such as release, incident response, and post-incident follow-up are standard enough to scale across teams.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Engineering operating playbook", "Release checklist used by multiple teams", "Standard incident workflow with clear handoffs"], "scoring_criteria": {"red": "Engineering processes vary widely or are undocumented.", "yellow": "Core processes are documented but applied unevenly.", "green": "Engineering processes are standardized, improved regularly, and broadly followed."}}, {"id": "found-04", "name": "Performance Measurement", "description": "Measure and track performance data to understand operational health.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Reliability KPI dashboard", "Performance trend reviews", "Service health scorecards"], "scoring_criteria": {"red": "Operational performance is not measured consistently.", "yellow": "Some performance data is tracked, but coverage or review discipline is incomplete.", "green": "Performance data is tracked, reviewed regularly, and used to drive improvements."}}, {"id": "found-05", "name": "Continuous Improvement Culture", "description": "Foster a team culture that continuously improves operational quality and reliability.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Retrospective actions", "Improvement backlog", "Leaders cription": "Expectations are clear about feature work during on-call duty.", "priority": "medium", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Capacity policy", "Team working agreement", "Sprint planning guidance"], "scoring_criteria": {"red": "Feature expectations during on-call are unclear and create overload.", "yellow": "Expectations exist but vary by manager or team.", "green": "Teams have clear and fair expectations for feature work while on-call."}}, {"id": "oncall-06", "name": "Rotation Fairness", "description": "Rotation selection is fair and well-structured.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Rotation fairness review", "Participation criteria", "Coverage distribution analysis"], "scoring_criteria": {"red": "On-call participation is uneven or perceived as unfair.", "yellow": "Rotation is mostly structured, but fairness concerns remain.", "green": "Rotation design is clear, balanced, and perceived as fair."}}]}, {"id": "health", "name": "Operational Data and System Health", "description": "Operational visibility that helps managers connect service health, business events, and capacity risk.", "weight": 1.2, "controls": [{"id": "health-01", "name": "System and Business Dashboards", "description": "A single operating view shows system health, customer impact, and the business signals most likely to explain change.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Primary ops dashboard used in weekly review", "Business KPI overlay for traffic or conversion impact", "Service review pack shared with leadership"], "scoring_criteria": {"red": "Health visibility is fragmented or missing.", "yellow": "Dashboards exist but do not provide a full operational picture.", "green": "Dashboards give reliable visibility into technical and business health."}}, {"id": "health-02", "name": "Dashboard Review Cadence", "description": "Managers and team leads use dashboards in a fixed review cadence, not only during incidents.", "priority": "medium", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Weekly operations review agenda", "Action log linked to observed anomalies", "Review notes showing trends and decisions"], "scoring_criteria": {"red": "Dashboards exist but are rarely used in decision-making.", "yellow": "Dashboards are reviewed sometimes but without a steady cadence.", "green": "Dashboards are reviewed regularly and trigger operational action."}, "inFocus": true}, {"id": "health-03", "name": "Operational Awareness of Change Drivers", "description": "Teams are aware of current feature flags, marketing campaigns, and sales events.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Feature flag inventory", "Launch calendar", "Marketing and sales event schedule"], "scoring_criteria": {"red": "Operational teams lack visibility into business or product events affecting load and behavior.", "yellow": "Some change drivers are visible, but not in one reliable operating view.", "green": "Teams routinely know which product and business events may affect system health."}}, {"id": "health-04", "name": "Elastic Scaling and Threshold Awareness", "description": "Systems scale elastically and operating thresholds are known.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Autoscaling configuration", "Capacity threshold documentation", "Scaling test reports"], "scoring_criteria": {"red": "Capacity limits are unclear and scaling is unreliable.", "yellow": "Scaling works in some scenarios, but thresholds are not well understood.", "green": "Elastic scaling behavior and critical thresholds are known, tested, and monitored."}}]}, {"id": "customer", "name": "Customer Issue Tracking", "description": "A manager-level view of recurring customer pain and whether engineering quality is improving or degrading.", "weight": 1.1, "controls": [{"id": "customer-01", "name": "Customer Issue Volume Tracking", "description": "Support, field, and app-store issues are grouped into a usable taxonomy so managers can see the real quality picture.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Customer issue dashboard by category and severity", "Shared taxonomy used by support and engineering", "Weekly top-issues report with owner"], "scoring_criteria": {"red": "Customer issue data is not tracked consistently.", "yellow": "Issue tracking exists but lacks clean categorization or full coverage.", "green": "Customer issue frequency and type are tracked in a structured way."}}, {"id": "customer-02", "name": "Customer Issue Trend Analysis", "description": "Customer issue trends are reviewed over time so managers can see whether fixes are actually reducing pain.", "priority": "medium", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Weekly or monthly issue trend chart", "Top recurring problems with trend direction", "Quality review notes linking trend to actions"], "scoring_criteria": {"red": "Issue trends are not analyzed over time.", "yellow": "Trend analysis exists but is inconsistent or too shallow.", "green": "Customer issue trends are reviewed and used to prioritize improvements."}}, {"id": "customer-03", "name": "Quality Review in Feature Delivery", "description": "Quality management is considered in the context of new features.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Release quality gate", "Feature readiness checklist", "Defect escape review"], "scoring_criteria": {"red": "Feature planning and launch work do not consider operational quality risks.", "yellow": "Quality is considered for some features but not as a consistent practice.", "green": "Quality considerations are built into new feature planning and release decisions."}}, {"id": "customer-04", "name": "Timeouts, Errors, and Crash Tracking", "description": "Frequency of timeouts, errors, or crashes is tracked, especially in mobile environments.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Crash analytics", "Timeout error dashboards", "Mobile reliability reports"], "scoring_criteria": {"red": "Timeouts, crashes, and errors are not measured reliably.", "yellow": "Some error tracking exists, but coverage or segmentation is incomplete.", "green": "Timeouts, errors, and crashes are tracked and reviewed as core quality signals."}}]}, {"id": "recovery", "name": "Failover and Recovery", "description": "The team can fail over, degrade gracefully, and restore service with known timings rather than hope.", "weight": 1.3, "controls": [{"id": "recovery-01", "name": "Recovery Plan Documentation and Testing", "description": "Recovery steps are documented, tested, and recent enough that the manager would trust them in a real outage.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Recovery plan with RTO and RPO targets", "Recent restore or failover test evidence", "Tabletop or game-day notes with follow-up actions"], "scoring_criteria": {"red": "Recovery plans are undocumented or untested.", "yellow": "Recovery plans exist, but tests are incomplete or outdated.", "green": "Recovery plans are documented, tested, and reviewed on a regular cadence."}}, {"id": "recovery-02", "name": "Graceful Degradation", "description": "Systems degrade gracefully when needed.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Degradation mode design", "Traffic shedding rules", "Fail-open or fail-safe test cases"], "scoring_criteria": {"red": "Failure modes tend to cause full or uncontrolled service loss.", "yellow": "Some graceful degradation exists, but important gaps remain.", "green": "Systems can degrade intentionally and predictably under stress or dependency failure."}}, {"id": "recovery-03", "name": "Full Recovery Time Measurement", "description": "Managers know the current time to full recovery and whether recovery work is making that number better.", "priority": "medium", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["MTTR or full recovery trend by service", "After-action timing analysis", "Recovery improvement backlog with owners"], "scoring_criteria": {"red": "Recovery time is not measured or improved deliberately.", "yellow": "Recovery time is measured after major events, but improvement is inconsistent.", "green": "Recovery time is measured routinely and reduced through targeted improvements."}, "inFocus": true}]}, {"id": "delivery", "name": "CI/CD, Testing, and Automation", "description": "Operational delivery controls that keep releases safe, observable, and reversible.", "weight": 1.3, "controls": [{"id": "delivery-01", "name": "Deployment Quality Confidence", "description": "Managers can look at a small set of release signals and decide whether the deployment is healthy enough to continue.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Change failure rate by team or service", "Release scorecard used in go or no-go decisions", "Recent deployment review with follow-up actions"], "scoring_criteria": {"red": "Deployments are risky and confidence is low.", "yellow": "Deployments are generally workable, but reliability varies by system or team.", "green": "Deployments are trusted because quality signals are strong and consistent."}}, {"id": "delivery-02", "name": "Gradual Rollouts", "description": "Canary releases or feature flags are used for gradual rollouts.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Canary deployment workflow", "Feature flag catalogue", "Progressive rollout policy"], "scoring_criteria": {"red": "Releases are mostly all-at-once with limited control.", "yellow": "Gradual rollout tooling exists but is not used consistently.", "green": "Canaries or feature flags are standard practice for risk-managed releases."}}, {"id": "delivery-03", "name": "Synthetic and Real User Monitoring", "description": "The team can tell quickly whether the release broke key user journeys in production, not just internal health checks.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Synthetic checks for top customer journeys", "Real-user monitoring dashboard for critical flows", "Coverage list of journeys monitored in production"], "scoring_criteria": {"red": "Key user flows are not monitored end to end.", "yellow": "Some key flows are monitored, but coverage is incomplete.", "green": "Synthetic and real-user monitoring cover the most important user journeys."}}, {"id": "delivery-04", "name": "Observability and Instrumentation", "description": "Systems have adequate observability and instrumentation.", "priority": "high", "weight": 1.0, "status": "green", "score": 3, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Tracing coverage", "Structured logs", "Metrics instrumentation standards"], "scoring_criteria": {"red": "Systems are hard to observe or debug in production.", "yellow": "Observability is present but uneven across systems.", "green": "Systems are instrumented well enough to support diagnosis, monitoring, and improvement."}}, {"id": "delivery-05", "name": "Rollback and Known Good Recovery", "description": "Teams can return to a known good state quickly without inventing a recovery path during the incident.", "priority": "high", "weight": 1.0, "status": "yellow", "score": 2, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Rollback procedure used in the last 6 months", "Known good artifact or environment reference", "Rollback drill or real rollback evidence"], "scoring_criteria": {"red": "Rollback or failover paths are missing or unreliable.", "yellow": "Rollback is possible in some cases but not consistently fast or safe.", "green": "Teams can reliably revert or fail over to a known good state when required."}}]}]};
    let activeStatus = '';

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatMetadataDescription(metadata) {
        if (!metadata) return "";
        const parts = [];
        if (metadata.version) {
            parts.push(`Version ${metadata.version}`);
        }
        if (metadata.regions && metadata.regions.length) {
            parts.push(`Regions: ${metadata.regions.join(", ")}`);
        }
        if (metadata.primary_regulatory_focus && metadata.primary_regulatory_focus.length) {
            parts.push(`Focus: ${metadata.primary_regulatory_focus.join(", ")}`);
        }
        if (metadata.intended_use && metadata.intended_use.length) {
            parts.push(`Use: ${metadata.intended_use.join(" | ")}`);
        }
        if (metadata.source && metadata.source.title) {
            const sourceLabel = metadata.source.author
                ? `${metadata.source.title} by ${metadata.source.author}`
                : metadata.source.title;
            parts.push(`Source: ${sourceLabel}`);
        }
        return parts.join(" • ");
    }

    function safeScore(control) {
        if (typeof control.score === "number") return control.score;
        const map = {red: 1, yellow: 2, green: 3};
        return map[control.status] || 1;
    }

    function overallMaturity(data) {
        let weighted = 0, weights = 0;
        data.domains.forEach(domain => {
            const dw = domain.weight || 1;
            domain.controls.forEach(control => {
                const cw = control.weight || 1;
                const w = dw * cw;
                weighted += safeScore(control) * w;
                weights += w;
            });
        });
        return weights ? (weighted / weights) : 0;
    }

    function maturityBand(score, model) {
        const bands = model.overall_maturity_bands || [];
        for (const b of bands) {
            if (score >= b.min && score <= b.max) return b;
        }
        return null;
    }

    function countStatuses(data) {
        const counts = {red: 0, yellow: 0, green: 0};
        data.domains.forEach(d => d.controls.forEach(c => {
            counts[c.status] = (counts[c.status] || 0) + 1;
        }));
        return counts;
    }

    function domainAverage(domain) {
        let weighted = 0, weights = 0;
        domain.controls.forEach(control => {
            const w = control.weight || 1;
            weighted += safeScore(control) * w;
            weights += w;
        });
        return weights ? (weighted / weights) : 0;
    }

    let filterFocus = false;

    function toggleStatus(status) {
        filterFocus = false;
        activeStatus = activeStatus === status ? '' : status;
        renderSummary();
        renderDomains();
    }

    function toggleFocus() {
        filterFocus = !filterFocus;
        activeStatus = '';
        renderSummary();
        renderDomains();
    }

    function countInFocus(data) {
        let count = 0;
        data.domains.forEach(d => d.controls.forEach(c => { if (c.inFocus) count++; }));
        return count;
    }

    function renderSummary() {
        const score = overallMaturity(currentData);
        const band = maturityBand(score, currentData.scoring_model);
        const counts = countStatuses(currentData);
        const focusCount = countInFocus(currentData);
        const totalControls = counts.red + counts.yellow + counts.green;
        document.getElementById("summary").innerHTML = `
        <div class="card focus ${filterFocus ? 'active' : ''}" onclick="toggleFocus()" style="margin-right: 24px">
          <div style="font-size: 200%"><strong>${focusCount}</strong></div>
          <div>In Focus</div>
        </div>
        <div class="card red ${activeStatus === 'red' ? 'active' : ''}" onclick="toggleStatus('red')">
          <div style="font-size: 200%"><strong>${counts.red}</strong></div>
          <div>Red</div>
        </div>
        <div class="card yellow ${activeStatus === 'yellow' ? 'active' : ''}" onclick="toggleStatus('yellow')">
          <div style="font-size: 200%"><strong>${counts.yellow}</strong></div>
          <div>Yellow</div>
        </div>
        <div class="card green ${activeStatus === 'green' ? 'active' : ''}" onclick="toggleStatus('green')">
          <div style="font-size: 200%"><strong>${counts.green}</strong></div>
          <div>Green</div>
        </div>
        <div class="card" onclick="toggleStatus('')" style="margin-left: 24px">
          <div style="font-size: 200%"><strong>${score.toFixed(2)} / 3.00</strong></div>
          <div>Overall maturity is ${band ? band.label.toLowerCase() : "No maturity band found"}</div>
        </div>
      `;
    }

    function renderDomains() {
        const q = document.getElementById("searchBox").value.trim().toLowerCase();
        let totalVisible = 0;

        const html = currentData.domains.map(domain => {
            const controls = domain.controls.filter(c => {
                if (filterFocus && !c.inFocus) return false;
                const matchesStatus = !activeStatus || c.status === activeStatus;
                const blob = [domain.name, c.id, c.name, c.description, c.owner, c.notes].join(" ").toLowerCase();
                const matchesSearch = !q || blob.includes(q);
                return matchesStatus && matchesSearch;
            });

            if (!controls.length) return "";
            totalVisible += controls.length;

            const avg = domainAverage({controls});
            return `
          <details open class="domain-card">
            <summary><strong>${domain.name}</strong> <span class="muted" style="font-size: 70%">${avg.toFixed(2)} / 3.00</span></summary>
            <div class="muted">${domain.description || ""}</div>
            <div style="border-bottom: 1px dashed lightgrey; margin-top: 10px"></div>
            <table>
              <tbody>
                ${controls.map(c => `
                  <tr class="${c.inFocus ? 'in-focus' : ''}">
                    <td style="width: 42px;">
                      <div class="${c.status}" style="height: 42px; width: 42px; border-radius: 10px"></div>
                    </td>
                    <td>
                      <div><strong><a class="control-link" href="landing_pages/${encodeURIComponent(c.id)}.html" target="_blank" rel="noopener noreferrer">${c.name}</a></strong>${c.inFocus ? '<span class="focus-badge">In Focus</span>' : ''}</div>
                      <div class="muted">${c.description || ""}</div>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </details>
        `;
        }).join("");

        document.getElementById("domains").innerHTML = html || "<p class='muted'>No controls match the current filters.</p>";

        const countEl = document.getElementById("filterCount");
        const totalAll = countStatuses(currentData);
        const total = totalAll.red + totalAll.yellow + totalAll.green;
        if (q || activeStatus || filterFocus) {
            countEl.textContent = totalVisible + ' of ' + total + ' controls';
        } else {
            countEl.textContent = total + ' controls';
        }
    }

    // Initial render
    const metadata = currentData.metadata || {};
    const pageTitle = metadata.title || "Compliance Dashboard";
    document.title = pageTitle;
    document.getElementById("heroTitle").textContent = pageTitle;
    document.getElementById("heroDescription").innerHTML = escapeHtml(formatMetadataDescription(metadata));
    if (metadata.icon) {
        const logo = document.getElementById("heroLogo");
        logo.onerror = function() { this.onerror = null; this.src = 'icons/logo.png'; };
        logo.src = 'icons/' + metadata.icon;
    }
    renderSummary();
    renderDomains();

    document.getElementById("searchBox").addEventListener("input", renderDomains);
</script>
