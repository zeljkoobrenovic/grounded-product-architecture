            font-family: Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 40px;
            text-align: center;
        }

        .group {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .group-title {
            font-size: 90%;

        }

        .app {
            margin: 10px;
            padding-top: 10px;
            border: solid lightgrey 1px;
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.2), 0 3px 10px 0 rgba(0, 0, 0, 0.19);
            display: inline-block;
            height: 320px;
            width: 220px;
            object-fit: cover;
            text-align: center;
            vertical-align: top;
            border-radius: 12px;
            background-color: white;
        }

        .name {
            font-weight: bold;
            font-size: 18px;
            margin-top: 12px;
            color: #5009DC;
            overflow: hidden;
            padding-left: 8px;
            padding-right: 8px;
        }

        .source {
            font-size: 11px;
            color: grey;
            margin: 3px;
        }

        .description {
            font-size: 14px;
            color: grey;
            margin: 3px;
            line-height: 21px;
            padding-left: 8px;
            padding-right: 8px;
        }

        a {
            text-decoration: none;
        }

        .icon {
            width: 140px;
            height: 140px;
            object-fit: contain;
            border-radius: 4px;
            margin-top: 26px;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <script>
        const START_TAB_STORAGE_KEY = 'grounded-product-architecture:start-active-tab';

        function initTab() {
            let tabName = '';
            if (typeof apps !== 'undefined' && apps.length > 0) {
                tabName = 'tab_content_' + apps[0].tab;
            }
            const storedTab = window.sessionStorage.getItem(START_TAB_STORAGE_KEY);
            if (storedTab && document.getElementById('tab_' + storedTab)) {
                tabName = storedTab;
            }
            if (tabName) {
                openTab(tabName);
            }
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
            window.sessionStorage.setItem(START_TAB_STORAGE_KEY, tabName);
        }
    </script>

<script>
    // Pre-build a flat list with pre-lowercased fields for search
    const allApps = [];
    apps.forEach(tab => {
        tab.apps.forEach(group => {
            group.apps.forEach(app => {
                allApps.push({
                    app: app,
                    name: (app.name || '').toLowerCase(),
                    description: (app.description || '').toLowerCase(),
                    source: (app.source || '').toLowerCase()
                });
            });
        });
    });

    function renderAppCard(app) {
        let html = '<div class="app">';
        if (config.openInNewTab === false || app.openInNewTab === false) {
            html += '<a href="' + app.link + '">';
        } else {
            html += '<a target="_blank" href="' + app.link + '">';
        }
        html += '<div style="height: 38px">';
        html += '<div class="name">' + app.name + '</div>';
        if (app.source) {
            html += '<div class="source">source: ' + app.source + '</div>';
        } else {
            html += '<div class="source"></div>';
        }
        html += '</div>';
        html += '<div><img class="icon" src="' + app.icon + '"></div>';
        html += '<div class="description">' + app.description + '</div>';
        html += '</a>';
        html += '</div>';
        return html;
    }

    function renderTabs() {
        apps.forEach(tab => {
            let html = '';
            tab.apps.forEach(group => {
                html += '<div class="group">';
                html += '<div class="group-title">' + group.group + '</div>';
                group.apps.forEach(app => {
                    html += renderAppCard(app);
                });
                html += '</div>';
            });
            document.getElementById('content_' + tab.tab).innerHTML = html;
        });
    }

    function update() {
        const filterText = document.getElementById('filter_all').value.trim().toLowerCase();

        if (filterText) {
            document.getElementById('tab_navigation').style.display = 'none';
            document.getElementById('tab_content').style.display = 'none';
            document.getElementById('content_search').style.display = 'block';

            let html = '';
            let count = 0;
            allApps.forEach(entry => {
                if (entry.name.includes(filterText) || entry.description.includes(filterText) || entry.source.includes(filterText)) {
                    html += renderAppCard(entry.app);
                    count++;
                }
            });
            document.getElementById('content_search').innerHTML = html;
            document.getElementById('summary_all').innerHTML = ' = ' + count + ' app' + (count !== 1 ? 's' : '');
        } else {
            document.getElementById('tab_navigation').style.display = '';
            document.getElementById('tab_content').style.display = '';
            document.getElementById('content_search').style.display = 'none';
            document.getElementById('summary_all').innerHTML = '';
        }
    }

    if (!config || !config.enableSearch) {
        document.getElementById('search_container').style.display = 'none';
    }

    renderTabs();
</script>
