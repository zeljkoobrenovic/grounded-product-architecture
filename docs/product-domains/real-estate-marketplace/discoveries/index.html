    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function updateTabLabels() {
        const ongoing = (discoveries.ongoing || []).length;
        const archived = (discoveries.archived || []).length;
        document.getElementById('tab_Ongoing').textContent = 'Ongoing (' + ongoing + ')';
        document.getElementById('tab_Archived').textContent = 'Archived (' + archived + ')';
    }

    function decisionBadge(outcome) {
        if (!outcome || !outcome.decision) return '';
        const colors = {'proceed': '#16a34a', 'narrow': '#d97706', 'sequence': '#6366f1', 'pivot': '#d97706', 'park': '#6b7280', 'kill': '#dc2626'};
        const color = colors[outcome.decision] || '#6b7280';
        return '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + color + ';margin-left:6px">' + escapeHtml(outcome.decision) + '</span>';
    }

    function renderCards(items, emptyLabel) {
        if (!items || !items.length) {
            return '<div class="empty">' + escapeHtml(emptyLabel) + '</div>';
        }
        let html = '<div class="grid">';
        items.forEach(item => {
            html += '<div class="card">';
            html += '<div class="card-header"><span class="card-type">' + escapeHtml(item.statusLabel || item.status || 'Discovery') + '</span>' + decisionBadge(item.outcome) + '<span class="card-date" style="margin-left:6px">' + escapeHtml(formatDate(item.startDate)) + ' -> ' + escapeHtml(formatDate(item.endDate)) + '</span></div>';
            html += '<div class="card-description">' + escapeHtml(item.title || item.name || 'Discovery') + '</div>';
            if (item.name && item.title && item.name !== item.title) {
                html += '<div class="card-summary" style="margin-bottom:8px">' + escapeHtml(item.name) + '</div>';
            }
            html += '<div class="card-summary">' + escapeHtml(item.summary || '') + '</div>';

            if (item.linkedInitiatives && item.linkedInitiatives.length) {
                html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
                item.linkedInitiatives.forEach(linked => {
                    const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                        ? '../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                        : '';
                    html += '<div class="pill"><img class="pill-icon" src="../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'icons/logo.png\'"><div><div class="pill-name">' + (href ? '<a target="_blank" rel="noopener noreferrer" href="' + href + '">' + escapeHtml(linked.initiativeDescription || linked.description || linked.initiativeId) + '</a>' : escapeHtml(linked.initiativeDescription || linked.description || linked.initiativeId)) + '</div></div></div>';
                });
                html += '</div>';
            }

            if (item.riskFocus && item.riskFocus.length) {
                html += '<div class="section"><div class="section-title">Risks Being Reduced</div><div class="risk-list">';
                item.riskFocus.forEach(risk => {
                    html += '<div class="risk-pill">' + escapeHtml(risk.riskType) + '</div>';
                });
                html += '</div></div>';
            }

            if (item.teams && item.teams.assignments && item.teams.assignments.length) {
                html += '<div class="section"><div class="section-title">Teams</div>';
                item.teams.assignments.forEach(assignment => {
                    html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
                });
                html += '</div>';
            }

            html += '<a class="open-link" target="_blank" href="landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html">Open details...</a>';
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    updateTabLabels();
    document.getElementById('Ongoing').innerHTML = renderCards(discoveries.ongoing || [], 'No ongoing discoveries available.');
    document.getElementById('Archived').innerHTML = renderCards(discoveries.archived || [], 'No archived discoveries available.');
</script>

    const divId = "breadcrumbs";

    function renderBreadcrumbs() {

        if (!container) {

            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
