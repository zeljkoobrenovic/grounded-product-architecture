<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KTLO (Real Estate Marketplace)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1180px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .meta {
            color: #6b7280;
            margin-top: 8px;
        }

        .objective {
            font-size: 19px;
            line-height: 1.55;
        }

        .section {
            padding-top: 10px;
            margin-top: 10px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }

        .metric {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 12px;
        }

        .metric-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
        }

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metric-description {
            line-height: 1.45;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }

        .card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.05) 0 1px 3px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .card-type {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            background-color: #e8f1ff;
            color: #1d4ed8;
        }

        .card-date {
            color: #6b7280;
            font-size: 13px;
        }

        .card-title {
            font-size: 20px;
            line-height: 1.35;
            margin-bottom: 6px;
            color: #315b7c;
        }

        .card-description {
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .empty {
            color: #6b7280;
            border: 1px dashed #d7dce1;
            border-radius: 8px;
            padding: 18px;
            background-color: #fafafa;
        }

        .kanban {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .kanban-col {
            flex: 1;
            min-width: 0;
        }

        .kanban-col-header {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            padding: 6px 8px;
            border-bottom: 2px solid #e5e7eb;
            margin-bottom: 8px;
        }

        .kanban-col-header .count {
            float: right;
            background: #e5e7eb;
            border-radius: 999px;
            padding: 0 6px;
            font-size: 11px;
        }

        .kanban-card {
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }

        .kanban-card-title {
            font-size: 13px;
            line-height: 1.35;
            margin-bottom: 4px;
        }

        .kanban-card-meta {
            font-size: 11px;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header {
            font-size: 280%;
            white-space: nowrap;
            overflow: hidden;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 720px) {
            .tab button {
                width: 100%;
                text-align: left;
            }

            .kanban {
                flex-direction: column;
            }
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body onload="initTab()" onhashchange="initTab()">
<div class="domain-label">Real Estate Marketplace</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link" href="../customers/index.html">Customers</a>
    <a class="section-link" href="../product-bricks/index.html">Product Bricks</a>
    <a class="section-link" href="../products/index.html">Products</a>
    <a class="section-link" href="../teams/index.html">Teams</a>
    <a class="section-link" href="../objectives/index.html">Objectives</a>
    <a class="section-link" href="../releases/index.html">Releases</a>
    <a class="section-link active" href="../ktlo/index.html">KTLO</a>
</div>

<table>
    <tr>
        <td style="vertical-align: top; padding-top: 0">
            <img src="icons/logo.png" style="width:118px; height:118px; margin-right:12px" alt="KTLO">
        </td>
        <td style="vertical-align: top">
            <div id="Title" class="header"></div>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div style="margin-left: 12px">
    <div class="tab" id="TabBar"></div>
    <div id="HomeTab" class="tabcontent"></div>
    <div id="CategoryTabsContainer"></div>
    <div id="InitiativesTab" class="tabcontent"></div>
</div>

<script>
    const payload = {"schemaVersion": "1.0", "domainId": "real-estate-marketplace", "domainName": "Real Estate Marketplace", "generatedOn": "2026-03-30", "description": "KTLO work for Real Estate Marketplace keeps the domain reliable, secure, supportable, and operable.", "methodology": "KTLO is modeled like an objective set, but the key results represent operational categories that must be continuously managed.", "companyObjectives": [{"id": "ktlo-resilience", "title": "Maintain reliability, security, and operational continuity", "statement": "Keep the Real Estate Marketplace domain safe to run by controlling incident load, reducing operational drag, and addressing mandatory maintenance work before it compounds.", "objectiveType": "company", "status": "active", "sourceObjectiveIds": ["real-estate-marketplace-ktlo-core"]}], "objectives": [{"id": "real-estate-marketplace-ktlo-core", "title": "Real Estate Marketplace KTLO baseline", "objective": "Protect service continuity and delivery capacity in Real Estate Marketplace by managing critical bugs, paying down technical debt, and applying security maintenance work on time.", "status": "active", "period": {"type": "rolling"}, "keyResults": [{"id": "kr-critical-bugs", "metric": "Critical bugs", "category": "critical-bugs", "kind": "operational", "targetDirection": "decrease", "target": "Reduce the open Sev1 and Sev2 bug backlog and restore service quickly when failures occur.", "baseline": "Measured from the current operational backlog.", "statement": "Reduce critical bug exposure in Real Estate Marketplace.", "commitmentType": "high-integrity", "status": "active"}, {"id": "kr-tech-debt", "metric": "Tech debt", "category": "tech-debt", "kind": "operational", "targetDirection": "decrease", "target": "Retire high-friction legacy components, brittle workflows, and manual operational work that slows delivery.", "baseline": "Measured from the current engineering debt register.", "statement": "Reduce structural tech debt in Real Estate Marketplace.", "commitmentType": "standard", "status": "active"}, {"id": "kr-security-patches", "metric": "Security patches", "category": "security-patches", "kind": "operational", "targetDirection": "decrease", "target": "Keep critical and high-severity vulnerabilities within patch SLAs across production systems and dependencies.", "baseline": "Measured from the current vulnerability backlog and patch compliance posture.", "statement": "Keep security patching current in Real Estate Marketplace.", "commitmentType": "high-integrity", "status": "active"}]}]};
    const initiativesPayload = {"items": [{"title": "Listing Reliability Incident Stabilization Sprint", "date": "2026-04-07", "description": "A focused KTLO initiative to reduce critical production defects, tighten incident response loops, and remove the highest-severity reliability failures affecting Real Estate Marketplace operations.", "initiativeId": "initiative-real-estate-marketplace-ktlo-critical-bugs", "priority": "p0", "category": "critical-bugs", "keyResultId": "real-estate-marketplace-ktlo-core/kr-critical-bugs", "productBricks": [], "deliveryChannels": [], "teams": {"primaryTeamIds": [], "supportingTeamIds": []}, "landingPageId": "initiative-initiative-real-estate-marketplace-ktlo-critical-bugs"}, {"title": "Marketplace Workflow Debt Retirement", "date": "2026-04-14", "description": "A KTLO initiative to reduce operational drag by refactoring brittle integrations, simplifying recovery paths, and removing legacy technical debt that slows change in Real Estate Marketplace.", "initiativeId": "initiative-real-estate-marketplace-ktlo-tech-debt", "priority": "p1", "category": "tech-debt", "keyResultId": "real-estate-marketplace-ktlo-core/kr-tech-debt", "productBricks": [], "deliveryChannels": [], "teams": {"primaryTeamIds": [], "supportingTeamIds": []}, "landingPageId": "initiative-initiative-real-estate-marketplace-ktlo-tech-debt"}, {"title": "Marketplace Patch Compliance Cycle", "date": "2026-04-21", "description": "A KTLO initiative to keep the Real Estate Marketplace stack within security patch SLAs by upgrading vulnerable dependencies, rotating outdated components, and closing remediation gaps.", "initiativeId": "initiative-real-estate-marketplace-ktlo-security-patches", "priority": "p0", "category": "security-patches", "keyResultId": "real-estate-marketplace-ktlo-core/kr-security-patches", "productBricks": [], "deliveryChannels": [], "teams": {"primaryTeamIds": [], "supportingTeamIds": []}, "landingPageId": "initiative-initiative-real-estate-marketplace-ktlo-security-patches"}]};
    const objective = (payload.objectives || [])[0] || null;

    function initTab() {
        let tabName = 'HomeTab';
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (document.getElementById('tab_' + hash)) {
                tabName = hash;
            }
        }
        openTab(tabName);
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
    }

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function slugify(value) {
        return String(value || 'tab').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'tab';
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(metric.metric || metric.category || metric.id) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + (metric.commitmentType ? ' | ' + escapeHtml(metric.commitmentType) : '') + '</div>';
        if (metric.statement) {
            html += '<div class="metric-description">' + escapeHtml(metric.statement) + '</div>';
        }
        if (metric.target) {
            html += '<div class="metric-meta" style="margin-top:8px"><b>Target:</b> ' + escapeHtml(metric.target) + '</div>';
        }
        if (metric.baseline) {
            html += '<div class="metric-meta"><b>Baseline:</b> ' + escapeHtml(metric.baseline) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function linkedInitiativesFor(keyResult) {
        return (initiativesPayload.items || []).filter(item => item.keyResultId === ((objective ? objective.id : '') + '/' + keyResult.id));
    }

    function priorityBadge(priority) {
        if (!priority) return '';
        const colors = {'p0': '#dc2626', 'p1': '#d97706', 'p2': '#6b7280', 'p3': '#9ca3af'};
        const color = colors[priority] || '#6b7280';
        return '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + color + ';margin-left:6px">' + escapeHtml(priority) + '</span>';
    }

    function initiativeStatus(item) {
        if (item.status) return item.status;
        if (!item.date) return 'planned';
        const today = new Date().toISOString().slice(0, 10);
        if (item.date > today) return 'planned';
        return 'done';
    }

    function initiativeHref(item) {
        if (item.landingPageId) {
            return 'landing_pages/' + encodeURIComponent(item.landingPageId) + '.html';
        }
        if (item.initiativeId) {
            return 'landing_pages/' + encodeURIComponent('initiative-' + item.initiativeId) + '.html';
        }
        return '';
    }

    function renderInitiativeKanbanCard(item) {
        const href = initiativeHref(item);
        let html = '<div class="kanban-card">';
        html += '<div class="kanban-card-title">' + linkOf(href, item.title || item.description || item.initiativeId || 'Initiative', 'entity-link') + '</div>';
        html += '<div class="kanban-card-meta">' + formatDate(item.date) + priorityBadge(item.priority) + '</div>';
        html += '</div>';
        return html;
    }

    function renderInitiativesKanban(items) {
        const columns = {planned: [], 'in-progress': [], done: []};
        items.forEach(item => {
            const status = initiativeStatus(item);
            if (status === 'in-progress' || status === 'in_progress' || status === 'ongoing') {
                columns['in-progress'].push(item);
            } else if (status === 'done' || status === 'completed' || status === 'achieved') {
                columns.done.push(item);
            } else {
                columns.planned.push(item);
            }
        });

        const config = [
            {key: 'planned', label: 'Planned', border: '#9ca3af'},
            {key: 'in-progress', label: 'In Progress', border: '#d97706'},
            {key: 'done', label: 'Done', border: '#16a34a'}
        ];

        let html = '<div class="kanban">';
        config.forEach(column => {
            const columnItems = columns[column.key];
            html += '<div class="kanban-col">';
            html += '<div class="kanban-col-header" style="border-bottom-color:' + column.border + '">' + column.label + '<span class="count">' + columnItems.length + '</span></div>';
            if (!columnItems.length) {
                html += '<div class="empty" style="padding:10px 12px">No initiatives</div>';
            } else {
                columnItems.forEach(item => {
                    html += renderInitiativeKanbanCard(item);
                });
            }
            html += '</div>';
        });
        return html;
    }

    function renderHomeTab() {
        if (!objective) {
            document.getElementById('HomeTab').innerHTML = '<div class="empty">No KTLO objective has been defined for this domain yet.</div>';
            return;
        }

        let html = '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(objective.objective || '') + '</div></div>';
        html += '<div class="section"><div class="section-title">Overview</div>';
        html += '<div class="pill"><span class="pill-name">Status</span><span class="pill-meta">' + escapeHtml(objective.status || 'active') + '</span></div>';
        html += '<div class="pill"><span class="pill-name">Period</span><span class="pill-meta">' + escapeHtml((objective.period || {}).type || 'rolling') + '</span></div>';
        html += '<div class="pill"><span class="pill-name">Categories</span><span class="pill-meta">' + escapeHtml((objective.keyResults || []).length) + '</span></div>';
        html += '<div class="pill"><span class="pill-name">Initiatives</span><span class="pill-meta">' + escapeHtml((initiativesPayload.items || []).length) + '</span></div>';
        html += '</div>';

        html += '<div class="section"><div class="section-title">Key Results</div>';
        if (!(objective.keyResults || []).length) {
            html += '<div class="empty">No key results defined.</div>';
        } else {
            (objective.keyResults || []).forEach(item => {
                const tabId = 'KR_' + slugify(item.category || item.metric || item.id);
                html += '<div class="list-row">';
                html += '<div class="list-title">' + linkOf('#' + tabId, item.metric || item.category || item.id, '') + '</div>';
                html += '<div class="list-meta">' + escapeHtml(item.category || '') + ' | ' + escapeHtml(item.commitmentType || 'standard') + '</div>';
                html += '<div class="list-description">' + escapeHtml(item.statement || '') + '</div>';
                html += '</div>';
            });
        }
        html += '</div>';
        document.getElementById('HomeTab').innerHTML = html;
    }

    function renderCategoryTabs() {
        const container = document.getElementById('CategoryTabsContainer');
        let html = '';
        (objective && objective.keyResults || []).forEach(item => {
            const tabId = 'KR_' + slugify(item.category || item.metric || item.id);
            const items = linkedInitiativesFor(item);
            html += '<div id="' + tabId + '" class="tabcontent">';
            html += '<div class="section"><div class="section-title">Key Result</div>' + renderMetric(item) + '</div>';
            html += '<div class="section"><div class="section-title">Initiatives</div>';
            if (!items.length) {
                html += '<div class="empty">No initiatives linked to this key result yet.</div>';
            } else {
                html += renderInitiativesKanban(items);
            }
            html += '</div></div>';
        });
        container.innerHTML = html;
    }

    function renderInitiativesTab() {
        const items = initiativesPayload.items || [];
        let html = '<div class="section"><div class="section-title">All Initiatives</div>';
        if (!items.length) {
            html += '<div class="empty">No initiatives defined for this domain.</div>';
        } else {
            html += renderInitiativesKanban(items);
        }
        html += '</div>';
        document.getElementById('InitiativesTab').innerHTML = html;
    }

    function renderTabs() {
        const parts = [
            '<button class="tablinks" id="tab_HomeTab" onclick="openTab(\'HomeTab\')">Overview</button>'
        ];
        (objective && objective.keyResults || []).forEach(item => {
            const tabId = 'KR_' + slugify(item.category || item.metric || item.id);
            const count = linkedInitiativesFor(item).length;
            parts.push('<button class="tablinks" id="tab_' + tabId + '" onclick="openTab(\'' + tabId + '\')">' + escapeHtml(item.metric || item.category || item.id) + ' (' + count + ')</button>');
        });
        parts.push('<button class="tablinks" id="tab_InitiativesTab" onclick="openTab(\'InitiativesTab\')">Initiatives (' + ((initiativesPayload.items || []).length) + ')</button>');
        document.getElementById('TabBar').innerHTML = parts.join('');
    }

    document.getElementById('Title').innerHTML = escapeHtml((objective && objective.title) || 'KTLO');
    document.getElementById('Meta').innerHTML = escapeHtml('Real Estate Marketplace') + ' | Keep the lights on objective and key result view';
    renderTabs();
    renderHomeTab();
    renderCategoryTabs();
    renderInitiativesTab();
</script>
</body>
</html>
