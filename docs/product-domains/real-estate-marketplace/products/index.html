    <script>
        function initTab() {
            let tabName = 'products';
            if (window.location.hash) {
                const hash = window.location.hash.substring(1);
                if (document.getElementById('tab_' + hash)) {
                    tabName = hash;
                }
            }
            openTab(tabName);
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            history.pushState({}, '', '#' + tabName);
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
        }
    </script>

    function updateTabCounts() {
        const productCount = ((products.portfolio || {}).products || []).length;
        const deploymentChannelCount = (deployment.channels || []).reduce((sum, group) => sum + ((group.channels || []).length), 0);
        document.getElementById('tab_products').textContent = 'Products (' + productCount + ')';

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderDeploymentChannelsSummary(deploymentChannels) {
        if (!deploymentChannels || !deploymentChannels.length) {
            return '<div style="font-size: 70%; color: grey; text-align: center;">No deployment channels defined</div>';
        }

        let html = '';
        html += '<div style="margin-top: 8px; border-top: 1px solid #e5e7eb; padding-top: 8px;">';
        html += '<div style="font-size: 70%; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; margin-bottom: 6px;">Deployment Channels</div>';
        deploymentChannels.forEach(channel => {
            html += '<div style="text-align: left; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px; margin-bottom: 6px; background: #f9fafb;">';
            html += '<div style="font-size: 75%; color: #1d4ed8; font-weight: bold;">' + escapeHtml(channel.channelName) + '</div>';
            html += '<div style="font-size: 68%; color: #374151; margin-top: 3px;"><b>Part:</b> ' + escapeHtml(channel.deploymentPart) + '</div>';
            html += '<div style="font-size: 68%; color: #374151;"><b>Environment:</b> ' + escapeHtml(channel.environmentName) + '</div>';
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function buildDeploymentChannelLookup() {
        const lookup = {};
        (deployment.channels || []).forEach(group => {
            (group.channels || []).forEach(channel => {
                const ref = (group.groupId || '') + '/' + (channel.subChannelId || '');
                lookup[ref] = {
                    groupId: group.groupId || '',
                    groupName: group.groupName || '',
                    channelId: channel.subChannelId || '',
                    channelName: channel.subChannelName || channel.subChannelId || '',
                    channelType: channel.channelType || ''
                };
            });
        });
        return lookup;
    }

    function collectProductDeliveryChannels(product, deploymentLookup) {
        const channels = {};
        (product.neededBricks || []).forEach(brick => {
            (brick.deploymentChannels || []).forEach(channel => {
                const ref = channel.deploymentChannelRef;
                if (!ref) {
                    return;
                }
                if (!channels[ref]) {
                    const resolved = deploymentLookup[ref] || {};
                    channels[ref] = {
                        ref: ref,
                        channelName: resolved.channelName || channel.channelName || channel.channelId || ref,
                        groupName: resolved.groupName || '',
                        channelType: resolved.channelType || '',
                        interfaces: new Set()
                    };
                }
                (channel.supportsInterfaces || []).forEach(iface => channels[ref].interfaces.add(iface));
            });
        });
        return Object.values(channels).sort((left, right) => left.channelName.localeCompare(right.channelName));
    }

    function showTextEnabled() {

        return !!(toggle && toggle.checked);
    }

    function chipIconClass() {
        return showTextEnabled() ? 'chip-icon' : 'chip-icon chip-icon-large';
    }

    function interfaceIconFile(iface) {
        const text = [
            iface && iface.type,
            iface && iface.name,
            iface && iface.description
        ].join(' ').toLowerCase();

        if (text.includes('partner_api')) {
            return 'partner_api.png';
        }
        if (text.includes('public_api') || text.includes('public api')) {
            return 'public_api.png';
        }
        if (text.includes('api')) {
            return 'api.png';
        }
        if (text.includes('mobile web')) {
            return 'mobile_web.png';
        }
        if (text.includes('mobile') || text.includes('app')) {
            return 'mobile_app.png';
        }
        if (text.includes('dashboard') || text.includes('cockpit')) {
            return 'dashboard.png';
        }
        if (text.includes('notification')) {
            return 'notification.png';
        }
        if (text.includes('search')) {
            return 'search_engine.png';
        }
        if (text.includes('social')) {
            return 'social_media.png';
        }
        return 'web.png';
    }

    function renderInterfaceIcon(iface) {
        const fileName = interfaceIconFile(iface);
        const label = escapeHtml((iface && (iface.name || iface.type)) || 'Interface');
        return '<img class="' + chipIconClass() + ' chip-icon-interface" src="icons/' + fileName + '" alt="' + label + '" title="' + label + '" onerror="this.onerror=null;this.src=\'icons/web.png\'">';
    }

    function renderInterfaceIconWithLabel(iface, labelText) {
        const fileName = interfaceIconFile(iface);
        const label = escapeHtml(labelText || (iface && (iface.name || iface.type)) || 'Interface');
        return '<img class="' + chipIconClass() + ' chip-icon-interface" src="icons/' + fileName + '" alt="' + label + '" title="' + label + '" onerror="this.onerror=null;this.src=\'icons/web.png\'">';
    }

    function deploymentIconFile(channel, group) {
        const text = [
            group && group.groupId,
            group && group.groupName,
            channel && channel.subChannelId,
            channel && channel.subChannelName,
            channel && channel.channelType
        ].join(' ').toLowerCase();

        if (text.includes('ios')) {
            return 'app_store_ios.png';
        }
        if (text.includes('android') || text.includes('play store') || text.includes('play-store')) {
            return 'app_store_android.png';
        }
        if (text.includes('private cloud') || text.includes('private-cloud')) {
            return 'private_cloud.png';
        }
        if (text.includes('cloud') || text.includes('runtime') || text.includes('edge') || text.includes('cdn')) {
            return 'public_cloud.png';
        }
        if (text.includes('saas') || text.includes('analytics') || text.includes('crm') || text.includes('datadog') || text.includes('snowflake') || text.includes('databricks') || text.includes('salesforce')) {
            return 'saas.png';
        }
        return 'deployment.png';
    }

        return '<img class="' + chipIconClass() + '" src="../customers/icons/' + escapeHtml((customer && customer.icon) || 'customer.png') + '" alt="' + label + '" title="' + label + '" onerror="this.onerror=null;this.src=\'../customers/icons/customer.png\'">';
    }

    function renderBrickChipIcon(brickId, brickName) {
        const safeId = escapeHtml(brickId || '');
        const safeName = escapeHtml(brickName || brickId || 'Product brick');
        const fallback = "if(!this.dataset.fallbackStage){this.dataset.fallbackStage='jpeg';this.src='../product-bricks/icons/" + safeId + ".jpeg';}else if(this.dataset.fallbackStage==='jpeg'){this.dataset.fallbackStage='jpg';this.src='../product-bricks/icons/" + safeId + ".jpg';}else{this.onerror=null;this.src='../product-bricks/icons/logo.png';}";
        return '<img class="' + chipIconClass() + ' chip-icon-brick" src="../product-bricks/icons/' + safeId + '.png" alt="' + safeName + '" title="' + safeName + '" onerror="' + fallback + '">';
    }

    function renderBrickChipIconWithLabel(brickId, brickName, labelText) {
        const safeId = escapeHtml(brickId || '');
        const safeName = escapeHtml(labelText || brickName || brickId || 'Product brick');
        const fallback = "if(!this.dataset.fallbackStage){this.dataset.fallbackStage='jpeg';this.src='../product-bricks/icons/" + safeId + ".jpeg';}else if(this.dataset.fallbackStage==='jpeg'){this.dataset.fallbackStage='jpg';this.src='../product-bricks/icons/" + safeId + ".jpg';}else{this.onerror=null;this.src='../product-bricks/icons/logo.png';}";
        return '<img class="' + chipIconClass() + ' chip-icon-brick" src="../product-bricks/icons/' + safeId + '.png" alt="' + safeName + '" title="' + safeName + '" onerror="' + fallback + '">';
    }

    function renderIconChip(iconHtml, title, copy, href) {
        const showText = showTextEnabled();
        const safeTitle = escapeHtml(title || '');
        const safeCopy = escapeHtml(copy || '');
        const bodyClass = showText ? 'brick-chip-body' : 'brick-chip-body hidden';
        let chip = '<div class="' + (showText ? 'brick-chip' : 'icon-only-chip') + '">';
        chip += iconHtml;
        chip += '<div class="' + bodyClass + '">';
        chip += '<div class="brick-chip-title">' + safeTitle + '</div>';
        if (safeCopy) {
            chip += '<div class="brick-chip-copy">' + safeCopy + '</div>';
        }
        chip += '</div>';
        chip += '</div>';
        if (href) {
            return '<a class="' + (showText ? '' : 'icon-only-chip-link') + '" target="_blank" href="' + href + '" title="' + safeTitle + '">' + chip + '</a>';
        }
        return chip;
    }

    function renderIconWithBadges(iconHtml, topBadgeClass, topBadge, bottomBadgeClass, bottomBadge) {
        if (showTextEnabled()) {
            return iconHtml;
        }
        let html = '<div class="icon-badge-wrap">' + iconHtml;
        if (typeof topBadge === 'number') {
            html += '<span class="icon-badge icon-badge-top ' + escapeHtml(topBadgeClass || '') + '">' + escapeHtml(String(topBadge)) + '</span>';
        }
        if (typeof bottomBadge === 'number') {
            html += '<span class="icon-badge icon-badge-bottom ' + escapeHtml(bottomBadgeClass || '') + '">' + escapeHtml(String(bottomBadge)) + '</span>';
        }
        html += '</div>';
        return html;
    }

    function renderMatrixHeaderIcon(channel) {
        const fileName = deploymentIconFile({
            subChannelId: channel && channel.channelId,
            subChannelName: channel && channel.channelName,
            channelType: channel && channel.channelType
        }, {
            groupId: channel && channel.groupId,
            groupName: channel && channel.groupName
        });
        const label = escapeHtml((channel && channel.channelName) || 'Delivery channel');
        return '<img class="chip-icon chip-icon-large" src="icons/deployment/' + fileName + '" alt="' + label + '" title="' + label + '" onerror="this.onerror=null;this.src=\'icons/deployment/deployment.png\'">';
    }

    function renderDependencyMarkerIcon(channel) {
        const fileName = deploymentIconFile({
            subChannelId: channel && channel.channelId,
            subChannelName: channel && channel.channelName,
            channelType: channel && channel.channelType
        }, {
            groupId: channel && channel.groupId,
            groupName: channel && channel.groupName
        });
        const label = escapeHtml((channel && channel.channelName) || 'Delivery channel');
        return '<img class="dependency-marker-icon" src="icons/deployment/' + fileName + '" alt="' + label + '" title="' + label + '" onerror="this.onerror=null;this.src=\'icons/deployment/deployment.png\'">';
    }

    function renderProductsTableCell(innerHtml) {
        return '<td class="products-table-product-cell">' + innerHtml + '</td>';
    }

    function renderProductsTableLabeledCell(label, count, innerHtml) {
        let fullLabel = label || '';
        if (typeof count === 'number' && label) {
            fullLabel += ' (' + count + ')';
        }
        return renderProductsTableCell('<div class="products-table-section-label">' + escapeHtml(fullLabel) + '</div>' + innerHtml);
    }

    function renderProductsTableEmpty(label) {
        return '<div class="products-table-empty">' + escapeHtml(label) + '</div>';
    }

    function renderProductsTableNameCell(product) {
        let html = '<a target="_blank" href="landing_pages/' + escapeHtml(product.id) + '.html">';
        html += '<div class="products-table-head">';
        html += '<img src="icons/' + escapeHtml(product.icon) + '" class="deployment-card-icon products-table-product-icon" onerror="this.onerror=null;this.src=\'icons/product.png\'">';
        html += '<div class="products-table-head-copy">';
        html += '<div class="products-table-name">' + escapeHtml(product.name) + '</div>';
        if ((product.primaryCustomers || []).length) {
            html += '<div class="products-table-meta">' + escapeHtml(product.primaryCustomers.map(customer => customer.name).join(' | ')) + '</div>';
        }
        html += '</div>';
        html += '</div>';
        html += '</a>';
        return html;
    }

    function renderProductsTableInterfacesCell(product) {
        if (!(product.interfaces || []).length) {
            return renderProductsTableEmpty('No interfaces defined');
        }
        let html = '<div class="products-table-cell-stack' + (showTextEnabled() ? '' : ' compact') + '">';
        (product.interfaces || []).forEach(iface => {
            const dependencyCount = countInterfaceDependencies(product, iface.type);
            const detailLabel = (iface.name || iface.type || 'Interface') + ' | ' + dependencyCount + ' channels';
            html += renderIconChip(
                renderIconWithBadges(
                    renderInterfaceIconWithLabel(iface, detailLabel),
                    'icon-badge-channel',
                    dependencyCount
                ),
                iface.name,
                iface.type + ' · ' + dependencyCount + ' channels' + (iface.users && iface.users.length ? ' · ' + iface.users.join(', ') : '')
            );
        });
        html += '</div>';
        return html;
    }

    function renderProductsTableCustomersCell(product) {
        if (!(product.primaryCustomers || []).length) {
            return renderProductsTableEmpty('No customers mapped');
        }
        let html = '<div class="products-table-cell-stack' + (showTextEnabled() ? '' : ' compact') + '">';
        (product.primaryCustomers || []).forEach(customer => {
            html += renderIconChip(
                renderCustomerChipIcon(customer),
                customer.name || customer.id,
                customer.id || '',
                '../customers/landing_pages/' + escapeHtml(customer.id || '') + '.html'
            );
        });
        html += '</div>';
        return html;
    }

    function renderProductsTableDeliveryChannelsCell(product, deliveryChannels) {
        if (!deliveryChannels.length) {
            return renderProductsTableEmpty('No delivery channels mapped');
        }
        let html = '<div class="products-table-cell-stack' + (showTextEnabled() ? '' : ' compact') + '">';
        deliveryChannels.forEach(channel => {
            const interfaceList = Array.from(channel.interfaces).sort().join(', ');
            const meta = [channel.groupName, channel.channelType].filter(Boolean).join(' · ');
            const interfaceCount = channel.interfaces.size;
            const brickCount = countChannelBricks(product, channel.ref);
            const detailLabel = (channel.channelName || 'Delivery channel') + ' | ' + interfaceCount + ' interfaces | ' + brickCount + ' bricks';
            html += renderIconChip(
                renderIconWithBadges(
                    renderDeploymentChipIconWithLabel(channel, detailLabel),
                    'icon-badge-interface',
                    interfaceCount,
                    'icon-badge-brick',
                    brickCount
                ),
                channel.channelName,
                (meta || channel.ref) + ' | ' + interfaceCount + ' interfaces | ' + brickCount + ' bricks' + (interfaceList ? ' | ' + interfaceList : '')
            );
        });
        html += '</div>';
        return html;
    }

    function renderProductsTableBricksCell(product) {
        if (!(product.neededBricks || []).length) {
            return renderProductsTableEmpty('No product bricks mapped');
        }
        let html = '<div class="products-table-cell-stack' + (showTextEnabled() ? '' : ' compact') + '">';
        (product.neededBricks || []).forEach(brick => {
            const channelCount = countBrickChannels(brick);
            const detailLabel = (brick.brickName || brick.brickId || 'Product brick') + ' | ' + channelCount + ' channels';
            html += renderIconChip(
                renderIconWithBadges(
                    renderBrickChipIconWithLabel(brick.brickId, brick.brickName, detailLabel),
                    'icon-badge-channel',
                    channelCount
                ),
                brick.brickName || brick.brickId,
                channelCount + ' channels' + (brick.whyNeeded ? ' · ' + brick.whyNeeded : ''),
                '../product-bricks/landing_pages/' + escapeHtml(brick.brickId) + '.html'
            );
        });
        html += '</div>';
        return html;
    }

    function collectProductDependencyModel(product, deploymentLookup) {
        const channels = {};
        const interfaces = {};
        const bricks = {};

        (product.interfaces || []).forEach(iface => {
            interfaces[iface.type] = {
                key: iface.type,
                name: iface.name || iface.type,
                type: iface.type
            };
        });

        (product.neededBricks || []).forEach(brick => {
            bricks[brick.brickId] = {
                key: brick.brickId,
                name: brick.brickName || brick.brickId,
                brickId: brick.brickId
            };
            (brick.deploymentChannels || []).forEach(channel => {
                const ref = channel.deploymentChannelRef;
                if (!ref) {
                    return;
                }
                if (!channels[ref]) {
                    const resolved = deploymentLookup[ref] || {};
                    channels[ref] = {
                        ref: ref,
                        groupId: resolved.groupId || '',
                        groupName: resolved.groupName || '',
                        channelId: resolved.channelId || channel.channelId || '',
                        channelName: resolved.channelName || channel.channelName || channel.channelId || ref,
                        channelType: resolved.channelType || ''
                    };
                }
            });
        });

        return {
            channels: Object.values(channels).sort((a, b) => a.channelName.localeCompare(b.channelName)),
            interfaces: Object.values(interfaces).sort((a, b) => a.name.localeCompare(b.name)),
            bricks: Object.values(bricks).sort((a, b) => a.name.localeCompare(b.name))
        };
    }

    function hasInterfaceChannelDependency(product, interfaceType, channelRef) {
        return (product.neededBricks || []).some(brick =>
            (brick.deploymentChannels || []).some(channel =>
                channel.deploymentChannelRef === channelRef && (channel.supportsInterfaces || []).includes(interfaceType)
            )
        );
    }

    function hasBrickChannelDependency(brick, channelRef) {
        return (brick.deploymentChannels || []).some(channel => channel.deploymentChannelRef === channelRef);
    }

    function countInterfaceDependencies(product, interfaceType) {
        const refs = new Set();
        (product.neededBricks || []).forEach(brick => {
            (brick.deploymentChannels || []).forEach(channel => {
                if (channel.deploymentChannelRef && (channel.supportsInterfaces || []).includes(interfaceType)) {
                    refs.add(channel.deploymentChannelRef);
                }
            });
        });
        return refs.size;
    }

    function countChannelBricks(product, channelRef) {
        const brickIds = new Set();
        (product.neededBricks || []).forEach(brick => {
            if ((brick.deploymentChannels || []).some(channel => channel.deploymentChannelRef === channelRef)) {
                brickIds.add(brick.brickId || brick.brickName || '');
            }
        });
        return brickIds.size;
    }

    function countBrickChannels(brick) {
        const refs = new Set();
        (brick.deploymentChannels || []).forEach(channel => {
            if (channel.deploymentChannelRef) {
                refs.add(channel.deploymentChannelRef);
            }
        });
        return refs.size;
    }

    function renderDependencyMatrix() {
        const container = document.getElementById('dependencies');
        const deploymentLookup = buildDeploymentChannelLookup();
        let html = '<div class="dependency-panel">';

        ((products.portfolio || {}).products || []).forEach(product => {
            const model = collectProductDependencyModel(product, deploymentLookup);
            html += '<section class="dependency-product">';
            html += '<div class="dependency-product-header">';
            html += '<img src="icons/' + escapeHtml(product.icon) + '" class="deployment-card-icon" onerror="this.onerror=null;this.src=\'icons/product.png\'">';
            html += '<div><div class="deployment-card-title">' + escapeHtml(product.name) + '</div>';
            html += '<div class="deployment-card-meta">' + escapeHtml((product.primaryCustomers || []).map(customer => customer.name).join(' | ')) + '</div></div>';
            html += '</div>';
            html += '<div class="dependency-product-copy">Interface-to-channel dependencies are inferred from `supportsInterfaces`; brick-to-channel dependencies are inferred from brick deployment mappings.</div>';
            if (!model.channels.length) {
                html += '<div class="dependency-product-copy">No deployment channels mapped for this product.</div>';
                html += '</section>';
                return;
            }

            html += '<div class="dependency-table-wrap">';
            html += '<table class="dependency-table">';
            html += '<thead><tr><th class="dependency-row-label"></th>';
            model.channels.forEach(channel => {
                html += '<th title="' + escapeHtml(channel.channelName) + '">' + renderMatrixHeaderIcon(channel) + '</th>';
            });
            html += '</tr></thead><tbody>';

            html += '<tr class="dependency-section-row"><td colspan="' + (model.channels.length + 1) + '">Interfaces</td></tr>';
            model.interfaces.forEach(iface => {
                html += '<tr>';
                html += '<td class="dependency-row-label">';
                html += '<div class="dependency-row-cell">';
                html += renderInterfaceIcon(iface);
                html += '<div class="dependency-row-text"><div class="dependency-row-title">' + escapeHtml(iface.name) + '</div></div>';
                html += '</div>';
                html += '</td>';
                model.channels.forEach(channel => {
                    html += '<td>' + (hasInterfaceChannelDependency(product, iface.type, channel.ref) ? renderDependencyMarkerIcon(channel) : '<span class="dependency-empty"> </span>') + '</td>';
                });
                html += '</tr>';
            });

            html += '<tr class="dependency-section-row"><td colspan="' + (model.channels.length + 1) + '">Product Bricks</td></tr>';
            model.bricks.forEach(brickMeta => {
                const brick = (product.neededBricks || []).find(item => item.brickId === brickMeta.brickId) || brickMeta;
                html += '<tr>';
                html += '<td class="dependency-row-label">';
                html += '<div class="dependency-row-cell">';
                html += renderBrickChipIcon(brickMeta.brickId, brickMeta.name);
                html += '<div class="dependency-row-text"><div class="dependency-row-title">' + escapeHtml(brickMeta.name) + '</div></div>';
                html += '</div>';
                html += '</td>';
                model.channels.forEach(channel => {
                    html += '<td>' + (hasBrickChannelDependency(brick, channel.ref) ? renderDependencyMarkerIcon(channel) : '<span class="dependency-empty"> </span>') + '</td>';
                });
                html += '</tr>';
            });

            html += '</tbody></table></div></section>';
        });

        html += '</div>';
        container.innerHTML = html;
    }

    function renderDeploymentChannels() {
        const container = document.getElementById('deployment');
        const groups = deployment.channels || [];
        const channels = groups.flatMap(group => group.channels || []);
        const deployedBrickCount = channels.reduce((sum, channel) => sum + ((channel.deployedBricks || []).length), 0);
        const productChannelMap = {};

        ((products.portfolio || {}).products || []).forEach(product => {
            (product.neededBricks || []).forEach(brick => {
                (brick.deploymentChannels || []).forEach(channel => {
                    const ref = channel.deploymentChannelRef;
                    if (!ref) {
                        return;
                    }
                    if (!productChannelMap[ref]) {
                        productChannelMap[ref] = {};
                    }
                    if (!productChannelMap[ref][product.id]) {
                        productChannelMap[ref][product.id] = {
                            id: product.id,
                            name: product.name,
                            interfaces: new Set(),
                            capabilities: new Set()
                        };
                    }
                    (channel.supportsInterfaces || []).forEach(item => productChannelMap[ref][product.id].interfaces.add(item));
                    if (brick.brickName) {
                        productChannelMap[ref][product.id].capabilities.add(brick.brickName);
                    }
                });
            });
        });

        const deployedProductCount = Object.values(productChannelMap).reduce((sum, byProduct) => sum + Object.keys(byProduct).length, 0);

        let html = '<div class="deployment-panel">';
        html += '<div class="deployment-summary">';
        html += '<div class="deployment-stat"><div class="deployment-stat-value">' + groups.length + '</div><div class="deployment-stat-label">Channel Groups</div></div>';
        html += '<div class="deployment-stat"><div class="deployment-stat-value">' + channels.length + '</div><div class="deployment-stat-label">Channels</div></div>';
        html += '<div class="deployment-stat"><div class="deployment-stat-value">' + deployedProductCount + '</div><div class="deployment-stat-label">Product Channel Uses</div></div>';
        html += '<div class="deployment-stat"><div class="deployment-stat-value">' + deployedBrickCount + '</div><div class="deployment-stat-label">Brick Deployments</div></div>';
        html += '</div>';

        if (deployment.metadata && deployment.metadata.description) {
            html += '<div class="deployment-group-copy" style="margin-bottom:18px;">' + escapeHtml(deployment.metadata.description) + '</div>';
        }

        groups.forEach(group => {
            html += '<section class="deployment-group">';
            html += '<div class="deployment-group-title">' + escapeHtml(group.groupName || group.groupId) + '</div>';
            if (group.description) {
                html += '<div class="deployment-group-copy">' + escapeHtml(group.description) + '</div>';
            }
            html += '<div class="deployment-grid">';

            (group.channels || []).forEach(channel => {
                html += '<article class="deployment-card">';
                html += '<div class="deployment-card-header">';
                html += renderDeploymentIcon(channel, group);
                html += '<div><div class="deployment-card-title">' + escapeHtml(channel.subChannelName || channel.subChannelId) + '</div>';
                html += '<div class="deployment-card-meta">' + escapeHtml(channel.channelType || 'channel') + '</div>';
                html += '</div></div>';
                if (channel.description) {
                    html += '<div class="deployment-card-copy">' + escapeHtml(channel.description) + '</div>';
                }

                html += '<div class="deployment-subtitle">Environment</div>';
                if ((channel.environments || []).length) {
                    channel.environments.forEach(environment => {
                        html += '<div class="deployment-environment">';
                        html += '<div class="deployment-environment-name">' + escapeHtml(environment.environmentName || environment.environmentId) + '</div>';
                        if (environment.description) {
                            html += '<div class="deployment-environment-copy">' + escapeHtml(environment.description) + '</div>';
                        }
                        if ((environment.links || []).length) {
                            html += '<div class="deployment-link-row">';
                            environment.links.forEach(link => {
                                html += '<a class="deployment-link" target="_blank" rel="noopener noreferrer" href="' + escapeHtml(link.url) + '">' + escapeHtml(link.linkName || link.url) + '</a>';
                            });
                            html += '</div>';
                        }
                        html += '</div>';
                    });
                } else {
                    html += '<div class="deployment-muted">No environment listed.</div>';
                }

                const channelRef = (group.groupId || '') + '/' + (channel.subChannelId || '');
                const relatedProducts = Object.values(productChannelMap[channelRef] || {});

                html += '<div class="deployment-subtitle">Products Using This Channel</div>';
                if (relatedProducts.length) {
                    html += '<div class="entity-chip-row">';
                    relatedProducts.forEach(product => {
                        const interfaceList = Array.from(product.interfaces).sort().join(', ');
                        const capabilityCount = product.capabilities.size;
                        html += '<a target="_blank" href="landing_pages/' + escapeHtml(product.id) + '.html">';
                        html += '<div class="product-chip">';
                        html += '<div class="product-chip-title">' + escapeHtml(product.name || product.id) + '</div>';
                        html += '<div class="product-chip-copy">' + escapeHtml(capabilityCount + ' bricks') + (interfaceList ? ' | ' + escapeHtml(interfaceList) : '') + '</div>';
                        html += '</div>';
                        html += '</a>';
                    });
                    html += '</div>';
                } else {
                    html += '<div class="deployment-muted">No products currently reference this channel.</div>';
                }

                html += '<div class="deployment-subtitle">Deployed Bricks</div>';
                if ((channel.deployedBricks || []).length) {
                    html += '<div class="brick-chip-row">';
                    channel.deployedBricks.forEach(brick => {
                        html += renderBrickLandingLink(brick.brickId, brick.brickName || brick.deploymentRole);
                    });
                    html += '</div>';
                } else {
                    html += '<div class="deployment-muted">No bricks mapped to this channel.</div>';
                }

                html += '</article>';
            });

            html += '</div>';
            html += '</section>';
        });

        html += '</div>';
        container.innerHTML = html;
    }

    function update() {
        const deploymentLookup = buildDeploymentChannelLookup();
        const portfolioProducts = ((products.portfolio || {}).products || []);
        let html = '<div class="products-table-wrap"><table class="products-table"><tbody>';

        html += '<tr>';
        portfolioProducts.forEach(product => {
            html += renderProductsTableLabeledCell('', null, renderProductsTableNameCell(product));
        });
        html += '</tr>';

        html += '<tr>';
        portfolioProducts.forEach(product => {
            html += renderProductsTableLabeledCell('Customers', (product.primaryCustomers || []).length, renderProductsTableCustomersCell(product));
        });
        html += '</tr>';

        html += '<tr>';
        portfolioProducts.forEach(product => {
            html += renderProductsTableLabeledCell('Interfaces', (product.interfaces || []).length, renderProductsTableInterfacesCell(product));
        });
        html += '</tr>';

        html += '<tr>';
        portfolioProducts.forEach(product => {
            const deliveryChannels = collectProductDeliveryChannels(product, deploymentLookup);
            html += renderProductsTableLabeledCell('Delivery Channels', deliveryChannels.length, renderProductsTableDeliveryChannelsCell(product, deliveryChannels));
        });
        html += '</tr>';

        html += '<tr>';
        portfolioProducts.forEach(product => {
            html += renderProductsTableLabeledCell('Bricks', (product.neededBricks || []).length, renderProductsTableBricksCell(product));
        });
        html += '</tr>';

        html += '</tbody></table></div>';

        document.getElementById('products_content').innerHTML = html;
    }

    updateTabCounts();
    update();
    renderDeploymentChannels();
    renderDependencyMatrix();
</script>
</body>
</html>
