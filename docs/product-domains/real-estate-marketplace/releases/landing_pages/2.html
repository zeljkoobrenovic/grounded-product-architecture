<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Real Estate Marketplace)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"date": "2026-03-09", "description": "Release of Home Discovery Platform improvements covering homepage, unified b2c web shell across B2C Web Application, iOS Application.", "customerImpact": [{"customerId": "CG1-P1", "customer": {"id": "CG1-P1", "name": "Committed Home Buyer / Tenant Seeker", "group": "Demand-Side Consumers", "icon": "seeker.png"}, "customerKPIs": [{"kpi": "New match precision", "expectedImpact": "Improve new match precision through stronger homepage support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Decision confidence", "expectedImpact": "Improve decision confidence through stronger unified b2c web shell support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Qualified demand GMV influence", "expectedImpact": "Improve qualified demand gmv influence through stronger homepage support and cleaner workflow execution.", "description": "Economic value of property transactions and leases materially influenced by the platform's demand generation and conversion surfaces.", "unit": "USD influenced GMV", "kind": "business"}, {"kpi": "Usage and liquidity", "expectedImpact": "Improve usage and liquidity through stronger unified b2c web shell support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "home", "change": "Released Homepage with domain-specific workflow improvements.", "brick": {"id": "home", "name": "Homepage", "domain": "Seeker / Buyer / Tenant", "group": "seeker", "icon": "home.png"}}, {"brickId": "ubws", "change": "Released Unified B2C Web Shell with domain-specific workflow improvements.", "brick": {"id": "ubws", "name": "Unified B2C Web Shell", "domain": "Seeker / Buyer / Tenant", "group": "seeker", "icon": "ubws.png"}}, {"brickId": "serp", "change": "Released Search Engine Results Page (SERP) with domain-specific workflow improvements.", "brick": {"id": "serp", "name": "Search Engine Results Page (SERP)", "domain": "Seeker / Buyer / Tenant", "group": "search", "icon": "serp.png"}}, {"brickId": "ssal", "change": "Released Saved Search / Alerts with domain-specific workflow improvements.", "brick": {"id": "ssal", "name": "Saved Search / Alerts", "domain": "Seeker / Buyer / Tenant", "group": "search", "icon": "ssal.png"}}], "deliveryChannels": [{"channelId": "P1-b2c-web-application", "change": "Deployed workflow updates in B2C Web Application.", "channel": {"productId": "P1", "productName": "Home Discovery Platform", "name": "B2C Web Application", "type": "web", "icon": "web.png"}}, {"channelId": "P1-ios", "change": "Deployed workflow updates in iOS Application.", "channel": {"productId": "P1", "productName": "Home Discovery Platform", "name": "iOS Application", "type": "mobile_app", "icon": "mobile_app.png"}}, {"channelId": "P1-android", "change": "Deployed workflow updates in Android Application.", "channel": {"productId": "P1", "productName": "Home Discovery Platform", "name": "Android Application", "type": "mobile_app", "icon": "mobile_app.png"}}]};
    const domainName = 'Real Estate Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
