            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;

        .impact-id {

            margin-bottom: 8px;

        .entity-link {

            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;

        .impact-line {

            line-height: 1.45;

        .pill {

            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>

ce": "Service API", "description": "Classifieds Portfolio Management exchanges operational state and business records with external back-office systems."}, {"system": "Notification and Communication Platforms", "type": "communication", "interface": "Messaging API", "description": "Classifieds Portfolio Management uses external communication channels to notify users, operators, or partners."}], "externalSystemsDependingOnThisBrick": [{"system": "Business Workflows", "type": "service-consumer", "interface": "Service API", "description": "Upstream business workflows depend on Classifieds Performance Management for core domain capabilities and state transitions."}, {"system": "Operations and Support Teams", "type": "operations-consumer", "interface": "Operations Workspace / Events", "description": "Operations consumers depend on Classifieds Performance Management for administration, visibility, and exception resolution."}], "icon": "cpma.png"}}, {"brickId": "cvma", "change": "Released Classifieds Visibility Management with domain-specific workflow improvements.", "brick": {"id": "cvma", "name": "Classifieds Visibility Management", "type": "service", "description": "Controlling how and where listings appear", "domain": "Intermediary", "group": "classifieds lifecycle management", "internalModules": [{"title": "Core Domain Engine", "description": "Implements the main business logic and lifecycle handled by Classifieds Visibility Management.", "type": "service"}, {"title": "Rules and Administration", "description": "Provides the configuration, rules, and administrative controls required by Classifieds Visibility Management.", "type": "operations"}, {"title": "Reporting and Exception Handling", "description": "Supports visibility, diagnostics, and manual handling of exceptions in Classifieds Visibility Management.", "type": "analytics"}], "interfaces": [{"title": "Service API", "description": "API surface for interacting with the business capabilities implemented by Classifieds Visibility Management.", "type": "api"}, {"title": "Operations Workspace", "description": "User interface for administration and operational control of Classifieds Visibility Management.", "type": "ui"}, {"title": "Domain Event Feed", "description": "Event interface that publishes notable business changes from Classifieds Visibility Management.", "type": "event"}], "brickDependencies": [{"targetBrickId": "ccma", "type": "identity", "interface": "Authentication API", "description": "Depends on Cookie Consent Management to provide identity capabilities required by Classifieds Visibility Management."}, {"targetBrickId": "opad", "type": "event-routing", "interface": "Outbound Event Feed", "description": "Depends on Off-Platform Advertising to provide integration capabilities required by Classifieds Visibility Management."}, {"targetBrickId": "loin", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Location Insights to provide analytics capabilities required by Classifieds Visibility Management."}], "externalSystemsThisBrickDependsOn": [{"system": "Back-Office Systems", "type": "back-office", "interface": "Service API", "description": "Classifieds Visibility Management exchanges operational state and business records with external back-office systems."}, {"system": "Notification and Communication Platforms", "type": "communication", "interface": "Messaging API", "description": "Classifieds Visibility Management uses external communication channels to notify users, operators, or partners."}], "externalSystemsDependingOnThisBrick": [{"system": "Business Workflows", "type": "service-consumer", "interface": "Service API", "description": "Upstream business workflows depend on Classifieds Visibility Management for core domain capabilities and state transitions."}, {"system": "Operations and Support Teams", "type": "operations-consumer", "interface": "Operations Workspace / Events", "description": "Operations consumers depend on Classifieds Visibility Management for administration, visibility, and exception resolution."}], "icon": "cvma.png"}}], "deliveryChannels": [{"channelId": "P3-pro-portal", "change": "Deployed workflow updates in Pro Portal.", "channel": {"productId": "P3", "productName": "Pro Agency Platform", "name": "Pro Portal", "type": "web", "icon": "web.png"}}, {"channelId": "P3-api", "change": "Deployed workflow updates in Listing Ingestion API.", "channel": {"productId": "P3", "productName": "Pro Agency Platform", "name": "CRM Integration API", "type": "api", "icon": "api.png"}}, {"channelId": "P3-api", "change": "Deployed workflow updates in CRM Integration API.", "channel": {"productId": "P3", "productName": "Pro Agency Platform", "name": "CRM Integration API", "type": "api", "icon": "api.png"}}], "teams": {"primaryTeamIds": ["pro-agency-platform-classifieds-performance", "pro-agency-platform-classifieds-visibility", "pro-agency-platform-online-classifieds-acquisition"], "supportingTeamIds": ["transactions-and-communications-market-knowledge", "platform-core-services-frontend"]}, "landingPageIndex": 12};
    const domainName = 'Real Estate Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
