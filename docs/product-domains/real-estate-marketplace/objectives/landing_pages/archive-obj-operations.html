    function initTab() {
        let tabName = 'HomeTab';
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (document.getElementById('tab_' + hash)) {
                tabName = hash;
            }
        }
        openTab(tabName);
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function statusColor(status) {
        const map = {'on-track': '#16a34a', 'at-risk': '#d97706', 'off-track': '#dc2626', 'achieved': '#0284c7', 'planned': '#6b7280'};
        return map[status] || '#6b7280';
    }

    function statusBadge(status) {
        if (!status) return '';
        return '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + statusColor(status) + ';margin-left:8px">' + escapeHtml(status) + '</span>';
    }

    function priorityBadge(priority) {
        if (!priority) return '';
        const colors = {'p0': '#dc2626', 'p1': '#d97706', 'p2': '#6b7280', 'p3': '#9ca3af'};

        return '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + color + ';margin-left:6px">' + escapeHtml(priority) + '</span>';
    }

    function renderMetric(metric) {

        html += '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderTeams(title, items, compact) {

        html += '</div>';
        return html;

            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function renderDeliveryCard(item, typeName, typeClass) {
        let html = '<div class="card">';
        html += '<div class="card-header"><span class="card-type ' + typeClass + '">' + escapeHtml(typeName) + '</span>' + priorityBadge(item.priority) + '<span class="card-date" style="margin-left:auto">' + formatDate(item.date) + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title || item.description || typeName) + '</div>';
        if (item.description) {
            html += '<div class="card-description">' + escapeHtml(item.description) + '</div>';
        }

        if (item.customerImpact && item.customerImpact.length) {
            html += '<div class="subsection"><div class="subsection-title">Customer Impact</div>';
            item.customerImpact.forEach(impact => {
                html += '<div class="impact-block">';
                html += '<div class="impact-header">';
                html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml((impact.customer || {}).icon || 'customer.png') + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
                html += '<div class="impact-id">' + escapeHtml((impact.customer || {}).name || impact.customerId || '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId || '') + ')</span></div>';
                html += '</div>';
                html += renderImpactLines(impact.customerKPIs || []);
                html += renderImpactLines(impact.businessKPIs || []);
                html += '</div>';
            });
            html += '</div>';
        }

        if (item.productBricks && item.productBricks.length) {
            html += '<div class="subsection"><div class="subsection-title">Product Bricks</div>';
            item.productBricks.forEach(brick => {
                const brickInfo = brick.brick || {};
                html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brickInfo.icon || 'logo.png') + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + escapeHtml(brickInfo.name || brick.brickId || '') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId || '') + ')</span></div><div>' + escapeHtml(brick.change || '') + '</div></div></div>';
            });
            html += '</div>';
        }

        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="subsection"><div class="subsection-title">Delivery Channels</div>';
            item.deliveryChannels.forEach(channel => {
                const channelInfo = channel.channel || {};
                html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channelInfo.icon || 'product.png') + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + escapeHtml(channelInfo.name || channel.channelId || '') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId || '') + ')</span></div><div>' + escapeHtml(channel.change || '') + '</div></div></div>';
            });
            html += '</div>';
        }

        if (item.discoveryLinks && item.discoveryLinks.length) {
            html += '<div class="subsection"><div class="subsection-title">Linked Discoveries</div>';
            item.discoveryLinks.forEach(discovery => {
                const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                    ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                    : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId || '', 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
            });
            html += '</div>';
        }

        html += '</div>';
        return html;
    }

    function renderEmptyState(message) {
        return '<div class="empty">' + escapeHtml(message) + '</div>';
    }

    // ─── Build tabs based on page kind ───

    const isCompany = pageKind === 'company-objective';
    const initiatives = pageData.enrichedInitiatives || [];
    const discoveries = pageData.inspiredByInsights || [];

    // Build initiative lookup by key result ID
    const initByKR = {};
    initiatives.forEach(item => {
        const krId = item.keyResultId || '';
        if (!krId) return;
        if (!initByKR[krId]) initByKR[krId] = [];
        initByKR[krId].push(item);
    });
    const keyResults = pageData.keyResults || [];

    // Create per-KR tab divs dynamically
    if (!isCompany && keyResults.length) {
        let krDivsHtml = '';
        keyResults.forEach((kr, i) => {
            krDivsHtml += '<div id="KR' + (i + 1) + 'Tab" class="tabcontent"></div>';
        });
        document.getElementById('KRTabsContainer').innerHTML = krDivsHtml;
    }

    // Build tab bar dynamically
    const tabs = [
        {id: 'HomeTab', label: 'Home'},
    ];
    if (!isCompany) {
        keyResults.forEach((kr, i) => {
            const krFullId = (pageData.id || '') + '/' + (kr.id || '');
            const count = (initByKR[krFullId] || []).length;
            tabs.push({id: 'KR' + (i + 1) + 'Tab', label: 'KR' + (i + 1) + (count ? ' (' + count + ')' : '')});
        });
    }
    if (discoveries.length) {
        tabs.push({id: 'DiscoveriesTab', label: 'Discoveries (' + discoveries.length + ')'});
    }

    let tabBarHtml = '';
    tabs.forEach(tab => {
        tabBarHtml += '<button class="tablinks" id="tab_' + tab.id + '" onclick="openTab(\'' + tab.id + '\')">' + tab.label + '</button>';
    });
    document.getElementById('TabBar').innerHTML = tabBarHtml;

    // ─── Header ───

    document.getElementById('Title').innerHTML = escapeHtml(pageData.title || 'Objective');
    const metaBits = [];
    if (pageData.status) metaBits.push(escapeHtml(pageData.status));
    if (pageData.period && pageData.period.quarter) metaBits.push(escapeHtml(pageData.period.quarter));
    document.getElementById('Meta').innerHTML = metaBits.join(' | ');

    // ─── Home Tab ───

    function mermaidId(text) {
        return (text || 'node').replace(/[^a-zA-Z0-9]/g, '_').substring(0, 40);
    }

    function mermaidLabel(text, maxLen) {
        let label = (text || '').replace(/"/g, "'");
        if (label.length > (maxLen || 40)) label = label.substring(0, maxLen || 40) + '...';
        return label;
    }

    function renderDependencyDiagram(page) {
        const lines = ['graph LR'];
        const objId = mermaidId(page.id || 'obj');
        const objLabel = mermaidLabel('THIS OBJECTIVE', 50);
        lines.push('    ' + objId + '["' + objLabel + '"]');

        // Company objectives at the top
        (page.companyObjectiveRefs || []).forEach((co, i) => {
            const coId = 'co_' + mermaidId(co.id || String(i));
            const coLabel = mermaidLabel(co.title || co.id, 45);
            lines.push('    ' + coId + '(["' + coLabel + '"])');
            lines.push('    ' + coId + ' --> ' + objId);
        });

        // Key results from objective
        (page.keyResults || []).forEach((kr, i) => {
            const krId = 'kr_' + mermaidId(kr.id || String(i));
            const status = kr.status ? 'add [' + kr.status + ']' : '';
            const krLabel = mermaidLabel((kr.metric || kr.id || 'KR ' + (i + 1)) + status, 50);
            lines.push('    ' + krId + '["' + krLabel + '"]');
            lines.push('    ' + objId + ' --> ' + krId);

            // Initiatives under this KR
            const fullKrId = (page.id || '') + '/' + (kr.id || '');
            (initByKR[fullKrId] || []).forEach((init, j) => {
                const initId = krId + '_init_' + j;
                const initLabel = mermaidLabel(init.title || init.description || 'Initiative', 40);
                lines.push('    ' + initId + '(["' + initLabel + '"])');
                lines.push('    ' + krId + ' --> ' + initId);
            });
        });

        // Initiatives not linked to any KR
        const unlinkedInits = initiatives.filter(item => {
            const krId = item.keyResultId || '';
            return !krId || !(initByKR[krId] || []).length;
        });
        // Actually check: initiatives whose keyResultId doesn't start with page.id
        const linkedKrIds = new Set();
        (page.keyResults || []).forEach(kr => {
            linkedKrIds.add((page.id || '') + '/' + (kr.id || ''));
        });
        const orphanInits = initiatives.filter(item => !linkedKrIds.has(item.keyResultId || ''));
        if (orphanInits.length) {
            orphanInits.forEach((init, j) => {
                const initId = 'orphan_init_' + j;
                const initLabel = mermaidLabel(init.title || init.description || 'Initiative', 40);
                lines.push('    ' + initId + '(["' + initLabel + '"])');
                lines.push('    ' + objId + ' -.- ' + initId);
            });
        }

        // Styling
        lines.push('    classDef company fill:#e0e7ff,stroke:#6366f1,color:#312e81');
        lines.push('    classDef objective fill:#dbeafe,stroke:#3b82f6,color:#1e3a5f');
        lines.push('    classDef keyresult fill:#d1fae5,stroke:#10b981,color:#064e3b');
        lines.push('    classDef initiative fill:#fef3c7,stroke:#f59e0b,color:#78350f');
        (page.companyObjectiveRefs || []).forEach((co, i) => {
            lines.push('    class co_' + mermaidId(co.id || String(i)) + ' company');
        });
        lines.push('    class ' + objId + ' objective');
        (page.keyResults || []).forEach((kr, i) => {
            const krNodeId = 'kr_' + mermaidId(kr.id || String(i));
            lines.push('    class ' + krNodeId + ' keyresult');
            const fullKrId = (page.id || '') + '/' + (kr.id || '');
            (initByKR[fullKrId] || []).forEach((init, j) => {
                lines.push('    class ' + krNodeId + '_init_' + j + ' initiative');
            });
        });
        orphanInits.forEach((init, j) => {
            lines.push('    class orphan_init_' + j + ' initiative');
        });

        const mermaidCode = lines.join('\n');
        let html = '<div class="section"><div class="section-title">Dependency Map</div>';
        html += '<div class="mermaid">' + mermaidCode + '</div>';
        html += '<div style="margin-top:8px;font-size:11px;color:#6b7280">';
        html += '<span style="display:inline-block;width:12px;height:12px;background:#e0e7ff;border:1px solid #6366f1;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Company Objective ';
        html += '<span style="display:inline-block;width:12px;height:12px;background:#dbeafe;border:1px solid #3b82f6;border-radius:2px;margin:0 4px 0 12px;vertical-align:middle"></span>Objective ';
        html += '<span style="display:inline-block;width:12px;height:12px;background:#d1fae5;border:1px solid #10b981;border-radius:2px;margin:0 4px 0 12px;vertical-align:middle"></span>Key Result ';
        html += '<span style="display:inline-block;width:12px;height:12px;background:#fef3c7;border:1px solid #f59e0b;border-radius:2px;margin:0 4px 0 12px;vertical-align:middle"></span>Initiative';
        html += '</div></div>';
        return html;
    }

    function renderSourceObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.objective || '') + '</div></div>';

        if (page.companyObjectiveRefs && page.companyObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Mapped Company Objectives</div>';
            page.companyObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(item.id) + '</div></div></div>';
            });
            html += '</div>';
        }

        // Minimal key results listing
        if ((page.keyResults || []).length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            (page.keyResults || []).forEach((kr, i) => {
                const tabId = 'KR' + (i + 1) + 'Tab';
                html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;border-radius:6px;background:#f3f4f6;cursor:pointer" onclick="openTab(\'' + tabId + '\')">';
                html += '<span style="font-weight:bold;color:#315b7c;min-width:32px">KR' + (i + 1) + '</span>';
                html += '<span style="flex:1">' + escapeHtml(kr.metric || '') + '</span>';
                html += statusBadge(kr.status);
                html += '</div>';
            });
            html += '</div>';
        }

        // Dependency diagram
        html += renderDependencyDiagram(page);

        return html;
    }

    function renderCompanyObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.statement || '') + '</div></div>';

        if (page.okrDesignNotes) {
            html += '<div class="section"><div class="section-title">Design Notes</div><div class="list-row"><div class="list-description">' + escapeHtml(page.okrDesignNotes) + '</div></div></div>';
        }

        if (page.sourceObjectiveRefs && page.sourceObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Source Objectives</div>';
            page.sourceObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' +
                    escapeHtml(String(item.keyResultsCount || 0) + ' key results') +
                    (item.quarter ? ' | ' + escapeHtml(item.quarter) : '') +
                    '</div></div></div>';
            });
            html += '</div>';
        }

        // Company objective dependency diagram
        html += renderCompanyDependencyDiagram(page);

        return html;
    }

    function renderCompanyDependencyDiagram(page) {
        const lines = ['graph TD'];
        const coId = mermaidId(page.id || 'company_obj');
        lines.push('    ' + coId + '(["' + mermaidLabel(page.title || 'Company Objective', 50) + '"])');

        (page.sourceObjectiveRefs || []).forEach((so, i) => {
            const soId = 'so_' + mermaidId(so.id || String(i));
            lines.push('    ' + soId + '["' + mermaidLabel(so.title || so.id, 45) + '"]');
            lines.push('    ' + coId + ' --> ' + soId);
        });

        // Show enriched initiatives under company objective
        (page.enrichedInitiatives || []).forEach((init, j) => {
            const initId = 'init_' + j;
            lines.push('    ' + initId + '(["' + mermaidLabel(init.title || init.description || 'Initiative', 40) + '"])');
            // Try to link to a source objective
            let linked = false;
            (page.sourceObjectiveRefs || []).forEach((so, i) => {
                const krPrefix = (so.id || '') + '/';
                if ((init.keyResultId || '').startsWith(krPrefix)) {
                    lines.push('    so_' + mermaidId(so.id || String(i)) + ' --> ' + initId);
                    linked = true;
                }
            });
            if (!linked) {
                lines.push('    ' + coId + ' -.- ' + initId);
            }
        });

        // Styling
        lines.push('    classDef company fill:#e0e7ff,stroke:#6366f1,color:#312e81');
        lines.push('    classDef objective fill:#dbeafe,stroke:#3b82f6,color:#1e3a5f');
        lines.push('    classDef initiative fill:#fef3c7,stroke:#f59e0b,color:#78350f');
        lines.push('    class ' + coId + ' company');
        (page.sourceObjectiveRefs || []).forEach((so, i) => {
            lines.push('    class so_' + mermaidId(so.id || String(i)) + ' objective');
        });
        (page.enrichedInitiatives || []).forEach((init, j) => {
            lines.push('    class init_' + j + ' initiative');
        });

        const mermaidCode = lines.join('\n');
        let html = '<div class="section"><div class="section-title">Dependency Map</div>';
        html += '<div class="mermaid">' + mermaidCode + '</div>';
        html += '<div style="margin-top:8px;font-size:11px;color:#6b7280">';
        html += '<span style="display:inline-block;width:12px;height:12px;background:#e0e7ff;border:1px solid #6366f1;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Company Objective ';
        html += '<span style="display:inline-block;width:12px;height:12px;background:#dbeafe;border:1px solid #3b82f6;border-radius:2px;margin:0 4px 0 12px;vertical-align:middle"></span>Source Objective ';
        html += '<span style="display:inline-block;width:12px;height:12px;background:#fef3c7;border:1px solid #f59e0b;border-radius:2px;margin:0 4px 0 12px;vertical-align:middle"></span>Initiative';
        html += '</div></div>';
        return html;
    }

    document.getElementById('HomeTab').innerHTML = isCompany
        ? renderCompanyObjectiveHome(pageData)
        : renderSourceObjectiveHome(pageData);

    // ─── Per-KR Tabs ───

    if (!isCompany && keyResults.length) {
        keyResults.forEach((item, i) => {
            document.getElementById('KR' + (i + 1) + 'Tab').innerHTML = renderKeyResult(item);
        });
    }

    // ─── Discoveries Tab ───

    if (discoveries.length) {
        let discHtml = '';
        discoveries.forEach(item => {
            const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '';
            discHtml += '<div class="list-row">';
            discHtml += '<div class="list-title">' + linkOf(target, item.insightTitle || item.title || item.id || '', 'list-title') + '</div>';
            discHtml += '<div class="list-meta">' + escapeHtml(item.status || item.kind || '') + '</div>';
            if (item.howItInspiresObjective) {
                discHtml += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            discHtml += '</div>';
        });
        document.getElementById('DiscoveriesTab').innerHTML = discHtml;
    }

    initTab();

    mermaid.initialize({startOnLoad: true, theme: 'base', themeVariables: {fontSize: '14px'}});
</script>
</body>
</html>
