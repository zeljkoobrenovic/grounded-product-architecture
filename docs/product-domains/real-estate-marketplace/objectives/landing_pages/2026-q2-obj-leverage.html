            margin-bottom: 6px;

        .key-result {

        .subsection {

    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">

            <div id="Meta" class="meta"></div>

</table>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const pageData = {"id": "obj-leverage", "title": "2026-Q2 Turn product progress into economic leverage", "statement": "Translate better customer and operational outcomes into stronger revenue quality, retention, and strategic leverage for the business.", "objectiveType": "company", "okrDesignNotes": "Separates commercial results from activity metrics so leaders can evaluate whether product work is compounding into business value.", "status": "planned", "inspiredByInsights": [{"insightId": "discovery-real-estate-marketplace-2026-03-13-03-pro-agency-platform", "insightTitle": "Pro Agency Platform: Mortgage Lender / Data Monetization Partner discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's leverage tradeoffs."}, {"insightId": "discovery-real-estate-marketplace-2026-03-13-02-owner-platform", "insightTitle": "Owner Platform: Broker Software / Integration Partner discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's leverage tradeoffs."}], "keyResultIds": ["real-estate-marketplace-2026-q2-cg2-p1-kr-3-leverage", "real-estate-marketplace-2026-q2-cg3-p1-kr-3-leverage"], "keyResults": [{"id": "kr-3", "metric": "Supply monetization revenue", "kind": "business", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Increase Supply monetization revenue during the quarter.", "companyKeyResultId": "real-estate-marketplace-2026-q2-cg2-p1-kr-3-leverage", "companyObjectiveId": "obj-leverage", "companyObjectiveTitle": "Turn product progress into economic leverage", "executingTeams": [{"teamId": "owner-market-growth-estimation-funnel", "teamName": "Owner Market Growth - Estimation Funnel", "role": "executing", "intent": "Lead the work to improve supply monetization revenue via Estimation Funnel and FSBO Online Classifieds Acquisition."}], "supportingTeams": [{"teamId": "market-intelligence-and-pricing-property-valuation-tool", "teamName": "Market Intelligence & Pricing - Property Valuation Tool", "role": "supporting", "intent": "Support the KR by contributing capability for supply monetization revenue, aligned with its focus on own valuations, pricing intelligence, analytics, data platform, and geo/location capabilities. This team specifically focuses on property valuation tool via Property Valuation Tool and Data Foundation."}, {"teamId": "platform-core-services-frontend", "teamName": "Platform Core Services - Frontend", "role": "supporting", "intent": "Support the KR by contributing capability for supply monetization revenue, aligned with its focus on provide frontend shell, identity, user management, shared services, and engineering platform capabilities. This team specifically focuses on frontend via Unified Frontend and Cookie Consent Management."}, {"teamId": "owner-market-growth-owner-coaching", "teamName": "Owner Market Growth - Owner Coaching", "role": "supporting", "intent": "Support the KR by contributing capability for supply monetization revenue, aligned with its focus on own owner acquisition, valuation, funnel conversion, and owner self-service monetization workflows. This team specifically focuses on owner coaching via Owner Coaching Experience and Owner Property Management."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "This KR should be pursued as an outcome target with room for discovery, iteration, and tradeoff.", "inspiredByInsights": [{"insightId": "discovery-real-estate-marketplace-2026-03-13-03-pro-agency-platform", "insightTitle": "Pro Agency Platform: Mortgage Lender / Data Monetization Partner discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's leverage tradeoffs."}, {"insightId": "discovery-real-estate-marketplace-2026-03-13-02-owner-platform", "insightTitle": "Owner Platform: Broker Software / Integration Partner discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's leverage tradeoffs."}], "sourceObjectiveId": "real-estate-marketplace-2026-q2-cg2-p1", "sourceObjectiveTitle": "2026-Q2 Individual Seller / Landlord outcome goal", "sourceObjectiveStatement": "Prepare to improve Estimation-to-listing conversion for Individual Seller / Landlord by advancing strengthen owner acquisition funnels, valuation credibility, and self-serve listing basics. through owner intent capture and listing reliability.", "sourceObjectivePageId": "real-estate-marketplace-2026-q2-cg2-p1"}, {"id": "kr-3", "metric": "B2B ARR", "kind": "business", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Increase B2B ARR during the quarter.", "companyKeyResultId": "real-estate-marketplace-2026-q2-cg3-p1-kr-3-leverage", "companyObjectiveId": "obj-leverage", "companyObjectiveTitle": "Turn product progress into economic leverage", "executingTeams": [{"teamId": "pro-agency-platform-pro-tool-foundation", "teamName": "Pro Agency Platform - Pro Tool Foundation", "role": "executing", "intent": "Lead the work to improve b2B ARR via Pro Tool Foundation and Intermediary Entity SSoT."}], "supportingTeams": [{"teamId": "transactions-and-communications-market-knowledge", "teamName": "Transactions & Communications - Market Knowledge", "role": "supporting", "intent": "Support the KR by contributing capability for b2B ARR, aligned with its focus on own transaction, communication, CRM, classifieds backoffice, and monetization support workflows. This team specifically focuses on market knowledge via Market Knowledge and Monthly Price Update."}, {"teamId": "platform-core-services-frontend", "teamName": "Platform Core Services - Frontend", "role": "supporting", "intent": "Support the KR by contributing capability for b2B ARR, aligned with its focus on provide frontend shell, identity, user management, shared services, and engineering platform capabilities. This team specifically focuses on frontend via Unified Frontend and Cookie Consent Management."}, {"teamId": "pro-agency-platform-classifieds-performance", "teamName": "Pro Agency Platform - Classifieds Performance", "role": "supporting", "intent": "Support the KR by contributing capability for b2B ARR, aligned with its focus on own intermediary management, classifieds lifecycle, lead workflows, and professional sales tooling. This team specifically focuses on classifieds performance via Classifieds Performance Management and Intermediary Members Management."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "This KR should be pursued as an outcome target with room for discovery, iteration, and tradeoff.", "inspiredByInsights": [{"insightId": "discovery-real-estate-marketplace-2026-03-13-03-pro-agency-platform", "insightTitle": "Pro Agency Platform: Mortgage Lender / Data Monetization Partner discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's leverage tradeoffs."}, {"insightId": "discovery-real-estate-marketplace-2026-03-06-01-home-discovery-platform", "insightTitle": "Home Discovery Platform: Brokerage Owner / Agency Growth Manager discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's leverage tradeoffs."}], "sourceObjectiveId": "real-estate-marketplace-2026-q2-cg3-p1", "sourceObjectiveTitle": "2026-Q2 Brokerage Owner / Agency Growth Manager outcome goal", "sourceObjectiveStatement": "Prepare to improve Qualified lead-to-viewing rate for Brokerage Owner / Agency Growth Manager by advancing fix b2b workflow gaps, prove lead quality, and improve listing operations fundamentals. through professional workflow and roi foundation.", "sourceObjectivePageId": "real-estate-marketplace-2026-q2-cg3-p1"}], "landingPageId": "2026-q2-obj-leverage"};
    const pageKind = 'company-objective';
    const domainName = 'Real Estate Marketplace';

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) {
            return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        }
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        const title = metric.kpiName || metric.metric || '';
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(title) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderExecutionItem(item, typeName) {
        const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
            ? (typeName === 'initiative'
                ? '../../initiatives/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '../../releases/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html')
            : '';
        let html = '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(target, item.description || item.id, 'list-title') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(item.date || '') + '</div>';
        if (item.customerIds && item.customerIds.length) {
            html += '<div class="list-description">Customers: ' + escapeHtml(item.customerIds.join(', ')) + '</div>';
        }
        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="list-description">Channels: ' + escapeHtml(item.deliveryChannels.join(', ')) + '</div>';
        }
        if (item.productBricks && item.productBricks.length) {
            html += '<div class="list-description">Bricks: ' + escapeHtml(item.productBricks.join(', ')) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderTeams(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.teamName || item.teamId) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.role || '') + '</div>';
            if (item.intent) {
                html += '<div class="list-description">' + escapeHtml(item.intent) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderInsights(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.insightTitle || item.title) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function sameInsightSet(a, b) {
        const aIds = (a || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        const bIds = (b || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        return aIds && bIds && aIds === bIds;
    }

    function renderKeyResult(item, options) {
        let html = '<div class="key-result">';
        html += '<div class="key-result-title">' + escapeHtml(item.metric) + '</div>';
        html += '<div>' + escapeHtml(item.statement || '') + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(item.targetDirection || '') + (item.target ? ' | ' + escapeHtml(item.target) : '') + (item.commitmentLabel ? ' | ' + escapeHtml(item.commitmentLabel) : '') + '</div>';

        if (options.showObjective && item.companyObjectiveTitle) {
            html += '<div class="list-description">Company objective: ' + escapeHtml(item.companyObjectiveTitle) + '</div>';
        }
        if (options.showSource && item.sourceObjectiveTitle) {
            const href = item.sourceObjectivePageId ? (item.sourceObjectivePageId + '.html') : '';
            html += '<div class="list-description">Source objective: ' + linkOf(href, item.sourceObjectiveTitle, 'entity-link') + '</div>';
        }
        if (item.baseline) {
            html += '<div class="list-description">Baseline: ' + escapeHtml(item.baseline) + '</div>';
        }
        if (item.commitmentRationale) {
            html += '<div class="list-description">Commitment: ' + escapeHtml(item.commitmentRationale) + '</div>';
        }
        html += renderTeams('Executing Teams', item.executingTeams || [], true);
        html += renderTeams('Supporting Teams', item.supportingTeams || [], true);
        if (!(options.suppressRepeatedInsights && sameInsightSet(options.pageInsights, item.inspiredByInsights || []))) {
            html += renderInsights('Inspired By Insights', item.inspiredByInsights || [], true);
        }
        html += '</div>';
        return html;
    }

    function renderSourceObjective(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.objective || '') + '</div></div>';

        if (page.companyObjectiveRefs && page.companyObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Mapped Company Objectives</div>';
            page.companyObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(item.id) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.linkedCustomers && page.linkedCustomers.length) {
            html += '<div class="section"><div class="section-title">Linked Customers</div>';
            page.linkedCustomers.forEach(customer => {
                html += '<div class="pill"><div><div class="pill-name">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.keyResults && page.keyResults.length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            page.keyResults.forEach(item => {
                html += renderKeyResult(item, {showObjective: true, showSource: false});
            });
            html += '</div>';
        }

        if ((page.linkedCustomerKPIs && page.linkedCustomerKPIs.length) || (page.linkedBusinessKPIs && page.linkedBusinessKPIs.length)) {
            html += '<div class="section"><div class="section-title">Linked KPIs</div>';
            (page.linkedCustomerKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            (page.linkedBusinessKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            html += '</div>';
        }

        html += '<div class="section"><div class="section-title">Execution Links</div>';
        if (page.linkedInitiatives && page.linkedInitiatives.length) {
            page.linkedInitiatives.forEach(item => {
                html += renderExecutionItem(item, 'initiative');
            });
        } else {
            html += '<div class="list-row"><div class="list-description">No initiatives linked to this objective.</div></div>';
        }
        html += '</div>';

        html += '<div class="section"><div class="section-title">Release Links</div>';
        if (page.linkedReleases && page.linkedReleases.length) {
            page.linkedReleases.forEach(item => {
                html += renderExecutionItem(item, 'release');
            });
        } else {
            html += '<div class="list-row"><div class="list-description">No releases linked to this objective.</div></div>';
        }
        html += '</div>';

        if (page.sourceReferences) {
            html += '<div class="section"><div class="section-title">Source References</div>';
            Object.keys(page.sourceReferences).forEach(key => {
                if (page.sourceReferences[key]) {
                    html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(key) + '</div><div class="pill-meta">' + escapeHtml(page.sourceReferences[key]) + '</div></div></div>';
                }
            });
            html += '</div>';
        }
        return html;
    }

    function renderCompanyObjective(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.statement || '') + '</div></div>';

        if (page.okrDesignNotes) {
            html += '<div class="section"><div class="section-title">Design Notes</div><div class="list-row"><div class="list-description">' + escapeHtml(page.okrDesignNotes) + '</div></div></div>';
        }

        html += renderInsights('Inspired By Insights', page.inspiredByInsights || [], false);

        if (page.keyResults && page.keyResults.length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            page.keyResults.forEach(item => {
                html += renderKeyResult(item, {
                    showObjective: false,
                    showSource: true,
                    suppressRepeatedInsights: true,
                    pageInsights: page.inspiredByInsights || []
                });
            });
            html += '</div>';
        }
        return html;
    }

    document.getElementById('Eyebrow').innerHTML = escapeHtml(pageKind === 'company-objective' ? 'Company Objective' : 'Source Objective');
    document.getElementById('Title').innerHTML = escapeHtml(pageData.title || 'Objective');
    const metaBits = [escapeHtml(domainName)];
    if (pageData.status) {
        metaBits.push(escapeHtml(pageData.status));
    }
    if (pageData.period && pageData.period.quarter) {
        metaBits.push(escapeHtml(pageData.period.quarter));
    }
    document.getElementById('Meta').innerHTML = metaBits.join(' | ');

    document.getElementById('Content').innerHTML = pageKind === 'company-objective'
        ? renderCompanyObjective(pageData)
        : renderSourceObjective(pageData);
</script>
</body>
