<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (DKV)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"date": "2025-07-24", "description": "Driver Mobility App initiative focused on improving vehicle services coordination, driver mobility app, strengthening customer value for Fleet Administrator / Operations Manager, and evolving delivery across iOS Driver App, Android Driver App.", "customerImpact": [{"customerId": "cg2_p1", "customer": {"id": "cg2_p1", "name": "Fleet Administrator / Operations Manager", "group": "Mid-Market Mixed Fleet Operators", "icon": "\ud83d\ude90.png"}, "customerKPIs": [{"kpi": "Mobile self-service completion rate", "expectedImpact": "Increase mobile self-service completion rate through stronger vehicle services coordination support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Administrative efficiency", "expectedImpact": "Increase administrative efficiency through stronger driver mobility app support and cleaner workflow execution.", "description": "Cost and time required to manage fleet operations", "unit": "hours/fleet/month", "kind": "customer"}], "businessKPIs": [{"kpi": "App adoption rate", "expectedImpact": "Increase app adoption rate through stronger vehicle services coordination support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Contribution margin from mid-market accounts", "expectedImpact": "Increase contribution margin from mid-market accounts through stronger driver mobility app support and cleaner workflow execution.", "description": "Margin generated from transaction activity plus software-led retention", "unit": "EUR/account/year", "kind": "business"}]}], "productBricks": [{"brickId": "vsco", "change": "Extended Vehicle Services Coordination with domain-specific workflow improvements.", "brick": {"id": "vsco", "name": "Vehicle Services Coordination", "domain": "Fleet & Mobility Services", "group": "fleet operations", "icon": "vsco.png"}}, {"brickId": "dmap", "change": "Extended Driver Mobility App with domain-specific workflow improvements.", "brick": {"id": "dmap", "name": "Driver Mobility App", "domain": "Fleet & Mobility Services", "group": "driver experience", "icon": "dmap.png"}}, {"brickId": "ciso", "change": "Extended Charging Infrastructure Solutions with domain-specific workflow improvements.", "brick": {"id": "ciso", "name": "Charging Infrastructure Solutions", "domain": "Electromobility & Sustainable Solutions", "group": "electromobility", "icon": "ciso.png"}}, {"brickId": "pcna", "change": "Extended Public Charging Network Access with domain-specific workflow improvements.", "brick": {"id": "pcna", "name": "Public Charging Network Access", "domain": "Electromobility & Sustainable Solutions", "group": "electromobility", "icon": "pcna.png"}}], "deliveryChannels": [{"channelId": "P2-ios", "change": "Introduced workflow updates in iOS Driver App.", "channel": {"productId": "P2", "productName": "Driver Mobility App", "name": "iOS Driver App", "type": "mobile_app", "icon": "mobile_app.png"}}, {"channelId": "P2-android", "change": "Introduced workflow updates in Android Driver App.", "channel": {"productId": "P2", "productName": "Driver Mobility App", "name": "Android Driver App", "type": "mobile_app", "icon": "mobile_app.png"}}, {"channelId": "P2-push", "change": "Introduced workflow updates in Push Notification Service.", "channel": {"productId": "P2", "productName": "Driver Mobility App", "name": "Push Notification Service", "type": "notification", "icon": "notification.png"}}]};
    const domainName = 'DKV';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
