<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products (DKV)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        .section {
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .group {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .doc {
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 11px;
            background-color: white;
            vertical-align: top;
        }

        a {
            text-decoration: none;
        }

        .icon {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 26px;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        body {
            margin: 40px;
        }

        ::placeholder {
            color: lightgrey;
            opacity: 1;
        }

        :-ms-input-placeholder {
            color: lightgrey;
        }

        ::-ms-input-placeholder {
            color: lightgrey;
        }


        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function openTab(evt, cityName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(cityName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</head>
<body>
<div style="" class="hidden">
    <div style="margin-bottom: 0px; margin-left: 6px">
        <img src="icons/logo.png" style="vertical-align: middle; height: 110px">
        <div style="width: calc(100% - 200px); display: inline-block; vertical-align: top; padding-left: 12px">
            <div style="padding-top: 0px; font-size: 64px">Products</div>
            <p style="color: #a0a0a0; font-size: 20px; margin-top: 8px">DKV</p>
        </div>
    </div>
    <br>
</div>

<div class="tab">
    <button class="tablinks active" id="tab_products" onclick="openTab('products')">Products</button>
</div>
<div>
    <div id="products" style="display: block" class="tabcontent"></div>
</div>

<script>
    const products = {"portfolio": {"name": "European Fleet Mobility Operating System", "version": "1.0", "products": [{"id": "P1", "name": "Fleet Mobility Control", "type": "B2B Enterprise", "primaryCustomers": [{"id": "CG1-P1", "name": "VP Fleet & Network Operations"}, {"id": "CG2-P1", "name": "Fleet Administrator / Operations Manager"}], "interfaces": [{"type": "web", "name": "Fleet Control Center", "description": "Primary web workspace for fleet-wide administration of cards, drivers, vehicles, policies, transaction monitoring, and operational exception handling across fuel, charging, toll, and ancillary services.", "users": ["Fleet Operations Leaders", "Fleet Administrators", "Finance Operations Teams"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Mobility Spend & Operations Dashboard", "description": "Analytics interface for vehicle utilization, spend leakage, energy mix, route economics, failed transactions, and corridor coverage quality.", "users": ["Fleet Operations Leaders", "Finance Controllers", "Procurement Teams"], "availabilityHorizon": "1_year"}, {"type": "web", "name": "Policy & Controls Console", "description": "Dedicated interface to configure country, driver, vehicle, and service-level authorization rules, limits, fraud controls, and exception workflows.", "users": ["Fleet Administrators", "Risk Managers", "Finance Operations Teams"], "availabilityHorizon": "live"}, {"type": "api", "name": "Fleet Administration API", "description": "API for provisioning cards, assigning drivers and vehicles, managing limits, retrieving account structures, and synchronizing master data with customer systems.", "users": ["ERP Systems", "TMS Platforms", "Fleet IT Teams"], "availabilityHorizon": "1_year"}, {"type": "notification", "name": "Operational Alerting Service", "description": "Email, SMS, and in-platform alerts for failed transactions, suspicious fueling behavior, toll issues, document expiries, and policy breaches.", "users": ["Fleet Administrators", "Operations Teams", "Drivers"], "availabilityHorizon": "live"}]}, {"id": "P2", "name": "Driver Mobility App", "type": "B2B User", "primaryCustomers": [{"id": "CG3-P1", "name": "Truck Driver / Field Driver"}], "interfaces": [{"type": "mobile_app", "name": "iOS Driver App", "description": "Native iOS interface for station discovery, APP&GO digital fueling, charging session access, transaction history, card support, and on-road service workflows.", "users": ["Truck Drivers", "Field Drivers", "Mobile Employees"], "availabilityHorizon": "live"}, {"type": "mobile_app", "name": "Android Driver App", "description": "Native Android experience aligned to iOS with route-aware search, digital payment initiation, toll support visibility, and issue recovery flows.", "users": ["Truck Drivers", "Field Drivers", "Mobile Employees"], "availabilityHorizon": "live"}, {"type": "notification", "name": "Push Notification Service", "description": "Real-time push notifications for fueling and charging confirmations, failed transaction recovery, policy warnings, support updates, and route-based service prompts.", "users": ["Drivers", "Mobile Employees"], "availabilityHorizon": "live"}, {"type": "web", "name": "Driver Self-Service Portal", "description": "Browser-based access for transaction lookup, card status review, support requests, and mobility usage history when mobile app usage is not available.", "users": ["Drivers", "Mobile Employees"], "availabilityHorizon": "1_year"}, {"type": "partner_api", "name": "On-Road Assistance Integration API", "description": "Partner-facing interface for roadside assistance providers, parking operators, and ancillary service networks to receive service requests and status updates.", "users": ["Roadside Assistance Partners", "Parking Partners", "Service Networks"], "availabilityHorizon": "3_year"}]}, {"id": "P3", "name": "Fuel & EV Access Network", "type": "B2B Transaction Network", "primaryCustomers": [{"id": "CG1-P1", "name": "VP Fleet & Network Operations"}, {"id": "CG3-P1", "name": "Truck Driver / Field Driver"}, {"id": "CG4-P1", "name": "Mobility Network / Software Partner Manager"}], "interfaces": [{"type": "web", "name": "Energy Access Management Portal", "description": "B2B portal to manage fuel card and EV charging access, station eligibility, account-level service permissions, and network visibility across geographies.", "users": ["Fleet Operations Leaders", "Fleet Administrators", "Partner Managers"], "availabilityHorizon": "live"}, {"type": "api", "name": "Acceptance & Transaction API", "description": "Network API for accepted stations, charge points, pricing metadata, transaction processing, and digital fueling or charging authorization events.", "users": ["Fuel Partners", "Charge Point Operators", "Enterprise Systems"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Energy Network Quality Dashboard", "description": "Analytics interface covering corridor coverage, first-attempt transaction success, partner quality, energy price variance, and digital transaction penetration.", "users": ["Network Managers", "Procurement Teams", "Partner Success Teams"], "availabilityHorizon": "1_year"}, {"type": "partner_api", "name": "Charge Point Integration API", "description": "Partner-facing API for onboarding and operating public charging networks including availability, session initiation, settlement, and roaming data exchange.", "users": ["Charge Point Operators", "Roaming Hubs", "Energy Partners"], "availabilityHorizon": "live"}, {"type": "public_api", "name": "Station & Charger Discovery API", "description": "Controlled API for external platforms to retrieve approved station, charger, amenity, and acceptance data for shared fleet workflows.", "users": ["Telematics Vendors", "TMS Platforms", "Navigation Partners"], "availabilityHorizon": "3_year"}]}, {"id": "P4", "name": "Toll & Road Services Hub", "type": "B2B Infrastructure Service", "primaryCustomers": [{"id": "CG1-P1", "name": "VP Fleet & Network Operations"}, {"id": "CG3-P1", "name": "Truck Driver / Field Driver"}], "interfaces": [{"type": "web", "name": "Toll Operations Console", "description": "Central interface for managing toll products, onboard units, country activation, vignette coverage, exception handling, and invoice review.", "users": ["Fleet Administrators", "Transport Operations Teams", "Finance Operations Teams"], "availabilityHorizon": "live"}, {"type": "api", "name": "Toll Settlement API", "description": "API for ingesting toll events, mapping trips to vehicles, exposing charge detail records, and synchronizing toll cost data into TMS and ERP systems.", "users": ["ERP Systems", "TMS Platforms", "Finance Data Teams"], "availabilityHorizon": "1_year"}, {"type": "dashboard", "name": "Corridor Cost Intelligence Dashboard", "description": "Analytics dashboard showing toll cost by route, cross-border corridor performance, toll exceptions, parking usage, and route-level profitability impacts.", "users": ["Fleet Operations Leaders", "Network Planners", "Controllers"], "availabilityHorizon": "3_year"}, {"type": "partner_api", "name": "Road Services Partner API", "description": "Integration interface for parking, wash, ferry, tunnel, and other road service providers to connect their services into the unified DKV transaction layer.", "users": ["Parking Partners", "Road Infrastructure Partners", "Ancillary Service Providers"], "availabilityHorizon": "3_year"}]}, {"id": "P5", "name": "Fleet Operations & Telematics Intelligence", "type": "B2B SaaS", "primaryCustomers": [{"id": "CG1-P1", "name": "VP Fleet & Network Operations"}, {"id": "CG2-P1", "name": "Fleet Administrator / Operations Manager"}], "interfaces": [{"type": "web", "name": "Fleet Operations Workspace", "description": "Browser-based platform for vehicle master data, document management, inspection reminders, lifecycle workflows, utilization tracking, and fleet-level cost control.", "users": ["Fleet Administrators", "Operations Managers", "Compliance Coordinators"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Telematics & Route Optimization Dashboard", "description": "Analytics environment for route performance, refueling behavior, utilization, idling, exception alerts, and future mixed-energy route optimization recommendations.", "users": ["Fleet Operations Leaders", "Dispatch Teams", "Energy Transition Managers"], "availabilityHorizon": "1_year"}, {"type": "api", "name": "Telemetry & Event API", "description": "Bidirectional API for ingesting vehicle telemetry and exposing normalized events for route optimization, cost control, and anomaly detection workflows.", "users": ["Telematics Vendors", "Fleet IT Teams", "Dispatch Systems"], "availabilityHorizon": "live"}, {"type": "notification", "name": "Compliance & Maintenance Reminder Engine", "description": "Workflow-triggered notifications for inspections, document expiries, service intervals, and fleet policy exceptions.", "users": ["Fleet Administrators", "Drivers", "Operations Teams"], "availabilityHorizon": "live"}, {"type": "partner_api", "name": "Maintenance Partner Coordination API", "description": "Planned interface for workshop, maintenance, and service partners to receive fleet work orders and return status and completion data.", "users": ["Maintenance Providers", "Workshop Networks", "Service Coordinators"], "availabilityHorizon": "planned_3y"}]}, {"id": "P6", "name": "Tax, Billing & Financial Services", "type": "B2B Financial Platform", "primaryCustomers": [{"id": "CG1-P1", "name": "VP Fleet & Network Operations"}, {"id": "CG2-P1", "name": "Fleet Administrator / Operations Manager"}], "interfaces": [{"type": "web", "name": "Billing & Recovery Console", "description": "Central interface for consolidated invoicing, transaction review, tax refund workflows, payment terms visibility, and account-level finance operations.", "users": ["Finance Controllers", "Accounts Payable Teams", "Fleet Administrators"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Working Capital & Recovery Dashboard", "description": "Analytics view into tax refund status, payment cycle performance, disputed spend, liquidity impact, and recovered value by country and service category.", "users": ["Finance Leaders", "Treasury Teams", "Controllers"], "availabilityHorizon": "1_year"}, {"type": "api", "name": "Invoice & Cost Allocation API", "description": "Structured API for invoice data, cost center mapping, tax documentation, reconciliation status, and downstream ERP posting.", "users": ["ERP Systems", "Finance Data Platforms", "Shared Service Centers"], "availabilityHorizon": "live"}, {"type": "partner_api", "name": "Tax Recovery Partner API", "description": "Interface for tax and compliance partners to exchange claim data, supporting documentation, approval statuses, and refund settlements.", "users": ["Tax Recovery Partners", "Compliance Partners", "Financial Service Providers"], "availabilityHorizon": "1_year"}, {"type": "api", "name": "Embedded Finance Services API", "description": "Future API surface for credit, deferred payment, fleet liquidity, and settlement acceleration services tied to mobility transaction history.", "users": ["Financial Partners", "Enterprise Treasury Systems", "Partner Platforms"], "availabilityHorizon": "planned_5y"}]}, {"id": "P7", "name": "Sustainability & Carbon Intelligence", "type": "B2B Intelligence Product", "primaryCustomers": [{"id": "CG1-P1", "name": "VP Fleet & Network Operations"}, {"id": "CG2-P1", "name": "Fleet Administrator / Operations Manager"}], "interfaces": [{"type": "web", "name": "Carbon Reporting Console", "description": "B2B interface for emissions tracking, annual reporting, customer reporting exports, energy mix analysis, and route-level decarbonization visibility.", "users": ["Sustainability Managers", "Fleet Operations Leaders", "Bid Management Teams"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Decarbonization Opportunity Dashboard", "description": "Strategic dashboard identifying electrification candidates, high-emission corridors, fuel-to-EV transition opportunities, and benchmark performance by fleet segment.", "users": ["Energy Transition Managers", "Fleet Strategy Teams", "Procurement Teams"], "availabilityHorizon": "3_year"}, {"type": "api", "name": "Emissions Data API", "description": "API for exporting auditable transaction-level emissions data, annual summaries, and normalized records into ERP, ESG, and shipper reporting workflows.", "users": ["ESG Platforms", "ERP Systems", "Shipper Reporting Systems"], "availabilityHorizon": "1_year"}, {"type": "partner_api", "name": "Carbon Assurance Integration API", "description": "Integration layer for external sustainability, audit, and assurance providers to validate methodology, ingest reports, and support customer disclosures.", "users": ["Assurance Providers", "Sustainability Consultancies", "Enterprise Audit Teams"], "availabilityHorizon": "3_year"}]}, {"id": "P8", "name": "Partner Ecosystem Platform", "type": "B2B Platform", "primaryCustomers": [{"id": "CG4-P1", "name": "Mobility Network / Software Partner Manager"}], "interfaces": [{"type": "web", "name": "Partner Console", "description": "Primary partner-facing workspace for onboarding, configuration, certification, service coverage management, settlement review, and performance tracking.", "users": ["Fuel Partners", "Charge Point Operators", "Software Partners", "Road Service Providers"], "availabilityHorizon": "1_year"}, {"type": "api", "name": "Partner Integration API", "description": "Standardized API layer for service onboarding, transaction exchange, pricing feeds, availability feeds, quality metrics, and dispute workflows.", "users": ["Fuel Networks", "CPOs", "Software Partners", "Infrastructure Providers"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Partner ROI & Network Performance Dashboard", "description": "Analytics interface showing attributed transaction volume, corridor demand, service quality, dispute rates, settlement performance, and ranking exposure.", "users": ["Partner Managers", "Commercial Leads", "Operations Teams"], "availabilityHorizon": "1_year"}, {"type": "public_api", "name": "Developer Platform API", "description": "Controlled external API suite with documentation, sandboxing, event subscriptions, and access controls for third-party application development on top of DKV mobility rails.", "users": ["Independent Software Vendors", "Enterprise Developers", "Strategic Integration Partners"], "availabilityHorizon": "3_year"}, {"type": "marketplace", "name": "Partner Marketplace", "description": "Curated ecosystem layer exposing maintenance, parking, charging, compliance, and finance services inside customer workflows with commission and routing logic.", "users": ["Fleet Customers", "Partners", "Drivers"], "availabilityHorizon": "planned_5y"}]}], "sharedPlatformLayers": [{"name": "Identity, Account & Authorization Layer", "interfaces": [{"type": "internal_service", "name": "Fleet Identity Graph", "description": "Central entity resolution service linking accounts, subsidiaries, cost centers, vehicles, drivers, cards, toll devices, and partner identities."}, {"type": "internal_service", "name": "Permissions & Policy Engine", "description": "Cross-product service managing user access, spend limits, service authorization, regional restrictions, and exception rules."}]}, {"name": "Transaction, Billing & Settlement Layer", "interfaces": [{"type": "internal_service", "name": "Mobility Transaction Ledger", "description": "Core ledger service for fuel, EV charging, toll, parking, wash, roadside, and ancillary service events with unified transaction semantics."}, {"type": "internal_service", "name": "Consolidated Billing Engine", "description": "Multi-country invoicing, tax treatment, cost allocation, refund orchestration, and settlement processing across all mobility products."}]}, {"name": "Network Acceptance & Routing Layer", "interfaces": [{"type": "internal_service", "name": "Acceptance Directory Service", "description": "Canonical directory of stations, charge points, toll domains, service locations, amenities, pricing signals, and eligibility metadata."}, {"type": "internal_service", "name": "Routing & Recommendation Engine", "description": "Service that matches route context, policy, network quality, and commercial economics to recommend the best fueling, charging, toll, or ancillary service option."}]}, {"name": "Risk, Fraud & Compliance Layer", "interfaces": [{"type": "internal_service", "name": "Fraud & Anomaly Detection Service", "description": "Cross-product monitoring of suspicious card usage, fueling behavior, duplicate charges, route mismatches, and account abuse patterns."}, {"type": "internal_service", "name": "Compliance Workflow Service", "description": "Shared service for inspections, document expiry, tax evidence, toll exceptions, and audit-ready case management."}]}, {"name": "Data, Intelligence & Sustainability Layer", "interfaces": [{"type": "internal_service", "name": "Mobility Data Lakehouse", "description": "Unified analytical foundation combining transaction, telemetry, route, billing, and partner performance data for reporting and model training."}, {"type": "internal_service", "name": "Carbon Intelligence Service", "description": "Shared methodology and computation service for emissions attribution, energy mix analysis, benchmarking, and auditable sustainability outputs."}]}, {"name": "Developer & Ecosystem Layer", "interfaces": [{"type": "internal_service", "name": "API Gateway & Partner Access Control", "description": "Centralized API management, authentication, throttling, partner onboarding, and entitlement enforcement across internal and external interfaces."}, {"type": "internal_service", "name": "Event Bus & Workflow Orchestration", "description": "Shared asynchronous workflow layer for transaction events, alerts, partner updates, billing actions, and future ecosystem automation."}]}]}};

    function update() {
        let html = '';

        products.portfolio.products.forEach(product => {
            html += '<a target="_blank" href="landing_pages/' + product.id + '.html" onerror="">';
            html += '<div class="doc" style="text-align: left">';
            html += '<table style="margin-bottom: 24px">';
            html += '<tr>';
            html += '<td style="padding-right: 20px">';
            html += '<div style="text-align: left">';
            html += '<img src="icons/' + product.icon + '" style="height: 100px; border: 1px solid lightgrey; border-radius: 50%; box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;" onerror="this.onerror=null;this.src=\'icons/product.png\'">';
            html += '</div>';
            html += '</td>';
            html += '<td>';
            product.primaryCustomers.forEach(customer => {
                html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px">';
                html += customer.name;
                html += '</div>';
            });
            html += '<div style="color: blue; margin-bottom: 2px; margin-top: 2px; font-size: 240%">' + product.name + '</div>';
            html += '</td>';
            html += '</tr>';
            html += '</table>';

            html += '<table style="text-align: center">';
            html += '<tr>';
            html += '<td style="max-width: 200px; vertical-align: bottom">';

                    html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px; font-size: 80%">';
                    html += user;
                    html += '</div>';
                });
                html += '</div>';
                html += '<div style="text-align: center; max-width: 200px; vertical-align: top">';
                html += '<div style="border: 2px solid grey; padding: 8px; margin: 5px; vertical-align: top">';
                html += '<img src="icons/' + interface.type + '.png" style="height: 42px; margin: 0; margin-top: -28px; background-color: rgba(255,255,255,1)">';
                html += '<div style="color: blue; margin-bottom: 0px; height: 2em; margin-top: 0; color: grey; font-size: 80%">' + interface.type + '</div>';
                html += '<div style="color: blue; margin-bottom: 10px; height: 2em; margin-top: 0px">' + interface.name + '</div>';
                html += '</div>';
                html += '</div>';
                html += '</div>';

            });
            html += '</td>';
            html += '</tr>';

            html += '<tr>';
            html += '<td colspan="100" style="text-align: center; padding: 0">';
            html += '<div style="text-align: center; border: 3px solid grey; margin: 10px; padding: 10px; margin-top: -3px">';
            if (product.neededCapabilities) {
                product.neededCapabilities.forEach(capability => {
                    html += '<div style="display: inline-block; width: 200px; vertical-align: bottom; margin: 3px;">';
                    html += '<div style="text-align: left; border: 1px dashed grey; padding: 8px;">';
                    html += '<div style="color: blue; margin-bottom: 4px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 90%">' + capability.capabilityName + '</div>';
                    html += '<div style="color: grey; margin-bottom: 10px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 70%">' + capability.whyNeeded + '</div>';
                    html += '</div>';
                    html += '</div>';
                });
            }
            html += '</div>';
            html += '</td>';
            html += '</tr>';
            html += '</table>';


            html += '</div>';
        });

        document.getElementById('products').innerHTML = html;
    }

    update();
</script>
