    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function objectiveItems(payload) {
        return payload && (payload.objectives || payload.goals || []) || [];
    }

    function companyObjectiveItems(payload) {
        return payload && (payload.companyObjectives || []) || [];
    }

    function countKeyResults(items) {
        let total = 0;
        items.forEach(item => total += (item.keyResults || []).length);
        return total;
    }

    function renderSummary() {
        const stats = [
            {value: companyObjectiveItems(currentPayload).length, label: 'Current company objectives'},
            {value: objectiveItems(currentPayload).length, label: 'Current source objectives'},
            {value: countKeyResults(companyObjectiveItems(currentPayload)), label: 'Current key results'},
            {value: ((archivePayload.quartersCovered || []).length || 0), label: 'Archived quarters'}
        ];
        let html = '';
        stats.forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function renderMetric(metric) {
        const label = metric.kpiName || metric.metric || '';
        return '<div class="metric">' +
            '<div class="metric-name">' + escapeHtml(label) + '</div>' +
            '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + '</div>' +
            '</div>';
    }

    function renderCustomer(customer) {
        return '<div class="pill"><div><div class="pill-name">' + escapeHtml(customer.customerName) + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId || '') + '</div></div></div>';
    }

    function renderCompanyObjectiveCard(item) {
        const href = 'landing_pages/' + encodeURIComponent(item.landingPageId) + '.html';
        const hicCount = (item.keyResults || []).filter(kr => kr.commitmentType === 'high_integrity_commitment').length;
        let html = '<a target="_blank" rel="noopener noreferrer" href="' + href + '">';
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-badge">Company Objective</span><span class="card-period">' + escapeHtml(item.status || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title) + '</div>';
        html += '<div class="card-objective">' + escapeHtml(item.statement || '') + '</div>';

        if ((item.inspiredByInsights || []).length) {
            html += '<div class="section"><div class="section-title">Inspired By</div>';
            item.inspiredByInsights.forEach(insight => {
                html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(insight.insightTitle) + '</div><div class="pill-meta">' + escapeHtml(insight.status || '') + '</div></div></div>';
            });
            html += '</div>';
        }

        html += '<div class="section"><div class="section-title">Key Result Portfolio</div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((item.keyResults || []).length)) + ' key results</div><div class="pill-meta">Outcome scope</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String(hicCount)) + ' commitments</div><div class="pill-meta">High integrity</div></div></div>';
        html += '</div>';

        html += '<div class="open-link">Open company objective</div>';
        html += '</div></a>';
        return html;
    }

    function renderSourceObjectiveCard(item) {
        const href = 'landing_pages/' + encodeURIComponent(item.landingPageId || item.id) + '.html';
        let html = '<div class="card">';
        html += '<div class="card-header"><span class="card-badge">Source Objective</span><span class="card-period">' + escapeHtml((item.period || {}).quarter || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title) + '</div>';
        html += '<div class="card-objective">' + escapeHtml(item.objective) + '</div>';

        if ((item.companyObjectiveRefs || []).length) {
            html += '<div class="section"><div class="section-title">Mapped Company Objectives</div>';
            item.companyObjectiveRefs.forEach(ref => {
                const refHref = 'landing_pages/' + encodeURIComponent(ref.landingPageId || ref.id) + '.html';
                html += '<a class="pill-link" target="_blank" rel="noopener noreferrer" href="' + refHref + '"><div class="pill"><div><div class="pill-name">' + escapeHtml(ref.title) + '</div><div class="pill-meta">' + escapeHtml(ref.id) + '</div></div></div></a>';
            });
            html += '</div>';
        }

        if ((item.linkedCustomers || []).length) {
            html += '<div class="section"><div class="section-title">Customers</div>';
            item.linkedCustomers.forEach(customer => {
                html += renderCustomer(customer);

        html += '<div class="section"><div class="section-title">Execution</div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((item.keyResults || []).length)) + ' key results</div><div class="pill-meta">Outcome contract</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((item.linkedInitiatives || []).length)) + ' initiatives</div><div class="pill-meta">Linked change</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((item.linkedReleases || []).length)) + ' releases</div><div class="pill-meta">Shipped change</div></div></div>';

        html += '<a class="open-link" target="_blank" rel="noopener noreferrer" href="' + href + '">Open source objective</a>';

    function renderSubsection(title, description, cardsHtml) {
        let html = '<div class="subsection">';
        html += '<div class="subsection-title">' + escapeHtml(title) + '</div>';
        html += '<div class="subsection-description">' + escapeHtml(description) + '</div>';
        html += cardsHtml;
        html += '</div>';
        return html;
    }

    function renderCardGrid(items, renderer, emptyText) {
        if (!items.length) {
            return '<div class="empty">' + escapeHtml(emptyText) + '</div>';
        }
        let html = '<div class="grid">';
        items.forEach(item => {
            html += renderer(item);
        });
        html += '</div>';
        return html;
    }

    function mermaidSafeId(prefix, raw) {
        return (prefix + '_' + String(raw || 'node')).replace(/[^a-zA-Z0-9_]/g, '_');
    }

    function mermaidLabel(value) {
        return String(value || '')
            .replaceAll('"', '&quot;')
            .replaceAll('\n', ' ')
            .trim();
    }

    function buildDependencyGraph(payload) {
        const objectives = objectiveItems(payload);
        const companyObjectives = companyObjectiveItems(payload);
        if (!objectives.length && !companyObjectives.length) {
            return '';
        }

        const lines = ['flowchart RL'];
        const nodes = new Set();
        const edges = new Set();

        function addNode(id, label, className) {
            if (nodes.has(id)) {
                return;
            }
            nodes.add(id);
            lines.push(id + '["' + mermaidLabel(label) + '"]:::' + className);
        }

        function addEdge(fromId, toId, label) {
            const connector = label ? ' -->|' + mermaidLabel(label) + '| ' : ' --> ';
            const edge = fromId + connector + toId;
            if (edges.has(edge)) {
                return;
            }
            edges.add(edge);
            lines.push(edge);
        }

        companyObjectives.forEach(companyObjective => {
            const companyId = mermaidSafeId('co', companyObjective.id);
            addNode(companyId, 'Company Objective: ' + (companyObjective.title || companyObjective.id), 'companyObjective');

            (companyObjective.keyResults || []).forEach(keyResult => {
                const sourceId = keyResult.sourceObjectiveId ? mermaidSafeId('so', keyResult.sourceObjectiveId) : null;
                if (sourceId) {
                    addEdge(sourceId, companyId, 'supports');
                }

                (keyResult.executingTeams || []).forEach(team => {
                    const teamId = mermaidSafeId('tm', team.teamId || team.teamName);
                    addNode(teamId, 'Team: ' + (team.teamName || team.teamId), 'team');
                    addEdge(teamId, companyId, 'executes');
                });

                (keyResult.supportingTeams || []).forEach(team => {
                    const teamId = mermaidSafeId('tm', team.teamId || team.teamName);
                    addNode(teamId, 'Team: ' + (team.teamName || team.teamId), 'team');
                    addEdge(teamId, companyId, 'supports');
                });
            });
        });

        objectives.forEach(objective => {
            const objectiveId = mermaidSafeId('so', objective.id);
            addNode(objectiveId, 'Source Objective: ' + (objective.title || objective.id), 'sourceObjective');

            (objective.linkedCustomers || []).forEach(customer => {
                const customerId = mermaidSafeId('cu', customer.customerId || customer.customerName);
                addNode(customerId, 'Customer: ' + (customer.customerName || customer.customerId), 'customer');
                addEdge(customerId, objectiveId, 'needs');
            });

            (objective.linkedInitiatives || []).forEach(initiative => {
                const initiativeKey = initiative.id || initiative.initiativeId || initiative.title || initiative.description;
                const initiativeLabel = initiative.title || initiative.description || initiative.initiativeId || initiativeKey;
                const initiativeId = mermaidSafeId('in', initiativeKey);
                addNode(initiativeId, 'Initiative: ' + initiativeLabel, 'initiative');
                addEdge(initiativeId, objectiveId, 'delivers');
            });
        });

        lines.push('classDef companyObjective fill:#d9ecff,stroke:#315b7c,stroke-width:1.5px,color:#1f2937');
        lines.push('classDef sourceObjective fill:#f3e8ff,stroke:#7c3aed,stroke-width:1.2px,color:#1f2937');
        lines.push('classDef team fill:#e7f7ed,stroke:#2f855a,stroke-width:1.2px,color:#1f2937');
        lines.push('classDef customer fill:#fff4da,stroke:#b7791f,stroke-width:1.2px,color:#1f2937');
        lines.push('classDef initiative fill:#ffe2e2,stroke:#c53030,stroke-width:1.2px,color:#1f2937');

        return lines.join('\n');
    }

    function renderDependencyGraph(tabId, payload) {
        if (tabId === 'Archive') {
            return '';
        }
        const graph = buildDependencyGraph(payload);
        if (!graph) {
            return '';
        }
        return renderSubsection(
            'Dependency Graph',
            'Visualizes how customers, initiatives, source objectives, company objectives, and teams connect for this planning period.',
            '<div class="dependency-graph"><div class="mermaid">' + graph + '</div></div>'
        );
    }

    function renderMermaidForTab(tabId) {
        const tab = document.getElementById(tabId);
        if (!tab || tab.dataset.mermaidRendered === 'true' || tabId === 'Archive') {
            return;
        }
        const graph = tab.querySelector('.mermaid');
        if (!graph) {
            return;
        }
        mermaid.run({querySelector: '#' + tabId + ' .mermaid'});
        tab.dataset.mermaidRendered = 'true';
    }

    function renderTab(divId, payload, emptyText) {
        const objectives = objectiveItems(payload);
        const companyObjectives = companyObjectiveItems(payload);
        if (!objectives.length && !companyObjectives.length) {
            document.getElementById(divId).innerHTML = '<div class="empty">' + escapeHtml(emptyText) + '</div>';
            return;
        }

        let html = '';
        html += renderSubsection(
            'Company Objectives',
            'A small set of company-level outcomes that organize the quarter and collect the active key results.',
            renderCardGrid(companyObjectives, renderCompanyObjectiveCard, 'No company objectives are defined for this period.')
        );
        html += renderSubsection(
            'Source Objectives',
            'Underlying objective packets linked to customers, KPIs, initiatives, and releases. These now feed the company objective layer instead of standing alone.',
            renderCardGrid(objectives, renderSourceObjectiveCard, 'No source objectives are defined for this period.')
        );
        html += renderDependencyGraph(divId, payload);

        document.getElementById(divId).innerHTML = html;
    }

    renderSummary();
    renderTab('Current', currentPayload, 'No current-quarter objectives are defined.');
    renderTab('Next', nextPayload, 'No next-quarter preparation objectives are defined.');
    renderTab('Archive', archivePayload, 'No archived objectives are defined.');
</script>
</body>
</html>
