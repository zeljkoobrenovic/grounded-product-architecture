<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discovery (DKV)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"id": "discovery-dkv-2026-03-18-02-merchant-acceptance-onboarding", "name": "Merchant acceptance onboarding and activation discovery", "status": "ongoing", "lastUpdated": "2026-03-18", "summary": "Discovery work in DKV is reducing uncertainty before committing to larger product and platform investment.", "opportunity": "Test whether simpler merchant onboarding and acceptance controls would improve partner activation speed without hurting risk posture.", "teams": {"leadTeamId": "merchant-and-acceptance-network-cell-1", "supportingTeamIds": ["merchant-and-acceptance-network-cell-2", "payments-risk-platform-cell-1"], "assignments": [{"teamId": "merchant-and-acceptance-network-cell-1", "teamName": "Merchant & Acceptance Network - Cell 1", "role": "lead", "roleLabel": "Lead discovery team", "how": "Leads customer interviews, framing, and synthesis for this discovery track."}, {"teamId": "merchant-and-acceptance-network-cell-2", "teamName": "Merchant & Acceptance Network - Cell 2", "role": "support", "roleLabel": "Supporting discovery team", "how": "Supports feasibility, controls, and workflow validation across adjacent systems."}, {"teamId": "payments-risk-platform-cell-1", "teamName": "Payments & Risk Platform - Cell 1", "role": "support", "roleLabel": "Supporting discovery team", "how": "Supports feasibility, controls, and workflow validation across adjacent systems."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers buy the product and/or choose to use it?", "hypothesis": "Target customers will adopt a more unified workflow if it reduces fragmented mobility administration.", "evidenceToCollect": ["Evidence of current workflow pain and switching intent.", "Signals that the proposed experience changes purchase or adoption behavior."], "methods": ["Problem interviews", "Concept walkthroughs", "Demand or adoption signal review"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "The proposed offer can improve growth or control metrics without unacceptable operating cost.", "evidenceToCollect": ["Commercial upside and retention implications.", "Risk, compliance, and service-cost constraints."], "methods": ["Business case review", "KPI trade-off review", "Commercial and operational constraint check"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Customers can understand the flow and complete the core jobs without specialist support.", "evidenceToCollect": ["Observed confusion in prototype sessions.", "Workflow friction across key steps and handoffs."], "methods": ["Workflow prototype test", "Task-based usability session", "Support and friction review"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The smallest useful slice fits current platform and compliance constraints.", "evidenceToCollect": ["Dependencies on payment, risk, or platform teams.", "Whether the solution can be delivered incrementally."], "methods": ["Technical spike", "Architecture and dependency review", "Delivery slicing workshop"]}], "plannedActivities": ["Interview target customers and internal stakeholders on workflow pain and purchase criteria.", "Prototype the critical workflow and test task completion.", "Review architecture, compliance, and operating constraints before committing to delivery."], "decisionToMake": "Decide whether to proceed, narrow, or stop the opportunity before further investment.", "startDate": "2026-02-18", "endDate": "2026-03-25", "statusLabel": "Ongoing", "landingPageIndex": 0, "date": "2026-02-18", "linkedInitiatives": [], "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'DKV';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome && discovery.outcome.summary) {
        html += '<div class="section"><div class="section-title">Outcome</div><div class="description">' + escapeHtml(discovery.outcome.summary) + '</div></div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
