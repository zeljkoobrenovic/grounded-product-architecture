    <style>
        body {

            margin: 28px;
            color: #202124;
            max-width: 1100px;

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;

            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;

            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;

        }

        .impact-block {
            border-left: 3px solid #d7dce1;

        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 8px;">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Hotspot proof depends on visible action, not only device rollout", "id": "discovery-municipal-public-space-enforcement-2026-03-05-00-hotspot-proof", "name": "Hotspot proof depends on visible action, not only device rollout", "status": "ongoing", "lastUpdated": "2026-04-02", "summary": "Discovery work is testing whether municipal value proof grows only when deployment, cleanup, and enforcement outcomes are connected into one operating loop rather than measured as separate activities.", "opportunity": "Clarify which combined product changes most improve visible resident outcomes and renewal credibility across councils.", "linkedInitiatives": [{"initiativeId": "initiative-municipal-public-space-enforcement-2026-04-10-02", "description": "Coordinated Cleanup Loop exists to connect enforcement, task dispatch, mobile closure, and recurrence analysis into one municipal operating loop.", "landingPageIndex": 1, "initiativeDescription": "Coordinated Cleanup Loop exists to connect enforcement, task dispatch, mobile closure, and recurrence analysis into one municipal operating loop. The quarter concentrates on field workflow quality, service-system fit, and recurrence-aware hotspot decisions so councils see cleaner sites, not just more alerts."}], "teams": {"leadTeamId": "mpe-executive-insights", "supportingTeamIds": ["mpe-field-response", "mpe-site-planning"], "assignments": [{"teamId": "mpe-executive-insights", "teamName": "Executive Insights", "role": "lead", "roleLabel": "Lead discovery team", "how": "Leads evidence synthesis on what creates visible municipal value and renewal proof."}, {"teamId": "mpe-field-response", "teamName": "Field Response Workflow", "role": "support", "roleLabel": "Supporting discovery team", "how": "Adds field workflow evidence about task quality and closure reliability."}, {"teamId": "mpe-site-planning", "teamName": "Site Planning and Deployment", "role": "support", "roleLabel": "Supporting discovery team", "how": "Adds deployment and relocation evidence needed to understand recurrence reduction."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers buy the product and/or choose to use it?", "hypothesis": "Municipal leaders and services will expand faster when the product proves cleaner sites and visible action, not only more detections.", "evidenceToCollect": ["Which proof points most influence renewal and expansion decisions.", "Whether service and enforcement leaders agree on what counts as visible value."], "methods": ["Customer interviews", "Renewal review analysis", "Cross-account outcome comparison"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "The investment is worth scaling when it increases expansion and retention without requiring high-touch custom reporting for every municipality.", "evidenceToCollect": ["Which parts of value proof can be standardized.", "How much customer-success effort current proof demands."], "methods": ["Operating model review", "Unit economics analysis", "Portfolio planning workshop"]}], "plannedActivities": ["Compare mature and immature deployments on recurrence, cleanup speed, and renewal confidence.", "Replay the end-to-end flow from detection to service closure on repeat hotspots.", "Test which dashboard narratives actually change municipal stakeholder decisions."], "decisionToMake": "Decide which operational metrics and workflow changes should become the default municipal proof pack next quarter.", "startDate": "2026-03-05", "endDate": "2026-04-18", "statusLabel": "Ongoing", "landingPageIndex": 0, "date": "2026-03-05", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'Municipal Public Space Enforcement';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome) {
        const decisionColors = {'proceed': '#16a34a', 'narrow': '#d97706', 'sequence': '#6366f1', 'pivot': '#d97706', 'park': '#6b7280', 'kill': '#dc2626'};
        const dColor = decisionColors[discovery.outcome.decision] || '#6b7280';
        html += '<div class="section"><div class="section-title">Outcome</div>';
        if (discovery.outcome.decision) {
            html += '<div style="margin-bottom:10px"><span style="display:inline-block;padding:4px 12px;border-radius:999px;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + dColor + '">' + escapeHtml(discovery.outcome.decision) + '</span></div>';
        }
        if (discovery.outcome.summary) {
            html += '<div class="description">' + escapeHtml(discovery.outcome.summary) + '</div>';
        }
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Municipal Public Space Enforcement Home"
    },
    {
      "link": "../index.html",
      "label": "Discoveries"
    },
    {
      "label": "Hotspot proof depends on visible action, not only device rollout"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
