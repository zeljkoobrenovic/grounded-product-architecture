    <style>

            height: 24px;

            border-radius: 4px;
            border: 1px solid #d7dce1;

</td>

<script>
    const release = {"title": "Coordinated Cleanup and Executive Value Proof", "date": "2026-04-28", "description": "Release of Coordinated Cleanup and Executive Value Proof exists to connect enforcement, cleanup, and leadership reporting into one operating loop. The release concentrates on task dispatch, mobile closure, recurrence analytics, and executive dashboards so councils can prove service impact as well as enforcement impact.", "customerImpact": [{"customerId": "clom", "customer": {"id": "clom", "name": "Cleanliness Operations Manager", "group": "Public Space Service Management", "icon": "operations.png"}, "customerKPIs": [{"kpi": "Fast and targeted cleanup", "expectedImpact": "Reduce cleanup cycle time through better task context, field closure, and hotspot prioritization.", "description": "Reduce median time from validated incident to completed cleanup from 72 to 24 hours.", "unit": "hours", "currentValue": "72", "link": "https://dashboard.example.com/municipal-public-space-enforcement/customers/clom/fast-and-targeted-cleanup", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "30-day hotspot recurrence", "expectedImpact": "Reduce recurrence by making relocation and prevention decisions more evidence-based.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Service productivity gain", "expectedImpact": "Increase service productivity by reducing repeat visits and fragmented coordination.", "description": "Raise service productivity from 51 to 79 by cutting repeat visits and fragmented reporting.", "unit": "productivity index", "currentValue": "51", "link": "https://dashboard.example.com/municipal-public-space-enforcement/customers/clom/service-productivity-gain", "linkLabel": "Open KPI dashboard", "kind": "business"}, {"kpi": "Municipal value realization", "expectedImpact": "Improve renewal and expansion value proof by connecting service and enforcement economics.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "task", "change": "Released structured dispatch and service task tracking.", "brick": {"id": "task", "name": "Field Service Task Dispatch", "type": "full-stack", "description": "Assigns operational work to municipal services, cleanup crews, and field actors with enough context to act once.", "domain": "enforcement-operations", "group": "field-and-partner-workflows", "internalModules": [{"title": "Task Routing Engine", "description": "Determines which service or crew should receive each operational task.", "type": "automation"}, {"title": "Task Tracking Workspace", "description": "Shows open, in-progress, and completed interventions.", "type": "ui"}], "interfaces": [{"title": "Task Dispatch UI", "description": "Used by operators to dispatch and monitor service work.", "type": "ui"}, {"title": "Task Event Feed", "description": "Publishes task creation and completion state to adjacent workflows.", "type": "event"}], "dataDependencies": [{"assetId": "transaction", "role": "read", "description": "Reads Transaction to support domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "deployment-planning-and-site-selection", "role": "read", "description": "Reads Deployment Planning And Site Selection to support domain workflows.", "storeIds": ["deployment-planning-and-site-selection-db"]}], "brickDependencies": [{"targetBrickId": "case", "type": "workflow", "interface": "Case Workflow API", "description": "Creates tasks from validated incidents or case states."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "task.png"}}, {"brickId": "mobi", "change": "Released field completion and intervention-update workflow.", "brick": {"id": "mobi", "name": "Officer Mobile Workflow", "type": "full-stack", "description": "Supports field validation, intervention notes, task completion, and case follow-up from mobile surfaces.", "domain": "enforcement-operations", "group": "field-and-partner-workflows", "internalModules": [{"title": "Field Action UI", "description": "Provides mobile task and case views for field actors.", "type": "ui"}, {"title": "Offline Sync Layer", "description": "Keeps field updates resilient in patchy connectivity conditions.", "type": "integration"}], "interfaces": [{"title": "Mobile Workflow UI", "description": "Field-facing mobile interface for officers and crews.", "type": "mobile"}, {"title": "Field Update API", "description": "Synchronizes mobile actions back into cases and task flows.", "type": "api"}], "dataDependencies": [{"assetId": "customer-contact-point", "role": "read", "description": "Reads Customer Contact Point to support domain workflows.", "storeIds": ["customer-contact-point-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "enforcement-case", "role": "read", "description": "Reads Enforcement Case to support domain workflows.", "storeIds": ["enforcement-case-db"]}], "brickDependencies": [{"targetBrickId": "task", "type": "workflow", "interface": "Task Event Feed", "description": "Uses dispatched tasks as the starting point for field action."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "mobi.png"}}, {"brickId": "dash", "change": "Released executive value dashboard connecting outcome, service, and recovery data.", "brick": {"id": "dash", "name": "Executive Impact Dashboard", "type": "full-stack", "description": "Presents outcome, financial, and operational value proof for elected leaders and municipal executives.", "domain": "outcomes-and-stakeholder-experience", "group": "leadership-and-communications", "internalModules": [{"title": "Executive KPI Model", "description": "Aggregates the metrics used to prove municipal value.", "type": "analytics"}, {"title": "Leadership Reporting UI", "description": "Provides the visual dashboard used by leaders and sponsors.", "type": "ui"}], "interfaces": [{"title": "Executive Dashboard UI", "description": "Web interface for leaders and customer success teams.", "type": "ui"}], "dataDependencies": [{"assetId": "transaction", "role": "read", "description": "Reads Transaction to support domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "deployment-planning-and-site-selection", "role": "read", "description": "Reads Deployment Planning And Site Selection to support domain workflows.", "storeIds": ["deployment-planning-and-site-selection-db"]}], "brickDependencies": [{"targetBrickId": "anal", "type": "analytics", "interface": "Outcome Metric Feed", "description": "Uses normalized outcomes and benchmark metrics."}, {"targetBrickId": "finc", "type": "finance", "interface": "Treasury Integration API", "description": "Uses recovery data to show financial return."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "dash.png"}}], "deliveryChannels": [{"channelId": "prod_waste-web", "change": "Rolled out dispatch and recurrence views in the municipal web console.", "channel": {"productId": "prod_waste", "productName": "Waste Enforcement Network", "name": "Enforcement Operations Console", "type": "web", "icon": "web.png"}}, {"channelId": "municipal-api", "change": "Rolled out service and recovery data exchange for municipal systems.", "channel": {"productId": "municipal", "productName": "", "name": "municipal-api", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["mpe-field-response", "mpe-executive-insights"], "supportingTeamIds": ["mpe-municipal-integrations"]}, "initiativeId": "initiative-municipal-public-space-enforcement-2026-04-28-02", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Municipal Public Space Enforcement';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Municipal Public Space Enforcement Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Coordinated Cleanup and Executive Value Proof"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
