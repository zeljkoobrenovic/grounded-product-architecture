    <style>

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;

    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">

<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>

</td>
<td>

<h1 id="Title"></h1>

</td>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Waste Enforcement Standard Deployment Pack", "date": "2026-02-18", "description": "Release of Waste Enforcement Standard Deployment Pack exists to make first hotspot rollout faster, safer, and more repeatable across municipalities. The release concentrates on hotspot scoring, field rollout reliability, and governance-ready deployment so the initial value proof appears quickly in councils that need visible public action.", "customerImpact": [{"customerId": "mayr", "customer": {"id": "mayr", "name": "Mayor / Deputy Mayor", "group": "Elected Municipal Leadership", "icon": "leadership.png"}, "customerKPIs": [{"kpi": "Days from deployment to first actionable case", "expectedImpact": "Reduce time to first actionable case by making site selection, deployment, and field activation more repeatable.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Public-space nuisance reduction", "expectedImpact": "Improve public-space nuisance reduction by focusing field capacity on the highest-value hotspots.", "description": "Cut confirmed fly-tipping incidents in instrumented zones from 14.2 to 5.0 per zone per month.", "unit": "confirmed incidents / zone / month", "currentValue": "14.2", "link": "https://dashboard.example.com/municipal-public-space-enforcement/customers/mayr/public-space-nuisance-reduction", "linkLabel": "Open KPI dashboard", "kind": "customer"}], "businessKPIs": [{"kpi": "Cleanup cost avoided", "expectedImpact": "Increase avoided cleanup cost by improving the speed and quality of first deployments.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "dppl", "change": "Released repeatable hotspot scoring and deployment recommendation workflows.", "brick": {"id": "dppl", "name": "Deployment Planning and Site Selection", "type": "full-stack", "description": "Prioritizes which public-space hotspots should be instrumented, how long equipment should remain in place, and when a site should be moved or escalated.", "domain": "field-detection-network", "group": "deployment-and-edge-infrastructure", "internalModules": [{"title": "Hotspot Scoring Model", "description": "Ranks sites using recurrence, resident complaints, cleanup cost, and enforcement probability.", "type": "service"}, {"title": "Deployment Recommendation Workspace", "description": "Lets operators plan deployment, relocation, and site review decisions.", "type": "ui"}], "interfaces": [{"title": "Deployment Planning UI", "description": "Used by deployment and operations teams to approve siting decisions.", "type": "ui"}, {"title": "Hotspot Scoring API", "description": "Provides scored site recommendations to adjacent workflows.", "type": "api"}], "brickDependencies": [{"targetBrickId": "mapi", "type": "analytics", "interface": "Spatial Incident Feed", "description": "Uses Geospatial Incident Map data to understand recurrence and territory coverage."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "dppl.png"}}, {"brickId": "edgc", "change": "Released updated field configuration for faster site activation.", "brick": {"id": "edgc", "name": "Edge Camera and Sensor Unit", "type": "full-stack", "description": "The movable field hardware surface that captures suspicious activity and media evidence in selected public-space zones.", "domain": "field-detection-network", "group": "deployment-and-edge-infrastructure", "internalModules": [{"title": "On-device Capture Logic", "description": "Controls event-triggered capture and local media buffering.", "type": "service"}, {"title": "Remote Configuration Layer", "description": "Receives deployment and capture policy updates from the control plane.", "type": "integration"}], "interfaces": [{"title": "Field Capture Interface", "description": "Physical and digital capture surface operating on municipal hotspots.", "type": "device"}, {"title": "Remote Device Control API", "description": "Remote activation and configuration surface.", "type": "api"}], "brickDependencies": [{"targetBrickId": "gate", "type": "network", "interface": "Secure Transport", "description": "Uses secure gateway connectivity to transport events and media."}, {"targetBrickId": "zone", "type": "governance", "interface": "Capture Policy", "description": "Applies privacy zoning rules before media is persisted."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "edgc.png"}}, {"brickId": "heal", "change": "Released fleet-health dashboards for deployment and relocation teams.", "brick": {"id": "heal", "name": "Device Health and Fleet Monitoring", "type": "service", "description": "Tracks uptime, battery state, connectivity quality, and maintenance needs across the deployed field fleet.", "domain": "field-detection-network", "group": "deployment-and-edge-infrastructure", "internalModules": [{"title": "Fleet Telemetry Store", "description": "Stores health events from all active field units.", "type": "service"}, {"title": "Maintenance Alert Engine", "description": "Triggers relocation or maintenance actions when health degrades.", "type": "automation"}], "interfaces": [{"title": "Fleet Health Dashboard", "description": "Used by operations teams to monitor and maintain the installed base.", "type": "ui"}, {"title": "Fleet Health Event Feed", "description": "Provides status events to deployment and tasking workflows.", "type": "event"}], "brickDependencies": [{"targetBrickId": "solr", "type": "telemetry", "interface": "Power Telemetry Feed", "description": "Uses power state signals to understand field reliability."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "heal.png"}}], "deliveryChannels": [{"channelId": "prod_waste-edge", "change": "Rolled out the standard hotspot edge configuration to new deployments.", "channel": {"productId": "prod_waste", "productName": "", "name": "prod_waste-edge", "type": "product", "icon": "product.png"}}, {"channelId": "prod_waste-web", "change": "Rolled out deployment-planning support in the municipal web console.", "channel": {"productId": "prod_waste", "productName": "Waste Enforcement Network", "name": "Enforcement Operations Console", "type": "web", "icon": "web.png"}}], "teams": {"primaryTeamIds": ["mpe-site-planning", "mpe-edge-reliability"], "supportingTeamIds": ["mpe-executive-insights"]}, "initiativeId": "initiative-municipal-public-space-enforcement-2026-02-18-00", "landingPageIndex": 2, "objectiveLandingPageUrl": ""};
    const domainName = 'Municipal Public Space Enforcement';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Municipal Public Space Enforcement Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Waste Enforcement Standard Deployment Pack"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
