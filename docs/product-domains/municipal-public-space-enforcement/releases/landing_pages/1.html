<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Municipal Public Space Enforcement)</title>
    <style>

</style>
    <style>
    .breadcrumbs-container {

    }

</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Enforceable Case Flow", "date": "2026-03-21", "description": "Release of Enforceable Case Flow exists to turn a larger share of qualified incidents into legally usable cases while reducing officer paperwork. The release concentrates on evidence governance, case workflow, and notice generation so councils can show not just activity, but real enforceable outcomes.", "customerImpact": [{"customerId": "lpch", "customer": {"id": "lpch", "name": "Head of Local Police", "group": "Enforcement and Compliance Operations", "icon": "police.png"}, "customerKPIs": [{"kpi": "Enforceable case throughput", "expectedImpact": "Increase case throughput by reducing procedural friction and evidence handling overhead.", "description": "Increase qualified incidents converted into enforceable case files from 18 to 55 per month.", "unit": "cases / month", "currentValue": "18", "link": "https://dashboard.example.com/municipal-public-space-enforcement/customers/lpch/enforceable-case-throughput", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Officer time spent per incident", "expectedImpact": "Reduce officer handling time by automating more of the case assembly and document-generation flow.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Officer admin hours per case", "expectedImpact": "Reduce administrative hours per case through stronger workflow automation.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}, {"kpi": "Fines collected", "expectedImpact": "Increase collected fines by producing more complete and timely sanction packs.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "evid", "change": "Released stronger chain-of-custody and case-linked evidence handling.", "brick": {"id": "evid", "name": "Evidence Vault and Chain of Custody", "type": "service", "description": "Stores evidence, metadata, timestamps, and provenance needed to support enforceable municipal procedures.", "domain": "evidence-and-incident-processing", "group": "evidence-governance", "internalModules": [{"title": "Governed Evidence Store", "description": "Persists evidence securely with case linkage and integrity metadata.", "type": "service"}, {"title": "Chain-of-Custody Tracker", "description": "Records how evidence is accessed, moved, and used in procedures.", "type": "governance"}], "interfaces": [{"title": "Evidence Access API", "description": "Retrieves case-linked evidence under access controls.", "type": "api"}], "brickDependencies": [{"targetBrickId": "zone", "type": "governance", "interface": "Capture Policy API", "description": "Uses zoning and masking outputs to keep evidence aligned with approved capture boundaries."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "evid.png"}}, {"brickId": "case", "change": "Released guided case workflow for validated incidents.", "brick": {"id": "case", "name": "Enforcement Case Workspace", "type": "full-stack", "description": "Organizes incidents, evidence, people, case state, and actions into one municipal case record.", "domain": "enforcement-operations", "group": "case-and-procedure", "internalModules": [{"title": "Case State Model", "description": "Tracks incident, case, and sanction lifecycle state.", "type": "service"}, {"title": "Operator Workflow UI", "description": "Provides the main workflow for review, progression, and action.", "type": "ui"}], "interfaces": [{"title": "Case Workspace UI", "description": "Main operational interface for case handling.", "type": "ui"}, {"title": "Case Workflow API", "description": "Exposes case data and progression actions.", "type": "api"}], "brickDependencies": [{"targetBrickId": "triag", "type": "workflow", "interface": "Prioritized Incident API", "description": "Turns qualified incidents into case records."}, {"targetBrickId": "evid", "type": "data", "interface": "Evidence Access API", "description": "Links admissible evidence into the case record."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "case.png"}}, {"brickId": "nota", "change": "Released structured notice and sanction pack generation.", "brick": {"id": "nota", "name": "Notice and Fine Pack Generator", "type": "service", "description": "Generates the notice, sanction, and supporting procedural material required to move a case into formal municipal action.", "domain": "enforcement-operations", "group": "case-and-procedure", "internalModules": [{"title": "Document Assembly Engine", "description": "Creates notices and supporting packs from case data and templates.", "type": "automation"}, {"title": "Sanction Output Store", "description": "Stores generated documents and their issue state.", "type": "service"}], "interfaces": [{"title": "Document Generation API", "description": "Produces notices and sanction packages on demand.", "type": "api"}], "brickDependencies": [{"targetBrickId": "proc", "type": "workflow", "interface": "Procedure API", "description": "Uses the right procedure path to determine which pack to generate."}, {"targetBrickId": "case", "type": "data", "interface": "Case Workflow API", "description": "Uses case data to populate the generated pack."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "nota.png"}}], "deliveryChannels": [{"channelId": "prod_case-evidence", "change": "Rolled out updated evidence governance controls in the EU evidence plane.", "channel": {"productId": "prod_case", "productName": "", "name": "prod_case-evidence", "type": "product", "icon": "product.png"}}, {"channelId": "prod_case-web", "change": "Rolled out the guided case workflow in the municipal web console.", "channel": {"productId": "prod_case", "productName": "Compliance and Case Management", "name": "Case Workspace", "type": "web", "icon": "web.png"}}], "teams": {"primaryTeamIds": ["mpe-evidence-intelligence", "mpe-compliance-case-core"], "supportingTeamIds": ["mpe-municipal-integrations"]}, "initiativeId": "initiative-municipal-public-space-enforcement-2026-03-21-01", "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Municipal Public Space Enforcement';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Municipal Public Space Enforcement Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Enforceable Case Flow"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
