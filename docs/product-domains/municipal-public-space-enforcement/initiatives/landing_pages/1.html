    <style>

        .entity-link {

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;

        .pill-icon {

            height: 24px;

            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>

<script>
    const initiative = {"title": "Coordinated Cleanup Loop", "date": "2026-04-10", "description": "Coordinated Cleanup Loop exists to connect enforcement, task dispatch, mobile closure, and recurrence analysis into one municipal operating loop. The quarter concentrates on field workflow quality, service-system fit, and recurrence-aware hotspot decisions so councils see cleaner sites, not just more alerts.", "customerImpact": [{"customerId": "clom", "customer": {"id": "clom", "name": "Cleanliness Operations Manager", "group": "Public Space Service Management", "icon": "operations.png"}, "customerKPIs": [{"kpi": "Fast and targeted cleanup", "expectedImpact": "Reduce validated-incident-to-cleanup time through better dispatch quality and mobile completion.", "description": "Reduce median time from validated incident to completed cleanup from 72 to 24 hours.", "unit": "hours", "currentValue": "72", "link": "https://dashboard.example.com/municipal-public-space-enforcement/customers/clom/fast-and-targeted-cleanup", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "30-day hotspot recurrence", "expectedImpact": "Reduce recurrence by combining better task closure with improved relocation and hotspot analytics.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Service productivity gain", "expectedImpact": "Increase service productivity by reducing repeat visits and manual status reconciliation.", "description": "Raise service productivity from 51 to 79 by cutting repeat visits and fragmented reporting.", "unit": "productivity index", "currentValue": "51", "link": "https://dashboard.example.com/municipal-public-space-enforcement/customers/clom/service-productivity-gain", "linkLabel": "Open KPI dashboard", "kind": "business"}, {"kpi": "Municipal value realization", "expectedImpact": "Increase visible municipal value by connecting service and enforcement economics.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "task", "change": "Released structured dispatch and shared task state.", "brick": {"id": "task", "name": "Field Service Task Dispatch", "type": "full-stack", "description": "Assigns operational work to municipal services, cleanup crews, and field actors with enough context to act once.", "domain": "enforcement-operations", "group": "field-and-partner-workflows", "internalModules": [{"title": "Task Routing Engine", "description": "Determines which service or crew should receive each operational task.", "type": "automation"}, {"title": "Task Tracking Workspace", "description": "Shows open, in-progress, and completed interventions.", "type": "ui"}], "interfaces": [{"title": "Task Dispatch UI", "description": "Used by operators to dispatch and monitor service work.", "type": "ui"}, {"title": "Task Event Feed", "description": "Publishes task creation and completion state to adjacent workflows.", "type": "event"}], "brickDependencies": [{"targetBrickId": "case", "type": "workflow", "interface": "Case Workflow API", "description": "Creates tasks from validated incidents or case states."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "task.png"}}, {"brickId": "mobi", "change": "Released field completion and intervention-update workflow.", "brick": {"id": "mobi", "name": "Officer Mobile Workflow", "type": "full-stack", "description": "Supports field validation, intervention notes, task completion, and case follow-up from mobile surfaces.", "domain": "enforcement-operations", "group": "field-and-partner-workflows", "internalModules": [{"title": "Field Action UI", "description": "Provides mobile task and case views for field actors.", "type": "ui"}, {"title": "Offline Sync Layer", "description": "Keeps field updates resilient in patchy connectivity conditions.", "type": "integration"}], "interfaces": [{"title": "Mobile Workflow UI", "description": "Field-facing mobile interface for officers and crews.", "type": "mobile"}, {"title": "Field Update API", "description": "Synchronizes mobile actions back into cases and task flows.", "type": "api"}], "brickDependencies": [{"targetBrickId": "task", "type": "workflow", "interface": "Task Event Feed", "description": "Uses dispatched tasks as the starting point for field action."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "mobi.png"}}, {"brickId": "anal", "change": "Released recurrence and hotspot benchmark metrics.", "brick": {"id": "anal", "name": "Outcome Analytics and Benchmarking", "type": "service", "description": "Computes outcome metrics, recurrence trends, benchmark views, and longitudinal value proof across sites and municipalities.", "domain": "outcomes-and-stakeholder-experience", "group": "leadership-and-communications", "internalModules": [{"title": "Outcome Metric Pipeline", "description": "Normalizes data from incidents, tasks, cases, and recoveries into outcome metrics.", "type": "analytics"}, {"title": "Benchmarking Layer", "description": "Supports comparison across sites, periods, and municipalities.", "type": "analytics"}], "interfaces": [{"title": "Outcome Metric Feed", "description": "Provides reusable KPI and benchmark outputs to dashboards and planning workflows.", "type": "api"}], "brickDependencies": [{"targetBrickId": "mapi", "type": "analytics", "interface": "Spatial Context API", "description": "Uses hotspot history to understand recurrence and site-level change."}, {"targetBrickId": "task", "type": "event", "interface": "Task Event Feed", "description": "Uses intervention outcomes to quantify operational impact."}, {"targetBrickId": "finc", "type": "finance", "interface": "Treasury Integration API", "description": "Uses sanction and payment outcomes to quantify economic value."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "anal.png"}}], "deliveryChannels": [{"channelId": "prod_waste-web", "change": "Deployed dispatch and recurrence views in the municipal web console.", "channel": {"productId": "prod_waste", "productName": "Waste Enforcement Network", "name": "Enforcement Operations Console", "type": "web", "icon": "web.png"}}, {"channelId": "municipal-api", "change": "Deployed service task and closure exchange in the municipal integration API.", "channel": {"productId": "municipal", "productName": "", "name": "municipal-api", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["mpe-field-response", "mpe-executive-insights"], "supportingTeamIds": ["mpe-site-planning", "mpe-municipal-integrations"]}, "initiativeId": "initiative-municipal-public-space-enforcement-2026-04-10-02", "priority": "p1", "keyResultId": "municipal-public-space-enforcement-2026-q2-clom/kr-clom-cleanup-time", "discoveryIds": ["discovery-municipal-public-space-enforcement-2026-03-05-00-hotspot-proof"], "discoveryLinks": [{"discoveryId": "discovery-municipal-public-space-enforcement-2026-03-05-00-hotspot-proof", "discoveryName": "Hotspot proof depends on visible action, not only device rollout", "status": "ongoing", "landingPageIndex": 0}], "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Municipal Public Space Enforcement';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Municipal Public Space Enforcement Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Coordinated Cleanup Loop"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
