        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function parseDate(dateValue) {
        if (!dateValue) return null;
        const date = new Date(dateValue + 'T00:00:00');
        return isNaN(date.getTime()) ? null : date;
    }

    function renderDateCard(dateValue) {
        if (!dateValue) {
            return '<div class="date-card"><div class="date-card-day">-</div><div class="date-card-month">N/A</div><div class="date-card-year"></div></div>';
        }
        const date = parseDate(dateValue);
        if (!date) {
            return '<div class="date-card"><div class="date-card-day">-</div><div class="date-card-month">N/A</div><div class="date-card-year">' + escapeHtml(dateValue) + '</div></div>';
        }
        const day = date.toLocaleDateString('en-GB', {day: '2-digit'});
        const month = date.toLocaleDateString('en-GB', {month: 'short'}).toUpperCase();
        const year = date.toLocaleDateString('en-GB', {year: 'numeric'});
        return '<div class="date-card"><div class="date-card-day">' + escapeHtml(day) + '</div><div class="date-card-month">' + escapeHtml(month) + '</div><div class="date-card-year">' + escapeHtml(year) + '</div></div>';
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function uniqueEntities(entities) {
        const seen = new Set();
        return entities.filter(entity => {
            if (seen.has(entity.key)) {
                return false;
            }
            seen.add(entity.key);
            return true;
        });
    }

    function renderIconRow(entities, centered = false) {
        if (!entities.length) {
            return '';
        }
        let html = '<div class="icon-row' + (centered ? ' centered' : '') + '">';
        entities.forEach(entity => {
            const iconClass = entity.iconClass
                ? 'entity-icon-tile ' + entity.iconClass
                : 'entity-icon-tile';
            if (entity.href) {
                html += '<a class="entity-icon-link" target="_blank" rel="noopener noreferrer" href="' + escapeHtml(entity.href) + '" title="' + escapeHtml(entity.label) + '">';
            } else {
                html += '<span class="entity-icon-link" title="' + escapeHtml(entity.label) + '">';
            }
            html += '<img class="' + escapeHtml(iconClass) + '" src="' + escapeHtml(entity.src) + '" alt="' + escapeHtml(entity.label) + '" onerror="this.onerror=null;this.src=\'' + escapeHtml(entity.fallback) + '\'">';
            html += entity.href ? '</a>' : '</span>';
        });
        html += '</div>';
        return html;
    }

    function startOfWeek(date) {
        const value = new Date(date);
        const day = value.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        value.setDate(value.getDate() + diff);
        value.setHours(0, 0, 0, 0);
        return value;
    }

    function addDays(date, days) {
        const value = new Date(date);
        value.setDate(value.getDate() + days);
        return value;
    }

    function isoDate(date) {
        return date.toISOString().slice(0, 10);
    }

    function intensityLevel(count) {
        if (count >= 4) return 4;
        if (count === 3) return 3;
        if (count === 2) return 2;
        if (count === 1) return 1;
        return 0;
    }

    function renderTimeline() {
        const timelineEl = document.getElementById('Timeline');
        const datedItems = items
            .map(item => ({item, parsedDate: parseDate(item.date)}))
            .filter(entry => entry.parsedDate);

        if (!datedItems.length) {
            timelineEl.innerHTML = '';
            return;
        }

        const latestDate = datedItems.reduce((latest, entry) => entry.parsedDate > latest ? entry.parsedDate : latest, datedItems[0].parsedDate);
        const endDate = new Date(latestDate);
        endDate.setHours(0, 0, 0, 0);
        const startDate = addDays(endDate, -364);
        const weekStart = startOfWeek(startDate);

        const dailyCounts = {};
        datedItems.forEach(entry => {
            if (entry.parsedDate >= startDate && entry.parsedDate <= endDate) {
                const key = isoDate(entry.parsedDate);
                dailyCounts[key] = (dailyCounts[key] || 0) + 1;
            }
        });

        const monthLabels = [];
        for (let i = 0; i < 12; i += 1) {
            const monthDate = new Date(endDate.getFullYear(), endDate.getMonth() - (11 - i), 1);
            monthLabels.push(monthDate.toLocaleDateString('en-GB', {month: 'short'}));
        }

        let monthHtml = '';
        monthLabels.forEach(label => {
            monthHtml += '<div class="timeline-month">' + escapeHtml(label) + '</div>';
        });

        let cellsHtml = '';
        for (let week = 0; week < 53; week += 1) {
            let weeklyCount = 0;
            const tooltipParts = [];
            for (let day = 0; day < 7; day += 1) {
                const currentDate = addDays(weekStart, week * 7 + day);
                const key = isoDate(currentDate);
                const count = dailyCounts[key] || 0;
                weeklyCount += count;
                if (count) {
                    tooltipParts.push(currentDate.toLocaleDateString('en-GB', {day: '2-digit', month: 'short', year: 'numeric'}) + ': ' + count + ' release' + (count > 1 ? 's' : ''));
                }
            }
            const title = tooltipParts.length ? tooltipParts.join(' | ') : 'No releases this week';
            cellsHtml += '<div class="timeline-cell level-' + intensityLevel(weeklyCount) + '" title="' + escapeHtml(title) + '"></div>';
        }

        const totalInWindow = Object.values(dailyCounts).reduce((sum, count) => sum + count, 0);
        timelineEl.innerHTML =
            '<div class="timeline-panel">' +
                '<div class="timeline-header">' +
                    '<div class="timeline-title">Release Timeline</div>' +
                    '<div class="timeline-meta">' + escapeHtml(formatDate(isoDate(startDate))) + ' to ' + escapeHtml(formatDate(isoDate(endDate))) + ' | ' + totalInWindow + ' releases</div>' +
                '</div>' +
                '<div class="timeline-months">' + monthHtml + '</div>' +
                '<div class="timeline-grid">' + cellsHtml + '</div>' +
                '<div class="timeline-legend">' +
                    '<span>Less</span>' +
                    '<span class="timeline-legend-box"></span>' +
                    '<span class="timeline-legend-box timeline-cell level-1"></span>' +
                    '<span class="timeline-legend-box timeline-cell level-2"></span>' +
                    '<span class="timeline-legend-box timeline-cell level-3"></span>' +
                    '<span class="timeline-legend-box timeline-cell level-4"></span>' +
                    '<span>More</span>' +
                '</div>' +
            '</div>';
    }

    function renderTableTab() {
        if (!items.length) {
            document.getElementById('Table').innerHTML = '<div class="empty">No releases available.</div>';
            return;
        }
        let html = '<div class="table-wrap"><table>';
        html += '<tr><th>Date</th><th>Customers</th><th>Release</th><th>Products & Channels</th><th>Product Bricks</th></tr>';
        items.forEach((item, index) => {
            html += '<tr>';
            html += '<td class="date-cell">' + renderDateCard(item.date) + '</td>';
            const customerIcons = uniqueEntities((item.customerImpact || []).map(impact => ({
                key: impact.customerId || impact.customer.name,
                label: impact.customer.name,
                src: '../customers/icons/' + (impact.customer.icon || 'customer.png'),
                fallback: '../customers/icons/customer.png',
                href: '../customers/landing_pages/' + (impact.customer.id || impact.customerId) + '.html',
                iconClass: 'customer-icon'
            })));
            html += '<td style="max-width:180px; text-align: center">' + renderIconRow(customerIcons, true) + '</td>';
            const detailUrl = item.objectiveLandingPageUrl || ('landing_pages/' + index + '.html');
            html += '<td style="min-width:300px"><a target="_blank" href="' + escapeHtml(detailUrl) + '"><div style="font-weight: bold; font-size: 130%; color: blue">' + escapeHtml(item.title || item.description || 'Release') + '</div></a>';
            if (item.description) {
                html += '<div class="pill-meta" style="margin-top:6px">' + escapeHtml(item.description) + '</div>';
            }
            html += '<div style="margin-top:8px"><a target="_blank" href="' + escapeHtml(detailUrl) + '">Open</a></div>';
            html += '</td>';

            const productAndChannelIcons = uniqueEntities((item.deliveryChannels || []).flatMap(channel => {
                const productHref = channel.channel.productId
                    ? '../products/landing_pages/' + channel.channel.productId + '.html'
                    : '';
                const entities = [];
                if (channel.channel.productName || channel.channel.productId) {
                    entities.push({
                        key: 'product-' + (channel.channel.productId || channel.channel.productName),
                        label: channel.channel.productName || channel.channel.name,
                        src: '../products/icons/' + (channel.channel.icon || 'product.png'),
                        fallback: '../products/icons/product.png',
                        href: productHref
                    });
                }
                entities.push({
                    key: 'channel-' + (channel.channelId || channel.channel.name),
                    label: channel.channel.name,
                    src: '../products/icons/' + (channel.channel.icon || 'product.png'),
                    fallback: '../products/icons/product.png',
                    href: productHref
                });
                return entities;
            }));
            html += '<td style="min-width:180px">' + renderIconRow(productAndChannelIcons) + '</td>';

            const productBrickIcons = uniqueEntities((item.productBricks || []).map(brick => ({
                key: brick.brickId || brick.brick.name,
                label: brick.brick.name,
                src: '../product-bricks/icons/' + (brick.brick.icon || 'logo.png'),
                fallback: '../product-bricks/icons/logo.png',
                href: '../product-bricks/landing_pages/' + (brick.brick.id || brick.brickId) + '.html'
            })));
            html += '<td style="min-width:180px">' + renderIconRow(productBrickIcons) + '</td>';
            html += '</tr>';
        });
        html += '</table></div>';
        document.getElementById('Table').innerHTML = html;
    }
    renderTimeline();
    renderTableTab();
</script>
</body>
</html>
