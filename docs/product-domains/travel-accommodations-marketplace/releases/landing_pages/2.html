    <style>

        .pill-name {

            color: blue;

anagement.", "domain": "Traveler Experience", "group": "Booking and trip management", "internalModules": [{"title": "Checkout State and Eligibility", "description": "Validates bookability, rate conditions, traveler data, and policy constraints.", "type": "service"}, {"title": "Reservation Orchestration", "description": "Creates and updates booking records across marketplace and partner systems.", "type": "integration"}, {"title": "Policy and Disclosure Layer", "description": "Normalizes traveler-facing disclosure of payment, cancellation, and host-type obligations.", "type": "service"}], "interfaces": [{"title": "Checkout UI", "description": "Traveler-facing booking flow.", "type": "ui"}, {"title": "Reservation API", "description": "API used for reservation creation and update workflows.", "type": "api"}, {"title": "Reservation Event Feed", "description": "Publishes new booking and booking-state transition events.", "type": "event"}], "dataDependencies": [{"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "checkout-booking-orchestration", "role": "own", "description": "Acts as the primary owning brick for Checkout Booking Orchestration.", "storeIds": ["checkout-booking-orchestration-db"]}], "brickDependencies": [{"targetBrickId": "room", "type": "offer-selection", "interface": "Room offer API", "description": "Uses selected room and rate context to create the booking."}, {"targetBrickId": "paym", "type": "payment", "interface": "Payment authorization", "description": "Uses payment orchestration for charge, guarantee, and refund flows."}, {"targetBrickId": "conn", "type": "partner-sync", "interface": "Reservation push", "description": "Coordinates with partner connectivity where required."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "book.png"}}, {"brickId": "paym", "change": "Normalize payment-model explanation across properties and markets.", "brick": {"id": "paym", "name": "Payments & Payouts", "type": "service", "description": "Payment collection, guarantees, payout orchestration, refunds, disputes, and finance visibility for multiple payment models.", "domain": "Marketplace Foundations", "group": "Payments and recovery", "internalModules": [{"title": "Traveler Payment Orchestration", "description": "Supports card capture, authorization, charge, and refund flows.", "type": "service"}, {"title": "Partner Remittance and Reconciliation", "description": "Handles payout scheduling, adjustments, and finance reconciliation.", "type": "service"}, {"title": "Payment Model Normalization", "description": "Normalizes pay-now, pay-later, pay-at-property, and managed-payment logic across markets.", "type": "service"}], "interfaces": [{"title": "Payments API", "description": "Finance API used by traveler and partner workflows.", "type": "api"}, {"title": "Payment State Feed", "description": "Event stream for authorizations, captures, refunds, and payout transitions.", "type": "event"}], "dataDependencies": [{"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "checkout-booking-orchestration", "role": "read", "description": "Reads Checkout Booking Orchestration to support domain workflows.", "storeIds": ["checkout-booking-orchestration-db"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"system": "Payment Service Providers", "type": "external-fintech", "interface": "Card and transfer APIs", "description": "Uses card processing and payout rails."}], "externalSystemsDependingOnThisBrick": [], "icon": "paym.png"}}, {"brickId": "trip", "change": "Improve booking confirmation and post-booking expectation setting.", "brick": {"id": "trip", "name": "Trip Management & Messaging", "type": "full-stack", "description": "Itinerary views, pre-stay and post-booking messaging, traveler self-service, and reservation-state communication.", "domain": "Traveler Experience", "group": "Booking and trip management", "internalModules": [{"title": "Trip Timeline", "description": "Maintains the customer-visible state of the stay journey.", "type": "full-stack"}, {"title": "Message and Notification Routing", "description": "Routes communications between traveler, property, and support flows.", "type": "service"}, {"title": "Trip Status Explanation Layer", "description": "Explains key itinerary states, next actions, and issue-prevention guidance.", "type": "service"}], "interfaces": [{"title": "Trip UI", "description": "Traveler trip management interface across app and web.", "type": "ui"}, {"title": "Trip API", "description": "API for traveler itinerary state, trip actions, and communications.", "type": "api"}, {"title": "Notification Event Feed", "description": "Event stream driving confirmations, reminders, and update notifications.", "type": "event"}], "dataDependencies": [{"assetId": "trip-management-messaging", "role": "own", "description": "Acts as the primary owning brick for Trip Management Messaging.", "storeIds": ["trip-management-messaging-db"]}, {"assetId": "checkout-booking-orchestration", "role": "read", "description": "Reads Checkout Booking Orchestration to support domain workflows.", "storeIds": ["checkout-booking-orchestration-db"]}, {"assetId": "traveler-account-wallet", "role": "read", "description": "Reads Traveler Account Wallet to support domain workflows.", "storeIds": ["traveler-account-wallet-store"]}], "brickDependencies": [{"targetBrickId": "book", "type": "state", "interface": "Booking state feed", "description": "Depends on booking-state changes from checkout orchestration."}, {"targetBrickId": "msgc", "type": "communication", "interface": "Messaging API", "description": "Uses guest-property communication services inside the trip journey."}, {"targetBrickId": "supp", "type": "escalation", "interface": "Support case handoff", "description": "Escalates difficult issues into support operations."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "trip.png"}}], "deliveryChannels": [{"channelId": "traveler-web", "change": "Roll out clarified checkout copy and state transitions on web.", "channel": {"productId": "traveler", "productName": "", "name": "traveler-web", "type": "product", "icon": "product.png"}}, {"channelId": "checkout-runtime", "change": "Release new booking-state and payment-model logic in backend services.", "channel": {"productId": "checkout", "productName": "", "name": "checkout-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["booking-and-trip-confidence"], "supportingTeamIds": ["payments-and-financial-operations", "trust-and-marketplace-integrity"]}, "initiativeId": "initiative-travel-accommodations-marketplace-2026-04-15-01", "landingPageIndex": 2, "objectiveLandingPageUrl": ""};
    const domainName = 'Travel Accommodations Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Travel Accommodations Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Traveler Checkout Clarity Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
