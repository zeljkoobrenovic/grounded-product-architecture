    <style>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Host Activation Simplification Release", "date": "2026-06-12", "description": "Release focused on reducing setup friction for smaller hosts through clearer defaults, policy explanations, and first-booking guidance.", "customerImpact": [{"customerId": "cg4-p1", "customer": {"id": "cg4-p1", "name": "Independent Host / Holiday Rental Operator", "group": "Supply-Side Partners", "icon": "host.png"}, "customerKPIs": [{"kpi": "First-booking speed", "expectedImpact": "Reduce time to first booking by simplifying onboarding and early merchandising choices.", "description": "Time from listing creation to first confirmed reservation for a new host or unit.", "unit": "days", "currentValue": "7.3", "link": "https://dashboard.example.com/travel-accommodations-marketplace/customers/cg4-p1/kpis/co-cg4-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Host setup time", "expectedImpact": "Reduce setup time through clearer defaults and fewer confusing decisions.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Alternative-accommodation supply activation", "expectedImpact": "Increase live, bookable homes supply entering the marketplace.", "description": "Activation and retention of non-hotel inventory that becomes bookable and stays live on the marketplace.", "unit": "index", "currentValue": "50", "link": "https://dashboard.example.com/travel-accommodations-marketplace/customers/cg4-p1/kpis/bo-cg4-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "extr", "change": "Simplify host onboarding and property setup.", "brick": {"id": "extr", "name": "Partner Extranet", "type": "full-stack", "description": "Partner-facing control surface for listing setup, policies, reservation operations, finance visibility, and performance management.", "domain": "Partner Operations", "group": "Supply onboarding and content", "internalModules": [{"title": "Partner Control UI", "description": "Primary browser workspace for property partners and hosts.", "type": "full-stack"}, {"title": "Operational Workbench", "description": "Brings together reservations, finance, and quality actions for partners.", "type": "service"}], "interfaces": [{"title": "Partner UI", "description": "Partner-facing operational interface.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "idam", "type": "identity", "interface": "Partner authentication API", "description": "Uses shared identity and access controls for partner authentication."}, {"targetBrickId": "paym", "type": "finance", "interface": "Finance reporting API", "description": "Shows payment, payout, and adjustment detail."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "extr.png"}}, {"brickId": "invt", "change": "Improve booking-preference and calendar defaults for new hosts.", "brick": {"id": "invt", "name": "Inventory, Rates & Reservations", "type": "service", "description": "Rate, availability, room, reservation, and booking-state backbone for accommodation supply.", "domain": "Partner Operations", "group": "Inventory and commercial performance", "internalModules": [{"title": "Rate and Availability Core", "description": "Stores and resolves rate and availability conditions.", "type": "service"}, {"title": "Reservation State Machine", "description": "Tracks reservation status and operational transitions.", "type": "service"}, {"title": "Supply Integrity Controls", "description": "Applies validation and conflict rules to prevent inconsistent bookable inventory.", "type": "service"}], "interfaces": [{"title": "Supply Core API", "description": "API for rates, availability, and reservations.", "type": "api"}, {"title": "Reservation Event Feed", "description": "Event stream for reservation and availability changes across systems.", "type": "event"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"system": "Property Management Systems", "type": "partner-system", "interface": "Availability and reservation sync", "description": "Consumes and emits reservation state to PMS and channel manager systems."}], "externalSystemsDependingOnThisBrick": [], "icon": "invt.png"}}, {"brickId": "trst", "change": "Clarify host trust, guest-quality, and protection cues.", "brick": {"id": "trst", "name": "Trust, Verification & Risk Controls", "type": "service", "description": "Host verification, fraud checks, abuse prevention, incident handling, and risk scoring across bookings, reviews, and messaging.", "domain": "Marketplace Foundations", "group": "Trust, connectivity, and intelligence", "internalModules": [{"title": "Identity and Verification", "description": "Handles partner and host verification requirements.", "type": "service"}, {"title": "Fraud and Abuse Controls", "description": "Scores risky booking, payment, and interaction patterns.", "type": "service"}, {"title": "Integrity Operations Layer", "description": "Supports manual review and policy handling for high-risk marketplace incidents.", "type": "service"}], "interfaces": [{"title": "Trust API", "description": "Trust and risk decision service.", "type": "api"}, {"title": "Risk Signal Feed", "description": "Event stream carrying risk and marketplace integrity signals.", "type": "event"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "trst.png"}}], "deliveryChannels": [{"channelId": "partner-web", "change": "Launch a simplified host setup flow in the partner extranet.", "channel": {"productId": "partner", "productName": "", "name": "partner-web", "type": "product", "icon": "product.png"}}, {"channelId": "supply-runtime", "change": "Release new onboarding defaults in supply services.", "channel": {"productId": "supply", "productName": "", "name": "supply-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["homes-host-platform"], "supportingTeamIds": ["trust-and-marketplace-integrity", "payments-and-financial-operations"]}, "initiativeId": "initiative-travel-accommodations-marketplace-2026-05-01-03", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Travel Accommodations Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Travel Accommodations Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Host Activation Simplification Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
