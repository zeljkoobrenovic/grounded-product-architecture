    <style>

        .entity-link {

        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;

        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Partner Visibility Control Release", "date": "2026-05-29", "description": "Release focused on giving accommodation partners clearer visibility into ranking, program participation, and promotion tradeoffs so they can improve profitable occupancy.", "customerImpact": [{"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "Hotel Revenue & Operations Manager", "group": "Supply-Side Partners", "icon": "hotel.png"}, "customerKPIs": [{"kpi": "Visibility-adjusted occupancy", "expectedImpact": "Increase occupancy quality by helping partners understand and act on visibility levers.", "description": "Booked occupancy quality that reflects both volume and marketplace visibility effectiveness.", "unit": "% occupancy", "currentValue": "65.3", "link": "https://dashboard.example.com/travel-accommodations-marketplace/customers/cg3-p1/kpis/co-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Promotion ROI confidence", "expectedImpact": "Increase commercial confidence through clearer program and promotion feedback.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Partner room-night monetization", "expectedImpact": "Increase monetization by improving partner participation in profitable commercial levers.", "description": "Marketplace revenue contribution generated from partner accommodation supply.", "unit": "index", "currentValue": "60", "link": "https://dashboard.example.com/travel-accommodations-marketplace/customers/cg3-p1/kpis/bo-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "prom", "change": "Improve promotion and program control surfaces.", "brick": {"id": "prom", "name": "Partner Merchandising & Programs", "type": "full-stack", "description": "Promotions, member rates, preferred programs, merchandising choices, and partner-facing commercial optimization tools.", "domain": "Partner Operations", "group": "Inventory and commercial performance", "internalModules": [{"title": "Program Eligibility and Enrollment", "description": "Handles participation and rule logic for partner programs.", "type": "service"}, {"title": "Promotion Authoring", "description": "Lets partners create and manage discount and merchandising constructs.", "type": "full-stack"}, {"title": "Program Impact Feedback", "description": "Explains how participation and promotions affect visibility and booked volume.", "type": "service"}], "interfaces": [{"title": "Commercial Controls UI", "description": "Partner-facing merchandising and program management interface.", "type": "ui"}, {"title": "Promotion Rules API", "description": "API for promotion definitions, eligibility, and rollout logic.", "type": "api"}], "brickDependencies": [{"targetBrickId": "mkli", "type": "insight", "interface": "Performance insight feed", "description": "Uses performance signals to guide commercial decisions."}, {"targetBrickId": "rate", "type": "guidance", "interface": "Pricing guidance API", "description": "Uses recommendation support when presenting commercial actions."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "prom.png"}}, {"brickId": "mkli", "change": "Add clearer partner-facing visibility and outcome insights.", "brick": {"id": "mkli", "name": "Marketplace Intelligence", "type": "service", "description": "Decision support and data products for ranking, pricing, promotion, quality, and marketplace economics.", "domain": "Marketplace Foundations", "group": "Trust, connectivity, and intelligence", "internalModules": [{"title": "Marketplace Metrics and Attribution", "description": "Produces commercial and operational insights across traveler and partner journeys.", "type": "service"}, {"title": "Decisioning Models", "description": "Supports ranking, pricing guidance, and partner recommendation logic.", "type": "service"}, {"title": "Experiment and Causal Analysis Layer", "description": "Measures the real effect of ranking, program, pricing, and UX changes.", "type": "service"}], "interfaces": [{"title": "Insight APIs and Reporting Feeds", "description": "Feeds downstream traveler, partner, and internal reporting surfaces.", "type": "api"}, {"title": "Marketplace Signal Feed", "description": "Event and feature feed for ranking, recommendations, and pricing systems.", "type": "event"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "mkli.png"}}, {"brickId": "extr", "change": "Simplify partner access to performance guidance and actions.", "brick": {"id": "extr", "name": "Partner Extranet", "type": "full-stack", "description": "Partner-facing control surface for listing setup, policies, reservation operations, finance visibility, and performance management.", "domain": "Partner Operations", "group": "Supply onboarding and content", "internalModules": [{"title": "Partner Control UI", "description": "Primary browser workspace for property partners and hosts.", "type": "full-stack"}, {"title": "Operational Workbench", "description": "Brings together reservations, finance, and quality actions for partners.", "type": "service"}], "interfaces": [{"title": "Partner UI", "description": "Partner-facing operational interface.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "idam", "type": "identity", "interface": "Partner authentication API", "description": "Uses shared identity and access controls for partner authentication."}, {"targetBrickId": "paym", "type": "finance", "interface": "Finance reporting API", "description": "Shows payment, payout, and adjustment detail."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "extr.png"}}], "deliveryChannels": [{"channelId": "partner-web", "change": "Launch improved partner commercial-control and insight experiences.", "channel": {"productId": "partner", "productName": "", "name": "partner-web", "type": "product", "icon": "product.png"}}, {"channelId": "insights-runtime", "change": "Release new reporting and recommendation services.", "channel": {"productId": "insights", "productName": "", "name": "insights-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["hotel-partner-success"], "supportingTeamIds": ["marketplace-intelligence"]}, "initiativeId": "initiative-travel-accommodations-marketplace-2026-04-22-02", "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Travel Accommodations Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Travel Accommodations Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Partner Visibility Control Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
