<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Travel Accommodations Marketplace)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Traveler Checkout Clarity Initiative", "date": "2026-04-15", "description": "Focused investment to improve traveler booking confidence by clarifying cancellation terms, payment timing, and booking-state visibility across high-intent accommodation checkout flows.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Leisure Traveler / Stay Booker", "group": "Demand-Side Travelers", "icon": "traveler.png"}, "customerKPIs": [{"kpi": "Search-to-book conversion", "expectedImpact": "Increase conversion by reducing decision uncertainty at checkout.", "description": "Share of high-intent traveler sessions that become confirmed accommodation bookings.", "unit": "% of high-intent sessions", "currentValue": "53.1", "link": "https://dashboard.example.com/travel-accommodations-marketplace/customers/cg1-p1/kpis/co-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Self-service change success", "expectedImpact": "Increase later self-service success by making booking conditions clearer at purchase time.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Net booked room-night contribution", "expectedImpact": "Increase net room-night contribution by reducing avoidable booking drop-off and later support cost.", "description": "Traveler demand converted into monetizable, net accommodation room nights.", "unit": "index", "currentValue": "76", "link": "https://dashboard.example.com/travel-accommodations-marketplace/customers/cg1-p1/kpis/bo-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "book", "change": "Clarify reservation state and policy explanation across checkout.", "brick": {"id": "book", "name": "Checkout & Booking Orchestration", "type": "full-stack", "description": "Traveler checkout, reservation creation, policy handling, confirmation, and booking-state management.", "domain": "Traveler Experience", "group": "Booking and trip management", "internalModules": [{"title": "Checkout State and Eligibility", "description": "Validates bookability, rate conditions, traveler data, and policy constraints.", "type": "service"}, {"title": "Reservation Orchestration", "description": "Creates and updates booking records across marketplace and partner systems.", "type": "integration"}, {"title": "Policy and Disclosure Layer", "description": "Normalizes traveler-facing disclosure of payment, cancellation, and host-type obligations.", "type": "service"}], "interfaces": [{"title": "Checkout UI", "description": "Traveler-facing booking flow.", "type": "ui"}, {"title": "Reservation API", "description": "API used for reservation creation and update workflows.", "type": "api"}, {"title": "Reservation Event Feed", "description": "Publishes new booking and booking-state transition events.", "type": "event"}], "brickDependencies": [{"targetBrickId": "room", "type": "offer-selection", "interface": "Room offer API", "description": "Uses selected room and rate context to create the booking."}, {"targetBrickId": "paym", "type": "payment", "interface": "Payment authorization", "description": "Uses payment orchestration for charge, guarantee, and refund flows."}, {"targetBrickId": "conn", "type": "partner-sync", "interface": "Reservation push", "description": "Coordinates with partner connectivity where required."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "book.png"}}, {"brickId": "paym", "change": "Normalize payment timing and refund messaging.", "brick": {"id": "paym", "name": "Payments & Payouts", "type": "service", "description": "Payment collection, guarantees, payout orchestration, refunds, disputes, and finance visibility for multiple payment models.", "domain": "Marketplace Foundations", "group": "Payments and recovery", "internalModules": [{"title": "Traveler Payment Orchestration", "description": "Supports card capture, authorization, charge, and refund flows.", "type": "service"}, {"title": "Partner Remittance and Reconciliation", "description": "Handles payout scheduling, adjustments, and finance reconciliation.", "type": "service"}, {"title": "Payment Model Normalization", "description": "Normalizes pay-now, pay-later, pay-at-property, and managed-payment logic across markets.", "type": "service"}], "interfaces": [{"title": "Payments API", "description": "Finance API used by traveler and partner workflows.", "type": "api"}, {"title": "Payment State Feed", "description": "Event stream for authorizations, captures, refunds, and payout transitions.", "type": "event"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"system": "Payment Service Providers", "type": "external-fintech", "interface": "Card and transfer APIs", "description": "Uses card processing and payout rails."}], "externalSystemsDependingOnThisBrick": [], "icon": "paym.png"}}], "deliveryChannels": [{"channelId": "traveler-web", "change": "Release updated traveler web checkout flows.", "channel": {"productId": "traveler", "productName": "", "name": "traveler-web", "type": "product", "icon": "product.png"}}, {"channelId": "checkout-runtime", "change": "Release booking-state and payment-model service changes.", "channel": {"productId": "checkout", "productName": "", "name": "checkout-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["booking-and-trip-confidence"], "supportingTeamIds": ["payments-and-financial-operations"]}, "initiativeId": "initiative-travel-accommodations-marketplace-2026-04-15-01", "discoveryIds": ["discovery-travel-accommodations-marketplace-2026-04-05-01-checkout-clarity"], "priority": "p1", "keyResultId": "travel-accommodations-marketplace-2026-q2-cg1-p1/kr-1", "landingPageIndex": 3, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Travel Accommodations Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
