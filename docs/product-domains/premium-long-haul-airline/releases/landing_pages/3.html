<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Premium Long-Haul Airline)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Premium recovery release", "date": "2026-01-31", "description": "Release of premium disruption recovery improvements covering disruption recovery & self-service reaccommodation, trip companion & proactive notifications, operational control tower, and customer care & case management across the Guest Mobile App, Proactive Messaging Layer, Network Control Workspace, and Disruption Servicing Workspace.", "customerImpact": [{"customerId": "gffm", "customer": {"id": "gffm", "name": "Global Frequent Flyer Member", "group": "Guests and Loyalty Members", "icon": "gffm.png"}, "customerKPIs": [{"kpi": "Self-service disruption recovery rate", "expectedImpact": "Improve self-service disruption recovery rate through clearer digital rebooking and communication flows.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Repeat guest rate", "expectedImpact": "Improve repeat guest rate by protecting guest trust during disruption.", "description": "", "unit": "", "kind": "business"}]}, {"customerId": "nocc", "customer": {"id": "nocc", "name": "Network Operations Control Director", "group": "Operations and Internal Stakeholders", "icon": "nocc.png"}, "customerKPIs": [{"kpi": "Recovery decision cycle time", "expectedImpact": "Improve recovery decision cycle time through a better linked operations and servicing workflow.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Irregular operations cost per disrupted flight", "expectedImpact": "Improve irregular operations cost per disrupted flight by reducing manual handling and unnecessary fallout.", "description": "Direct operational and guest-handling cost incurred for each materially disrupted flight.", "unit": "GBP", "kind": "business"}]}], "productBricks": [{"brickId": "diss", "change": "Released richer guest recovery choice flows and eligibility logic.", "brick": {"id": "diss", "name": "Disruption Recovery & Self-Service Reaccommodation", "type": "full-stack", "description": "Coordinates digital and assisted recovery when flights are delayed, cancelled, or broken by missed connections.", "domain": "journey-service", "group": "companion-and-recovery", "internalModules": [{"title": "Recovery eligibility engine", "description": "Determines which options can be offered to which guests under operational and policy constraints.", "type": "policy"}, {"title": "Reaccommodation workflow manager", "description": "Coordinates self-service and agent-assisted reaccommodation paths.", "type": "operations"}], "interfaces": [{"title": "Recovery Options API", "description": "Returns guest-specific disruption recovery choices and next actions.", "type": "api"}], "brickDependencies": [{"targetBrickId": "opct", "type": "operational", "interface": "Disruption priority feed", "description": "Uses network-disruption context to prioritize recovery paths."}, {"targetBrickId": "ords", "type": "service", "interface": "Order Service API", "description": "Needs order servicing to complete rebooking and exchange actions."}], "externalSystemsThisBrickDependsOn": [{"system": "Reservation, schedule-change, and airport servicing systems", "type": "core-airline-system", "interface": "Servicing and disruption interfaces", "description": "Coordinates recovery options with airline servicing and airport constraints."}], "externalSystemsDependingOnThisBrick": [{"system": "Guest channels and agent workspaces", "type": "recovery-consumer", "interface": "Recovery Options API", "description": "Use this brick to resolve passenger disruption quickly."}], "icon": "diss.png"}}, {"brickId": "trip", "change": "Released more proactive trip alerts tied to recovery actions.", "brick": {"id": "trip", "name": "Trip Companion & Proactive Notifications", "type": "full-stack", "description": "Delivers trip-state visibility, airport guidance, and proactive notifications before and during travel.", "domain": "journey-service", "group": "companion-and-recovery", "internalModules": [{"title": "Trip-state timeline", "description": "Builds the guest-facing state model of the journey across touchpoints.", "type": "service"}, {"title": "Notification orchestration", "description": "Routes messages by trip event, urgency, and channel preference.", "type": "operations"}], "interfaces": [{"title": "Trip timeline API", "description": "Serves live trip milestones to mobile and web channels.", "type": "api"}], "brickDependencies": [{"targetBrickId": "intg", "type": "event-subscription", "interface": "Journey event feed", "description": "Consumes journey state changes from operational and booking systems."}, {"targetBrickId": "idpr", "type": "identity", "interface": "Profile API", "description": "Uses traveller identity and communication preferences."}], "externalSystemsThisBrickDependsOn": [{"system": "Flight status, airport, and messaging systems", "type": "operational-system", "interface": "Status feeds and messaging providers", "description": "Consumes status updates and publishes notifications through approved messaging providers."}], "externalSystemsDependingOnThisBrick": [{"system": "Mobile app and web trip experiences", "type": "guest-channel", "interface": "Trip timeline API", "description": "Use this brick for pre-travel and day-of-travel visibility."}], "icon": "trip.png"}}, {"brickId": "opct", "change": "Released guest-impact views in the operations control workflow.", "brick": {"id": "opct", "name": "Operational Control Tower", "type": "full-stack", "description": "Creates the integrated operating view of network health, disruption risk, and intervention priorities.", "domain": "ops-and-cargo", "group": "control-and-cargo", "internalModules": [{"title": "Network risk monitor", "description": "Tracks flight, station, and connection risk in real time.", "type": "service"}, {"title": "Intervention workflow board", "description": "Helps control teams assign and track recovery actions.", "type": "operations"}], "interfaces": [{"title": "Operations control workspace", "description": "Real-time workspace for IOC and station control teams.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "odal", "type": "analytics", "interface": "Impact models", "description": "Uses data models to prioritize risk by guest and revenue impact."}, {"targetBrickId": "intg", "type": "event-subscription", "interface": "Operational event backbone", "description": "Consumes real-time operational changes through the event backbone."}], "externalSystemsThisBrickDependsOn": [{"system": "Operations control, airport, and schedule systems", "type": "operational-system", "interface": "Operational status feeds", "description": "Reads real-time operational state from core airline systems."}], "externalSystemsDependingOnThisBrick": [{"system": "Recovery, airport, and care workflows", "type": "operations-consumer", "interface": "Operations control workspace and event feeds", "description": "Use this brick to understand current network priorities."}], "icon": "opct.png"}}], "deliveryChannels": [{"channelId": "prod_trip_loyalty-mobile", "change": "Deployed disruption recovery updates in the Guest Mobile App.", "channel": {"productId": "prod_trip_loyalty", "productName": "", "name": "prod_trip_loyalty-mobile", "type": "product", "icon": "product.png"}}, {"channelId": "prod_ops_control-console", "change": "Deployed guest-impact prioritization in the Network Control Workspace.", "channel": {"productId": "prod_ops_control", "productName": "", "name": "prod_ops_control-console", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["air-loyalty-trip", "air-ops-control"], "supportingTeamIds": ["air-airport-recovery"]}, "initiativeId": "initiative-premium-long-haul-airline-2026-01-20-00", "landingPageIndex": 3};
    const domainName = 'Premium Long-Haul Airline';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
