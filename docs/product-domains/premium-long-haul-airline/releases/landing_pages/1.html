<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Premium Long-Haul Airline)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Corporate continuity release", "date": "2026-03-07", "description": "Release of corporate content control and partner continuity improvements covering corporate, agency & NDC distribution, partner & alliance journey orchestration, offer, pricing & availability management, and operational data, revenue & personalisation platform across NDC and Agency API and Commercial Account Workspace.", "customerImpact": [{"customerId": "ctpm", "customer": {"id": "ctpm", "name": "Corporate Travel Program Manager", "group": "Commercial Buyers and Partners", "icon": "ctpm.png"}, "customerKPIs": [{"kpi": "In-policy booking rate", "expectedImpact": "Improve in-policy booking rate through better negotiated-content control.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Traveller disruption resolution time", "expectedImpact": "Improve traveller disruption resolution time on partner-heavy itineraries.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Corporate revenue share of wallet", "expectedImpact": "Improve corporate revenue share of wallet by making the airline easier to buy and trust.", "description": "Portion of a managed account's addressable long-haul demand captured by the airline and its controlled channels.", "unit": "%", "kind": "business"}]}], "productBricks": [{"brickId": "dist", "change": "Released account-aware content controls and channel governance improvements.", "brick": {"id": "dist", "name": "Corporate, Agency & NDC Distribution", "type": "integration", "description": "Controls commercial content, contract logic, and servicing pathways across indirect and managed-travel channels.", "domain": "holiday-and-distribution", "group": "commercial-growth", "internalModules": [{"title": "Distribution policy layer", "description": "Applies account, channel, and contract rules to distributed content.", "type": "policy"}, {"title": "NDC and agency gateway", "description": "Publishes content and servicing functions through commercial APIs.", "type": "integration"}], "interfaces": [{"title": "Distribution API", "description": "Exposes controlled offer and servicing capabilities to approved commercial partners.", "type": "api"}], "brickDependencies": [{"targetBrickId": "ofav", "type": "commercial", "interface": "Offer API", "description": "Uses governed retail offers as the source of distributed content."}, {"targetBrickId": "part", "type": "partner", "interface": "Partner continuity service", "description": "Needs partner itinerary context for mixed-carrier distribution and servicing."}], "externalSystemsThisBrickDependsOn": [{"system": "Travel management companies and agency systems", "type": "distribution-partner", "interface": "NDC and agency connections", "description": "Connects to agency and managed-travel channels."}], "externalSystemsDependingOnThisBrick": [{"system": "Sales, account management, and partner channels", "type": "commercial-consumer", "interface": "Distribution API", "description": "Use this brick to distribute and monitor managed-travel content."}], "icon": "dist.png"}}, {"brickId": "part", "change": "Released stronger partner continuity context for mixed-carrier itineraries.", "brick": {"id": "part", "name": "Partner & Alliance Journey Orchestration", "type": "integration", "description": "Coordinates itinerary continuity, servicing context, and commercial logic across alliance, JV, codeshare, and selected cargo partners.", "domain": "holiday-and-distribution", "group": "commercial-growth", "internalModules": [{"title": "Partner rules engine", "description": "Stores partner-specific logic for continuity, servicing, and handoffs.", "type": "policy"}, {"title": "Partner event and message broker", "description": "Manages partner-facing itinerary and recovery messaging.", "type": "integration"}], "interfaces": [{"title": "Partner continuity service", "description": "Exposes partner-aware itinerary and servicing context to internal products.", "type": "api"}], "brickDependencies": [{"targetBrickId": "intg", "type": "integration", "interface": "Partner event backbone", "description": "Uses the shared integration layer for partner eventing."}], "externalSystemsThisBrickDependsOn": [{"system": "Alliance, JV, codeshare, and cargo partner systems", "type": "partner-system", "interface": "Partner messaging and servicing APIs", "description": "Relies on partner systems for joint itinerary and continuity data."}], "externalSystemsDependingOnThisBrick": [{"system": "Retail, servicing, distribution, and cargo products", "type": "internal-consumer", "interface": "Partner continuity service", "description": "Use this brick whenever journeys or shipments extend beyond own-metal operations."}], "icon": "part.png"}}, {"brickId": "odal", "change": "Released account-health reporting for sales and programme teams.", "brick": {"id": "odal", "name": "Operational Data, Revenue & Personalisation Platform", "type": "service", "description": "Creates the shared data, KPI, and decision-support layer for commercial, operational, and guest experiences.", "domain": "platform-foundation", "group": "shared-foundations", "internalModules": [{"title": "Unified airline data model", "description": "Standardizes guest, booking, operational, and revenue entities for analytics and decisioning.", "type": "service"}, {"title": "Insight and personalisation models", "description": "Supports KPI reporting, prioritization, and personalised next-best actions.", "type": "analytics"}], "interfaces": [{"title": "Data products and KPI workspace", "description": "Provides curated datasets and dashboards to teams across the airline.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "intg", "type": "data-ingestion", "interface": "Event and batch feeds", "description": "Relies on shared ingestion and eventing to populate the platform."}], "externalSystemsThisBrickDependsOn": [{"system": "Enterprise data warehouse and ML tooling", "type": "data-platform", "interface": "Data storage and model-serving interfaces", "description": "Uses the organization's shared data and modeling stack."}], "externalSystemsDependingOnThisBrick": [{"system": "Commercial, operations, loyalty, and care teams", "type": "analytics-consumer", "interface": "Data products and KPI workspace", "description": "Use this brick to monitor performance and inform decisions."}], "icon": "odal.png"}}], "deliveryChannels": [{"channelId": "prod_distribution-api", "change": "Deployed content-control updates in the NDC and Agency API.", "channel": {"productId": "prod_distribution", "productName": "", "name": "prod_distribution-api", "type": "product", "icon": "product.png"}}, {"channelId": "prod_distribution-dashboard", "change": "Deployed account-health reporting in the Commercial Account Workspace.", "channel": {"productId": "prod_distribution", "productName": "", "name": "prod_distribution-dashboard", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["air-distribution-partners"], "supportingTeamIds": ["air-guest-commerce", "air-data-personalisation"]}, "initiativeId": "initiative-premium-long-haul-airline-2026-02-19-02", "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Premium Long-Haul Airline';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
