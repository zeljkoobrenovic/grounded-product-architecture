<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Premium Long-Haul Airline)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Cargo visibility release", "date": "2026-03-21", "description": "Release of cargo digital visibility improvements covering cargo capacity, quote & booking, cargo tracking & exception management, and customer care & case management across Cargo Digital Portal and Cargo Connectivity API.", "customerImpact": [{"customerId": "afwm", "customer": {"id": "afwm", "name": "Air Freight Forwarding Manager", "group": "Commercial Buyers and Partners", "icon": "afwm.png"}, "customerKPIs": [{"kpi": "Digital cargo booking share", "expectedImpact": "Improve digital cargo booking share through broader self-service booking coverage.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Shipment milestone visibility coverage", "expectedImpact": "Improve shipment milestone visibility coverage through richer milestone and alerting support.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Cargo yield per available tonne", "expectedImpact": "Improve cargo yield per available tonne by winning more high-value, digitally manageable shipments.", "description": "Revenue yield captured from available cargo capacity on the network.", "unit": "GBP", "kind": "business"}]}], "productBricks": [{"brickId": "carg", "change": "Released premium-product-aware quoting and booking improvements.", "brick": {"id": "carg", "name": "Cargo Capacity, Quote & Booking", "type": "full-stack", "description": "Owns cargo quoting, product selection, booking, and commercial control across the long-haul network.", "domain": "ops-and-cargo", "group": "control-and-cargo", "internalModules": [{"title": "Cargo quote engine", "description": "Calculates rates and service choices for cargo demand.", "type": "finance"}, {"title": "Capacity booking workflow", "description": "Coordinates capacity confirmation, acceptance, and booking changes.", "type": "operations"}], "interfaces": [{"title": "Cargo booking API", "description": "Supports digital quote and booking experiences for cargo customers.", "type": "api"}], "brickDependencies": [{"targetBrickId": "part", "type": "partner", "interface": "Partner continuity service", "description": "Uses partner capacity and continuity logic where cargo journeys span multiple carriers."}], "externalSystemsThisBrickDependsOn": [{"system": "Cargo host and handling systems", "type": "cargo-system", "interface": "Cargo inventory and booking interfaces", "description": "Reads and updates cargo inventory and shipment bookings."}], "externalSystemsDependingOnThisBrick": [{"system": "Cargo digital portal and commercial teams", "type": "cargo-consumer", "interface": "Cargo booking API", "description": "Use this brick to quote and secure cargo capacity."}], "icon": "carg.png"}}, {"brickId": "trak", "change": "Released milestone visibility and cargo exception alerting improvements.", "brick": {"id": "trak", "name": "Cargo Tracking & Exception Management", "type": "service", "description": "Tracks shipment milestones, exposes visibility, and routes operational cargo exceptions for resolution.", "domain": "ops-and-cargo", "group": "control-and-cargo", "internalModules": [{"title": "Milestone event processor", "description": "Builds the shipment timeline from operational cargo events.", "type": "integration"}, {"title": "Cargo exception workflow", "description": "Routes handling or network exceptions to the right cargo support path.", "type": "operations"}], "interfaces": [{"title": "Cargo tracking API", "description": "Returns shipment milestones, alerts, and exception states.", "type": "api"}], "brickDependencies": [{"targetBrickId": "carg", "type": "workflow", "interface": "Cargo booking API", "description": "Uses shipment and booking context from cargo booking workflows."}, {"targetBrickId": "care", "type": "case-routing", "interface": "Agent workspace", "description": "Escalates high-touch shipment cases into customer care when needed."}], "externalSystemsThisBrickDependsOn": [{"system": "Cargo handling, warehouse, and movement systems", "type": "cargo-operations-system", "interface": "Milestone and handling feeds", "description": "Consumes movement and handling events from cargo operations systems."}], "externalSystemsDependingOnThisBrick": [{"system": "Cargo portal and support teams", "type": "tracking-consumer", "interface": "Cargo tracking API", "description": "Use this brick to monitor shipments and act on exceptions."}], "icon": "trak.png"}}, {"brickId": "care", "change": "Released cargo-specific support queues and escalation context.", "brick": {"id": "care", "name": "Customer Care & Case Management", "type": "full-stack", "description": "Supports assisted servicing, escalations, and cross-functional resolution when customer issues require human coordination.", "domain": "journey-service", "group": "companion-and-recovery", "internalModules": [{"title": "Case intake and routing", "description": "Creates and routes customer cases by journey type, issue class, and priority.", "type": "operations"}, {"title": "Context aggregation service", "description": "Pulls booking, loyalty, disruption, and baggage context into the case view.", "type": "service"}], "interfaces": [{"title": "Agent workspace", "description": "Service interface for customer care, airport agents, and specialist support teams.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "diss", "type": "workflow", "interface": "Recovery Options API", "description": "Uses recovery context to resolve customer-facing cases."}, {"targetBrickId": "idpr", "type": "identity", "interface": "Profile API", "description": "Needs traveller identity and contact data in every case."}], "externalSystemsThisBrickDependsOn": [{"system": "CRM, telephony, and messaging platforms", "type": "service-platform", "interface": "Case and communication integrations", "description": "Integrates with service channels and communication platforms."}], "externalSystemsDependingOnThisBrick": [{"system": "Holiday, disruption, and cargo support teams", "type": "case-consumer", "interface": "Agent workspace", "description": "Use this brick to resolve customer exceptions across lines of business."}], "icon": "care.png"}}], "deliveryChannels": [{"channelId": "prod_cargo-web", "change": "Deployed richer visibility and booking updates in the Cargo Digital Portal.", "channel": {"productId": "prod_cargo", "productName": "", "name": "prod_cargo-web", "type": "product", "icon": "product.png"}}, {"channelId": "prod_cargo-api", "change": "Deployed stronger shipment-state pathways in the Cargo Connectivity API.", "channel": {"productId": "prod_cargo", "productName": "", "name": "prod_cargo-api", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["air-cargo-digital"], "supportingTeamIds": ["air-integration-platform"]}, "initiativeId": "initiative-premium-long-haul-airline-2026-03-04-03", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Premium Long-Haul Airline';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
