<!DOCTYPE html>
<html lang="en">

    <style>

            color: #9f2d2d;

            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;

        .section-title {

            border-radius: 999px;
            background-color: #eef2f6;

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Premium disruption recovery: validated discovery", "id": "discovery-premium-long-haul-airline-2026-01-14-01-premium-disruption-recovery", "name": "Premium disruption recovery: validated discovery", "status": "archived", "lastUpdated": "2026-01-20", "summary": "Discovery confirmed that premium guest trust is damaged less by the disruption event itself than by fragmented, low-clarity recovery across app, airport, and service channels.", "opportunity": "Clarify whether linking operations-control signals more directly into guest self-service and assisted servicing would materially improve recovery confidence and reduce handling cost.", "linkedInitiatives": [{"initiativeId": "initiative-premium-long-haul-airline-2026-01-20-00", "description": "Premium disruption recovery initiative focused on improving disruption recovery & self-service reaccommodation, trip companion & proactive notifications, operational control tower, and customer care & case management across the Guest Mobile App, Proactive Messaging Layer, Network Control Workspace, and Disruption Servicing Workspace.", "landingPageIndex": 3, "initiativeDescription": "Initiative focused on improving disruption recovery & self-service reaccommodation, trip companion & proactive notifications, operational control tower, and customer care & case management across the Guest Mobile App, Proactive Messaging Layer, Network Control Workspace, and Disruption Servicing Workspace."}], "teams": {"leadTeamId": "air-ops-control", "supportingTeamIds": ["air-loyalty-trip", "air-airport-recovery", "air-data-personalisation"], "assignments": [{"teamId": "air-ops-control", "teamName": "Air Operations Control", "role": "lead", "roleLabel": "Lead discovery team", "how": "Led disruption replay analysis and defined the operating decision points that need product support."}, {"teamId": "air-loyalty-trip", "teamName": "Air Loyalty and Trip Companion", "role": "support", "roleLabel": "Supporting discovery team", "how": "Validated guest communication and self-service failure modes in disrupted journeys."}, {"teamId": "air-airport-recovery", "teamName": "Air Airport and Recovery Services", "role": "support", "roleLabel": "Supporting discovery team", "how": "Validated where airport and contact-centre handoffs break down in real recovery cases."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers buy the product and/or choose to use it?", "hypothesis": "Premium guests will trust the airline more if disruption recovery becomes visibly proactive, digital-first, and context aware.", "evidenceToCollect": ["Whether guests describe status clarity and actionable recovery options as the main unmet need during disruption.", "Whether better digital recovery materially changes willingness to rebook or recommend."], "methods": ["Guest interviews", "Service transcript review", "Disruption replay workshops"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "Lower call demand and less compensation fallout will justify investment in a joined-up recovery model.", "evidenceToCollect": ["How much handling cost is driven by avoidable guest confusion.", "Which disruption cohorts create the highest cost and retention damage."], "methods": ["IROPS cost analysis", "Compensation review", "Business case workshop"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Guests can successfully self-serve more disruption scenarios if the recovery options are ranked and explained clearly.", "evidenceToCollect": ["Where guests hesitate in prototype rebooking flows.", "Which recovery explanations reduce abandonment."], "methods": ["Prototype tests", "Journey walkthroughs", "Task completion analysis"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The teams can join operational risk and guest recovery context without replacing every legacy operations tool at once.", "evidenceToCollect": ["Which operational signals are essential to expose first.", "How much recovery logic can be externalized from legacy systems."], "methods": ["Architecture review", "Signal mapping", "Incremental rollout planning"]}], "plannedActivities": ["Replay recent long-haul cancellation and misconnections cases across app, airport, and care teams.", "Prototype a guest-facing recovery journey driven by network-control signals.", "Define the smallest joined-up disruption slice for current-quarter delivery."], "decisionToMake": "Decide whether to fund a guest-aware disruption recovery initiative rather than treating operations and servicing separately.", "outcome": {"decision": "proceed", "summary": "Discovery found enough guest pain, operational leverage, and cost reduction opportunity to proceed."}, "startDate": "2025-12-12", "endDate": "2026-01-20", "statusLabel": "Archived", "landingPageIndex": 3, "date": "2025-12-12", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'Premium Long-Haul Airline';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome && discovery.outcome.summary) {
        html += '<div class="section"><div class="section-title">Outcome</div><div class="description">' + escapeHtml(discovery.outcome.summary) + '</div></div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
