            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;

        }

            margin-bottom: 6px;
            line-height: 1.45;

            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;

        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Corporate continuity and distribution control discovery", "id": "discovery-premium-long-haul-airline-2026-02-12-01-corporate-continuity", "name": "Corporate continuity and distribution control discovery", "status": "ongoing", "lastUpdated": "2026-03-27", "summary": "Discovery work is testing whether better corporate content control and deeper partner continuity materially improve programme trust, traveller recovery, and share of wallet in managed travel.", "opportunity": "Clarify whether corporate, agency, and partner-distribution complexity can be reduced enough to make the airline easier to buy and service at account scale.", "linkedInitiatives": [{"initiativeId": "initiative-premium-long-haul-airline-2026-02-19-02", "description": "Corporate content control and partner continuity initiative focused on improving corporate, agency & NDC distribution, partner & alliance journey orchestration, offer, pricing & availability management, and operational data, revenue & personalisation platform across NDC and Agency API and Commercial Account Workspace.", "landingPageIndex": 1, "initiativeDescription": "Initiative focused on improving corporate, agency & NDC distribution, partner & alliance journey orchestration, offer, pricing & availability management, and operational data, revenue & personalisation platform across NDC and Agency API and Commercial Account Workspace."}], "teams": {"leadTeamId": "air-distribution-partners", "supportingTeamIds": ["air-guest-commerce", "air-integration-platform", "air-data-personalisation"], "assignments": [{"teamId": "air-distribution-partners", "teamName": "Air Distribution and Partners", "role": "lead", "roleLabel": "Lead discovery team", "how": "Leads managed-travel interviews, channel tradeoff analysis, and the recommendation on where stronger content control matters most."}, {"teamId": "air-guest-commerce", "teamName": "Air Guest Commerce", "role": "support", "roleLabel": "Supporting discovery team", "how": "Provides offer-control and retail-context insight to ensure corporate distribution improvements do not weaken direct-channel economics."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers buy the product and/or choose to use it?", "hypothesis": "Corporate travel buyers will place more share with the airline if negotiated content and partner continuity become more predictable.", "evidenceToCollect": ["Where account managers and TMCs describe the biggest content and servicing gaps today.", "Whether stronger partner continuity would change account confidence enough to shift share."], "methods": ["Corporate account interviews", "TMC workflow walkthroughs", "Sales opportunity review"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "Better channel control will improve corporate share of wallet and reduce distribution leakage enough to justify deeper investment.", "evidenceToCollect": ["How much revenue is lost through poor negotiated-content visibility or weak continuity.", "Which accounts generate enough upside to prioritize first."], "methods": ["Channel economics review", "Account-level leakage analysis", "Business case workshop"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Travel managers and agencies can adopt modern distribution more confidently if servicing and exception handling are clearer.", "evidenceToCollect": ["Which NDC or partner-servicing states remain hard to understand.", "Where account teams still fall back to manual intervention."], "methods": ["Workflow tests", "Servicing replay sessions", "Support-case review"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The teams can improve continuity and content control incrementally without forcing a risky all-at-once commercial migration.", "evidenceToCollect": ["Which partner and host dependencies block incremental rollout.", "Whether a limited set of account cohorts can pilot the stronger model first."], "methods": ["Dependency mapping", "Architecture review", "Cohort rollout planning"]}], "plannedActivities": ["Interview corporate account owners, TMCs, and servicing teams about channel and continuity friction.", "Quantify distribution leakage and share-of-wallet risk on priority accounts.", "Define a pilot cohort for stronger account-aware content control."], "decisionToMake": "Decide whether to extend the initiative into a broader strategic account programme or keep the work narrowly operational.", "startDate": "2026-02-12", "endDate": "2026-04-15", "statusLabel": "Ongoing", "landingPageIndex": 0, "date": "2026-02-12", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'Premium Long-Haul Airline';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome && discovery.outcome.summary) {
        html += '<div class="section"><div class="section-title">Outcome</div><div class="description">' + escapeHtml(discovery.outcome.summary) + '</div></div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
