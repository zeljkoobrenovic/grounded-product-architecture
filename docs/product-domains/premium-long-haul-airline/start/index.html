    <script>
        function openTab(evt, cityName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");

            evt.currentTarget.className += " active";

<script>
    function parseStartGroup(group) {
        group = group.trim();
        if (group.startsWith('[')) {
            const label = group.replace(/\(.*/g, '').replace(/\[/g, '').replace(/\]/g, '').trim();
            const href = group.replace(/.*\(/g, '').replace(/\)/g, '').trim();
            return {label, href};
        } else {
            return {label: group};
        }
    }

    function update() {
        apps.forEach(tab => {
            let html = '';
            const contentId = 'content_' + tab.tab;
            tab.apps.forEach(group => {
                html += '<div class="group">';
                html += '<div class="group-title">' + group.group + '</div>';
                group.apps.forEach(app => {
                    html += '<div class="app">';
                    html += '    <a target="_blank" href="' + app.link + '">\n';
                    html += '    <div style="height: 38px">\n';
                    html += '    <div class="name">' + app.name + '</div>\n';
                    if (app.source) {
                        html += '    <div class="source">source: ' + app.source + '</div>\n';
                    } else {
                        html += '    <div class="source"></div>\n';
                    }
                    html += '    </div>\n';
                    if (app.icon.startsWith('https://') || app.icon.startsWith('http://')) {
                        html += '    <div><img class="icon" src="' + app.icon + '"></div>\n';
                    } else {
                        html += '    <div><img class="icon" src="icons/' + app.icon + '"></div>\n';
                    }
                    html += '    <div class="description">' + app.description + '</div>\n';
                    html += '    </a>\n';
                    html += '    <br>\n';
                    html += '</div>';
                });
                html += '</div>';
            });
            document.getElementById(contentId).innerHTML = html;
        });

    }

    function updateAll() {
        update();
    }

    updateAll();
</script>
