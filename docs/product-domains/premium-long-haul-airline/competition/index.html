    <script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

                }
                html += '<span>' + suffix + '</span>';

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

        const scope = competitionData.scope || {};
        document.getElementById('scopeCopy').textContent = scope.description || '';
        document.getElementById('scopeNotes').innerHTML = (scope.notes || []).map(item => '<div class="pill">' + escapeHtml(item) + '</div>').join('');
    }

    function renderPlayer(player) {
        const logoHtml = renderPlayerLogo(player);
        const detailUrl = 'landing_pages/' + encodeURIComponent(player.id) + '.html';

        const stats = (player.business_stats || []).slice(0, 3).map(stat => ''
            + '<div class="stat-item">'
            + '<div class="stat-metric">' + escapeHtml(titleCase(stat.metric)) + '</div>'
            + '<div class="stat-value">' + escapeHtml(stat.value || '') + '</div>'
            + '<div class="stat-meta">' + escapeHtml((stat.period || '') + (stat.scope ? ' • ' + titleCase(stat.scope) : '')) + '</div>'
            + '</div>'
        ).join('');

        const links = Object.entries(player.links || {}).slice(0, 4).map(([key, value]) => ''
            + '<a class="link-item" href="' + escapeHtml(value) + '" target="_blank" rel="noopener noreferrer">'
            + '<div><strong>' + escapeHtml(titleCase(key)) + '</strong></div>'
            + '<div class="link-meta">' + escapeHtml(value) + '</div>'
            + '</a>'
        ).join('');

        const regions = (player.primary_regions || []).map(region => '<div class="pill">' + escapeHtml(titleCase(region)) + '</div>').join('');

        return ''
            + '<div class="player-card" data-detail-url="' + escapeHtml(detailUrl) + '">'
            + '<div class="player-header">'
            + logoHtml
            + '<div>'
            + '<div class="category-chip">' + escapeHtml(titleCase(player.category || 'competitor')) + '</div>'
            + '<div class="player-name">' + escapeHtml(player.name || '') + '</div>'
            + '<div class="player-meta">' + escapeHtml(player.hq || '') + '</div>'
            + '</div>'
            + '</div>'
            + '<div class="player-description">' + escapeHtml(player.description || '') + '</div>'
            + '<div class="section-title">Primary Regions</div>'
            + '<div class="regions-row">' + regions + '</div>'
            + '<div class="player-details-block' + (showDetails ? '' : ' details-hidden') + '">'
            + '<div class="section-title">Selected Stats</div>'
            + '<div class="stats-list">' + stats + '</div>'
            + '<div class="section-title">Official Links</div>'
            + '<div class="links-list">' + links + '</div>'
            + '</div>'
            + '</div>';
    }

    function renderPlayers() {
        document.getElementById('playersGrid').innerHTML = (competitionData.players || []).map(renderPlayer).join('');
        bindPlayerCardNavigation();
        syncDetailsToggle();
        syncPlayerTabLabel();
    }

    function bindPlayerCardNavigation() {
        document.querySelectorAll('.player-card').forEach(card => {
            card.addEventListener('click', function (event) {
                const interactive = event.target.closest('a, button');
                if (interactive) {
                    return;
                }
                const detailUrl = card.getAttribute('data-detail-url');
                if (detailUrl) {
                    window.open(detailUrl, '_blank');
                }
            });
        });
    }

    function syncDetailsToggle() {
        const button = document.getElementById('detailsToggleButton');
        if (!button) {
            return;
        }
        button.textContent = showDetails ? 'Hide details' : 'Show details';
        button.className = 'toggle-button' + (showDetails ? ' toggle-button-active' : '');
    }

    function toggleDetails() {
        showDetails = !showDetails;
        renderPlayers();
    }

    function syncPlayerTabLabel() {
        const button = document.getElementById('tab_PlayersTab');
        if (!button) {
            return;
        }
        button.textContent = 'Players (' + String((competitionData.players || []).length) + ')';
    }

    renderHero();
    renderScope();
    renderPlayers();
</script>
</body>
</html>
