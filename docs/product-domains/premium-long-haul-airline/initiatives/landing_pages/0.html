<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Premium Long-Haul Airline)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Cargo digital visibility and premium products initiative", "date": "2026-03-04", "description": "Initiative focused on improving cargo capacity, quote & booking, cargo tracking & exception management, customer care & case management, and partner & alliance journey orchestration across Cargo Digital Portal and Cargo Connectivity API.", "customerImpact": [{"customerId": "afwm", "customer": {"id": "afwm", "name": "Air Freight Forwarding Manager", "group": "Commercial Buyers and Partners", "icon": "afwm.png"}, "customerKPIs": [{"kpi": "Digital cargo booking share", "expectedImpact": "Increase digital cargo booking share by making more shipment types workable through self-service quoting and booking.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Shipment milestone visibility coverage", "expectedImpact": "Increase shipment milestone visibility coverage by exposing more reliable milestone and exception states.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Premium cargo product mix", "expectedImpact": "Increase premium cargo product mix by improving trust in specialist product handling and visibility.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Cargo yield per available tonne", "expectedImpact": "Increase cargo yield per available tonne by winning and retaining more high-value shipments.", "description": "Revenue yield captured from available cargo capacity on the network.", "unit": "GBP", "kind": "business"}]}], "productBricks": [{"brickId": "carg", "change": "Extended Cargo Capacity, Quote & Booking with premium-product-aware booking rules and faster quote paths.", "brick": {"id": "carg", "name": "Cargo Capacity, Quote & Booking", "type": "full-stack", "description": "Owns cargo quoting, product selection, booking, and commercial control across the long-haul network.", "domain": "ops-and-cargo", "group": "control-and-cargo", "internalModules": [{"title": "Cargo quote engine", "description": "Calculates rates and service choices for cargo demand.", "type": "finance"}, {"title": "Capacity booking workflow", "description": "Coordinates capacity confirmation, acceptance, and booking changes.", "type": "operations"}], "interfaces": [{"title": "Cargo booking API", "description": "Supports digital quote and booking experiences for cargo customers.", "type": "api"}], "brickDependencies": [{"targetBrickId": "part", "type": "partner", "interface": "Partner continuity service", "description": "Uses partner capacity and continuity logic where cargo journeys span multiple carriers."}], "externalSystemsThisBrickDependsOn": [{"system": "Cargo host and handling systems", "type": "cargo-system", "interface": "Cargo inventory and booking interfaces", "description": "Reads and updates cargo inventory and shipment bookings."}], "externalSystemsDependingOnThisBrick": [{"system": "Cargo digital portal and commercial teams", "type": "cargo-consumer", "interface": "Cargo booking API", "description": "Use this brick to quote and secure cargo capacity."}], "icon": "carg.png"}}, {"brickId": "trak", "change": "Extended Cargo Tracking & Exception Management with better milestone fidelity and alerting.", "brick": {"id": "trak", "name": "Cargo Tracking & Exception Management", "type": "service", "description": "Tracks shipment milestones, exposes visibility, and routes operational cargo exceptions for resolution.", "domain": "ops-and-cargo", "group": "control-and-cargo", "internalModules": [{"title": "Milestone event processor", "description": "Builds the shipment timeline from operational cargo events.", "type": "integration"}, {"title": "Cargo exception workflow", "description": "Routes handling or network exceptions to the right cargo support path.", "type": "operations"}], "interfaces": [{"title": "Cargo tracking API", "description": "Returns shipment milestones, alerts, and exception states.", "type": "api"}], "brickDependencies": [{"targetBrickId": "carg", "type": "workflow", "interface": "Cargo booking API", "description": "Uses shipment and booking context from cargo booking workflows."}, {"targetBrickId": "care", "type": "case-routing", "interface": "Agent workspace", "description": "Escalates high-touch shipment cases into customer care when needed."}], "externalSystemsThisBrickDependsOn": [{"system": "Cargo handling, warehouse, and movement systems", "type": "cargo-operations-system", "interface": "Milestone and handling feeds", "description": "Consumes movement and handling events from cargo operations systems."}], "externalSystemsDependingOnThisBrick": [{"system": "Cargo portal and support teams", "type": "tracking-consumer", "interface": "Cargo tracking API", "description": "Use this brick to monitor shipments and act on exceptions."}], "icon": "trak.png"}}, {"brickId": "care", "change": "Extended Customer Care & Case Management with cargo-specific exception routing and escalation context.", "brick": {"id": "care", "name": "Customer Care & Case Management", "type": "full-stack", "description": "Supports assisted servicing, escalations, and cross-functional resolution when customer issues require human coordination.", "domain": "journey-service", "group": "companion-and-recovery", "internalModules": [{"title": "Case intake and routing", "description": "Creates and routes customer cases by journey type, issue class, and priority.", "type": "operations"}, {"title": "Context aggregation service", "description": "Pulls booking, loyalty, disruption, and baggage context into the case view.", "type": "service"}], "interfaces": [{"title": "Agent workspace", "description": "Service interface for customer care, airport agents, and specialist support teams.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "diss", "type": "workflow", "interface": "Recovery Options API", "description": "Uses recovery context to resolve customer-facing cases."}, {"targetBrickId": "idpr", "type": "identity", "interface": "Profile API", "description": "Needs traveller identity and contact data in every case."}], "externalSystemsThisBrickDependsOn": [{"system": "CRM, telephony, and messaging platforms", "type": "service-platform", "interface": "Case and communication integrations", "description": "Integrates with service channels and communication platforms."}], "externalSystemsDependingOnThisBrick": [{"system": "Holiday, disruption, and cargo support teams", "type": "case-consumer", "interface": "Agent workspace", "description": "Use this brick to resolve customer exceptions across lines of business."}], "icon": "care.png"}}, {"brickId": "part", "change": "Extended Partner & Alliance Journey Orchestration for cargo continuity on selected partner flows.", "brick": {"id": "part", "name": "Partner & Alliance Journey Orchestration", "type": "integration", "description": "Coordinates itinerary continuity, servicing context, and commercial logic across alliance, JV, codeshare, and selected cargo partners.", "domain": "holiday-and-distribution", "group": "commercial-growth", "internalModules": [{"title": "Partner rules engine", "description": "Stores partner-specific logic for continuity, servicing, and handoffs.", "type": "policy"}, {"title": "Partner event and message broker", "description": "Manages partner-facing itinerary and recovery messaging.", "type": "integration"}], "interfaces": [{"title": "Partner continuity service", "description": "Exposes partner-aware itinerary and servicing context to internal products.", "type": "api"}], "brickDependencies": [{"targetBrickId": "intg", "type": "integration", "interface": "Partner event backbone", "description": "Uses the shared integration layer for partner eventing."}], "externalSystemsThisBrickDependsOn": [{"system": "Alliance, JV, codeshare, and cargo partner systems", "type": "partner-system", "interface": "Partner messaging and servicing APIs", "description": "Relies on partner systems for joint itinerary and continuity data."}], "externalSystemsDependingOnThisBrick": [{"system": "Retail, servicing, distribution, and cargo products", "type": "internal-consumer", "interface": "Partner continuity service", "description": "Use this brick whenever journeys or shipments extend beyond own-metal operations."}], "icon": "part.png"}}], "deliveryChannels": [{"channelId": "prod_cargo-web", "change": "Introduced richer quote, tracking, and premium-product visibility in the Cargo Digital Portal.", "channel": {"productId": "prod_cargo", "productName": "", "name": "prod_cargo-web", "type": "product", "icon": "product.png"}}, {"channelId": "prod_cargo-api", "change": "Introduced stronger shipment-state and booking-control pathways in the Cargo Connectivity API.", "channel": {"productId": "prod_cargo", "productName": "", "name": "prod_cargo-api", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["air-cargo-digital"], "supportingTeamIds": ["air-integration-platform", "air-data-personalisation"]}, "initiativeId": "initiative-premium-long-haul-airline-2026-03-04-03", "discoveryIds": ["discovery-premium-long-haul-airline-2026-02-25-02-cargo-digital-confidence"], "discoveryLinks": [{"discoveryId": "discovery-premium-long-haul-airline-2026-02-25-02-cargo-digital-confidence", "discoveryName": "Cargo digital confidence discovery", "status": "ongoing", "landingPageIndex": 1}], "landingPageIndex": 0};
    const domainName = 'Premium Long-Haul Airline';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
