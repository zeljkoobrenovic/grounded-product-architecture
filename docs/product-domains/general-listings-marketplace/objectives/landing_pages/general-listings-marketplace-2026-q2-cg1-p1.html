<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2026-Q2 Local Buyer / Seeker outcome goal</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1180px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #eaf1f7;
            color: #315b7c;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .objective {
            font-size: 19px;
            line-height: 1.55;
        }

        .metric {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 12px;
        }

        .metric-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
        }

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metric-description {
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }

        .key-result {
            margin-bottom: 14px;
            padding: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background-color: #fafafa;
        }

        .key-result-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .subsection {
            margin-top: 12px;
        }

        .subsection-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 50px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Objectives">
        </td>
        <td>
            <div class="eyebrow" id="Eyebrow"></div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div style="margin-left: 12px">
    <div class="tab">
        <button class="tablinks active" id="tab_HomeTab" onclick="openTab('HomeTab')">Home</button>
        <button class="tablinks" id="tab_InitiativesTab" onclick="openTab('InitiativesTab')">Initiatives</button>
        <button class="tablinks" id="tab_DiscoveriesTab" onclick="openTab('DiscoveriesTab')">Discoveries</button>
        <button class="tablinks" id="tab_ReleasesTab" onclick="openTab('ReleasesTab')">Releases</button>
    </div>

    <div id="HomeTab" class="tabcontent" style="display: block;"></div>
    <div id="InitiativesTab" class="tabcontent"></div>
    <div id="DiscoveriesTab" class="tabcontent"></div>
    <div id="ReleasesTab" class="tabcontent"></div>
</div>

<script>
    const pageData = {"id": "general-listings-marketplace-2026-q2-cg1-p1", "title": "2026-Q2 Local Buyer / Seeker outcome goal", "objective": "Improve successful buyer transaction rate by strengthening buyer discovery, trust, and messaging responsiveness.", "okrStyle": "objective-and-key-results", "status": "active", "period": {"quarter": "2026-Q2", "startDate": "2026-04-01", "endDate": "2026-06-30", "type": "current"}, "linkedCustomers": [{"customerId": "CG1-P1", "customerName": "Local Buyer / Seeker", "customerGroup": "Demand-Side Consumers"}], "linkedCustomerKPIs": [{"customerId": "CG1-P1", "customerName": "Local Buyer / Seeker", "kpiId": "CO-CG1-TOP", "kpiName": "Successful buyer transaction rate", "description": "Share of buyer journeys that reach a trustworthy contact and successful transaction outcome.", "unit": "% of buyer journeys", "kind": "customer", "targetDirection": "increase"}, {"customerId": "CG1-P1", "customerName": "Local Buyer / Seeker", "kpiId": "CO-CG1-B2-C2", "kpiName": "Trust-safe transaction rate", "description": "Share of high-risk transactions completed without fraud, dispute, or safety incident.", "unit": "% of protected transactions", "kind": "customer", "targetDirection": "increase"}], "linkedBusinessKPIs": [{"customerId": "CG1-P1", "customerName": "Local Buyer / Seeker", "kpiId": "BO-CG1-TOP", "kpiName": "Demand-side liquidity contribution", "description": "Buyer activity converted into qualified marketplace liquidity and monetizable engagement.", "unit": "index", "kind": "business", "targetDirection": "increase"}], "keyResults": [{"id": "kr-1", "metric": "Successful buyer transaction rate", "kind": "customer", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline from Q1 buyer funnel reporting", "statement": "Increase successful buyer transaction rate during the quarter.", "executingTeams": [{"teamId": "buyer-growth-discovery", "teamName": "Buyer Growth - Discovery", "role": "executing", "intent": "Lead buyer discovery and detail-page conversion work."}], "supportingTeams": [{"teamId": "trust-and-identity", "teamName": "Trust, Identity & Transactions", "role": "supporting", "intent": "Provide trust signals and protected transaction support."}, {"teamId": "market-intelligence-and-pricing", "teamName": "Market Intelligence & Pricing", "role": "supporting", "intent": "Improve search relevance and supply matching."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "Outcome target with room for learning and iteration."}, {"id": "kr-1", "metric": "Trust-safe transaction rate", "kind": "customer", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline from protected transaction cohorts", "statement": "Increase trust-safe transaction rate during the quarter.", "executingTeams": [{"teamId": "trust-and-identity", "teamName": "Trust, Identity & Transactions", "role": "executing", "intent": "Lead identity, fraud, and protected transaction work."}], "supportingTeams": [{"teamId": "buyer-growth-discovery", "teamName": "Buyer Growth - Discovery", "role": "supporting", "intent": "Expose trust controls in buyer journeys."}, {"teamId": "seller-growth-listing-funnel", "teamName": "Seller Growth - Listing Funnel", "role": "supporting", "intent": "Expose trust controls in seller workflows."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "Outcome target with constrained scope to selected categories."}], "linkedInitiatives": [{"id": "initiative-general-listings-marketplace-2026-03-10-01", "date": "2026-03-10", "description": "Improve cross-category local discovery by strengthening search relevance, saved alerts, and buyer trust signals across the buyer web and mobile experiences.", "customerIds": ["CG1-P1"], "deliveryChannels": ["P1-buyer-web-marketplace", "P1-ios", "P1-android"], "productBricks": ["serp", "ssal", "cdpc"], "landingPageIndex": 3, "title": "Buyer Discovery Relevance Initiative", "name": "Buyer Discovery Relevance Initiative", "initiativeId": "initiative-general-listings-marketplace-2026-03-10-01"}, {"id": "initiative-general-listings-marketplace-2026-03-18-04", "date": "2026-03-18", "description": "Strengthen identity, fraud controls, and optional protected transaction flows in higher-risk categories.", "customerIds": ["CG1-P1", "CG2-P1"], "deliveryChannels": ["P1-buyer-web-marketplace", "P2-seller-web-studio", "P3-merchant-portal"], "productBricks": ["idve", "frde", "papl"], "landingPageIndex": 0, "title": "Trust, Safety, and Protected Transactions Initiative", "name": "Trust, Safety, and Protected Transactions Initiative", "initiativeId": "initiative-general-listings-marketplace-2026-03-18-04"}], "linkedReleases": [{"id": "release-general-listings-marketplace-2026-03-21-01", "date": "2026-03-21", "description": "Release of buyer discovery improvements covering search relevance, alerts, and detail-page trust signals across buyer web and mobile.", "customerIds": ["CG1-P1"], "deliveryChannels": ["P1-buyer-web-marketplace", "P1-ios", "P1-android"], "productBricks": ["serp", "ssal", "cdpc"], "landingPageIndex": 3, "title": "Buyer Discovery Relevance Release", "name": "Buyer Discovery Relevance Release"}], "sourceReferences": {"customers": "customers/customers.json", "initiatives": "delivery/initiatives.json", "releases": "delivery/releases.json"}, "objectiveRole": "source_objective_for_company_okrs", "companyObjectiveIds": ["obj-liquidity", "obj-trust"], "inspiredByInsights": [{"insightId": "discovery-general-listings-marketplace-2026-03-05-01-buyer-discovery", "insightTitle": "Buyer discovery and trust signals discovery", "status": "ongoing", "howItInspiresObjective": "Anchors buyer-side opportunity sizing.", "landingPageIndex": 0}, {"insightId": "discovery-general-listings-marketplace-2026-02-26-04-protected-transactions", "insightTitle": "Protected transactions and fraud controls discovery", "status": "archived", "howItInspiresObjective": "Explains the trust gap in selected categories.", "landingPageIndex": 2}], "landingPageId": "general-listings-marketplace-2026-q2-cg1-p1", "companyObjectiveRefs": [{"id": "obj-liquidity", "title": "2026-Q2 Increase cross-category marketplace liquidity", "landingPageId": "archive-obj-liquidity"}, {"id": "obj-trust", "title": "2026-Q2 Make local transactions safer and more repeatable", "landingPageId": "archive-obj-trust"}]};
    const pageKind = 'source-objective';
    const domainName = 'General Listings Marketplace';

    function initTab() {
        if (window.location.hash) {
            const tabName = window.location.hash.substring(1);
            if (document.getElementById(tabName)) {
                openTab(tabName);
            }
        }
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) {
            return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        }
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        const title = metric.kpiName || metric.metric || '';
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(title) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderExecutionItem(item, typeName) {
        const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
            ? (typeName === 'initiative'
                ? '../../initiatives/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '../../releases/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html')
            : '';
        let html = '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(target, item.description || item.id, 'list-title') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(item.date || '') + '</div>';
        if (item.customerIds && item.customerIds.length) {
            html += '<div class="list-description">Customers: ' + escapeHtml(item.customerIds.join(', ')) + '</div>';
        }
        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="list-description">Channels: ' + escapeHtml(item.deliveryChannels.join(', ')) + '</div>';
        }
        if (item.productBricks && item.productBricks.length) {
            html += '<div class="list-description">Bricks: ' + escapeHtml(item.productBricks.join(', ')) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderEmptyState(message) {
        return '<div class="list-row"><div class="list-description">' + escapeHtml(message) + '</div></div>';
    }

    function renderTeams(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.teamName || item.teamId) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.role || '') + '</div>';
            if (item.intent) {
                html += '<div class="list-description">' + escapeHtml(item.intent) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderInsights(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.insightTitle || item.title) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function sameInsightSet(a, b) {
        const aIds = (a || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        const bIds = (b || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        return aIds && bIds && aIds === bIds;
    }

    function renderKeyResult(item, options) {
        let html = '<div class="key-result">';
        html += '<div class="key-result-title">' + escapeHtml(item.metric) + '</div>';
        html += '<div>' + escapeHtml(item.statement || '') + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(item.targetDirection || '') + (item.target ? ' | ' + escapeHtml(item.target) : '') + (item.commitmentLabel ? ' | ' + escapeHtml(item.commitmentLabel) : '') + '</div>';
        if (item.baseline) {
            html += '<div class="list-description">Baseline: ' + escapeHtml(item.baseline) + '</div>';
        }
        if (item.commitmentRationale) {
            html += '<div class="list-description">Commitment: ' + escapeHtml(item.commitmentRationale) + '</div>';
        }
        html += renderTeams('Executing Teams', item.executingTeams || [], true);
        html += renderTeams('Supporting Teams', item.supportingTeams || [], true);
        html += '</div>';
        return html;
    }

    function renderSourceObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.objective || '') + '</div></div>';

        if (page.companyObjectiveRefs && page.companyObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Mapped Company Objectives</div>';
            page.companyObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(item.id) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.linkedCustomers && page.linkedCustomers.length) {
            html += '<div class="section"><div class="section-title">Linked Customers</div>';
            page.linkedCustomers.forEach(customer => {
                html += '<div class="pill"><div><div class="pill-name">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.keyResults && page.keyResults.length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            page.keyResults.forEach(item => {
                html += renderKeyResult(item, {showObjective: true, showSource: false});
            });
            html += '</div>';
        }

        if ((page.linkedCustomerKPIs && page.linkedCustomerKPIs.length) || (page.linkedBusinessKPIs && page.linkedBusinessKPIs.length)) {
            html += '<div class="section"><div class="section-title">Linked KPIs</div>';
            (page.linkedCustomerKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            (page.linkedBusinessKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            html += '</div>';
        }

        if (page.sourceReferences) {
            html += '<div class="section"><div class="section-title">Source References</div>';
            Object.keys(page.sourceReferences).forEach(key => {
                if (page.sourceReferences[key]) {
                    html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(key) + '</div><div class="pill-meta">' + escapeHtml(page.sourceReferences[key]) + '</div></div></div>';
                }
            });
            html += '</div>';
        }
        return html;
    }

    function renderCompanyObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.statement || '') + '</div></div>';

        if (page.okrDesignNotes) {
            html += '<div class="section"><div class="section-title">Design Notes</div><div class="list-row"><div class="list-description">' + escapeHtml(page.okrDesignNotes) + '</div></div></div>';
        }

        if (page.sourceObjectiveRefs && page.sourceObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Source Objectives</div>';
            page.sourceObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' +
                    escapeHtml(String(item.keyResultsCount || 0) + ' key results') +
                    ((item.quarter ? ' | ' + escapeHtml(item.quarter) : '')) +
                    '</div></div></div>';
            });
            html += '</div>';
        }
        return html;
    }

    function renderActivityTab(items, typeName, emptyMessage) {
        if (!items || !items.length) {
            return renderEmptyState(emptyMessage);
        }
        let html = '';
        items.forEach(item => {
            html += renderExecutionItem(item, typeName);
        });
        return html;
    }

    function renderDiscoveriesTab(page, kind) {
        const items = page.inspiredByInsights || [];
        if (!items.length) {
            return renderEmptyState('No discoveries linked to this objective.');
        }
        let html = '';
        items.forEach(item => {
            const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '';
            html += '<div class="list-row">';
            html += '<div class="list-title">' + linkOf(target, item.insightTitle || item.title || item.id, 'list-title') + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || item.kind || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Eyebrow').innerHTML = escapeHtml(pageKind === 'company-objective' ? 'Company Objective' : 'Source Objective');
    document.getElementById('Title').innerHTML = escapeHtml(pageData.title || 'Objective');
    const metaBits = [escapeHtml(domainName)];
    if (pageData.status) {
        metaBits.push(escapeHtml(pageData.status));
    }
    if (pageData.period && pageData.period.quarter) {
        metaBits.push(escapeHtml(pageData.period.quarter));
    }
    document.getElementById('Meta').innerHTML = metaBits.join(' | ');

    document.getElementById('HomeTab').innerHTML = pageKind === 'company-objective'
        ? renderCompanyObjectiveHome(pageData)
        : renderSourceObjectiveHome(pageData);
    document.getElementById('InitiativesTab').innerHTML = renderActivityTab(
        pageData.linkedInitiatives || [],
        'initiative',
        'No initiatives linked to this objective.'
    );
    document.getElementById('DiscoveriesTab').innerHTML = renderDiscoveriesTab(pageData, pageKind);
    document.getElementById('ReleasesTab').innerHTML = renderActivityTab(
        pageData.linkedReleases || [],
        'release',
        'No releases linked to this objective.'
    );
    initTab();
</script>
</body>
</html>
