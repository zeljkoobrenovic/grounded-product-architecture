<script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

<script>
    function addNavigation() {
        let html = '';
        html += '<div style="margin: 4px 20px 10px 20px; font-size: 85%; color: black">';
        let prev_domain = all_customers[0].domain;
        all_customers.forEach(per => {
            if (prev_domain.toLowerCase() !== per.domain.toLowerCase()) {
                prev_domain = per.domain;
                html += '<div style="margin-top: 5px; margin-left: 4px; vertical-align: top; display: inline-block; border-left: 2px solid lightgrey; height: 30px;">&nbsp;</div>';
            }
            html += '<a href="' + per.id + '.html">';
            const tabClass = per.id === customer.id ? 'tab-image-selected' : 'tab-image';
            html += '<img src="../icons/' + per.icon + '" style="" class="' + tabClass + '" onerror="this.onerror=null;this.src=\'../icons/customer.png\'">';
            html += '</a>';
        });
        html += '</div>';

        document.getElementById('Navigation').innerHTML = html;
    }

    addNavigation();

        html += '</td>';
        html += '</tr>';
        html += '</table>';

        document.getElementById('Header').innerHTML = html;
    }

    function addInsights() {
        let html = '';

        html += '<div style="margin: 24px">';

        if (!customerInsights || customerInsights.length === 0) {
            html += '<div class="group">No customer-linked insights defined for this domain yet.</div>';
        } else {
            customerInsights.forEach(insight => {
                html += '<div class="group" style="width: 250px; display: inline-block; margin: 8px; padding: 16px; background: white">';
                html += '<div style="font-size: 150%; color: #1d4ed8; margin-bottom: 8px">' + escapeHtml(insight.title) + '</div>';
                html += '<div style="margin-bottom: 10px">' + escapeHtml(insight.summary) + '</div>';
                if (insight.implication) {
                    html += '<div style="margin-bottom: 10px"><b>Product implication:</b> ' + escapeHtml(insight.implication) + '</div>';
                }
                if (insight.link) {
                    if (insight.link.jobIds && insight.link.jobIds.length) {
                        html += '<div style="font-size: 13px; color: #4b5563; margin-bottom: 4px"><b>Jobs:</b> ' + escapeHtml(insight.link.jobIds.join(', ')) + '</div>';
                    }
                    if (insight.link.kpis && insight.link.kpis.length) {
                        html += '<div style="font-size: 13px; color: #4b5563; margin-bottom: 4px"><b>KPIs:</b> ' + escapeHtml(insight.link.kpis.join(', ')) + '</div>';
                    }
                }
                if (insight.tags && insight.tags.length) {
                    html += '<div style="margin-top: 8px; margin-bottom: 10px">';
                    insight.tags.forEach(tag => {
                        html += '<span style="display:inline-block; margin:0 8px 6px 0; padding:4px 10px; border-radius:999px; background:#eef2f6; font-size:12px">' + escapeHtml(tag) + '</span>';
                    });
                    html += '</div>';
                }
                if (insight.sources && insight.sources.length) {
                    html += '<div style="margin-top: 8px">';
                    html += '<div style="font-size: 13px; color: #6b7280; margin-bottom: 4px">Sources</div>';
                    insight.sources.forEach(source => {
                        html += '<div style="font-size: 13px; margin-bottom: 4px">';
                        html += '<a class="activity-link" target="_blank" href="' + escapeHtml(source.url) + '">' + escapeHtml(source.title) + '</a>';
                        html += '<span class="activity-muted"> (' + escapeHtml(source.publisher || '') + (source.date ? ', ' + escapeHtml(source.date) : '') + ')</span>';
                        html += '</div>';
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
        }
        html += '</div>';

        document.getElementById('Insights').innerHTML = html;
    }

                if (step.media) {

                    step.media.forEach(item => {

        html += '</div>';

    function normalizeRoadmapKpi(value, supportingKey) {
        if (!value) {
            return {northStar: '', [supportingKey]: []};
        }
        if (typeof value === 'string') {
            return {northStar: value, [supportingKey]: []};
        }
        const normalized = Object.assign({}, value);
        normalized.northStar = normalized.northStar || normalized.name || '';
        normalized[supportingKey] = normalized[supportingKey] || [];
        return normalized;
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function renderKpis(items) {
        let html = '';
        items.forEach(item => {
            html += '<div><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span class="activity-muted">(' + escapeHtml(item.unit) + ')</span>';
            }
            if (item.expectedImpact) {
                html += ': ' + escapeHtml(item.expectedImpact);
            }
            if (item.currentValue) {
                html += '<div class="activity-muted"><b>Current:</b> ' + escapeHtml(String(item.currentValue)) + '</div>';
            }
            if (item.description) {
                html += '<div class="activity-muted">' + escapeHtml(item.description) + '</div>';
            }
            if (item.link) {
                html += '<div class="activity-muted"><a target="_blank" rel="noopener noreferrer" href="' + escapeHtml(item.link) + '">' + escapeHtml(item.linkLabel || 'Open link') + '</a></div>';
            }
            html += '</div>';
        });
        return html;
    }

    function renderImpactCell(item, currentCustomerId) {
        let html = '';

            html += '<div class="activity-block' + (isCurrent ? ' activity-pill-highlight' : '') + '">';
            html += '<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">';

            html += '<div><div style="font-weight:bold; color:' + (isCurrent ? '#1d4ed8' : '#111827') + '">' + escapeHtml(impact.customer.name) + ' <span class="activity-muted">(' + escapeHtml(impact.customerId) + ')</span></div></div>';
            html += '</div>';
            html += renderKpis(impact.customerKPIs || []);
            html += renderKpis(impact.businessKPIs || []);
            html += '</div>';
        });
        return html || '<span class="activity-muted">No customer impact listed</span>';
    }

    function renderActivityTable(data, kind, currentCustomerId) {
        const items = (data && data.items) ? data.items : [];
        let html = '';
        html += '<div class="activity-summary">';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.length + '</div><div class="activity-stat-label">' + kind + '</div></div>';

        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.productBricks || []).length > 0).length + '</div><div class="activity-stat-label">With bricks</div></div>';
        html += '</div>';

        if (!items.length) {
            html += '<div class="group" style="margin-top:0">No related ' + kind.toLowerCase() + ' found for this customer.</div>';
            return html;
        }

        html += '<table class="activity-table">';
        html += '<tr><th>Date</th><th>Description</th><th>Customer Impact</th><th>Product Bricks</th><th>Delivery Channels</th></tr>';
        items.forEach(item => {
            html += '<tr>';
            html += '<td style="white-space:nowrap">' + escapeHtml(formatDate(item.date)) + '</td>';
            html += '<td><a class="activity-link" target="_blank" rel="noopener noreferrer" href="../../' + kind.toLowerCase() + '/landing_pages/' + item.landingPageIndex + '.html">' + escapeHtml(item.description || item.name || kind) + '</a></td>';
            html += '<td>' + renderImpactCell(item, currentCustomerId) + '</td>';
            html += '<td>' + renderBrickCell(item) + '</td>';
            html += '<td>' + renderChannelCell(item) + '</td>';
            html += '</tr>';
        });
        html += '</table>';
        return html;
    }

</script>

<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "General Listings Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Customers"
    },
    {
      "label": "Local Buyer / Seeker"
    }
  ]
};
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
