<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discovery (General Listings Marketplace)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Casual seller publish funnel and pricing guidance discovery", "id": "discovery-general-listings-marketplace-2026-03-07-02-seller-funnel", "name": "Casual seller publish funnel and pricing guidance discovery", "status": "ongoing", "lastUpdated": "2026-03-26", "summary": "Tests whether stronger listing templates, smarter pricing guidance, and clearer trust coaching improve seller completion and sale-through.", "opportunity": "Clarify where the current publish funnel loses casual sellers and whether better price guidance materially improves sale outcomes.", "linkedInitiatives": [{"initiativeId": "initiative-general-listings-marketplace-2026-03-12-02", "description": "Improve publish completion, pricing confidence, and early sale-through by evolving the self-serve listing funnel for casual sellers.", "landingPageIndex": 2, "initiativeDescription": "Improve publish completion, pricing confidence, and early sale-through by evolving the self-serve listing funnel for casual sellers."}], "teams": {"leadTeamId": "seller-growth-listing-funnel", "supportingTeamIds": ["market-intelligence-and-pricing", "trust-and-identity"], "assignments": [{"teamId": "seller-growth-listing-funnel", "teamName": "Seller Growth - Listing Funnel", "role": "lead", "roleLabel": "Lead discovery team", "how": "Owns publish-flow research, prototype work, and recommendation."}, {"teamId": "market-intelligence-and-pricing", "teamName": "Market Intelligence & Pricing", "role": "support", "roleLabel": "Supporting discovery team", "how": "Provides pricing guidance and demand-signal support."}, {"teamId": "trust-and-identity", "teamName": "Trust, Identity & Transactions", "role": "support", "roleLabel": "Supporting discovery team", "how": "Provides seller safety and fraud constraints."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers choose to use it or pay for it?", "hypothesis": "Casual sellers will publish more often and adopt boosts more readily when pricing and listing quality feel manageable.", "evidenceToCollect": ["Whether sellers cite pricing uncertainty as a top reason for abandonment.", "Whether concept tests improve confidence to publish."], "methods": ["Seller interviews", "Prototype testing"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "Publish-flow improvements will increase supply liquidity and paid visibility attach enough to justify the effort.", "evidenceToCollect": ["Impact on publish completion and listing quality.", "Impact on boost eligibility and moderation cost."], "methods": ["Business case review", "Funnel analysis"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Casual sellers can complete a category-aware flow faster if the UI hides unnecessary complexity.", "evidenceToCollect": ["Time-on-task for photo-first listing creation.", "Confusion points around price suggestions and condition fields."], "methods": ["Task-based usability sessions"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The teams can reuse existing listing and data infrastructure rather than creating a new seller platform.", "evidenceToCollect": ["Dependencies on media, structured attributes, and analytics.", "Feasibility of category-specific templates in existing clients."], "methods": ["Technical spike", "Delivery slicing workshop"]}], "plannedActivities": ["Test publish prototypes with one-off sellers in top casual categories.", "Model pricing-guidance quality using existing comparables.", "Define the smallest reusable template system that works across web and mobile."], "decisionToMake": "Decide whether to scale a single cross-category seller flow or specialize first for a smaller category set.", "startDate": "2026-03-07", "endDate": "2026-04-07", "statusLabel": "Ongoing", "landingPageIndex": 1, "date": "2026-03-07", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'General Listings Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome && discovery.outcome.summary) {
        html += '<div class="section"><div class="section-title">Outcome</div><div class="description">' + escapeHtml(discovery.outcome.summary) + '</div></div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
