<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discovery (General Listings Marketplace)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Buyer discovery and trust signals discovery", "id": "discovery-general-listings-marketplace-2026-03-05-01-buyer-discovery", "name": "Buyer discovery and trust signals discovery", "status": "ongoing", "lastUpdated": "2026-03-26", "summary": "Tests whether better category-aware search, fresher alerts, and clearer trust signals increase buyer action in high-volume local categories.", "opportunity": "Clarify whether discovery quality and trust surfaces materially improve buyer conversion without creating excessive moderation or ranking complexity.", "linkedInitiatives": [{"initiativeId": "initiative-general-listings-marketplace-2026-03-10-01", "description": "Improve cross-category local discovery by strengthening search relevance, saved alerts, and buyer trust signals across the buyer web and mobile experiences.", "landingPageIndex": 3, "initiativeDescription": "Improve cross-category local discovery by strengthening search relevance, saved alerts, and buyer trust signals across the buyer web and mobile experiences."}], "teams": {"leadTeamId": "buyer-growth-discovery", "supportingTeamIds": ["trust-and-identity", "market-intelligence-and-pricing"], "assignments": [{"teamId": "buyer-growth-discovery", "teamName": "Buyer Growth - Discovery", "role": "lead", "roleLabel": "Lead discovery team", "how": "Owns the buyer problem framing, prototype validation, and recommendation."}, {"teamId": "trust-and-identity", "teamName": "Trust, Identity & Transactions", "role": "support", "roleLabel": "Supporting discovery team", "how": "Provides fraud, identity, and protected-transaction constraints."}, {"teamId": "market-intelligence-and-pricing", "teamName": "Market Intelligence & Pricing", "role": "support", "roleLabel": "Supporting discovery team", "how": "Provides relevance, pricing, and supply-signal analysis."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers choose to use it or pay for it?", "hypothesis": "Buyers will engage more when search and detail pages make trustworthy local supply easier to judge.", "evidenceToCollect": ["Whether buyers describe noisy discovery and weak trust signals as a top pain.", "Whether prototype tests improve save, contact, or return intent."], "methods": ["Problem interviews", "Concept walkthroughs", "Behavioral funnel analysis"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "Improving discovery quality will create enough liquidity and retention to justify ranking and moderation investment.", "evidenceToCollect": ["Expected lift in buyer repeat rate and contact conversion.", "Operational cost implications for search and moderation teams."], "methods": ["Business case review", "KPI trade-off review"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Buyers can understand stronger trust signals and use richer filters without added confusion.", "evidenceToCollect": ["Where buyers hesitate in filter-heavy flows.", "Whether trust indicators help or distract at listing detail level."], "methods": ["Usability sessions", "Prototype testing"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The teams can ship a focused buyer discovery slice without a full ranking-platform rewrite.", "evidenceToCollect": ["Dependencies across ranking, messaging, and trust services.", "Whether alert precision can be improved with current event quality."], "methods": ["Technical spike", "Architecture review"]}], "plannedActivities": ["Interview buyers in electronics, vehicles, and home-goods categories.", "Prototype revised search-result and detail-page trust treatments.", "Review moderation and ranking dependencies for an MVP release."], "decisionToMake": "Decide whether to proceed with a broad buyer discovery rollout or limit the work to selected categories.", "startDate": "2026-03-05", "endDate": "2026-04-04", "statusLabel": "Ongoing", "landingPageIndex": 0, "date": "2026-03-05", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'General Listings Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome && discovery.outcome.summary) {
        html += '<div class="section"><div class="section-title">Outcome</div><div class="description">' + escapeHtml(discovery.outcome.summary) + '</div></div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
