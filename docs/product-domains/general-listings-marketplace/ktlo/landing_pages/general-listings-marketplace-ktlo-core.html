<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KTLO | General Listings Marketplace KTLO baseline (General Listings Marketplace)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f1ff;
            color: #1d4ed8;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: #315b7c;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="KTLO">
</td>
<td>
<div class="eyebrow">KTLO</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</tr>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const objective = {"id": "general-listings-marketplace-ktlo-core", "title": "General Listings Marketplace KTLO baseline", "objective": "Protect service continuity and delivery capacity in General Listings Marketplace by managing critical bugs, paying down technical debt, and applying security maintenance work on time.", "status": "active", "period": {"type": "rolling"}, "keyResults": [{"id": "kr-critical-bugs", "metric": "Critical bugs", "category": "critical-bugs", "kind": "operational", "targetDirection": "decrease", "target": "Reduce the open Sev1 and Sev2 bug backlog and restore service quickly when failures occur.", "baseline": "Measured from the current operational backlog.", "statement": "Reduce critical bug exposure in General Listings Marketplace.", "commitmentType": "high-integrity", "status": "active"}, {"id": "kr-tech-debt", "metric": "Tech debt", "category": "tech-debt", "kind": "operational", "targetDirection": "decrease", "target": "Retire high-friction legacy components, brittle workflows, and manual operational work that slows delivery.", "baseline": "Measured from the current engineering debt register.", "statement": "Reduce structural tech debt in General Listings Marketplace.", "commitmentType": "standard", "status": "active"}, {"id": "kr-security-patches", "metric": "Security patches", "category": "security-patches", "kind": "operational", "targetDirection": "decrease", "target": "Keep critical and high-severity vulnerabilities within patch SLAs across production systems and dependencies.", "baseline": "Measured from the current vulnerability backlog and patch compliance posture.", "statement": "Keep security patching current in General Listings Marketplace.", "commitmentType": "high-integrity", "status": "active"}]};
    const initiatives = [{"title": "Trust Incident Stabilization Sprint", "date": "2026-04-07", "description": "A focused KTLO initiative to reduce critical production defects, tighten incident response loops, and remove the highest-severity reliability failures affecting General Listings Marketplace operations.", "initiativeId": "initiative-general-listings-marketplace-ktlo-critical-bugs", "priority": "p0", "category": "critical-bugs", "keyResultId": "general-listings-marketplace-ktlo-core/kr-critical-bugs", "productBricks": [], "deliveryChannels": [], "teams": {"primaryTeamIds": [], "supportingTeamIds": []}, "landingPageId": "initiative-initiative-general-listings-marketplace-ktlo-critical-bugs"}, {"title": "Marketplace Core Debt Retirement", "date": "2026-04-14", "description": "A KTLO initiative to reduce operational drag by refactoring brittle integrations, simplifying recovery paths, and removing legacy technical debt that slows change in General Listings Marketplace.", "initiativeId": "initiative-general-listings-marketplace-ktlo-tech-debt", "priority": "p1", "category": "tech-debt", "keyResultId": "general-listings-marketplace-ktlo-core/kr-tech-debt", "productBricks": [], "deliveryChannels": [], "teams": {"primaryTeamIds": [], "supportingTeamIds": []}, "landingPageId": "initiative-initiative-general-listings-marketplace-ktlo-tech-debt"}, {"title": "Marketplace Security Patch Compliance Cycle", "date": "2026-04-21", "description": "A KTLO initiative to keep the General Listings Marketplace stack within security patch SLAs by upgrading vulnerable dependencies, rotating outdated components, and closing remediation gaps.", "initiativeId": "initiative-general-listings-marketplace-ktlo-security-patches", "priority": "p0", "category": "security-patches", "keyResultId": "general-listings-marketplace-ktlo-core/kr-security-patches", "productBricks": [], "deliveryChannels": [], "teams": {"primaryTeamIds": [], "supportingTeamIds": []}, "landingPageId": "initiative-initiative-general-listings-marketplace-ktlo-security-patches"}];
    const domainName = 'General Listings Marketplace';

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function initiativeHref(item) {
        if (item.landingPageId) {
            return encodeURIComponent(item.landingPageId) + '.html';
        }
        if (item.initiativeId) {
            return 'initiative-' + encodeURIComponent(item.initiativeId) + '.html';
        }
        return '';
    }

    document.getElementById('Title').innerHTML = escapeHtml(objective.title || objective.id || 'KTLO Objective');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(objective.status || 'active') + ' | ' + escapeHtml((objective.period || {}).type || 'rolling');

    let html = '';
    if (objective.objective) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(objective.objective) + '</div></div>';
    }

    if (objective.keyResults && objective.keyResults.length) {
        html += '<div class="section"><div class="section-title">Key Results</div>';
        objective.keyResults.forEach(item => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header"><div class="impact-id">' + escapeHtml(item.metric || item.category || item.id) + '</div></div>';
            html += '<div class="impact-line"><b>Statement:</b> ' + escapeHtml(item.statement || '') + '</div>';
            html += '<div class="impact-line"><b>Target:</b> ' + escapeHtml(item.target || '') + '</div>';
            html += '<div class="impact-line"><b>Baseline:</b> ' + escapeHtml(item.baseline || '') + '</div>';
            html += '<div class="impact-line"><b>Commitment:</b> ' + escapeHtml(item.commitmentType || 'standard') + '</div>';
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiatives && initiatives.length) {
        html += '<div class="section"><div class="section-title">Initiatives</div>';
        initiatives.forEach(item => {
            html += '<div class="pill">';
            html += '<img class="pill-icon" src="../../ktlo/icons/logo.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'">';
            html += '<div>';
            html += '<div class="pill-name">' + linkOf(initiativeHref(item), item.title || item.initiativeId || 'Initiative', 'pill-name') + '</div>';
            html += '<div>' + escapeHtml(item.description || '') + '</div>';
            html += '<div class="pill-meta">' + escapeHtml(item.category || '') + (item.priority ? ' | ' + escapeHtml(item.priority) : '') + (item.date ? ' | ' + escapeHtml(item.date) : '') + '</div>';
            html += '</div>';
            html += '</div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
