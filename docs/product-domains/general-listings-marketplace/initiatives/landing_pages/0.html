<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (General Listings Marketplace)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Trust, Safety, and Protected Transactions Initiative", "date": "2026-03-18", "description": "Strengthen identity, fraud controls, and optional protected transaction flows in higher-risk categories.", "customerImpact": [{"customerId": "CG1-P1", "customer": {"id": "CG1-P1", "name": "Local Buyer / Seeker", "group": "Demand-Side Consumers", "icon": "seeker.png"}, "customerKPIs": [{"kpi": "Trust-safe transaction rate", "expectedImpact": "Increase safe transaction completion for higher-risk buyer journeys.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Demand-side liquidity contribution", "expectedImpact": "Increase high-value category conversion with lower fraud exposure.", "description": "Buyer activity converted into qualified marketplace liquidity and monetizable engagement.", "unit": "index", "kind": "business"}]}, {"customerId": "CG2-P1", "customer": {"id": "CG2-P1", "name": "Casual Seller / Household Lister", "group": "Supply-Side Individuals", "icon": "seller.png"}, "customerKPIs": [{"kpi": "Execution quality", "expectedImpact": "Reduce spam contacts and failed handoffs for casual sellers.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Supply liquidity and monetization", "expectedImpact": "Protect supply quality and support monetizable protected transaction flows.", "description": "The combination of active local supply, sale-through quality, and monetizable seller demand.", "unit": "index", "kind": "business"}]}], "productBricks": [{"brickId": "idve", "change": "Expand identity verification for risky categories and sellers.", "brick": {"id": "idve", "name": "Identity Verification", "type": "service", "description": "Ability to certify the identity of an actor via validation of a certification file (actor validation via certification file)", "domain": "Platform Experience", "group": "ACP. / User management", "internalModules": [{"title": "Identity and Policy Engine", "description": "Authenticates actors, evaluates access policies, and manages trust rules for Identity Verification.", "type": "identity"}, {"title": "Entitlements and Lifecycle Management", "description": "Manages roles, permissions, account state, and lifecycle changes within Identity Verification.", "type": "service"}, {"title": "Audit and Compliance Controls", "description": "Records security-relevant actions and compliance evidence produced by Identity Verification.", "type": "compliance"}], "interfaces": [{"title": "Authentication API", "description": "Programmatic interface for authentication, authorization, or account checks exposed by Identity Verification.", "type": "api"}, {"title": "Administration Console", "description": "Operational interface for managing identity settings and access policies in Identity Verification.", "type": "ui"}, {"title": "Audit Event Stream", "description": "Event interface that publishes security and compliance signals from Identity Verification.", "type": "event"}], "brickDependencies": [{"targetBrickId": "ccnm", "type": "service-api", "interface": "Service API", "description": "Depends on Consumer Contacting Management to provide service capabilities required by Identity Verification."}, {"targetBrickId": "opad", "type": "event-routing", "interface": "Outbound Event Feed", "description": "Depends on Off-Platform Advertising to provide integration capabilities required by Identity Verification."}, {"targetBrickId": "loin", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Location Insights to provide analytics capabilities required by Identity Verification."}], "externalSystemsThisBrickDependsOn": [{"system": "Corporate Identity Provider", "type": "identity", "interface": "OIDC / SAML", "description": "Identity Verification integrates with an external identity provider for authentication and federation."}, {"system": "Compliance Screening Services", "type": "compliance", "interface": "Screening API", "description": "Identity Verification may call external screening or verification services to enforce trust and compliance checks."}], "externalSystemsDependingOnThisBrick": [{"system": "Customer and Operator Applications", "type": "identity-consumer", "interface": "Authentication / Authorization Interface", "description": "Internal and external applications depend on Identity Verification for authentication, authorization, and trusted account state."}, {"system": "Audit and Risk Systems", "type": "control-consumer", "interface": "Audit / Event Interface", "description": "Governance and risk systems depend on Identity Verification to emit trust, access, and compliance events."}], "icon": "idve.png"}}, {"brickId": "frde", "change": "Improve scam and fraud detection across listing and messaging flows.", "brick": {"id": "frde", "name": "Fraud Detection", "type": "service", "description": "Ability to automatically censor a classified", "domain": "Data", "group": "dynamics", "internalModules": [{"title": "Core Domain Engine", "description": "Implements the main business logic and lifecycle handled by Fraud Detection.", "type": "service"}, {"title": "Rules and Administration", "description": "Provides the configuration, rules, and administrative controls required by Fraud Detection.", "type": "operations"}, {"title": "Reporting and Exception Handling", "description": "Supports visibility, diagnostics, and manual handling of exceptions in Fraud Detection.", "type": "analytics"}], "interfaces": [{"title": "Service API", "description": "API surface for interacting with the business capabilities implemented by Fraud Detection.", "type": "api"}, {"title": "Operations Workspace", "description": "User interface for administration and operational control of Fraud Detection.", "type": "ui"}, {"title": "Domain Event Feed", "description": "Event interface that publishes notable business changes from Fraud Detection.", "type": "event"}], "brickDependencies": [{"targetBrickId": "ccma", "type": "identity", "interface": "Authentication API", "description": "Depends on Cookie Consent Management to provide identity capabilities required by Fraud Detection."}, {"targetBrickId": "opad", "type": "event-routing", "interface": "Outbound Event Feed", "description": "Depends on Off-Platform Advertising to provide integration capabilities required by Fraud Detection."}, {"targetBrickId": "loin", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Location Insights to provide analytics capabilities required by Fraud Detection."}], "externalSystemsThisBrickDependsOn": [{"system": "Back-Office Systems", "type": "back-office", "interface": "Service API", "description": "Fraud Detection exchanges operational state and business records with external back-office systems."}, {"system": "Notification and Communication Platforms", "type": "communication", "interface": "Messaging API", "description": "Fraud Detection uses external communication channels to notify users, operators, or partners."}], "externalSystemsDependingOnThisBrick": [{"system": "Business Workflows", "type": "service-consumer", "interface": "Service API", "description": "Upstream business workflows depend on Fraud Detection for core domain capabilities and state transitions."}, {"system": "Operations and Support Teams", "type": "operations-consumer", "interface": "Operations Workspace / Events", "description": "Operations consumers depend on Fraud Detection for administration, visibility, and exception resolution."}], "icon": "frde.png"}}, {"brickId": "papl", "change": "Add category-specific protected payment and dispute patterns.", "brick": {"id": "papl", "name": "Payment Platform", "type": "integration", "description": "Ability to have a generic payment that can be used across the actor domains.", "domain": "Platform Experience", "group": "Payment", "internalModules": [{"title": "Transaction and Ledger Core", "description": "Records the core financial or commercial transactions handled by Payment Platform.", "type": "finance"}, {"title": "Settlement and Reconciliation", "description": "Matches external outcomes, balances, and exceptions flowing through Payment Platform.", "type": "operations"}, {"title": "Billing Rules and Controls", "description": "Applies pricing, billing, tax, or financial control logic inside Payment Platform.", "type": "policy"}], "interfaces": [{"title": "Transaction API", "description": "API surface for submitting or retrieving financial transactions handled by Payment Platform.", "type": "api"}, {"title": "Finance Operations Workspace", "description": "User interface for reconciliation, exception handling, and financial oversight in Payment Platform.", "type": "ui"}, {"title": "Settlement and Ledger Events", "description": "Event stream carrying posting, settlement, and status changes from Payment Platform.", "type": "event"}], "brickDependencies": [{"targetBrickId": "csor", "type": "workflow", "interface": "Workflow API", "description": "Depends on Classifieds Sort Order to provide operations capabilities required by Payment Platform."}, {"targetBrickId": "ccma", "type": "event-subscription", "interface": "Audit Event Stream", "description": "Depends on Cookie Consent Management to provide identity capabilities required by Payment Platform."}, {"targetBrickId": "opad", "type": "partner-connectivity", "interface": "Partner Connector Surface", "description": "Depends on Off-Platform Advertising to provide integration capabilities required by Payment Platform."}], "externalSystemsThisBrickDependsOn": [{"system": "Payment Schemes and PSPs", "type": "financial-network", "interface": "Payment APIs", "description": "Payment Platform depends on external payment or banking networks to authorize and settle transactions."}, {"system": "Accounting or ERP Systems", "type": "back-office", "interface": "ERP Interface", "description": "Payment Platform exchanges postings, reconciliations, or settlement outcomes with finance back-office systems."}], "externalSystemsDependingOnThisBrick": [{"system": "Checkout and Billing Flows", "type": "transaction-consumer", "interface": "Payment / Posting API", "description": "Commercial flows depend on Payment Platform to authorize, post, reconcile, or settle financial transactions."}, {"system": "Finance and Reporting Systems", "type": "finance-consumer", "interface": "Ledger / Settlement Feed", "description": "Back-office finance consumers depend on Payment Platform for accounting, settlement, and reconciliation outputs."}], "icon": "papl.png"}}], "deliveryChannels": [{"channelId": "P1-buyer-web-marketplace", "change": "Expose protected transaction messaging on buyer surfaces.", "channel": {"productId": "P1", "productName": "Buyer Discovery Experience", "name": "Buyer Web Marketplace", "type": "web", "icon": "web.png"}}, {"channelId": "P2-seller-web-studio", "change": "Add seller protection guidance and verification flows.", "channel": {"productId": "P2", "productName": "Seller Listing Studio", "name": "Seller Web Studio", "type": "web", "icon": "web.png"}}, {"channelId": "P3-merchant-portal", "change": "Add merchant trust configuration and exception handling.", "channel": {"productId": "P3", "productName": "Professional Seller Workspace", "name": "Merchant Portal", "type": "web", "icon": "web.png"}}], "teams": {"primaryTeamIds": ["trust-and-identity"], "supportingTeamIds": ["buyer-growth-discovery", "seller-growth-listing-funnel", "platform-core-services"]}, "initiativeId": "initiative-general-listings-marketplace-2026-03-18-04", "discoveryIds": ["discovery-general-listings-marketplace-2026-02-26-04-protected-transactions"], "discoveryLinks": [{"discoveryId": "discovery-general-listings-marketplace-2026-02-26-04-protected-transactions", "discoveryName": "Protected transactions and fraud controls discovery", "status": "archived", "landingPageIndex": 2}], "landingPageIndex": 0};
    const domainName = 'General Listings Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
