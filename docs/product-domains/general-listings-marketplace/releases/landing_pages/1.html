    <style>
        body {

            color: #202124;

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;

        .pill {

            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>

ormation maintained by Professional Seller / Dealer / Storefront Seeker Leads Inbox.", "type": "governance"}, {"title": "Distribution and Access Services", "description": "Serves trusted data products and downstream access patterns from Professional Seller / Dealer / Storefront Seeker Leads Inbox.", "type": "service"}], "interfaces": [{"title": "Data Access API", "description": "API for retrieving or maintaining the canonical data exposed by Professional Seller / Dealer / Storefront Seeker Leads Inbox.", "type": "api"}, {"title": "Data Stewardship Console", "description": "User interface for governing, curating, and reviewing information in Professional Seller / Dealer / Storefront Seeker Leads Inbox.", "type": "ui"}, {"title": "Data Distribution Feed", "description": "Event or export interface for distributing changes originating in Professional Seller / Dealer / Storefront Seeker Leads Inbox.", "type": "event"}], "brickDependencies": [{"targetBrickId": "opad", "type": "integration", "interface": "Inbound API", "description": "Depends on Off-Platform Advertising to provide integration capabilities required by Professional Seller / Dealer / Storefront Seeker Leads Inbox."}, {"targetBrickId": "ccnm", "type": "operations-control", "interface": "Operations Workspace", "description": "Depends on Consumer Contacting Management to provide service capabilities required by Professional Seller / Dealer / Storefront Seeker Leads Inbox."}, {"targetBrickId": "loin", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Location Insights to provide analytics capabilities required by Professional Seller / Dealer / Storefront Seeker Leads Inbox."}], "externalSystemsThisBrickDependsOn": [{"system": "Master Data Sources", "type": "data-source", "interface": "Ingestion Interface", "description": "Professional Seller / Dealer / Storefront Seeker Leads Inbox depends on upstream master data or source systems to maintain canonical records."}, {"system": "Data Lake and Reporting Platforms", "type": "analytics-platform", "interface": "Export Interface", "description": "Professional Seller / Dealer / Storefront Seeker Leads Inbox distributes curated data to downstream reporting and analytical consumers."}], "externalSystemsDependingOnThisBrick": [{"system": "Downstream Domain Services", "type": "data-consumer", "interface": "Data Access API", "description": "Downstream domain services depend on Professional Seller / Dealer / Storefront Seeker Leads Inbox as a trusted source of canonical entities and shared data."}, {"system": "Analytics and Reporting Platforms", "type": "analytics-consumer", "interface": "Data Distribution Feed", "description": "Analytics consumers depend on Professional Seller / Dealer / Storefront Seeker Leads Inbox to distribute governed datasets and reference information."}], "icon": "isli.png"}}], "deliveryChannels": [{"channelId": "P3-merchant-portal", "change": "Ship merchant workflow and analytics improvements in the portal.", "channel": {"productId": "P3", "productName": "Professional Seller Workspace", "name": "Merchant Portal", "type": "web", "icon": "web.png"}}, {"channelId": "P3-inventory-feed-api", "change": "Ship ingestion validation and diagnostics improvements to partner APIs.", "channel": {"productId": "P3", "productName": "Professional Seller Workspace", "name": "Inventory Feed API", "type": "partner_api", "icon": "partner_api.png"}}], "teams": {"primaryTeamIds": ["merchant-platform-operations"], "supportingTeamIds": ["market-intelligence-and-pricing", "platform-core-services"]}, "initiativeId": "initiative-general-listings-marketplace-2026-03-14-03", "landingPageIndex": 1, "objectiveLandingPageUrl": "../objectives/landing_pages/general-listings-marketplace-2026-q2-cg3-p1.html#ReleasesTab"};
    const domainName = 'General Listings Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
