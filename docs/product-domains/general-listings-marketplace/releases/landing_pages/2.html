<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (General Listings Marketplace)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Casual Seller Listing Quality Release", "date": "2026-03-24", "description": "Release of seller publish-flow improvements covering category templates, pricing guidance, and listing management on web and mobile.", "customerImpact": [{"customerId": "CG2-P1", "customer": {"id": "CG2-P1", "name": "Casual Seller / Household Lister", "group": "Supply-Side Individuals", "icon": "seller.png"}, "customerKPIs": [{"kpi": "Listing-to-sale realization", "expectedImpact": "Increase listing-to-sale realization through stronger listing quality and pricing guidance.", "description": "Share of casual seller listings that convert into a satisfactory sale outcome in an acceptable timeframe.", "unit": "% of published listings", "kind": "customer"}, {"kpi": "Listing quality and pricing", "expectedImpact": "Increase publish completion and price-fit confidence.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Supply liquidity and monetization", "expectedImpact": "Increase active supply and boost-ready listings.", "description": "The combination of active local supply, sale-through quality, and monetizable seller demand.", "unit": "index", "kind": "business"}]}], "productBricks": [{"brickId": "esfu", "change": "Add category-aware listing templates and better draft recovery.", "brick": {"id": "esfu", "name": "Seller Listing Funnel", "type": "full-stack", "description": "Guided self-serve flow that turns a casual seller's item, photos, and category inputs into a high-quality marketplace listing.", "domain": "Casual Seller / Household Lister", "group": "casual seller", "internalModules": [{"title": "Experience Shell and Navigation", "description": "Provides the primary user flow, navigation, and page composition for Seller Listing Funnel.", "type": "full-stack"}, {"title": "Session and Personalization State", "description": "Manages user context, preferences, and personalized behavior within Seller Listing Funnel.", "type": "service"}, {"title": "Content and Interaction Orchestration", "description": "Coordinates the content blocks, tasks, and interaction logic shown by Seller Listing Funnel.", "type": "content"}], "interfaces": [{"title": "User Experience Interface", "description": "Primary user-facing interface delivered by Seller Listing Funnel.", "type": "ui"}, {"title": "Experience Backend API", "description": "API surface used to assemble state and content for Seller Listing Funnel.", "type": "api"}, {"title": "Interaction Event Stream", "description": "Event interface capturing user actions and journey signals from Seller Listing Funnel.", "type": "event"}], "brickDependencies": [{"targetBrickId": "ccma", "type": "identity", "interface": "Authentication API", "description": "Depends on Cookie Consent Management to provide identity capabilities required by Seller Listing Funnel."}, {"targetBrickId": "serp", "type": "event-subscription", "interface": "Catalog Update Feed", "description": "Depends on Search Engine Results Page (SERP) to provide discovery capabilities required by Seller Listing Funnel."}, {"targetBrickId": "csor", "type": "operator-control", "interface": "Operator Console", "description": "Depends on Classifieds Sort Order to provide operations capabilities required by Seller Listing Funnel."}], "externalSystemsThisBrickDependsOn": [{"system": "Web and Mobile Clients", "type": "channel", "interface": "UI", "description": "User-facing clients consume Seller Listing Funnel through browser or app experiences."}, {"system": "Notification Delivery Platforms", "type": "communication", "interface": "Email / Push APIs", "description": "Seller Listing Funnel depends on outbound communication systems to notify users and continue journeys."}], "externalSystemsDependingOnThisBrick": [{"system": "Web and Mobile Clients", "type": "channel-consumer", "interface": "UI", "description": "Web and mobile clients rely on Seller Listing Funnel as the user-facing surface for discovery, interaction, or task completion."}, {"system": "Marketing and Acquisition Platforms", "type": "traffic-source", "interface": "Deep Link / Landing Page Interface", "description": "Acquisition and campaign systems drive traffic into Seller Listing Funnel to convert or retain users."}], "icon": "esfu.png"}}, {"brickId": "prpa", "change": "Improve pricing guidance with category comparables and trust explanations.", "brick": {"id": "prpa", "name": "Pricing Guidance Page", "type": "full-stack", "description": "A page with a visualization of average listing prices per geographic location (from the region down to the exact address)", "domain": "Casual Seller / Household Lister", "group": "casual seller", "internalModules": [{"title": "Rules and Configuration Model", "description": "Defines the configurable policies, thresholds, and business rules for Pricing Guidance Page.", "type": "policy"}, {"title": "Decision Evaluation Engine", "description": "Executes policy and pricing decisions in real time within Pricing Guidance Page.", "type": "service"}, {"title": "Simulation and Override Controls", "description": "Supports testing, exceptions, and operator overrides for Pricing Guidance Page.", "type": "operations"}], "interfaces": [{"title": "Decision API", "description": "API that returns policy, quote, or eligibility outcomes calculated by Pricing Guidance Page.", "type": "api"}, {"title": "Configuration Workspace", "description": "Operational interface for managing rules, policies, and overrides in Pricing Guidance Page.", "type": "ui"}, {"title": "Policy Change Events", "description": "Event stream that communicates policy updates and decision outcomes from Pricing Guidance Page.", "type": "event"}], "brickDependencies": [{"targetBrickId": "iess", "type": "data-access", "interface": "Data Access API", "description": "Depends on Professional Seller / Dealer / Storefront Entity SSoT to provide data capabilities required by Pricing Guidance Page."}, {"targetBrickId": "csor", "type": "event-subscription", "interface": "Lifecycle Status Events", "description": "Depends on Classifieds Sort Order to provide operations capabilities required by Pricing Guidance Page."}, {"targetBrickId": "loin", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Location Insights to provide analytics capabilities required by Pricing Guidance Page."}], "externalSystemsThisBrickDependsOn": [{"system": "Back-Office Policy Systems", "type": "back-office", "interface": "Configuration API", "description": "Pricing Guidance Page synchronizes rules, policies, or decision parameters with external policy systems."}, {"system": "Compliance and Regulatory Services", "type": "compliance", "interface": "Validation API", "description": "Pricing Guidance Page may call regulatory or compliance services to validate decisions and exceptions."}], "externalSystemsDependingOnThisBrick": [{"system": "Operational Decision Flows", "type": "decision-consumer", "interface": "Decision API", "description": "Execution flows depend on Pricing Guidance Page to evaluate rules, policies, eligibility, or pricing outcomes."}, {"system": "Administration and Governance Tools", "type": "policy-consumer", "interface": "Configuration Interface", "description": "Governance and admin tooling depend on Pricing Guidance Page to maintain controlled rule and policy changes."}], "icon": "prpa.png"}}, {"brickId": "ocma", "change": "Simplify relist, reserve, and sold-state handling.", "brick": {"id": "ocma", "name": "Seller Listings Management", "type": "service", "description": "Management space for casual seller listings created through self-serve posting inside the consumer portal.", "domain": "Casual Seller / Household Lister", "group": "via consumer portal", "internalModules": [{"title": "Core Domain Engine", "description": "Implements the main business logic and lifecycle handled by Seller Listings Management.", "type": "service"}, {"title": "Rules and Administration", "description": "Provides the configuration, rules, and administrative controls required by Seller Listings Management.", "type": "operations"}, {"title": "Reporting and Exception Handling", "description": "Supports visibility, diagnostics, and manual handling of exceptions in Seller Listings Management.", "type": "analytics"}], "interfaces": [{"title": "Service API", "description": "API surface for interacting with the business capabilities implemented by Seller Listings Management.", "type": "api"}, {"title": "Operations Workspace", "description": "User interface for administration and operational control of Seller Listings Management.", "type": "ui"}, {"title": "Domain Event Feed", "description": "Event interface that publishes notable business changes from Seller Listings Management.", "type": "event"}], "brickDependencies": [{"targetBrickId": "ccma", "type": "identity", "interface": "Authentication API", "description": "Depends on Cookie Consent Management to provide identity capabilities required by Seller Listings Management."}, {"targetBrickId": "opad", "type": "event-routing", "interface": "Outbound Event Feed", "description": "Depends on Off-Platform Advertising to provide integration capabilities required by Seller Listings Management."}, {"targetBrickId": "loin", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Location Insights to provide analytics capabilities required by Seller Listings Management."}], "externalSystemsThisBrickDependsOn": [{"system": "Back-Office Systems", "type": "back-office", "interface": "Service API", "description": "Seller Listings Management exchanges operational state and business records with external back-office systems."}, {"system": "Notification and Communication Platforms", "type": "communication", "interface": "Messaging API", "description": "Seller Listings Management uses external communication channels to notify users, operators, or partners."}], "externalSystemsDependingOnThisBrick": [{"system": "Business Workflows", "type": "service-consumer", "interface": "Service API", "description": "Upstream business workflows depend on Seller Listings Management for core domain capabilities and state transitions."}, {"system": "Operations and Support Teams", "type": "operations-consumer", "interface": "Operations Workspace / Events", "description": "Operations consumers depend on Seller Listings Management for administration, visibility, and exception resolution."}], "icon": "ocma.png"}}], "deliveryChannels": [{"channelId": "P2-seller-web-studio", "change": "Launch the revised self-serve listing funnel on web.", "channel": {"productId": "P2", "productName": "Seller Listing Studio", "name": "Seller Web Studio", "type": "web", "icon": "web.png"}}, {"channelId": "P2-ios", "change": "Launch photo-first listing updates on iOS.", "channel": {"productId": "P2", "productName": "Seller Listing Studio", "name": "Seller iOS App", "type": "mobile_app", "icon": "mobile_app.png"}}, {"channelId": "P2-android", "change": "Launch photo-first listing updates on Android.", "channel": {"productId": "P2", "productName": "Seller Listing Studio", "name": "Seller Android App", "type": "mobile_app", "icon": "mobile_app.png"}}], "teams": {"primaryTeamIds": ["seller-growth-listing-funnel"], "supportingTeamIds": ["trust-and-identity", "market-intelligence-and-pricing", "platform-core-services"]}, "landingPageIndex": 2};
    const domainName = 'General Listings Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
