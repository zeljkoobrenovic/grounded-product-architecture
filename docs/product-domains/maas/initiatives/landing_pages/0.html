    <style>
        body {

            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;

            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;

            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>

bilities required by Operational Data, KPI & Analytics Platform."}, {"targetBrickId": "devi", "type": "event-subscription", "interface": "Domain Event Feed", "description": "Depends on Device & Validator Management to provide service capabilities required by Operational Data, KPI & Analytics Platform."}], "externalSystemsThisBrickDependsOn": [{"system": "Data Warehouse and BI Platforms", "type": "analytics-platform", "interface": "Query / Export Interface", "description": "Operational Data, KPI & Analytics Platform publishes metrics and operational signals into external analytical environments."}, {"system": "Alerting and Incident Platforms", "type": "operations", "interface": "Webhook / Event Interface", "description": "Operational Data, KPI & Analytics Platform depends on external alerting systems to escalate anomalies and operational issues."}], "externalSystemsDependingOnThisBrick": [{"system": "Operational Teams and Workspaces", "type": "insight-consumer", "interface": "Dashboard / Alert Interface", "description": "Operational teams depend on Operational Data, KPI & Analytics Platform to monitor health, detect issues, and make decisions."}, {"system": "Reporting and Planning Systems", "type": "analytics-consumer", "interface": "Metrics / Export Interface", "description": "Analytical and planning consumers depend on Operational Data, KPI & Analytics Platform for metrics, forecasts, and decision support outputs."}], "icon": "odal.png"}}, {"brickId": "intg", "change": "Extended Enterprise Integration Layer with reusable city-system ingestion patterns.", "brick": {"id": "intg", "name": "Enterprise Integration Layer", "type": "integration", "description": "Offers reusable connectors, canonical models, and event-driven integration with municipal, transport, payment, and partner systems.", "domain": "platform_foundation", "group": "shared-platform-services", "internalModules": [{"title": "Contract and Mapping Layer", "description": "Maintains schemas, field mappings, "Event / Queue Interface", "description": "Enterprise Integration Layer depends on messaging infrastructure to route and buffer integration traffic."}], "externalSystemsDependingOnThisBrick": [{"system": "Internal Domain Services", "type": "integration-consumer", "interface": "API / Event Gateway", "description": "Internal services depend on Enterprise Integration Layer to connect reliably with partner systems and adjacent platforms."}, {"system": "Partner Operations", "type": "partner-consumer", "interface": "Connector Interface", "description": "Partner-facing workflows depend on Enterprise Integration Layer to exchange data and synchronize state with external parties."}], "icon": "intg.png"}}], "deliveryChannels": [{"channelId": "cmib", "change": "Introduced shared policy, curb, and mobility dashboards in City Mobility Insight Board.", "channel": {"productId": "", "productName": "", "name": "cmib", "type": "product", "icon": "product.png"}}, {"channelId": "mida", "change": "Introduced cleaner planning-data access in Mobility Intelligence Data API.", "channel": {"productId": "", "productName": "", "name": "mida", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["cyit", "plmo", "dtpl"], "supportingTeamIds": ["intb"]}, "initiativeId": "initiative-arrive-2026-03-12-04", "discoveryIds": ["discovery-arrive-2026-03-05-04-city-intelligence-value"], "discoveryLinks": [{"discoveryId": "discovery-arrive-2026-03-05-04-city-intelligence-value", "discoveryName": "City intelligence value model", "status": "ongoing", "landingPageIndex": 0}], "landingPageIndex": 0};
    const domainName = 'Mobility-as-a-Service (MaaS)';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
