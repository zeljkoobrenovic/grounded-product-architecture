<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Mobility-as-a-Service (MaaS))</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Parking control tower convergence Initiative", "date": "2026-01-22", "description": "Parking control tower convergence initiative focused on improving parking configuration & policy management, payment channel orchestration, access, permit & LPR control, enforcement & compliance workflows, and operator analytics & control tower across Operator Control Console, Parking KPI Cockpit, and Parking Operations API.", "customerImpact": [{"customerId": "mpdu", "customer": {"id": "mpdu", "name": "Municipal Parking Director", "group": "Parking Operators and Asset Owners", "icon": "mpdu.png"}, "customerKPIs": [{"kpi": "Paid session conversion rate", "expectedImpact": "Increase paid session conversion rate by reducing channel inconsistency and access-to-payment mismatches.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Violation resolution cycle time", "expectedImpact": "Decrease violation resolution cycle time by introducing cleaner evidence and workflow control.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Parking platform ARR", "expectedImpact": "Increase parking platform ARR by creating a stronger operational-control story for parking accounts.", "description": "Recurring software and services revenue from parking operator accounts.", "unit": "EUR ARR", "kind": "business"}]}], "productBricks": [{"brickId": "pcon", "change": "Extended Parking Configuration & Policy Management with reusable tariff and permit models.", "brick": {"id": "pcon", "name": "Parking Configuration & Policy Management", "type": "full-stack", "description": "Configures parking zones, tariffs, permits, exemptions, dwell rules, and city or operator policies across assets and channels.", "domain": "parking_operations", "group": "parking-and-curb-control", "internalModules": [{"title": "Rules and Configuration Model", "description": "Defines the configurable policies, thresholds, and business rules for Parking Configuration & Policy Management.", "type": "policy"}, {"title": "Decision Evaluation Engine", "description": "Executes policy and pricing decisions in real time within Parking Configuration & Policy Management.", "type": "service"}, {"title": "Simulation and Override Controls", "description": "Supports testing, exceptions, and operator overrides for Parking Configuration & Policy Management.", "type": "operations"}], "interfaces": [{"title": "Decision API", "description": "API that returns policy, quote, or eligibility outcomes calculated by Parking Configuration & Policy Management.", "type": "api"}, {"title": "Configuration Workspace", "description": "Operational interface for managing rules, policies, and overrides in Parking Configuration & Policy Management.", "type": "ui"}, {"title": "Policy Change Events", "description": "Event stream that communicates policy updates and decision outcomes from Parking Configuration & Policy Management.", "type": "event"}], "brickDependencies": [{"targetBrickId": "resv", "type": "workflow", "interface": "Workflow API", "description": "Depends on Reservations & Permit Inventory to provide operations capabilities required by Parking Configuration & Policy Management."}, {"targetBrickId": "opal", "type": "event-subscription", "interface": "Alert and Signal Feed", "description": "Depends on Operator Analytics & Control Tower to provide analytics capabilities required by Parking Configuration & Policy Management."}, {"targetBrickId": "devi", "type": "event-subscription", "interface": "Domain Event Feed", "description": "Depends on Device & Validator Management to provide service capabilities required by Parking Configuration & Policy Management."}], "externalSystemsThisBrickDependsOn": [{"system": "Back-Office Policy Systems", "type": "back-office", "interface": "Configuration API", "description": "Parking Configuration & Policy Management synchronizes rules, policies, or decision parameters with external policy systems."}, {"system": "Compliance and Regulatory Services", "type": "compliance", "interface": "Validation API", "description": "Parking Configuration & Policy Management may call regulatory or compliance services to validate decisions and exceptions."}], "externalSystemsDependingOnThisBrick": [{"system": "Operational Decision Flows", "type": "decision-consumer", "interface": "Decision API", "description": "Execution flows depend on Parking Configuration & Policy Management to evaluate rules, policies, eligibility, or pricing outcomes."}, {"system": "Administration and Governance Tools", "type": "policy-consumer", "interface": "Configuration Interface", "description": "Governance and admin tooling depend on Parking Configuration & Policy Management to maintain controlled rule and policy changes."}], "icon": "pcon.png"}}, {"brickId": "payo", "change": "Extended Payment Channel Orchestration with cleaner consistency rules across mobile, kiosk, and partner channels.", "brick": {"id": "payo", "name": "Payment Channel Orchestration", "type": "full-stack", "description": "Coordinates mobile, kiosk, in-car, partner, permit, and other payment channels through one governed payment-control layer.", "domain": "parking_operations", "group": "parking-and-curb-control", "internalModules": [{"title": "Transaction and Ledger Core", "description": "Records the core financial or commercial transactions handled by Payment Channel Orchestration.", "type": "finance"}, {"title": "Settlement and Reconciliation", "description": "Matches external outcomes, balances, and exceptions flowing through Payment Channel Orchestration.", "type": "operations"}, {"title": "Billing Rules and Controls", "description": "Applies pricing, billing, tax, or financial control logic inside Payment Channel Orchestration.", "type": "policy"}], "interfaces": [{"title": "Transaction API", "description": "API surface for submitting or retrieving financial transactions handled by Payment Channel Orchestration.", "type": "api"}, {"title": "Finance Operations Workspace", "description": "User interface for reconciliation, exception handling, and financial oversight in Payment Channel Orchestration.", "type": "ui"}, {"title": "Settlement and Ledger Events", "description": "Event stream carrying posting, settlement, and status changes from Payment Channel Orchestration.", "type": "event"}], "brickDependencies": [{"targetBrickId": "resv", "type": "workflow", "interface": "Workflow API", "description": "Depends on Reservations & Permit Inventory to provide operations capabilities required by Payment Channel Orchestration."}, {"targetBrickId": "acce", "type": "event-subscription", "interface": "Audit Event Stream", "description": "Depends on Access, Permit & LPR Control to provide identity capabilities required by Payment Channel Orchestration."}, {"targetBrickId": "part", "type": "partner-connectivity", "interface": "Partner Connector Surface", "description": "Depends on Partner API, Sandbox & Certification to provide integration capabilities required by Payment Channel Orchestration."}], "externalSystemsThisBrickDependsOn": [{"system": "Payment Schemes and PSPs", "type": "financial-network", "interface": "Payment APIs", "description": "Payment Channel Orchestration depends on external payment or banking networks to authorize and settle transactions."}, {"system": "Accounting or ERP Systems", "type": "back-office", "interface": "ERP Interface", "description": "Payment Channel Orchestration exchanges postings, reconciliations, or settlement outcomes with finance back-office systems."}], "externalSystemsDependingOnThisBrick": [{"system": "Checkout and Billing Flows", "type": "transaction-consumer", "interface": "Payment / Posting API", "description": "Commercial flows depend on Payment Channel Orchestration to authorize, post, reconcile, or settle financial transactions."}, {"system": "Finance and Reporting Systems", "type": "finance-consumer", "interface": "Ledger / Settlement Feed", "description": "Back-office finance consumers depend on Payment Channel Orchestration for accounting, settlement, and reconciliation outputs."}], "icon": "payo.png"}}, {"brickId": "acce", "change": "Extended Access, Permit & LPR Control with stronger event handling and permit validation.", "brick": {"id": "acce", "name": "Access, Permit & LPR Control", "type": "full-stack", "description": "Manages barrier access, permit validation, LPR flows, and access-event control across parking environments.", "domain": "parking_operations", "group": "parking-and-curb-control", "internalModules": [{"title": "Identity and Policy Engine", "description": "Authenticates actors, evaluates access policies, and manages trust rules for Access, Permit & LPR Control.", "type": "identity"}, {"title": "Entitlements and Lifecycle Management", "description": "Manages roles, permissions, account state, and lifecycle changes within Access, Permit & LPR Control.", "type": "service"}, {"title": "Audit and Compliance Controls", "description": "Records security-relevant actions and compliance evidence produced by Access, Permit & LPR Control.", "type": "compliance"}], "interfaces": [{"title": "Authentication API", "description": "Programmatic interface for authentication, authorization, or account checks exposed by Access, Permit & LPR Control.", "type": "api"}, {"title": "Administration Console", "description": "Operational interface for managing identity settings and access policies in Access, Permit & LPR Control.", "type": "ui"}, {"title": "Audit Event Stream", "description": "Event interface that publishes security and compliance signals from Access, Permit & LPR Control.", "type": "event"}], "brickDependencies": [{"targetBrickId": "devi", "type": "service-api", "interface": "Service API", "description": "Depends on Device & Validator Management to provide service capabilities required by Access, Permit & LPR Control."}, {"targetBrickId": "part", "type": "event-routing", "interface": "Outbound Event Feed", "description": "Depends on Partner API, Sandbox & Certification to provide integration capabilities required by Access, Permit & LPR Control."}, {"targetBrickId": "opal", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Operator Analytics & Control Tower to provide analytics capabilities required by Access, Permit & LPR Control."}], "externalSystemsThisBrickDependsOn": [{"system": "Corporate Identity Provider", "type": "identity", "interface": "OIDC / SAML", "description": "Access, Permit & LPR Control integrates with an external identity provider for authentication and federation."}, {"system": "Compliance Screening Services", "type": "compliance", "interface": "Screening API", "description": "Access, Permit & LPR Control may call external screening or verification services to enforce trust and compliance checks."}], "externalSystemsDependingOnThisBrick": [{"system": "Customer and Operator Applications", "type": "identity-consumer", "interface": "Authentication / Authorization Interface", "description": "Internal and external applications depend on Access, Permit & LPR Control for authentication, authorization, and trusted account state."}, {"system": "Audit and Risk Systems", "type": "control-consumer", "interface": "Audit / Event Interface", "description": "Governance and risk systems depend on Access, Permit & LPR Control to emit trust, access, and compliance events."}], "icon": "acce.png"}}, {"brickId": "enfw", "change": "Extended Enforcement & Compliance Workflows with better citation evidence and exception routing.", "brick": {"id": "enfw", "name": "Enforcement & Compliance Workflows", "type": "service", "description": "Coordinates parking enforcement, exemptions, citations, evidence, and dispute or compliance workflows.", "domain": "parking_operations", "group": "parking-and-curb-control", "internalModules": [{"title": "Identity and Policy Engine", "description": "Authenticates actors, evaluates access policies, and manages trust rules for Enforcement & Compliance Workflows.", "type": "identity"}, {"title": "Entitlements and Lifecycle Management", "description": "Manages roles, permissions, account state, and lifecycle changes within Enforcement & Compliance Workflows.", "type": "service"}, {"title": "Audit and Compliance Controls", "description": "Records security-relevant actions and compliance evidence produced by Enforcement & Compliance Workflows.", "type": "compliance"}], "interfaces": [{"title": "Authentication API", "description": "Programmatic interface for authentication, authorization, or account checks exposed by Enforcement & Compliance Workflows.", "type": "api"}, {"title": "Administration Console", "description": "Operational interface for managing identity settings and access policies in Enforcement & Compliance Workflows.", "type": "ui"}, {"title": "Audit Event Stream", "description": "Event interface that publishes security and compliance signals from Enforcement & Compliance Workflows.", "type": "event"}], "brickDependencies": [{"targetBrickId": "devi", "type": "service-api", "interface": "Service API", "description": "Depends on Device & Validator Management to provide service capabilities required by Enforcement & Compliance Workflows."}, {"targetBrickId": "part", "type": "event-routing", "interface": "Outbound Event Feed", "description": "Depends on Partner API, Sandbox & Certification to provide integration capabilities required by Enforcement & Compliance Workflows."}, {"targetBrickId": "opal", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Operator Analytics & Control Tower to provide analytics capabilities required by Enforcement & Compliance Workflows."}], "externalSystemsThisBrickDependsOn": [{"system": "Corporate Identity Provider", "type": "identity", "interface": "OIDC / SAML", "description": "Enforcement & Compliance Workflows integrates with an external identity provider for authentication and federation."}, {"system": "Compliance Screening Services", "type": "compliance", "interface": "Screening API", "description": "Enforcement & Compliance Workflows may call external screening or verification services to enforce trust and compliance checks."}], "externalSystemsDependingOnThisBrick": [{"system": "Customer and Operator Applications", "type": "identity-consumer", "interface": "Authentication / Authorization Interface", "description": "Internal and external applications depend on Enforcement & Compliance Workflows for authentication, authorization, and trusted account state."}, {"system": "Audit and Risk Systems", "type": "control-consumer", "interface": "Audit / Event Interface", "description": "Governance and risk systems depend on Enforcement & Compliance Workflows to emit trust, access, and compliance events."}], "icon": "enfw.png"}}], "deliveryChannels": [{"channelId": "opcc", "change": "Introduced consolidated policy and enforcement workflows in Operator Control Console.", "channel": {"productId": "", "productName": "", "name": "opcc", "type": "product", "icon": "product.png"}}, {"channelId": "pkkc", "change": "Introduced cross-channel yield and compliance tracking in Parking KPI Cockpit.", "channel": {"productId": "", "productName": "", "name": "pkkc", "type": "product", "icon": "product.png"}}, {"channelId": "poap", "change": "Introduced rule-consistent payment and access behaviors in Parking Operations API.", "channel": {"productId": "", "productName": "", "name": "poap", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["pkor", "acen", "stld"], "supportingTeamIds": ["dtpl", "wkfl"]}, "initiativeId": "initiative-arrive-2026-01-22-01", "discoveryIds": ["discovery-arrive-2026-01-15-01-parking-control-tower"], "discoveryLinks": [{"discoveryId": "discovery-arrive-2026-01-15-01-parking-control-tower", "discoveryName": "Parking control tower convergence: validated discovery", "status": "archived", "landingPageIndex": 3}], "landingPageIndex": 3};
    const domainName = 'Mobility-as-a-Service (MaaS)';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
