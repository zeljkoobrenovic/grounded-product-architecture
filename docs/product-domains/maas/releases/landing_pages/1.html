<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Mobility-as-a-Service (MaaS))</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "transit open-payment reliability Release", "date": "2026-02-26", "description": "Release of transit open-payment reliability improvements covering transit fare & open payment engine, device & validator management, transit operations telemetry, and settlement, ledger & revenue reconciliation across Transit Operations Console, Validator and Driver Device Estate, and Transit Revenue Board.", "customerImpact": [{"customerId": "trao", "customer": {"id": "trao", "name": "Transit Revenue and Operations Executive", "group": "Public Transport Authorities and Operators", "icon": "trao.png"}, "customerKPIs": [{"kpi": "Tap success rate", "expectedImpact": "Improve tap success rate through stronger validator-state control and failure handling.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Fare capture rate", "expectedImpact": "Improve fare capture rate through cleaner exception and reconciliation workflows.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Processed payment volume", "expectedImpact": "Improve processed payment volume by reducing friction in live open-payment operations.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "fare", "change": "Released more resilient tap and fare-processing behaviors.", "brick": {"id": "fare", "name": "Transit Fare & Open Payment Engine", "type": "service", "description": "Handles open payment, account-based fare logic, capping, and transport-payment orchestration.", "domain": "transit_operations", "group": "fare-and-device-modernization", "internalModules": [{"title": "Transaction and Ledger Core", "description": "Records the core financial or commercial transactions handled by Transit Fare & Open Payment Engine.", "type": "finance"}, {"title": "Settlement and Reconciliation", "description": "Matches external outcomes, balances, and exceptions flowing through Transit Fare & Open Payment Engine.", "type": "operations"}, ransport operations view.", "domain": "transit_operations", "group": "fare-and-device-modernization", "internalModules": [{"title": "Signal Ingestion and Processing", "description": "Collects operational and business signals that feed Transit Operations Telemetry.", "type": "data"}, {"title": "Metrics and Decision Engine", "description": "Calculates insights, KPIs, forecasts, or scores produced by Transit Operations Telemetry.", "type": "analytics"}, {"title": "Reporting and Operations Workspace", "description": "Presents actionable views, alerts, and drill-down workflows for Transit Operations Telemetry.", "type": "full-stack"}], "interfaces": [{"title": "Dashboard Interface", "description": "Interactive reporting or control surface that presents insights from Transit Operations Telemetry.", "type": "ui"}, {"title": "Metrics and Query API", "description": "API for retrieving metrics, scores, forecasts, or analytical outputs from Transit Operations Telemetry.", "type": "api"}, {"title": "Alert and Signal Feed", "description": "Event or notification interface exposing operational signals generated by Transit Operations Telemetry.", "type": "event"}], "brickDependencies": [{"targetBrickId": "part", "type": "integration", "interface": "Inbound API", "description": "Depends on Partner API, Sandbox & Certification to provide integration capabilities required by Transit Operations Telemetry."}, {"targetBrickId": "resv", "type": "event-subscription", "interface": "Lifecycle Status Events", "description": "Depends on Reservations & Permit Inventory to provide operations capabilities required by Transit Operations Telemetry."}, {"targetBrickId": "devi", "type": "event-subscription", "interface": "Domain Event Feed", "description": "Depends on Device & Validator Management to provide service capabilities required by Transit Operations Telemetry."}], "externalSystemsThisBrickDependsOn": [{"system": "Data Warehouse and BI Platforms", "type": "analytics-platform", "interface": " API", "description": "API surface for submitting or retrieving financial transactions handled by Settlement, Ledger & Revenue Reconciliation.", "type": "api"}, {"title": "Finance Operations Workspace", "description": "User interface for reconciliation, exception handling, and financial oversight in Settlement, Ledger & Revenue Reconciliation.", "type": "ui"}, {"title": "Settlement and Ledger Events", "description": "Event stream carrying posting, settlement, and status changes from Settlement, Ledger & Revenue Reconciliation.", "type": "event"}], "brickDependencies": [{"targetBrickId": "resv", "type": "workflow", "interface": "Workflow API", "description": "Depends on Reservations & Permit Inventory to provide operations capabilities required by Settlement, Ledger & Revenue Reconciliation."}, {"targetBrickId": "acce", "type": "event-subscription", "interface": "Audit Event Stream", "description": "Depends on Access, Permit & LPR Control to provide identity capabilities required by Settlement, Ledger & Revenue Reconciliation."}, {"targetBrickId": "part", "type": "partner-connectivity", "interface": "Partner Connector Surface", "description": "Depends on Partner API, Sandbox & Certification to provide integration capabilities required by Settlement, Ledger & Revenue Reconciliation."}], "externalSystemsThisBrickDependsOn": [{"system": "Payment Schemes and PSPs", "type": "financial-network", "interface": "Payment APIs", "description": "Settlement, Ledger & Revenue Reconciliation depends on external payment or banking networks to authorize and settle transactions."}, {"system": "Accounting or ERP Systems", "type": "back-office", "interface": "ERP Interface", "description": "Settlement, Ledger & Revenue Reconciliation exchanges postings, reconciliations, or settlement outcomes with finance back-office systems."}], "externalSystemsDependingOnThisBrick": [{"system": "Checkout and Billing Flows", "type": "transaction-consumer", "interface": "Payment / Posting API", "description": "Commercial flows depend on Settlement, Ledger & Revenue Reconciliation to authorize, post, reconcile, or settle financial transactions."}, {"system": "Finance and Reporting Systems", "type": "finance-consumer", "interface": "Ledger / Settlement Feed", "description": "Back-office finance consumers depend on Settlement, Ledger & Revenue Reconciliation for accounting, settlement, and reconciliation outputs."}], "icon": "sett.png"}}], "deliveryChannels": [{"channelId": "toco", "change": "Deployed exception-handling updates in Transit Operations Console.", "channel": {"productId": "", "productName": "", "name": "toco", "type": "product", "icon": "product.png"}}, {"channelId": "vdde", "change": "Deployed validator reliability improvements across the device estate.", "channel": {"productId": "", "productName": "", "name": "vdde", "type": "product", "icon": "product.png"}}, {"channelId": "trbd", "change": "Deployed transit payment-health visibility in Transit Revenue Board.", "channel": {"productId": "", "productName": "", "name": "trbd", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["faen", "devo"], "supportingTeamIds": ["stld"]}, "landingPageIndex": 1};
    const domainName = 'Mobility-as-a-Service (MaaS)';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
