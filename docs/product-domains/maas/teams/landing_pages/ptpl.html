<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arrive Partner Platform</title>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;
        padding: 6px 4px;
        font-size: 80%;
        color: #a0a0a0;
    }

    .breadcrumb {
    }

    .breadcrumb a {
        text-decoration: none;
        color: #343434;;
    }
</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1180px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #ecfdf5;
            color: #047857;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 38px;
            line-height: 1.2;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .mission {
            font-size: 20px;
            line-height: 1.55;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            min-width: 150px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        .stat-value {
            font-size: 28px;
            color: #1d4ed8;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
        }

        .card {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background-color: white;
            padding: 14px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .role-table {
            width: 100%;
            border-collapse: collapse;
        }

        .role-table th,
        .role-table td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: top;
            text-align: left;
        }

        .role-table th {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .kpi-list {
            margin-top: 6px;
            color: #4b5563;
            font-size: 13px;
        }

        .activity-block {
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid #d7dce1;
        }

        .activity-link {
            color: #1d4ed8;
            font-weight: bold;
        }

        .activity-meta {
            color: #6b7280;
            font-size: 12px;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 20px;
            border: 1px solid #ccc;
            border-top: none;
        }

        .empty-state {
            color: #6b7280;
            font-style: italic;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>

cy"}], "interfaces": [{"title": "Transaction API", "description": "API surface for submitting or retrieving financial transactions handled by Partner Analytics & Revenue Reporting.", "type": "api"}, {"title": "Finance Operations Workspace", "description": "User interface for reconciliation, exception handling, and financial oversight in Partner Analytics & Revenue Reporting.", "type": "ui"}, {"title": "Settlement and Ledger Events", "description": "Event stream carrying posting, settlement, and status changes from Partner Analytics & Revenue Reporting.", "type": "event"}], "brickDependencies": [{"targetBrickId": "resv", "type": "workflow", "interface": "Workflow API", "description": "Depends on Reservations & Permit Inventory to provide operations capabilities required by Partner Analytics & Revenue Reporting."}, {"targetBrickId": "acce", "type": "event-subscription", "interface": "Audit Event Stream", "description": "Depends on Access, Permit & LPR Control to provide identity capabilities required by Partner Analytics & Revenue Reporting."}, {"targetBrickId": "part", "type": "partner-connectivity", "interface": "Partner Connector Surface", "description": "Depends on Partner API, Sandbox & Certification to provide integration capabilities required by Partner Analytics & Revenue Reporting."}], "externalSystemsThisBrickDependsOn": [{"system": "Payment Schemes and PSPs", "type": "financial-network", "interface": "Payment APIs", "description": "Partner Analytics & Revenue Reporting depends on external payment or banking networks to authorize and settle transactions."}, {"system": "Accounting or ERP Systems", "type": "back-office", "interface": "ERP Interface", "description": "Partner Analytics & Revenue Reporting exchanges postings, reconciliations, or settlement outcomes with finance back-office systems."}], "externalSystemsDependingOnThisBrick": [{"system": "Checkout and Billing Flows", "type": "transaction-consumer", "interface": "Payment / Posting API", "description": "Commercial flows depend on Partner Analytics & Revenue Reporting to authorize, post, reconcile, or settle financial transactions."}, {"system": "Finance and Reporting Systems", "type": "finance-consumer", "interface": "Ledger / Settlement Feed", "description": "Back-office finance consumers depend on Partner Analytics & Revenue Reporting for accounting, settlement, and reconciliation outputs."}], "icon": "pana.png"}}], "dependsOnTeamIds": ["idap", "stld", "ptsu"], "defaultSupportingTeamIds": ["idap", "ptsu"], "staffing": {"suggestedHeadcount": 9, "roles": [{"role": "Product Manager", "count": 1, "responsibility": "Own partner-onboarding product direction."}, {"role": "Engineering Manager", "count": 1, "responsibility": "Lead delivery and partner-platform reliability."}, {"role": "Backend / Integration Engineer", "count": 4, "responsibility": "Build partner APIs, certification flows, and operator integration services."}, {"role": "Frontend Engineer", "count": 1, "responsibility": "Build partner workspace experiences."}, {"role": "QA / Test Automation Engineer", "count": 1, "responsibility": "Own contract testing and launch confidence."}, {"role": "Partner Solutions Specialist", "count": 1, "responsibility": "Translate partner launch realities into product detail."}]}, "groupId": "bpcg", "groupName": "Arrive Business Mobility and Ecosystem", "groupLeadership": {"orgLayer": "group", "includedInDomainHeadcountEstimate": false, "purpose": "Provide cross-team direction, architecture coherence, and ecosystem leadership for business mobility, partner, and automotive workflows.", "leadershipModel": "Directors own the group portfolio while group-level staff roles align partner integrations, automotive services, and commercial workflow standards across teams.", "suggestedHeadcount": 5, "roles": [{"role": "Product Director", "count": 1, "responsibility": "Own strategy, partnership tradeoffs, and outcome accountability across business mobility and ecosystem teams.", "reportsTo": "Domain Head of Product / CPO"}, {"role": "Engineering Director", "count": 1, "responsibility": "Own engineering execution, interoperability quality, and staffing across the ecosystem group.", "reportsTo": "Domain Head of Engineering / CTO"}, {"role": "Staff Engineer", "count": 1, "responsibility": "Provide cross-team technical direction for partner integrations, automotive data services, and shared workflow patterns.", "reportsTo": "Engineering Director"}, {"role": "Principal Product Designer", "count": 1, "responsibility": "Drive coherence across partner, fleet, and automotive service journeys.", "reportsTo": "Product Director"}, {"role": "Principal Ecosystem Architect", "count": 1, "responsibility": "Shape the common partner-domain model, onboarding standards, and operating semantics across the group.", "reportsTo": "Product Director"}]}, "dependsOnTeams": [{"id": "idap", "name": "Arrive Identity and API Platform", "teamType": "pltg", "groupId": "pltg", "groupName": "Arrive Platform, Data and Reliability"}, {"id": "stld", "name": "Arrive Settlement and Ledger", "teamType": "pltg", "groupId": "pltg", "groupName": "Arrive Platform, Data and Reliability"}, {"id": "ptsu", "name": "Arrive Partner Success", "teamType": "platform-enabling", "groupId": "bpcg", "groupName": "Arrive Business Mobility and Ecosystem"}], "defaultSupportingTeams": [{"id": "idap", "name": "Arrive Identity and API Platform", "teamType": "pltg", "groupId": "pltg", "groupName": "Arrive Platform, Data and Reliability"}, {"id": "ptsu", "name": "Arrive Partner Success", "teamType": "platform-enabling", "groupId": "bpcg", "groupName": "Arrive Business Mobility and Ecosystem"}], "relatedInitiatives": [], "relatedReleases": [], "relatedDiscoveries": [], "dependencyData": {"sharedProductBricks": [{"teamId": "auts", "teamName": "Arrive Automotive Services", "sharedBrickIds": ["part"], "sharedBrickNames": ["Partner API, Sandbox & Certification"]}, {"teamId": "ptsu", "teamName": "Arrive Partner Success", "sharedBrickIds": ["mark", "pana"], "sharedBrickNames": ["Market Catalog & Operator Rules", "Partner Analytics & Revenue Reporting"]}], "sharedInitiatives": [], "sharedReleases": [], "explicitRelationships": [{"teamId": "idap", "teamName": "Arrive Identity and API Platform", "relationshipType": "depends_on", "relationshipLabel": "depends on"}, {"teamId": "stld", "teamName": "Arrive Settlement and Ledger", "relationshipType": "depends_on", "relationshipLabel": "depends on"}, {"teamId": "ptsu", "teamName": "Arrive Partner Success", "relationshipType": "depends_on", "relationshipLabel": "depends on"}, {"teamId": "idap", "teamName": "Arrive Identity and API Platform", "relationshipType": "supported_by", "relationshipLabel": "supported by"}, {"teamId": "ptsu", "teamName": "Arrive Partner Success", "relationshipType": "supported_by", "relationshipLabel": "supported by"}]}};
    const domainName = 'Mobility-as-a-Service (MaaS)';

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    mermaid.initialize({startOnLoad: false, securityLevel: 'loose'});

    function renderActivity(items, sectionType) {
        if (!items || !items.length) {
            return '<div class="empty-state">No ' + escapeHtml(sectionType.toLowerCase()) + ' linked to this team.</div>';
        }
        let html = '';
        items.forEach(item => {
            html += '<div class="activity-block">';
            html += '<div class="activity-link">' + linkOf('../../' + item.sectionFolder + '/landing_pages/' + item.landingPageKey + '.html', item.description || sectionType, 'activity-link') + '</div>';
            html += '<div class="activity-meta">' + escapeHtml(item.date || '') + ' | ' + escapeHtml(item.teamRoleLabel || '') + '</div>';
            if (item.how) {
                html += '<div class="activity-meta" style="margin-top:4px">' + escapeHtml(item.how) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function initTab() {
        let tabName = 'home-tab';
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (document.getElementById('tab_' + hash)) {
                tabName = hash;
            }
        }
        openTab(tabName);
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
        if (tabName === 'dependencies-tab') {
            renderMermaidDiagrams();
        }
    }

    function sanitizeMermaidId(value) {
        return String(value || '')
            .replace(/[^a-zA-Z0-9_]/g, '_')
            .replace(/^([^a-zA-Z_])/, '_$1');
    }

    function sanitizeMermaidLabel(value) {
        return String(value || '')
            .replace(/&/g, ' and ')
            .replace(/"/g, '')
            .replace(/'/g, '')
            .replace(/[|[\]{}()<>`]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function renderDependencyTable(items, columns, rowBuilder) {
        if (!items || !items.length) {
            return '<div class="empty-state">No dependency details found.</div>';
        }

        let html = '<table class="role-table"><thead><tr>';
        columns.forEach(column => {
            html += '<th>' + escapeHtml(column) + '</th>';
        });
        html += '</tr></thead><tbody>';

        items.forEach(item => {
            html += '<tr>';
            rowBuilder(item).forEach(cell => {
                html += '<td>' + cell + '</td>';
            });
            html += '</tr>';
        });

        html += '</tbody></table>';
        return html;
    }

    function renderLinkedBricks(names, ids) {
        if (!ids || !ids.length) {
            return '<span class="empty-state">None</span>';
        }

        return ids.map((brickId, index) =>
            linkOf(
                '../../product-bricks/landing_pages/' + brickId + '.html',
                (names || [])[index] || brickId,
                ''
            )
        ).join('<br>');
    }

    function buildDependencyMermaid(title, items, keyName, labelBuilder, relationLabel) {
        if (!items || !items.length) {
            return '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div><div class="empty-state">No dependencies found.</div></div>';
        }

        let chart = '';
        chart += '---\n' +
            'config:\n' +
            '  htmlLabels: false\n' +
            '---\n\n';

        chart += 'flowchart LR\n\n';

        const currentId = sanitizeMermaidId(team.id || 'current_team');
        chart += currentId + '[\"' + sanitizeMermaidLabel('THIS TEAM') + '\"]\n';
        chart += 'style ' + currentId + ' fill:#bbf\n';

        items.forEach(item => {
            const otherId = sanitizeMermaidId(item.teamId || item.teamName || 'team');
            const edgeLabel = sanitizeMermaidLabel(labelBuilder(item));
            chart += otherId + '[\"' + sanitizeMermaidLabel(item.teamName + ' Team' || item.teamId || 'Team') + '\"]\n';
            chart += currentId + ' -->|' + edgeLabel + '| ' + otherId + '\n';
        });

        return '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div><div class="mermaid">' + chart + '</div></div>';
    }

    function renderMermaidDiagrams() {
        const container = document.getElementById('dependencies-tab');
        if (!container || container.getAttribute('data-rendered') === 'true') {
            return;
        }

        const dependencyData = team.dependencyData || {};
        let html = '';
        html += buildDependencyMermaid(
            'Explicit Team Relationships',
            dependencyData.explicitRelationships || [],
            'relationshipType',
            item => item.relationshipLabel || item.relationshipType || 'relationship',
            'relationship'
        );
        html += '<div class="section">' + renderDependencyTable(
            dependencyData.explicitRelationships || [],
            ['Team', 'Relationship'],
            item => [
                linkOf(item.teamId + '.html', item.teamName || item.teamId, ''),
                escapeHtml(item.relationshipLabel || item.relationshipType || '')
            ]
        ) + '</div>';
        html += buildDependencyMermaid(
            'Shared Product Bricks',
            dependencyData.sharedProductBricks || [],
            'sharedBrickIds',
            item => ((item.sharedBrickNames || []).slice(0, 3).join(', ') + (((item.sharedBrickNames || []).length > 3) ? ' +' + ((item.sharedBrickNames || []).length - 3) : '')) || 'shared bricks',
            'shared bricks'
        );
        html += '<div class="section">' + renderDependencyTable(
            dependencyData.sharedProductBricks || [],
            ['Team', 'Shared Bricks'],
            item => [
                linkOf(item.teamId + '.html', item.teamName || item.teamId, ''),
                renderLinkedBricks(item.sharedBrickNames || [], item.sharedBrickIds || []),
            ]
        ) + '</div>';

        container.innerHTML = html;
        mermaid.run({querySelector: '#dependencies-tab .mermaid'});
        container.setAttribute('data-rendered', 'true');
    }

    document.getElementById('Title').innerHTML = escapeHtml(team.name || 'Team');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(team.groupName || '') + ' | ' + escapeHtml(team.teamType || '');
    document.getElementById('Mission').innerHTML = escapeHtml(team.mission || '');

    const staffing = team.staffing || {};
    const groupLeadership = team.groupLeadership || {};

    let homeHtml = '';
    homeHtml += '<div class="section"><div class="section-title">Summary</div><div class="stats">';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String(staffing.suggestedHeadcount || 0)) + '</div><div class="stat-label">Suggested Headcount</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((staffing.roles || []).length)) + '</div><div class="stat-label">Role Blocks</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String(groupLeadership.suggestedHeadcount || 0)) + '</div><div class="stat-label">Group Leadership Headcount</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((groupLeadership.roles || []).length)) + '</div><div class="stat-label">Group Role Blocks</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((team.primaryCustomers || []).length)) + '</div><div class="stat-label">Primary Customers</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((team.ownedProductBricks || []).length)) + '</div><div class="stat-label">Owned Bricks</div></div>';
    homeHtml += '</div></div>';

    if (staffing.staffingGuidance || (staffing.roles || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Staffing Model</div>';
        if (staffing.staffingGuidance) {
            homeHtml += '<div style="margin-bottom:12px; line-height:1.5">' + escapeHtml(staffing.staffingGuidance) + '</div>';
        }
        homeHtml += '<table class="role-table"><thead><tr><th>Role</th><th>Count</th><th>Responsibility</th></tr></thead><tbody>';
        (staffing.roles || []).forEach(role => {
            homeHtml += '<tr><td>' + escapeHtml(role.role) + '</td><td>' + escapeHtml(String(role.count || 0)) + '</td><td>' + escapeHtml(role.responsibility || '') + '</td></tr>';
        });
        homeHtml += '</tbody></table></div>';
    }

    if (team.groupLeadership && ((team.groupLeadership.roles || []).length || team.groupLeadership.leadershipModel)) {
        homeHtml += '<div class="section"><div class="section-title">Group Leadership</div>';
        if (team.groupLeadership.purpose) {
            homeHtml += '<div style="margin-bottom:12px; line-height:1.5">' + escapeHtml(team.groupLeadership.purpose) + '</div>';
        }
        if (team.groupLeadership.leadershipModel) {
            homeHtml += '<div style="margin-bottom:12px; line-height:1.5; color:#6b7280">' + escapeHtml(team.groupLeadership.leadershipModel) + '</div>';
        }
        homeHtml += '<table class="role-table"><thead><tr><th>Role</th><th>Count</th><th>Responsibility</th><th>Reports To</th></tr></thead><tbody>';
        (team.groupLeadership.roles || []).forEach(role => {
            homeHtml += '<tr><td>' + escapeHtml(role.role) + '</td><td>' + escapeHtml(String(role.count || 0)) + '</td><td>' + escapeHtml(role.responsibility || '') + '</td><td>' + escapeHtml(role.reportsTo || '') + '</td></tr>';
        });
        homeHtml += '</tbody></table></div>';
    }

    if ((team.primaryCustomers || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Primary Customers and KPIs</div><div class="grid">';
        (team.primaryCustomers || []).forEach(customer => {
            homeHtml += '<div class="card">';
            homeHtml += '<div class="pill"><img class="linked-icon" src="../../customers/icons/' + escapeHtml(customer.icon || 'customer.png') + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName || customer.customerId, '') + '</div>';
            if ((customer.relatedKPIs || []).length) {
                homeHtml += '<div class="kpi-list">' + (customer.relatedKPIs || []).map(kpi => escapeHtml(kpi)).join('<br>') + '</div>';
            }
            homeHtml += '</div>';
        });
        homeHtml += '</div></div>';
    }

    if ((team.ownedProductBricks || []).length || (team.supportingProductBricks || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Product Brick Scope</div>';
        if ((team.ownedProductBricks || []).length) {
            homeHtml += '<div style="margin-bottom:8px; color:#6b7280">Owned product bricks</div>';
            (team.ownedProductBricks || []).forEach(brick => {
                homeHtml += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml((brick.brick || {}).icon || 'capability_404.png') + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brickName || brick.brickId, '') + '</div>';
            });
        }
        if ((team.supportingProductBricks || []).length) {
            homeHtml += '<div style="margin:14px 0 8px 0; color:#6b7280">Supporting product bricks</div>';
            (team.supportingProductBricks || []).forEach(brick => {
                homeHtml += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml((brick.brick || {}).icon || 'capability_404.png') + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brickName || brick.brickId, '') + '</div>';
            });
        }
        homeHtml += '</div>';
    }

    if ((team.dependsOnTeams || []).length || (team.defaultSupportingTeams || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Team Relationships</div>';
        if ((team.dependsOnTeams || []).length) {
            homeHtml += '<div style="margin-bottom:8px; color:#6b7280">Depends on</div>';
            (team.dependsOnTeams || []).forEach(otherTeam => {
                homeHtml += '<div class="pill">' + linkOf(otherTeam.id + '.html', otherTeam.name, '') + '</div>';
            });
        }
        if ((team.defaultSupportingTeams || []).length) {
            homeHtml += '<div style="margin:14px 0 8px 0; color:#6b7280">Default supporting teams</div>';
            (team.defaultSupportingTeams || []).forEach(otherTeam => {
                homeHtml += '<div class="pill">' + linkOf(otherTeam.id + '.html', otherTeam.name, '') + '</div>';
            });
        }
        homeHtml += '</div>';
    }
    document.getElementById('home-tab').innerHTML = homeHtml;
    document.getElementById('dependencies-tab').innerHTML = '<div class="section"><div class="section-title">Dependency Views</div><div class="empty-state">Open this tab to render Mermaid dependency diagrams.</div></div>';
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Mobility-as-a-Service (MaaS) Home"
    },
    {
      "link": "../index.html",
      "label": "Teams"
    },
    {
      "label": "Arrive Partner Platform"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
