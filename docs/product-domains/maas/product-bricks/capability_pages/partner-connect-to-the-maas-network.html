    <script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

<script>

            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '');
        return (normalized || 'evidence');
    }

    function setupEvidenceTabs() {
        const tabs = (evidence && evidence.tabs) ? evidence.tabs : [];
        const tabBar = document.getElementById(tabsNavigationId);
        const tabContents = document.getElementById(tabsContentId);
        if (!tabBar || !tabContents) {
            return;
        }

        tabs.forEach((tab) => {
            const tabId = buildEvidenceTabId(tab.label);
            tab.id = tabId;
            const fragmentCount = (tab.groups || []).reduce((sum, group) => sum + ((group.fragments || []).length), 0);

            const button = document.createElement('button');

            const content = document.createElement('div');
            content.id = 'tab_content_' + tabId;
            content.className = 'tabcontent';
            content.style.padding = '10px';
            content.innerHTML = '<div id="tab_content_' + tabId + '"></div>';
            tabContents.appendChild(content);
        });

    setupEvidenceTabs();

        if (!links || !links.length) return '';

        let html = '<div style="font-size: 80%; border-top: 1px solid grey; margin-top: 10px">';
        html += '<div style="padding-left: 0; padding-top: 6px; padding-bottom: 0; margin: 0">';
        (links || []).forEach(link => {
            const label = escapeEvidenceHtml(link.label || 'Open link');
            const url = link.url || '';
            html += '<div style="display: inline-block; border: 1px solid lightgrey; border-radius: 999px; padding: 4px 6px; margin: 3px">';
            html += '<a class="evidence-link" target="_blank" rel="noopener noreferrer" href="' + escapeEvidenceHtml(url) + '">' + label + '</a>';
            html += '<img src="../icons/new-window.png" style="height: 10px; vertical-align: top; margin: 2px;">';
            html += '</div>';
        });
        html += '</div>';
        html += '</div>';
        return html;
    }

    function renderEvidenceIcon(fragment) {
        const icon = escapeEvidenceHtml(fragment.icon || 'evidence.png');
        return '<img class="evidence-card-icon" src="../icons/' + icon + '" onerror="this.onerror=null;this.src=\'../icons/evidence.png\'">';
    }

    function aggregateSummableFacts(fragments) {
        const totals = {};
        (fragments || []).forEach(fragment => {
            (fragment.facts || []).forEach(fact => {
                if (!fact || fact.summable !== true) {
                    return;
                }
                const numericValue = Number(fact.value);
                if (!Number.isFinite(numericValue)) {
                    return;
                }
                const label = fact.label || 'Value';
                totals[label] = (totals[label] || 0) + numericValue;
            });
        });
        return Object.entries(totals).map(([label, value]) => ({label, value}));
    }

    function renderSummableFactsSummary(fragments) {
        const totals = aggregateSummableFacts(fragments);
        if (!totals.length) {
            return '';
        }

        let html = '<div class="evidence-summary">';
        totals.forEach(item => {
            html += '<div class="evidence-summary-chip">';
            html += '<span class="evidence-summary-value">' + escapeEvidenceHtml(item.value + '') + '</span>';
            html += '<span>' + escapeEvidenceHtml(item.label) + '</span>';
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderEvidenceContent(groups, containerId) {
        let html = '';

        if (!groups.length) {
            html += '<div class="group" style="margin-top:0">No evidence linked for this object.</div>';
            document.getElementById(containerId).innerHTML = html;
            return;
        }

        const tabFragments = [];
        groups.forEach(group => {
            (group.fragments || []).forEach(fragment => tabFragments.push(fragment));
        });
        html += renderSummableFactsSummary(tabFragments);

        groups.forEach(group => {
            const groupFragmentCount = (group.fragments || []).length;
            html += '<div class="evidence-group">';
            html += '<div class="evidence-group-title">' + escapeEvidenceHtml(group.name) + ' (' + groupFragmentCount + ')</div>';
            if (group.description) {
                html += '<div class="evidence-group-description">' + escapeEvidenceHtml(group.description) + '</div>';
            }
            html += renderSummableFactsSummary(group.fragments || []);

            (group.fragments || []).forEach(fragment => {
                html += '<div class="evidence-card">';
                html += '<div class="evidence-card-header">';
                html += '<div class="evidence-card-header-top">';
                html += renderEvidenceIcon(fragment);
                html += '<div>';
                html += '<div class="evidence-card-meta">' + escapeEvidenceHtml(fragment.evidenceGroupTitle || fragment.type || 'Evidence fragment') + '</div>';
                html += '<div class="evidence-card-title">' + escapeEvidenceHtml(fragment.title || fragment.id) + '</div>';
                html += '</div>';
                html += '</div>';
                if (fragment.note) {
                    html += '<div class="evidence-card-note">' + escapeEvidenceHtml(fragment.note) + '</div>';
                }
                html += '</div>';
                if (fragment.description) {
                    html += '<div class="evidence-card-summary">' + escapeEvidenceHtml(fragment.description) + '</div>';
                }
                if (fragment.facts && fragment.facts.length) {
                    html += '<div class="evidence-card-summary" style="color: black;">';
                    fragment.facts.forEach(fact => {
                        html += '<div><span style="border: 1px solid lightgrey; background-color: lightyellow">&nbsp;' + escapeEvidenceHtml(fact.value + '') + '&nbsp;</span> ' + escapeEvidenceHtml(fact.label) + '</div>';
                    });
                    html += '</div>';
                }
                if (fragment.tags && fragment.tags.length) {
                    fragment.tags.forEach(tag => {
                        html += '<div class="tag" style="margin-bottom:10px;">' + escapeEvidenceHtml(tag) + '</div>';
                    });
                }
                html += '<div class="evidence-links">' + renderEvidenceLinks(fragment.links) + '</div>';
                html += '</div>';
            });

            html += '</div>';
        });

        document.getElementById(containerId).innerHTML = html;
    }

    function renderEvidence() {
        const tabs = (evidence && evidence.tabs) ? evidence.tabs : [];
        tabs.forEach((tab, index) => {
            const tabId = tab.id || buildEvidenceTabId(tab.label, index);
            renderEvidenceContent(tab.groups || [], 'tab_content_' + tabId);
        });
    }

    renderEvidence();
</script>

<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Mobility-as-a-Service (MaaS) Home"
    },
    {
      "link": "../index.html",
      "label": "Capabilities Index"
    },
    {
      "label": "Connect to the MaaS Network"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
