<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2025-Q4 Establish a credible open-payment transit operating model</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1180px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #eaf1f7;
            color: #315b7c;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .objective {
            font-size: 19px;
            line-height: 1.55;
        }

        .metric {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 12px;
        }

        .metric-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
        }

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metric-description {
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }

        .key-result {
            margin-bottom: 14px;
            padding: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background-color: #fafafa;
        }

        .key-result-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .subsection {
            margin-top: 12px;
        }

        .subsection-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 50px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Objectives">
        </td>
        <td>
            <div class="eyebrow" id="Eyebrow"></div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const pageData = {"id": "atra", "title": "2025-Q4 Establish a credible open-payment transit operating model", "objective": "Create enough reliability and rollout discipline that transit authorities see Arrive as an operational partner rather than a risky modernization vendor.", "okrStyle": "objective-and-key-results", "status": "archived", "period": {"quarter": "2025-Q4", "startDate": "2025-10-01", "endDate": "2025-12-31", "type": "archive"}, "linkedCustomers": [{"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "customerGroup": "Public Transport Authorities and Operators"}], "linkedCustomerKPIs": [{"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "kpiId": "abdt", "kpiName": "Average boarding time", "description": "Time required for passengers to board and validate payment.", "unit": "seconds", "kind": "customer", "targetDirection": "decrease"}], "linkedBusinessKPIs": [{"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "kpiId": "tarr", "kpiName": "Transit platform ARR", "description": "Recurring revenue from transit payment, devices, and operational services.", "unit": "EUR ARR", "kind": "business", "targetDirection": "increase"}], "keyResults": [{"id": "atrk", "metric": "Average boarding time", "kind": "customer", "targetDirection": "decrease", "target": "Show that payment modernization does not slow real-world service", "baseline": "Transit buyers were skeptical of operational disruption during rollout", "statement": "Reduce average boarding time by keeping validation fast and failure handling operationally manageable.", "companyKeyResultId": "atra-atrk-operations", "companyObjectiveId": "obj-operations", "companyObjectiveTitle": "Make execution reliably repeatable", "executingTeams": [{"teamId": "devo", "teamName": "Arrive Device Operations", "role": "executing", "intent": "Lead the work to reduce average boarding time by keeping validation fast and failure handling operationally manageable via Device & Validator Management and Transit Operations Telemetry."}], "supportingTeams": [{"teamId": "plre", "teamName": "Arrive Platform Reliability", "role": "supporting", "intent": "Support the KR by contributing capability for average boarding time, aligned with its focus on own observability, platform reliability, incident response, and service-health operations via Observability & Reliability Operations."}, {"teamId": "faen", "teamName": "Arrive Transit Fare Engine", "role": "supporting", "intent": "Support the KR by contributing capability for average boarding time, aligned with its focus on own fare rules, open payment, tap processing, and transport payment orchestration via Transit Fare & Open Payment Engine."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "This KR should be pursued as an outcome target with room for discovery, iteration, and tradeoff.", "inspiredByInsights": [{"insightId": "discovery-arrive-2026-02-04-02-transit-reliability", "insightTitle": "Transit open-payment reliability: validated discovery", "status": "archived", "howItInspiresObjective": "Provides evidence and product context for the objective's operations tradeoffs."}, {"insightId": "discovery-arrive-2026-03-05-04-city-intelligence-value", "insightTitle": "City intelligence value model", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's operations tradeoffs."}], "sourceObjectiveId": "atra", "sourceObjectiveTitle": "2025-Q4 Establish a credible open-payment transit operating model", "sourceObjectiveStatement": "Create enough reliability and rollout discipline that transit authorities see Arrive as an operational partner rather than a risky modernization vendor."}], "linkedInitiatives": [], "linkedReleases": [], "sourceReferences": {"customers": "customers/customers.json", "initiatives": null, "releases": null}, "objectiveRole": "source_objective_for_company_okrs", "companyObjectiveIds": ["obj-operations"], "landingPageId": "atra", "companyObjectiveRefs": [{"id": "obj-operations", "title": "archive Make execution reliably repeatable", "landingPageId": "archive-obj-operations"}]};
    const pageKind = 'source-objective';
    const domainName = 'Mobility-as-a-Service (MaaS)';

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) {
            return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        }
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        const title = metric.kpiName || metric.metric || '';
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(title) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderExecutionItem(item, typeName) {
        const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
            ? (typeName === 'initiative'
                ? '../../initiatives/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '../../releases/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html')
            : '';
        let html = '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(target, item.description || item.id, 'list-title') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(item.date || '') + '</div>';
        if (item.customerIds && item.customerIds.length) {
            html += '<div class="list-description">Customers: ' + escapeHtml(item.customerIds.join(', ')) + '</div>';
        }
        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="list-description">Channels: ' + escapeHtml(item.deliveryChannels.join(', ')) + '</div>';
        }
        if (item.productBricks && item.productBricks.length) {
            html += '<div class="list-description">Bricks: ' + escapeHtml(item.productBricks.join(', ')) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderTeams(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.teamName || item.teamId) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.role || '') + '</div>';
            if (item.intent) {
                html += '<div class="list-description">' + escapeHtml(item.intent) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderInsights(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.insightTitle || item.title) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function sameInsightSet(a, b) {
        const aIds = (a || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        const bIds = (b || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        return aIds && bIds && aIds === bIds;
    }

    function renderKeyResult(item, options) {
        let html = '<div class="key-result">';
        html += '<div class="key-result-title">' + escapeHtml(item.metric) + '</div>';
        html += '<div>' + escapeHtml(item.statement || '') + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(item.targetDirection || '') + (item.target ? ' | ' + escapeHtml(item.target) : '') + (item.commitmentLabel ? ' | ' + escapeHtml(item.commitmentLabel) : '') + '</div>';

        if (options.showObjective && item.companyObjectiveTitle) {
            html += '<div class="list-description">Company objective: ' + escapeHtml(item.companyObjectiveTitle) + '</div>';
        }
        if (options.showSource && item.sourceObjectiveTitle) {
            const href = item.sourceObjectivePageId ? (item.sourceObjectivePageId + '.html') : '';
            html += '<div class="list-description">Source objective: ' + linkOf(href, item.sourceObjectiveTitle, 'entity-link') + '</div>';
        }
        if (item.baseline) {
            html += '<div class="list-description">Baseline: ' + escapeHtml(item.baseline) + '</div>';
        }
        if (item.commitmentRationale) {
            html += '<div class="list-description">Commitment: ' + escapeHtml(item.commitmentRationale) + '</div>';
        }
        html += renderTeams('Executing Teams', item.executingTeams || [], true);
        html += renderTeams('Supporting Teams', item.supportingTeams || [], true);
        if (!(options.suppressRepeatedInsights && sameInsightSet(options.pageInsights, item.inspiredByInsights || []))) {
            html += renderInsights('Inspired By Insights', item.inspiredByInsights || [], true);
        }
        html += '</div>';
        return html;
    }

    function renderSourceObjective(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.objective || '') + '</div></div>';

        if (page.companyObjectiveRefs && page.companyObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Mapped Company Objectives</div>';
            page.companyObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(item.id) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.linkedCustomers && page.linkedCustomers.length) {
            html += '<div class="section"><div class="section-title">Linked Customers</div>';
            page.linkedCustomers.forEach(customer => {
                html += '<div class="pill"><div><div class="pill-name">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.keyResults && page.keyResults.length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            page.keyResults.forEach(item => {
                html += renderKeyResult(item, {showObjective: true, showSource: false});
            });
            html += '</div>';
        }

        if ((page.linkedCustomerKPIs && page.linkedCustomerKPIs.length) || (page.linkedBusinessKPIs && page.linkedBusinessKPIs.length)) {
            html += '<div class="section"><div class="section-title">Linked KPIs</div>';
            (page.linkedCustomerKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            (page.linkedBusinessKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            html += '</div>';
        }

        html += '<div class="section"><div class="section-title">Execution Links</div>';
        if (page.linkedInitiatives && page.linkedInitiatives.length) {
            page.linkedInitiatives.forEach(item => {
                html += renderExecutionItem(item, 'initiative');
            });
        } else {
            html += '<div class="list-row"><div class="list-description">No initiatives linked to this objective.</div></div>';
        }
        html += '</div>';

        html += '<div class="section"><div class="section-title">Release Links</div>';
        if (page.linkedReleases && page.linkedReleases.length) {
            page.linkedReleases.forEach(item => {
                html += renderExecutionItem(item, 'release');
            });
        } else {
            html += '<div class="list-row"><div class="list-description">No releases linked to this objective.</div></div>';
        }
        html += '</div>';

        if (page.sourceReferences) {
            html += '<div class="section"><div class="section-title">Source References</div>';
            Object.keys(page.sourceReferences).forEach(key => {
                if (page.sourceReferences[key]) {
                    html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(key) + '</div><div class="pill-meta">' + escapeHtml(page.sourceReferences[key]) + '</div></div></div>';
                }
            });
            html += '</div>';
        }
        return html;
    }

    function renderCompanyObjective(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.statement || '') + '</div></div>';

        if (page.okrDesignNotes) {
            html += '<div class="section"><div class="section-title">Design Notes</div><div class="list-row"><div class="list-description">' + escapeHtml(page.okrDesignNotes) + '</div></div></div>';
        }

        html += renderInsights('Inspired By Insights', page.inspiredByInsights || [], false);

        if (page.keyResults && page.keyResults.length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            page.keyResults.forEach(item => {
                html += renderKeyResult(item, {
                    showObjective: false,
                    showSource: true,
                    suppressRepeatedInsights: true,
                    pageInsights: page.inspiredByInsights || []
                });
            });
            html += '</div>';
        }
        return html;
    }

    document.getElementById('Eyebrow').innerHTML = escapeHtml(pageKind === 'company-objective' ? 'Company Objective' : 'Source Objective');
    document.getElementById('Title').innerHTML = escapeHtml(pageData.title || 'Objective');
    const metaBits = [escapeHtml(domainName)];
    if (pageData.status) {
        metaBits.push(escapeHtml(pageData.status));
    }
    if (pageData.period && pageData.period.quarter) {
        metaBits.push(escapeHtml(pageData.period.quarter));
    }
    document.getElementById('Meta').innerHTML = metaBits.join(' | ');

    document.getElementById('Content').innerHTML = pageKind === 'company-objective'
        ? renderCompanyObjective(pageData)
        : renderSourceObjective(pageData);
</script>
</body>
</html>
