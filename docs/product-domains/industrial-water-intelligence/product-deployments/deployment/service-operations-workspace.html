<script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function deploymentIconFile(channel, group) {
        const text = [
            group && group.groupId,
            group && group.groupName,
            channel && channel.subChannelId,
            channel && channel.subChannelName,
            channel && channel.channelType
        ].join(' ').toLowerCase();

        if (text.includes('ios')) return 'app_store_ios.png';
        if (text.includes('android') || text.includes('play store') || text.includes('play-store')) return 'app_store_android.png';
        if (text.includes('private cloud') || text.includes('private-cloud')) return 'private_cloud.png';
        if (text.includes('cloud') || text.includes('runtime') || text.includes('edge') || text.includes('cdn')) return 'public_cloud.png';
        if (text.includes('saas') || text.includes('analytics') || text.includes('crm') || text.includes('datadog') || text.includes('snowflake') || text.includes('databricks') || text.includes('salesforce')) return 'saas.png';
        return 'deployment.png';
    }

    function interfaceIconFile(iface) {
        const text = [iface && iface.type, iface && iface.name].join(' ').toLowerCase();
        if (text.includes('partner_api')) return 'partner_api.png';
        if (text.includes('public_api') || text.includes('public api')) return 'public_api.png';
        if (text.includes('api')) return 'api.png';
        if (text.includes('mobile web')) return 'mobile_web.png';
        if (text.includes('mobile') || text.includes('app')) return 'mobile_app.png';
        if (text.includes('dashboard') || text.includes('cockpit')) return 'dashboard.png';
        if (text.includes('notification')) return 'notification.png';
        if (text.includes('search')) return 'search_engine.png';
        if (text.includes('social')) return 'social_media.png';
        return 'web.png';
    }

    function buildDeploymentChannelRecords() {
        const records = [];
        (deployment.channels || []).forEach(group => {
            (group.channels || []).forEach(channel => {
                records.push({
                    ref: (group.groupId || '') + '/' + (channel.subChannelId || ''),
                    group: group,
                    channel: channel
                });
            });
        });
        return records;
    }

    function findCurrentRecord() {
        return buildDeploymentChannelRecords().find(record => record.ref === channelRef) || null;
    }

    function buildChannelProductUsage(record) {
        const usages = [];
        ((products.portfolio || {}).products || []).forEach(product => {
            const interfaces = new Set();
            let brickCount = 0;
            (product.neededBricks || []).forEach(brick => {
                (brick.deploymentChannels || []).forEach(channel => {
                    if (channel.deploymentChannelRef !== record.ref) return;
                    brickCount += 1;
                    (channel.supportsInterfaces || []).forEach(iface => interfaces.add(iface));
                });
            });
            if (brickCount > 0) {
                usages.push({
                    id: product.id,
                    name: product.name,
                    icon: product.icon || 'product.png',
                    interfaces: Array.from(interfaces).sort(),
                    brickCount: brickCount
                });
            }
        });
        return usages.sort((left, right) => left.name.localeCompare(right.name));
    }

        html += '<div><div class="chip-title">' + escapeHtml(title) + '</div>';
        if (copy) html += '<div class="chip-copy">' + escapeHtml(copy) + '</div>';
        html += '</div></div>';
        if (href) html += '</a>';
        return html;
    }

        html += '<div class="deployment-summary">';
        html += '<div class="deployment-stat"><div class="deployment-stat-value">' + environments.length + '</div><div class="deployment-stat-label">Environments</div></div>';
        html += '<div class="deployment-stat"><div class="deployment-stat-value">' + productUsage.length + '</div><div class="deployment-stat-label">Product Uses</div></div>';
        html += '<div class="deployment-stat"><div class="deployment-stat-value">' + deployedBricks.length + '</div><div class="deployment-stat-label">Deployed Bricks</div></div>';
        html += '</div>';

        const intro = [deployment.metadata && deployment.metadata.description, current.group.description, current.channel.description].filter(Boolean).join(' ');
        if (intro) html += '<div class="deployment-copy">' + escapeHtml(intro) + '</div>';

        html += '<div class="deployment-section-title">Environment</div>';
        if (environments.length) {
            environments.forEach(environment => {
                html += '<div class="deployment-environment">';
                html += '<div class="deployment-environment-name">' + escapeHtml(environment.environmentName || environment.environmentId || 'Environment') + '</div>';
                if (environment.description) html += '<div class="deployment-environment-copy">' + escapeHtml(environment.description) + '</div>';
                if ((environment.links || []).length) {
                    html += '<div class="deployment-link-row">';
                    environment.links.forEach(link => {
                        html += '<a class="deployment-link" target="_blank" rel="noopener noreferrer" href="' + escapeHtml(link.url || '') + '">' + escapeHtml(link.linkName || link.url || 'Link') + '</a>';
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
        } else {
            html += '<div class="empty-state">No environment listed.</div>';
        }

        html += '<div class="deployment-section-title">Products Using This Channel</div>';
        if (productUsage.length) {
            html += '<div class="chip-row">';
            productUsage.forEach(product => {
                const meta = [product.brickCount + ' bricks', product.interfaces.length ? product.interfaces.join(', ') : ''].filter(Boolean).join(' · ');
                html += renderChip('../icons/' + escapeHtml(product.icon), '../icons/product.png', product.name, meta, '../landing_pages/' + escapeHtml(product.id) + '.html');
            });
            html += '</div>';
        } else {
            html += '<div class="empty-state">No products currently reference this channel.</div>';
        }

        html += '<div class="deployment-section-title">Deployed Bricks</div>';
        if (deployedBricks.length) {
            html += '<div class="chip-row">';
            deployedBricks.forEach(brick => {
                html += renderChip('../../product-bricks/icons/' + escapeHtml(brick.brickId) + '.png', '../../product-bricks/icons/logo.png', brick.brickName || brick.brickId || 'Product brick', brick.deploymentRole || '', '../../product-bricks/landing_pages/' + escapeHtml(brick.brickId) + '.html');
            });
            html += '</div>';
        } else {
            html += '<div class="empty-state">No bricks mapped to this channel.</div>';
        }

        container.innerHTML = html;
    }
</script>

<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Industrial Water Intelligence Home"
    },
    {
      "link": "../index.html",
      "label": "Deployment Channels"
    },
    {
      "label": "service-operations-workspace"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
