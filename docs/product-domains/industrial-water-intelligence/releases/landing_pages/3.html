<!DOCTYPE html>
<html lang="en">
<head>

    <style>

    <style>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Enterprise Baseline Release", "date": "2026-05-08", "description": "Release to improve site baseline validation, benchmark comparability, and enterprise visibility for expansion accounts.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Enterprise Water Program Director", "group": "Enterprise Water and Sustainability Leaders", "icon": "cg1-p1.png"}, "customerKPIs": [{"kpi": "Sites with verified enterprise water baseline", "expectedImpact": "Increase trusted baseline coverage.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Monitored site expansion rate", "expectedImpact": "Improve readiness for enterprise rollout.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "sens", "change": "Release improved telemetry validation and gap detection.", "brick": {"id": "sens", "name": "Sensor and Edge Telemetry", "type": "service", "description": "Collects online water-quality, flow, and equipment-state data from plant systems and edge devices.", "links": [], "domain": "site_data_and_connectivity", "group": "sensing_and_edge_capture", "internalModules": [{"title": "Edge Data Collection Layer", "description": "Normalizes and buffers plant telemetry from controllers, probes, and gateways.", "type": "service"}], "interfaces": [{"title": "Telemetry Ingestion API", "description": "Ingestion interface for plant and edge telemetry.", "type": "api"}], "dataDependencies": [{"assetId": "sensor-stream", "role": "own", "description": "Acts as the primary owning brick for Sensor Stream.", "storeIds": ["sensor-stream-bus"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "sens.png"}}, {"brickId": "asst", "change": "Release improved loop-model setup workflows.", "brick": {"id": "asst", "name": "Asset Registry and System Twin", "type": "service", "description": "Stores the plant loop, equipment, site, and system topology used to interpret telemetry and work context correctly.", "links": [], "domain": "site_data_and_connectivity", "group": "sensing_and_edge_capture", "internalModules": [{"title": "Site and Loop Model", "description": "Defines sites, loops, assets, and operating boundaries.", "type": "service"}], "interfaces": [{"title": "Asset and Loop API", "description": "API for querying plant assets, loops, and system relationships.", "type": "api"}], "dataDependencies": [{"assetId": "water-asset-register", "role": "own", "description": "Owns the plant loop and equipment registry.", "storeIds": ["asset-registry-db"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "asst.png"}}, {"brickId": "anal", "change": "Release improved enterprise benchmark views.", "brick": {"id": "anal", "name": "Water Analytics and Benchmarking", "type": "full-stack", "description": "Provides enterprise, site, and asset-level benchmark views for water, uptime, chemistry, and response performance.", "links": [], "domain": "enterprise_workflows_and_value_management", "group": "analytics_and_governance", "internalModules": [{"title": "Benchmarking Model", "description": "Normalizes performance across sites, loops, and customer portfolios.", "type": "analytics"}], "interfaces": [{"title": "Enterprise Water Dashboard", "description": "Dashboard for benchmarking sites and identifying outliers.", "type": "ui"}], "dataDependencies": [], "brickDependencies": [{"targetBrickId": "flow", "type": "data", "interface": "Leak and Flow Dashboard", "description": "Uses water-balance outcomes in benchmarking."}, {"targetBrickId": "alrm", "type": "data", "interface": "Incident Event Stream", "description": "Uses alarm and response data for operating comparisons."}, {"targetBrickId": "hist", "type": "data", "interface": "Data Quality Reconciliation API", "description": "Uses reconciled plant history to improve benchmark trust."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "anal.png"}}], "deliveryChannels": [{"channelId": "plant-control-cloud", "change": "Deploy baseline validation services.", "channel": {"productId": "plant", "productName": "", "name": "plant-control-cloud", "type": "product", "icon": "product.png"}}, {"channelId": "customer-web-portal", "change": "Deploy updated benchmark dashboards.", "channel": {"productId": "customer", "productName": "", "name": "customer-web-portal", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["iwi-site-intelligence", "iwi-integration-and-value"], "supportingTeamIds": ["iwi-customer-operations"]}, "initiativeId": "initiative-industrial-water-intelligence-2026-04-23-01", "landingPageIndex": 3, "objectiveLandingPageUrl": ""};
    const domainName = 'Industrial Water Intelligence';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Industrial Water Intelligence Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Enterprise Baseline Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
