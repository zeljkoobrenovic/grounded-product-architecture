    <style>

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>

<td>

</td>

<script>
    const release = {"title": "Value Proof Release", "date": "2026-06-12", "description": "Release to improve verified savings, executive review views, and account expansion workflows.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Enterprise Water Program Director", "group": "Enterprise Water and Sustainability Leaders", "icon": "cg1-p1.png"}, "customerKPIs": [{"kpi": "Savings projects with verified eROI", "expectedImpact": "Increase trusted proof of value.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Monitored site expansion rate", "expectedImpact": "Improve expansion conversion.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "eroi", "change": "Release improved baseline and verification workflows.", "brick": {"id": "eroi", "name": "Verified Savings and Project ROI Tracker", "type": "service", "description": "Tracks value projects, baselines, assumptions, and verified customer outcomes for expansion and renewal decisions.", "links": [], "domain": "enterprise_workflows_and_value_management", "group": "analytics_and_governance", "internalModules": [{"title": "Value Baseline and Proof Model", "description": "Stores and validates project baselines, assumptions, and verified outcomes.", "type": "analytics"}], "interfaces": [{"title": "Value Review Workspace", "description": "Workspace for project ROI, savings proof, and customer-value reviews.", "type": "ui"}], "dataDependencies": [{"assetId": "savings-project", "role": "own", "description": "Owns value projects and verified savings records.", "storeIds": ["savings-project-db"]}], "brickDependencies": [{"targetBrickId": "anal", "type": "data", "interface": "Enterprise Water Dashboard", "description": "Uses site and enterprise performance data to verify project value."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "eroi.png"}}, {"brickId": "port", "change": "Release improved executive review views.", "brick": {"id": "port", "name": "Customer Operations Portal", "type": "full-stack", "description": "Provides the shared customer-facing operating surface for enterprise, plant, compliance, and value views.", "links": [], "domain": "enterprise_workflows_and_value_management", "group": "customer_and_service_workflows", "internalModules": [{"title": "Customer Experience Layer", "description": "Presents dashboards, reports, cases, and value reviews to customer users.", "type": "ui"}], "interfaces": [{"title": "Portal UI", "description": "Browser experience for customer operations, value, and compliance workflows.", "type": "ui"}], "dataDependencies": [{"assetId": "site-profile", "role": "own", "description": "Owns the customer site profile surfaced in the portal.", "storeIds": ["site-profile-db"]}], "brickDependencies": [{"targetBrickId": "anal", "type": "composition", "interface": "Enterprise Water Dashboard", "description": "Uses analytics and benchmarking to populate operating views."}, {"targetBrickId": "case", "type": "composition", "interface": "Case Workspace", "description": "Uses case context to expose current issues and recommendations."}, {"targetBrickId": "eroi", "type": "composition", "interface": "Value Review Workspace", "description": "Uses verified value records in executive and account reviews."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "port.png"}}, {"brickId": "inte", "change": "Release improved reporting connectors.", "brick": {"id": "inte", "name": "Plant and Enterprise Integration Hub", "type": "integration", "description": "Connects the water platform to plant historians, CMMS, ERP, sustainability reporting, and customer enterprise systems.", "links": [], "domain": "enterprise_workflows_and_value_management", "group": "customer_and_service_workflows", "internalModules": [{"title": "Enterprise Connector Framework", "description": "Standard connector framework for inbound and outbound enterprise integrations.", "type": "integration"}], "interfaces": [{"title": "Integration Connector API", "description": "API for enterprise integration setup and data exchange.", "type": "api"}], "dataDependencies": [{"assetId": "integration-mapping", "role": "write", "description": "Maintains integration configuration and endpoint mappings.", "storeIds": ["integration-mapping-db"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "inte.png"}}], "deliveryChannels": [{"channelId": "customer-web-portal", "change": "Deploy improved value review workspace.", "channel": {"productId": "customer", "productName": "", "name": "customer-web-portal", "type": "product", "icon": "product.png"}}, {"channelId": "enterprise-connectors", "change": "Deploy improved reporting exports.", "channel": {"productId": "enterprise", "productName": "", "name": "enterprise-connectors", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["iwi-integration-and-value", "iwi-customer-operations"], "supportingTeamIds": []}, "initiativeId": "initiative-industrial-water-intelligence-2026-05-14-02", "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Industrial Water Intelligence';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Industrial Water Intelligence Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Value Proof Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
