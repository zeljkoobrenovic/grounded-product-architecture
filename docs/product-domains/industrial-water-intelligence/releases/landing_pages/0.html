<script>
    const release = {"title": "Wastewater and Reuse Release", "date": "2026-06-26", "description": "Release to improve wastewater risk visibility, evidence completeness, and reuse-readiness scoring.", "customerImpact": [{"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "Environmental Compliance and Wastewater Manager", "group": "Environmental Compliance and Reuse Leaders", "icon": "cg3-p1.png"}, "customerKPIs": [{"kpi": "Permit-excursion-free discharge days", "expectedImpact": "Increase compliant wastewater operation.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Water reuse rate", "expectedImpact": "Increase controlled reuse.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Sites with active reuse module", "expectedImpact": "Increase wastewater-to-reuse expansion.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "effl", "change": "Release improved wastewater process-risk views.", "brick": {"id": "effl", "name": "Effluent Treatment Optimization", "type": "full-stack", "description": "Provides wastewater-treatment performance monitoring, process-risk detection, and issue guidance for discharge control.", "links": [], "domain": "treatment_automation_and_optimization", "group": "loop_specific_performance_programs", "internalModules": [{"title": "Effluent Process Risk Model", "description": "Estimates treatment stress and compliance risk from live process signals.", "type": "analytics"}], "interfaces": [{"title": "Wastewater Control Dashboard", "description": "Operational view of wastewater performance and discharge risk.", "type": "ui"}], "dataDependencies": [{"assetId": "compliance-record", "role": "write", "description": "Writes wastewater operating evidence and compliance context.", "storeIds": ["compliance-record-db"]}], "brickDependencies": [{"targetBrickId": "prog", "type": "composition", "interface": "Program Template API", "description": "Uses standard wastewater operating templates and thresholds."}, {"targetBrickId": "sens", "type": "data", "interface": "Telemetry Ingestion API", "description": "Uses live wastewater process signals."}, {"targetBrickId": "labi", "type": "data", "interface": "Lab Result Import API", "description": "Uses sample and lab context to interpret wastewater risk."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "effl.png"}}, {"brickId": "comp", "change": "Release improved evidence packs and report exports.", "brick": {"id": "comp", "name": "Compliance Evidence and Reporting", "type": "service", "description": "Builds the audit-ready evidence pack for wastewater, treatment, alarms, and corrective action histories.", "links": [], "domain": "enterprise_workflows_and_value_management", "group": "analytics_and_governance", "internalModules": [{"title": "Compliance Record Builder", "description": "Packages operating evidence, samples, and action history for reporting and inspection.", "type": "service"}], "interfaces": [{"title": "Compliance Reporting API", "description": "API and export surface for compliance reporting and evidence retrieval.", "type": "api"}], "dataDependencies": [{"assetId": "compliance-record", "role": "own", "description": "Owns the compliance evidence record.", "storeIds": ["compliance-record-db"]}], "brickDependencies": [{"targetBrickId": "effl", "type": "data", "interface": "Wastewater Control Dashboard", "description": "Uses wastewater performance and issue records."}, {"targetBrickId": "work", "type": "data", "interface": "Work Order Workflow", "description": "Uses corrective action and service closure data."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "comp.png"}}, {"brickId": "reus", "change": "Release improved reuse-readiness and opportunity views.", "brick": {"id": "reus", "name": "Water Reuse and Circularity Control", "type": "service", "description": "Tracks treated-water quality, reuse readiness, and circular-water operating rules for approved reuse flows.", "links": [], "domain": "treatment_automation_and_optimization", "group": "loop_specific_performance_programs", "internalModules": [{"title": "Reuse Readiness Model", "description": "Scores treated-water streams for candidate reuse paths.", "type": "analytics"}], "interfaces": [{"title": "Reuse Opportunity Dashboard", "description": "View of reuse readiness, quality checks, and recovered-water value.", "type": "ui"}], "dataDependencies": [], "brickDependencies": [{"targetBrickId": "effl", "type": "composition", "interface": "Wastewater Control Dashboard", "description": "Builds on stable wastewater control and quality evidence."}, {"targetBrickId": "flow", "type": "composition", "interface": "Leak and Flow Dashboard", "description": "Uses freshwater demand and treated-water availability to find reuse opportunities."}, {"targetBrickId": "ener", "type": "composition", "interface": "Efficiency Optimization API", "description": "Uses water-energy tradeoff insights when prioritizing reuse paths."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "reus.png"}}], "deliveryChannels": [{"channelId": "plant-control-cloud", "change": "Deploy improved wastewater and reuse services.", "channel": {"productId": "plant", "productName": "", "name": "plant-control-cloud", "type": "product", "icon": "product.png"}}, {"channelId": "customer-web-portal", "change": "Deploy updated compliance and reuse dashboards.", "channel": {"productId": "customer", "productName": "", "name": "customer-web-portal", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["iwi-compliance-and-circularity"], "supportingTeamIds": ["iwi-service-operations", "iwi-integration-and-value"]}, "initiativeId": "initiative-industrial-water-intelligence-2026-05-21-04", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Industrial Water Intelligence';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Industrial Water Intelligence Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Wastewater and Reuse Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
