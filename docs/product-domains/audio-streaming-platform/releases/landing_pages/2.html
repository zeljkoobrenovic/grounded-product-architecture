<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Audio Streaming Platform)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Premium Value and Retention Release", "date": "2026-05-29", "description": "Release focused on plan clarity, entitlement reliability, and better save-and-return loops for frequent listeners.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Everyday Audio Listener", "group": "Listeners", "icon": "listener.png"}, "customerKPIs": [{"kpi": "90-day listener retention", "expectedImpact": "Improve repeat listening through better continuity and saved-state utility.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Premium conversion rate", "expectedImpact": "Increase plan adoption through clearer value communication and lower purchase friction.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Premium gross retention", "expectedImpact": "Reduce avoidable churn from entitlement and billing confusion.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "subs", "change": "Improve plan comparison and upsell timing.", "brick": {"id": "subs", "name": "Subscription & Plan Experience", "type": "full-stack", "description": "Plan selection, upsell, household management, trials, entitlements, and plan lifecycle changes.", "domain": "Listener Experience", "group": "Listening and retention", "internalModules": [{"title": "Entitlements and plan orchestration", "description": "Controls plan state, trials, eligibility, and upsell logic.", "type": "service"}], "interfaces": [{"title": "Premium plan UI", "description": "Plan comparison, purchase, and account-management experiences.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "bill", "type": "financial", "interface": "Subscription billing service", "description": "Depends on billing, invoicing, and payment state."}, {"targetBrickId": "iden", "type": "identity", "interface": "Account ownership model", "description": "Uses account and household state."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "subs.png"}}, {"brickId": "play", "change": "Improve session continuity and account-state handoffs.", "brick": {"id": "play", "name": "Playback & Queue", "type": "full-stack", "description": "Streaming playback, queue management, device handoff, session continuity, and consumption telemetry.", "domain": "Listener Experience", "group": "Listening and retention", "internalModules": [{"title": "Cross-device playback engine", "description": "Coordinates playback state and stream continuation across device contexts.", "type": "service"}], "interfaces": [{"title": "Now playing UI", "description": "Playback controls, queue, connect, and device-switching surfaces.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "iden", "type": "identity", "interface": "Account and session service", "description": "Uses authenticated identity and entitlement state."}, {"targetBrickId": "cata", "type": "content", "interface": "Playable asset metadata", "description": "Requires playable asset, availability, and format metadata."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "play.png"}}, {"brickId": "libr", "change": "Improve save, recovery, and collection visibility.", "brick": {"id": "libr", "name": "Library, Likes & Collections", "type": "full-stack", "description": "Saved content, playlists, follows, likes, recents, and other durable listener state.", "domain": "Listener Experience", "group": "Listening and retention", "internalModules": [{"title": "Personal library service", "description": "Stores collections, likes, follows, and playlist state.", "type": "service"}], "interfaces": [{"title": "Your Library UI", "description": "Library browsing, playlist editing, and saved content management.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "cata", "type": "reference", "interface": "Content entity resolution", "description": "Uses content metadata to render collections cleanly."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "libr.png"}}], "deliveryChannels": [{"channelId": "web-cdn-edge", "change": "Release improved web Premium and library flows.", "channel": {"productId": "web", "productName": "", "name": "web-cdn-edge", "type": "product", "icon": "product.png"}}, {"channelId": "core-cloud-runtime", "change": "Release supporting entitlement and playback services.", "channel": {"productId": "core", "productName": "", "name": "core-cloud-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["playback-premium"], "supportingTeamIds": ["revenue-systems", "identity-trust-platform"]}, "initiativeId": "initiative-audio-streaming-platform-2026-04-24-02", "landingPageIndex": 2, "objectiveLandingPageUrl": ""};
    const domainName = 'Audio Streaming Platform';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
