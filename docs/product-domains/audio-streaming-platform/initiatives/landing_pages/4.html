<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Audio Streaming Platform)</title>
    <style>
    .page-type-badge {
        display: inline-block;
        padding: 2px 10px;

</style>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;
        padding: 6px 4px;
        font-size: 80%;

    .breadcrumb {
    }

</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 8px;">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Personalized Home Quality Initiative", "date": "2026-04-17", "description": "Focused investment to improve Spotify's first-session impression by tightening home ranking quality, cross-format recirculation, and faster play starts.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Everyday Audio Listener", "group": "Listeners", "icon": "listener.png"}, "customerKPIs": [{"kpi": "Weekly intentional listening hours", "expectedImpact": "Increase deliberate listening by improving discovery confidence earlier in the session.", "description": "Increase average weekly hours of active listening to 13.5 in focus cohorts by improving discovery and continuity.", "unit": "hours per WAU", "currentValue": "3.7", "link": "https://dashboard.example.com/audio-streaming-platform/customers/cg1-p1/kpis/co-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Home-to-play conversion", "expectedImpact": "Increase the share of home opens that turn into immediate plays.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Premium conversion rate", "expectedImpact": "Improve perceived product value for free and paid listeners.", "description": "Increase Premium conversion to 39% of monthly active users in mature markets.", "unit": "% of MAUs", "currentValue": "59.7", "link": "https://dashboard.example.com/audio-streaming-platform/customers/cg1-p1/kpis/bo-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "home", "change": "Improve ranking orchestration and session-context handling.", "brick": {"id": "home", "name": "Home Personalization & Feed", "type": "full-stack", "description": "The personalized home feed that assembles recommendations, recirculation modules, and context-aware entry points.", "domain": "Listener Experience", "group": "Discovery and selection", "internalModules": [{"title": "Home ranking orchestration", "description": "Builds personalized modules and order for each session.", "type": "service"}], "interfaces": [{"title": "Home feed UI", "description": "Listener-facing home surface across app, desktop, and web.", "type": "ui"}], "dataDependencies": [{"assetId": "transaction", "role": "read", "description": "Reads Transaction to support domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "release-operations", "role": "read", "description": "Reads Release Operations to support domain workflows.", "storeIds": ["release-operations-db"]}], "brickDependencies": [{"targetBrickId": "reco", "type": "composition", "interface": "Recommendation bundle API", "description": "Uses recommendation candidates and confidence scores."}, {"targetBrickId": "edit", "type": "composition", "interface": "Editorial rails feed", "description": "Mixes editorial programming into personalized home."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "home.png"}}, {"brickId": "reco", "change": "Improve recommendation freshness and cross-format candidate selection.", "brick": {"id": "reco", "name": "Recommendations & Mixes", "type": "full-stack", "description": "Personalized recommendations, mixes, radios, and taste-shaping suggestions across formats.", "domain": "Listener Experience", "group": "Discovery and selection", "internalModules": [{"title": "Recommendation model serving", "description": "Produces personalized candidates and next-best listening options.", "type": "service"}], "interfaces": [{"title": "Recommendation APIs", "description": "Serves recommendations to home, search, and playlist surfaces.", "type": "api"}], "dataDependencies": [{"assetId": "transaction", "role": "read", "description": "Reads Transaction to support domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "release-operations", "role": "read", "description": "Reads Release Operations to support domain workflows.", "storeIds": ["release-operations-db"]}], "brickDependencies": [{"targetBrickId": "intel", "type": "insight", "interface": "Experiment and model features", "description": "Uses experimentation and ranking intelligence."}, {"targetBrickId": "play", "type": "feedback", "interface": "Playback event stream", "description": "Learns from playback and skip behavior."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "reco.png"}}], "deliveryChannels": [{"channelId": "ios-app-store", "change": "Release updated home feed treatments to iOS.", "channel": {"productId": "ios", "productName": "", "name": "ios-app-store", "type": "product", "icon": "product.png"}}, {"channelId": "android-play-store", "change": "Release updated home feed treatments to Android.", "channel": {"productId": "android", "productName": "", "name": "android-play-store", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["personalization-discovery"], "supportingTeamIds": ["platform-intelligence", "catalog-rights-core"]}, "initiativeId": "initiative-audio-streaming-platform-2026-04-17-01", "discoveryIds": ["discovery-audio-streaming-platform-2026-04-08-01-home-quality"], "priority": "p1", "keyResultId": "audio-streaming-platform-2026-q2-cg1-p1/kr-1", "landingPageIndex": 4, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Audio Streaming Platform';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Audio Streaming Platform Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Personalized Home Quality Initiative"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
