<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Audio Streaming Platform)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Creator Monetization Confidence Initiative", "date": "2026-05-08", "description": "Focused investment to improve creator earnings transparency, monetizable inventory growth, and advertiser outcome reporting.", "customerImpact": [{"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "Podcast / Video Creator", "group": "Podcast and Video Creators", "icon": "creator.png"}, "customerKPIs": [{"kpi": "Monthly monetizable consumption hours", "expectedImpact": "Increase the amount of creator inventory eligible for monetization.", "description": "Increase monetizable listening or viewing hours by 25% year over year in priority creator cohorts.", "unit": "hours per active show", "currentValue": "13.9", "link": "https://dashboard.example.com/audio-streaming-platform/customers/cg3-p1/kpis/co-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Creator payout predictability", "expectedImpact": "Increase creator trust in the platform's earnings model.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Partner Program eligibility rate", "expectedImpact": "Increase creator participation in platform-native monetization.", "description": "Increase the share of active shows that reach eligibility for on-platform monetization participation to 42%.", "unit": "% of active eligible shows", "currentValue": "89.5", "link": "https://dashboard.example.com/audio-streaming-platform/customers/cg3-p1/kpis/bo-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}, {"customerId": "cg4-p1", "customer": {"id": "cg4-p1", "name": "Brand Media Buyer", "group": "Advertisers and Agencies", "icon": "advertiser.png"}, "customerKPIs": [{"kpi": "Measured lift coverage", "expectedImpact": "Increase the share of ad spend with trusted outcome reporting.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Advertising revenue growth", "expectedImpact": "Increase advertiser confidence and repeat spend.", "description": "Sustain advertising revenue growth at 17% year over year in the modeled domain.", "unit": "% growth", "currentValue": "50.2", "link": "https://dashboard.example.com/audio-streaming-platform/customers/cg4-p1/kpis/bo-cg4-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "monet", "change": "Improve creator earnings explanation and onboarding.", "brick": {"id": "monet", "name": "Creator Monetization", "type": "full-stack", "description": "Creator-side monetization across subscriptions, ad participation, Premium video revenue, and payout eligibility.", "domain": "Creator Growth", "group": "Creator publishing and monetization", "internalModules": [{"title": "Creator earnings orchestration", "description": "Calculates monetization eligibility, earnings state, and payout configuration.", "type": "service"}], "interfaces": [{"title": "Monetization manager UI", "description": "Creator-facing monetization setup and earnings views.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "bill", "type": "financial", "interface": "Revenue settlement", "description": "Uses financial ledger and payout workflows."}, {"targetBrickId": "camp", "type": "inventory", "interface": "Ad delivery participation", "description": "Depends on ad demand and monetizable inventory state."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "monet.png"}}, {"brickId": "crea", "change": "Improve creator funnel and revenue reporting.", "brick": {"id": "crea", "name": "Creator Audience Analytics", "type": "full-stack", "description": "Audience funnel, conversion, plays, and monetization analytics for podcasters, video creators, and publishers.", "domain": "Creator Growth", "group": "Creator publishing and monetization", "internalModules": [{"title": "Creator funnel analytics service", "description": "Aggregates discovery, consumption, and conversion views for creators.", "type": "service"}], "interfaces": [{"title": "Creator analytics UI", "description": "Dashboards for audience growth, retention, and monetization performance.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "intel", "type": "data", "interface": "Shared analytics layer", "description": "Depends on shared event processing and experiment data."}, {"targetBrickId": "play", "type": "events", "interface": "Consumption telemetry", "description": "Uses listen and watch activity streams."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "crea.png"}}, {"brickId": "meas", "change": "Improve campaign-outcome reporting for advertisers.", "brick": {"id": "meas", "name": "Measurement & Attribution", "type": "full-stack", "description": "Reach, frequency, lift, conversion, and partner measurement for advertiser outcomes.", "domain": "Monetization and Foundations", "group": "Advertising and commerce", "internalModules": [{"title": "Campaign measurement pipeline", "description": "Computes delivery, attention, and business outcome views.", "type": "service"}], "interfaces": [{"title": "Measurement reporting UI", "description": "Advertiser and agency reporting, exports, and partner connections.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "camp", "type": "events", "interface": "Campaign delivery events", "description": "Uses delivery and impression telemetry."}, {"targetBrickId": "intel", "type": "analytics", "interface": "Analytics models", "description": "Uses shared analytics infrastructure and lift methods."}], "externalSystemsThisBrickDependsOn": [{"name": "Third-party measurement partners", "description": "External attribution and brand-lift partners."}], "externalSystemsDependingOnThisBrick": [], "icon": "meas.png"}}], "deliveryChannels": [{"channelId": "web-cdn-edge", "change": "Release updated creator monetization and reporting surfaces.", "channel": {"productId": "web", "productName": "", "name": "web-cdn-edge", "type": "product", "icon": "product.png"}}, {"channelId": "partner-api-gateway", "change": "Release stronger reporting outputs for partner integrations.", "channel": {"productId": "partner", "productName": "", "name": "partner-api-gateway", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["creator-publishing-monetization", "measurement-and-insights"], "supportingTeamIds": ["ad-platform", "revenue-systems"]}, "initiativeId": "initiative-audio-streaming-platform-2026-05-08-04", "discoveryIds": ["discovery-audio-streaming-platform-2026-04-18-04-creator-monetization"], "priority": "p1", "keyResultId": "audio-streaming-platform-2026-q2-cg3-p1/kr-1", "landingPageIndex": 1, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Audio Streaming Platform';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
