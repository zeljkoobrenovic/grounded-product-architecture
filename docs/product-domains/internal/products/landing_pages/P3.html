    <script>
        function initTab() {

                const hash = window.location.hash.substring(1);
                if (document.getElementById('tab_' + hash)) {
                    tabName = hash;
                }
            }
            openTab(tabName);
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            history.pushState({}, '', '#' + tabName);
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
        }

    function addHeader() {

    function addHome() {
        let html = '';

        html += '<table style="text-align: center">';
        html += '<tr>';
        html += '<td colspan="100" style="text-align: center; padding: 0">';
        html += '<div class="home-stage">';
        html += '<div class="home-stage-title">Interfaces</div>';
        html += '<div class="home-stage-subtitle">Customer-facing entry points and touchpoints</div>';
        product.interfaces.forEach(interface => {

            interface.users.forEach(user => {
                html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px; font-size: 80%">';
                html += user;
                html += '</div>';
            });
            html += '</div>';
            html += '<div style="text-align: center; max-width: 200px; vertical-align: top">';
            html += '<div style="border: 2px solid grey; padding: 8px; margin: 5px; vertical-align: top">';
            html += '<img src="../icons/' + interface.type + '.png" style="height: 42px; margin: 0; margin-top: -28px; background-color: rgba(255,255,255,1)">';
            html += '<div style="color: blue; margin-bottom: 0px; height: 2em; margin-top: 0; color: grey; font-size: 80%">' + interface.type + '</div>';
            html += '<div style="color: blue; margin-bottom: 10px; height: 2em; margin-top: 0px">' + interface.name + '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';

        });
        html += '</div>';
        html += '</td>';
        html += '</tr>';

        html += '<tr>';
        html += '<td colspan="100" style="text-align: center; padding: 0">';
        html += '<div class="home-stage">';
        html += '<div class="home-stage-title">Deployment Channels</div>';
        html += '<div class="home-stage-subtitle">Actual channels used to ship brick parts into runtime surfaces</div>';
        if (!deploymentChannelGroups.length) {
            html += '<div class="activity-muted">No deployment channels defined for this product.</div>';
        } else {
            deploymentChannelGroups.forEach(group => {
                html += '<div class="channel-group">';
                html += '<div class="channel-group-title">' + escapeHtml(group.name) + '</div>';
                html += '<div class="channel-pill-row">';
                group.channels.forEach(channel => {
                    const color = channelColor(channel.ref);
                    html += '<span class="channel-pill" style="color:' + color + '; background:' + hexToRgba(color, 0.14) + ';">';
                    html += renderDeploymentIcon(channel);
                    html += '<span class="channel-pill-title">' + escapeHtml(channel.name) + '</span>';
                    html += renderChannelBrickIcons(channel.bricks || []);
                    html += '</span>';
                });
                html += '</div>';
                html += '</div>';
            });
        }
        html += '</div>';
        html += '</td>';
        html += '</tr>';

        html += '<tr>';
        html += '<td colspan="100" style="text-align: center; padding: 0">';
        html += '<div class="home-stage">';
        html += '<div class="home-stage-title">Product Bricks</div>';
        html += '<div class="home-stage-subtitle">Brick parts inherit the same channel colors as the lanes above</div>';
        if (product.neededBricks) {
            product.neededBricks.forEach(brick => {
                html += '<div class="brick-card">';
                html += '<a class="brick-card-link" href="' + getBrickLandingPageHref(brick.brickId) + '">';
                html += '<div class="brick-card-inner">';
                html += renderBrickIcon(brick.brickId, brick.brickName);
                html += '<div style="color: blue; margin-bottom: 4px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 90%">' + brick.brickName + '</div>';
                html += '<div style="color: grey; margin-bottom: 10px; margin-top: 0px; text-align: center; font-size: 70%">' + brick.whyNeeded + '</div>';
                html += renderBrickChannelMarkers(brick.deploymentChannels);
                html += '</div>';
                html += '</a>';

        html += '</div>';
        html += '</td>';
        html += '</tr>';
        html += '</table>';

        html += '</div>';

        document.getElementById('Home').innerHTML = html;
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function channelColor(ref) {
        const palette = ['#1d4ed8', '#b45309', '#047857', '#7c3aed', '#be123c', '#0f766e', '#c2410c', '#4338ca', '#15803d', '#a21caf'];
        const value = ref || 'channel';
        let hash = 0;
        for (let i = 0; i < value.length; i++) {
            hash = ((hash << 5) - hash) + value.charCodeAt(i);
            hash |= 0;
        }
        return palette[Math.abs(hash) % palette.length];
    }

    function deploymentIconFile(channel) {
        const text = [
            channel && channel.ref,
            channel && channel.groupId,
            channel && channel.name
        ].join(' ').toLowerCase();

        if (text.includes('ios')) {
            return 'app_store_ios.png';
        }
        if (text.includes('android') || text.includes('play store') || text.includes('play-store')) {
            return 'app_store_android.png';
        }
        if (text.includes('private cloud') || text.includes('private-cloud')) {
            return 'private_cloud.png';
        }
        if (text.includes('cloud') || text.includes('runtime') || text.includes('edge') || text.includes('cdn')) {
            return 'public_cloud.png';
        }
        if (text.includes('saas') || text.includes('analytics') || text.includes('crm') || text.includes('datadog') || text.includes('snowflake') || text.includes('databricks') || text.includes('salesforce')) {
            return 'saas.png';
        }
        return 'deployment.png';
    }

    function renderDeploymentIcon(channel) {
        const fileName = deploymentIconFile(channel);
        const label = escapeHtml((channel && channel.name) || 'Deployment channel');
        return '<img class="channel-pill-icon" src="../icons/deployment/' + fileName + '" alt="' + label + '" title="' + label + '" onerror="this.onerror=null;this.src=\'../icons/deployment/deployment.png\'">';
    }

    function prettifyChannelGroup(groupId) {
        return (groupId || 'other')
            .split('-')
            .map(part => part.charAt(0).toUpperCase() + part.slice(1))
            .join(' ');
    }

    function getDeploymentChannelGroups() {
        const grouped = {};
        (product.neededBricks || []).forEach(brick => {
            (brick.deploymentChannels || []).forEach(channel => {
                const ref = channel.deploymentChannelRef || '';
                const groupId = ref.includes('/') ? ref.split('/')[0] : 'other';
                if (!grouped[groupId]) {
                    grouped[groupId] = {
                        id: groupId,
                        name: prettifyChannelGroup(groupId),
                        channels: {}
                    };
                }
                if (!grouped[groupId].channels[ref]) {
                    grouped[groupId].channels[ref] = {
                        ref: ref,
                        groupId: groupId,
                        name: channel.channelName || channel.channelId || ref,
                        bricks: {}
                    };
                }
                grouped[groupId].channels[ref].bricks[brick.brickId] = {
                    brickId: brick.brickId,
                    brickName: brick.brickName
                };
            });
        });
        return Object.values(grouped).map(group => ({
            id: group.id,
            name: group.name,
            channels: Object.values(group.channels).map(channel => ({
                ref: channel.ref,
                groupId: channel.groupId,
                name: channel.name,
                bricks: Object.values(channel.bricks).sort((a, b) => (a.brickName || a.brickId).localeCompare(b.brickName || b.brickId))
            })).sort((a, b) => a.name.localeCompare(b.name))
        })).sort((a, b) => a.name.localeCompare(b.name));
    }

    function renderSmallBrickIcon(brickId, brickName) {
        const safeId = escapeHtml(brickId || '');
        const safeName = escapeHtml(brickName || brickId || 'Product brick');
        const fallback = "if(!this.dataset.fallbackStage){this.dataset.fallbackStage='jpeg';this.src='../../product-bricks/icons/" + safeId + ".jpeg';}else if(this.dataset.fallbackStage==='jpeg'){this.dataset.fallbackStage='jpg';this.src='../../product-bricks/icons/" + safeId + ".jpg';}else{this.onerror=null;this.src='../../product-bricks/icons/logo.png';}";
        return '<img class="channel-brick-icon" src="../../product-bricks/icons/' + safeId + '.png" alt="' + safeName + '" title="' + safeName + '" onerror="' + fallback + '">';
    }

    function renderChannelBrickIcons(bricks) {
        if (!bricks || !bricks.length) {
            return '';
        }
        let html = '<span class="channel-brick-row">';
        bricks.forEach(brick => {
            html += renderSmallBrickIcon(brick.brickId, brick.brickName);
        });
        html += '</span>';
        return html;
    }

    function renderBrickChannelMarkers(deploymentChannels) {
        if (!deploymentChannels || !deploymentChannels.length) {
            return '<div class="activity-muted" style="text-align:center;">No deployment channels defined</div>';
        }
        let html = '<div class="brick-channel-row">';
        deploymentChannels.forEach(channel => {
            const color = channelColor(channel.deploymentChannelRef || channel.channelId || channel.channelName || '');
            html += '<img class="brick-channel-icon" src="../icons/deployment/' + deploymentIconFile({
                ref: channel.deploymentChannelRef || channel.channelId || '',
                name: channel.channelName || channel.channelId || ''
            }) + '" alt="' + escapeHtml(channel.channelName || channel.channelId || 'Deployment channel') + '" title="' + escapeHtml(channel.channelName || channel.channelId || 'Deployment channel') + '" onerror="this.onerror=null;this.src=\'../icons/deployment/deployment.png\'">';
        });
        html += '</div>';
        return html;
    }

    function getBrickLandingPageHref(brickId) {
        return '../../product-bricks/landing_pages/' + encodeURIComponent(brickId || '') + '.html';
    }

    function renderBrickIcon(brickId, brickName) {
        const safeId = escapeHtml(brickId || '');
        const safeName = escapeHtml(brickName || brickId || 'Product brick');
        const fallback = "if(!this.dataset.fallbackStage){this.dataset.fallbackStage='jpeg';this.src='../../product-bricks/icons/" + safeId + ".jpeg';}else if(this.dataset.fallbackStage==='jpeg'){this.dataset.fallbackStage='jpg';this.src='../../product-bricks/icons/" + safeId + ".jpg';}else{this.onerror=null;this.src='../../product-bricks/icons/logo.png';}";
        return '<img class="brick-card-icon" src="../../product-bricks/icons/' + safeId + '.png" alt="' + safeName + '" onerror="' + fallback + '">';
    }

    function hexToRgba(hex, alpha) {
        const value = (hex || '#6b7280').replace('#', '');
        const normalized = value.length === 3
            ? value.split('').map(part => part + part).join('')
            : value;
        const intValue = parseInt(normalized, 16);
        const r = (intValue >> 16) & 255;
        const g = (intValue >> 8) & 255;
        const b = intValue & 255;
        return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function renderKpis(items) {
        let html = '';
        items.forEach(item => {
            html += '<div><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span class="activity-muted">(' + escapeHtml(item.unit) + ')</span>';
            }
            if (item.expectedImpact) {
                html += ': ' + escapeHtml(item.expectedImpact);
            }
            if (item.description) {
                html += '<div class="activity-muted">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function renderImpactCell(item) {
        let html = '';
        (item.customerImpact || []).forEach(impact => {
            html += '<div class="activity-block">';
            html += '<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">';
            html += '<img class="activity-icon activity-icon-round" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div><div style="font-weight:bold;">' + escapeHtml(impact.customer.name) + ' <span class="activity-muted">(' + escapeHtml(impact.customerId) + ')</span></div></div>';
            html += '</div>';
            html += renderKpis(impact.customerKPIs || []);
            html += renderKpis(impact.businessKPIs || []);
            html += '</div>';
        });
        return html || '<span class="activity-muted">No customer impact listed</span>';
    }

    function renderBrickCell(item) {
        let html = '';
        (item.productBricks || []).forEach(brick => {
            html += '<div class="activity-pill">';
            html += '<img class="activity-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'">';
            html += '<div><div><b>' + escapeHtml(brick.brick.name) + '</b> <span class="activity-muted">(#' + escapeHtml(brick.brickId) + ')</span></div><div class="activity-muted">' + escapeHtml(brick.change) + '</div></div>';
            html += '</div>';
        });
        return html || '<span class="activity-muted">No product bricks listed</span>';
    }

    function renderChannelCell(item, currentProductId) {
        let html = '';
        (item.deliveryChannels || []).forEach(channel => {
            const isCurrent = channel.channel && channel.channel.productId === currentProductId;
            html += '<div class="activity-pill' + (isCurrent ? ' activity-pill-highlight' : '') + '">';
            html += '<img class="activity-icon" src="../icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../icons/product.png\'">';
            html += '<div><div><b style="color:' + (isCurrent ? '#1d4ed8' : '#111827') + '">' + escapeHtml(channel.channel.name) + '</b> <span class="activity-muted">(' + escapeHtml(channel.channelId) + ')</span></div><div class="activity-muted">' + escapeHtml(channel.change) + '</div></div>';
            html += '</div>';
        });
        return html || '<span class="activity-muted">No delivery channels listed</span>';
    }

    function renderActivityTable(data, kind, currentProductId) {
        const items = (data && data.items) ? data.items : [];
        let html = '';
        html += '<div class="activity-summary">';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.length + '</div><div class="activity-stat-label">' + kind + '</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.deliveryChannels || []).length > 0).length + '</div><div class="activity-stat-label">With channels</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.productBricks || []).length > 0).length + '</div><div class="activity-stat-label">With bricks</div></div>';
        html += '</div>';

        if (!items.length) {
            html += '<div class="group" style="margin-top:0">No related ' + kind.toLowerCase() + ' found for this product.</div>';
            return html;
        }

        html += '<table class="activity-table">';
        html += '<tr><th>Date</th><th>Description</th><th>Customer Impact</th><th>Product Bricks</th><th>Delivery Channels</th></tr>';
        items.forEach(item => {
            html += '<tr>';
            html += '<td style="white-space:nowrap">' + escapeHtml(formatDate(item.date)) + '</td>';
            html += '<td><a class="activity-link" target="_blank" rel="noopener noreferrer" href="../../' + kind.toLowerCase() + '/landing_pages/' + item.landingPageIndex + '.html">' + escapeHtml(item.description || kind) + '</a></td>';
            html += '<td>' + renderImpactCell(item) + '</td>';
            html += '<td>' + renderBrickCell(item) + '</td>';
            html += '<td>' + renderChannelCell(item, currentProductId) + '</td>';
            html += '</tr>';
        });
        html += '</table>';
        return html;
    }

    addHeader();
    addHome();
    document.getElementById('Initiatives').innerHTML = renderActivityTable(initiatives, 'Initiatives', product.id);
    document.getElementById('Releases').innerHTML = renderActivityTable(releases, 'Releases', product.id);

</script>

</body>
</html>
