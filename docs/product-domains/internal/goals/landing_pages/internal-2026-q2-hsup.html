<!DOCTYPE html>

    <style>

            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }

        .key-result {
            margin-bottom: 10px;
            padding-left: 12px;
            border-left: 3px solid #d7dce1;
        }

        .key-result-title {
            font-weight: bold;
        }

        .entity-link:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 50px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Goals">
        </td>
        <td>
            <div class="eyebrow">Goal</div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const goal = {"id": "internal-2026-q2-hsup", "title": "2026-Q2 Head of Customer Support / Customer Operations outcome goal", "objective": "Prepare to improve Time to Resolution for Head of Customer Support / Customer Operations by advancing stabilize service operations with unified intake, triage, and case handling. through reliable case execution.", "okrStyle": "objective-and-key-results", "status": "planned", "period": {"quarter": "2026-Q2", "startDate": "2026-04-01", "endDate": "2026-06-30", "type": "next"}, "linkedCustomers": [{"customerId": "hsup", "customerName": "Head of Customer Support / Customer Operations", "customerGroup": "Service & Operations Stakeholders"}], "linkedCustomerKPIs": [{"customerId": "hsup", "customerName": "Head of Customer Support / Customer Operations", "kpiId": "crps", "kpiName": "Customer Retention Protected by Service", "description": "Revenue retained by resolving service issues effectively and preventing avoidable churn.", "unit": "USD retained/year", "kind": "customer", "targetDirection": "increase"}, {"customerId": "hsup", "customerName": "Head of Customer Support / Customer Operations", "kpiId": "rsql", "kpiName": "Resolution Quality", "description": "", "unit": "", "kind": "customer", "targetDirection": "increase"}], "linkedBusinessKPIs": [{"customerId": "hsup", "customerName": "Head of Customer Support / Customer Operations", "kpiId": "apvs", "kpiName": "Annual Platform Value Realized", "description": "Economic value created through lower service costs, retained revenue, and tooling consolidation.", "unit": "USD/year", "kind": "business", "targetDirection": "increase"}], "keyResults": [{"id": "kr-1", "metric": "Customer Retention Protected by Service", "kind": "customer", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Increase Customer Retention Protected by Service during the quarter."}, {"id": "kr-2", "metric": "Resol mmercial Intelligence Hub Web Workspace, Commercial Intelligence Hub Dashboard.", "customerIds": ["hsup"], "deliveryChannels": ["P3-commercial-intelligence-hub-web-workspace", "P3-dashboard", "P3-api"], "productBricks": ["otbi", "shpa", "wote", "acfs"], "landingPageIndex": 1}], "linkedReleases": [{"id": "releases-2026-01-18-23", "date": "2026-01-18", "description": "Release of Commercial Intelligence Hub improvements covering order-to-booking integration, structured handoff package across Commercial Intelligence Hub Web Workspace, Commercial Intelligence Hub Dashboard.", "customerIds": ["hsup"], "deliveryChannels": ["P3-commercial-intelligence-hub-web-workspace", "P3-dashboard", "P3-api"], "productBricks": ["otbi", "shpa", "wote", "acfs"], "landingPageIndex": 6}, {"id": "releases-2026-02-18-26", "date": "2026-02-18", "description": "Release of Commercial Intelligence Hub improvements covering order-to-booking integration, structured handoff package across Commercial Intelligence Hub Web Workspace, Commercial Intelligence Hub Dashboard.", "customerIds": ["hsup"], "deliveryChannels": ["P3-commercial-intelligence-hub-web-workspace", "P3-dashboard", "P3-api"], "productBricks": ["otbi", "shpa", "wote", "acfs"], "landingPageIndex": 3}, {"id": "releases-2026-03-13-29", "date": "2026-03-13", "description": "Release of Commercial Intelligence Hub improvements covering order-to-booking integration, structured handoff package across Commercial Intelligence Hub Web Workspace, Commercial Intelligence Hub Dashboard.", "customerIds": ["hsup"], "deliveryChannels": ["P3-commercial-intelligence-hub-web-workspace", "P3-dashboard", "P3-api"], "productBricks": ["otbi", "shpa", "wote", "acfs"], "landingPageIndex": 1}], "sourceReferences": {"customers": "customers/customers.json", "initiatives": "delivery/initiatives.json", "releases": "delivery/releases.json"}};
    const domainName = 'Internal';

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) {
            return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        }
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(metric.kpiName) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind) + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + ' | ' + escapeHtml(metric.targetDirection) + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderExecutionItem(item, typeName) {
        const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
            ? (typeName === 'initiative'
                ? '../../initiatives/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '../../releases/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html')
            : '';
        let html = '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(target, item.description || item.id, 'list-title') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(item.date || '') + '</div>';
        if (item.customerIds && item.customerIds.length) {
            html += '<div class="list-description">Customers: ' + escapeHtml(item.customerIds.join(', ')) + '</div>';
        }
        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="list-description">Channels: ' + escapeHtml(item.deliveryChannels.join(', ')) + '</div>';
        }
        if (item.productBricks && item.productBricks.length) {
            html += '<div class="list-description">Bricks: ' + escapeHtml(item.productBricks.join(', ')) + '</div>';
        }
        html += '</div>';
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(goal.title || 'Goal');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(goal.period.quarter) + ' | ' + escapeHtml(goal.status || '');

    let html = '';
    html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(goal.objective || '') + '</div></div>';

    if (goal.linkedCustomers && goal.linkedCustomers.length) {
        html += '<div class="section"><div class="section-title">Linked Customers</div>';
        goal.linkedCustomers.forEach(customer => {
            html += '<div class="pill"><div><div class="pill-name">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (goal.keyResults && goal.keyResults.length) {
        html += '<div class="section"><div class="section-title">Key Results</div>';
        goal.keyResults.forEach(item => {
            html += '<div class="key-result"><div class="key-result-title">' + escapeHtml(item.metric) + '</div><div>' + escapeHtml(item.statement) + '</div><div class="metric-meta">' + escapeHtml(item.targetDirection) + ' | ' + escapeHtml(item.target) + '</div></div>';
        });
        html += '</div>';
    }

    if ((goal.linkedCustomerKPIs && goal.linkedCustomerKPIs.length) || (goal.linkedBusinessKPIs && goal.linkedBusinessKPIs.length)) {
        html += '<div class="section"><div class="section-title">Linked KPIs</div>';
        (goal.linkedCustomerKPIs || []).forEach(metric => {
            html += renderMetric(metric);
        });
        (goal.linkedBusinessKPIs || []).forEach(metric => {
            html += renderMetric(metric);
        });
        html += '</div>';
    }

    html += '<div class="section"><div class="section-title">Execution Links</div>';
    if (goal.linkedInitiatives && goal.linkedInitiatives.length) {
        goal.linkedInitiatives.forEach(item => {
            html += renderExecutionItem(item, 'initiative');
        });
    } else {
        html += '<div class="list-row"><div class="list-description">No initiatives linked to this goal.</div></div>';
    }
    html += '</div>';

    html += '<div class="section"><div class="section-title">Release Links</div>';
    if (goal.linkedReleases && goal.linkedReleases.length) {
        goal.linkedReleases.forEach(item => {
            html += renderExecutionItem(item, 'release');
        });
    } else {
        html += '<div class="list-row"><div class="list-description">No releases linked to this goal.</div></div>';
    }
    html += '</div>';

    if (goal.sourceReferences) {
        html += '<div class="section"><div class="section-title">Source References</div>';
        Object.keys(goal.sourceReferences).forEach(key => {
            if (goal.sourceReferences[key]) {
                html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(key) + '</div><div class="pill-meta">' + escapeHtml(goal.sourceReferences[key]) + '</div></div></div>';
            }
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
