            padding: 4px 8px;

        }

            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;

            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;

        }

        .pill-meta {

            line-height: 1.35;

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
        }

            display: inline-block;
            margin-top: 12px;
            color: #315b7c;
            font-size: 14px;

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderSummary() {
        const stats = [
            {value: (currentGoals.goals || []).length, label: 'Current goals'},
            {value: (nextGoals.goals || []).length, label: 'Next goals'},
            {value: (archiveGoals.goals || []).length, label: 'Archived goals'},
            {value: ((archiveGoals.quartersCovered || []).length || 0), label: 'Archived quarters'}
        ];
        let html = '';
        stats.forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function renderMetric(metric) {
        return '<div class="metric">' +
            '<div class="metric-name">' + escapeHtml(metric.kpiName) + '</div>' +
            '<div class="metric-meta">' + escapeHtml(metric.kind) + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + ' | ' + escapeHtml(metric.targetDirection) + '</div>' +
            '</div>';
    }

    function renderCustomer(customer) {
        return '<div class="pill"><div><div class="pill-name">' + escapeHtml(customer.customerName) + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId || '') + '</div></div></div>';
    }

    function renderGoalCard(goal) {
        let html = '<a target="_blank" rel="noopener noreferrer" href="landing_pages/' + encodeURIComponent(goal.id) + '.html">';
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-badge">' + escapeHtml(goal.status || 'goal') + '</span><span class="card-period">' + escapeHtml(goal.period.quarter) + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(goal.title) + '</div>';
        html += '<div class="card-objective">' + escapeHtml(goal.objective) + '</div>';

        html += '<div class="section"><div class="section-title">Customers</div>';
        (goal.linkedCustomers || []).forEach(customer => {
            html += renderCustomer(customer);
        });
        html += '</div>';

        html += '<div class="section"><div class="section-title">Linked KPIs</div>';
        (goal.linkedCustomerKPIs || []).slice(0, 2).forEach(metric => {
            html += renderMetric(metric);
        });
        (goal.linkedBusinessKPIs || []).slice(0, 1).forEach(metric => {
            html += renderMetric(metric);
        });
        html += '</div>';

        html += '<div class="section"><div class="section-title">Execution Links</div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((goal.linkedInitiatives || []).length)) + ' initiatives</div><div class="pill-meta">Connected delivery change</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((goal.linkedReleases || []).length)) + ' releases</div><div class="pill-meta">Connected shipped change</div></div></div>';
        html += '</div>';

        html += '<div class="open-link">Open goal details</div>';
        html += '</div></a>';
        return html;
    }

    function renderTab(divId, payload, emptyText) {
        const goals = (payload && payload.goals) ? payload.goals : [];
        if (!goals.length) {
            document.getElementById(divId).innerHTML = '<div class="empty">' + escapeHtml(emptyText) + '</div>';
            return;
        }
        let html = '<div class="grid">';
        goals.forEach(goal => {
            html += renderGoalCard(goal);
        });
        html += '</div>';
        document.getElementById(divId).innerHTML = html;
    }

    renderSummary();
    renderTab('Current', currentGoals, 'No current-quarter goals are defined.');
    renderTab('Next', nextGoals, 'No next-quarter preparation goals are defined.');
    renderTab('Archive', archiveGoals, 'No archived goals are defined.');
</script>
