<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Internal)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"date": "2025-11-24", "description": "Seller Workflow Workspace initiative focused on improving stage-gated workflow orchestration, cross-functional approval workspace, strengthening customer value for Chief Marketing Officer / VP Marketing, and evolving delivery across Seller Workflow Workspace Web Workspace, Seller Workflow Workspace Mobile App.", "customerImpact": [{"customerId": "cmmo", "customer": {"id": "cmmo", "name": "Chief Marketing Officer / VP Marketing", "group": "Revenue & Growth Stakeholders", "icon": "campaign.png"}, "customerKPIs": [{"kpi": "Payback Duration", "expectedImpact": "Increase payback duration through stronger stage-gated workflow orchestration support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Marketing-Sourced Pipeline", "expectedImpact": "Increase marketing-sourced pipeline through stronger cross-functional approval workspace support and cleaner workflow execution.", "description": "Total qualified pipeline value directly attributable to marketing activities.", "unit": "USD/quarter", "kind": "customer"}], "businessKPIs": [{"kpi": "Experiment Velocity", "expectedImpact": "Increase experiment velocity through stronger stage-gated workflow orchestration support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Annual Platform Value Realized", "expectedImpact": "Increase annual platform value realized through stronger cross-functional approval workspace support and cleaner workflow execution.", "description": "Economic value created through improved pipeline generation, attribution clarity, and marketing efficiency.", "unit": "USD/year", "kind": "business"}]}], "productBricks": [{"brickId": "sgwo", "change": "Extended Stage-gated workflow orchestration with domain-specific workflow improvements.", "brick": {"id": "sgwo", "name": "Stage-gated workflow orchestration", "domain": "Revenue & Growth Stakeholders", "group": "run-predictable-pipeline-to-revenue-execution", "icon": "sgwo.png"}}, {"brickId": "cfaw", "change": "Extended Cross-functional approval workspace with domain-specific workflow improvements.", "brick": {"id": "cfaw", "name": "Cross-functional approval workspace", "domain": "Revenue & Growth Stakeholders", "group": "run-predictable-pipeline-to-revenue-execution", "icon": "cfaw.png"}}, {"brickId": "fasp", "change": "Extended Forecasting and scenario planning with domain-specific workflow improvements.", "brick": {"id": "fasp", "name": "Forecasting and scenario planning", "domain": "Revenue & Growth Stakeholders", "group": "run-predictable-pipeline-to-revenue-execution", "icon": "fasp.png"}}, {"brickId": "prin", "change": "Extended Pipeline risk intelligence with domain-specific workflow improvements.", "brick": {"id": "prin", "name": "Pipeline risk intelligence", "domain": "Revenue & Growth Stakeholders", "group": "run-predictable-pipeline-to-revenue-execution", "icon": "prin.png"}}], "deliveryChannels": [{"channelId": "P2-seller-workflow-workspace-web-workspace", "change": "Introduced workflow updates in Seller Workflow Workspace Web Workspace.", "channel": {"productId": "P2", "productName": "Seller Workflow Workspace", "name": "Seller Workflow Workspace Web Workspace", "type": "web", "icon": "web.png"}}, {"channelId": "P2-mobile", "change": "Introduced workflow updates in Seller Workflow Workspace Mobile App.", "channel": {"productId": "P2", "productName": "", "name": "P2-mobile", "type": "product", "icon": "product.png"}}, {"channelId": "P2-dashboard", "change": "Introduced workflow updates in Seller Workflow Workspace Dashboard.", "channel": {"productId": "P2", "productName": "Seller Workflow Workspace", "name": "Seller Workflow Workspace Dashboard", "type": "dashboard", "icon": "dashboard.png"}}]};
    const domainName = 'Internal';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
