<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Internal)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">

</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Commercial Intelligence Hub Initiative", "date": "2025-12-06", "description": "Commercial Intelligence Hub initiative focused on improving order-to-booking integration, structured handoff package, strengthening customer value for Head of Customer Support / Customer Operations, and evolving delivery across Commercial Intelligence Hub Web Workspace, Commercial Intelligence Hub Dashboard.", "customerImpact": [{"customerId": "hsup", "customer": {"id": "hsup", "name": "Head of Customer Support / Customer Operations", "group": "Service & Operations Stakeholders", "icon": "support_agent.png"}, "customerKPIs": [{"kpi": "Speed", "expectedImpact": "Increase speed through stronger order-to-booking integration support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Time to First Response", "expectedImpact": "Increase time to first response through stronger structured handoff package support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Annual Platform Value Realized", "expectedImpact": "Increase annual platform value realized through stronger order-to-booking integration support and cleaner workflow execution.", "description": "Economic value created through lower service costs, retained revenue, and tooling consolidation.", "unit": "USD/year", "kind": "business"}, {"kpi": "Usage", "expectedImpact": "Increase usage through stronger structured handoff package support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "otbi", "change": "Extended Order-to-booking integration with domain-specific workflow improvements.", "brick": {"id": "otbi", "name": "Order-to-booking integration", "type": "integration", "description": "Pushes approved commercial terms into billing, ERP, and implementation systems.", "domain": "Revenue & Growth Stakeholders", "group": "run-predictable s capabilities required by Workflow telemetry."}], "externalSystemsThisBrickDependsOn": [{"system": "Data Warehouse and BI Platforms", "type": "analytics-platform", "interface": "Query / Export Interface", "description": "Workflow telemetry publishes metrics and operational signals into external analytical environments."}, {"system": "Alerting and Incident Platforms", "type": "operations", "interface": "Webhook / Event Interface", "description": "Workflow telemetry depends on external alerting systems to escalate anomalies and operational issues."}], "externalSystemsDependingOnThisBrick": [{"system": "Operational Teams and Workspaces", "type": "insight-consumer", "interface": "Dashboard / Alert Interface", "description": "Operational teams depend on Workflow telemetry to monitor health, detect issues, and make decisions."}, {"system": "Reporting and Planning Systems", "type": "analytics-consumer", "interface": "Metrics / Export Interface", "description": "Analytical and planning consumers depend on Workflow telemetry for metrics, forecasts, and decision support outputs."}], "icon": "wote.png"}}, {"brickId": "acfs", "change": "Extended AI copilot for sales execution with domain-specific workflow improvements.", "brick": {"id": "acfs", "name": "AI copilot for sales execution", "type": "full-stack", "description": "Produces summaries, next-step suggestions, and first-draft content inside the workflow.", "domain": "Revenue & Growth Stakeholders", "group": "increase-sales-productivity-without-linear-headcount-growth", "internalModules": [{"title": "Experience Shell and Navigation", "description": "Provides the primary user flow, navigation, and page composition for AI copilot for sales execution.", "type": "full-stack"}, {"title": "Session and Personalization State", "description": "Manages user context, preferences, and personalized behavior within AI copilot for sales execution.", "type": "service"}, {"title": "Content and Interaction Orchestration", "description": "Coordinates the content blocks, tasks, and interaction logic shown by AI copilot for sales execution.", "type": "content"}], "interfaces": [{"title": "User Experience Interface", "description": "Primary user-facing interface delivered by AI copilot for sales execution.", "type": "ui"}, {"title": "Experience Backend API", "description": "API surface used to assemble state and content for AI copilot for sales execution.", "type": "api"}, {"title": "Interaction Event Stream", "description": "Event interface capturing user actions and journey signals from AI copilot for sales execution.", "type": "event"}], "brickDependencies": [{"targetBrickId": "iaam", "type": "identity", "interface": "Authentication API", "description": "Depends on Identity and account matching to provide identity capabilities required by AI copilot for sales execution."}, {"targetBrickId": "pren", "type": "event-subscription", "interface": "Catalog Update Feed", "description": "Depends on Playbook recommendation engine to provide discovery capabilities required by AI copilot for sales execution."}, {"targetBrickId": "sgwo", "type": "operator-control", "interface": "Operator Console", "description": "Depends on Stage-gated workflow orchestration to provide operations capabilities required by AI copilot for sales execution."}], "externalSystemsThisBrickDependsOn": [{"system": "Web and Mobile Clients", "type": "channel", "interface": "UI", "description": "User-facing clients consume AI copilot for sales execution through browser or app experiences."}, {"system": "Notification Delivery Platforms", "type": "communication", "interface": "Email / Push APIs", "description": "AI copilot for sales execution depends on outbound communication systems to notify users and continue journeys."}], "externalSystemsDependingOnThisBrick": [{"system": "Web and Mobile Clients", "type": "channel-consumer", "interface": "UI", "description": "Web and mobile clients rely on AI copilot for sales execution as the user-facing surface for discovery, interaction, or task completion."}, {"system": "Marketing and Acquisition Platforms", "type": "traffic-source", "interface": "Deep Link / Landing Page Interface", "description": "Acquisition and campaign systems drive traffic into AI copilot for sales execution to convert or retain users."}], "icon": "acfs.png"}}], "deliveryChannels": [{"channelId": "P3-commercial-intelligence-hub-web-workspace", "change": "Introduced workflow updates in Commercial Intelligence Hub Web Workspace.", "channel": {"productId": "P3", "productName": "Commercial Intelligence Hub", "name": "Commercial Intelligence Hub Web Workspace", "type": "web", "icon": "web.png"}}, {"channelId": "P3-dashboard", "change": "Introduced workflow updates in Commercial Intelligence Hub Dashboard.", "channel": {"productId": "P3", "productName": "Commercial Intelligence Hub", "name": "Commercial Intelligence Hub Dashboard", "type": "dashboard", "icon": "dashboard.png"}}, {"channelId": "P3-api", "change": "Introduced workflow updates in Commercial Intelligence Hub API.", "channel": {"productId": "P3", "productName": "Commercial Intelligence Hub", "name": "Commercial Intelligence Hub API", "type": "api", "icon": "api.png"}}], "teams": {"primaryTeamIds": ["revenue-operations-platform-based-routing", "revenue-operations-platform-integration-adapters-migration", "revenue-operations-platform-propensity-deal-scoring"], "supportingTeamIds": ["enterprise-data-office-enterprise-metric-layer"]}, "initiativeId": "initiative-internal-2025-12-06-20", "priority": "p1", "keyResultIds": ["internal-2026-q1-hsup/kr-1", "internal-2026-q1-hsup/kr-2", "internal-2026-q1-hsup/kr-3", "internal-2026-q2-hsup/kr-1", "internal-2026-q2-hsup/kr-2", "internal-2026-q2-hsup/kr-3"], "landingPageIndex": 9, "discoveryLinks": []};
    const domainName = 'Internal';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
