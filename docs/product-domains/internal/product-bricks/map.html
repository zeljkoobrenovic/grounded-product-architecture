        .brick-icon {

        }

        .brick-name {

        .legend {

            margin-bottom: 20px;
            font-size: 80%;
            display: inline-block;
        }

        .legend-title {
            margin-bottom: 3px;
        }

        .legend-item {
            padding: 8px;
        }

<script>
    function normalizeBricks(items) {
        const maxRows = 1000;

        return items.map(item => {
            const rowNumber = Number(item.row) || 1;

            return {
                ...item,
                row: Math.min(rowNumber, maxRows),
                domain: item.domain || 'Other',
                group: item.group || 'Ungrouped',
                color: colorOf(item.type),
                isHighlighted: Boolean(item.name && item.name.includes('*'))
            };
        });
    }

    function groupBricks(items) {
        const rows = new Map();

        items.forEach(item => {
            if (!rows.has(item.row)) {
                rows.set(item.row, new Map());
            }

            const domains = rows.get(item.row);
            if (!domains.has(item.domain)) {
                domains.set(item.domain, new Map());
            }

            const groups = domains.get(item.domain);
            if (!groups.has(item.group)) {
                groups.set(item.group, []);
            }

            groups.get(item.group).push(item);
        });

        return Array.from(rows.entries())
            .sort((left, right) => left[0] - right[0])
            .map(([, domains]) => Array.from(domains.entries()).map(([domain, groups]) => ({
                domain,
                groups: Array.from(groups.entries()).map(([group, itemsInGroup]) => ({
                    name: group,
                    items: itemsInGroup
                }))
            })));
    }

    function renderBrick(item) {
        const brickCard = `
            <div class="brick-card${item.isHighlighted ? ' highlighted' : ''}" style="background-color: ${item.color}">
                <img class="brick-icon" src="icons/${item.id}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                <div class="brick-name">${item.name || ''}</div>
            </div>
        `;

        if (!item.id) {
            return brickCard;
        }

        return `<a target="_blank" href="landing_pages/${item.id}.html">${brickCard}</a>`;
    }

    function renderGroup(group) {
        return `
            <div class="group">
                <div class="group-title">${group.name}</div>
                <div class="group-items">${group.items.map(renderBrick).join('')}</div>
            </div>
        `;
    }

    function renderDomain(domain) {
        return `
            <section class="domain-column">
                <div class="domain-title">${domain.domain}</div>
                <div class="domain-groups">${domain.groups.map(renderGroup).join('')}</div>
            </section>
        `;
    }

    function renderMap(items) {
        return `
            <div class="map">
                ${groupBricks(normalizeBricks(items)).map(row => `
                    <div class="map-row">
                        ${row.map(renderDomain).join('')}
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderLegend() {
        return `
            <div class="legend-title">Legend:</div>
            ${config.types.map(type => `
                <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
            `).join('')}
        `;
    }

    function update() {
        document.getElementById('Current').innerHTML = renderMap(bricks);
        document.getElementById('Legend').innerHTML = renderLegend();
    }

</script>
<div class="legend" id="Legend">
</div>

<script>
    update();
</script>
