<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KTLO Initiative (Internal)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f1ff;
            color: #1d4ed8;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .metric {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 12px;
        }

        .metric-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
        }

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metric-description {
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px" alt="KTLO Initiative">
</td>
<td>
<div class="eyebrow">KTLO Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</tr>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Internal Stack Patch Compliance Cycle", "date": "2026-04-21", "description": "A KTLO initiative to keep the Internal stack within security patch SLAs by upgrading vulnerable dependencies, rotating outdated components, and closing remediation gaps.", "initiativeId": "initiative-internal-ktlo-security-patches", "priority": "p0", "category": "security-patches", "keyResultId": "internal-ktlo-core/kr-security-patches", "productBricks": [], "deliveryChannels": [], "teams": {"primaryTeamIds": [], "supportingTeamIds": []}, "landingPageId": "initiative-initiative-internal-ktlo-security-patches", "linkedObjective": {"id": "internal-ktlo-core", "title": "Internal KTLO baseline", "objective": "Protect service continuity and delivery capacity in Internal by managing critical bugs, paying down technical debt, and applying security maintenance work on time.", "status": "active", "href": "internal-ktlo-core.html"}, "linkedKeyResult": {"id": "kr-security-patches", "metric": "Security patches", "category": "security-patches", "kind": "operational", "targetDirection": "decrease", "target": "Keep critical and high-severity vulnerabilities within patch SLAs across production systems and dependencies.", "baseline": "Measured from the current vulnerability backlog and patch compliance posture.", "statement": "Keep security patching current in Internal.", "commitmentType": "high-integrity", "status": "active", "objectiveId": "internal-ktlo-core", "objectiveTitle": "Internal KTLO baseline"}};
    const domainName = 'Internal';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.initiativeId || 'KTLO Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date)) + (initiative.priority ? ' | ' + escapeHtml(initiative.priority) : '');

    let html = '';

    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    html += '<div class="section"><div class="section-title">Overview</div>';
    html += '<div class="pill"><span class="pill-name">Priority</span><span class="pill-meta">' + escapeHtml(initiative.priority || '') + '</span></div>';
    html += '<div class="pill"><span class="pill-name">Category</span><span class="pill-meta">' + escapeHtml(initiative.category || '') + '</span></div>';
    html += '<div class="pill"><span class="pill-name">Initiative ID</span><span class="pill-meta">' + escapeHtml(initiative.initiativeId || '') + '</span></div>';
    html += '</div>';

    if (initiative.linkedObjective) {
        html += '<div class="section"><div class="section-title">KTLO Objective</div>';
        html += '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(initiative.linkedObjective.href, initiative.linkedObjective.title || initiative.linkedObjective.id, '') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(initiative.linkedObjective.status || '') + '</div>';
        if (initiative.linkedObjective.objective) {
            html += '<div class="list-description">' + escapeHtml(initiative.linkedObjective.objective) + '</div>';
        }
        html += '</div></div>';
    }

    if (initiative.linkedKeyResult) {
        html += '<div class="section"><div class="section-title">Key Result</div>';
        html += '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(initiative.linkedKeyResult.metric || initiative.linkedKeyResult.category || initiative.linkedKeyResult.id) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(initiative.linkedKeyResult.category || '') + (initiative.linkedKeyResult.commitmentType ? ' | ' + escapeHtml(initiative.linkedKeyResult.commitmentType) : '') + '</div>';
        if (initiative.linkedKeyResult.statement) {
            html += '<div class="metric-description">' + escapeHtml(initiative.linkedKeyResult.statement) + '</div>';
        }
        if (initiative.linkedKeyResult.target) {
            html += '<div class="metric-meta" style="margin-top:8px"><b>Target:</b> ' + escapeHtml(initiative.linkedKeyResult.target) + '</div>';
        }
        if (initiative.linkedKeyResult.baseline) {
            html += '<div class="metric-meta"><b>Baseline:</b> ' + escapeHtml(initiative.linkedKeyResult.baseline) + '</div>';
        }
        html += '</div></div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml((brick.brick || {}).icon || 'logo.png') + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + escapeHtml(brick.brickId) + '.html', (brick.brick || {}).name || brick.brickId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(brick.change || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml((channel.channel || {}).icon || 'product.png') + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + escapeHtml((channel.channel || {}).name || channel.channelId) + '</div><div class="pill-meta">' + escapeHtml(channel.change || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
