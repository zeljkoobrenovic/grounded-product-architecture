piresObjective": "Provides evidence and product context for the objective's operations tradeoffs.", "landingPageIndex": 2}, {"insightId": "discovery-internal-2025-04-06-01-revenue-operations-control-tow", "insightTitle": "Revenue Operations Control Tower: Chief Revenue Officer / VP Sales validated discovery", "status": "archived", "howItInspiresObjective": "Provides evidence and product context for the objective's operations tradeoffs.", "landingPageIndex": 5}, {"insightId": "discovery-internal-2026-03-13-03-commercial-intelligence-hub", "insightTitle": "Commercial Intelligence Hub: CEO / Founders / Board / Investors discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's leverage tradeoffs.", "landingPageIndex": 0}], "landingPageId": "internal-2025-q4-crov", "companyObjectiveRefs": [{"id": "obj-leverage", "title": "Archive Turn product progress into economic leverage", "landingPageId": "archive-obj-leverage"}, {"id": "obj-operations", "title": "Archive Make execution reliably repeatable", "landingPageId": "archive-obj-operations"}]}]};
    const graphFilters = {};

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function objectiveItems(payload) {
        return payload && (payload.objectives || payload.goals || []) || [];
    }

    function companyObjectiveItems(payload) {
        return payload && (payload.companyObjectives || []) || [];
    }

    function countKeyResults(items) {
        let total = 0;
        items.forEach(item => total += (item.keyResults || []).length);
        return total;
    }

    function updateTabLabels() {
        const currentCount = companyObjectiveItems(currentPayload).length + objectiveItems(currentPayload).length;
        const nextCount = companyObjectiveItems(nextPayload).length + objectiveItems(nextPayload).length;
        const archiveCount = companyObjectiveItems(archivePayload).length + objectiveItems(archivePayload).length;
        document.getElementById('tab_Current').textContent = 'Current (' + currentCount + ')';
        document.getElementById('tab_Next').textContent = 'Next (' + nextCount + ')';
        document.getElementById('tab_Archive').textContent = 'Archive (' + archiveCount + ')';
    }

    function renderMetric(metric) {
        const label = metric.kpiName || metric.metric || '';
        return '<div class="metric">' +
            '<div class="metric-name">' + escapeHtml(label) + '</div>' +
            '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + '</div>' +
            '</div>';
    }

    function renderCustomer(customer) {
        return '<div class="pill"><div><div class="pill-name">' + escapeHtml(customer.customerName) + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId || '') + '</div></div></div>';
    }

    function renderCompanyObjectiveCard(item) {
        const href = 'landing_pages/' + encodeURIComponent(item.landingPageId) + '.html';
        const sourceObjectiveCount = (item.sourceObjectiveRefs || []).length;
        const keyResultsCount = item.keyResultsCount || 0;
        const hicCount = item.highIntegrityCommitmentCount || 0;
        let html = '<a target="_blank" rel="noopener noreferrer" href="' + href + '">';
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-badge">Company Objective</span><span class="card-period">' + escapeHtml(item.status || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title) + '</div>';
        html += '<div class="card-objective">' + escapeHtml(item.statement || '') + '</div>';

        if ((item.inspiredByInsights || []).length) {
            html += '<div class="section"><div class="section-title">Inspired By</div>';
            item.inspiredByInsights.forEach(insight => {
                html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(insight.insightTitle) + '</div><div class="pill-meta">' + escapeHtml(insight.status || '') + '</div></div></div>';
            });
            html += '</div>';
        }

        html += '<div class="section"><div class="section-title">Source Objective Portfolio</div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String(sourceObjectiveCount)) + ' source objectives</div><div class="pill-meta">Outcome hierarchy</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String(keyResultsCount)) + ' key results</div><div class="pill-meta">Measured at source level</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String(hicCount)) + ' commitments</div><div class="pill-meta">High integrity</div></div></div>';
        html += '</div>';

        html += '<div class="open-link">Open company objective</div>';
        html += '</div></a>';
        return html;
    }

    function renderSourceObjectiveCard(item) {
        const href = 'landing_pages/' + encodeURIComponent(item.landingPageId || item.id) + '.html';
        let html = '<div class="card">';
        html += '<div class="card-header"><span class="card-badge">Source Objective</span><span class="card-period">' + escapeHtml((item.period || {}).quarter || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title) + '</div>';
        html += '<div class="card-objective">' + escapeHtml(item.objective) + '</div>';

        if ((item.companyObjectiveRefs || []).length) {
            html += '<div class="section"><div class="section-title">Mapped Company Objectives</div>';
            item.companyObjectiveRefs.forEach(ref => {
                const refHref = 'landing_pages/' + encodeURIComponent(ref.landingPageId || ref.id) + '.html';
                html += '<a class="pill-link" target="_blank" rel="noopener noreferrer" href="' + refHref + '"><div class="pill"><div><div class="pill-name">' + escapeHtml(ref.title) + '</div><div class="pill-meta">' + escapeHtml(ref.id) + '</div></div></div></a>';
            });
            html += '</div>';
        }

        if ((item.linkedCustomers || []).length) {
            html += '<div class="section"><div class="section-title">Customers</div>';
            item.linkedCustomers.forEach(customer => {
                html += renderCustomer(customer);
            });
            html += '</div>';
        }

        html += '<div class="section"><div class="section-title">Execution</div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((item.keyResults || []).length)) + ' key results</div><div class="pill-meta">Outcome contract</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((item.linkedInitiatives || []).length)) + ' initiatives</div><div class="pill-meta">Linked change</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((item.linkedReleases || []).length)) + ' releases</div><div class="pill-meta">Shipped change</div></div></div>';
        html += '</div>';

        html += '<a class="open-link" target="_blank" rel="noopener noreferrer" href="' + href + '">Open source objective</a>';
        html += '</div>';
        return html;
    }

    function renderSubsection(title, description, cardsHtml) {
        let html = '<div class="subsection">';
        html += '<div class="subsection-title">' + escapeHtml(title) + '</div>';
        html += '<div class="subsection-description">' + escapeHtml(description) + '</div>';
        html += cardsHtml;
        html += '</div>';
        return html;
    }

    function renderCardGrid(items, renderer, emptyText) {
        if (!items.length) {
            return '<div class="empty">' + escapeHtml(emptyText) + '</div>';
        }
        let html = '<div class="grid">';
        items.forEach(item => {
            html += renderer(item);
        });
        html += '</div>';
        return html;
    }

    function mermaidSafeId(prefix, raw) {
        return (prefix + '_' + String(raw || 'node')).replace(/[^a-zA-Z0-9_]/g, '_');
    }

    function mermaidLabel(value) {
        return String(value || '')
            .replaceAll('"', '&quot;')
            .replaceAll('\n', ' ')
            .trim();
    }

    function filterStateForTab(tabId) {
        if (!graphFilters[tabId]) {
            graphFilters[tabId] = {
                keyResults: true,
                initiatives: true,
                releases: true,
                discoveries: true
            };
        }
        return graphFilters[tabId];
    }

    function payloadForTab(tabId) {
        if (tabId === 'Current') {
            return currentPayload;
        }
        if (tabId === 'Next') {
            return nextPayload;
        }
        return archivePayload;
    }

    function buildDependencyGraph(payload, filters) {
        const objectives = objectiveItems(payload);
        const companyObjectives = companyObjectiveItems(payload);
        if (!objectives.length && !companyObjectives.length) {
            return '';
        }

        const lines = ['flowchart RL'];
        const nodes = new Set();
        const edges = new Set();

        function addNode(id, label, className) {
            if (nodes.has(id)) {
                return;
            }
            nodes.add(id);
            lines.push(id + '["' + mermaidLabel(label) + '"]:::' + className);
        }

        function addEdge(fromId, toId, label) {
            const connector = label ? ' -->|' + mermaidLabel(label) + '| ' : ' --> ';
            const edge = fromId + connector + toId;
            if (edges.has(edge)) {
                return;
            }
            edges.add(edge);
            lines.push(edge);
        }

        function addDiscoveryNode(insight) {
            const discoveryKey = insight.insightId || insight.id || insight.insightTitle || insight.title;
            if (!discoveryKey) {
                return null;
            }
            const discoveryId = mermaidSafeId('di', discoveryKey);
            const discoveryLabel = insight.insightTitle || insight.title || discoveryKey;
            addNode(discoveryId, 'Discovery: ' + discoveryLabel, 'discovery');
            return discoveryId;
        }

        function addInitiativeNode(initiative) {
            const initiativeKey = initiative.id || initiative.initiativeId || initiative.title || initiative.description;
            if (!initiativeKey) {
                return null;
            }
            const initiativeId = mermaidSafeId('in', initiativeKey);
            const initiativeLabel = initiative.title || initiative.description || initiative.initiativeId || initiativeKey;
            addNode(initiativeId, 'Initiative: ' + initiativeLabel, 'initiative');
            return initiativeId;
        }

        function addReleaseNode(release) {
            const releaseKey = release.id || release.releaseId || release.title || release.description || release.date;
            if (!releaseKey) {
                return null;
            }
            const releaseId = mermaidSafeId('re', releaseKey);
            const releaseLabel = release.title || release.description || release.releaseId || release.date || releaseKey;
            addNode(releaseId, 'Release: ' + releaseLabel, 'release');
            return releaseId;
        }

        function addKeyResultNode(objective, keyResult) {
            const keyResultKey = objective.id + '_' + (keyResult.id || keyResult.metric || keyResult.statement || 'kr');
            const keyResultId = mermaidSafeId('kr', keyResultKey);
            const keyResultLabel = keyResult.metric || keyResult.statement || keyResult.id || keyResultKey;
            addNode(keyResultId, 'Key Result: ' + keyResultLabel, 'keyResult');
            return keyResultId;
        }

        companyObjectives.forEach(companyObjective => {
            const companyId = mermaidSafeId('co', companyObjective.id);
            addNode(companyId, 'Company Objective: ' + (companyObjective.title || companyObjective.id), 'companyObjective');

            if (filters.discoveries) {
                (companyObjective.inspiredByInsights || []).forEach(insight => {
                    const discoveryId = addDiscoveryNode(insight);
                    if (discoveryId) {
                        addEdge(discoveryId, companyId, 'informs');
                    }
                });
            }
        });

        objectives.forEach(objective => {
            const objectiveId = mermaidSafeId('so', objective.id);
            const keyResultIds = [];
            addNode(objectiveId, 'Source Objective: ' + (objective.title || objective.id), 'sourceObjective');

            (objective.companyObjectiveRefs || []).forEach(ref => {
                const companyKey = ref.id || ref.companyObjectiveId;
                if (!companyKey) {
                    return;
                }
                const companyId = mermaidSafeId('co', companyKey);
                addNode(companyId, 'Company Objective: ' + (ref.title || companyKey), 'companyObjective');
                addEdge(objectiveId, companyId, 'supports');
            });

            (objective.companyObjectiveIds || []).forEach(companyObjectiveId => {
                const companyId = mermaidSafeId('co', companyObjectiveId);
                addNode(companyId, 'Company Objective: ' + companyObjectiveId, 'companyObjective');
                addEdge(objectiveId, companyId, 'supports');
            });

            if (filters.discoveries) {
                (objective.inspiredByInsights || []).forEach(insight => {
                    const discoveryId = addDiscoveryNode(insight);
                    if (discoveryId) {
                        addEdge(discoveryId, objectiveId, 'informs');
                    }
                });
            }

            if (filters.keyResults) {
                (objective.keyResults || []).forEach(keyResult => {
                    const keyResultId = addKeyResultNode(objective, keyResult);
                    keyResultIds.push(keyResultId);
                    addEdge(keyResultId, objectiveId, 'measures');
                });
            }

            if (filters.initiatives && keyResultIds.length) {
                (objective.linkedInitiatives || []).forEach(initiative => {
                    const initiativeId = addInitiativeNode(initiative);
                    if (initiativeId) {
                        keyResultIds.forEach(keyResultId => addEdge(initiativeId, keyResultId, 'delivers'));
                    }
                });
            }

            if (filters.releases && keyResultIds.length) {
                (objective.linkedReleases || []).forEach(release => {
                    const releaseId = addReleaseNode(release);
                    if (releaseId) {
                        keyResultIds.forEach(keyResultId => addEdge(releaseId, keyResultId, 'ships'));
                    }
                });
            }
        });

        lines.push('classDef companyObjective fill:#d9ecff,stroke:#315b7c,stroke-width:1.5px,color:#1f2937');
        lines.push('classDef sourceObjective fill:#f3e8ff,stroke:#7c3aed,stroke-width:1.2px,color:#1f2937');
        lines.push('classDef keyResult fill:#eef2ff,stroke:#4c51bf,stroke-width:1.2px,color:#1f2937');
        lines.push('classDef initiative fill:#ffe2e2,stroke:#c53030,stroke-width:1.2px,color:#1f2937');
        lines.push('classDef discovery fill:#e7f7ed,stroke:#2f855a,stroke-width:1.2px,color:#1f2937');
        lines.push('classDef release fill:#fff4da,stroke:#b7791f,stroke-width:1.2px,color:#1f2937');

        return lines.join('\n');
    }

    function toggleGraphFilter(tabId, filterKey, isEnabled) {
        filterStateForTab(tabId)[filterKey] = isEnabled;
        renderGraphSection(tabId);
    }

    function renderGraphSection(tabId) {
        const graphHost = document.getElementById('graph_wrap_' + tabId);
        if (!graphHost) {
            return;
        }
        const graph = buildDependencyGraph(payloadForTab(tabId), filterStateForTab(tabId));
        if (!graph) {
            graphHost.innerHTML = '<div class="empty">No graph relationships match the current filters.</div>';
            return;
        }
        graphHost.innerHTML = '<div class="mermaid">' + graph + '</div>';
        mermaid.run({querySelector: '#graph_wrap_' + tabId + ' .mermaid'});
    }

    function renderDependencyGraph(tabId, payload) {
        if (tabId === 'Archive') {
            return '';
        }
        const filters = filterStateForTab(tabId);
        return renderSubsection(
            'Dependency Graph',
            'Visualizes the hierarchy among company objectives, source objectives, key results, initiatives, discoveries, and releases for this planning period.',
            '<div class="graph-filters">' +
            '<label class="graph-filter"><input type="checkbox" ' + (filters.keyResults ? 'checked ' : '') + 'onchange="toggleGraphFilter(\'' + tabId + '\', \'keyResults\', this.checked)">Key Results</label>' +
            '<label class="graph-filter"><input type="checkbox" ' + (filters.initiatives ? 'checked ' : '') + 'onchange="toggleGraphFilter(\'' + tabId + '\', \'initiatives\', this.checked)">Initiatives</label>' +
            '<label class="graph-filter"><input type="checkbox" ' + (filters.releases ? 'checked ' : '') + 'onchange="toggleGraphFilter(\'' + tabId + '\', \'releases\', this.checked)">Releases</label>' +
            '<label class="graph-filter"><input type="checkbox" ' + (filters.discoveries ? 'checked ' : '') + 'onchange="toggleGraphFilter(\'' + tabId + '\', \'discoveries\', this.checked)">Discoveries</label>' +
            '</div>' +
            '<div class="dependency-graph" id="graph_wrap_' + tabId + '"></div>'
        );
    }

    function renderMermaidForTab(tabId) {
        const tab = document.getElementById(tabId);
        if (!tab || tabId === 'Archive') {
            return;
        }
        renderGraphSection(tabId);
    }

    function renderTab(divId, payload, emptyText) {
        const objectives = objectiveItems(payload);
        const companyObjectives = companyObjectiveItems(payload);
        if (!objectives.length && !companyObjectives.length) {
            document.getElementById(divId).innerHTML = '<div class="empty">' + escapeHtml(emptyText) + '</div>';
            return;
        }

        let html = '';
        html += renderSubsection(
            'Company Objectives',
            'A small set of company-level outcomes that organize the quarter and group the contributing source objectives.',
            renderCardGrid(companyObjectives, renderCompanyObjectiveCard, 'No company objectives are defined for this period.')
        );
        html += renderSubsection(
            'Source Objectives',
            'Underlying objective packets linked to customers, KPIs, key results, initiatives, releases, and discoveries.',
            renderCardGrid(objectives, renderSourceObjectiveCard, 'No source objectives are defined for this period.')
        );
        html += renderDependencyGraph(divId, payload);

        document.getElementById(divId).innerHTML = html;
    }

    updateTabLabels();
    renderTab('Current', currentPayload, 'No current-quarter objectives are defined.');
    renderTab('Next', nextPayload, 'No next-quarter preparation objectives are defined.');
    renderTab('Archive', archivePayload, 'No archived objectives are defined.');
</script>
