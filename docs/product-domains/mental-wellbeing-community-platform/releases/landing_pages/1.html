        .impact-line {

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">

<script>
    const release = {"title": "Employer Launch Velocity Release", "date": "2026-05-29", "description": "Release focused on reducing employer setup friction, improving launch readiness, and clarifying privacy-safe reporting.", "customerImpact": [{"customerId": "cg2-p1", "customer": {"id": "cg2-p1", "name": "People and Benefits Leader", "group": "Employer Benefit Buyers", "icon": "buyer.png"}, "customerKPIs": [{"kpi": "Covered employees activated within 60 days", "expectedImpact": "Increase first-quarter member activation after employer launch.", "description": "Share of eligible employees who complete activation and at least one meaningful support action within 60 days of launch.", "unit": "%", "currentValue": "38%", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Annual contract value retained", "expectedImpact": "Increase renewal confidence through better early activation.", "description": "Share of employer recurring revenue retained across annual renewal cycles.", "unit": "%", "currentValue": "88%", "link": "", "linkLabel": "", "kind": "business"}]}, {"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "HR Program Administrator", "group": "Employer Program Operators", "icon": "operator.png"}, "customerKPIs": [{"kpi": "Monthly active enrolled employees", "expectedImpact": "Improve steady-state participation through easier operations.", "description": "Share of enrolled employees who complete at least one meaningful Cadre action each month.", "unit": "%", "currentValue": "31%", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Employer program activation rate", "expectedImpact": "Increase the share of healthy new employer accounts.", "description": "Share of employer accounts achieving the minimum healthy participation threshold within the first quarter.", "unit": "%", "currentValue": "67%", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "org-onboarding", "change": "Improve launch checklists and access-code readiness.", "brick": {"id": "org-onboarding", "name": "Organization Onboarding and Access Codes", "type": "full-stack", "description": "Employer setup, employee access paths, launch configuration, and activation workflows.", "domain": "Employer Solutions", "group": "Buyer and admin workflows", "internalModules": [{"title": "Onboarding state machine", "description": "Tracks employer launch readiness, access code logic, and cohort activation.", "type": "service"}], "interfaces": [{"title": "Onboarding UI", "description": "Employer launch and configuration workflows.", "type": "ui"}], "dataDependencies": [{"assetId": "employer-account", "role": "read", "description": "Reads employer configuration and launch state.", "storeIds": ["employer-account-db"]}], "brickDependencies": [{"targetBrickId": "identity", "type": "identity", "interface": "Access provisioning API", "description": "Uses identity provisioning to create admin and member access."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "org-onboarding.png"}}, {"brickId": "admin-console", "change": "Clarify employer setup and quarterly review workflows.", "brick": {"id": "admin-console", "name": "Employer Admin Console", "type": "full-stack", "description": "Operational control surface for employer program setup, access, and reviews.", "domain": "Employer Solutions", "group": "Buyer and admin workflows", "internalModules": [{"title": "Employer operations shell", "description": "Assembles employer controls, launch steps, and account health views.", "type": "service"}], "interfaces": [{"title": "Admin console UI", "description": "Employer-facing administrative workspace.", "type": "ui"}], "dataDependencies": [{"assetId": "employer-account", "role": "read", "description": "Reads employer account configuration.", "storeIds": ["employer-account-db"]}], "brickDependencies": [{"targetBrickId": "engagement-analytics", "type": "composition", "interface": "Aggregate reporting API", "description": "Uses aggregate program reporting in the employer console."}, {"targetBrickId": "privacy", "type": "policy", "interface": "Reporting privacy guardrails", "description": "Uses privacy rules to ensure employer-safe reporting."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "admin-console.png"}}, {"brickId": "engagement-analytics", "change": "Add clearer aggregate health summaries for operators.", "brick": {"id": "engagement-analytics", "name": "Employer Engagement Analytics", "type": "full-stack", "description": "Aggregate employer-safe analytics on activation, repeat use, topics, and event participation.", "domain": "Employer Solutions", "group": "Buyer and admin workflows", "internalModules": [{"title": "Aggregate reporting service", "description": "Builds employer-safe insights from member and event activity data.", "type": "service"}], "interfaces": [{"title": "Employer reporting UI and API", "description": "Aggregate reporting surfaces for employer buyers and operators.", "type": "ui"}], "dataDependencies": [{"assetId": "engagement-aggregate", "role": "own", "description": "Owns aggregate employer reporting outputs.", "storeIds": ["engagement-aggregate-store"]}], "brickDependencies": [{"targetBrickId": "privacy", "type": "policy", "interface": "Aggregation policy", "description": "Uses privacy rules to keep reporting aggregate and compliant."}, {"targetBrickId": "ai-intel", "type": "insight", "interface": "Demand and health models", "description": "Uses intelligence models to surface account health and topic demand."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "engagement-analytics.png"}}], "deliveryChannels": [{"channelId": "web-app", "change": "Release improved employer admin console flows.", "channel": {"productId": "web", "productName": "", "name": "web-app", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["employer-solutions"], "supportingTeamIds": ["revenue-and-ops", "trust-and-intelligence"]}, "initiativeId": "initiative-mental-wellbeing-community-platform-2026-04-24-02", "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Mental Wellbeing Community Platform';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Mental Wellbeing Community Platform Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Employer Launch Velocity Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
