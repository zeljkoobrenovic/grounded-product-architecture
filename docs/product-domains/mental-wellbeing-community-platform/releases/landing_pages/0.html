<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Mental Wellbeing Community Platform)</title>
    <style>
    .page-type-badge {
        display: inline-block;

</style>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;
        padding: 6px 4px;

    }

</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Contributor Trust and Delivery Release", "date": "2026-06-12", "description": "Release focused on contributor profile quality, live-session operations, moderation support, and payout clarity.", "customerImpact": [{"customerId": "cg4-p1", "customer": {"id": "cg4-p1", "name": "Contributor / Facilitator", "group": "Contributors and Facilitators", "icon": "contributor.png"}, "customerKPIs": [{"kpi": "Monthly meaningful audience interactions", "expectedImpact": "Increase the amount of high-quality contributor-led engagement.", "description": "Average number of live, Q&A, or on-demand interactions that meet Cadre's meaningful-engagement threshold per active contributor each month.", "unit": "interactions", "currentValue": "184", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Contributor safety confidence", "expectedImpact": "Improve trust in Cadre's live and moderation operations.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Contributor retention rate", "expectedImpact": "Reduce avoidable contributor churn.", "description": "Share of active contributors retained across rolling two-quarter windows.", "unit": "%", "currentValue": "78%", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "contributor-profile", "change": "Improve profile, credentials, and topic coverage setup.", "brick": {"id": "contributor-profile", "name": "Contributor Profiles and Credentials", "type": "full-stack", "description": "Contributor identity, credentials, topic coverage, and opportunity fit surfaces.", "links": [], "domain": "Contributor Network", "group": "Contributor supply and operations", "internalModules": [{"title": "Contributor profile service", "description": "Stores contributor identity, credentials, and coverage metadata.", "type": "service"}], "interfaces": [{"title": "Contributor profile UI", "description": "Contributor-facing and member-visible profile experiences.", "type": "ui"}], "dataDependencies": [{"assetId": "contributor-profile", "role": "own", "description": "Owns contributor identity and credential objects.", "storeIds": ["contributor-profile-db"]}], "brickDependencies": [{"targetBrickId": "moderation", "type": "policy", "interface": "Trust policy API", "description": "Uses trust status and compliance checks before contributor activation."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "contributor-profile.png"}}, {"brickId": "live", "change": "Improve live-session delivery reliability and host controls.", "brick": {"id": "live", "name": "Live Session Streaming", "type": "full-stack", "description": "Schedules, streams, and manages live support sessions and event participation.", "links": [], "domain": "Member Experience", "group": "Community and support participation", "internalModules": [{"title": "Live session runtime", "description": "Manages session setup, attendance, and live-state transitions.", "type": "service"}], "interfaces": [{"title": "Live session UI", "description": "Member and contributor live session experience.", "type": "ui"}], "dataDependencies": [{"assetId": "session-recording", "role": "write", "description": "Writes session recordings for on-demand reuse when permitted.", "storeIds": ["session-recording-store"]}], "brickDependencies": [{"targetBrickId": "session-scheduling", "type": "data", "interface": "Session schedule API", "description": "Uses session definitions and availability."}, {"targetBrickId": "moderation", "type": "policy", "interface": "Live moderation controls", "description": "Uses moderation and escalation controls during live sessions."}], "externalSystemsThisBrickDependsOn": [{"system": "Video Streaming Provider", "type": "media", "interface": "Streaming API", "description": "Depends on third-party video delivery infrastructure."}], "externalSystemsDependingOnThisBrick": [], "icon": "live.png"}}, {"brickId": "payouts", "change": "Improve earnings visibility and payout statement clarity.", "brick": {"id": "payouts", "name": "Contributor Payouts and Earnings", "type": "full-stack", "description": "Contributor earnings visibility, payout workflows, and settlement history.", "links": [], "domain": "Contributor Network", "group": "Contributor supply and operations", "internalModules": [{"title": "Contributor earnings service", "description": "Calculates earnings and exposes payout statements to contributors.", "type": "service"}], "interfaces": [{"title": "Contributor earnings UI", "description": "Contributor-facing earnings and payout experience.", "type": "ui"}], "dataDependencies": [{"assetId": "payout-ledger", "role": "own", "description": "Owns contributor payout and settlement records.", "storeIds": ["payout-ledger-db"]}], "brickDependencies": [{"targetBrickId": "billing", "type": "financial", "interface": "Settlement API", "description": "Uses revenue and settlement workflows to fund contributor payouts."}], "externalSystemsThisBrickDependsOn": [{"system": "Payout Provider", "type": "financial", "interface": "Payout API", "description": "Depends on an external payout processor."}], "externalSystemsDependingOnThisBrick": [], "icon": "payouts.png"}}], "deliveryChannels": [{"channelId": "web-app", "change": "Release improved contributor studio workflows.", "channel": {"productId": "web", "productName": "", "name": "web-app", "type": "product", "icon": "product.png"}}, {"channelId": "video-provider", "change": "Roll out updated live-session delivery configuration.", "channel": {"productId": "video", "productName": "", "name": "video-provider", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["contributor-network"], "supportingTeamIds": ["revenue-and-ops", "trust-and-intelligence"]}, "initiativeId": "initiative-mental-wellbeing-community-platform-2026-05-01-03", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Mental Wellbeing Community Platform';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Mental Wellbeing Community Platform Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Contributor Trust and Delivery Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
