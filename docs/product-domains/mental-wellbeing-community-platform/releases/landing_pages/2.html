<!DOCTYPE html>
<html lang="en">
<head>

    <style>

    <style>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Member Support Discovery Release", "date": "2026-05-14", "description": "Release focused on reducing time-to-support through better intent routing, recommendations, and first-session action flows.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Everyday Member", "group": "Members Seeking Support", "icon": "member.png"}, "customerKPIs": [{"kpi": "Time to first meaningful support interaction", "expectedImpact": "Reduce the time members need to get to a helpful next step.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Weekly meaningful support actions", "expectedImpact": "Increase repeat meaningful use within the first week.", "description": "Average number of live joins, saved resources, guided reflections, or meaningful community interactions per weekly active member.", "unit": "actions per wam", "currentValue": "2.6", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Paid member gross retention", "expectedImpact": "Improve short-term retention by making the core experience more useful.", "description": "Share of paying or sponsored active members retained after 90 days.", "unit": "%", "currentValue": "81%", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "home", "change": "Improve intent-aware home modules and recovery patterns.", "brick": {"id": "home", "name": "Member Home and Intent Feed", "type": "full-stack", "description": "Personalized member home that assembles topic cues, next-best actions, and recovery paths.", "domain": "Member Experience", "group": "Support discovery", "internalModules": [{"title": "Intent orchestration", "description": "Builds personalized home modules from member context and recent support behavior.", "type": "service"}], "interfaces": [{"title": "Home feed UI", "description": "Primary member-facing home surface across web and mobile.", "type": "ui"}], "dataDependencies": [{"assetId": "member-profile", "role": "read", "description": "Reads member identity and preference data.", "storeIds": ["member-profile-db"]}, {"assetId": "support-interaction", "role": "read", "description": "Reads recent support behavior to personalize the home feed.", "storeIds": ["support-interaction-stream"]}], "brickDependencies": [{"targetBrickId": "reco", "type": "composition", "interface": "Recommendation API", "description": "Uses recommendation candidates to compose the member home."}, {"targetBrickId": "topics", "type": "data", "interface": "Topic taxonomy", "description": "Uses topic pathways to organize support entry points."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "home.png"}}, {"brickId": "reco", "change": "Improve support recommendation ranking and freshness.", "brick": {"id": "reco", "name": "Support Recommendations", "type": "full-stack", "description": "Recommendation engine for live sessions, content, communities, and next-step support actions.", "domain": "Member Experience", "group": "Support discovery", "internalModules": [{"title": "Recommendation ranking", "description": "Ranks support options using member behavior, topic affinity, and program context.", "type": "service"}], "interfaces": [{"title": "Recommendation API", "description": "Serves personalized support recommendations to member surfaces.", "type": "api"}], "dataDependencies": [{"assetId": "support-interaction", "role": "read", "description": "Learns from member support behavior.", "storeIds": ["support-interaction-stream"]}], "brickDependencies": [{"targetBrickId": "ai-intel", "type": "insight", "interface": "Recommendation features", "description": "Uses intelligence features to improve support relevance."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "reco.png"}}, {"brickId": "search", "change": "Improve explicit search relevance and topic retrieval.", "brick": {"id": "search", "name": "Search and Topic Retrieval", "type": "full-stack", "description": "Searches content, sessions, communities, and contributors by intent and topic.", "domain": "Member Experience", "group": "Support discovery", "internalModules": [{"title": "Unified support search", "description": "Indexes support resources and retrieves relevant results by topic and format.", "type": "service"}], "interfaces": [{"title": "Search UI and API", "description": "Search interface for explicit member support intent.", "type": "ui"}], "dataDependencies": [], "brickDependencies": [{"targetBrickId": "topics", "type": "data", "interface": "Topic taxonomy", "description": "Uses topic metadata to improve query resolution."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "search.png"}}], "deliveryChannels": [{"channelId": "ios-app-store", "change": "Roll out updated member iOS support discovery.", "channel": {"productId": "ios", "productName": "", "name": "ios-app-store", "type": "product", "icon": "product.png"}}, {"channelId": "android-play-store", "change": "Roll out updated member Android support discovery.", "channel": {"productId": "android", "productName": "", "name": "android-play-store", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["member-growth"], "supportingTeamIds": ["trust-and-intelligence"]}, "initiativeId": "initiative-mental-wellbeing-community-platform-2026-04-18-01", "landingPageIndex": 2, "objectiveLandingPageUrl": ""};
    const domainName = 'Mental Wellbeing Community Platform';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Mental Wellbeing Community Platform Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Member Support Discovery Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
