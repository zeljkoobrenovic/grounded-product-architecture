<!DOCTYPE html>

    <style>

    <style>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;

            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;

        h1 {

            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;

            margin-bottom: 12px;
        }

        .description {

        .impact-block {

        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Courier Earnings Transparency Release", "date": "2026-06-21", "description": "Release focused on clearer courier offer cards, incentive progress, earnings breakdown, adjustments, and payout status.", "customerImpact": [{"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "Independent Courier", "group": "Delivery Supply", "icon": "courier.png"}, "customerKPIs": [{"kpi": "Earnings explanation clarity", "expectedImpact": "Increase courier trust in base pay, tips, boosts, and adjustments.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Courier earnings confidence", "expectedImpact": "Improve courier confidence that active delivery time produces understandable earnings.", "description": "Increase courier perception that active delivery time produces predictable, understandable earnings.", "unit": "% positive", "currentValue": "71.0", "link": "https://dashboard.example.com/local-on-demand-delivery-marketplace/customers/cg3-p1/kpis/co-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}], "businessKPIs": [{"kpi": "Courier 30-day active retention", "expectedImpact": "Increase courier retention by reducing payout confusion and support escalations.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "earn", "change": "Improve earnings breakdown and payout status explanations.", "brick": {"id": "earn", "name": "Courier Earnings & Payout Experience", "type": "full-stack", "description": "Courier pay calculation, tips, incentives, adjustments, instant cashout, tax documents, earnings explanation, and payout support.", "links": [], "domain": "Courier Logistics", "group": "Courier supply", "internalModules": [{"title": "Courier pay calculator", "description": "Calculates delivery pay, distance pay, time pay, boosts, tips, and adjustments under market-specific policies.", "type": "service"}], "interfaces": [{"title": "Courier earnings UI", "description": "Earnings, payout, tip, tax, and adjustment surface.", "type": "mobile_app"}], "dataDependencies": [{"assetId": "courier-earnings-record", "role": "own", "description": "Owns courier earnings, tip, incentive, and payout records.", "storeIds": ["courier-earnings-db"]}], "brickDependencies": [{"targetBrickId": "payl", "type": "integration", "interface": "Payout ledger", "description": "Posts courier earnings and payout obligations."}], "externalSystemsThisBrickDependsOn": [{"name": "Banking and payout providers", "description": "Courier payouts and instant cashout."}], "externalSystemsDependingOnThisBrick": [], "icon": "earn.png"}}, {"brickId": "shift", "change": "Improve incentive progress and eligibility visibility.", "brick": {"id": "shift", "name": "Courier Availability & Incentives", "type": "full-stack", "description": "Real-time courier availability, zones, boosts, quests, supply shaping, scheduled shifts, and market heatmaps.", "links": [], "domain": "Courier Logistics", "group": "Courier supply", "internalModules": [{"title": "Supply shaping engine", "description": "Calculates incentive and availability needs by zone, time, weather, and expected demand.", "type": "service"}], "interfaces": [{"title": "Courier availability UI", "description": "Courier work-status, incentive, and market demand surface.", "type": "mobile_app"}], "dataDependencies": [{"assetId": "courier-availability", "role": "own", "description": "Owns courier online, zone, shift, and incentive eligibility state.", "storeIds": ["courier-availability-db"]}], "brickDependencies": [{"targetBrickId": "disp", "type": "data", "interface": "Demand forecast and dispatch capacity", "description": "Uses market demand and courier utilization signals."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "shift.png"}}, {"brickId": "disp", "change": "Add more consistent offer estimate fields.", "brick": {"id": "disp", "name": "Dispatch, Matching & Assignment", "type": "service", "description": "Real-time order dispatch, courier matching, pickup assignment, offer acceptance, reassignment, and marketplace balance controls.", "links": [], "domain": "Courier Logistics", "group": "Fulfillment optimization", "internalModules": [{"title": "Assignment optimizer", "description": "Matches orders to couriers using location, mode, prep time, reliability, cost, batching, and fairness constraints.", "type": "service"}], "interfaces": [{"title": "Dispatch operations console", "description": "Live city operations, exception, and manual intervention surface.", "type": "ui"}], "dataDependencies": [{"assetId": "dispatch-assignment", "role": "own", "description": "Owns courier assignment, offer, acceptance, and reassignment state.", "storeIds": ["dispatch-assignment-db", "delivery-event-stream"]}], "brickDependencies": [{"targetBrickId": "prep", "type": "event", "interface": "Merchant prep events", "description": "Uses prep-time and ready-for-pickup state."}], "externalSystemsThisBrickDependsOn": [{"name": "Mapping and routing providers", "description": "Travel-time, route, and geospatial services."}], "externalSystemsDependingOnThisBrick": [], "icon": "disp.png"}}, {"brickId": "payl", "change": "Improve payout posting and adjustment explanation.", "brick": {"id": "payl", "name": "Ledger, Settlement & Tax", "type": "service", "description": "Financial ledger, merchant settlement, courier payout, consumer refunds, tax calculation, invoicing, reserves, and reconciliation.", "links": [], "domain": "Marketplace Foundations", "group": "Trust and financial control", "internalModules": [{"title": "Marketplace ledger", "description": "Posts consumer charges, platform fees, merchant receivables, courier payables, refunds, taxes, and adjustments.", "type": "service"}], "interfaces": [{"title": "Ledger API", "description": "Financial posting and settlement interface.", "type": "api"}], "dataDependencies": [{"assetId": "ledger-entry", "role": "own", "description": "Owns immutable financial postings and settlement records.", "storeIds": ["ledger-entry-db"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"name": "Payment, banking, and tax providers", "description": "Payment acquiring, payouts, invoicing, and tax calculation."}], "externalSystemsDependingOnThisBrick": [], "icon": "payl.png"}}], "deliveryChannels": [{"channelId": "courier-mobile-apps", "change": "Release updated offer, earnings, and payout screens.", "channel": {"productId": "courier", "productName": "", "name": "courier-mobile-apps", "type": "product", "icon": "product.png"}}, {"channelId": "marketplace-runtime", "change": "Release supporting pay calculation and ledger event changes.", "channel": {"productId": "marketplace", "productName": "", "name": "marketplace-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["courier-supply-and-safety"], "supportingTeamIds": ["ledger-settlement", "marketplace-pricing"]}, "initiativeId": "initiative-local-on-demand-delivery-marketplace-2026-04-22-05", "landingPageIndex": 2, "objectiveLandingPageUrl": ""};
    const domainName = 'Local On-Demand Delivery Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Local On-Demand Delivery Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Courier Earnings Transparency Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
