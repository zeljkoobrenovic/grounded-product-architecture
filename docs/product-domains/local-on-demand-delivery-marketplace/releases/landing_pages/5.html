<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Local On-Demand Delivery Marketplace)</title>
    <style>
    .page-type-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;

</style>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;

    }

</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Merchant Prep and Dispatch Reliability Release", "date": "2026-05-29", "description": "Release focused on reducing merchant wait time, improving prep-time estimates, and aligning dispatch with store readiness.", "customerImpact": [{"customerId": "cg2-p1", "customer": {"id": "cg2-p1", "name": "Restaurant and Local Retail Operator", "group": "Supply-Side Merchants and Retailers", "icon": "merchant.png"}, "customerKPIs": [{"kpi": "On-time ready-for-pickup rate", "expectedImpact": "Increase the share of orders ready when couriers arrive.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Merchant-caused cancellation rate", "expectedImpact": "Reduce cancellations from stock, prep, or operational errors.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Merchant revenue per active store", "expectedImpact": "Improve order throughput and marketplace quality.", "description": "Increase platform revenue generated per active merchant through orders, ads, and promotion products.", "unit": "USD/month", "currentValue": "1850", "link": "https://dashboard.example.com/local-on-demand-delivery-marketplace/customers/cg2-p1/kpis/bo-cg2-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}, {"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "Independent Courier", "group": "Delivery Supply", "icon": "courier.png"}, "customerKPIs": [{"kpi": "Merchant wait time", "expectedImpact": "Reduce wasted courier time at pickup.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Courier supply reliability", "expectedImpact": "Improve courier utilization and peak-zone reliability.", "description": "Increase reliable courier supply in priority zones while controlling incentive spend.", "unit": "% demand-covered intervals", "currentValue": "87.0", "link": "https://dashboard.example.com/local-on-demand-delivery-marketplace/customers/cg3-p1/kpis/bo-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "prep", "change": "Improve merchant prep-time updates and busy-mode controls.", "brick": {"id": "prep", "name": "Merchant Order Prep & POS Integration", "type": "integration", "description": "Merchant order tablet, POS injection, accept/reject flows, prep-time updates, substitution communication, and store busy-mode controls.", "links": [], "domain": "Merchant and Retailer Growth", "group": "Merchant operations", "internalModules": [{"title": "POS order adapter", "description": "Maps marketplace order states into restaurant and retailer POS workflows.", "type": "integration"}], "interfaces": [{"title": "Merchant order manager", "description": "Order acceptance, prep, substitution, and handoff surface.", "type": "ui"}], "dataDependencies": [{"assetId": "merchant-operation-event", "role": "own", "description": "Owns merchant accept, prep, delay, and handoff events.", "storeIds": ["merchant-operation-event-stream"]}], "brickDependencies": [{"targetBrickId": "orde", "type": "event", "interface": "Order state API", "description": "Updates canonical order state as merchants accept and prepare orders."}], "externalSystemsThisBrickDependsOn": [{"name": "Restaurant and retailer POS systems", "description": "Order injection and menu sync integrations."}], "externalSystemsDependingOnThisBrick": [], "icon": "prep.png"}}, {"brickId": "disp", "change": "Tune assignment timing using readiness and wait-time signals.", "brick": {"id": "disp", "name": "Dispatch, Matching & Assignment", "type": "service", "description": "Real-time order dispatch, courier matching, pickup assignment, offer acceptance, reassignment, and marketplace balance controls.", "links": [], "domain": "Courier Logistics", "group": "Fulfillment optimization", "internalModules": [{"title": "Assignment optimizer", "description": "Matches orders to couriers using location, mode, prep time, reliability, cost, batching, and fairness constraints.", "type": "service"}], "interfaces": [{"title": "Dispatch operations console", "description": "Live city operations, exception, and manual intervention surface.", "type": "ui"}], "dataDependencies": [{"assetId": "dispatch-assignment", "role": "own", "description": "Owns courier assignment, offer, acceptance, and reassignment state.", "storeIds": ["dispatch-assignment-db", "delivery-event-stream"]}], "brickDependencies": [{"targetBrickId": "prep", "type": "event", "interface": "Merchant prep events", "description": "Uses prep-time and ready-for-pickup state."}], "externalSystemsThisBrickDependsOn": [{"name": "Mapping and routing providers", "description": "Travel-time, route, and geospatial services."}], "externalSystemsDependingOnThisBrick": [], "icon": "disp.png"}}, {"brickId": "rout", "change": "Improve ETA prediction using prep and pickup history.", "brick": {"id": "rout", "name": "Routing, Geospatial & ETA", "type": "service", "description": "Travel-time prediction, geocoding, dropoff validation, delivery zones, routing, weather-aware ETA, and courier navigation context.", "links": [], "domain": "Courier Logistics", "group": "Fulfillment optimization", "internalModules": [{"title": "ETA prediction model", "description": "Predicts prep, pickup, route, handoff, and dropoff times for consumer and operations use.", "type": "service"}], "interfaces": [{"title": "ETA and route API", "description": "Shared interface for promise, dispatch, tracking, and courier navigation.", "type": "api"}], "dataDependencies": [{"assetId": "geospatial-event", "role": "own", "description": "Owns address, zone, route, ETA, and location-derived events.", "storeIds": ["geospatial-event-stream"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"name": "Maps, traffic, and geocoding providers", "description": "Routing, address validation, and travel-time inputs."}], "externalSystemsDependingOnThisBrick": [], "icon": "rout.png"}}], "deliveryChannels": [{"channelId": "merchant-web-portal", "change": "Release updated prep controls and operational diagnostics.", "channel": {"productId": "merchant", "productName": "", "name": "merchant-web-portal", "type": "product", "icon": "product.png"}}, {"channelId": "marketplace-runtime", "change": "Release updated dispatch timing services.", "channel": {"productId": "marketplace", "productName": "", "name": "marketplace-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["dispatch-optimization"], "supportingTeamIds": ["merchant-growth", "marketplace-intelligence"]}, "initiativeId": "initiative-local-on-demand-delivery-marketplace-2026-04-22-02", "landingPageIndex": 5, "objectiveLandingPageUrl": ""};
    const domainName = 'Local On-Demand Delivery Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Local On-Demand Delivery Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Merchant Prep and Dispatch Reliability Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
