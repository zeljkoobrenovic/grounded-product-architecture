    <style>

        .pill {

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>

</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>

</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Marketplace Metric Layer Release", "date": "2026-06-30", "description": "Release focused on standard GMV, order, active user, defect, courier utilization, ads, and contribution margin definitions across planning and operations.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Everyday Local Ordering Consumer", "group": "Demand-Side Consumers", "icon": "consumer.png"}, "customerKPIs": [{"kpi": "High-intent order conversion", "expectedImpact": "Improve decision quality by aligning funnel, reliability, and margin guardrails.", "description": "Increase the share of high-intent sessions that become completed local delivery orders.", "unit": "% of high-intent sessions", "currentValue": "28.4", "link": "https://dashboard.example.com/local-on-demand-delivery-marketplace/customers/cg1-p1/kpis/co-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}], "businessKPIs": [{"kpi": "Monthly order frequency per active consumer", "expectedImpact": "Improve growth experiments with better retention and frequency measurement.", "description": "Increase repeat local commerce usage by improving reliability, value, and multi-vertical relevance.", "unit": "orders / active consumer / month", "currentValue": "3.2", "link": "https://dashboard.example.com/local-on-demand-delivery-marketplace/customers/cg1-p1/kpis/bo-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "data", "change": "Publish governed marketplace metric definitions.", "brick": {"id": "data", "name": "Marketplace Data Platform", "type": "service", "description": "Governed event streams, core metrics, forecasting datasets, ranking features, business intelligence, and ML feature pipelines.", "links": [], "domain": "Marketplace Foundations", "group": "Intelligence and platform", "internalModules": [{"title": "Marketplace metric layer", "description": "Publishes standard definitions for GMV/GTV, orders, active users, defect rates, utilization, and profitability.", "type": "service"}], "interfaces": [{"title": "Analytics and feature APIs", "description": "Data access for analytics, ML, and product reporting.", "type": "api"}], "dataDependencies": [{"assetId": "marketplace-metric", "role": "own", "description": "Owns standard business and product metric datasets.", "storeIds": ["marketplace-metric-warehouse"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"name": "Cloud data warehouse and streaming platform", "description": "Event ingestion, storage, transformation, and query execution."}], "externalSystemsDependingOnThisBrick": [], "icon": "data.png"}}, {"brickId": "expm", "change": "Add experiment guardrails for conversion, reliability, and margin.", "brick": {"id": "expm", "name": "Experimentation & Growth Measurement", "type": "service", "description": "A/B testing, holdouts, causal measurement, marketplace incrementality, metric guardrails, and product decision dashboards.", "links": [], "domain": "Marketplace Foundations", "group": "Intelligence and platform", "internalModules": [{"title": "Experiment assignment service", "description": "Provides consistent actor-level assignment and guardrail measurement across surfaces.", "type": "service"}], "interfaces": [{"title": "Experimentation console", "description": "Experiment setup, monitoring, and readout workflow.", "type": "ui"}], "dataDependencies": [{"assetId": "experiment-assignment", "role": "own", "description": "Owns assignment, exposure, and experiment readout state.", "storeIds": ["experiment-assignment-db"]}], "brickDependencies": [{"targetBrickId": "data", "type": "data", "interface": "Analytics datasets", "description": "Uses governed marketplace metrics and event streams."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "expm.png"}}, {"brickId": "mrep", "change": "Align merchant reports to standard order and revenue definitions.", "brick": {"id": "mrep", "name": "Merchant Analytics & Insights", "type": "full-stack", "description": "Merchant sales reporting, operations diagnostics, customer insights, retention analysis, prep-time performance, ads measurement, and financial reconciliation.", "links": [], "domain": "Merchant and Retailer Growth", "group": "Growth and monetization", "internalModules": [{"title": "Merchant performance mart", "description": "Aggregates orders, conversion, quality, operations, promotions, and payout metrics.", "type": "service"}], "interfaces": [{"title": "Merchant analytics dashboard", "description": "Self-service reporting and action guidance for merchant operators.", "type": "ui"}], "dataDependencies": [{"assetId": "merchant-performance-metric", "role": "own", "description": "Owns merchant performance and operational analytics marts.", "storeIds": ["merchant-performance-warehouse"]}], "brickDependencies": [{"targetBrickId": "data", "type": "data", "interface": "Marketplace analytics warehouse", "description": "Depends on governed analytics datasets."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "mrep.png"}}, {"brickId": "ops", "change": "Add marketplace health scorecards for city operations.", "brick": {"id": "ops", "name": "Marketplace Operations Console", "type": "full-stack", "description": "City operations, live marketplace health, incident response, manual interventions, regulatory reporting, and operational playbooks.", "links": [], "domain": "Marketplace Foundations", "group": "Intelligence and platform", "internalModules": [{"title": "Market health monitor", "description": "Tracks demand, supply, prep, cancellations, lateness, support, and incident metrics by zone.", "type": "service"}], "interfaces": [{"title": "Operations control room", "description": "Internal city operations and incident management surface.", "type": "ui"}], "dataDependencies": [{"assetId": "operations-incident", "role": "own", "description": "Owns operational incident, playbook, and manual intervention records.", "storeIds": ["operations-incident-db"]}], "brickDependencies": [{"targetBrickId": "data", "type": "data", "interface": "Marketplace metrics", "description": "Uses operational health metrics and alerts."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "ops.png"}}], "deliveryChannels": [{"channelId": "marketplace-runtime", "change": "Release metric events and semantic layer updates.", "channel": {"productId": "marketplace", "productName": "", "name": "marketplace-runtime", "type": "product", "icon": "product.png"}}, {"channelId": "merchant-web-portal", "change": "Release aligned merchant reporting definitions.", "channel": {"productId": "merchant", "productName": "", "name": "merchant-web-portal", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["marketplace-intelligence"], "supportingTeamIds": ["merchant-growth", "courier-logistics", "ledger-settlement"]}, "initiativeId": "initiative-local-on-demand-delivery-marketplace-2026-04-22-07", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Local On-Demand Delivery Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Local On-Demand Delivery Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Marketplace Metric Layer Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
