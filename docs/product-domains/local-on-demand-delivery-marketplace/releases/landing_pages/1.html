ibility signals", "description": "Uses trust signals to prevent refund and promotion abuse."}], "externalSystemsThisBrickDependsOn": [{"name": "Contact-center platform", "description": "Agent routing, conversation history, and workforce operations."}], "externalSystemsDependingOnThisBrick": [], "icon": "care.png"}}, {"brickId": "payl", "change": "Improve refund, credit, and reversal postings.", "brick": {"id": "payl", "name": "Ledger, Settlement & Tax", "type": "service", "description": "Financial ledger, merchant settlement, courier payout, consumer refunds, tax calculation, invoicing, reserves, and reconciliation.", "links": [], "domain": "Marketplace Foundations", "group": "Trust and financial control", "internalModules": [{"title": "Marketplace ledger", "description": "Posts consumer charges, platform fees, merchant receivables, courier payables, refunds, taxes, and adjustments.", "type": "service"}], "interfaces": [{"title": "Ledger API", "description": "Financial posting and settlement interface.", "type": "api"}], "dataDependencies": [{"assetId": "ledger-entry", "role": "own", "description": "Owns immutable financial postings and settlement records.", "storeIds": ["ledger-entry-db"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"name": "Payment, banking, and tax providers", "description": "Payment acquiring, payouts, invoicing, and tax calculation."}], "externalSystemsDependingOnThisBrick": [], "icon": "payl.png"}}, {"brickId": "ops", "change": "Add trust operations monitoring views.", "brick": {"id": "ops", "name": "Marketplace Operations Console", "type": "full-stack", "description": "City operations, live marketplace health, incident response, manual interventions, regulatory reporting, and operational playbooks.", "links": [], "domain": "Marketplace Foundations", "group": "Intelligence and platform", "internalModules": [{"title": "Market health monitor", "description": "Tracks demand, supply, prep, cancellations, lateness, support, and incident metrics by zone.", "type": "service"}], "interfaces": [{"title": "Operations control room", "description": "Internal city operations and incident management surface.", "type": "ui"}], "dataDependencies": [{"assetId": "operations-incident", "role": "own", "description": "Owns operational incident, playbook, and manual intervention records.", "storeIds": ["operations-incident-db"]}], "brickDependencies": [{"targetBrickId": "data", "type": "data", "interface": "Marketplace metrics", "description": "Uses operational health metrics and alerts."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "ops.png"}}], "deliveryChannels": [{"channelId": "consumer-ios-app-store", "change": "Release updated issue reporting and resolution flows.", "channel": {"productId": "consumer", "productName": "", "name": "consumer-ios-app-store", "type": "product", "icon": "product.png"}}, {"channelId": "merchant-web-portal", "change": "Release merchant dispute and policy views.", "channel": {"productId": "merchant", "productName": "", "name": "merchant-web-portal", "type": "product", "icon": "product.png"}}, {"channelId": "marketplace-runtime", "change": "Release risk and ledger policy changes.", "channel": {"productId": "marketplace", "productName": "", "name": "marketplace-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["identity-risk"], "supportingTeamIds": ["consumer-ordering", "ledger-settlement", "partner-platform"]}, "initiativeId": "initiative-local-on-demand-delivery-marketplace-2026-04-22-06", "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Local On-Demand Delivery Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Local On-Demand Delivery Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Trust and Refund Controls Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
