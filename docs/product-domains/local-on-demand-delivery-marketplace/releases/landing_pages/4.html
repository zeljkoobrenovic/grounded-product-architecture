        .pill {

            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>

<td>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Merchant Ads and Insight Release", "date": "2026-06-12", "description": "Release focused on better sponsored placement controls, merchant promotion reporting, and ads incrementality readouts.", "customerImpact": [{"customerId": "cg2-p1", "customer": {"id": "cg2-p1", "name": "Restaurant and Local Retail Operator", "group": "Supply-Side Merchants and Retailers", "icon": "merchant.png"}, "customerKPIs": [{"kpi": "Merchant profitable order growth", "expectedImpact": "Improve merchant ability to grow demand with measured ads and promotions.", "description": "Increase active merchant order growth while keeping operational defects and margin leakage controlled.", "unit": "% QoQ order growth", "currentValue": "8.0", "link": "https://dashboard.example.com/local-on-demand-delivery-marketplace/customers/cg2-p1/kpis/co-cg2-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Ads adoption among eligible merchants", "expectedImpact": "Increase paid discovery adoption by improving campaign setup and reporting trust.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Merchant revenue per active store", "expectedImpact": "Increase marketplace revenue through ads, promotions, and order growth.", "description": "Increase platform revenue generated per active merchant through orders, ads, and promotion products.", "unit": "USD/month", "currentValue": "1850", "link": "https://dashboard.example.com/local-on-demand-delivery-marketplace/customers/cg2-p1/kpis/bo-cg2-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "adsv", "change": "Improve campaign setup, sponsored placement, and budget controls.", "brick": {"id": "adsv", "name": "Sponsored Listings & Retail Media", "type": "full-stack", "description": "Self-service ad buying, sponsored restaurants, sponsored products, auction ranking, campaign budgets, attribution, and advertiser reporting.", "links": [], "domain": "Merchant and Retailer Growth", "group": "Growth and monetization", "internalModules": [{"title": "Ads auction and pacing", "description": "Runs sponsored placement eligibility, bidding, pacing, and budget control.", "type": "service"}], "interfaces": [{"title": "Ads manager", "description": "Campaign setup and measurement for merchants and CPG advertisers.", "type": "ui"}], "dataDependencies": [{"assetId": "ads-campaign", "role": "own", "description": "Owns ad campaign, auction, impression, click, and spend records.", "storeIds": ["ads-campaign-db", "ads-event-stream"]}], "brickDependencies": [{"targetBrickId": "srch", "type": "composition", "interface": "Search placement service", "description": "Places sponsored results inside discovery flows."}, {"targetBrickId": "data", "type": "measurement", "interface": "Attribution datasets", "description": "Uses campaign impression, click, order, and incrementality signals."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "adsv.png"}}, {"brickId": "prom", "change": "Improve merchant-funded offer targeting and readouts.", "brick": {"id": "prom", "name": "Merchant Promotions & CRM", "type": "full-stack", "description": "Merchant-funded promotions, lifecycle campaigns, audience targeting, winback offers, first-order incentives, and offer performance measurement.", "links": [], "domain": "Merchant and Retailer Growth", "group": "Growth and monetization", "internalModules": [{"title": "Campaign eligibility service", "description": "Controls audience, budget, offer, and campaign eligibility constraints.", "type": "service"}], "interfaces": [{"title": "Merchant promotion console", "description": "Self-service promotion creation and reporting.", "type": "ui"}], "dataDependencies": [{"assetId": "promotion-campaign", "role": "own", "description": "Owns promotion, budget, and redemption records.", "storeIds": ["promotion-campaign-db"]}], "brickDependencies": [{"targetBrickId": "pric", "type": "composition", "interface": "Promotion calculation API", "description": "Applies promotional economics during basket and checkout."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "prom.png"}}, {"brickId": "mrep", "change": "Add campaign, conversion, and profitability reporting.", "brick": {"id": "mrep", "name": "Merchant Analytics & Insights", "type": "full-stack", "description": "Merchant sales reporting, operations diagnostics, customer insights, retention analysis, prep-time performance, ads measurement, and financial reconciliation.", "links": [], "domain": "Merchant and Retailer Growth", "group": "Growth and monetization", "internalModules": [{"title": "Merchant performance mart", "description": "Aggregates orders, conversion, quality, operations, promotions, and payout metrics.", "type": "service"}], "interfaces": [{"title": "Merchant analytics dashboard", "description": "Self-service reporting and action guidance for merchant operators.", "type": "ui"}], "dataDependencies": [{"assetId": "merchant-performance-metric", "role": "own", "description": "Owns merchant performance and operational analytics marts.", "storeIds": ["merchant-performance-warehouse"]}], "brickDependencies": [{"targetBrickId": "data", "type": "data", "interface": "Marketplace analytics warehouse", "description": "Depends on governed analytics datasets."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "mrep.png"}}, {"brickId": "expm", "change": "Improve incrementality measurement for ads and promotions.", "brick": {"id": "expm", "name": "Experimentation & Growth Measurement", "type": "service", "description": "A/B testing, holdouts, causal measurement, marketplace incrementality, metric guardrails, and product decision dashboards.", "links": [], "domain": "Marketplace Foundations", "group": "Intelligence and platform", "internalModules": [{"title": "Experiment assignment service", "description": "Provides consistent actor-level assignment and guardrail measurement across surfaces.", "type": "service"}], "interfaces": [{"title": "Experimentation console", "description": "Experiment setup, monitoring, and readout workflow.", "type": "ui"}], "dataDependencies": [{"assetId": "experiment-assignment", "role": "own", "description": "Owns assignment, exposure, and experiment readout state.", "storeIds": ["experiment-assignment-db"]}], "brickDependencies": [{"targetBrickId": "data", "type": "data", "interface": "Analytics datasets", "description": "Uses governed marketplace metrics and event streams."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "expm.png"}}], "deliveryChannels": [{"channelId": "merchant-web-portal", "change": "Release updated ads manager and merchant insights.", "channel": {"productId": "merchant", "productName": "", "name": "merchant-web-portal", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["merchant-ads-and-retail"], "supportingTeamIds": ["marketplace-intelligence", "marketplace-pricing"]}, "initiativeId": "initiative-local-on-demand-delivery-marketplace-2026-04-22-03", "landingPageIndex": 4, "objectiveLandingPageUrl": ""};
    const domainName = 'Local On-Demand Delivery Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Local On-Demand Delivery Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Merchant Ads and Insight Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
