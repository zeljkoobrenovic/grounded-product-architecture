<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Digital News Publishing Platform)</title>
    <style>

    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;

    }

</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 8px;">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Campaign Yield and Measurement Initiative", "date": "2026-05-01", "description": "Focused investment to improve identity-enriched targeting, sponsorship package quality, and advertiser-facing measurement.", "customerImpact": [{"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "Agency and Brand Campaign Buyer", "group": "Advertisers and Partners", "icon": "advertiser.png"}, "customerKPIs": [{"kpi": "Matched audience delivery rate", "expectedImpact": "Increase the share of campaigns hitting target audiences.", "description": "Increase the share of direct campaigns that hit the intended audience profile within tolerance to 78%.", "unit": "% of direct campaigns", "currentValue": "72%", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Measured campaign share", "expectedImpact": "Increase confidence in reported outcomes.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Repeat advertiser spend rate", "expectedImpact": "Increase renewal and upsell rates.", "description": "Increase the share of active direct advertisers who spend again within two quarters to 66%.", "unit": "% of active advertisers", "currentValue": "62%", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "segm", "change": "Improve direct-campaign audience packaging and pricing inputs.", "brick": {"id": "segm", "name": "Audience Segmentation and Yield", "type": "full-stack", "description": "Creation of commercial audience products, inventory pricing logic, and yield-aware segment packaging.", "domain": "Publishing and Monetization", "group": "Revenue and partnerships", "internalModules": [{"title": "Audience product service", "description": "Builds targetable audience cohorts and pricing inputs for direct campaigns.", "type": "service"}], "interfaces": [{"title": "Audience planning UI", "description": "Commercial planning and segment definition tooling.", "type": "ui"}], "dataDependencies": [{"assetId": "audience-profile", "role": "read", "description": "Reads audience profiles to build commercial audience products.", "storeIds": ["audience-profile-store"]}], "brickDependencies": [{"targetBrickId": "cons", "type": "policy", "interface": "Consent policy service", "description": "Uses consent-safe activation rules."}, {"targetBrickId": "anal", "type": "insight", "interface": "Audience measurement", "description": "Uses performance and value signals to refine segments and pricing."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "segm.png"}}, {"brickId": "adop", "change": "Improve campaign delivery controls and diagnostics.", "brick": {"id": "adop", "name": "Advertising Operations and Delivery", "type": "full-stack", "description": "Campaign booking, pacing, delivery, policy controls, and advertiser operational workflows.", "domain": "Publishing and Monetization", "group": "Revenue and partnerships", "internalModules": [{"title": "Campaign delivery core", "description": "Manages campaign pacing, placement constraints, and execution state.", "type": "service"}], "interfaces": [{"title": "Ad operations UI", "description": "Commercial interfaces for campaign setup and monitoring.", "type": "ui"}], "dataDependencies": [{"assetId": "ad-campaign", "role": "own", "description": "Owns campaign operational state and delivery settings.", "storeIds": ["ad-campaign-db"]}], "brickDependencies": [{"targetBrickId": "segm", "type": "composition", "interface": "Audience product API", "description": "Uses audience definitions and pricing products."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "adop.png"}}, {"brickId": "anal", "change": "Improve measurement definitions and advertiser reporting.", "brick": {"id": "anal", "name": "Analytics, Measurement, and Insight", "type": "full-stack", "description": "Shared KPI definitions, reporting, audience insight, and commercial measurement across the domain.", "domain": "Trust Data and Foundations", "group": "Identity and control plane", "internalModules": [{"title": "Metrics semantic layer", "description": "Defines shared customer, subscriber, editorial, and commercial metrics.", "type": "service"}], "interfaces": [{"title": "Insight dashboards", "description": "Internal and selected external reporting surfaces.", "type": "ui"}], "dataDependencies": [{"assetId": "campaign-performance", "role": "read", "description": "Reads campaign performance for advertiser measurement.", "storeIds": ["campaign-performance-store"]}, {"assetId": "experiment-result", "role": "read", "description": "Reads experiment results to guide product decisions.", "storeIds": ["experiment-result-db"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "anal.png"}}], "deliveryChannels": [{"channelId": "ad-sales-suite", "change": "Release new sales planning and reporting views.", "channel": {"productId": "ad", "productName": "", "name": "ad-sales-suite", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["advertising-platform"], "supportingTeamIds": ["identity-data-platform", "monetization-operations"]}, "initiativeId": "initiative-digital-news-publishing-platform-2026-05-01-03", "discoveryIds": ["discovery-digital-news-publishing-platform-2026-04-15-03-campaign-proof"], "priority": "p1", "keyResultId": "digital-news-publishing-platform-2026-q2-cg3-p1/kr-1", "landingPageIndex": 2, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Digital News Publishing Platform';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Digital News Publishing Platform Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Campaign Yield and Measurement Initiative"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
