<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Digital News Publishing Platform)</title>
    <style>
    .page-type-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        border: 1px solid grey;
        text-transform: uppercase;
        margin-right: 6px;

    }
</style>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;
        padding: 6px 4px;
        font-size: 80%;
        color: #a0a0a0;
    }

    .breadcrumb {
    }

    .breadcrumb a {

        color: #343434;;
    }
</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 8px;">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Direct Habit Growth Initiative", "date": "2026-04-17", "description": "Focused investment to improve front-door quality, newsletter recirculation, and direct-return habit for high-frequency readers.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Habitual News Reader", "group": "Readers and Audience", "icon": "reader.png"}, "customerKPIs": [{"kpi": "Weekly engaged sessions", "expectedImpact": "Increase the number of meaningful weekly visits.", "description": "Increase average intentional weekly sessions to 5.0 for focus reader cohorts by improving front-door quality and repeat-return loops.", "unit": "sessions per WAU", "currentValue": "4.4", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "7-day return rate", "expectedImpact": "Increase repeat use across the week.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Registration rate from loyal readers", "expectedImpact": "Convert more repeat readers into known users.", "description": "Increase the share of loyal readers who become known users to 27% by making registration benefits more explicit.", "unit": "% of loyal readers", "currentValue": "23%", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "home", "change": "Improve homepage assembly and repeat-visit modules.", "brick": {"id": "home", "name": "Front Door and Homepage Orchestration", "type": "full-stack", "description": "Editorial and algorithmic assembly of homepages, section fronts, landing pages, and app front doors.", "links": [], "domain": "Audience Experience", "group": "Discovery and habit", "internalModules": [{"title": "Homepage assembly service", "description": "Builds ordered story rails and lead packages for each brand and entry surface.", "type": "service"}], "interfaces": [{"title": "Front door UI", "description": "Consumer-facing web and app entry surfaces.", "type": "ui"}], "dataDependencies": [{"assetId": "story-package", "role": "read", "description": "Reads story packages to assemble front doors.", "storeIds": ["story-package-db"]}, {"assetId": "audience-profile", "role": "read", "description": "Reads audience profiles for recirculation and layout decisions.", "storeIds": ["audience-profile-store"]}], "brickDependencies": [{"targetBrickId": "pack", "type": "composition", "interface": "Story package feed", "description": "Uses package-ready stories with headlines, metadata, and placements."}, {"targetBrickId": "pers", "type": "composition", "interface": "Ranking and audience signals", "description": "Uses audience and behavior signals to tailor entry surfaces."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "home.png"}}, {"brickId": "news", "change": "Improve newsletter relevance and send timing.", "brick": {"id": "news", "name": "Newsletter Lifecycle Management", "type": "full-stack", "description": "Newsletter curation, audience targeting, send orchestration, and performance feedback.", "links": [], "domain": "Audience Experience", "group": "Discovery and habit", "internalModules": [{"title": "Send orchestration", "description": "Schedules, targets, and tracks newsletter sends.", "type": "service"}], "interfaces": [{"title": "Newsletter editor tooling", "description": "Internal interfaces for briefing, curation, and audience selection.", "type": "ui"}], "dataDependencies": [{"assetId": "newsletter-subscription", "role": "own", "description": "Owns newsletter enrollment and targeting state.", "storeIds": ["newsletter-subscription-db"]}], "brickDependencies": [{"targetBrickId": "pack", "type": "composition", "interface": "Story package feed", "description": "Uses package-ready content for newsletter modules."}, {"targetBrickId": "regi", "type": "context", "interface": "Known user state", "description": "Uses reader identity and lifecycle state to tailor sends."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "news.png"}}, {"brickId": "pers", "change": "Improve recirculation quality for known readers.", "brick": {"id": "pers", "name": "Personalization and Recirculation", "type": "full-stack", "description": "Audience-aware ranking, next-story suggestions, and return-journey orchestration across surfaces.", "links": [], "domain": "Audience Experience", "group": "Discovery and habit", "internalModules": [{"title": "Recirculation ranking service", "description": "Produces next-best story and repeat-return recommendations.", "type": "service"}], "interfaces": [{"title": "Recommendation APIs", "description": "Serves personalized suggestions to homepage, article, and newsletter surfaces.", "type": "api"}], "dataDependencies": [{"assetId": "audience-profile", "role": "own", "description": "Owns the serving view of audience relevance and recency signals.", "storeIds": ["audience-profile-store"]}], "brickDependencies": [{"targetBrickId": "anal", "type": "insight", "interface": "Audience and metric definitions", "description": "Uses behavioral and measurement definitions to rank content."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "pers.png"}}], "deliveryChannels": [{"channelId": "web-cdn-edge", "change": "Release improved direct-return entry points.", "channel": {"productId": "web", "productName": "", "name": "web-cdn-edge", "type": "product", "icon": "product.png"}}, {"channelId": "email-crm", "change": "Release improved newsletter blocks and cadence.", "channel": {"productId": "email", "productName": "", "name": "email-crm", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["discovery-habit"], "supportingTeamIds": ["content-distribution", "identity-data-platform"]}, "initiativeId": "initiative-digital-news-publishing-platform-2026-04-17-01", "discoveryIds": ["discovery-digital-news-publishing-platform-2026-04-10-01-direct-habit"], "priority": "p1", "keyResultId": "digital-news-publishing-platform-2026-q2-cg1-p1/kr-1", "landingPageIndex": 4, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Digital News Publishing Platform';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Digital News Publishing Platform Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Direct Habit Growth Initiative"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
