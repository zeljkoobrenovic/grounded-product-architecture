    <style>

            color: #6b7280;

        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;

        }

        .description {

        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>

<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Subscriber Value and Bundle Initiative", "date": "2026-04-24", "description": "Focused investment to improve premium packaging, entitlement clarity, renewal recovery, and partner bundle activation.", "customerImpact": [{"customerId": "cg2-p1", "customer": {"id": "cg2-p1", "name": "Paying Subscriber and Editions Reader", "group": "Subscribers and Members", "icon": "subscriber.png"}, "customerKPIs": [{"kpi": "90-day paid retention", "expectedImpact": "Reduce churn caused by entitlement or value confusion.", "description": "Increase paid reader retention to 84% by making premium access and value clearer across web, app, and bundle channels.", "unit": "% of paid readers", "currentValue": "82%", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Bundle activation rate", "expectedImpact": "Increase take-up among partner-distributed subscribers.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Average monthly reader revenue", "expectedImpact": "Increase monetized value per subscriber.", "description": "Increase average monthly revenue per paid reader to \u00a39.80 by improving retention, packaging, and bundle realization.", "unit": "GBP per subscriber per month", "currentValue": "\u00a39.10", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "subs", "change": "Improve paywall messaging, premium package comparison, and access-state clarity.", "brick": {"id": "subs", "name": "Subscription and Paywall Experience", "type": "full-stack", "description": "Paywall decisioning, premium packaging, entitlement checks, and upsell flows.", "links": [], "domain": "Audience Experience", "group": "Engagement and premium reading", "internalModules": [{"title": "Paywall rules engine", "description": "Determines access, offer, and package states by reader and content context.", "type": "service"}], "interfaces": [{"title": "Paywall and premium UI", "description": "Reader-facing offer, upgrade, and premium-access surfaces.", "type": "ui"}], "dataDependencies": [{"assetId": "paywall-entitlement", "role": "own", "description": "Owns premium access and entitlement state.", "storeIds": ["paywall-entitlement-db"]}], "brickDependencies": [{"targetBrickId": "bill", "type": "composition", "interface": "Subscription ledger", "description": "Uses billing and contract state to decide access."}, {"targetBrickId": "bund", "type": "composition", "interface": "Partner entitlement API", "description": "Uses partner-provided bundle entitlements."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "subs.png"}}, {"brickId": "bill", "change": "Improve renewal recovery and payment-failure handling.", "brick": {"id": "bill", "name": "Billing and Revenue Operations", "type": "full-stack", "description": "Subscription billing, renewals, settlement, and monetization exception handling across direct and partner channels.", "links": [], "domain": "Trust Data and Foundations", "group": "Identity and control plane", "internalModules": [{"title": "Subscription ledger", "description": "Tracks contracts, renewals, payment state, and revenue events.", "type": "service"}], "interfaces": [{"title": "Billing operations UI", "description": "Internal tooling for payment, renewal, and exception management.", "type": "ui"}], "dataDependencies": [{"assetId": "subscription-contract", "role": "own", "description": "Owns subscription contract and revenue state.", "storeIds": ["subscription-contract-db"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "bill.png"}}, {"brickId": "bund", "change": "Improve partner activation and entitlement sync.", "brick": {"id": "bund", "name": "Partner Bundles and Wholesale Subscriptions", "type": "full-stack", "description": "Wholesale subscription packaging, partner entitlement sync, and bundle lifecycle management.", "links": [], "domain": "Publishing and Monetization", "group": "Revenue and partnerships", "internalModules": [{"title": "Partner entitlement broker", "description": "Handles partner activation and access-state synchronization.", "type": "integration"}], "interfaces": [{"title": "Partner bundle APIs", "description": "Partner-facing integration surface for access and lifecycle events.", "type": "api"}], "dataDependencies": [{"assetId": "subscription-contract", "role": "read", "description": "Reads bundle contract and entitlement state.", "storeIds": ["subscription-contract-db"]}], "brickDependencies": [{"targetBrickId": "subs", "type": "composition", "interface": "Entitlement service", "description": "Uses subscription access logic for bundle users."}, {"targetBrickId": "bill", "type": "composition", "interface": "Contract ledger", "description": "Uses contract and settlement state for wholesale relationships."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "bund.png"}}], "deliveryChannels": [{"channelId": "partner-bundle-apis", "change": "Release partner entitlement improvements.", "channel": {"productId": "partner", "productName": "", "name": "partner-bundle-apis", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["subscriber-growth"], "supportingTeamIds": ["commerce-partnerships", "monetization-operations", "identity-data-platform"]}, "initiativeId": "initiative-digital-news-publishing-platform-2026-04-24-02", "discoveryIds": ["discovery-digital-news-publishing-platform-2026-04-12-02-subscriber-value"], "priority": "p1", "keyResultId": "digital-news-publishing-platform-2026-q2-cg2-p1/kr-1", "landingPageIndex": 3, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Digital News Publishing Platform';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Digital News Publishing Platform Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Subscriber Value and Bundle Initiative"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
