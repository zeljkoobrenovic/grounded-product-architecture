            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");

            history.pushState({}, "", '#' + tabName);

            document.getElementById('tab_' + tabName).className += " active";
        }

y, recurring permits, visitor parking, and premium access products.", "children": []}, {"id": "opal", "name": "Operator Analytics & Control Tower", "type": "service", "description": "Provides a unified operating view across occupancy, yield, compliance, channel mix, and incidents.", "children": []}]}]}, {"id": "city-intelligence", "name": "city_intelligence", "type": "group", "description": "", "children": [{"id": "city-intelligence-city-policy-and-planning", "name": "city-policy-and-planning", "type": "group", "description": "", "children": [{"id": "city", "name": "City Mobility Intelligence", "type": "service", "description": "Creates a common city-mobility data layer combining parking, curb, transport, and usage signals.", "children": []}, {"id": "plan", "name": "Planning, Scenario & Outcome Modeling", "type": "service", "description": "Models policy, pricing, and curb interventions against forecast and observed mobility outcomes.", "children": []}]}]}, {"id": "transit-operations", "name": "transit_operations", "type": "group", "description": "", "children": [{"id": "transit-operations-fare-and-device-modernization", "name": "fare-and-device-modernization", "type": "group", "description": "", "children": [{"id": "fare", "name": "Transit Fare & Open Payment Engine", "type": "service", "description": "Handles open payment, account-based fare logic, capping, and transport-payment orchestration.", "children": []}, {"id": "devi", "name": "Device & Validator Management", "type": "service", "description": "Operates transport validators, vending and handheld devices, configuration, and maintenance readiness.", "children": []}, {"id": "tops", "name": "Transit Operations Telemetry", "type": "service", "description": "Combines transaction, device, alert, and service data into one transport operations view.", "children": []}]}]}, {"id": "business-mobility", "name": "business_mobility", "type": "group", "description": "", "children": [{"id": "business-mobility-fleet-and-business-control", "name": "fleet-and-business-control", "type": "group", "description": "", "children": [{"id": "flpo", "name": "Fleet & Business Policy Controls", "type": "service", "description": "Defines employee, driver, visitor, and vehicle parking policies with account and site-level controls.", "children": []}, {"id": "bill", "name": "Business Billing, Tagging & Expense Controls", "type": "service", "description": "Supports centralized billing, cost-center allocation, session tagging, and expense governance.", "children": []}, {"id": "vist", "name": "Visitor & Temporary Access Workflows", "type": "full-stack", "description": "Coordinates guest, contractor, and short-term parking workflows with controlled authorization.", "children": []}]}]}, {"id": "partner-ecosystem", "name": "partner_ecosystem", "type": "group", "description": "", "children": [{"id": "partner-ecosystem-partner-onboarding-and-monetization", "name": "partner-onboarding-and-monetization", "type": "group", "description": "", "children": [{"id": "part", "name": "Partner API, Sandbox & Certification", "type": "integration", "description": "Provides reusable APIs, test tooling, documentation, and launch workflows for ecosystem integrations.", "children": []}, {"id": "mark", "name": "Market Catalog & Operator Rules", "type": "service", "description": "Publishes market availability, operator-specific rules, and integration constraints in one controlled catalog.", "children": []}, {"id": "pana", "name": "Partner Analytics & Revenue Reporting", "type": "service", "description": "Tracks partner transaction quality, attach, revenue mix, and onboarding performance.", "children": []}, {"id": "auto", "name": "Automotive & In-Car Data Services", "type": "integration", "description": "Supports parking, mobility, and payment experiences in connected-car and automotive partner environments.", "children": []}]}]}, {"id": "platform-foundation", "name": "platform_foundation", "type": "group", "description": "", "children": [{"id": "platform-foundation-shared-platform-services", "name": "shared-platform-services", "type": "group", "description": "", "children": [{"id": "idam", "name": "Identity & Access Management", "type": "service", "description": "Provides authentication, authorization, tenancy, and role control across operators, partners, businesses, and internal teams.", "children": []}, {"id": "intg", "name": "Enterprise Integration Layer", "type": "integration", "description": "Offers reusable connectors, canonical models, and event-driven integration with municipal, transport, payment, and partner systems.", "children": []}, {"id": "apix", "name": "API Gateway & Developer Experience", "type": "integration", "description": "Provides secure external APIs, throttling, keys, lifecycle governance, and developer-facing controls.", "children": []}, {"id": "evtp", "name": "Eventing & Process Backbone", "type": "integration", "description": "Streams business events and coordinates asynchronous workflows across parking, transit, partners, and billing.", "children": []}, {"id": "wfcm", "name": "Workflow, Case & Exception Management", "type": "service", "description": "Supports multi-step back-office workflows, SLA tracking, and coordinated exception handling.", "children": []}, {"id": "sett", "name": "Settlement, Ledger & Revenue Reconciliation", "type": "service", "description": "Provides the shared transaction ledger, settlement, reconciliation, and financial-control backbone.", "children": []}, {"id": "cmns", "name": "Communications & Notifications", "type": "full-stack", "description": "Handles email, SMS, push, and other triggered or operationally managed communications.", "children": []}, {"id": "odal", "name": "Operational Data, KPI & Analytics Platform", "type": "development", "description": "Creates the common reporting layer for KPI packs, planning analytics, and operational monitoring.", "children": []}, {"id": "cpco", "name": "Compliance, Privacy & Audit Controls", "type": "service", "description": "Implements privacy, auditability, financial-control, and regulated operational governance requirements.", "children": []}, {"id": "obsv", "name": "Observability & Reliability Operations", "type": "service", "description": "Provides logging, alerting, incident management, service health, and reliability operations.", "children": []}]}]}]};
        const bricksMetadata = bricksPayload.metadata || {};
        const bricks = bricksPayload.bricks || [];
        const brickRendering = bricksMetadata.rendering || bricksMetadata.render || {};
        const brickTypes = bricksMetadata.types || [];
        const typeColorMap = {};

        brickTypes.forEach(type => {
            typeColorMap[type.id.toLowerCase()] = type;
            typeColorMap[type.name.toLowerCase()] = type;
        });

        function colorOf(type) {
            if (type && typeColorMap[type.toLowerCase()]) {
                return typeColorMap[type.toLowerCase()].color;
            }
            return 'var(--surface-fallback)';
        }

        function normalizeBrick(item) {
            return {
                ...item,
                color: colorOf(item.type),
                isHighlighted: Boolean(item.name && item.name.includes('*'))
            };
        }

        function normalizeGroup(group) {
            return {
                ...group,
                children: (group.children || []).map(child => {
                    if ((child.type || '').toLowerCase() === 'group') {
                        return normalizeGroup(child);
                    }
                    return normalizeBrick(child);
                })
            };
        }

        function renderBrick(item) {
            const brickCard = `
                <div class="brick-card${item.isHighlighted ? ' highlighted' : ''}" style="background-color: ${item.color}">
                    <img class="brick-icon" src="icons/${item.id}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                    <div class="brick-name">${item.name || ''}</div>
                </div>
            `;

            if (!item.id) {
                return brickCard;
            }

            return `<a target="_blank" href="landing_pages/${item.id}.html">${brickCard}</a>`;
        }

        function renderGroup(group) {
            return `
                <div class="group">
                    <div class="group-title">${group.name}</div>
                    <div class="group-items">${(group.children || []).map(renderBrick).join('')}</div>
                </div>
            `;
        }

        function renderDomain(domain) {
            return `
                <section class="domain-column">
                    <div class="domain-title">${domain.name}</div>
                    <div class="domain-groups">${(domain.children || []).map(renderGroup).join('')}</div>
                </section>
            `;
        }

        function buildGroupRowLookup() {
            const lookup = {};
            ((brickRendering.rows) || []).forEach(rowInfo => {
                const row = Number(rowInfo.row) || 1;
                (rowInfo.brickIds || []).forEach(brickId => {
                    lookup[String(brickId)] = row;
                });
            });
            return lookup;
        }

        function applyRowsToHierarchy(items, groupRows) {
            return items.map(group => ({
                ...normalizeGroup(group),
                row: groupRows[String(group.id)] || Number(group.row) || 1
            }));
        }

        function filterHierarchyForRow(items, targetRow) {
            return items.filter(group => group.row === targetRow);
        }

        function renderMap(items) {
            const groupRows = buildGroupRowLookup();
            const normalizedItems = applyRowsToHierarchy(items, groupRows);
            const rows = Array.from(new Set(
                Object.values(groupRows)
                    .map(value => Number(value) || 1)
                    .concat([1])
            )).sort((left, right) => left - right);

            console.log(normalizedItems)
            console.log(rows)

            return `
                <div class="map">
                    ${rows.map(row => {
                        const rowItems = filterHierarchyForRow(normalizedItems, row);
                        if (!rowItems.length) {
                            return '';
                        }
                        return `
                            <div class="map-row" data-row="${row}">
                                ${rowItems.map(renderDomain).join('')}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderLegend() {
            return `
                <div class="legend-title">Legend:</div>
                ${brickTypes.map(type => `
                    <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
                `).join('')}
            `;
        }

        function updateBricksView() {
            document.getElementById('Current').innerHTML = renderMap(bricks);
            document.getElementById('Legend').innerHTML = renderLegend();
        }
    </script>
