<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2026-Q1 Make transit open payment dependable enough to scale</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #eaf1f7;
            color: #315b7c;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .objective {
            font-size: 19px;
            line-height: 1.55;
        }

        .metric {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 12px;
        }

        .metric-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
        }

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metric-description {
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }

        .key-result {
            margin-bottom: 10px;
            padding-left: 12px;
            border-left: 3px solid #d7dce1;
        }

        .key-result-title {
            font-weight: bold;
        }

        .entity-link:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 50px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Goals">
        </td>
        <td>
            <div class="eyebrow">Goal</div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const goal = {"id": "gtra", "title": "2026-Q1 Make transit open payment dependable enough to scale", "objective": "Reduce rollout risk in open-payment transport programs by improving device-state visibility, tap reliability, and financial exception handling.", "okrStyle": "objective-and-key-results", "status": "active", "period": {"quarter": "2026-Q1", "startDate": "2026-01-01", "endDate": "2026-03-31", "type": "current"}, "linkedCustomers": [{"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "customerGroup": "Public Transport Authorities and Operators"}], "linkedCustomerKPIs": [{"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "kpiId": "tpsr", "kpiName": "Tap success rate", "description": "Share of payment taps completed without error or fallback.", "unit": "%", "kind": "customer", "targetDirection": "increase"}, {"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "kpiId": "facr", "kpiName": "Fare capture rate", "description": "Share of journeys successfully charged under the intended fare rules.", "unit": "%", "kind": "customer", "targetDirection": "increase"}], "linkedBusinessKPIs": [{"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "kpiId": "ppvo", "kpiName": "Processed payment volume", "description": "Transaction volume processed through transit payment services.", "unit": "EUR/month", "kind": "business", "targetDirection": "increase"}], "keyResults": [{"id": "ktra", "metric": "Tap success rate", "kind": "customer", "targetDirection": "increase", "target": "Make tap-and-go work reliably during live transport operations", "baseline": "Success drops when device state and exception flows are not visible enough", "statement": "Increase tap success rate by strengthening device-state control, payment retry behavior, and monitoring."}, {"id": "ktrb", "metric": "Fare capture rate", "kind": "customer", "targetDirection": "increase", "target": "Reduce revenue leakage in open-payment operations", "baseline": "Leakage is driven by payment exceptions and weak reconciliation transparency", "statement": "Increase fare capture rate by tightening exception handling and settlement visibility."}, {"id": "ktrc", "metric": "Processed payment volume", "kind": "business", "targetDirection": "increase", "target": "Create the confidence needed for broader rollout and usage", "baseline": "Volume growth depends on making transport operators trust the platform in production", "statement": "Increase processed payment volume by making transport payment operations reliable enough for wider deployment."}], "linkedInitiatives": [{"date": "2026-02-11", "description": "Transit open-payment reliability initiative focused on improving transit fare & open payment engine, device & validator management, transit operations telemetry, and settlement, ledger & revenue reconciliation across Transit Operations Console, Validator and Driver Device Estate, and Transit Revenue Board.", "landingPageIndex": 2}], "linkedReleases": [{"date": "2026-02-26", "description": "Release of transit open-payment reliability improvements covering transit fare & open payment engine, device & validator management, transit operations telemetry, and settlement, ledger & revenue reconciliation across Transit Operations Console, Validator and Driver Device Estate, and Transit Revenue Board.", "landingPageIndex": 1}], "sourceReferences": {"customers": "customers/customers.json", "initiatives": null, "releases": null}};
    const domainName = 'Arrive';

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) {
            return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        }
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(metric.kpiName) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind) + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + ' | ' + escapeHtml(metric.targetDirection) + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderExecutionItem(item, typeName) {
        const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
            ? (typeName === 'initiative'
                ? '../../initiatives/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '../../releases/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html')
            : '';
        let html = '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(target, item.description || item.id, 'list-title') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(item.date || '') + '</div>';
        if (item.customerIds && item.customerIds.length) {
            html += '<div class="list-description">Customers: ' + escapeHtml(item.customerIds.join(', ')) + '</div>';
        }
        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="list-description">Channels: ' + escapeHtml(item.deliveryChannels.join(', ')) + '</div>';
        }
        if (item.productBricks && item.productBricks.length) {
            html += '<div class="list-description">Bricks: ' + escapeHtml(item.productBricks.join(', ')) + '</div>';
        }
        html += '</div>';
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(goal.title || 'Goal');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(goal.period.quarter) + ' | ' + escapeHtml(goal.status || '');

    let html = '';
    html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(goal.objective || '') + '</div></div>';

    if (goal.linkedCustomers && goal.linkedCustomers.length) {
        html += '<div class="section"><div class="section-title">Linked Customers</div>';
        goal.linkedCustomers.forEach(customer => {
            html += '<div class="pill"><div><div class="pill-name">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (goal.keyResults && goal.keyResults.length) {
        html += '<div class="section"><div class="section-title">Key Results</div>';
        goal.keyResults.forEach(item => {
            html += '<div class="key-result"><div class="key-result-title">' + escapeHtml(item.metric) + '</div><div>' + escapeHtml(item.statement) + '</div><div class="metric-meta">' + escapeHtml(item.targetDirection) + ' | ' + escapeHtml(item.target) + '</div></div>';
        });
        html += '</div>';
    }

    if ((goal.linkedCustomerKPIs && goal.linkedCustomerKPIs.length) || (goal.linkedBusinessKPIs && goal.linkedBusinessKPIs.length)) {
        html += '<div class="section"><div class="section-title">Linked KPIs</div>';
        (goal.linkedCustomerKPIs || []).forEach(metric => {
            html += renderMetric(metric);
        });
        (goal.linkedBusinessKPIs || []).forEach(metric => {
            html += renderMetric(metric);
        });
        html += '</div>';
    }

    html += '<div class="section"><div class="section-title">Execution Links</div>';
    if (goal.linkedInitiatives && goal.linkedInitiatives.length) {
        goal.linkedInitiatives.forEach(item => {
            html += renderExecutionItem(item, 'initiative');
        });
    } else {
        html += '<div class="list-row"><div class="list-description">No initiatives linked to this goal.</div></div>';
    }
    html += '</div>';

    html += '<div class="section"><div class="section-title">Release Links</div>';
    if (goal.linkedReleases && goal.linkedReleases.length) {
        goal.linkedReleases.forEach(item => {
            html += renderExecutionItem(item, 'release');
        });
    } else {
        html += '<div class="list-row"><div class="list-description">No releases linked to this goal.</div></div>';
    }
    html += '</div>';

    if (goal.sourceReferences) {
        html += '<div class="section"><div class="section-title">Source References</div>';
        Object.keys(goal.sourceReferences).forEach(key => {
            if (goal.sourceReferences[key]) {
                html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(key) + '</div><div class="pill-meta">' + escapeHtml(goal.sourceReferences[key]) + '</div></div></div>';
            }
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
