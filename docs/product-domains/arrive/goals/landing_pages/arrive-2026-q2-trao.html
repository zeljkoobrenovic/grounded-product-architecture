<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2026-Q2 Transit Revenue and Operations Executive outcome goal</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #eaf1f7;
            color: #315b7c;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .objective {
            font-size: 19px;
            line-height: 1.55;
        }

        .metric {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 12px;
        }

        .metric-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
        }

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metric-description {
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }

        .key-result {
            margin-bottom: 10px;
            padding-left: 12px;
            border-left: 3px solid #d7dce1;
        }

        .key-result-title {
            font-weight: bold;
        }

        .entity-link:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 50px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Goals">
        </td>
        <td>
            <div class="eyebrow">Goal</div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const goal = {"id": "arrive-2026-q2-trao", "title": "2026-Q2 Transit Revenue and Operations Executive outcome goal", "objective": "Prepare to improve Increase share of transit rides with low-friction digital payment for Transit Revenue and Operations Executive by advancing operational reliability and payment modernization through open payment transit core.", "okrStyle": "objective-and-key-results", "status": "planned", "period": {"quarter": "2026-Q2", "startDate": "2026-04-01", "endDate": "2026-06-30", "type": "next"}, "linkedCustomers": [{"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "customerGroup": "Public Transport Authorities and Operators"}], "linkedCustomerKPIs": [{"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "kpiId": "CO-PT-TOP", "kpiName": "Fare system effectiveness", "description": "Economic and operational performance of transit payment and ticketing systems", "unit": "index score", "kind": "customer", "targetDirection": "increase"}, {"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "kpiId": "CO-PT-B1", "kpiName": "Boarding efficiency", "description": "", "unit": "", "kind": "customer", "targetDirection": "increase"}], "linkedBusinessKPIs": [{"customerId": "trao", "customerName": "Transit Revenue and Operations Executive", "kpiId": "BO-PT-TOP", "kpiName": "Transit platform ARR", "description": "Recurring software and platform revenue from transit customers", "unit": "EUR ARR", "kind": "business", "targetDirection": "increase"}], "keyResults": [{"id": "kr-1", "metric": "Fare system effectiveness", "kind": "customer", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Increase Fare system effectiveness during the quarter."}, {"id": "kr-2", "metric": "Boarding efficiency", "kind": "customer", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Increase Boarding efficiency during the quarter."}, {"id": "kr-3", "metric": "Transit platform ARR", "kind": "business", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Increase Transit platform ARR during the quarter."}], "linkedInitiatives": [{"id": "initiatives-2026-01-15-23", "date": "2026-01-15", "description": "Open Parking Partner Hub initiative focused on improving reserved parking module, parking plus ev payment orchestration, strengthening customer value for Fleet Mobility and Expense Manager, and evolving delivery across Open Parking Partner Hub Web Workspace, Open Parking Partner Hub Dashboard.", "customerIds": ["trao"], "deliveryChannels": ["P3-open-parking-partner-hub-web-workspace", "P3-dashboard", "P3-partner-api"], "productBricks": ["rpmo", "ppep", "okco", "oren"], "landingPageIndex": 6}, {"id": "initiatives-2026-02-15-26", "date": "2026-02-15", "description": "Open Parking Partner Hub initiative focused on improving reserved parking module, parking plus ev payment orchestration, strengthening customer value for Urban Mobility Policy Director, and evolving delivery across Open Parking Partner Hub Web Workspace, Open Parking Partner Hub Dashboard.", "customerIds": ["trao"], "deliveryChannels": ["P3-open-parking-partner-hub-web-workspace", "P3-dashboard", "P3-partner-api"], "productBricks": ["rpmo", "ppep", "okco", "oren"], "landingPageIndex": 3}, {"id": "initiatives-2026-03-13-29", "date": "2026-03-13", "description": "Open Parking Partner Hub initiative focused on improving reserved parking module, parking plus ev payment orchestration, strengthening customer value for Mobility Platform Partner Manager, and evolving delivery across Open Parking Partner Hub Web Workspace, Open Parking Partner Hub Dashboard.", "customerIds": ["trao"], "deliveryChannels": ["P3-open-parking-partner-hub-web-workspace", "P3-dashboard", "P3-partner-api"], "productBricks": ["rpmo", "ppep", "okco", "oren"], "landingPageIndex": 1}], "linkedReleases": [{"id": "releases-2026-01-18-23", "date": "2026-01-18", "description": "Release of Open Parking Partner Hub improvements covering reserved parking module, parking plus ev payment orchestration across Open Parking Partner Hub Web Workspace, Open Parking Partner Hub Dashboard.", "customerIds": ["trao"], "deliveryChannels": ["P3-open-parking-partner-hub-web-workspace", "P3-dashboard", "P3-partner-api"], "productBricks": ["rpmo", "ppep", "okco", "oren"], "landingPageIndex": 6}, {"id": "releases-2026-02-18-26", "date": "2026-02-18", "description": "Release of Open Parking Partner Hub improvements covering reserved parking module, parking plus ev payment orchestration across Open Parking Partner Hub Web Workspace, Open Parking Partner Hub Dashboard.", "customerIds": ["trao"], "deliveryChannels": ["P3-open-parking-partner-hub-web-workspace", "P3-dashboard", "P3-partner-api"], "productBricks": ["rpmo", "ppep", "okco", "oren"], "landingPageIndex": 3}, {"id": "releases-2026-03-13-29", "date": "2026-03-13", "description": "Release of Open Parking Partner Hub improvements covering reserved parking module, parking plus ev payment orchestration across Open Parking Partner Hub Web Workspace, Open Parking Partner Hub Dashboard.", "customerIds": ["trao"], "deliveryChannels": ["P3-open-parking-partner-hub-web-workspace", "P3-dashboard", "P3-partner-api"], "productBricks": ["rpmo", "ppep", "okco", "oren"], "landingPageIndex": 1}], "sourceReferences": {"customers": "customers/customers.json", "initiatives": "delivery/initiatives.json", "releases": "delivery/releases.json"}};
    const domainName = 'Arrive';

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) {
            return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        }
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(metric.kpiName) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind) + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + ' | ' + escapeHtml(metric.targetDirection) + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderExecutionItem(item, typeName) {
        const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
            ? (typeName === 'initiative'
                ? '../../initiatives/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '../../releases/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html')
            : '';
        let html = '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(target, item.description || item.id, 'list-title') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(item.date || '') + '</div>';
        if (item.customerIds && item.customerIds.length) {
            html += '<div class="list-description">Customers: ' + escapeHtml(item.customerIds.join(', ')) + '</div>';
        }
        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="list-description">Channels: ' + escapeHtml(item.deliveryChannels.join(', ')) + '</div>';
        }
        if (item.productBricks && item.productBricks.length) {
            html += '<div class="list-description">Bricks: ' + escapeHtml(item.productBricks.join(', ')) + '</div>';
        }
        html += '</div>';
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(goal.title || 'Goal');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(goal.period.quarter) + ' | ' + escapeHtml(goal.status || '');

    let html = '';
    html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(goal.objective || '') + '</div></div>';

    if (goal.linkedCustomers && goal.linkedCustomers.length) {
        html += '<div class="section"><div class="section-title">Linked Customers</div>';
        goal.linkedCustomers.forEach(customer => {
            html += '<div class="pill"><div><div class="pill-name">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (goal.keyResults && goal.keyResults.length) {
        html += '<div class="section"><div class="section-title">Key Results</div>';
        goal.keyResults.forEach(item => {
            html += '<div class="key-result"><div class="key-result-title">' + escapeHtml(item.metric) + '</div><div>' + escapeHtml(item.statement) + '</div><div class="metric-meta">' + escapeHtml(item.targetDirection) + ' | ' + escapeHtml(item.target) + '</div></div>';
        });
        html += '</div>';
    }

    if ((goal.linkedCustomerKPIs && goal.linkedCustomerKPIs.length) || (goal.linkedBusinessKPIs && goal.linkedBusinessKPIs.length)) {
        html += '<div class="section"><div class="section-title">Linked KPIs</div>';
        (goal.linkedCustomerKPIs || []).forEach(metric => {
            html += renderMetric(metric);
        });
        (goal.linkedBusinessKPIs || []).forEach(metric => {
            html += renderMetric(metric);
        });
        html += '</div>';
    }

    html += '<div class="section"><div class="section-title">Execution Links</div>';
    if (goal.linkedInitiatives && goal.linkedInitiatives.length) {
        goal.linkedInitiatives.forEach(item => {
            html += renderExecutionItem(item, 'initiative');
        });
    } else {
        html += '<div class="list-row"><div class="list-description">No initiatives linked to this goal.</div></div>';
    }
    html += '</div>';

    html += '<div class="section"><div class="section-title">Release Links</div>';
    if (goal.linkedReleases && goal.linkedReleases.length) {
        goal.linkedReleases.forEach(item => {
            html += renderExecutionItem(item, 'release');
        });
    } else {
        html += '<div class="list-row"><div class="list-description">No releases linked to this goal.</div></div>';
    }
    html += '</div>';

    if (goal.sourceReferences) {
        html += '<div class="section"><div class="section-title">Source References</div>';
        Object.keys(goal.sourceReferences).forEach(key => {
            if (goal.sourceReferences[key]) {
                html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(key) + '</div><div class="pill-meta">' + escapeHtml(goal.sourceReferences[key]) + '</div></div></div>';
            }
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
