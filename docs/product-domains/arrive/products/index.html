<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products (Arrive)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        .section {
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .group {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .doc {
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 11px;
            background-color: white;
            vertical-align: top;
        }

        a {
            text-decoration: none;
        }

        .icon {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 26px;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        a {
            color: inherit;
        }

        ::placeholder {
            color: lightgrey;
            opacity: 1;
        }

        :-ms-input-placeholder {
            color: lightgrey;
        }

        ::-ms-input-placeholder {
            color: lightgrey;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
            max-width: 960px;
            line-height: 1.4;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function openTab(evt, cityName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(cityName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</head>
<body>
<div class="domain-label">Arrive</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link" href="../customers/index.html">Customers</a>
    <a class="section-link" href="../product-bricks/index.html">Product Bricks</a>
    <a class="section-link active" href="../products/index.html">Products</a>
    <a class="section-link" href="../goals/index.html">Goals</a>
    <a class="section-link" href="../initiatives/index.html">Initiatives</a>
    <a class="section-link" href="../releases/index.html">Releases</a>
</div>

<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Products"></td>
            <td class="hero-copy-cell">
                <div class="hero-title">Products</div>
                <div class="hero-subtitle">Arrive | The Arrive domain covers the digital products and platform capabilities needed to power parking discovery, booking, access, operations, and partner integrations.</div>
            </td>
        </tr>
    </table>
</div>

<div class="tab">
    <button class="tablinks active" id="tab_products" onclick="openTab('products')">Products</button>
</div>
<div>
    <div id="products" style="display: block" class="tabcontent"></div>
</div>

<script>
    const products = {"portfolio": {"name": "Arrive Portfolio", "version": "1.0", "products": [{"id": "P1", "name": "Parking Operations Platform", "type": "B2B Operations", "primaryCustomers": [{"id": "mpdu", "name": "Municipal Parking Director"}], "interfaces": [{"type": "web", "name": "Parking Operations Platform Web Workspace", "description": "Primary browser workspace for Parking Operations Platform.", "users": ["Users"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Parking Operations Platform Dashboard", "description": "Operational analytics view for Parking Operations Platform.", "users": ["Managers"], "availabilityHorizon": "1_year"}, {"type": "api", "name": "Parking Operations Platform API", "description": "Integration API for Parking Operations Platform.", "users": ["Internal Systems", "Partners"], "availabilityHorizon": "1_year"}], "neededCapabilities": [{"capabilityCode": "updm", "capabilityName": "Unified parking data model", "whyNeeded": "Needed by Parking Operations Platform to support a key workflow.", "mappingType": "generated_from_customers"}, {"capabilityCode": "inla", "capabilityName": "Integration layer", "whyNeeded": "Needed by Parking Operations Platform to support a key workflow.", "mappingType": "generated_from_customers"}, {"capabilityCode": "mppa", "capabilityName": "Mobile paid parking", "whyNeeded": "Needed by Parking Operations Platform to support a key workflow.", "mappingType": "generated_from_customers"}, {"capabilityCode": "spst", "capabilityName": "Smart payment stations", "whyNeeded": "Needed by Parking Operations Platform to support a key workflow.", "mappingType": "generated_from_customers"}]}, {"id": "P2", "name": "Driver Parking Experience", "type": "B2C / Driver", "primaryCustomers": [{"id": "umpd", "name": "Urban Mobility Policy Director"}], "interfaces": [{"type": "web", "name": "Driver Parking Experience Web Workspace", "description": "Primary browser workspace for Driver Parking Experience.", "users": ["Users"], "availabilityHorizon": "live"}, {"type": "mobile_app", "name": "Driver Parking Experience Mobile App", "description": "Mobile surface for Driver Parking Experience.", "users": ["Mobile Users"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Driver Parking Experience Dashboard", "description": "Operational analytics view for Driver Parking Experience.", "users": ["Managers"], "availabilityHorizon": "1_year"}, {"type": "api", "name": "Driver Parking Experience API", "description": "Integration API for Driver Parking Experience.", "users": ["Internal Systems", "Partners"], "availabilityHorizon": "1_year"}], "neededCapabilities": [{"capabilityCode": "laco", "capabilityName": "LPR access control", "whyNeeded": "Needed by Driver Parking Experience to support a key workflow.", "mappingType": "generated_from_customers"}, {"capabilityCode": "rpen", "capabilityName": "Responsive pricing engine", "whyNeeded": "Needed by Driver Parking Experience to support a key workflow.", "mappingType": "generated_from_customers"}, {"capabilityCode": "pmco", "capabilityName": "Policy management controls", "whyNeeded": "Needed by Driver Parking Experience to support a key workflow.", "mappingType": "generated_from_customers"}, {"capabilityCode": "anda", "capabilityName": "Analytics dashboards", "whyNeeded": "Needed by Driver Parking Experience to support a key workflow.", "mappingType": "generated_from_customers"}]}, {"id": "P3", "name": "Open Parking Partner Hub", "type": "Partner Ecosystem", "primaryCustomers": [{"id": "trao", "name": "Transit Revenue and Operations Executive"}], "interfaces": [{"type": "web", "name": "Open Parking Partner Hub Web Workspace", "description": "Primary browser workspace for Open Parking Partner Hub.", "users": ["Users"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Open Parking Partner Hub Dashboard", "description": "Operational analytics view for Open Parking Partner Hub.", "users": ["Managers"], "availabilityHorizon": "1_year"}, {"type": "api", "name": "Open Parking Partner Hub API", "description": "Integration API for Open Parking Partner Hub.", "users": ["Internal Systems", "Partners"], "availabilityHorizon": "1_year"}], "neededCapabilities": [{"capabilityCode": "rpmo", "capabilityName": "Reserved parking module", "whyNeeded": "Needed by Open Parking Partner Hub to support a key workflow.", "mappingType": "generated_from_customers"}, {"capabilityCode": "ppep", "capabilityName": "Parking plus EV payment orchestration", "whyNeeded": "Needed by Open Parking Partner Hub to support a key workflow.", "mappingType": "generated_from_customers"}, {"capabilityCode": "okco", "capabilityName": "Operational KPI cockpit", "whyNeeded": "Needed by Open Parking Partner Hub to support a key workflow.", "mappingType": "generated_from_customers"}, {"capabilityCode": "oren", "capabilityName": "Operator rule engine", "whyNeeded": "Needed by Open Parking Partner Hub to support a key workflow.", "mappingType": "generated_from_customers"}]}]}};

    console.log(products);

    function update() {
        let html = '';

        products.portfolio.products.forEach(product => {
            html += '<a target="_blank" href="landing_pages/' + product.id + '.html" onerror="">';
            html += '<div class="doc" style="text-align: left">';
            html += '<table style="margin-bottom: 24px">';
            html += '<tr>';
            html += '<td style="padding-right: 20px">';
            html += '<div style="text-align: left">';
            html += '<img src="icons/' + product.icon + '" style="height: 100px; border: 1px solid lightgrey; border-radius: 50%; box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;" onerror="this.onerror=null;this.src=\'icons/product.png\'">';
            html += '</div>';
            html += '</td>';
            html += '<td>';
            product.primaryCustomers.forEach(customer => {
                html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px">';
                html += customer.name;
                html += '</div>';
            });
            html += '<div style="color: blue; margin-bottom: 2px; margin-top: 2px; font-size: 240%">' + product.name + '</div>';
            html += '</td>';
            html += '</tr>';
            html += '</table>';

            html += '<table style="text-align: center">';
            html += '<tr>';
            html += '<td style="max-width: 200px; vertical-align: bottom">';
            product.interfaces.forEach(interface => {
                html += '<div style="text-align: center; max-width: 200px; vertical-align: bottom; display: inline-block">';
                html += '<div style="border: 2px solid white; padding: 8px; margin: 5px; margin-bottom: 20px; color: black; display: inline-block">';
                interface.users.forEach(user => {
                    html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px; font-size: 80%">';
                    html += user;
                    html += '</div>';
                });
                html += '</div>';
                html += '<div style="text-align: center; max-width: 200px; vertical-align: top">';
                html += '<div style="border: 2px solid grey; padding: 8px; margin: 5px; vertical-align: top">';
                html += '<img src="icons/' + interface.type + '.png" style="height: 42px; margin: 0; margin-top: -28px; background-color: rgba(255,255,255,1)">';
                html += '<div style="color: blue; margin-bottom: 0px; height: 2em; margin-top: 0; color: grey; font-size: 80%">' + interface.type + '</div>';
                html += '<div style="color: blue; margin-bottom: 10px; height: 2em; margin-top: 0px">' + interface.name + '</div>';
                html += '</div>';
                html += '</div>';
                html += '</div>';

            });
            html += '</td>';
            html += '</tr>';

            html += '<tr>';
            html += '<td colspan="100" style="text-align: center; padding: 0">';
            html += '<div style="text-align: center; border: 3px solid grey; margin: 10px; padding: 10px; margin-top: -3px">';
            if (product.neededCapabilities) {
                product.neededCapabilities.forEach(capability => {
                    html += '<div style="display: inline-block; width: 200px; vertical-align: bottom; margin: 3px;">';
                    html += '<div style="text-align: left; border: 1px dashed grey; padding: 8px;">';
                    html += '<div style="color: blue; margin-bottom: 4px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 90%">' + capability.capabilityName + '</div>';
                    html += '<div style="color: grey; margin-bottom: 10px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 70%">' + capability.whyNeeded + '</div>';
                    html += '</div>';
                    html += '</div>';
                });
            }
            html += '</div>';
            html += '</td>';
            html += '</tr>';
            html += '</table>';


            html += '</div>';
        });

        document.getElementById('products').innerHTML = html;
    }

    update();
</script>
</body>
</html>
