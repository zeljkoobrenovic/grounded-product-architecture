    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;

        .eyebrow {

            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>

<tr>

</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "partner launch and automotive-integration Release", "date": "2026-03-18", "description": "Release of partner launch and automotive-integration improvements covering partner API, sandbox & certification, market catalog & operator rules, partner analytics & revenue reporting, and automotive & in-car data services across Partner APIs and SDKs, Partner Workspace, and Partner Performance Board.", "customerImpact": [{"customerId": "mppm", "customer": {"id": "mppm", "name": "Mobility Platform Partner Manager", "group": "Mobility Ecosystem Partners", "icon": "mppm.png"}, "customerKPIs": [{"kpi": "Time to launch a new market", "expectedImpact": "Improve time to launch a new market through clearer certification and market-readiness workflows.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Transaction success rate", "expectedImpact": "Improve transaction success rate through stronger rule clarity and partner diagnostics.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Ecosystem gross profit", "expectedImpact": "Improve ecosystem gross profit by enabling faster partner scale and better attach reporting.", "description": "Gross profit generated through partner-originated transactions and attach services.", "unit": "EUR/month", "kind": "business"}]}], "productBricks": [{"brickId": "part", "change": "Released reusable certification and market-onboarding controls.", "brick": {"id": "part", "name": "Partner API, Sandbox & Certification", "type": "integration", "description": "Provides reusable APIs, test tooling, documentation, and launch workflows for ecosystem integrations.", "domain": "partner_ecosystem", "group": "partner-onboarding-and-monetization", "internalModules": [{"title": "Contract and Mapping Layer", "description": "Maintains schemas, field mappings, and versioned contracts used by Partner API, Sandbox & Certification.", "type": "integration"}, {"title": "Transformation and Routing Engine", t reporting.", "brick": {"id": "pana", "name": "Partner Analytics & Revenue Reporting", "type": "service", "description": "Tracks partner transaction quality, attach, revenue mix, and onboarding performance.", "domain": "partner_ecosystem", "group": "partner-onboarding-and-monetization", "internalModules": [{"title": "Transaction and Ledger Core", "description": "Records the core financial or commercial transactions handled by Partner Analytics & Revenue Reporting.", "type": "finance"}, {"title": "Settlement and Reconciliation", "description": "Matches external outcomes, balances, and exceptions flowing through Partner Analytics & Revenue Reporting.", "type": "operations"}, {"title": "Billing Rules and Controls", "description": "Applies pricing, billing, tax, or financial control logic inside Partner Analytics & Revenue Reporting.", "type": "policy"}], "interfaces": [{"title": "Transaction API", "description": "API surface for submitting or retrieving financial transactions handled by Partner Analytics & Revenue Reporting.", "type": "api"}, {"title": "Finance Operations Workspace", "description": "User interface for reconciliation, exception handling, and financial oversight in Partner Analytics & Revenue Reporting.", "type": "ui"}, {"title": "Settlement and Ledger Events", "description": "Event stream carrying posting, settlement, and status changes from Partner Analytics & Revenue Reporting.", "type": "event"}], "brickDependencies": [{"targetBrickId": "resv", "type": "workflow", "interface": "Workflow API", "description": "Depends on Reservations & Permit Inventory to provide operations capabilities required by Partner Analytics & Revenue Reporting."}, {"targetBrickId": "acce", "type": "event-subscription", "interface": "Audit Event Stream", "description": "Depends on Access, Permit & LPR Control to provide identity capabilities required by Partner Analytics & Revenue Reporting."}, {"targetBrickId": "part", "type": "partner-connectivity", "interface": "Partner Connector Surface", "description": "Depends on Partner API, Sandbox & Certification to provide integration capabilities required by Partner Analytics & Revenue Reporting."}], "externalSystemsThisBrickDependsOn": [{"system": "Payment Schemes and PSPs", "type": "financial-network", "interface": "Payment APIs", "description": "Partner Analytics & Revenue Reporting depends on external payment or banking networks to authorize and settle transactions."}, {"system": "Accounting or ERP Systems", "type": "back-office", "interface": "ERP Interface", "description": "Partner Analytics & Revenue Reporting exchanges postings, reconciliations, or settlement outcomes with finance back-office systems."}], "externalSystemsDependingOnThisBrick": [{"system": "Checkout and Billing Flows", "type": "transaction-consumer", "interface": "Payment / Posting API", "description": "Commercial flows depend on Partner Analytics & Revenue Reporting to authorize, post, reconcile, or settle financial transactions."}, {"system": "Finance and Reporting Systems", "type": "finance-consumer", "interface": "Ledger / Settlement Feed", "description": "Back-office finance consumers depend on Partner Analytics & Revenue Reporting for accounting, settlement, and reconciliation outputs."}], "icon": "pana.png"}}, {"brickId": "auto", "change": "Released stronger connected-car parking and mobility service patterns.", "brick": {"id": "auto", "name": "Automotive & In-Car Data Services", "type": "integration", "description": "Supports parking, mobility, and payment experiences in connected-car and automotive partner environments.", "domain": "partner_ecosystem", "group": "partner-onboarding-and-monetization", "internalModules": [{"title": "Contract and Mapping Layer", "description": "Maintains schemas, field mappings, and versioned contracts used by Automotive & In-Car Data Services.", "type": "integration"}, {"title": "Transformation and Routing Engine", "description": "Transforms messages and routes requests or events through Automotive & In-Car Data Services.", "type": "service"}, {"title": "Access and Observability Controls", "description": "Applies authentication, throttling, retry handling, and monitoring for Automotive & In-Car Data Services.", "type": "platform"}], "interfaces": [{"title": "Inbound API", "description": "API entry point used to submit requests or payloads into Automotive & In-Car Data Services.", "type": "api"}, {"title": "Outbound Event Feed", "description": "Event or webhook surface used by Automotive & In-Car Data Services to publish downstream updates.", "type": "event"}, {"title": "Partner Connector Surface", "description": "Connector interface for external systems exchanging data through Automotive & In-Car Data Services.", "type": "integration"}], "brickDependencies": [{"targetBrickId": "acce", "type": "identity", "interface": "Authentication API", "description": "Depends on Access, Permit & LPR Control to provide identity capabilities required by Automotive & In-Car Data Services."}, {"targetBrickId": "resv", "type": "event-subscription", "interface": "Lifecycle Status Events", "description": "Depends on Reservations & Permit Inventory to provide operations capabilities required by Automotive & In-Car Data Services."}, {"targetBrickId": "opal", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Operator Analytics & Control Tower to provide analytics capabilities required by Automotive & In-Car Data Services."}], "externalSystemsThisBrickDependsOn": [{"system": "Partner Platforms", "type": "external-integration", "interface": "Partner API", "description": "Automotive & In-Car Data Services exchanges operational data with external partner platforms and adjacent systems."}, {"system": "Event Broker or Messaging Infrastructure", "type": "platform", "interface": "Event / Queue Interface", "description": "Automotive & In-Car Data Services depends on messaging infrastructure to route and buffer integration traffic."}], "externalSystemsDependingOnThisBrick": [{"system": "Internal Domain Services", "type": "integration-consumer", "interface": "API / Event Gateway", "description": "Internal services depend on Automotive & In-Car Data Services to connect reliably with partner systems and adjacent platforms."}, {"system": "Partner Operations", "type": "partner-consumer", "interface": "Connector Interface", "description": "Partner-facing workflows depend on Automotive & In-Car Data Services to exchange data and synchronize state with external parties."}], "icon": "auto.png"}}], "deliveryChannels": [{"channelId": "pask", "change": "Deployed reusable integration and launch flows in Partner APIs and SDKs.", "channel": {"productId": "", "productName": "", "name": "pask", "type": "product", "icon": "product.png"}}, {"channelId": "pwrk", "change": "Deployed market-readiness and launch guidance in Partner Workspace.", "channel": {"productId": "", "productName": "", "name": "pwrk", "type": "product", "icon": "product.png"}}, {"channelId": "ppbd", "change": "Deployed commercial and operational visibility in Partner Performance Board.", "channel": {"productId": "", "productName": "", "name": "ppbd", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["ptpl", "auts", "ptsu"], "supportingTeamIds": ["idap"]}, "landingPageIndex": 0};
    const domainName = 'Arrive';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
