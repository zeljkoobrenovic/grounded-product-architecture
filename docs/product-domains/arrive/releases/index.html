<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Releases (Arrive)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            border: none;
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }

        .summary-strip {
            margin: 0 0 14px 0;
        }

        .stat {
            display: inline-block;
            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 30px;
            color: #2f6b3b;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(430px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-header {
            margin-bottom: 12px;
        }

        .card-type {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #e8f4ea;
            color: #2f6b3b;
        }

        .card-date {
            color: #6b7280;
            font-size: 13px;
        }

        .card-description {
            font-size: 18px;
            line-height: 1.45;
            margin-bottom: 14px;
        }

        .section {
            margin-top: 14px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 10px;
            margin-bottom: 10px;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .impact-line {
            margin-bottom: 4px;
            font-size: 14px;
            line-height: 1.4;
        }

        .impact-line b {
            color: #374151;
        }

        .linked-icon {
            width: 26px;
            height: 26px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
            flex: 0 0 auto;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
            max-width: 100%;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            background-color: white;
            border: 1px solid #d7dce1;
            flex: 0 0 auto;
        }

        .pill-name {
            font-weight: bold;
        }

        .pill-meta {
            color: #6b7280;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
        }

        th {
            background-color: #f0f0f0;
            text-align: left;
            padding: 10px;
            border: 1px solid #ddd;
            white-space: nowrap;
        }

        td {
            border: 1px solid #ddd;
            padding: 10px;
            vertical-align: top;
        }

        tr:nth-child(even) td {
            background-color: #fafafa;
        }

        .mini-list {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 16px;
        }

        .overview-card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            background-color: #f8f8f8;
            padding: 14px;
            min-height: 180px;
        }

        .overview-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .overview-banner {
            border: 1px solid #c8decf;
            background: linear-gradient(135deg, #f6fff7, #f3f3f3);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .overview-banner-number {
            font-size: 62px;
            line-height: 1;
            color: #2f6b3b;
        }

        .overview-banner-text {
            color: #6b7280;
            margin-top: 4px;
        }

        .entity {
            display: inline-block;
            width: calc(50% - 12px);
            margin: 0 10px 10px 0;
            padding: 8px;
            border-radius: 6px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.05) 0 1px 2px;
            vertical-align: top;
        }

        .entity-wide {
            display: block;
            margin: 0 0 10px 0;
            padding: 8px;
            border-radius: 6px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.05) 0 1px 2px;
        }

        .entity-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .entity-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #ddd;
            background-color: white;
        }

        .entity-name {
            font-weight: bold;
            line-height: 1.3;
        }

        .entity-meta {
            color: #6b7280;
            font-size: 12px;
        }

        .empty {
            color: #6b7280;
            border: 1px dashed #d7dce1;
            border-radius: 8px;
            padding: 18px;
            background-color: #fafafa;
        }

        .open-link {
            display: inline-block;
            margin-top: 12px;
            color: #315b7c;
            font-size: 14px;
        }

        @media (max-width: 1000px) {
            .overview-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            body {
                margin: 12px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .entity {
                width: 100%;
                margin-right: 0;
            }

            .tab button {
                width: 100%;
                text-align: left;
            }
        }

    <script>
        function initTab() {
            let tabName = 'Table';
            if (window.location.hash) {
                const hash = window.location.hash.substring(1);
                if (document.getElementById('tab_' + hash)) {
                    tabName = hash;
                }
            }
            openTab(tabName);
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            history.pushState({}, '', '#' + tabName);
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
        }
    </script>
</head>

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderImpactLines(lines) {
        let html = '';
        lines.forEach(line => {
            html += '<div class="impact-line"><b>' + escapeHtml(line.kpi) + '</b>';
            if (line.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(line.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(line.expectedImpact);
            if (line.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(line.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function uniqueMap(items, keyFn, valueFn) {
        const map = {};
        items.forEach(item => {
            const key = keyFn(item);
            if (!map[key]) {
                map[key] = valueFn(item);
            }
        });
        return Object.values(map);
    }

    function collectCounts(getItems) {
        const counts = {};
        items.forEach(item => {
            getItems(item).forEach(entity => {
                const key = entity.key;
                if (!counts[key]) {
                    counts[key] = {
                        name: entity.name,
                        icon: entity.icon,
                        meta: entity.meta,
                        count: 0
                    };
                }
                counts[key].count += 1;
            });
        });
        return Object.values(counts).sort((a, b) => b.count - a.count).slice(0, 10);
    }

        const kpis = collectCounts(item => {
            let values = [];
            (item.customerImpact || []).forEach(impact => {
                values = values.concat((impact.customerKPIs || []).map(kpi => ({key: 'c-' + kpi.kpi, name: kpi.kpi, iconPath: '../customers/icons/customer.png', meta: kpi.unit || 'customer KPI'})));
                values = values.concat((impact.businessKPIs || []).map(kpi => ({key: 'b-' + kpi.kpi, name: kpi.kpi, iconPath: '../products/icons/product.png', meta: kpi.unit || 'business KPI'})));
            });
            return values;
        });

        let html = '';
        html += '<div class="overview-banner"><div class="overview-banner-number">' + items.length + '</div><div class="overview-banner-text">releases across products, product bricks, customers, channels, and KPI themes in this domain</div></div>';
        html += '<div class="overview-grid">';
        html += '<div>';
        html += renderEntities('Products In Focus', products, true);
        html += renderEntities('Customers & Personas', customers, true);
        html += '</div>';
        html += '<div>';
        html += renderEntities('Most Referenced Product Bricks', bricks, false);
        html += '</div>';
        html += '<div>';
        html += renderEntities('Recurring KPI Themes', kpis, true);
        html += '</div>';
        html += '</div>';
        document.getElementById('Overview').innerHTML = html;
    }

    renderSummary();
    renderTableTab();
    renderCardsTab();
    renderOverviewTab();
</script>
</body>
</html>
