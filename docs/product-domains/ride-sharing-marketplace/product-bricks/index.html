            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;

            padding: 14px;

            padding: 18px;

            grid-template-columns: 320px minmax(0, 1fr);
            gap: 18px;
            align-items: start;

        .matrix-controls {

            border-radius: 8px;
            background-color: #f8fafc;
            padding: 14px;

            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;

            width: max-content;

            border-right: 1px solid #f3f4f6;
            padding: 6px;
            text-align: center;
            vertical-align: middle;

        .matrix-table th {
            position: sticky;
            top: 0;
            background-color: #f8fafc;
            z-index: 1;

        .matrix-row-head {
            position: sticky;
            left: 0;
            background-color: white;
            min-width: 220px;
            text-align: left;
            z-index: 1;

        .matrix-corner {

            left: 0;
            top: 0;

            background-color: #f8fafc;
            min-width: 220px;
            text-align: left;
        }

        .matrix-col-icon {

            height: 14px;
            object-fit: contain;
        }

        .matrix-col-count {
            font-size: 10px;
            color: #6b7280;
            min-width: 24px;
        }

        .matrix-row-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 80%;
            text-align: left;
        }

        .matrix-row-count {
            margin-left: auto;
            font-size: 11px;
            color: #6b7280;

        .matrix-row-icon {
            width: 18px;
            height: 18px;

        .matrix-empty-cell {
            color: #d1d5db;
        }

        @media (max-width: 1080px) {
            .dependencies-layout {
                grid-template-columns: 1fr;
            }

            .matrix-layout {
                grid-template-columns: 1fr;
            }

                    <div class="capability-area-title">Bricks In Two Or More Capabilities</div>
                    ${showDescriptions ? '<div class="capability-group-copy">Implementation bricks reused across multiple capabilities.</div>' : ''}
                    <div class="capability-pills">${reusedBricks.length ? reusedBricks.map(brick => renderBrickAuditItem(brick, brickUsage[brick.id] || [])).join('') : '<span class="activity-muted">No bricks are shared across two or more capabilities.</span>'}</div>
                </div>
            `;
        }

        function getDependencyCatalog() {
            const capabilities = getCapabilityCatalogItems();
            const brickCatalog = getBrickCatalog();
            const referencedBrickIds = new Set();
            const dependencyTypes = new Set();
            capabilities.forEach(capability => {
                (capability.brickDependencies || []).forEach(dep => dependencyTypes.add(dep.type || 'unspecified'));
                (capability.brickDependencies || []).forEach(dep => referencedBrickIds.add(dep.targetBrickId || ''));
            });
            return {
                capabilities: capabilities,
                bricks: brickCatalog.filter(item => referencedBrickIds.has(item.id)),
                dependencyTypes: Array.from(dependencyTypes).sort((left, right) => left.localeCompare(right))
            };
        }

        function renderChecklistItems(items, kind) {
            if (!items.length) {
                return '<div class="dependency-empty">No items available.</div>';
            }

            return items.map(item => {
                if (kind === 'capability') {
                    return `
                        <label class="dependency-check-item">
                            <input type="checkbox" class="dependency-capability-checkbox" value="${item.id}" checked onchange="renderDependenciesView()">
                            <span>
                                <span>${item.name}</span>
                                <span class="dependency-check-meta">${item.domain}${item.group && item.group !== item.domain ? ' / ' + item.group : ''}</span>
                            </span>
                        </label>
                    `;
                }
                return `
                    <label class="dependency-check-item">
                        <input type="checkbox" class="dependency-type-checkbox" value="${item}" checked onchange="renderDependenciesView()">
                        <span>${item}</span>
                    </label>
                `;
            }).join('');
        }

        function renderDependenciesControls(catalog) {
            return `
                <div class="dependency-controls">
                    <div class="dependency-control-group">
                        <div class="dependency-control-title">Product Capabilities</div>
                        <div class="dependency-actions">
                            <button class="dependency-action" type="button" onclick="setAllDependencyCheckboxes('.dependency-capability-checkbox', true)">Show all</button>
                            <button class="dependency-action" type="button" onclick="setAllDependencyCheckboxes('.dependency-capability-checkbox', false)">Hide all</button>
                        </div>
                        <div class="dependency-checklist">
                            ${renderChecklistItems(catalog.capabilities, 'capability')}
                        </div>
                    </div>
                    <div class="dependency-control-group">
                        <div class="dependency-control-title">Dependency Types</div>
                        <div class="dependency-actions">
                            <button class="dependency-action" type="button" onclick="setAllDependencyCheckboxes('.dependency-type-checkbox', true)">Show all</button>
                            <button class="dependency-action" type="button" onclick="setAllDependencyCheckboxes('.dependency-type-checkbox', false)">Hide all</button>
                        </div>
                        <div class="dependency-checklist">
                            ${renderChecklistItems(catalog.dependencyTypes, 'type')}
                        </div>
                    </div>
                    <div class="dependency-node-legend">
                        <div class="dependency-control-title">Node Legend</div>
                        <div class="dependency-node-legend-items">
                            <div class="dependency-node-legend-item">
                                <span class="dependency-node-legend-swatch" style="background-color:#fde68a; border-color:#d97706;"></span>
                                <span>Product capability</span>
                            </div>
                            <div class="dependency-node-legend-item">
                                <span class="dependency-node-legend-swatch" style="background-color:#dbeafe; border-color:#2563eb;"></span>
                                <span>Product brick</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function setAllDependencyCheckboxes(selector, checked) {
            document.querySelectorAll(selector).forEach(input => {
                input.checked = checked;
            });
            renderDependenciesView();
        }

        function setAllMatrixCheckboxes(selector, checked) {
            document.querySelectorAll(selector).forEach(input => {
                input.checked = checked;
            });
            renderMatrixView();
        }

        function selectedValues(selector) {
            return new Set(Array.from(document.querySelectorAll(selector))
                .filter(input => input.checked)
                .map(input => input.value));
        }

        function buildDependencyGraph(catalog, selectedCapabilityIds, selectedDependencyTypes) {
            const selectedCapabilities = catalog.capabilities.filter(item => selectedCapabilityIds.has(item.id));
            const graphNodes = [];
            const graphEdges = [];
            const brickNodes = {};

            selectedCapabilities.forEach(item => {
                graphNodes.push({
                    id: item.id,
                    label: item.name || item.id,
                    nodeClass: 'capabilityNode'
                });

                (item.brickDependencies || []).forEach(dep => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    const targetBrick = catalog.bricks.find(candidate => candidate.id === dep.targetBrickId) || {};
                    if (!dep.targetBrickId) {
                        return;
                    }
                    brickNodes[dep.targetBrickId] = {
                        id: dep.targetBrickId,
                        label: targetBrick.name || dep.targetBrickId,
                        nodeClass: 'brickNode'
                    };
                    graphEdges.push({
                        source: item.id,
                        target: dep.targetBrickId,
                        label: [dep.type, dep.interface].filter(Boolean).join(' / ')
                    });
                });
            });

            Object.values(brickNodes).forEach(item => graphNodes.push(item));

            return {
                nodes: graphNodes,
                edges: graphEdges
            };
        }

        function renderDependencyGraphShell() {
            return `
                <div class="dependency-graph-shell">
                    <div class="dependency-graph-summary" id="DependenciesSummary"></div>
                    <div class="dependency-graph" id="DependenciesGraph"></div>
                </div>
            `;
        }

        function renderDependenciesView() {
            const container = document.getElementById('DependenciesContent');
            if (!container) {
                return;
            }

            const catalog = getDependencyCatalog();
            if (!dependenciesInitialized) {
                container.innerHTML = `
                    <div class="dependencies-layout">
                        ${renderDependenciesControls(catalog)}
                        ${renderDependencyGraphShell()}
                    </div>
                `;
                dependenciesInitialized = true;
            }

            const selectedCapabilityIds = selectedValues('.dependency-capability-checkbox');
            const selectedDependencyTypes = selectedValues('.dependency-type-checkbox');
            const graph = buildDependencyGraph(catalog, selectedCapabilityIds, selectedDependencyTypes);

            document.getElementById('DependenciesSummary').innerHTML = `
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${selectedCapabilityIds.size}</div>
                    <div class="dependency-graph-stat-label">Capabilities Shown</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${graph.nodes.length}</div>
                    <div class="dependency-graph-stat-label">Nodes</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${graph.edges.length}</div>
                    <div class="dependency-graph-stat-label">Dependencies</div>
                </div>
            `;

            if (!graph.nodes.length || !graph.edges.length) {
                document.getElementById('DependenciesGraph').innerHTML = '<div class="dependency-empty">Select capabilities and dependency types to render the dependency map.</div>';
                return;
            }

            let chart = 'flowchart LR\n\n';
            graph.nodes.forEach(node => {
                chart += node.id.replaceAll('-', '_') + '["' + escapeMermaidLabel(node.label) + '"]\n';
            });
            graph.edges.forEach(edge => {
                chart += edge.source.replaceAll('-', '_') + ' -->|' + escapeMermaidLabel(edge.label) + '| ' + edge.target.replaceAll('-', '_') + '\n';
            });
            chart += '\nclassDef capabilityNode fill:#fde68a,stroke:#d97706,color:#7c2d12,stroke-width:2px;\n';
            chart += 'classDef brickNode fill:#dbeafe,stroke:#2563eb,color:#1e3a8a,stroke-width:2px;\n';
            const capabilityNodeIds = graph.nodes.filter(node => node.nodeClass === 'capabilityNode').map(node => node.id.replaceAll('-', '_'));
            const brickNodeIds = graph.nodes.filter(node => node.nodeClass === 'brickNode').map(node => node.id.replaceAll('-', '_'));
            if (capabilityNodeIds.length) {
                chart += 'class ' + capabilityNodeIds.join(',') + ' capabilityNode;\n';
            }
            if (brickNodeIds.length) {
                chart += 'class ' + brickNodeIds.join(',') + ' brickNode;\n';
            }

            document.getElementById('DependenciesGraph').innerHTML = '<div class="mermaid">' + chart + '</div>';
            mermaid.run({querySelector: '#DependenciesGraph .mermaid'});
        }

        function updateBricksView() {
            document.getElementById('Current').innerHTML = renderMap(rootGroups);
            document.getElementById('Legend').innerHTML = renderLegend();
        }

        function getMatrixCatalog() {
            const capabilities = getCapabilityCatalogItems();
            const brickCatalog = getBrickCatalog();
            const referencedBrickIds = new Set();
            const dependencyTypes = new Set();
            capabilities.forEach(capability => {
                (capability.brickDependencies || []).forEach(dep => dependencyTypes.add(dep.type || 'unspecified'));
                (capability.brickDependencies || []).forEach(dep => referencedBrickIds.add(dep.targetBrickId || ''));
            });
            return {
                capabilities: capabilities,
                bricks: brickCatalog.filter(item => referencedBrickIds.has(item.id)),
                dependencyTypes: Array.from(dependencyTypes).sort((left, right) => left.localeCompare(right))
            };
        }

        function renderMatrixControls(catalog) {
            return `
                <div class="matrix-controls">
                    <div class="dependency-control-group">
                        <div class="dependency-control-title">Dependency Types</div>
                        <div class="dependency-actions">
                            <button class="dependency-action" type="button" onclick="setAllMatrixCheckboxes('.matrix-type-checkbox', true)">Show all</button>
                            <button class="dependency-action" type="button" onclick="setAllMatrixCheckboxes('.matrix-type-checkbox', false)">Hide all</button>
                        </div>
                        <div class="dependency-checklist">
                            ${catalog.dependencyTypes.map(item => `
                                <label class="dependency-check-item">
                                    <input type="checkbox" class="matrix-type-checkbox" value="${item}" checked onchange="renderMatrixView()">
                                    <span>${item}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function buildMatrixData(catalog, selectedDependencyTypes) {
            const capabilities = catalog.capabilities;
            const rows = [];
            const lookup = {};
            const rowIndex = {};

            function ensureRow(rowId, row) {
                if (!rowIndex[rowId]) {
                    rowIndex[rowId] = row;
                    rows.push(row);
                    lookup[rowId] = {};
                }
                return rowIndex[rowId];
            }

            function addMatrixDependency(sourceId, targetId, payload) {
                if (!lookup[sourceId]) {
                    lookup[sourceId] = {};
                }
                if (!lookup[sourceId][targetId]) {
                    lookup[sourceId][targetId] = [];
                }
                lookup[sourceId][targetId].push(payload);
            }

            capabilities.forEach(capability => {
                ensureRow(capability.id, {
                    id: capability.id,
                    kind: 'capability',
                    name: capability.name || capability.id,
                    icon: 'capability_404.png',
                    href: ''
                });

                (capability.brickDependencies || []).forEach(dep => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    if (!dep.targetBrickId) {
                        return;
                    }
                    const linkedBrick = catalog.bricks.find(item => item.id === dep.targetBrickId) || {};
                    ensureRow(dep.targetBrickId, {
                        id: dep.targetBrickId,
                        kind: 'brick',
                        name: linkedBrick.name || dep.targetBrickId,
                        icon: dep.targetBrickId + '.png',
                        href: dep.targetBrickId ? 'landing_pages/' + dep.targetBrickId + '.html' : ''
                    });
                    addMatrixDependency(capability.id, dep.targetBrickId, {
                        type: dep.type || 'unspecified',
                        direction: 'capability_to_brick'
                    });
                    addMatrixDependency(dep.targetBrickId, capability.id, {
                        type: dep.type || 'unspecified',
                        direction: 'brick_supports_capability'
                    });
                });

            });

            rows.sort((left, right) => {
                if (left.kind !== right.kind) {
                    const order = {'capability': 0, 'brick': 1};
                    return (order[left.kind] || 99) - (order[right.kind] || 99);
                }
                return (left.name || '').localeCompare(right.name || '');
            });

            return {
                columns: rows,
                rows: rows,
                lookup: lookup
            };
        }

        function renderMatrixTable(matrixData) {
            const columns = matrixData.columns || [];
            const rows = matrixData.rows || [];
            if (!columns.length || !rows.length) {
                return '<div class="dependency-empty">No matrix data available.</div>';
            }

            function dependencyCountForParticipant(participantId) {
                return Object.values(matrixData.lookup[participantId] || {}).reduce((sum, deps) => sum + deps.length, 0);
            }

            return `
                <div class="matrix-table-wrap">
                    <table class="matrix-table">
                        <thead>
                            <tr>
                                <th class="matrix-corner">Capability</th>
                                ${columns.map(column => `
                                    <th title="${column.name || column.id}">
                                        ${column.href ? `
                                            <a target="_blank" href="${column.href}">
                                                <img class="matrix-col-icon" src="icons/${column.icon}" alt="${column.name || column.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                            </a>
                                        ` : `
                                            <img class="matrix-col-icon" src="icons/${column.icon}" alt="${column.name || column.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                        `}
                                    </th>
                                `).join('')}
                            </tr>
                            <tr>
                                <th class="matrix-corner">Count</th>
                                ${columns.map(column => `
                                    <th class="matrix-col-count" title="Total dependencies shown for ${column.name || column.id}">
                                        ${dependencyCountForParticipant(column.id)}
                                    </th>
                                `).join('')}
                            </tr>
                        </thead>
                        <tbody>
                            ${rows.map(source => `
                                <tr>
                                    <td class="matrix-row-head">
                                        ${source.href ? `
                                            <a class="matrix-row-label" target="_blank" href="${source.href}">
                                                <img class="matrix-row-icon" src="icons/${source.icon}" alt="${source.name || source.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                                <span>${source.name || source.id}</span>
                                                <span class="matrix-row-count">${dependencyCountForParticipant(source.id)}</span>
                                            </a>
                                        ` : `
                                            <div class="matrix-row-label">
                                                <img class="matrix-row-icon" src="icons/${source.icon}" alt="${source.name || source.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                                <span>${source.name || source.id}</span>
                                                <span class="matrix-row-count">${dependencyCountForParticipant(source.id)}</span>
                                            </div>
                                        `}
                                    </td>
                                    ${columns.map(target => {
                const deps = (((matrixData.lookup[source.id] || {})[target.id]) || []);
                if (!deps.length) {
                    return '<td class="matrix-empty-cell">.</td>';
                }
                if (source.kind === 'external' || target.kind === 'external') {
                    const title = deps.map(dep => {
                        if (dep.direction === 'capability_depends_on_external') {
                            return 'Capability depends on external system: ' + dep.type;
                        }
                        if (dep.direction === 'external_supports_capability') {
                            return 'External system supports capability dependency: ' + dep.type;
                        }
                        if (dep.direction === 'external_depends_on_capability') {
                            return 'External system depends on capability: ' + dep.type;
                        }
                        if (dep.direction === 'capability_used_by_external') {
                            return 'Capability is used by external system: ' + dep.type;
                        }
                        return dep.type;
                    }).join(', ');
                    return `<td class="matrix-hit-external" title="${title}">${deps.length}</td>`;
                }
                return `<td class="matrix-hit" title="${deps.map(dep => {
                    if (dep.direction === 'brick_supports_capability') {
                        return dep.type + ' (reverse link)';
                    }
                    return dep.type;
                }).join(', ')}">${deps.length}</td>`;
            }).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderMatrixView() {
            const container = document.getElementById('MatrixContent');
            if (!container) {
                return;
            }

            const catalog = getMatrixCatalog();
            if (!matrixInitialized) {
                container.innerHTML = `
                    <div class="matrix-layout">
                        ${renderMatrixControls(catalog)}
                        <div class="matrix-shell">
                            <div class="matrix-summary" id="MatrixSummary"></div>
                            <div id="MatrixTable"></div>
                        </div>
                    </div>
                `;
                matrixInitialized = true;
            }

            const selectedDependencyTypes = new Set(Array.from(document.querySelectorAll('.matrix-type-checkbox'))
                .filter(input => input.checked)
                .map(input => input.value));

            const matrixData = buildMatrixData(catalog, selectedDependencyTypes);
            const dependencyCount = Object.values(matrixData.lookup).reduce((sum, row) => {
                return sum + Object.values(row).reduce((rowSum, deps) => rowSum + deps.length, 0);
            }, 0);

            document.getElementById('MatrixSummary').innerHTML = `
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${matrixData.columns.length}</div>
                    <div class="dependency-graph-stat-label">Columns</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${matrixData.rows.length}</div>
                    <div class="dependency-graph-stat-label">Rows</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${selectedDependencyTypes.size}</div>
                    <div class="dependency-graph-stat-label">Types Shown</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${dependencyCount}</div>
                    <div class="dependency-graph-stat-label">Dependency Hits</div>
                </div>
            `;

            document.getElementById('MatrixTable').innerHTML = renderMatrixTable(matrixData);
        }
    </script>
</head>
<body onload="initTab(); updateBricksView(); updateTabLabels();" onhashchange="initTab()">
<div class="domain-label">Ride Sharing Marketplace</div>
<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Product Bricks"></td>
            <td class="hero-copy-cell">
                <div class="hero-title" id="doc-title">...</div>
                <div class="hero-subtitle" id="doc-description">...</div>
            </td>
        </tr>
    </table>
</div>
<div>

        <button class="tablinks" id="tab_Dependencies" onclick="openTab('Dependencies')">Dependencies</button>

        </div>

            <div id="DependenciesContent"></div>
        </div>
    </div>
</div>

<script>

</body>
