<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Ride Sharing Marketplace)</title>
    <style>
    .page-type-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        border: 1px solid grey;
        text-transform: uppercase;
        margin-right: 6px;
        color: #8c8c8c;
    }
</style>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;
        padding: 6px 4px;
        font-size: 80%;
        color: #a0a0a0;
    }

    .breadcrumb {
    }

    .breadcrumb a {
        text-decoration: none;
        color: #343434;;
    }
</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Airport and Reserve reliability Release", "date": "2026-05-14", "description": "Release of airport and reserve reliability improvements aimed at moving ETA accuracy and request-to-trip conversion, anchored in better constrained-location dispatch, scheduling confidence, and trip-state communication across rider and driver surfaces.", "customerImpact": [{"customerId": "ridu", "customer": {"id": "ridu", "name": "Urban Time-Sensitive Rider", "group": "Rider Demand", "icon": "customer.png"}, "customerKPIs": [{"kpi": "ETA accuracy", "expectedImpact": "Improve ETA accuracy by strengthening reserve, airport, and pickup guidance behavior.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Reliable on-time trip completion", "expectedImpact": "Increase reliable trip completion for time-sensitive trips, especially airport journeys.", "description": "Share of requested trips that complete with acceptable pickup and arrival predictability.", "unit": "%", "currentValue": "72.5", "link": "https://dashboard.example.com/ride-sharing-marketplace/customers/ridu/kpis/rrel", "linkLabel": "Open KPI dashboard", "kind": "customer"}], "businessKPIs": [{"kpi": "Request-to-trip conversion", "expectedImpact": "Increase conversion by reducing missed pickups, rematches, and rider cancellation anxiety.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "disp", "change": "Released more resilient rematch and constrained-zone dispatch behavior.", "brick": {"id": "disp", "name": "Dispatch and Matching Engine", "type": "service", "description": "Matches rider demand to the best available driver or fleet supply while honoring geography, product rules, and trip quality constraints.", "domain": "Marketplace Controls and Special Flows", "group": "liquidity-and-pricing", "internalModules": [{"title": "Real-time Supply Selector", "description": "Chooses candidate drivers or fleet supply for each request.", "type": "service"}, {"title": "Rematch and Cancellation Logic", "description": "Handles driver declines, rider cancellations, and rematch conditions.", "type": "service"}, {"title": "Liquidity and Queue Controls", "description": "Balances supply and demand in constrained environments such as airports.", "type": "operations"}], "interfaces": [{"title": "Dispatch Decision API", "description": "API for dispatching and rematching trips.", "type": "api"}, {"title": "Supply Offer Feed", "description": "Driver-facing offer and assignment event stream.", "type": "event"}], "brickDependencies": [{"targetBrickId": "etar", "type": "routing", "interface": "ETA API", "description": "Depends on ETA, Maps and Routing Intelligence to evaluate pickup feasibility and time."}, {"targetBrickId": "pric", "type": "pricing", "interface": "Price Signal API", "description": "Depends on Dynamic Pricing and Incentives for supply-demand balancing signals."}, {"targetBrickId": "orch", "type": "workflow", "interface": "Reserve and Zone Rules API", "description": "Depends on Reserve, Share and Airport Orchestration for special flow handling."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [{"system": "Driver applications", "type": "channel-consumer", "interface": "Supply Offer Feed", "description": "Driver clients depend on dispatch offers and trip assignment updates."}], "icon": "disp.png"}}, {"brickId": "etar", "change": "Released better airport pickup guidance and ETA quality models.", "brick": {"id": "etar", "name": "ETA, Maps and Routing Intelligence", "type": "service", "description": "Provides route estimation, pickup guidance, airport geofencing, and live map context for riders and drivers.", "domain": "Rider Demand and Trip Experience", "group": "live-trip-and-confidence", "internalModules": [{"title": "ETA Prediction Models", "description": "Predicts pickup and trip arrival timing.", "type": "service"}, {"title": "Pickup and Drop-off Guidance", "description": "Optimizes exact meeting points and constrained-zone handoffs.", "type": "service"}, {"title": "Geofence and Zone Rules", "description": "Maintains airport, venue, and city-specific navigation constraints.", "type": "policy"}], "interfaces": [{"title": "ETA and Routing API", "description": "Returns routes, ETAs, and pickup guidance.", "type": "api"}, {"title": "Live Location Events", "description": "Emits location and route progress events.", "type": "event"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"system": "Maps and traffic providers", "type": "data", "interface": "Routing APIs", "description": "Provides road network, traffic, and geospatial context."}], "externalSystemsDependingOnThisBrick": [], "icon": "etar.png"}}, {"brickId": "orch", "change": "Released stronger reserve fulfillment and airport operating rules.", "brick": {"id": "orch", "name": "Reserve, Share and Airport Orchestration", "type": "full-stack", "description": "Handles scheduled trips, shared-ride routing logic, and constrained pickup or drop-off operations such as airports and shuttles.", "domain": "Marketplace Controls and Special Flows", "group": "special-trip-orchestration", "internalModules": [{"title": "Scheduled Trip Planner", "description": "Manages future trips, supply reservation, and pre-trip reminders.", "type": "service"}, {"title": "Shared Ride Orchestrator", "description": "Coordinates pooled routing, rider sequencing, and detour controls.", "type": "service"}, {"title": "Airport and Venue Operations Rules", "description": "Applies pickup-lane, queue, and access logic for constrained environments.", "type": "operations"}], "interfaces": [{"title": "Special Trip Rules API", "description": "Returns reserve, pooling, and location-specific operating rules.", "type": "api"}, {"title": "Operations Workspace", "description": "Operator interface for constrained trip flows and scheduling controls.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "disp", "type": "dispatch", "interface": "Dispatch Decision API", "description": "Depends on Dispatch and Matching Engine to allocate supply to special trip flows."}, {"targetBrickId": "etar", "type": "routing", "interface": "ETA and Routing API", "description": "Depends on ETA, Maps and Routing Intelligence for scheduling and pooled routing logic."}], "externalSystemsThisBrickDependsOn": [{"system": "Airports and venue operating systems", "type": "partner", "interface": "Access and rules feeds", "description": "Provides local operating constraints, queue rules, and pickup-zone definitions."}], "externalSystemsDependingOnThisBrick": [], "icon": "orch.png"}}], "deliveryChannels": [{"channelId": "mobile-app", "change": "Deployed rider and driver mobile updates for reserve and airport flows.", "channel": {"productId": "mobile", "productName": "", "name": "mobile-app", "type": "product", "icon": "product.png"}}, {"channelId": "be-service", "change": "Deployed new scheduling and dispatch services in production.", "channel": {"productId": "be", "productName": "", "name": "be-service", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["reserve-airport", "marketplace-dispatch"], "supportingTeamIds": ["driver-growth", "data-platform"]}, "initiativeId": "initiative-ride-sharing-marketplace-2026-04-10-00", "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Ride Sharing Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Ride Sharing Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Airport and Reserve reliability Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
