    <style>
        body {

        .meta {
            color: #6b7280;

        }

        .section {
            border-top: 1px solid #e5e7eb;

        }

        .section-title {
            font-size: 14px;

        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;

            margin-bottom: 8px;

        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Driver earnings clarity and trust Release", "date": "2026-06-18", "description": "Release of driver earnings clarity and trust improvements aimed at moving driver earnings per active hour and driver retention through cleaner earnings explanations, lower compliance surprises, and faster support routing.", "customerImpact": [{"customerId": "drvu", "customer": {"id": "drvu", "name": "Flexible Driver Earner", "group": "Driver Supply", "icon": "customer.png"}, "customerKPIs": [{"kpi": "Driver earnings per active hour", "expectedImpact": "Improve productive earnings by reducing wasted active time and making incentives easier to act on.", "description": "Net earnings quality from time spent actively driving and serving trips.", "unit": "USD/hour", "currentValue": "274", "link": "https://dashboard.example.com/ride-sharing-marketplace/customers/drvu/kpis/dpea", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Driver 7-day retention", "expectedImpact": "Increase retention by lowering trust-eroding friction in payouts and compliance.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Healthy driver supply availability", "expectedImpact": "Improve supply health in focus markets by reducing avoidable churn.", "description": "Enough active, high-quality supply to meet rider demand without destabilizing earnings.", "unit": "%", "currentValue": "79.3", "link": "https://dashboard.example.com/ride-sharing-marketplace/customers/drvu/kpis/dsup", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "driv", "change": "Released clearer driver-status and compliance workflows.", "brick": {"id": "driv", "name": "Driver Onboarding and Compliance", "type": "full-stack", "description": "Supports driver signup, screening, document verification, and eligibility management across markets.", "domain": "Driver Supply and Operations", "group": "onboarding-and-eligibility", "internalModules": [{"title": "Driver Profile and Status Model", "description": "Tracks account state, eligibility, and market permissions.", "type": "service"}, {"title": "Document and Screening Workflow", "description": "Processes licenses, vehicle documents, and background checks.", "type": "operations"}, {"title": "Compliance Rules Engine", "description": "Applies local legal and policy requirements to driver status.", "type": "policy"}], "interfaces": [{"title": "Driver Eligibility API", "description": "Returns account and vehicle eligibility decisions.", "type": "api"}], "brickDependencies": [{"targetBrickId": "safe", "type": "trust", "interface": "Trust Verification API", "description": "Depends on Safety and Trust Operations for identity and trust signals."}], "externalSystemsThisBrickDependsOn": [{"system": "Background screening vendors", "type": "compliance", "interface": "Verification API", "description": "Provides screening and verification checks."}], "externalSystemsDependingOnThisBrick": [], "icon": "driv.png"}}, {"brickId": "earn", "change": "Released more legible payout and fare-breakdown experiences.", "brick": {"id": "earn", "name": "Driver Earnings and Incentive Management", "type": "service", "description": "Calculates and explains driver earnings, incentives, adjustments, cash-out, and payout visibility.", "domain": "Driver Supply and Operations", "group": "earnings-and-partner-control", "internalModules": [{"title": "Fare Breakdown Calculator", "description": "Converts trip activity into driver-visible earnings statements.", "type": "service"}, {"title": "Incentive Ledger", "description": "Stores bonus, quest, and other incentive state.", "type": "service"}, {"title": "Payout and Cash-out Controls", "description": "Handles payout timing and cash-out workflow control.", "type": "operations"}], "interfaces": [{"title": "Earnings API", "description": "API for driver-facing earnings views and payout actions.", "type": "api"}], "brickDependencies": [{"targetBrickId": "pric", "type": "pricing", "interface": "Marketplace Pricing Events", "description": "Depends on Dynamic Pricing and Incentives for fare and incentive logic."}], "externalSystemsThisBrickDependsOn": [{"system": "Payout partners", "type": "financial-partner", "interface": "Disbursement API", "description": "Executes payout and cash-out movement."}], "externalSystemsDependingOnThisBrick": [], "icon": "earn.png"}}, {"brickId": "safe", "change": "Released faster trust and incident-routing workflows for driver issues.", "brick": {"id": "safe", "name": "Safety and Trust Operations", "type": "full-stack", "description": "Provides identity assurance, trip safety tooling, trust controls, incident workflows, and abuse or fraud prevention.", "domain": "Platform Foundation", "group": "trust-and-identity", "internalModules": [{"title": "Identity and Verification Controls", "description": "Supports driver identity, PIN verification, and risk controls.", "type": "service"}, {"title": "On-trip Safety Toolkit", "description": "Exposes emergency, tracking, and incident-help features.", "type": "full-stack"}, {"title": "Incident and Trust Workflow Engine", "description": "Routes support, fraud, and safety events into operational case handling.", "type": "operations"}], "interfaces": [{"title": "Safety Toolkit API", "description": "API for rider and driver safety features.", "type": "api"}, {"title": "Trust Operations Workspace", "description": "Operator interface for incident and trust workflows.", "type": "ui"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"system": "Emergency and security partners", "type": "partner", "interface": "Escalation API", "description": "Supports live safety escalation and emergency workflows."}], "externalSystemsDependingOnThisBrick": [], "icon": "safe.png"}}], "deliveryChannels": [{"channelId": "mobile-app", "change": "Deployed driver app updates for earnings and support flows.", "channel": {"productId": "mobile", "productName": "", "name": "mobile-app", "type": "product", "icon": "product.png"}}, {"channelId": "dashboard", "change": "Deployed shared analytics and trust dashboards for supply operations.", "channel": {"productId": "", "productName": "", "name": "dashboard", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["driver-growth", "trust-ops"], "supportingTeamIds": ["marketplace-dispatch", "data-platform"]}, "initiativeId": "initiative-ride-sharing-marketplace-2026-04-24-01", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Ride Sharing Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Ride Sharing Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Driver earnings clarity and trust Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
