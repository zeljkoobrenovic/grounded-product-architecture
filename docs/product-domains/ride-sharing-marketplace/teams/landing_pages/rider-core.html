<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rider Core Experience</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1180px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #ecfdf5;
            color: #047857;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 38px;
            line-height: 1.2;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .mission {
            font-size: 20px;
            line-height: 1.55;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            min-width: 150px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        .stat-value {
            font-size: 28px;
            color: #1d4ed8;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
        }

        .card {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background-color: white;
            padding: 14px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .role-table {
            width: 100%;
            border-collapse: collapse;
        }

        .role-table th,
        .role-table td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: top;
            text-align: left;
        }

        .role-table th {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .kpi-list {
            margin-top: 6px;
            color: #4b5563;
            font-size: 13px;
        }

        .activity-block {
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid #d7dce1;
        }

        .activity-link {
            color: #1d4ed8;
            font-weight: bold;
        }

        .activity-meta {
            color: #6b7280;
            font-size: 12px;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 20px;
            border: 1px solid #ccc;
            border-top: none;
        }

        .empty-state {
            color: #6b7280;
            font-style: italic;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body onload="initTab()" onhashchange="initTab()">
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 40px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Team">
        </td>
        <td>
            <div class="eyebrow">Team</div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div id="Mission" class="mission"></div>
<div class="tab">
    <button class="tablinks" id="tab_home-tab" onclick="openTab('home-tab')">Home</button>
    <button class="tablinks" id="tab_dependencies-tab" onclick="openTab('dependencies-tab')">Dependencies</button>
</div>
<div id="home-tab" class="tabcontent"></div>
<div id="dependencies-tab" class="tabcontent"></div>

<script>
    const team = {"id": "rider-core", "name": "Rider Core Experience", "teamType": "stream-aligned", "teamFamilyId": "rider-growth", "teamFamilyName": "Rider Growth and Trip Experience", "orgLayer": "team", "mission": "Own request flow, trip tracking, receipts, and core rider conversion.", "primaryCustomers": [{"customerId": "ridu", "customerName": "Urban Time-Sensitive Rider", "relatedKPIs": ["Reliable on-time trip completion", "Request-to-trip conversion", "Repeat rider frequency"], "icon": "customer.png"}], "ownedProductBricks": [{"brickId": "trip", "brickName": "Trip Request and Intent Capture", "brick": {"id": "trip", "name": "Trip Request and Intent Capture", "type": "full-stack", "description": "Captures rider pickup, destination, timing, ride type, account context, and trip intent before dispatch begins.", "domain": "Rider Demand and Trip Experience", "group": "request-and-choice", "internalModules": [{"title": "Request Capture and Validation", "description": "Validates trip inputs, eligibility, and account context.", "type": "service"}, {"title": "Product Selection Logic", "description": "Determines which ride products and variants are offered for the requested trip.", "type": "policy"}, {"title": "Request State Management", "description": "Stores request lifecycle state before, during, and after dispatch.", "type": "service"}], "interfaces": [{"title": "Trip Request API", "description": "API for creating and updating ride requests.", "type": "api"}, {"title": "Request UX Surface", "description": "Rider-facing request flow in mobile surfaces.", "type": "ui"}, {"title": "Request Events", "description": "Event stream for request creation, update, and cancellation.", "type": "event"}], "brickDependencies": [{"targetBrickId": "pric", "type": "pricing", "interface": "Quote API", "description": "Depends on Dynamic Pricing and Incentives for upfront fare and offer packaging."}, {"targetBrickId": "ridp", "type": "identity", "interface": "Profile and Payment API", "description": "Depends on Rider Identity, Wallet and Payments for account, wallet, and billing context."}], "externalSystemsThisBrickDependsOn": [{"system": "Maps and geocoding providers", "type": "data", "interface": "Location API", "description": "Supports address normalization and pickup or destination interpretation."}], "externalSystemsDependingOnThisBrick": [{"system": "Rider applications", "type": "channel-consumer", "interface": "Trip Request API", "description": "Rider clients depend on request capture to start trips."}], "icon": "trip.png"}}, {"brickId": "ridp", "brickName": "Rider Identity, Wallet and Payments", "brick": {"id": "ridp", "name": "Rider Identity, Wallet and Payments", "type": "full-stack", "description": "Manages rider identity, family or business profiles, payment methods, receipts, refunds, and billing context.", "domain": "Rider Demand and Trip Experience", "group": "live-trip-and-confidence", "internalModules": [{"title": "Identity and Account Graph", "description": "Stores rider, family, and business profile relationships.", "type": "service"}, {"title": "Wallet and Billing Controls", "description": "Manages payment instruments, billing preferences, and receipts.", "type": "service"}, {"title": "Receipts and Adjustments", "description": "Supports refunds, credits, and post-trip billing corrections.", "type": "operations"}], "interfaces": [{"title": "Identity and Billing API", "description": "API for profile, payment, and receipt workflows.", "type": "api"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"system": "Payment processors", "type": "financial-partner", "interface": "Payments API", "description": "Handles charge authorization, settlement, and refund execution."}], "externalSystemsDependingOnThisBrick": [], "icon": "ridp.png"}}], "supportingProductBricks": [{"brickId": "etar", "brickName": "ETA, Maps and Routing Intelligence", "brick": {"id": "etar", "name": "ETA, Maps and Routing Intelligence", "type": "service", "description": "Provides route estimation, pickup guidance, airport geofencing, and live map context for riders and drivers.", "domain": "Rider Demand and Trip Experience", "group": "live-trip-and-confidence", "internalModules": [{"title": "ETA Prediction Models", "description": "Predicts pickup and trip arrival timing.", "type": "service"}, {"title": "Pickup and Drop-off Guidance", "description": "Optimizes exact meeting points and constrained-zone handoffs.", "type": "service"}, {"title": "Geofence and Zone Rules", "description": "Maintains airport, venue, and city-specific navigation constraints.", "type": "policy"}], "interfaces": [{"title": "ETA and Routing API", "description": "Returns routes, ETAs, and pickup guidance.", "type": "api"}, {"title": "Live Location Events", "description": "Emits location and route progress events.", "type": "event"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"system": "Maps and traffic providers", "type": "data", "interface": "Routing APIs", "description": "Provides road network, traffic, and geospatial context."}], "externalSystemsDependingOnThisBrick": [], "icon": "etar.png"}}, {"brickId": "safe", "brickName": "Safety and Trust Operations", "brick": {"id": "safe", "name": "Safety and Trust Operations", "type": "full-stack", "description": "Provides identity assurance, trip safety tooling, trust controls, incident workflows, and abuse or fraud prevention.", "domain": "Platform Foundation", "group": "trust-and-identity", "internalModules": [{"title": "Identity and Verification Controls", "description": "Supports driver identity, PIN verification, and risk controls.", "type": "service"}, {"title": "On-trip Safety Toolkit", "description": "Exposes emergency, tracking, and incident-help features.", "type": "full-stack"}, {"title": "Incident and Trust Workflow Engine", "description": "Routes support, fraud, and safety events into operational case handling.", "type": "operations"}], "interfaces": [{"title": "Safety Toolkit API", "description": "API for rider and driver safety features.", "type": "api"}, {"title": "Trust Operations Workspace", "description": "Operator interface for incident and trust workflows.", "type": "ui"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"system": "Emergency and security partners", "type": "partner", "interface": "Escalation API", "description": "Supports live safety escalation and emergency workflows."}], "externalSystemsDependingOnThisBrick": [], "icon": "safe.png"}}], "dependsOnTeamIds": ["marketplace-dispatch", "trust-ops", "data-platform"], "defaultSupportingTeamIds": ["marketplace-dispatch", "trust-ops"], "staffing": {"suggestedHeadcount": 10, "roles": [{"role": "Product Manager", "count": 1, "responsibility": "Own rider conversion and repeat-usage outcomes."}, {"role": "Engineering Manager", "count": 1, "responsibility": "Lead delivery and engineering execution."}, {"role": "Backend Engineer", "count": 3, "responsibility": "Build request, account, and receipt services."}, {"role": "Mobile Engineer", "count": 2, "responsibility": "Build rider mobile flows."}, {"role": "Product Designer", "count": 1, "responsibility": "Design rider booking and trip experiences."}, {"role": "QA / Test Automation Engineer", "count": 1, "responsibility": "Own release confidence and regression coverage."}, {"role": "Data Analyst", "count": 1, "responsibility": "Track conversion and trip-quality performance."}]}, "groupId": "rider-growth", "groupName": "Rider Growth and Trip Experience", "groupLeadership": {}, "dependsOnTeams": [{"id": "marketplace-dispatch", "name": "Marketplace Dispatch and Pricing", "teamType": "platform", "groupId": "marketplace-controls", "groupName": "Marketplace and Trust Controls"}, {"id": "trust-ops", "name": "Safety and Trust Operations", "teamType": "platform", "groupId": "marketplace-controls", "groupName": "Marketplace and Trust Controls"}, {"id": "data-platform", "name": "Marketplace Intelligence Platform", "teamType": "platform", "groupId": "marketplace-controls", "groupName": "Marketplace and Trust Controls"}], "defaultSupportingTeams": [{"id": "marketplace-dispatch", "name": "Marketplace Dispatch and Pricing", "teamType": "platform", "groupId": "marketplace-controls", "groupName": "Marketplace and Trust Controls"}, {"id": "trust-ops", "name": "Safety and Trust Operations", "teamType": "platform", "groupId": "marketplace-controls", "groupName": "Marketplace and Trust Controls"}], "relatedInitiatives": [], "relatedReleases": [], "relatedDiscoveries": [], "dependencyData": {"sharedProductBricks": [{"teamId": "reserve-airport", "teamName": "Reserve and Airport Experience", "sharedBrickIds": ["etar"], "sharedBrickNames": ["ETA, Maps and Routing Intelligence"]}, {"teamId": "driver-growth", "teamName": "Driver Growth and Earnings", "sharedBrickIds": ["safe"], "sharedBrickNames": ["Safety and Trust Operations"]}, {"teamId": "marketplace-dispatch", "teamName": "Marketplace Dispatch and Pricing", "sharedBrickIds": ["etar"], "sharedBrickNames": ["ETA, Maps and Routing Intelligence"]}, {"teamId": "trust-ops", "teamName": "Safety and Trust Operations", "sharedBrickIds": ["ridp", "safe"], "sharedBrickNames": ["Rider Identity, Wallet and Payments", "Safety and Trust Operations"]}], "sharedInitiatives": [], "sharedReleases": [], "explicitRelationships": [{"teamId": "marketplace-dispatch", "teamName": "Marketplace Dispatch and Pricing", "relationshipType": "depends_on", "relationshipLabel": "depends on"}, {"teamId": "trust-ops", "teamName": "Safety and Trust Operations", "relationshipType": "depends_on", "relationshipLabel": "depends on"}, {"teamId": "data-platform", "teamName": "Marketplace Intelligence Platform", "relationshipType": "depends_on", "relationshipLabel": "depends on"}, {"teamId": "marketplace-dispatch", "teamName": "Marketplace Dispatch and Pricing", "relationshipType": "supported_by", "relationshipLabel": "supported by"}, {"teamId": "trust-ops", "teamName": "Safety and Trust Operations", "relationshipType": "supported_by", "relationshipLabel": "supported by"}]}};
    const domainName = 'Ride Sharing Marketplace';

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    mermaid.initialize({startOnLoad: false, securityLevel: 'loose'});

    function renderActivity(items, sectionType) {
        if (!items || !items.length) {
            return '<div class="empty-state">No ' + escapeHtml(sectionType.toLowerCase()) + ' linked to this team.</div>';
        }
        let html = '';
        items.forEach(item => {
            html += '<div class="activity-block">';
            html += '<div class="activity-link">' + linkOf('../../' + item.sectionFolder + '/landing_pages/' + item.landingPageKey + '.html', item.description || sectionType, 'activity-link') + '</div>';
            html += '<div class="activity-meta">' + escapeHtml(item.date || '') + ' | ' + escapeHtml(item.teamRoleLabel || '') + '</div>';
            if (item.how) {
                html += '<div class="activity-meta" style="margin-top:4px">' + escapeHtml(item.how) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function initTab() {
        let tabName = 'home-tab';
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (document.getElementById('tab_' + hash)) {
                tabName = hash;
            }
        }
        openTab(tabName);
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
        if (tabName === 'dependencies-tab') {
            renderMermaidDiagrams();
        }
    }

    function sanitizeMermaidId(value) {
        return String(value || '')
            .replace(/[^a-zA-Z0-9_]/g, '_')
            .replace(/^([^a-zA-Z_])/, '_$1');
    }

    function sanitizeMermaidLabel(value) {
        return String(value || '')
            .replace(/&/g, ' and ')
            .replace(/"/g, '')
            .replace(/'/g, '')
            .replace(/[|[\]{}()<>`]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function renderDependencyTable(items, columns, rowBuilder) {
        if (!items || !items.length) {
            return '<div class="empty-state">No dependency details found.</div>';
        }

        let html = '<table class="role-table"><thead><tr>';
        columns.forEach(column => {
            html += '<th>' + escapeHtml(column) + '</th>';
        });
        html += '</tr></thead><tbody>';

        items.forEach(item => {
            html += '<tr>';
            rowBuilder(item).forEach(cell => {
                html += '<td>' + cell + '</td>';
            });
            html += '</tr>';
        });

        html += '</tbody></table>';
        return html;
    }

    function renderLinkedBricks(names, ids) {
        if (!ids || !ids.length) {
            return '<span class="empty-state">None</span>';
        }

        return ids.map((brickId, index) =>
            linkOf(
                '../../product-bricks/landing_pages/' + brickId + '.html',
                (names || [])[index] || brickId,
                ''
            )
        ).join('<br>');
    }

    function buildDependencyMermaid(title, items, keyName, labelBuilder, relationLabel) {
        if (!items || !items.length) {
            return '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div><div class="empty-state">No dependencies found.</div></div>';
        }

        let chart = '';
        chart += '---\n' +
            'config:\n' +
            '  htmlLabels: false\n' +
            '---\n\n';

        chart += 'flowchart LR\n\n';

        const currentId = sanitizeMermaidId(team.id || 'current_team');
        chart += currentId + '[\"' + sanitizeMermaidLabel('THIS TEAM') + '\"]\n';
        chart += 'style ' + currentId + ' fill:#bbf\n';

        items.forEach(item => {
            const otherId = sanitizeMermaidId(item.teamId || item.teamName || 'team');
            const edgeLabel = sanitizeMermaidLabel(labelBuilder(item));
            chart += otherId + '[\"' + sanitizeMermaidLabel(item.teamName + ' Team' || item.teamId || 'Team') + '\"]\n';
            chart += currentId + ' -->|' + edgeLabel + '| ' + otherId + '\n';
        });

        return '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div><div class="mermaid">' + chart + '</div></div>';
    }

    function renderMermaidDiagrams() {
        const container = document.getElementById('dependencies-tab');
        if (!container || container.getAttribute('data-rendered') === 'true') {
            return;
        }

        const dependencyData = team.dependencyData || {};
        let html = '';
        html += buildDependencyMermaid(
            'Explicit Team Relationships',
            dependencyData.explicitRelationships || [],
            'relationshipType',
            item => item.relationshipLabel || item.relationshipType || 'relationship',
            'relationship'
        );
        html += '<div class="section">' + renderDependencyTable(
            dependencyData.explicitRelationships || [],
            ['Team', 'Relationship'],
            item => [
                linkOf(item.teamId + '.html', item.teamName || item.teamId, ''),
                escapeHtml(item.relationshipLabel || item.relationshipType || '')
            ]
        ) + '</div>';
        html += buildDependencyMermaid(
            'Shared Product Bricks',
            dependencyData.sharedProductBricks || [],
            'sharedBrickIds',
            item => ((item.sharedBrickNames || []).slice(0, 3).join(', ') + (((item.sharedBrickNames || []).length > 3) ? ' +' + ((item.sharedBrickNames || []).length - 3) : '')) || 'shared bricks',
            'shared bricks'
        );
        html += '<div class="section">' + renderDependencyTable(
            dependencyData.sharedProductBricks || [],
            ['Team', 'Shared Bricks'],
            item => [
                linkOf(item.teamId + '.html', item.teamName || item.teamId, ''),
                renderLinkedBricks(item.sharedBrickNames || [], item.sharedBrickIds || []),
            ]
        ) + '</div>';

        container.innerHTML = html;
        mermaid.run({querySelector: '#dependencies-tab .mermaid'});
        container.setAttribute('data-rendered', 'true');
    }

    document.getElementById('Title').innerHTML = escapeHtml(team.name || 'Team');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(team.groupName || '') + ' | ' + escapeHtml(team.teamType || '');
    document.getElementById('Mission').innerHTML = escapeHtml(team.mission || '');

    const staffing = team.staffing || {};
    const groupLeadership = team.groupLeadership || {};

    let homeHtml = '';
    homeHtml += '<div class="section"><div class="section-title">Summary</div><div class="stats">';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String(staffing.suggestedHeadcount || 0)) + '</div><div class="stat-label">Suggested Headcount</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((staffing.roles || []).length)) + '</div><div class="stat-label">Role Blocks</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String(groupLeadership.suggestedHeadcount || 0)) + '</div><div class="stat-label">Group Leadership Headcount</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((groupLeadership.roles || []).length)) + '</div><div class="stat-label">Group Role Blocks</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((team.primaryCustomers || []).length)) + '</div><div class="stat-label">Primary Customers</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((team.ownedProductBricks || []).length)) + '</div><div class="stat-label">Owned Bricks</div></div>';
    homeHtml += '</div></div>';

    if (staffing.staffingGuidance || (staffing.roles || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Staffing Model</div>';
        if (staffing.staffingGuidance) {
            homeHtml += '<div style="margin-bottom:12px; line-height:1.5">' + escapeHtml(staffing.staffingGuidance) + '</div>';
        }
        homeHtml += '<table class="role-table"><thead><tr><th>Role</th><th>Count</th><th>Responsibility</th></tr></thead><tbody>';
        (staffing.roles || []).forEach(role => {
            homeHtml += '<tr><td>' + escapeHtml(role.role) + '</td><td>' + escapeHtml(String(role.count || 0)) + '</td><td>' + escapeHtml(role.responsibility || '') + '</td></tr>';
        });
        homeHtml += '</tbody></table></div>';
    }

    if (team.groupLeadership && ((team.groupLeadership.roles || []).length || team.groupLeadership.leadershipModel)) {
        homeHtml += '<div class="section"><div class="section-title">Group Leadership</div>';
        if (team.groupLeadership.purpose) {
            homeHtml += '<div style="margin-bottom:12px; line-height:1.5">' + escapeHtml(team.groupLeadership.purpose) + '</div>';
        }
        if (team.groupLeadership.leadershipModel) {
            homeHtml += '<div style="margin-bottom:12px; line-height:1.5; color:#6b7280">' + escapeHtml(team.groupLeadership.leadershipModel) + '</div>';
        }
        homeHtml += '<table class="role-table"><thead><tr><th>Role</th><th>Count</th><th>Responsibility</th><th>Reports To</th></tr></thead><tbody>';
        (team.groupLeadership.roles || []).forEach(role => {
            homeHtml += '<tr><td>' + escapeHtml(role.role) + '</td><td>' + escapeHtml(String(role.count || 0)) + '</td><td>' + escapeHtml(role.responsibility || '') + '</td><td>' + escapeHtml(role.reportsTo || '') + '</td></tr>';
        });
        homeHtml += '</tbody></table></div>';
    }

    if ((team.primaryCustomers || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Primary Customers and KPIs</div><div class="grid">';
        (team.primaryCustomers || []).forEach(customer => {
            homeHtml += '<div class="card">';
            homeHtml += '<div class="pill"><img class="linked-icon" src="../../customers/icons/' + escapeHtml(customer.icon || 'customer.png') + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName || customer.customerId, '') + '</div>';
            if ((customer.relatedKPIs || []).length) {
                homeHtml += '<div class="kpi-list">' + (customer.relatedKPIs || []).map(kpi => escapeHtml(kpi)).join('<br>') + '</div>';
            }
            homeHtml += '</div>';
        });
        homeHtml += '</div></div>';
    }

    if ((team.ownedProductBricks || []).length || (team.supportingProductBricks || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Product Brick Scope</div>';
        if ((team.ownedProductBricks || []).length) {
            homeHtml += '<div style="margin-bottom:8px; color:#6b7280">Owned product bricks</div>';
            (team.ownedProductBricks || []).forEach(brick => {
                homeHtml += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml((brick.brick || {}).icon || 'capability_404.png') + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brickName || brick.brickId, '') + '</div>';
            });
        }
        if ((team.supportingProductBricks || []).length) {
            homeHtml += '<div style="margin:14px 0 8px 0; color:#6b7280">Supporting product bricks</div>';
            (team.supportingProductBricks || []).forEach(brick => {
                homeHtml += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml((brick.brick || {}).icon || 'capability_404.png') + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brickName || brick.brickId, '') + '</div>';
            });
        }
        homeHtml += '</div>';
    }

    if ((team.dependsOnTeams || []).length || (team.defaultSupportingTeams || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Team Relationships</div>';
        if ((team.dependsOnTeams || []).length) {
            homeHtml += '<div style="margin-bottom:8px; color:#6b7280">Depends on</div>';
            (team.dependsOnTeams || []).forEach(otherTeam => {
                homeHtml += '<div class="pill">' + linkOf(otherTeam.id + '.html', otherTeam.name, '') + '</div>';
            });
        }
        if ((team.defaultSupportingTeams || []).length) {
            homeHtml += '<div style="margin:14px 0 8px 0; color:#6b7280">Default supporting teams</div>';
            (team.defaultSupportingTeams || []).forEach(otherTeam => {
                homeHtml += '<div class="pill">' + linkOf(otherTeam.id + '.html', otherTeam.name, '') + '</div>';
            });
        }
        homeHtml += '</div>';
    }
    document.getElementById('home-tab').innerHTML = homeHtml;
    document.getElementById('dependencies-tab').innerHTML = '<div class="section"><div class="section-title">Dependency Views</div><div class="empty-state">Open this tab to render Mermaid dependency diagrams.</div></div>';
</script>
</body>
</html>
