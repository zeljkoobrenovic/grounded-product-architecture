<script>
    const initiative = {"title": "Finance Export and Spend Intelligence Initiative", "date": "2026-05-07", "description": "Focused investment to improve ERP export trust, tax handling, and analytics visibility for controllers and travel leaders.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Finance Operations Director / Group Controller", "group": "Finance and Spend Control Leaders", "icon": "finance_controller.png"}, "customerKPIs": [{"kpi": "Monthly close cycle for employee spend", "expectedImpact": "Reduce finance-close delays.", "description": "Reduce the average time needed to close employee expense, travel, and card spend from period end to booked completion to 2.5 business days.", "unit": "business days", "currentValue": "4.8", "link": "https://dashboard.example.com/travel-and-expense-management/customers/cg1-p1/kpis/co-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Audit-ready record completeness", "expectedImpact": "Improve trust in archived and exported records.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Finance automation suite adoption", "expectedImpact": "Increase attach of analytics and finance workflows in strategic accounts.", "description": "Increase the share of strategic accounts using expense, cards, policy automation, and finance integrations together to 46%.", "unit": "% of strategic accounts", "currentValue": "24.0", "link": "https://dashboard.example.com/travel-and-expense-management/customers/cg1-p1/kpis/bo-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "acct", "change": "Improve ERP mappings and export validation.", "brick": {"id": "acct", "name": "ERP and Accounting Sync", "type": "integration", "description": "Exports approved, coded spend into ERP, accounting, and finance systems with entity-aware mappings.", "domain": "Finance Automation and Intelligence", "group": "Finance operations", "internalModules": [{"title": "Accounting mapping framework", "description": "Maps spend records to ledger dimensions and export formats.", "type": "integration"}], "interfaces": [{"title": "Accounting export API", "description": "Produces accounting-ready payloads and export files.", "type": "api"}], "brickDependencies": [{"targetBrickId": "cate", "type": "context", "interface": "Coding model", "description": "Uses category and tax coding to create correct accounting outputs."}], "externalSystemsThisBrickDependsOn": [{"system": "ERP and accounting platforms", "type": "back-office", "interface": "ERP connectors", "description": "Pushes approved spend into finance systems."}], "externalSystemsDependingOnThisBrick": [], "icon": "acct.png"}}, {"brickId": "vatx", "change": "Improve tax-related coding and export fields.", "brick": {"id": "vatx", "name": "VAT and Tax Handling", "type": "service", "description": "Supports tax extraction, tax code validation, and recovery-friendly outputs for finance teams.", "domain": "Finance Automation and Intelligence", "group": "Finance operations", "internalModules": [{"title": "Tax treatment service", "description": "Evaluates tax-relevant fields and recovery attributes for expenses.", "type": "service"}], "interfaces": [{"title": "Tax export API", "description": "Returns tax fields and recovery-related outputs.", "type": "api"}], "brickDependencies": [{"targetBrickId": "cate", "type": "context", "interface": "Tax coding model", "description": "Uses normalized tax coding and spend classification."}], "externalSystemsThisBrickDependsOn": [{"system": "Tax engines and advisory systems", "type": "tax-system", "interface": "Tax reference data", "description": "Consumes tax reference rules and validation data where needed."}], "externalSystemsDependingOnThisBrick": [], "icon": "vatx.png"}}, {"brickId": "anal", "change": "Improve leakage and finance dashboards.", "brick": {"id": "anal", "name": "Spend Analytics and Benchmarking", "type": "full-stack", "description": "Provides spend, policy, travel, supplier, and process analytics for finance and travel leaders.", "domain": "Finance Automation and Intelligence", "group": "Intelligence and extensibility", "internalModules": [{"title": "Analytics model", "description": "Aggregates spend, workflow, and control metrics across the platform.", "type": "service"}], "interfaces": [{"title": "Analytics dashboards", "description": "Dashboards for spend, travel, and policy insight.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "inte", "type": "context", "interface": "Unified domain data", "description": "Uses normalized data from domain integrations and events."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "anal.png"}}], "deliveryChannels": [{"channelId": "partner-api-runtime", "change": "Roll out updated ERP connector behavior.", "channel": {"productId": "partner", "productName": "", "name": "partner-api-runtime", "type": "product", "icon": "product.png"}}, {"channelId": "tem-data-prod", "change": "Roll out updated spend intelligence models.", "channel": {"productId": "tem", "productName": "", "name": "tem-data-prod", "type": "product", "icon": "product.png"}}, {"channelId": "ops-web", "change": "Roll out updated finance workspace dashboards.", "channel": {"productId": "ops", "productName": "", "name": "ops-web", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["finance-platform", "platform-data"], "supportingTeamIds": ["travel-ops"]}, "initiativeId": "initiative-travel-and-expense-management-2026-05-07-04", "discoveryIds": ["discovery-travel-and-expense-management-2026-04-24-04-finance"], "priority": "p1", "keyResultId": "travel-and-expense-management-2026-q2-cg1-p1/kr-1", "landingPageIndex": 2, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Travel and Expense Management';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Travel and Expense Management Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Finance Export and Spend Intelligence Initiative"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
