<script>
    const initiative = {"title": "Travel Policy and Approval Initiative", "date": "2026-04-22", "description": "Focused investment to improve travel feed coverage, trip policy checks, and pre-trip approval quality.", "customerImpact": [{"customerId": "cg2-p1", "customer": {"id": "cg2-p1", "name": "Travel Manager / Procurement Lead", "group": "Travel Program and Procurement Owners", "icon": "travel_manager.png"}, "customerKPIs": [{"kpi": "In-policy travel booking rate", "expectedImpact": "Increase compliant booking behavior.", "description": "Increase the share of business trips booked within travel policy to 91%.", "unit": "% of booked trips", "currentValue": "72.0", "link": "https://dashboard.example.com/travel-and-expense-management/customers/cg2-p1/kpis/co-cg2-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Spend under pre-approval control", "expectedImpact": "Increase travel spend covered by policy checks before booking.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Managed travel spend share", "expectedImpact": "Increase the amount of travel volume governed by Rydoo workflows.", "description": "Increase the share of customer travel spend flowing through Rydoo-controlled booking or expense workflows to 62%.", "unit": "% of customer travel spend", "currentValue": "39.0", "link": "https://dashboard.example.com/travel-and-expense-management/customers/cg2-p1/kpis/bo-cg2-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "tatt", "change": "Improve travel provider data completeness and latency.", "brick": {"id": "tatt", "name": "Travel Feed and TMC Connectors", "type": "integration", "description": "Imports booking, itinerary, ticket, hotel, and trip-status data from travel management companies and booking providers.", "domain": "Travel and Card Operations", "group": "Travel workflows", "internalModules": [{"title": "Travel connector framework", "description": "Normalizes travel provider payloads into shared trip events.", "type": "integration"}], "interfaces": [{"title": "Travel provider sync APIs", "description": "Provider-specific integration surfaces for booking data ingestion.", "type": "api"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [{"system": "TMC and booking platforms", "type": "partner", "interface": "Booking and itinerary APIs", "description": "Consumes trip and itinerary data from partner travel systems."}], "externalSystemsDependingOnThisBrick": [], "icon": "tatt.png"}}, {"brickId": "trip", "change": "Improve trip policy evaluation by route, class, and supplier.", "brick": {"id": "trip", "name": "Trip Policy Guardrails", "type": "full-stack", "description": "Evaluates trip booking choices and travel expense patterns against route, rate, class, and timing policy.", "domain": "Travel and Card Operations", "group": "Travel workflows", "internalModules": [{"title": "Trip policy evaluator", "description": "Applies travel-specific rules to planned and completed trips.", "type": "service"}], "interfaces": [{"title": "Trip policy review UI", "description": "Shows policy outcomes and override needs for travel workflows.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "poli", "type": "composition", "interface": "Shared policy rules", "description": "Builds travel-specific logic on top of shared policy foundations."}, {"targetBrickId": "trav", "type": "context", "interface": "Trip data model", "description": "Uses trip and itinerary context during rule evaluation."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "trip.png"}}, {"brickId": "aprv", "change": "Improve pre-trip approval routing and escalation.", "brick": {"id": "aprv", "name": "Approval Workflow Orchestration", "type": "full-stack", "description": "Routes spend and trip approvals by manager, budget owner, entity, policy severity, and trip type.", "domain": "Policy and Approval Control", "group": "Policy automation and risk", "internalModules": [{"title": "Routing and escalation engine", "description": "Determines the right approver chain and escalations.", "type": "service"}], "interfaces": [{"title": "Approval inbox", "description": "Manager and approver interface for reviewing and deciding on claims.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "poli", "type": "context", "interface": "Policy status feed", "description": "Uses policy status to decide approval depth."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "aprv.png"}}], "deliveryChannels": [{"channelId": "partner-api-runtime", "change": "Roll out improved travel-provider connector support.", "channel": {"productId": "partner", "productName": "", "name": "partner-api-runtime", "type": "product", "icon": "product.png"}}, {"channelId": "ops-web", "change": "Roll out improved trip workspace and approval views.", "channel": {"productId": "ops", "productName": "", "name": "ops-web", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["travel-ops", "policy-automation"], "supportingTeamIds": ["platform-data"]}, "initiativeId": "initiative-travel-and-expense-management-2026-04-22-02", "discoveryIds": ["discovery-travel-and-expense-management-2026-04-14-02-travel"], "priority": "p1", "keyResultId": "travel-and-expense-management-2026-q2-cg2-p1/kr-1", "landingPageIndex": 4, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Travel and Expense Management';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Travel and Expense Management Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Travel Policy and Approval Initiative"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
