<script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderImpactLines(lines) {
        let html = '';
        lines.forEach(line => {
            html += '<div class="impact-line"><b>' + escapeHtml(line.kpi) + '</b>';
            if (line.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(line.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(line.expectedImpact);
            if (line.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(line.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function uniqueMap(items, keyFn, valueFn) {
        const map = {};
        items.forEach(item => {
            const key = keyFn(item);
            if (!map[key]) {
                map[key] = valueFn(item);
            }
        });
        return Object.values(map);
    }

    function collectCounts(getItems) {
        const counts = {};
        items.forEach(item => {
            getItems(item).forEach(entity => {
                const key = entity.key;
                if (!counts[key]) {

                        name: entity.name,
                        icon: entity.icon,
                        meta: entity.meta,

                }
                counts[key].count += 1;
            });
        });
        return Object.values(counts).sort((a, b) => b.count - a.count).slice(0, 10);

        const colors = {'p0': '#dc2626', 'p1': '#d97706', 'p2': '#6b7280', 'p3': '#9ca3af'};
        const color = colors[priority] || '#6b7280';
        return '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + color + ';margin-left:6px">' + escapeHtml(priority) + '</span>';
    }

    function renderCard(item, index) {
        let html = '';
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-type">Initiative</span>' + priorityBadge(item.priority) + '<span class="card-date" style="margin-left:auto">' + formatDate(item.date) + '</span></div>';
        html += '<div class="card-description">' + escapeHtml(item.title || item.description || 'Initiative') + '</div>';
        if (item.description) {
            html += '<div class="card-copy">' + escapeHtml(item.description) + '</div>';
        }

        if (item.customerImpact && item.customerImpact.length) {
            html += '<div class="section"><div class="section-title">Customer Impact</div>';
            item.customerImpact.forEach(impact => {
                html += '<div class="impact-block">';
                html += '<div class="impact-header"><img class="linked-icon" src="../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../customers/icons/customer.png\'"><div class="impact-id">' + escapeHtml(impact.customer.name) + ' <span class="pill-meta">(' + escapeHtml(impact.customerId) + ')</span></div></div>';
                html += renderImpactLines(impact.customerKPIs || []);
                html += renderImpactLines(impact.businessKPIs || []);
                html += '</div>';
            });
            html += '</div>';
        }

        if (item.productBricks && item.productBricks.length) {
            html += '<div class="section"><div class="section-title">Product Bricks</div>';
            item.productBricks.forEach(brick => {
                html += '<div class="pill"><img class="pill-icon" src="../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + escapeHtml(brick.brick.name) + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="section"><div class="section-title">Delivery Channels</div>';
            item.deliveryChannels.forEach(channel => {
                html += '<div class="pill"><img class="pill-icon" src="../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../product-deployments/icons/product.png\'"><div><div class="pill-name">' + escapeHtml(channel.channel.name) + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (item.keyResultId) {
            html += '<div class="section"><div class="section-title">Linked Key Result</div>';
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(item.keyResultId) + '</div></div></div>';
            html += '</div>';
        }

        const detailUrl = item.objectiveLandingPageUrl || ('landing_pages/' + index + '.html');
        html += '<a class="open-link" target="_blank" href="' + escapeHtml(detailUrl) + '">Open details...</a>';
        html += '</div>';
        return html;
    }

    function renderCardsTab() {
        if (!items.length) {
            document.getElementById('Cards').innerHTML = '<div class="empty">No initiatives available.</div>';
            return;
        }
        let html = '<div class="grid">';
        items.forEach((item, index) => html += renderCard(item, index));
        html += '</div>';
        document.getElementById('Cards').innerHTML = html;
    }

    function renderTableTab() {
        if (!items.length) {
            document.getElementById('Table').innerHTML = '<div class="empty">No initiatives available.</div>';
            return;
        }
        let html = '<div class="table-wrap"><table>';
        html += '<tr><th>Date</th><th>Priority</th><th>Initiative</th><th>Customers & KPIs</th><th>Products & Channels</th><th>Product Bricks</th><th>Details</th></tr>';
        items.forEach((item, index) => {
            html += '<tr>';
            html += '<td style="white-space:nowrap">' + escapeHtml(formatDate(item.date)) + '</td>';
            html += '<td style="white-space:nowrap">' + priorityBadge(item.priority) + '</td>';
            html += '<td style="min-width:300px"><b>' + escapeHtml(item.title || item.description || 'Initiative') + '</b>';
            if (item.description) {
                html += '<div class="pill-meta" style="margin-top:6px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</td>';
            html += '<td style="min-width:280px">';
            (item.customerImpact || []).forEach(impact => {
                html += '<div class="mini-list"><b>' + escapeHtml(impact.customer.name) + '</b><br>';
                const names = []
                    .concat((impact.customerKPIs || []).map(kpi => kpi.kpi))
                    .concat((impact.businessKPIs || []).map(kpi => kpi.kpi));
                html += '<span class="pill-meta">' + escapeHtml(names.slice(0, 4).join(' | ')) + '</span></div>';
            });
            html += '</td>';
            html += '<td style="min-width:220px">';
            (item.deliveryChannels || []).forEach(channel => {
                html += '<div class="mini-list"><b>' + escapeHtml(channel.channel.productName || channel.channel.name) + '</b><br><span class="pill-meta">' + escapeHtml(channel.channel.name) + '</span></div>';
            });
            html += '</td>';
            html += '<td style="min-width:240px">';
            (item.productBricks || []).forEach(brick => {
                html += '<div class="mini-list"><b>' + escapeHtml(brick.brick.name) + '</b><br><span class="pill-meta">' + escapeHtml(brick.change) + '</span></div>';
            });
            html += '</td>';
            const detailUrl = item.objectiveLandingPageUrl || ('landing_pages/' + index + '.html');
            html += '<td><a target="_blank" href="' + escapeHtml(detailUrl) + '">Open</a></td>';
            html += '</tr>';
        });
        html += '</table></div>';
        document.getElementById('Table').innerHTML = html;
    }

    function renderEntities(targetId, title, entities, wide) {
        let html = '<div class="overview-card"><h3>' + title + '</h3>';
        entities.forEach(entity => {
            html += '<div class="' + (wide ? 'entity-wide' : 'entity') + '">';
            html += '<div class="entity-header"><img class="entity-icon" src="' + escapeHtml(entity.iconPath || '../customers/icons/customer.png') + '" onerror="this.onerror=null;this.src=\'../customers/icons/customer.png\'"><div><div class="entity-name">' + escapeHtml(entity.name) + '</div><div class="entity-meta">' + escapeHtml(entity.meta || '') + '</div></div></div>';
            html += '<div class="entity-meta">' + entity.count + ' initiatives</div>';
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderOverviewTab() {
        if (!items.length) {
            document.getElementById('Overview').innerHTML = '<div class="empty">No initiatives available.</div>';
            return;
        }

        const products = collectCounts(item => (item.deliveryChannels || []).map(channel => ({
            key: (channel.channel.productId || '') + '|' + (channel.channel.productName || channel.channel.name),
            name: channel.channel.productName || channel.channel.name,
            iconPath: '../product-deployments/icons/' + (channel.channel.icon || 'product.png'),
            meta: channel.channel.name
        })));

        const bricks = collectCounts(item => (item.productBricks || []).map(brick => ({
            key: brick.brickId,
            name: brick.brick.name,
            iconPath: '../product-bricks/icons/' + (brick.brick.icon || 'logo.png'),
            meta: brick.brick.domain
        })));

        const customers = collectCounts(item => (item.customerImpact || []).map(impact => ({
            key: impact.customerId,
            name: impact.customer.name,
            iconPath: '../customers/icons/' + (impact.customer.icon || 'customer.png'),
            meta: impact.customer.group
        })));

        const kpis = collectCounts(item => {
            let values = [];
            (item.customerImpact || []).forEach(impact => {
                values = values.concat((impact.customerKPIs || []).map(kpi => ({key: 'c-' + kpi.kpi, name: kpi.kpi, iconPath: '../customers/icons/customer.png', meta: kpi.unit || 'customer KPI'})));
                values = values.concat((impact.businessKPIs || []).map(kpi => ({key: 'b-' + kpi.kpi, name: kpi.kpi, iconPath: '../product-deployments/icons/product.png', meta: kpi.unit || 'business KPI'})));
            });
            return values;
        });

        let html = '';
        html += '<div class="overview-banner"><div class="overview-banner-number">' + items.length + '</div><div class="overview-banner-text">initiatives across products, product bricks, customers, channels, and KPI themes in this domain</div></div>';
        html += '<div class="overview-grid">';
        html += '<div>';
        html += renderEntities('products', 'Products In Focus', products, true);
        html += renderEntities('customers', 'Customers & Personas', customers, true);
        html += '</div>';
        html += '<div>';
        html += renderEntities('bricks', 'Most Referenced Product Bricks', bricks, false);
        html += '</div>';
        html += '<div>';
        html += renderEntities('kpis', 'Recurring KPI Themes', kpis, true);
        html += '</div>';
        html += '</div>';
        document.getElementById('Overview').innerHTML = html;
    }

    updateTabLabels();
    renderTableTab();
    renderCardsTab();
    renderOverviewTab();
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Travel and Expense Management Home"
    },
    {
      "label": "Initiatives"
    }
  ]
};
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
