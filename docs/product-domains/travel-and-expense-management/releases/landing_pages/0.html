    <style>

        .impact-header {

        .pill {

            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;

        .pill-name {
            font-weight: bold;
            color: blue;

<script>
    const release = {"title": "Finance Export and Spend Intelligence Release", "date": "2026-06-26", "description": "Release focused on cleaner accounting exports, tax handling, and spend-leakage dashboards for finance and travel leaders.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Finance Operations Director / Group Controller", "group": "Finance and Spend Control Leaders", "icon": "finance_controller.png"}, "customerKPIs": [{"kpi": "Audit-ready record completeness", "expectedImpact": "Increase finance trust in exported and archived spend records.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Monthly close cycle for employee spend", "expectedImpact": "Reduce export and reconciliation delays at month-end.", "description": "Reduce the average time needed to close employee expense, travel, and card spend from period end to booked completion to 2.5 business days.", "unit": "business days", "currentValue": "4.8", "link": "https://dashboard.example.com/travel-and-expense-management/customers/cg1-p1/kpis/co-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}], "businessKPIs": [{"kpi": "Finance automation suite adoption", "expectedImpact": "Increase adoption of finance and analytics workflows in strategic accounts.", "description": "Increase the share of strategic accounts using expense, cards, policy automation, and finance integrations together to 46%.", "unit": "% of strategic accounts", "currentValue": "24.0", "link": "https://dashboard.example.com/travel-and-expense-management/customers/cg1-p1/kpis/bo-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "acct", "change": "Improve entity-aware ERP mapping and export validation.", "brick": {"id": "acct", "name": "ERP and Accounting Sync", "type": "integration", "description": "Exports approved, coded spend into ERP, accounting, and finance systems with entity-aware mappings.", "domain": "Finance Automation and Intelligence", "group": "Finance operations", "internalModules": [{"title": "Accounting mapping framework", "description": "Maps spend records to ledger dimensions and export formats.", "type": "integration"}], "interfaces": [{"title": "Accounting export API", "description": "Produces accounting-ready payloads and export files.", "type": "api"}], "dataDependencies": [{"assetId": "customer-profile", "role": "own", "description": "Acts as the primary owning brick for Customer Profile.", "storeIds": ["customer-profile-db"]}, {"assetId": "customer-contact-point", "role": "write", "description": "Writes or updates Customer Contact Point during domain workflows.", "storeIds": ["customer-contact-point-db"]}, {"assetId": "consent-record", "role": "read", "description": "Reads Consent Record to support domain workflows.", "storeIds": ["consent-record-db"]}, {"assetId": "spend-categorization-and-tax-coding", "role": "read", "description": "Reads Spend Categorization And Tax Coding to support domain workflows.", "storeIds": ["spend-categorization-and-tax-coding-db"]}], "brickDependencies": [{"targetBrickId": "cate", "type": "context", "interface": "Coding model", "description": "Uses category and tax coding to create correct accounting outputs."}], "externalSystemsThisBrickDependsOn": [{"system": "ERP and accounting platforms", "type": "back-office", "interface": "ERP connectors", "description": "Pushes approved spend into finance systems."}], "externalSystemsDependingOnThisBrick": [], "icon": "acct.png"}}, {"brickId": "vatx", "change": "Improve tax-friendly coding and export outputs.", "brick": {"id": "vatx", "name": "VAT and Tax Handling", "type": "service", "description": "Supports tax extraction, tax code validation, and recovery-friendly outputs for finance teams.", "domain": "Finance Automation and Intelligence", "group": "Finance operations", "internalModules": [{"title": "Tax treatment service", "description": "Evaluates tax-relevant fields and recovery attributes for expenses.", "type": "service"}], "interfaces": [{"title": "Tax export API", "description": "Returns tax fields and recovery-related outputs.", "type": "api"}], "dataDependencies": [{"assetId": "customer-contact-point", "role": "read", "description": "Reads Customer Contact Point to support domain workflows.", "storeIds": ["customer-contact-point-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}], "brickDependencies": [{"targetBrickId": "cate", "type": "context", "interface": "Tax coding model", "description": "Uses normalized tax coding and spend classification."}], "externalSystemsThisBrickDependsOn": [{"system": "Tax engines and advisory systems", "type": "tax-system", "interface": "Tax reference data", "description": "Consumes tax reference rules and validation data where needed."}], "externalSystemsDependingOnThisBrick": [], "icon": "vatx.png"}}, {"brickId": "anal", "change": "Improve spend leakage and supplier analytics dashboards.", "brick": {"id": "anal", "name": "Spend Analytics and Benchmarking", "type": "full-stack", "description": "Provides spend, policy, travel, supplier, and process analytics for finance and travel leaders.", "domain": "Finance Automation and Intelligence", "group": "Intelligence and extensibility", "internalModules": [{"title": "Analytics model", "description": "Aggregates spend, workflow, and control metrics across the platform.", "type": "service"}], "interfaces": [{"title": "Analytics dashboards", "description": "Dashboards for spend, travel, and policy insight.", "type": "ui"}], "dataDependencies": [{"assetId": "spend-categorization-and-tax-coding", "role": "read", "description": "Reads Spend Categorization And Tax Coding to support domain workflows.", "storeIds": ["spend-categorization-and-tax-coding-db"]}, {"assetId": "policy-rules", "role": "read", "description": "Reads Policy Rules to support domain workflows.", "storeIds": ["policy-rules-db"]}], "brickDependencies": [{"targetBrickId": "inte", "type": "context", "interface": "Unified domain data", "description": "Uses normalized data from domain integrations and events."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "anal.png"}}], "deliveryChannels": [{"channelId": "partner-api-runtime", "change": "Release updated ERP connector mappings.", "channel": {"productId": "partner", "productName": "", "name": "partner-api-runtime", "type": "product", "icon": "product.png"}}, {"channelId": "ops-web", "change": "Release updated finance and analytics dashboards.", "channel": {"productId": "ops", "productName": "", "name": "ops-web", "type": "product", "icon": "product.png"}}, {"channelId": "tem-data-prod", "change": "Release updated spend intelligence models.", "channel": {"productId": "tem", "productName": "", "name": "tem-data-prod", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["finance-platform", "platform-data"], "supportingTeamIds": ["travel-ops"]}, "initiativeId": "initiative-travel-and-expense-management-2026-05-07-04", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Travel and Expense Management';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Travel and Expense Management Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Finance Export and Spend Intelligence Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
