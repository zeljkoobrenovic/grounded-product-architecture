<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

</style>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;

    }

</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Card Match and Reimbursement Release", "date": "2026-06-12", "description": "Release focused on card-transaction matching quality, exception handling, and reimbursement-state transparency.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Finance Operations Director / Group Controller", "group": "Finance and Spend Control Leaders", "icon": "finance_controller.png"}, "customerKPIs": [{"kpi": "Auto-matched card transaction rate", "expectedImpact": "Increase the share of card transactions reconciled without manual finance work.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Monthly close cycle for employee spend", "expectedImpact": "Reduce time needed to complete month-end employee spend close.", "description": "Reduce the average time needed to close employee expense, travel, and card spend from period end to booked completion to 2.5 business days.", "unit": "business days", "currentValue": "4.8", "link": "https://dashboard.example.com/travel-and-expense-management/customers/cg1-p1/kpis/co-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}], "businessKPIs": [{"kpi": "Card attach in managed spend accounts", "expectedImpact": "Improve adoption of card-backed spend management.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "crec", "change": "Improve card-to-receipt matching and unresolved exception handling.", "brick": {"id": "crec", "name": "Card Transaction Reconciliation", "type": "full-stack", "description": "Matches card events to receipts, trip records, and expense lines while highlighting unresolved exceptions.", "domain": "Travel and Card Operations", "group": "Card-backed spend control", "internalModules": [{"title": "Transaction matching engine", "description": "Correlates card transactions with expense and receipt evidence.", "type": "service"}], "interfaces": [{"title": "Card exception workspace", "description": "Finance interface for reviewing unmatched or disputed card transactions.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "rcpt", "type": "context", "interface": "Receipt evidence service", "description": "Uses captured receipt data in matching decisions."}, {"targetBrickId": "expf", "type": "context", "interface": "Expense line model", "description": "Matches card events to submitted or draft expense lines."}], "externalSystemsThisBrickDependsOn": [{"system": "Card networks and card feed providers", "type": "financial-partner", "interface": "Transaction feeds", "description": "Consumes posted and pending transaction data."}], "externalSystemsDependingOnThisBrick": [], "icon": "crec.png"}}, {"brickId": "reim", "change": "Improve reimbursement-state visibility and payout batching.", "brick": {"id": "reim", "name": "Reimbursement Orchestration", "type": "full-stack", "description": "Turns approved out-of-pocket claims into payable reimbursement instructions and status tracking.", "domain": "Finance Automation and Intelligence", "group": "Finance operations", "internalModules": [{"title": "Reimbursement state service", "description": "Tracks payable status, batches, and employee payout visibility.", "type": "service"}], "interfaces": [{"title": "Reimbursement status UI", "description": "Employee and finance status tracking for reimbursements.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "aprv", "type": "context", "interface": "Approved claim state", "description": "Uses approved claims as reimbursement inputs."}], "externalSystemsThisBrickDependsOn": [{"system": "Payroll and payout systems", "type": "back-office", "interface": "Payout export", "description": "Exports reimbursement instructions to employee payment systems."}], "externalSystemsDependingOnThisBrick": [], "icon": "reim.png"}}, {"brickId": "card", "change": "Improve card admin setup and cardholder activation workflows.", "brick": {"id": "card", "name": "Corporate Card Program", "type": "full-stack", "description": "Supports company card issuance, cardholder controls, and spend instrumentation for employee purchases.", "domain": "Travel and Card Operations", "group": "Card-backed spend control", "internalModules": [{"title": "Card program service", "description": "Maintains cardholder status, controls, and card program metadata.", "type": "service"}], "interfaces": [{"title": "Card admin UI", "description": "Operator workflow for issuing and managing spend cards.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "iden", "type": "context", "interface": "Role and entity controls", "description": "Uses identity and entity scope for cardholder management."}], "externalSystemsThisBrickDependsOn": [{"system": "Card issuing and banking partners", "type": "financial-partner", "interface": "Card program APIs", "description": "Relies on external financial partners for physical or virtual card rails."}], "externalSystemsDependingOnThisBrick": [], "icon": "card.png"}}], "deliveryChannels": [{"channelId": "partner-api-runtime", "change": "Release updated card feed integrations.", "channel": {"productId": "partner", "productName": "", "name": "partner-api-runtime", "type": "product", "icon": "product.png"}}, {"channelId": "mobile-app", "change": "Release updated receipt-to-card attachment flow.", "channel": {"productId": "mobile", "productName": "", "name": "mobile-app", "type": "product", "icon": "product.png"}}, {"channelId": "ops-web", "change": "Release updated reimbursement and card exception views.", "channel": {"productId": "ops", "productName": "", "name": "ops-web", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["audit-and-card-controls", "finance-platform", "card-programs"], "supportingTeamIds": ["capture-and-mobile"]}, "initiativeId": "initiative-travel-and-expense-management-2026-04-30-03", "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Travel and Expense Management';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Travel and Expense Management Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Card Match and Reimbursement Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
