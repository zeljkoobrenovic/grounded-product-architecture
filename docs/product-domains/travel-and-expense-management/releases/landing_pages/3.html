<!DOCTYPE html>

    <style>

    <style>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;

        .meta {
            color: #6b7280;

        }

        .section {
            border-top: 1px solid #e5e7eb;

            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;

        }

        .description {

        .impact-block {
            border-left: 3px solid #d7dce1;

        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>

<table style="margin-top: 10px">

</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Mobile Submission and Smart Audit Release", "date": "2026-05-15", "description": "Release focused on faster mobile submission, stronger OCR extraction, and more explainable smart-audit prioritization.", "customerImpact": [{"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "Traveling Employee / Team Manager", "group": "Employees and Line Managers", "icon": "traveling_employee.png"}, "customerKPIs": [{"kpi": "Time to submit an expense", "expectedImpact": "Reduce the time employees need to capture and submit routine expenses.", "description": "Reduce the median employee time needed to capture and submit a standard expense to under 45 seconds.", "unit": "seconds", "currentValue": "96.0", "link": "https://dashboard.example.com/travel-and-expense-management/customers/cg3-p1/kpis/co-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Receipt scan success rate", "expectedImpact": "Increase first-pass extraction quality on mobile receipts.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Active employee submission rate", "expectedImpact": "Increase repeated employee usage of the mobile workflow.", "description": "Increase the share of active users who submit at least one expense or approval action each month to 78%.", "unit": "% of active licensed users", "currentValue": "59.0", "link": "https://dashboard.example.com/travel-and-expense-management/customers/cg3-p1/kpis/bo-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "rcpt", "change": "Improve extraction quality and field confidence handling.", "brick": {"id": "rcpt", "name": "Receipt Capture and OCR", "type": "full-stack", "description": "Captures receipt images and extracts merchant, amount, date, currency, and tax data into structured expense records.", "domain": "Employee Spend Capture", "group": "Receipt and expense capture", "internalModules": [{"title": "Receipt ingestion service", "description": "Stores receipt images and manages upload flows.", "type": "service"}, {"title": "Extraction and normalization engine", "description": "Extracts key fields and normalizes merchant and currency data.", "type": "service"}], "interfaces": [{"title": "Receipt scan UI", "description": "Mobile and web capture flow for receipt submission.", "type": "ui"}], "dataDependencies": [{"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "receipt-capture-and-ocr", "role": "own", "description": "Acts as the primary owning brick for Receipt Capture And Ocr.", "storeIds": ["receipt-capture-and-ocr-db"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "rcpt.png"}}, {"brickId": "mobl", "change": "Reduce taps required for submission and approval actions.", "brick": {"id": "mobl", "name": "Mobile Expense Submission", "type": "full-stack", "description": "Mobile-first workflows for creating, editing, approving, and tracking expenses and trips.", "domain": "Employee Spend Capture", "group": "Receipt and expense capture", "internalModules": [{"title": "Mobile submission flow", "description": "Coordinates mobile capture, draft saving, and claim submission.", "type": "service"}], "interfaces": [{"title": "Mobile app surfaces", "description": "Employee and manager mobile workflow surfaces.", "type": "ui"}], "dataDependencies": [{"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "approval-workflow-orchestration", "role": "read", "description": "Reads Approval Workflow Orchestration to support domain workflows.", "storeIds": ["approval-workflow-orchestration-db"]}], "brickDependencies": [{"targetBrickId": "rcpt", "type": "composition", "interface": "Receipt extraction service", "description": "Uses extracted receipt fields inside mobile submission."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "mobl.png"}}, {"brickId": "saud", "change": "Improve risk explanations for managers and finance reviewers.", "brick": {"id": "saud", "name": "Smart Audit and Risk Scoring", "type": "full-stack", "description": "Prioritizes finance and manager attention by scoring expense, trip, and card events for duplicate, policy, and fraud risk.", "domain": "Policy and Approval Control", "group": "Policy automation and risk", "internalModules": [{"title": "Audit scoring engine", "description": "Assigns risk and audit priority to submitted spend items.", "type": "service"}], "interfaces": [{"title": "Audit review workspace", "description": "Finance-facing workspace for reviewing flagged claims.", "type": "ui"}], "dataDependencies": [{"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "smart-audit-and-risk-scoring", "role": "own", "description": "Acts as the primary owning brick for Smart Audit And Risk Scoring.", "storeIds": ["smart-audit-and-risk-scoring-stream"]}], "brickDependencies": [{"targetBrickId": "poli", "type": "context", "interface": "Policy outcomes feed", "description": "Uses policy outcomes as core risk signals."}, {"targetBrickId": "docv", "type": "context", "interface": "Evidence store", "description": "Links risk decisions to stored receipt and approval evidence."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "saud.png"}}], "deliveryChannels": [{"channelId": "mobile-app", "change": "Release updated mobile capture and approval flows.", "channel": {"productId": "mobile", "productName": "", "name": "mobile-app", "type": "product", "icon": "product.png"}}, {"channelId": "ops-web", "change": "Release updated audit review workspace.", "channel": {"productId": "ops", "productName": "", "name": "ops-web", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["capture-and-mobile", "audit-and-card-controls"], "supportingTeamIds": ["expense-reporting"]}, "initiativeId": "initiative-travel-and-expense-management-2026-04-15-01", "landingPageIndex": 3, "objectiveLandingPageUrl": ""};
    const domainName = 'Travel and Expense Management';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Travel and Expense Management Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Mobile Submission and Smart Audit Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
