    <style>

        .impact-header {

        .impact-line {

        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">

</td>
<td>

<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Guest Trust Clarity Release", "date": "2026-05-16", "description": "Release focused on improving guest booking confidence through clearer total price explanation, review trust presentation, and cancellation guidance on listing and checkout surfaces.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Guest Stay Booker", "group": "Demand-Side Guests", "icon": "guest.png"}, "customerKPIs": [{"kpi": "Guest booking conversion", "expectedImpact": "Increase conversion by reducing trust and pricing uncertainty before booking.", "description": "Increase guest search-session to booking conversion to about 4.7% in priority markets by improving listing trust and checkout clarity.", "unit": "% of high-intent sessions", "currentValue": "96.5", "link": "https://dashboard.example.com/hosted-stays-marketplace/customers/cg1-p1/kpis/co-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Price transparency score", "expectedImpact": "Increase clarity about fees and cancellation terms.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Booked nights per active guest", "expectedImpact": "Increase repeat booking behavior by improving first-booking trust.", "description": "Grow repeat booked nights per active guest above 2.3 annually in focus cohorts.", "unit": "nights per active guest", "currentValue": "49", "link": "https://dashboard.example.com/hosted-stays-marketplace/customers/cg1-p1/kpis/bo-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "list", "change": "Improve review, host trust, and policy presentation.", "brick": {"id": "list", "name": "Listing Detail & Review Trust", "type": "full-stack", "description": "Listing page, review presentation, amenity clarity, host reputation, and policy explanation before booking.", "domain": "Guest Experience", "group": "Discovery and consideration", "internalModules": [{"title": "Listing content renderer", "description": "Builds listing detail views with media, amenities, and house rules.", "type": "full-stack"}, {"title": "Review and trust evidence service", "description": "Provides review summaries, quality signals, and host credibility surfaces.", "type": "service"}], "interfaces": [{"title": "Listing detail UI", "description": "Guest-facing listing page and trust presentation.", "type": "ui"}, {"title": "Listing detail API", "description": "API for listing, host, and review detail.", "type": "api"}], "brickDependencies": [{"targetBrickId": "trst", "type": "trust", "interface": "Protection and policy surfaces", "description": "Uses marketplace trust context to reduce booking anxiety."}, {"targetBrickId": "grev", "type": "feedback", "interface": "Review data service", "description": "Uses validated review signals after completed stays."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "list.png"}}, {"brickId": "book", "change": "Clarify total price, fee explanation, and cancellation logic.", "brick": {"id": "book", "name": "Booking & Checkout", "type": "full-stack", "description": "Reservation creation, fee and policy explanation, payment choice, and booking confirmation.", "domain": "Guest Experience", "group": "Booking and stay management", "internalModules": [{"title": "Reservation orchestration", "description": "Validates listing state, guest details, and policy conditions at booking time.", "type": "service"}, {"title": "Checkout experience", "description": "Drives guest booking flows across web and mobile.", "type": "full-stack"}], "interfaces": [{"title": "Checkout UI", "description": "Guest-facing booking and confirmation flow.", "type": "ui"}, {"title": "Reservation API", "description": "API for creating and confirming reservations.", "type": "api"}], "brickDependencies": [{"targetBrickId": "paym", "type": "payment", "interface": "Payment and fee service", "description": "Uses payment, fee, and refund logic."}, {"targetBrickId": "trst", "type": "risk", "interface": "Booking risk decision", "description": "Checks trust and screening state before confirmation."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "book.png"}}, {"brickId": "trst", "change": "Surface stronger guest-facing protection cues.", "brick": {"id": "trst", "name": "Trust, Safety & AirCover", "type": "service", "description": "Reservation screening, trust enforcement, host protection, guest safety, and AirCover-related controls.", "domain": "Marketplace Foundations", "group": "Trust, payments, and policy", "internalModules": [{"title": "Risk scoring and screening", "description": "Evaluates reservation risk and policy-sensitive demand.", "type": "service"}, {"title": "Protection and incident workflow", "description": "Supports AirCover, damage, and safety intervention paths.", "type": "service"}], "interfaces": [{"title": "Trust decision API", "description": "Shared API for risk and trust decisions.", "type": "api"}, {"title": "Incident operations UI", "description": "Internal trust and incident handling workflow.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "idvr", "type": "identity", "interface": "Verification API", "description": "Uses identity state as input to risk decisions."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "trst.png"}}], "deliveryChannels": [{"channelId": "web-cdn-edge", "change": "Roll out updated listing and checkout treatments on web.", "channel": {"productId": "web", "productName": "", "name": "web-cdn-edge", "type": "product", "icon": "product.png"}}, {"channelId": "core-cloud-runtime", "change": "Release supporting trust and pricing service changes.", "channel": {"productId": "core", "productName": "", "name": "core-cloud-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["guest-discovery-ranking", "guest-booking-trip"], "supportingTeamIds": ["trust-aircover-support", "payments-and-ledger"]}, "initiativeId": "initiative-hosted-stays-marketplace-2026-04-18-01", "landingPageIndex": 2, "objectiveLandingPageUrl": ""};
    const domainName = 'Hosted Stays Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Hosted Stays Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Guest Trust Clarity Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
