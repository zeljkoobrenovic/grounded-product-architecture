<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Hosted Stays Marketplace)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Guest Trust Clarity Initiative", "date": "2026-04-18", "description": "Focused investment to improve guest booking confidence by clarifying total price, listing trust, host reputation, and cancellation explanation at the moment of decision.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Guest Stay Booker", "group": "Demand-Side Guests", "icon": "guest.png"}, "customerKPIs": [{"kpi": "Guest booking conversion", "expectedImpact": "Increase conversion by reducing trust and pricing ambiguity before booking.", "description": "Increase guest search-session to booking conversion to about 4.7% in priority markets by improving listing trust and checkout clarity.", "unit": "% of high-intent sessions", "currentValue": "96.5", "link": "https://dashboard.example.com/hosted-stays-marketplace/customers/cg1-p1/kpis/co-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Price transparency score", "expectedImpact": "Increase guest clarity about fees and cancellation tradeoffs.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Booked nights per active guest", "expectedImpact": "Increase repeat guest behavior through stronger first-booking confidence.", "description": "Grow repeat booked nights per active guest above 2.3 annually in focus cohorts.", "unit": "nights per active guest", "currentValue": "49", "link": "https://dashboard.example.com/hosted-stays-marketplace/customers/cg1-p1/kpis/bo-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "list", "change": "Improve host trust, review summary, and policy clarity on listing pages.", "brick": {"id": "list", "name": "Listing Detail & Review Trust", "type": "full-stack", "description": "Listing page, review presentation, amenity clarity, host reputation, and policy explanation before booking.", "domain": "Guest Experience", "group": "Discovery and consideration", "internalModules": [{"title": "Listing content renderer", "description": "Builds listing detail views with media, amenities, and house rules.", "type": "full-stack"}, {"title": "Review and trust evidence service", "description": "Provides review summaries, quality signals, and host credibility surfaces.", "type": "service"}], "interfaces": [{"title": "Listing detail UI", "description": "Guest-facing listing page and trust presentation.", "type": "ui"}, {"title": "Listing detail API", "description": "API for listing, host, and review detail.", "type": "api"}], "brickDependencies": [{"targetBrickId": "trst", "type": "trust", "interface": "Protection and policy surfaces", "description": "Uses marketplace trust context to reduce booking anxiety."}, {"targetBrickId": "grev", "type": "feedback", "interface": "Review data service", "description": "Uses validated review signals after completed stays."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "list.png"}}, {"brickId": "book", "change": "Clarify fee and cancellation language in checkout.", "brick": {"id": "book", "name": "Booking & Checkout", "type": "full-stack", "description": "Reservation creation, fee and policy explanation, payment choice, and booking confirmation.", "domain": "Guest Experience", "group": "Booking and stay management", "internalModules": [{"title": "Reservation orchestration", "description": "Validates listing state, guest details, and policy conditions at booking time.", "type": "service"}, {"title": "Checkout experience", "description": "Drives guest booking flows across web and mobile.", "type": "full-stack"}], "interfaces": [{"title": "Checkout UI", "description": "Guest-facing booking and confirmation flow.", "type": "ui"}, {"title": "Reservation API", "description": "API for creating and confirming reservations.", "type": "api"}], "brickDependencies": [{"targetBrickId": "paym", "type": "payment", "interface": "Payment and fee service", "description": "Uses payment, fee, and refund logic."}, {"targetBrickId": "trst", "type": "risk", "interface": "Booking risk decision", "description": "Checks trust and screening state before confirmation."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "book.png"}}], "deliveryChannels": [{"channelId": "web-cdn-edge", "change": "Release updated listing and checkout treatments.", "channel": {"productId": "web", "productName": "", "name": "web-cdn-edge", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["guest-discovery-ranking", "guest-booking-trip"], "supportingTeamIds": ["payments-and-ledger", "trust-aircover-support"]}, "initiativeId": "initiative-hosted-stays-marketplace-2026-04-18-01", "discoveryIds": ["discovery-hosted-stays-marketplace-2026-04-08-01-guest-trust"], "priority": "p1", "keyResultId": "hosted-stays-marketplace-2026-q2-cg1-p1/kr-1", "landingPageIndex": 3, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Hosted Stays Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
