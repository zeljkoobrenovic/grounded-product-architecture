    <style>

        .section-title {

        .impact-id {

            margin-bottom: 8px;
        }

        .entity-link {

        }

        .entity-link:hover {

        }

        .impact-header {

            gap: 10px;
            margin-bottom: 8px;

        .impact-line {
            margin-bottom: 6px;

        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>

<script>
    const initiative = {"title": "New Host Fast Activation Initiative", "date": "2026-04-22", "description": "Focused investment to reduce host setup friction with simpler authoring, more useful defaults, and better first-booking pricing guidance.", "customerImpact": [{"customerId": "cg2-p1", "customer": {"id": "cg2-p1", "name": "Everyday Home Host", "group": "Supply-Side Hosts", "icon": "host.png"}, "customerKPIs": [{"kpi": "Time to first booking", "expectedImpact": "Reduce time to first booking by launching better-prepared listings sooner.", "description": "Reduce median time from published listing to first confirmed booking to 21 days in focus markets.", "unit": "days", "currentValue": "6", "link": "https://dashboard.example.com/hosted-stays-marketplace/customers/cg2-p1/kpis/co-cg2-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Host activation rate", "expectedImpact": "Increase live-listing conversion from setup starts.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Active listing quality rate", "expectedImpact": "Increase quality of new active supply by improving setup completeness.", "description": "Increase the share of live listings meeting booking, quality, and trust thresholds to 74%.", "unit": "% of live listings", "currentValue": "73.4", "link": "https://dashboard.example.com/hosted-stays-marketplace/customers/cg2-p1/kpis/bo-cg2-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "hono", "change": "Reduce activation steps and clarify readiness.", "brick": {"id": "hono", "name": "Host Onboarding & Verification", "type": "full-stack", "description": "Host signup, onboarding, readiness checks, and verification before a listing goes live.", "links": [], "domain": "Host Success", "group": "Host activation and optimization", "internalModules": [{"title": "Host activation flow", "description": "Guides new hosts through setup and eligibility tasks.", "type": "full-stack"}, {"title": "Host readiness service", "description": "Evaluates whether listing, identity, and policy prerequisites are complete.", "type": "service"}], "interfaces": [{"title": "Host onboarding UI", "description": "Host-facing activation and setup workflow.", "type": "ui"}, {"title": "Readiness API", "description": "API for activation status and verification steps.", "type": "api"}], "dataDependencies": [{"assetId": "listing-authoring-content", "role": "read", "description": "Reads Listing Authoring Content to support domain workflows.", "storeIds": ["listing-authoring-content-store"]}], "brickDependencies": [{"targetBrickId": "idvr", "type": "identity", "interface": "Verification API", "description": "Uses identity verification to confirm host legitimacy."}, {"targetBrickId": "comp", "type": "policy", "interface": "Market rule API", "description": "Uses local market policy eligibility and restrictions."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "hono.png"}}, {"brickId": "lista", "change": "Improve setup quality prompts and content guidance.", "brick": {"id": "lista", "name": "Listing Authoring & Content", "type": "full-stack", "description": "Listing setup, content editing, photo guidance, policy selection, and amenity configuration.", "links": [], "domain": "Host Success", "group": "Host activation and optimization", "internalModules": [{"title": "Listing editor", "description": "Supports content authoring for titles, descriptions, photos, and house rules.", "type": "full-stack"}, {"title": "Content quality service", "description": "Scores listing completeness and merchandising quality.", "type": "service"}], "interfaces": [{"title": "Listing editor UI", "description": "Host-facing content editing workflow.", "type": "ui"}, {"title": "Listing content API", "description": "API for listing content state and validation.", "type": "api"}], "dataDependencies": [{"assetId": "identity-credential", "role": "read", "description": "Reads Identity Credential to support domain workflows.", "storeIds": ["identity-credential-db"]}, {"assetId": "session-token", "role": "own", "description": "Acts as the primary owning brick for Session Token.", "storeIds": ["session-token-db"]}, {"assetId": "access-policy", "role": "own", "description": "Acts as the primary owning brick for Access Policy.", "storeIds": ["access-policy-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}], "brickDependencies": [{"targetBrickId": "list", "type": "consumption", "interface": "Listing detail API", "description": "Provides listing data consumed by guest-facing listing pages."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "lista.png"}}, {"brickId": "pric", "change": "Improve launch pricing suggestions.", "brick": {"id": "pric", "name": "Pricing & Discounts", "type": "full-stack", "description": "Nightly pricing, discount programs, stay rules, and monetization guidance for hosts and operators.", "links": [], "domain": "Host Success", "group": "Host activation and optimization", "internalModules": [{"title": "Pricing rules engine", "description": "Applies host-defined pricing, discounts, and length-of-stay rules.", "type": "service"}, {"title": "Pricing guidance layer", "description": "Surfaces marketplace-informed pricing suggestions and discount prompts.", "type": "full-stack"}], "interfaces": [{"title": "Pricing UI", "description": "Host-facing pricing and promotion controls.", "type": "ui"}, {"title": "Pricing API", "description": "API for prices, discounts, and price recommendations.", "type": "api"}], "dataDependencies": [{"assetId": "pricing-discounts", "role": "own", "description": "Acts as the primary owning brick for Pricing Discounts.", "storeIds": ["pricing-discounts-db"]}], "brickDependencies": [{"targetBrickId": "data", "type": "insight", "interface": "Demand and market signal service", "description": "Uses demand and search insight to inform pricing suggestions."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "pric.png"}}], "deliveryChannels": [{"channelId": "web-cdn-edge", "change": "Release improved host setup and authoring flows.", "channel": {"productId": "web", "productName": "", "name": "web-cdn-edge", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["host-activation-quality"], "supportingTeamIds": ["host-performance-pricing", "policy-compliance-controls"]}, "initiativeId": "initiative-hosted-stays-marketplace-2026-04-22-02", "discoveryIds": ["discovery-hosted-stays-marketplace-2026-04-10-02-host-activation"], "priority": "p1", "keyResultId": "hosted-stays-marketplace-2026-q2-cg2-p1/kr-1", "landingPageIndex": 2, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Hosted Stays Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Hosted Stays Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "New Host Fast Activation Initiative"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
