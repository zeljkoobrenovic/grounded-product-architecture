<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Bike Mobility)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"date": "2026-02-03", "description": "Rider conversion and trust initiative focused on improving bike catalog & recommendation, order orchestration & checkout, rider identity, wallet & app experience, and communications & notifications across iOS App, Android App, Rider Web Experience, and Lifecycle Notifications.", "customerImpact": [{"customerId": "knowledge_worker_commuter", "customer": {"id": "knowledge_worker_commuter", "name": "Urban Knowledge Worker Commuter", "group": "Employees and Riders", "icon": "bicycle.png"}, "customerKPIs": [{"kpi": "Quote-to-order conversion", "expectedImpact": "Increase quote-to-order conversion by making affordability, order status, and handover expectations more transparent.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Time to first confirmed order", "expectedImpact": "Decrease time to first confirmed order by removing order blockers and improving rider guidance.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Active riders", "expectedImpact": "Increase active riders by converting more interested employees into delivered and activated riders.", "description": "Count of riders with a live contract and recent activity.", "unit": "count", "kind": "business"}, {"kpi": "Renewal and upgrade rate", "expectedImpact": "Increase renewal and upgrade rate by starting the contract lifecycle with stronger rider trust.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "cata", "change": "Extended Bike Catalog & Recommendation with commute-oriented package guidance and better local-availability signaling.", "brick": {"id": "cata", "name": "Bike Catalog & Recommendation", "domain": "commerce_and_ordering", "group": "rider-acquisition-and-ordering", "icon": "cata.png"}}, {"brickId": "orde", "change": "Extended Order Orchestration & Checkout with clearer step sequencing, approval handling, and order-state transparency.", "brick": {"id": "orde", "name": "Order Orchestration & Checkout", "domain": "commerce_and_ordering", "group": "rider-acquisition-and-ordering", "icon": "orde.png"}}, {"brickId": "ride", "change": "Extended Rider Identity, Wallet & App Experience with richer status views, document access, and post-order self-service.", "brick": {"id": "ride", "name": "Rider Identity, Wallet & App Experience", "domain": "rider_experience", "group": "rider-lifecycle-and-self-service", "icon": "ride.png"}}, {"brickId": "cmns", "change": "Extended Communications & Notifications with event-driven reminders and delivery-stage updates.", "brick": {"id": "cmns", "name": "Communications & Notifications", "domain": "platform_foundation", "group": "shared-platform-services", "icon": "cmns.png"}}], "deliveryChannels": [{"channelId": "prod_rider_app-ios", "change": "Introduced rider conversion and order-tracking improvements in iOS App.", "channel": {"productId": "prod_rider_app", "productName": "Rider Experience", "name": "iOS App", "type": "mobile_app", "icon": "mobile_app.png"}}, {"channelId": "prod_rider_app-android", "change": "Introduced rider conversion and order-tracking improvements in Android App.", "channel": {"productId": "prod_rider_app", "productName": "Rider Experience", "name": "Android App", "type": "mobile_app", "icon": "mobile_app.png"}}, {"channelId": "prod_rider_app-web", "change": "Introduced quote and enrollment workflow improvements in Rider Web Experience.", "channel": {"productId": "prod_rider_app", "productName": "Rider Experience", "name": "Rider Web Experience", "type": "web", "icon": "web.png"}}, {"channelId": "prod_rider_app-notification", "change": "Introduced proactive lifecycle messages in Lifecycle Notifications.", "channel": {"productId": "prod_rider_app", "productName": "Rider Experience", "name": "Lifecycle Notifications", "type": "notification", "icon": "notification.png"}}], "teams": {"primaryTeamIds": ["bike-rider-growth", "bike-rider-mobile", "bike-rider-lifecycle"], "supportingTeamIds": ["bike-partner-network", "bike-data-platform"]}, "initiativeId": "initiative-bike-mobility-2026-02-03-01", "discoveryIds": ["discovery-bike-mobility-2026-01-27-02-rider-conversion-and-trust"], "discoveryLinks": [{"discoveryId": "discovery-bike-mobility-2026-01-27-02-rider-conversion-and-trust", "discoveryName": "Rider conversion and trust: validated discovery", "status": "archived", "landingPageIndex": 2}], "landingPageIndex": 2};
    const domainName = 'Bike Mobility';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
