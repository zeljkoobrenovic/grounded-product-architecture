<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discovery (Bike Mobility)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Employer launch model: validated discovery", "id": "discovery-bike-mobility-2026-01-10-01-employer-launch-model", "name": "Employer launch model: validated discovery", "status": "archived", "lastUpdated": "2026-01-15", "summary": "Discovery confirmed that employer adoption is constrained less by commercial interest than by payroll, policy, and launch friction, which makes rollout standardization a high-value product investment.", "opportunity": "Clarify whether standardizing employer policy setup, payroll integration, and billing control would materially reduce time to launch and improve employer confidence.", "linkedInitiatives": [{"initiativeId": "initiative-bike-mobility-2026-01-15-00", "description": "Employer launch acceleration initiative focused on improving employer policy & program management, eligibility, payroll & HRIS sync, and settlement, invoicing & payroll reconciliation to make multi-country employer rollouts faster and less manual across Employer Admin Portal, Employer Integration API, and Employer KPI Cockpit.", "landingPageIndex": 3, "initiativeDescription": "Employer launch acceleration initiative focused on improving employer policy & program management, eligibility, payroll & HRIS sync, and settlement, invoicing & payroll reconciliation to make multi-country employer rollouts faster and less manual across Employer Admin Portal, Employer Integration API, and Employer KPI Cockpit."}], "teams": {"leadTeamId": "bike-employer-platform", "supportingTeamIds": ["bike-employer-integrations", "bike-finance-reconciliation", "bike-workflow-platform"], "assignments": [{"teamId": "bike-employer-platform", "teamName": "Bike Employer Platform", "role": "lead", "roleLabel": "Lead discovery team", "how": "Led the discovery framing, employer interviews, and synthesis that shaped the launch acceleration initiative."}, {"teamId": "bike-employer-integrations", "teamName": "Bike Employer Integrations", "role": "support", "roleLabel": "Supporting discovery team", "how": "Validated the integration constraints and the level of standardization possible across payroll and HRIS systems."}, {"teamId": "bike-finance-reconciliation", "teamName": "Bike Finance Reconciliation", "role": "support", "roleLabel": "Supporting discovery team", "how": "Validated billing, settlement, and payroll reconciliation pain points that slowed launches."}, {"teamId": "bike-workflow-platform", "teamName": "Bike Workflow Platform", "role": "support", "roleLabel": "Supporting discovery team", "how": "Helped define which exception-heavy launch tasks could be turned into reusable workflow states."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers buy the product and/or choose to use it?", "hypothesis": "Employers will adopt the platform faster if rollout no longer feels like a bespoke implementation project.", "evidenceToCollect": ["Whether HR and mobility leaders describe launch friction as a primary barrier to expansion.", "Whether faster launch readiness changes employer willingness to expand into additional countries."], "methods": ["Employer interviews", "Rollout retrospective analysis", "Concept validation"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "Lower launch effort and better rollout control will improve employer retention enough to justify investment in a stronger setup model.", "evidenceToCollect": ["What retention and expansion signals are tied to launch quality.", "How much manual rollout effort can realistically be removed."], "methods": ["Business case review", "Ops effort analysis", "Margin review"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Employer admins can configure and validate a launch flow with less support if the system is clearer and more guided.", "evidenceToCollect": ["Where employer admins get stuck during policy setup and data validation.", "What checklist and status information they expect before go-live."], "methods": ["Admin workflow testing", "Usability walkthroughs", "Support case review"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The teams can standardize the highest-friction launch steps without overhauling every country process at once.", "evidenceToCollect": ["Which steps can be templated now and which still require local exceptions.", "Whether integration sequencing can be broken into reusable rollout stages."], "methods": ["Architecture review", "Workflow decomposition", "Rollout slicing workshop"]}], "plannedActivities": ["Interview employer admins from recently launched and delayed programs.", "Map the current end-to-end launch workflow across policy, payroll, and billing.", "Define the smallest standard launch package for the next quarter."], "decisionToMake": "Decide whether to fund a launch acceleration initiative centered on standardization rather than ad hoc implementation support.", "outcome": {"decision": "proceed", "summary": "Discovery showed enough employer pain and enough standardization headroom to proceed with a focused launch-acceleration initiative."}, "startDate": "2025-12-08", "endDate": "2026-01-15", "statusLabel": "Archived", "landingPageIndex": 3, "date": "2025-12-08", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'Bike Mobility';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome) {
        const decisionColors = {'proceed': '#16a34a', 'narrow': '#d97706', 'sequence': '#6366f1', 'pivot': '#d97706', 'park': '#6b7280', 'kill': '#dc2626'};
        const dColor = decisionColors[discovery.outcome.decision] || '#6b7280';
        html += '<div class="section"><div class="section-title">Outcome</div>';
        if (discovery.outcome.decision) {
            html += '<div style="margin-bottom:10px"><span style="display:inline-block;padding:4px 12px;border-radius:999px;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + dColor + '">' + escapeHtml(discovery.outcome.decision) + '</span></div>';
        }
        if (discovery.outcome.summary) {
            html += '<div class="description">' + escapeHtml(discovery.outcome.summary) + '</div>';
        }
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
