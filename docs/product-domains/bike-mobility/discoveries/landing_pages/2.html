    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">

</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Rider conversion and trust: validated discovery", "id": "discovery-bike-mobility-2026-01-27-02-rider-conversion-and-trust", "name": "Rider conversion and trust: validated discovery", "status": "archived", "lastUpdated": "2026-02-03", "summary": "Discovery confirmed that rider drop-off is concentrated around affordability ambiguity, opaque order progress, and low confidence in service recovery after delivery.", "opportunity": "Clarify whether improving quote transparency, order visibility, and rider self-service would materially improve rider conversion and early confidence.", "linkedInitiatives": [{"initiativeId": "initiative-bike-mobility-2026-02-03-01", "description": "Rider conversion and trust initiative focused on improving bike catalog & recommendation, order orchestration & checkout, rider identity, wallet & app experience, and communications & notifications across iOS App, Android App, Rider Web Experience, and Lifecycle Notifications.", "landingPageIndex": 2, "initiativeDescription": "Rider conversion and trust initiative focused on improving bike catalog & recommendation, order orchestration & checkout, rider identity, wallet & app experience, and communications & notifications across iOS App, Android App, Rider Web Experience, and Lifecycle Notifications."}], "teams": {"leadTeamId": "bike-rider-growth", "supportingTeamIds": ["bike-rider-mobile", "bike-rider-lifecycle", "bike-partner-network"], "assignments": [{"teamId": "bike-rider-growth", "teamName": "Bike Rider Growth", "role": "lead", "roleLabel": "Lead discovery team", "how": "Led rider interviews, drop-off analysis, and the recommendation on where conversion and trust work should focus first."}, {"teamId": "bike-rider-mobile", "teamName": "Bike Rider Mobile", "role": "support", "roleLabel": "Supporting discovery team", "how": "Validated mobile-specific friction in quote exploration, status visibility, and rider support entry points."}, {"teamId": "bike-rider-lifecycle", "teamName": "Bike Rider Lifecycle", "role": "support", "roleLabel": "Supporting discovery team", "how": "Validated how notifications and lifecycle visibility affect rider trust after order confirmation."}, {"teamId": "bike-partner-network", "teamName": "Bike Partner Network", "role": "support", "roleLabel": "Supporting discovery team", "how": "Provided dealer and handover constraints that shape rider expectations after checkout."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers buy the product and/or choose to use it?", "hypothesis": "Employees who already like the bike benefit still need clearer financial and operational certainty before they commit.", "evidenceToCollect": ["Where riders abandon the process during quote and checkout.", "Whether better status transparency changes willingness to complete the order."], "methods": ["Rider interviews", "Funnel analysis", "Concept testing"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "Better conversion and lower trust-related support burden create enough value to justify dedicated rider-experience investment.", "evidenceToCollect": ["What portion of support demand is caused by poor transparency rather than true operational failure.", "How rider drop-off affects the active-rider base and early lifecycle value."], "methods": ["Support analysis", "Business case review", "Activation cohort review"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Riders can complete the core quote-to-order journey with much less anxiety if cost and next steps are explicit.", "evidenceToCollect": ["Where riders misread cost, timing, or service expectations.", "Which order states need plain-language explanations."], "methods": ["Prototype tests", "Journey walkthroughs", "Task observation"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The teams can improve trust materially without rebuilding the full commerce stack.", "evidenceToCollect": ["Which improvements can be delivered via order-state visibility, message orchestration, and self-service first.", "Where partner dependencies will still limit end-to-end control."], "methods": ["Technical spike", "Dependency review", "Incremental delivery planning"]}], "plannedActivities": ["Interview recent riders who abandoned after creating a quote.", "Review order status touchpoints and support tickets from the first month after order confirmation.", "Test a clearer rider timeline for affordability, order progress, and handover readiness."], "decisionToMake": "Decide whether to proceed with a rider trust initiative focused on visibility and lifecycle confidence rather than purely acquisition messaging.", "outcome": {"decision": "proceed", "summary": "Discovery showed that conversion and post-order confidence problems are concrete enough to justify a dedicated rider trust initiative."}, "startDate": "2026-01-06", "endDate": "2026-02-03", "statusLabel": "Archived", "landingPageIndex": 2, "date": "2026-01-06", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'Bike Mobility';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome && discovery.outcome.summary) {
        html += '<div class="section"><div class="section-title">Outcome</div><div class="description">' + escapeHtml(discovery.outcome.summary) + '</div></div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
