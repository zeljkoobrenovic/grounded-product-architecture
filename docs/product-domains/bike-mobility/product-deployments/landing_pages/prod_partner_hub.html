<script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

<script>
    function addNavigation() {
        let html = '';
        html += '<div style="margin: 4px 20px 10px 20px; font-size: 85%; color: black">';
        all_products.forEach(per => {
            html += '<a href="' + per.id + '.html">';
            const tabClass = per.id === product.id ? 'tab-image-selected' : 'tab-image';
            html += '<img src="../icons/' + per.icon + '" style="" class="' + tabClass + '" onerror="this.onerror=null;this.src=\'../icons/product.png\'">';
            html += '</a>';
        });
        html += '</div>';

        document.getElementById('Navigation').innerHTML = html;
    }

    addNavigation();

    function addHeader() {
        let html = '';

        html += '<table>';
        html += '<tr>';
        html += '<td>';
        html += '<div>';
        html += '<img src="../icons/' + product.icon + '" style="width: 110px" onerror="this.onerror=null;this.src=\'../icons/product.png\'">';
        html += '</div>';
        html += '</td>';
        html += '<td style="vertical-align: top">';
        html += '<div class="page-type-badge" style="margin-left: 20px; margin-top: 8px;">Product</div>';
        html += '<div style="font-size: 50px; margin-left: 20px">';
        html += product.name;
        html += '</div>';
        html += '<div style="margin-left: 20px; font-size: 90%; color: grey; vertical-align: top">';
        html += product.primaryCustomers.map(c => c.name).join(' | ');
        html += '</div>';
        html += '<div style="font-size: 16px; margin-left: 20px; color: grey; margin-top: 3px">';
        html += product.description ? product.description : '';
        html += '</div>';
        html += '</td>';
        html += '</tr>';
        html += '</table>';

        document.getElementById('Header').innerHTML = html;
    }

    function addTabLabels() {
        const interfaceCount = (product.interfaces || []).length;
        const channelCount = getDeploymentChannelGroups().reduce((sum, group) => sum + (group.channels || []).length, 0);
        const brickCount = (product.neededBricks || []).length;
        const dependencyCount = interfaceCount + channelCount + brickCount;

        document.getElementById('tab_InterfacesTab').innerText = 'Interfaces (' + interfaceCount + ')';
        document.getElementById('tab_ChannelsTab').innerText = 'Channels (' + channelCount + ')';
        document.getElementById('tab_BricksTab').innerText = 'Bricks (' + brickCount + ')';
        document.getElementById('tab_DependenciesTab').innerText = 'Dependencies (' + dependencyCount + ')';
    }

    function addInterfaces() {
        let html = '';
        html += '<div class="home-stage">';
        html += '<div class="home-stage-title">Interfaces</div>';
        html += '<div class="home-stage-subtitle">Customer-facing entry points and touchpoints</div>';
        (product.interfaces || []).forEach(interface => {
            html += '<div style="text-align: center; max-width: 200px; vertical-align: bottom; display: inline-block; vertical-align: top">';
            html += '<div style="border: 2px solid white; padding: 8px; margin: 5px; margin-bottom: 4px; color: black; display: inline-block">';
            (interface.users || []).forEach(user => {
                html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px; font-size: 80%">';
                html += user;
                html += '</div>';
                html += "<div>|</div>";
            });
            html += '</div>';
            html += '<div style="text-align: center; max-width: 200px; vertical-align: top">';
            html += '<div style="border: 2px solid grey; padding: 8px; margin: 5px; vertical-align: top">';
            html += '<img src="../icons/' + interface.type + '.png" style="height: 42px; margin: 0; margin-top: -28px; background-color: rgba(255,255,255,1)">';
            html += '<div style="color: blue; margin-bottom: 0px; height: 2em; margin-top: 0; color: grey; font-size: 80%">' + interface.type + '</div>';
            html += '<div style="color: blue; margin-bottom: 10px; height: 2em; margin-top: 0px">' + interface.name + '</div>';
            if (interface.availabilityHorizon) {
                html += '<div style="color: #1d4ed8; margin-bottom: 8px; margin-top: 0; text-align: center; font-size: 75%; text-transform: uppercase; letter-spacing: 0.04em">' + escapeHtml(interface.availabilityHorizon) + '</div>';
            }
            if (interface.description) {
                html += '<div style="color: grey; margin-bottom: 6px; margin-top: 0; text-align: center; font-size: 75%; line-height: 1.4">' + escapeHtml(interface.description) + '</div>';
            }
            html += renderInterfaceChannelIcons(interface.type);
            html += '</div>';
            html += '</div>';
            html += '</div>';

        });
        html += '</div>';
        document.getElementById('Interfaces').innerHTML = html;
    }

    function addChannels() {
        let html = '';
        const deploymentChannelGroups = getDeploymentChannelGroups();
        html += '<div class="home-stage">';
        html += '<div class="home-stage-title">Deployment Channels</div>';
        html += '<div class="home-stage-subtitle">Actual channels used to ship brick parts into runtime surfaces, with rollout shape and supported interfaces</div>';
        if (!deploymentChannelGroups.length) {
            html += '<div class="activity-muted">No deployment channels defined for this product.</div>';
        } else {
            html += '<table>';
            html += '<tr>';
            deploymentChannelGroups.forEach(group => {
                html += '<td style="vertical-align: top">';
                html += '<div class="channel-group">';
                html += '<div class="channel-group-title">' + escapeHtml(group.name) + '</div>';
                if (group.description) {
                    html += '<div class="channel-group-description">' + escapeHtml(group.description) + '</div>';
                }
                html += '<div class="channel-pill-row">';
                group.channels.forEach(channel => {
                    const color = channelColor(channel.ref);
                    html += '<span class="channel-pill" style="color:' + color + '; background:' + hexToRgba(color, 0.14) + ';">';
                    html += renderDeploymentIcon(channel);
                    html += '</span>';
                });
                html += '</div>';
                html += '<div class="channel-detail-grid">';
                group.channels.forEach(channel => {
                    html += renderChannelDetailCard(channel);
                });
                html += '</div>';
                html += '</div>';
                html += '</td>';
            });
            html += '</tr>';
            html += '</table>';
        }
        html += '</div>';
        document.getElementById('Channels').innerHTML = html;
    }

    function addBricks() {
        let html = '';
        html += '<div class="home-stage">';
        html += '<div class="home-stage-title">Product Bricks</div>';
        html += '<div class="home-stage-subtitle">Brick parts inherit the same channel colors as the lanes above</div>';
        if (product.neededBricks) {
            product.neededBricks.forEach(brick => {
                html += '<div class="brick-card">';
                html += '<a class="brick-card-link" href="' + getBrickLandingPageHref(brick.brickId) + '">';
                html += '<div class="brick-card-inner">';
                html += renderBrickIcon(brick.brickId, brick.brickName);
                html += '<div style="color: blue; margin-bottom: 4px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 90%">' + brick.brickName + '</div>';
                html += '<div style="color: grey; margin-bottom: 10px; margin-top: 0px; text-align: center; font-size: 70%">' + brick.whyNeeded + '</div>';
                html += renderBrickChannelMarkers(brick.deploymentChannels);
                html += '</div>';
                html += '</a>';
                html += '</div>';
            });
        }
        html += '</div>';
        document.getElementById('Bricks').innerHTML = html;
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function channelColor(ref) {
        const palette = ['#1d4ed8', '#b45309', '#047857', '#7c3aed', '#be123c', '#0f766e', '#c2410c', '#4338ca', '#15803d', '#a21caf'];
        const value = ref || 'channel';
        let hash = 0;
        for (let i = 0; i < value.length; i++) {
            hash = ((hash << 5) - hash) + value.charCodeAt(i);
            hash |= 0;
        }
        return palette[Math.abs(hash) % palette.length];
    }

    function deploymentIconFile(channel) {
        const text = [
            channel && channel.ref,
            channel && channel.groupId,
            channel && channel.name
        ].join(' ').toLowerCase();

        if (text.includes('ios')) {
            return 'app_store_ios.png';
        }
        if (text.includes('android') || text.includes('play store') || text.includes('play-store')) {
            return 'app_store_android.png';
        }
        if (text.includes('private cloud') || text.includes('private-cloud')) {
            return 'private_cloud.png';
        }
        if (text.includes('cloud') || text.includes('runtime') || text.includes('edge') || text.includes('cdn')) {
            return 'public_cloud.png';
        }
        if (text.includes('saas') || text.includes('analytics') || text.includes('crm') || text.includes('datadog') || text.includes('snowflake') || text.includes('databricks') || text.includes('salesforce')) {
            return 'saas.png';
        }
        return 'deployment.png';
    }

    function renderDeploymentIcon(channel) {
        const fileName = deploymentIconFile(channel);
        const label = escapeHtml((channel && channel.name) || 'Deployment channel');

    function getDeploymentChannelGroups() {
        const grouped = {};
        (product.neededBricks || []).forEach(brick => {
            (brick.deploymentChannels || []).forEach(channel => {
                const ref = channel.deploymentChannelRef || '';
                const groupId = ref.includes('/') ? ref.split('/')[0] : 'other';
                if (!grouped[groupId]) {
                    grouped[groupId] = {
                        id: groupId,
                        name: prettifyChannelGroup(groupId),
                        description: '',
                        channels: {}
                    };
                }
                if (!grouped[groupId].channels[ref]) {
                    grouped[groupId].channels[ref] = {
                        ref: ref,
                        groupId: groupId,
                        name: channel.channelName || channel.channelId || ref,
                        channelId: channel.channelId || '',
                        deploymentPart: channel.deploymentPart || '',
                        deploymentUnit: channel.deploymentUnit || '',
                        pipeline: channel.pipeline || '',
                        environmentName: channel.environmentName || '',
                        environmentRef: channel.deploymentEnvironmentRef || '',
                        interfaces: {},
                        bricks: {}
                    };
                }
                (channel.supportsInterfaces || []).forEach(interfaceType => {
                    grouped[groupId].channels[ref].interfaces[interfaceType] = interfaceType;
                });
                grouped[groupId].channels[ref].bricks[brick.brickId] = {
                    brickId: brick.brickId,
                    brickName: brick.brickName,
                    whyNeeded: brick.whyNeeded || ''
                };
            });
        });
        return Object.values(grouped).map(group => ({
            id: group.id,
            name: group.name,
            description: group.description,
            channels: Object.values(group.channels).map(channel => ({
                ref: channel.ref,
                groupId: channel.groupId,
                name: channel.name,
                channelId: channel.channelId,
                deploymentPart: channel.deploymentPart,
                deploymentUnit: channel.deploymentUnit,
                pipeline: channel.pipeline,
                environmentName: channel.environmentName,
                environmentRef: channel.environmentRef,
                interfaces: Object.values(channel.interfaces).sort(),
                bricks: Object.values(channel.bricks).sort((a, b) => (a.brickName || a.brickId).localeCompare(b.brickName || b.brickId))
            })).sort((a, b) => a.name.localeCompare(b.name))

    }

    function hexToRgba(hex, alpha) {
        const value = (hex || '#6b7280').replace('#', '');
        const normalized = value.length === 3
            ? value.split('').map(part => part + part).join('')
            : value;
        const intValue = parseInt(normalized, 16);
        const r = (intValue >> 16) & 255;
        const g = (intValue >> 8) & 255;
        const b = intValue & 255;
        return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
    }

    function slugify(value) {
        return (value || 'item')
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '')
            || 'item';
    }

    function escapeMermaidLabel(value) {
        return (value || '')
            .replaceAll('&', 'and')
            .replaceAll('"', '')
            .replaceAll("'", '')
            .replaceAll('<', '')
            .replaceAll('>', '')
            .replaceAll('[', '(')
            .replaceAll(']', ')')
            .replaceAll('{', '(')
            .replaceAll('}', ')')
            .replaceAll('\n', ' ');
    }

    function mermaidNodeId(prefix, value) {
        return prefix + '_' + slugify(value).replace(/-/g, '_');
    }

    function buildDependencyModel() {
        const interfaces = [];
        const channels = {};
        const bricks = {};

        (product.interfaces || []).forEach((interfaceItem, index) => {
            const interfaceType = interfaceItem.type || 'interface';
            interfaces.push({
                id: interfaceType + '__' + index,
                name: interfaceItem.name || interfaceType,
                type: interfaceType
            });
        });

        (product.neededBricks || []).forEach(brick => {
            const brickKey = brick.brickId || brick.brickName || 'brick';
            if (!bricks[brickKey]) {
                bricks[brickKey] = {
                    id: brickKey,
                    name: brick.brickName || brickKey,
                    whyNeeded: brick.whyNeeded || ''
                };
            }

            (brick.deploymentChannels || []).forEach(channel => {
                const channelKey = channel.deploymentChannelRef || channel.channelId || channel.channelName || brickKey;
                if (!channels[channelKey]) {
                    channels[channelKey] = {
                        id: channelKey,
                        name: channel.channelName || channel.channelId || channelKey,
                        channelId: channel.channelId || '',
                        part: channel.deploymentPart || '',
                        environmentName: channel.environmentName || '',
                        deploymentUnit: channel.deploymentUnit || '',
                        pipeline: channel.pipeline || ''
                    };
                }
            });
        });

        return {
            interfaces: interfaces.sort((a, b) => a.name.localeCompare(b.name)),
            channels: Object.values(channels).sort((a, b) => a.name.localeCompare(b.name)),
            bricks: Object.values(bricks).sort((a, b) => a.name.localeCompare(b.name))
        };
    }

    function ensureDependencyState() {
        if (dependencyState.initialized) {
            return;
        }
        const model = buildDependencyModel();
        model.interfaces.forEach(item => {
            dependencyState.interfaces[item.id] = true;
        });
        model.channels.forEach(item => {
            dependencyState.channels[item.id] = true;
        });
        model.bricks.forEach(item => {
            dependencyState.bricks[item.id] = true;
        });
        dependencyState.initialized = true;
    }

    function toggleDependencySelection(group, id, value) {

    function buildDependencyGraph(model) {
        const visibleInterfaces = new Set(model.interfaces.filter(item => dependencyState.interfaces[item.id] !== false).map(item => item.id));
        const visibleChannels = new Set(model.channels.filter(item => dependencyState.channels[item.id] !== false).map(item => item.id));
        const visibleBricks = new Set(model.bricks.filter(item => dependencyState.bricks[item.id] !== false).map(item => item.id));

        const lines = ['flowchart LR'];
        const interfaceDefs = [];
        const channelDefs = [];
        const brickDefs = [];
        const edges = new Set();

        model.interfaces.forEach(item => {
            if (visibleInterfaces.has(item.id)) {
                interfaceDefs.push('    ' + mermaidNodeId('iface', item.id) + '["' + escapeMermaidLabel(item.name) + '"]');
            }
        });

        model.channels.forEach(item => {
            if (visibleChannels.has(item.id)) {
                const labelParts = [item.name];
                if (item.part) {
                    labelParts.push(formatChannelPart(item.part));
                }
                channelDefs.push('    ' + mermaidNodeId('chan', item.id) + '[["' + escapeMermaidLabel(labelParts.join(' | ')) + '"]]');
            }
        });

        model.bricks.forEach(item => {
            if (visibleBricks.has(item.id)) {
                brickDefs.push('    ' + mermaidNodeId('brick', item.id) + '["' + escapeMermaidLabel(item.name) + '"]');
            }
        });

        (product.neededBricks || []).forEach(brick => {
            const brickKey = brick.brickId || brick.brickName || 'brick';
            if (!visibleBricks.has(brickKey)) {
                return;
            }
            (brick.deploymentChannels || []).forEach(channel => {
                const channelKey = channel.deploymentChannelRef || channel.channelId || channel.channelName || brickKey;
                if (!visibleChannels.has(channelKey)) {
                    return;
                }
                edges.add('    ' + mermaidNodeId('chan', channelKey) + ' --- ' + mermaidNodeId('brick', brickKey));
                (channel.supportsInterfaces || []).forEach(interfaceType => {
                    model.interfaces.forEach(interfaceItem => {
                        if (interfaceItem.type === interfaceType && visibleInterfaces.has(interfaceItem.id)) {
                            edges.add('    ' + mermaidNodeId('iface', interfaceItem.id) + ' --- ' + mermaidNodeId('chan', channelKey));
                        }
                    });
                });
            });
        });

        if (!interfaceDefs.length && !channelDefs.length && !brickDefs.length) {
            return '';
        }

        if (interfaceDefs.length) {
            lines.push('    subgraph Interfaces');
            interfaceDefs.forEach(line => lines.push(line));
            lines.push('    end');
        }
        if (channelDefs.length) {
            lines.push('    subgraph Channels');
            channelDefs.forEach(line => lines.push(line));
            lines.push('    end');
        }
        if (brickDefs.length) {
            lines.push('    subgraph Bricks');
            brickDefs.forEach(line => lines.push(line));
            lines.push('    end');
        }
        Array.from(edges).sort().forEach(line => lines.push(line));

        lines.push('    classDef interface fill:#ede9fe,stroke:#7c3aed,color:#4c1d95');
        lines.push('    classDef channel fill:#dbeafe,stroke:#2563eb,color:#1e3a8a');
        lines.push('    classDef brick fill:#d1fae5,stroke:#059669,color:#065f46');

        model.interfaces.forEach(item => {
            if (visibleInterfaces.has(item.id)) {
                lines.push('    class ' + mermaidNodeId('iface', item.id) + ' interface');
            }
        });
        model.channels.forEach(item => {
            if (visibleChannels.has(item.id)) {
                lines.push('    class ' + mermaidNodeId('chan', item.id) + ' channel');
            }
        });
        model.bricks.forEach(item => {
            if (visibleBricks.has(item.id)) {
                lines.push('    class ' + mermaidNodeId('brick', item.id) + ' brick');
            }
        });

        return lines.join('\n');
    }

    function renderDependencySummary(model) {
        const visibleInterfaceCount = model.interfaces.filter(item => dependencyState.interfaces[item.id] !== false).length;
        const visibleChannelCount = model.channels.filter(item => dependencyState.channels[item.id] !== false).length;
        const visibleBrickCount = model.bricks.filter(item => dependencyState.bricks[item.id] !== false).length;
        return '<div class="activity-summary">' +
            '<div class="activity-stat"><div class="activity-stat-value">' + visibleInterfaceCount + '</div><div class="activity-stat-label">Interfaces</div></div>' +
            '<div class="activity-stat"><div class="activity-stat-value">' + visibleChannelCount + '</div><div class="activity-stat-label">Channels</div></div>' +
            '<div class="activity-stat"><div class="activity-stat-value">' + visibleBrickCount + '</div><div class="activity-stat-label">Bricks</div></div>' +
            '</div>';
    }

    function renderDependenciesTab() {
        ensureDependencyState();
        const container = document.getElementById('Dependencies');
        if (!container) {
            return;
        }

        const model = buildDependencyModel();
        const chart = buildDependencyGraph(model);
        let html = '';
        html += '<div class="home-stage">';
        html += '<div class="home-stage-title">Dependencies</div>';
        html += '<div class="home-stage-subtitle">Interface-to-channel dependencies come from supported interfaces; channel-to-brick dependencies come from deployment mappings on each product brick</div>';
        html += renderDependencySummary(model);
        html += renderDependencyControls(model);

        if (!chart) {
            html += '<div class="dependency-empty">Select at least one interface, channel, or brick to render the dependency diagram.</div>';
        } else {
            html += '<div class="dependency-legend"><div class="dependency-control-title">Legend</div><div class="dependency-legend-items">';
            html += '<span class="dependency-legend-item"><span class="dependency-legend-swatch" style="background:#ede9fe; border-color:#7c3aed;"></span>Interface</span>';
            html += '<span class="dependency-legend-item"><span class="dependency-legend-swatch" style="background:#dbeafe; border-color:#2563eb;"></span>Channel</span>';
            html += '<span class="dependency-legend-item"><span class="dependency-legend-swatch" style="background:#d1fae5; border-color:#059669;"></span>Brick</span>';
            html += '</div></div>';
            html += '<div class="dependency-graph"><div class="mermaid">' + chart + '</div></div>';
        }
        html += '</div>';
        container.innerHTML = html;

        if (chart) {
            mermaid.run({querySelector: '#Dependencies .mermaid'}).catch(error => {
                console.error('Failed to render product dependency diagram', error);
            });
        }
    }

    addHeader();
    addTabLabels();
    addInterfaces();
    addChannels();
    addBricks();
    document.getElementById('Dependencies').innerHTML = '<div class="home-stage"><div class="home-stage-title">Dependencies</div><div class="home-stage-subtitle">Open this tab to render the Mermaid dependency diagram.</div></div>';

</script>

<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Bike Mobility Home"
    },
    {
      "link": "../index.html",
      "label": "Products"
    },
    {
      "label": "Dealer and Service Partner Hub"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
