    const period = 'archived';

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function objectiveItems(data) {
        return data && (data.objectives || data.goals || []) || [];
    }

    function companyObjectiveItems(data) {
        return data && (data.companyObjectives || []) || [];
    }

    function statusColor(status) {
        const map = {
            'on-track': '#16a34a',
            'at-risk': '#d97706',
            'off-track': '#dc2626',
            'achieved': '#0284c7',
            'planned': '#6b7280'
        };
        return map[status] || '#6b7280';
    }

    function statusBadge(status) {
        if (!status) return '';
        return '<span class="kr-status" style="background-color:' + statusColor(status) + '">' + escapeHtml(status) + '</span>';
    }

    function confidenceColor(confidence) {
        const map = {
            'green': '#16a34a',
            'amber': '#d97706',
            'red': '#dc2626',
            'undefined': '#6b7280'
        };
        return map[confidence] || '#6b7280';
    }

    function confidenceChip(confidence) {
        if (!confidence) return '';
        return '<span class="confidence-chip" style="background-color:' + confidenceColor(confidence) + '">' + escapeHtml(confidence) + '</span>';
    }

    function renderTargetSummary(label, target) {
        if (!target) return '';
        let html = '<div class="key-result-target">';
        html += '<div class="key-result-target-label">' + escapeHtml(label) + '</div>';
        if (target.date) {
            html += '<div class="key-result-target-date">' + escapeHtml(target.date) + '</div>';
        }
        if (target.target) {
            html += '<div class="key-result-statement">' + escapeHtml(target.target) + '</div>';
        }
        html += confidenceChip(target.confidence);
        html += '</div>';
        return html;
    }

    function renderCompanyObjectiveCard(item) {
        const href = 'landing_pages/' + encodeURIComponent(item.landingPageId) + '.html';
        let html = '<a target="_blank" rel="noopener noreferrer" href="' + href + '">';
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-badge card-badge-company">Company Objective</span><span class="card-period">' + escapeHtml(item.status || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title) + '</div>';
        html += '<div class="card-objective">' + escapeHtml(item.statement || '') + '</div>';
        html += '</div></a>';
        return html;
    }

    function    renderSourceObjectiveCard(item) {
        const href = 'landing_pages/' + encodeURIComponent(item.landingPageId || item.id) + '.html';
        let html = '<a target="_blank" rel="noopener noreferrer" href="' + href + '">';
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-badge card-badge-team">Team Objective</span><span class="card-period">' + escapeHtml((item.period || {}).quarter || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title) + '</div>';
        html += '<div class="card-objective">' + escapeHtml(item.objective) + '</div>';
        if ((item.keyResults || []).length) {
            html += '<div class="key-results-list"><div class="key-results-title">Key Results</div>';
            let index = 0;
            item.keyResults.forEach(kr => {
                index += 1;
                html += '<div class="key-result-row">';
                html += '<div class="key-result-metric">[KR' + index + '] ' + escapeHtml(kr.metric || kr.kpiName || 'Key Result') + statusBadge(kr.status) + '</div>';
                if (kr.target1 || kr.target2) {
                    html += '<div class="key-result-targets">';
                    html += renderTargetSummary('Target 1', kr.target1);
                    html += renderTargetSummary('Target 2', kr.target2);
                    html += '</div>';
                }
                html += '</div>';
            });
            html += '</div>';
        }
        html += '</div></a>';
        return html;
    }

    function renderStack(cards) {
        if (!cards.length) {
            return '<div class="empty">No items defined for this period.</div>';
        }
        return '<div class="card-stack">' + cards.join('') + '</div>';
    }

    function renderObjectivesTable(companyCardsHtml, teamCardsHtml) {
        let html = '<table class="objectives-table"><thead><tr>';
        html += '<th style="max-width: 33%"><div class="column-title">Company Objectives</div><div class="column-description">Shared business outcomes that organize the period.</div></th>';
        html += '<th><div class="column-title">Team Objectives</div><div class="column-description">Customer and product-facing objectives with explicit execution links.</div></th>';
        html += '</tr></thead><tbody><tr>';
        html += '<td class="column-cells" style="max-width: 33%">' + companyCardsHtml + '</td>';
        html += '<td class="column-cells">' + teamCardsHtml + '</td>';
        html += '</tr></tbody></table>';
        return html;
    }

    const companyCards = companyObjectiveItems(payload).map(renderCompanyObjectiveCard);
    const sourceCards = objectiveItems(payload).map(renderSourceObjectiveCard);

    document.getElementById('content').innerHTML = renderObjectivesTable(
        renderStack(companyCards),
        renderStack(sourceCards)
    );

    const periodClasses = {
        current: 'current',
        next: 'next',
        archived: 'archived',
        ktlo: 'ktlo'
    };
    const classMap = {
        current: document.querySelector('a[href="../current/index.html"]'),
        next: document.querySelector('a[href="../next/index.html"]'),
        archived: document.querySelector('a[href="../archived/index.html"]'),
        ktlo: document.querySelector('a[href="../ktlo/index.html"]')
    };
    if (classMap[period]) {
        classMap[period].className += ' active';
    }

    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
