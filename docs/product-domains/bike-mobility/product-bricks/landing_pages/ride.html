                    const label = elements.length > 0 ? elements[0].trim() : '';
                    const link = elements.length > 1 ? elements[1].trim() : '';
                    if (label && link) {
                        html += '<a target="_blank" href="' + link + '">';
                        html += '<div class="docs">';
                        html += '<div>';
                        if (label.startsWith('Security ')) icon = 'security.png';
                        html += '<img src="../icons/' + icon + '" ' + 'style="width: 54px;">';
                        html += '</div>';
                        html += '<div style="font-size: 110%">' + label.replace(/_/g, ' ') + '</div>';
                        html += '</div>';
                        html += '</a>';
                    }
                });
            }
        }

        html += '</div>';
    }

    document.getElementById('Header').innerHTML = html;
    html = '';

    function escapeHomeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function resolveCustomerMediaSrc(src) {
        const value = (src || '').trim();
        if (!value) {
            return '';
        }
        if (value.startsWith('http://') || value.startsWith('https://') || value.startsWith('data:')) {
            return value;
        }
        if (value.startsWith('../') || value.startsWith('./')) {
            return value;
        }
        if (value.startsWith('media/') || value.startsWith('icons/')) {
            return '../../customers/' + value;
        }
        return '../../customers/media/' + value;
    }

    function escapeMermaidLabel(value) {
        return (value || '')
            .replaceAll('&', 'and')
            .replaceAll('"', '')
            .replaceAll("'", '')
            .replaceAll('<', '')
            .replaceAll('>', '')
            .replaceAll('[', '(')
            .replaceAll(']', ')')
            .replaceAll('{', '(')
            .replaceAll('}', ')')
            .replaceAll('|', '/');
    }

    function renderLinkedProducts() {
        let sectionHtml = '<div class="home-section">';
        sectionHtml += '<div class="home-section-title">Used In Products</div>';
        if (!linkedProducts.length) {
            sectionHtml += '<div class="activity-muted">No linked products were inferred for this brick.</div>';
        } else {
            linkedProducts.forEach(product => {
                sectionHtml += '<a class="home-link-card" target="_blank" rel="noopener noreferrer" href="../../products/landing_pages/' + escapeHomeHtml(product.id) + '.html">';
                sectionHtml += '<div class="home-link-head">';
                sectionHtml += '<img class="home-link-icon" src="../../products/icons/' + escapeHomeHtml(product.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'">';
                sectionHtml += '<div><div class="home-link-title">' + escapeHomeHtml('[PRODUCT] ' + product.name) + '</div><div class="home-link-meta">' + escapeHomeHtml(product.type || 'Product') + '</div></div>';
                sectionHtml += '</div>';
                if (product.whyUsed) {
                    sectionHtml += '<div class="home-link-copy">' + escapeHomeHtml(product.whyUsed) + '</div>';
                }
                sectionHtml += '</a>';
            });
        }
        sectionHtml += '</div>';
        return sectionHtml;
    }

    function renderRelatedTeams() {
        let sectionHtml = '<div class="home-section">';
        sectionHtml += '<div class="home-section-title">Teams Owning Or Supporting This Brick</div>';
        if (!relatedTeams.length) {
            sectionHtml += '<div class="activity-muted">No owning or supporting teams are linked to this product brick.</div>';
            sectionHtml += '</div>';
            return sectionHtml;
        }

        relatedTeams.forEach(team => {
            sectionHtml += '<a class="home-link-card" target="_blank" rel="noopener noreferrer" href="../../teams/landing_pages/' + escapeHomeHtml(team.teamId) + '.html">';
            sectionHtml += '<div class="home-link-head">';
            sectionHtml += '<img class="home-link-icon" src="../../teams/icons/logo.png" onerror="this.onerror=null;this.src=\'../../teams/icons/logo.png\'">';
            sectionHtml += '<div>';
            if (team.teamType) {
                sectionHtml += '<div class="home-link-copy">' + escapeHomeHtml(team.teamType) + '</div>';
            }
            sectionHtml += '<div class="home-link-title">' + escapeHomeHtml('[TEAM] ' + team.teamName) + '</div><div class="home-link-meta">' + escapeHomeHtml(team.roleLabel || '') + (team.groupName ? ' | ' + escapeHomeHtml(team.groupName) : '') + '</div></div>';
            sectionHtml += '</div>';
            sectionHtml += '</a>';
        });

        sectionHtml += '</div>';
        return sectionHtml;
    }

    function renderSupportedJobs() {
        let sectionHtml = '<div class="home-section">';
        sectionHtml += '<div class="home-section-title">Supported Customer Jobs-To-Be-Done</div>';
        if (!supportedJobs.length) {
            sectionHtml += '<div class="activity-muted">No supporting customer jobs were inferred for this brick.</div>';
        } else {
            const groupedJobs = {};
            supportedJobs.forEach(item => {
                const actorKey = item.customerId + '|' + item.productId;
                if (!groupedJobs[actorKey]) {
                    groupedJobs[actorKey] = {
                        customerId: item.customerId,
                        customerName: item.customerName,
                        customerGroup: item.customerGroup,
                        customerIcon: item.customerIcon,
                        productId: item.productId,
                        productName: item.productName,
                        jobs: []
                    };
                }
                groupedJobs[actorKey].jobs.push(item);
            });

            Object.values(groupedJobs).forEach(actor => {
                sectionHtml += '<div class="home-link-card">';
                sectionHtml += '<div class="home-link-head">';
                sectionHtml += '<a target="_blank" rel="noopener noreferrer" href="../../customers/landing_pages/' + escapeHomeHtml(actor.customerId) + '.html">';
                sectionHtml += '<img class="home-link-icon" src="../../customers/icons/' + escapeHomeHtml(actor.customerIcon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
                sectionHtml += '</a>';
                sectionHtml += '<div><div class="home-link-title"><a target="_blank" rel="noopener noreferrer" href="../../customers/landing_pages/' + escapeHomeHtml(actor.customerId) + '.html">' + escapeHomeHtml(actor.customerName) + '</a></div><div class="home-link-meta">' + escapeHomeHtml(actor.customerGroup) + ' | <a target="_blank" rel="noopener noreferrer" href="../../products/landing_pages/' + escapeHomeHtml(actor.productId) + '.html">' + escapeHomeHtml(actor.productName) + '</a></div></div>';
                sectionHtml += '</div>';
                actor.jobs.forEach(item => {
                    sectionHtml += '<div class="activity-block">';
                    sectionHtml += '<div class="home-link-copy"><b>' + escapeHomeHtml(item.jobName) + '</b></div>';
                    if (item.usedInSteps && item.usedInSteps.length) {
                        item.usedInSteps.forEach(step => {
                            sectionHtml += '<div class="activity-block">';
                            sectionHtml += '<div><b>' + escapeHomeHtml(step.step) + '</b></div>';
                            if (step.description) {
                                sectionHtml += '<div class="activity-muted">' + escapeHomeHtml(step.description) + '</div>';
                            }
                            if (step.howItSupports) {
                                sectionHtml += '<div class="activity-muted"> - How it supports: ' + escapeHomeHtml(step.howItSupports) + '</div>';
                            }
                            if (step.media && step.media.length) {
                                const media = step.media[0];
                                const mediaSrc = resolveCustomerMediaSrc(media.src);
                                if (mediaSrc) {
                                    sectionHtml += '<div class="step-media-card">';
                                    sectionHtml += '<a target="_blank" rel="noopener noreferrer" href="' + escapeHomeHtml(mediaSrc) + '">';
                                    sectionHtml += '<img class="step-media-image" src="' + escapeHomeHtml(mediaSrc) + '" alt="' + escapeHomeHtml(media.alt || media.title || step.step || 'Job step media') + '">';
                                    sectionHtml += '</a>';
                                    if (media.title || media.alt) {
                                        sectionHtml += '<div class="step-media-caption">' + escapeHomeHtml(media.title || media.alt) + '</div>';
                                    }
                                    sectionHtml += '</div>';
                                }
                            }
                            sectionHtml += '</div>';
                        });
                    }
                    sectionHtml += '</div>';
                });
                sectionHtml += '</div>';
            });
        }
        sectionHtml += '</div>';
        return sectionHtml;
    }

    function renderBrickStructureSection(title, items, emptyMessage) {
        let sectionHtml = '<div class="home-section">';
        sectionHtml += '<div class="home-section-title">' + escapeHomeHtml(title) + '</div>';
        if (!items || !items.length) {
            sectionHtml += '<div class="activity-muted">' + escapeHomeHtml(emptyMessage) + '</div>';
            sectionHtml += '</div>';
            return sectionHtml;
        }

        sectionHtml += '<div class="structure-grid">';
        items.forEach(item => {
            const isObject = item && typeof item === 'object' && !Array.isArray(item);
            const name = isObject ? (item.title || item.name || item.id || '') : String(item || '');
            const description = isObject ? (item.description || item.summary || '') : '';
            const type = isObject ? (item.type || '') : '';
            const meta = isObject ? [item.id, item.protocol, item.direction].filter(Boolean).join(' | ') : '';

            sectionHtml += '<div class="structure-card">';
            if (type) {
                sectionHtml += '<div class="structure-card-type">' + escapeHomeHtml(type) + '</div>';
            }
            sectionHtml += '<div class="structure-card-title">' + escapeHomeHtml(name) + '</div>';
            if (description) {
                sectionHtml += '<div class="structure-card-copy">' + escapeHomeHtml(description) + '</div>';
            }
            if (meta) {
                sectionHtml += '<div class="structure-card-meta">' + escapeHomeHtml(meta) + '</div>';
            }
            sectionHtml += '</div>';
        });
        sectionHtml += '</div>';
        sectionHtml += '</div>';
        return sectionHtml;
    }

    function renderBrickDependencyTable(items) {
        let tableHtml = '<table class="activity-table">';
        tableHtml += '<thead><tr><th>Brick</th><th>Type</th><th>Interface</th><th>Description</th></tr></thead><tbody>';
        items.forEach(item => {
            const linkedBrick = all_bricks.find(candidate => candidate.id === item.targetBrickId) || {};
            const linkedName = linkedBrick.name || item.targetBrickId || '';
            tableHtml += '<tr>';
            tableHtml += '<td><div class="dependency-entity">';
            tableHtml += '<img class="dependency-entity-icon" src="../icons/' + escapeHomeHtml(item.targetBrickId || '') + '.png" onerror="this.onerror=null;this.src=\'../icons/brick.png\'">';
            tableHtml += '<a target="_blank" rel="noopener noreferrer" href="' + escapeHomeHtml(item.targetBrickId || '') + '.html" class="activity-link">' + escapeHomeHtml(linkedName) + '</a>';
            tableHtml += '</div></td>';
            tableHtml += '<td>' + escapeHomeHtml(item.type || '') + '</td>';
            tableHtml += '<td>' + escapeHomeHtml(item.interface || '') + '</td>';
            tableHtml += '<td>' + escapeHomeHtml(item.description || '') + '</td>';
            tableHtml += '</tr>';
        });
        tableHtml += '</tbody></table>';
        return tableHtml;
    }

    function renderExternalDependencyTable(items, subjectLabel) {
        let tableHtml = '<table class="activity-table">';
        tableHtml += '<thead><tr><th>' + escapeHomeHtml(subjectLabel || 'External System') + '</th><th>Type</th><th>Interface</th><th>Description</th></tr></thead><tbody>';
        items.forEach(item => {
            tableHtml += '<tr>';
            tableHtml += '<td><div class="dependency-entity">';
            tableHtml += '<img class="dependency-entity-icon" src="../icons/external-system.png" onerror="this.onerror=null;this.src=\'../icons/brick.png\'">';
            tableHtml += '<span>' + escapeHomeHtml(item.system || '') + '</span>';
            tableHtml += '</div></td>';
            tableHtml += '<td>' + escapeHomeHtml(item.type || '') + '</td>';
            tableHtml += '<td>' + escapeHomeHtml(item.interface || '') + '</td>';
            tableHtml += '<td>' + escapeHomeHtml(item.description || '') + '</td>';
            tableHtml += '</tr>';
        });
        tableHtml += '</tbody></table>';
        return tableHtml;
    }

    function findIncomingBrickDependencies() {
        const incomingDependencies = [];
        all_bricks.forEach(candidate => {
            (candidate.brickDependencies || []).forEach(item => {
                if (item.targetBrickId === brick.id) {
                    incomingDependencies.push({
                        sourceBrickId: candidate.id,
                        sourceBrickName: candidate.name,
                        type: item.type || '',
                        interface: item.interface || '',
                        description: item.description || ''
                    });
                }
            });
        });
        return incomingDependencies;
    }

    function renderIncomingBrickDependencyTable(items) {
        let tableHtml = '<table class="activity-table">';
        tableHtml += '<thead><tr><th>Dependent Brick</th><th>Type</th><th>Interface</th><th>Description</th></tr></thead><tbody>';
        items.forEach(item => {
            tableHtml += '<tr>';
            tableHtml += '<td><div class="dependency-entity">';
            tableHtml += '<img class="dependency-entity-icon" src="../icons/' + escapeHomeHtml(item.sourceBrickId || '') + '.png" onerror="this.onerror=null;this.src=\'../icons/brick.png\'">';
            tableHtml += '<a target="_blank" rel="noopener noreferrer" href="' + escapeHomeHtml(item.sourceBrickId || '') + '.html" class="activity-link">' + escapeHomeHtml(item.sourceBrickName || item.sourceBrickId || '') + '</a>';
            tableHtml += '</div></td>';
            tableHtml += '<td>' + escapeHomeHtml(item.type || '') + '</td>';
            tableHtml += '<td>' + escapeHomeHtml(item.interface || '') + '</td>';
            tableHtml += '<td>' + escapeHomeHtml(item.description || '') + '</td>';
            tableHtml += '</tr>';
        });
        tableHtml += '</tbody></table>';
        return tableHtml;
    }

    function renderDependencySection() {
        const brickDependencies = brick.brickDependencies || [];
        const incomingBrickDependencies = findIncomingBrickDependencies();
        const externalSystemsThisBrickDependsOn = brick.externalSystemsThisBrickDependsOn || brick.externalSystemDependencies || [];
        const externalSystemsDependingOnThisBrick = brick.externalSystemsDependingOnThisBrick || [];
        let sectionHtml = '<div class="home-section">';
        sectionHtml += '<div class="home-section-title">Dependencies</div>';

        if (!brickDependencies.length && !incomingBrickDependencies.length && !externalSystemsThisBrickDependsOn.length && !externalSystemsDependingOnThisBrick.length) {
            sectionHtml += '<div class="activity-muted">No dependency information is available for this product brick.</div>';
            sectionHtml += '</div>';
            return sectionHtml;
        }

        let chart = 'flowchart LR\n\n';
        chart += 'current[\"' + escapeMermaidLabel(brick.name || brick.id || 'Current Brick') + '\"]\n';

        brickDependencies.forEach((item, index) => {
            const linkedBrick = all_bricks.find(candidate => candidate.id === item.targetBrickId) || {};
            const nodeId = 'brickDep' + index;
            const nodeLabel = escapeMermaidLabel(linkedBrick.name || item.targetBrickId || 'Brick Dependency');
            const edgeLabel = escapeMermaidLabel([item.type.toLowerCase(), item.interface.toUpperCase()].filter(Boolean).join('\\n'));
            chart += nodeId + '[\"' + nodeLabel + '\"]\n';
            chart += 'current -->|' + edgeLabel + '| ' + nodeId + '\n';
        });

        incomingBrickDependencies.forEach((item, index) => {
            const nodeId = 'incomingBrickDep' + index;
            const nodeLabel = escapeMermaidLabel(item.sourceBrickName || item.sourceBrickId || 'Dependent Brick');
            const edgeLabel = escapeMermaidLabel([item.type.toLowerCase(), item.interface.toUpperCase()].filter(Boolean).join('\\n'));
            chart += nodeId + '[\"' + nodeLabel + '\"]\n';
            chart += nodeId + ' -->|' + edgeLabel + '| current\n';
        });

        externalSystemsThisBrickDependsOn.forEach((item, index) => {
            const nodeId = 'externalOutgoingDep' + index;
            const nodeLabel = escapeMermaidLabel(item.system || 'External System');
            const edgeLabel = escapeMermaidLabel([item.type.toLowerCase(), item.interface.toUpperCase()].filter(Boolean).join('\\n'));
            chart += nodeId + '[\"' + nodeLabel + '\"]\n';
            chart += 'current -->|' + edgeLabel + '| ' + nodeId + '\n';
        });

        externalSystemsDependingOnThisBrick.forEach((item, index) => {
            const nodeId = 'externalIncomingDep' + index;
            const nodeLabel = escapeMermaidLabel(item.system || 'External System');
            const edgeLabel = escapeMermaidLabel([item.type.toLowerCase(), item.interface.toUpperCase()].filter(Boolean).join('\\n'));
            chart += nodeId + '[\"' + nodeLabel + '\"]\n';
            chart += nodeId + ' -->|' + edgeLabel + '| current\n';
        });

        chart += '\nclassDef currentBrick fill:#dbeafe,stroke:#2563eb,color:#1e3a8a,stroke-width:2px;\n';
        chart += 'classDef internalBrick fill:#ecfccb,stroke:#6b7280,color:#111827;\n';
        chart += 'classDef externalSystem fill:#f3f4f6,stroke:#65a30d,color:#365314;\n';
        chart += 'class current currentBrick;\n';
        if (brickDependencies.length) {
            chart += 'class ' + brickDependencies.map((_, index) => 'brickDep' + index).join(',') + ' internalBrick;\n';
        }
        if (incomingBrickDependencies.length) {
            chart += 'class ' + incomingBrickDependencies.map((_, index) => 'incomingBrickDep' + index).join(',') + ' internalBrick;\n';
        }
        if (externalSystemsThisBrickDependsOn.length) {
            chart += 'class ' + externalSystemsThisBrickDependsOn.map((_, index) => 'externalOutgoingDep' + index).join(',') + ' externalSystem;\n';
        }
        if (externalSystemsDependingOnThisBrick.length) {
            chart += 'class ' + externalSystemsDependingOnThisBrick.map((_, index) => 'externalIncomingDep' + index).join(',') + ' externalSystem;\n';
        }

        sectionHtml += '<div class="dependency-subsection">';
        sectionHtml += '<div class="dependency-subsection-title">Brick Dependencies</div>';
        if (brickDependencies.length) {
            sectionHtml += renderBrickDependencyTable(brickDependencies);
        } else {
            sectionHtml += '<div class="activity-muted">No dependencies on other product bricks are listed.</div>';
        }
        sectionHtml += '</div>';

        sectionHtml += '<div class="dependency-subsection">';
        sectionHtml += '<div class="dependency-subsection-title">Dependent Bricks</div>';
        if (incomingBrickDependencies.length) {
            sectionHtml += renderIncomingBrickDependencyTable(incomingBrickDependencies);
        } else {
            sectionHtml += '<div class="activity-muted">No other product bricks currently depend on this brick.</div>';
        }
        sectionHtml += '</div>';

        sectionHtml += '<div class="dependency-subsection">';
        sectionHtml += '<div class="dependency-subsection-title">External Systems This Brick Depends On</div>';
        if (externalSystemsThisBrickDependsOn.length) {
            sectionHtml += renderExternalDependencyTable(externalSystemsThisBrickDependsOn, 'External System');
        } else {
            sectionHtml += '<div class="activity-muted">No outbound dependencies on external systems are listed.</div>';
        }
        sectionHtml += '</div>';

        sectionHtml += '<div class="dependency-subsection">';
        sectionHtml += '<div class="dependency-subsection-title">External Systems Depending On This Brick</div>';
        if (externalSystemsDependingOnThisBrick.length) {
            sectionHtml += renderExternalDependencyTable(externalSystemsDependingOnThisBrick, 'External System');
        } else {
            sectionHtml += '<div class="activity-muted">No inbound dependencies from external systems are listed.</div>';
        }
        sectionHtml += '</div>';

        sectionHtml += '<div class="dependency-subsection">';
        sectionHtml += '<div class="dependency-subsection-title">Dependency Diagram</div>';
        sectionHtml += '<div class="dependency-diagram"><div class="mermaid">' + chart + '</div></div>';
        sectionHtml += '</div>';

        sectionHtml += '</div>';
        return sectionHtml;
    }

    html += renderBrickStructureSection('Internal Modules', brick.internalModules || [], 'No internal modules listed for this product brick.');
    html += renderBrickStructureSection('Interfaces', brick.interfaces || [], 'No interfaces listed for this product brick.');
    document.getElementById('Modules').innerHTML = html;
    html = '';

    html += renderDependencySection();
    document.getElementById('Dependencies').innerHTML = html;
    html = '';

    html += renderRelatedTeams();
    html += renderLinkedProducts();
    html += renderSupportedJobs();
    document.getElementById('Overview').innerHTML = html;
    html = '';
</script>

<script>
    function escapeEvidenceHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderEvidenceLinks(links) {
        let html = '<div style="font-size: 90%">';
        html += '<div style="font-size: 90%">Links:</div>';
        html += '<ul style="padding-left: 20px">';
        (links || []).forEach(link => {
            const label = escapeEvidenceHtml(link.label || 'Open link');
            const url = link.url || '';
            html += '<li>';
            html += '<a class="evidence-link" target="_blank" rel="noopener noreferrer" href="' + escapeEvidenceHtml(url) + '">' + label + '</a>';
            html += '</li>';
        });
        html += '</ul>';
        html += '</div>';
        return html;
    }

    function renderEvidence() {
        let html = '';
        const groups = (evidence && evidence.groups) ? evidence.groups : [];

        if (!groups.length) {
            html += '<div class="group" style="margin-top:0">No evidence linked for this product brick.</div>';
            document.getElementById('Evidence').innerHTML = html;
            return;
        }

        groups.forEach(group => {
            html += '<div class="evidence-group">';
            html += '<div class="evidence-group-title">' + escapeEvidenceHtml(group.name) + '</div>';
            if (group.description) {
                html += '<div class="evidence-group-description">' + escapeEvidenceHtml(group.description) + '</div>';
            }

            (group.fragments || []).forEach(fragment => {
                html += '<div class="evidence-card">';
                html += '<div class="evidence-card-header">';
                html += '<div class="evidence-card-meta">' + escapeEvidenceHtml(fragment.evidenceGroupTitle || fragment.type || 'Evidence fragment') + '</div>';
                html += '<div class="evidence-card-title">' + escapeEvidenceHtml(fragment.title || fragment.id) + '</div>';
                html += '</div>';
                if (fragment.description) {
                    html += '<div class="evidence-card-summary">' + escapeEvidenceHtml(fragment.description) + '</div>';
                }
                if (fragment.summary) {
                    html += '<div class="evidence-card-summary" style="color: black">' + escapeEvidenceHtml(fragment.summary) + '</div>';
                }
                if (fragment.tags && fragment.tags.length) {
                    fragment.tags.forEach(tag => {
                        html += '<div class="tag" style="margin-bottom:10px;">' + escapeEvidenceHtml(tag) + '</div>';
                    });
                }
                html += '<div class="evidence-links">' + renderEvidenceLinks(fragment.links) + '</div>';
                html += '</div>';
            });

            html += '</div>';
        });

        document.getElementById('Evidence').innerHTML = html;
    }

    renderEvidence();
</script>

<script>
    function escapeActivityHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatActivityDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function renderActivityKpis(items) {
        let html = '';
        items.forEach(item => {
            html += '<div><b>' + escapeActivityHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span class="activity-muted">(' + escapeActivityHtml(item.unit) + ')</span>';
            }
            if (item.expectedImpact) {
                html += ': ' + escapeActivityHtml(item.expectedImpact);
            }
            if (item.description) {
                html += '<div class="activity-muted">' + escapeActivityHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function renderActivityImpactCell(item) {
        let html = '';
        (item.customerImpact || []).forEach(impact => {
            html += '<div class="activity-block">';
            html += '<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">';
            html += '<img class="activity-icon activity-icon-round" src="../../customers/icons/' + escapeActivityHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div><div style="font-weight:bold;">' + escapeActivityHtml(impact.customer.name) + ' <span class="activity-muted">(' + escapeActivityHtml(impact.customerId) + ')</span></div></div>';
            html += '</div>';
            html += renderActivityKpis(impact.customerKPIs || []);
            html += renderActivityKpis(impact.businessKPIs || []);
            html += '</div>';
        });
        return html || '<span class="activity-muted">No customer impact listed</span>';
    }

    function renderActivityBrickCell(item, currentBrickId) {
        let html = '';
        (item.productBricks || []).forEach(brick => {
            const isCurrent = String(brick.brickId) === String(currentBrickId);
            html += '<div class="activity-pill' + (isCurrent ? ' activity-pill-highlight' : '') + '">';
            html += '<img class="activity-icon" src="../icons/' + escapeActivityHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../icons/logo.png\'">';
            html += '<div><div><b style="color:' + (isCurrent ? '#1d4ed8' : '#111827') + '">' + escapeActivityHtml(brick.brick.name) + '</b> <span class="activity-muted">(#' + escapeActivityHtml(brick.brickId) + ')</span></div><div class="activity-muted">' + escapeActivityHtml(brick.change) + '</div></div>';
            html += '</div>';
        });
        return html || '<span class="activity-muted">No product bricks listed</span>';
    }

    function renderActivityChannelCell(item) {
        let html = '';
        (item.deliveryChannels || []).forEach(channel => {
            html += '<div class="activity-pill">';
            html += '<img class="activity-icon" src="../../products/icons/' + escapeActivityHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'">';
            html += '<div><div><b>' + escapeActivityHtml(channel.channel.name) + '</b> <span class="activity-muted">(' + escapeActivityHtml(channel.channelId) + ')</span></div><div class="activity-muted">' + escapeActivityHtml(channel.change) + '</div></div>';
            html += '</div>';
        });
        return html || '<span class="activity-muted">No delivery channels listed</span>';
    }

    function renderActivityTable(data, kind, currentBrickId) {
        const items = (data && data.items) ? data.items : [];
        let html = '';
        html += '<div class="activity-summary">';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.length + '</div><div class="activity-stat-label">' + kind + '</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.customerImpact || []).length > 0).length + '</div><div class="activity-stat-label">With customer impact</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.deliveryChannels || []).length > 0).length + '</div><div class="activity-stat-label">With channels</div></div>';
        html += '</div>';

        if (!items.length) {
            html += '<div class="group" style="margin-top:0">No related ' + kind.toLowerCase() + ' found for this product brick.</div>';
            document.getElementById(kind).innerHTML = html;
            return;
        }

        html += '<table class="activity-table">';
        html += '<tr><th>Date</th><th>Description</th><th>Customer Impact</th><th>Product Bricks</th><th>Delivery Channels</th></tr>';
        items.forEach(item => {
            html += '<tr>';
            html += '<td style="white-space:nowrap">' + escapeActivityHtml(formatActivityDate(item.date)) + '</td>';
            html += '<td><a class="activity-link" target="_blank" rel="noopener noreferrer" href="../../' + kind.toLowerCase() + '/landing_pages/' + item.landingPageIndex + '.html">' + escapeActivityHtml(item.description || kind) + '</a></td>';
            html += '<td>' + renderActivityImpactCell(item) + '</td>';
            html += '<td>' + renderActivityBrickCell(item, currentBrickId) + '</td>';
            html += '<td>' + renderActivityChannelCell(item) + '</td>';
            html += '</tr>';
        });
        html += '</table>';
        document.getElementById(kind).innerHTML = html;
    }

    renderActivityTable(initiatives, 'Initiatives', brick.id);
    renderActivityTable(releases, 'Releases', brick.id);
</script>

<div style="margin: 30px; font-size: 80%; color: grey">
    <p>data sources:</p>
    <div style="color: grey" id="DataSources">
    </div>
</div>

<script>

    function addDataSourceLinks() {
        const linkOf = (href, label) => '<li><a target="_blank" href="' + href + '">' + label + '</a></li>';

        let html = '';

        html += linkOf(config.sheets.details, 'main bricks sheet (basic data per brick)');
        html += linkOf(config.sheets.targets, 'bricks\' release targets (including OKR targets)');
        html += linkOf(config.sheets.documents, 'bricks\' decision & discussion documents');
        html += linkOf(config.sheets.dependencies, 'target synergies and dependencies sheet');
        html += linkOf(config.sheets.roadmap, 'roadmap');

        return html;
    }

    document.getElementById('DataSources').innerHTML = addDataSourceLinks();
</script>
