        a {

            text-decoration: none;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;

            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
            max-width: 960px;
            line-height: 1.4;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }

        .bricks-panel {
            padding: 18px;
            background-color: white;
        }

        .map {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .map-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            overflow-x: auto;
        }

        .domain-column {
            min-width: 220px;
            width: 100%;
        }

        .domain-title {
            background-color: var(--surface-muted);
            font-size: 12px;
            padding: 4px;
            text-align: center;
        }

        .domain-groups {
            text-align: center;
        }

        .group {
            border: 1px dashed var(--group-border);
            display: inline-block;
            margin: 4px;
            vertical-align: top;
        }

        .group-title {
            font-size: 80%;
            margin-top: 12px;
        }

        .group-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .brick-card {
            margin: 4px;
            padding: 3px;
            font-size: 12px;
            width: 140px;
            max-width: 144px;
            overflow: hidden;
            background-color: var(--surface-fallback);
            box-shadow: var(--card-shadow);
            text-align: left;
            min-height: 52px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
            border: 1px solid white;
        }

        .brick-card.highlighted {
            border: 4px solid var(--highlight-color);
        }

        .brick-icon {
            width: 36px;
        }

        .brick-name {
            overflow: hidden;
            width: calc(100% - 40px);
        }

        .legend {
            width: 160px;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 80%;
            display: inline-block;
        }

        .legend-title {
            margin-bottom: 3px;
        }

        .legend-item {
            padding: 8px;
        }

        .dependencies-panel {
            padding: 18px;
            background-color: white;
        }

        .dependencies-layout {
            display: grid;
            grid-template-columns: 340px minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .dependency-controls {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
            padding: 14px;
        }

        .dependency-control-group {
            margin-bottom: 18px;
        }

        .dependency-control-title {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .dependency-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .dependency-action {
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: white;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .dependency-checklist {
            max-height: 260px;
            overflow: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background-color: white;
            padding: 8px;
        }

        .dependency-check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 4px;
            font-size: 13px;
            border-bottom: 1px solid #f3f4f6;
        }

        .dependency-check-item:last-child {
            border-bottom: none;
        }

        .dependency-check-item input {
            margin: 0;
        }

        .dependency-check-meta {
            color: #6b7280;
            font-size: 11px;
        }

        .dependency-graph-shell {
            min-width: 0;
        }

        .dependency-node-legend {
            border-top: 1px solid #e5e7eb;
            padding-top: 14px;
            margin-top: 6px;
        }

        .dependency-node-legend-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .dependency-node-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .dependency-node-legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid #9ca3af;
            flex: 0 0 auto;
        }

        .dependency-graph-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .dependency-graph-stat {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
            padding: 10px 12px;
            min-width: 120px;
        }

        .dependency-graph-stat-value {
            font-size: 24px;
            color: #1d4ed8;
        }

        .dependency-graph-stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .dependency-graph {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: white;
            padding: 14px;
            overflow: auto;
            min-height: 420px;
        }

        .dependency-empty {
            color: #6b7280;
            font-style: italic;
        }

        .matrix-panel {
            padding: 18px;
            background-color: white;
        }

        .matrix-layout {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .matrix-controls {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
            padding: 14px;
        }

        .matrix-shell {
            min-width: 0;
        }

        .matrix-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .matrix-table-wrap {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: white;
            overflow: auto;
            max-height: 75vh;
        }

        .matrix-table {
            border-collapse: collapse;
            width: max-content;
            min-width: 100%;
        }

        .matrix-table th,
        .matrix-table td {
            border-bottom: 1px solid #e5e7eb;
            border-right: 1px solid #f3f4f6;
            padding: 6px;
            text-align: center;
            vertical-align: middle;
        }

        .matrix-table th {
            position: sticky;
            top: 0;
            background-color: #f8fafc;
            z-index: 1;
        }

        .matrix-row-head {
            position: sticky;
            left: 0;
            background-color: white;
            min-width: 220px;
            text-align: left;
            z-index: 1;
        }

        .matrix-corner {
            position: sticky;
            left: 0;
            top: 0;
            z-index: 2;
            background-color: #f8fafc;
            min-width: 220px;
            text-align: left;
        }

        .matrix-col-icon {
            width: 14px;
            height: 14px;
            object-fit: contain;
        }

        .matrix-col-count {
            font-size: 10px;
            color: #6b7280;
            min-width: 24px;
        }

        .matrix-row-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 80%;
            text-align: left;
        }

        .matrix-row-count {
            margin-left: auto;
            font-size: 11px;
            color: #6b7280;
            padding-left: 8px;
            white-space: nowrap;
        }

        .matrix-row-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .matrix-hit {
            background-color: #dbeafe;
            color: #1e3a8a;
            font-size: 11px;
            line-height: 1.2;
            max-width: 6px;
        }

        .matrix-hit-external {
            background-color: #ecfccb;
            color: #365314;
            font-size: 10px;
            line-height: 1.2;
            max-width: 6px;
        }

        .matrix-empty-cell {
            color: #d1d5db;
        }

        @media (max-width: 1080px) {
            .dependencies-layout {
                grid-template-columns: 1fr;
            }

            .matrix-layout {
                grid-template-columns: 1fr;
            }
        }

            const rows = [];
            const lookup = {};
            const rowIndex = {};

            function ensureRow(rowId, row) {
                if (!rowIndex[rowId]) {
                    rowIndex[rowId] = row;
                    rows.push(row);
                    lookup[rowId] = {};
                }
                return rowIndex[rowId];
            }

            function addMatrixDependency(sourceId, targetId, payload) {
                if (!lookup[sourceId]) {
                    lookup[sourceId] = {};
                }
                if (!lookup[sourceId][targetId]) {
                    lookup[sourceId][targetId] = [];
                }
                lookup[sourceId][targetId].push(payload);
            }

            capabilities.forEach(capability => {
                ensureRow(capability.id, {
                    id: capability.id,
                    kind: 'capability',
                    name: capability.name || capability.id,
                    icon: capability.id + '.png',
                    href: 'landing_pages/' + capability.id + '.html'
                });

                (capability.brickDependencies || []).forEach(dep => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    addMatrixDependency(capability.id, dep.targetBrickId, {
                        type: dep.type || 'unspecified',
                        direction: 'capability_forward'
                    });
                    addMatrixDependency(dep.targetBrickId, capability.id, {
                        type: dep.type || 'unspecified',
                        direction: 'capability_reverse'
                    });
                });

                (capability.externalSystemsThisBrickDependsOn || []).forEach(dep => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    const rowId = 'external:' + (dep.system || 'External System');
                    ensureRow(rowId, {
                        id: rowId,
                        kind: 'external',
                        name: dep.system || 'External System',
                        icon: 'external-system.png',
                        href: ''
                    });
                    addMatrixDependency(capability.id, rowId, {
                        type: dep.type || 'unspecified',
                        direction: 'capability_depends_on_external'
                    });
                    addMatrixDependency(rowId, capability.id, {
                        type: dep.type || 'unspecified',
                        direction: 'external_supports_capability'
                    });
                });

                (capability.externalSystemsDependingOnThisBrick || []).forEach(dep => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    const rowId = 'external:' + (dep.system || 'External System');
                    ensureRow(rowId, {
                        id: rowId,
                        kind: 'external',
                        name: dep.system || 'External System',
                        icon: 'external-system.png',
                        href: ''
                    });
                    addMatrixDependency(rowId, capability.id, {
                        type: dep.type || 'unspecified',
                        direction: 'external_depends_on_capability'
                    });
                    addMatrixDependency(capability.id, rowId, {
                        type: dep.type || 'unspecified',
                        direction: 'capability_used_by_external'
                    });
                });
            });

            rows.sort((left, right) => {
                if (left.kind !== right.kind) {
                    return left.kind === 'capability' ? -1 : 1;
                }
                return (left.name || '').localeCompare(right.name || '');
            });

            return {
                columns: rows,
                rows: rows,
                lookup: lookup
            };
        }

        function renderMatrixTable(matrixData) {
            const columns = matrixData.columns || [];
            const rows = matrixData.rows || [];
            if (!columns.length || !rows.length) {
                return '<div class="dependency-empty">No matrix data available.</div>';
            }

            function dependencyCountForParticipant(participantId) {
                return Object.values(matrixData.lookup[participantId] || {}).reduce((sum, deps) => sum + deps.length, 0);
            }

            return `
                <div class="matrix-table-wrap">
                    <table class="matrix-table">
                        <thead>
                            <tr>
                                <th class="matrix-corner">Capability</th>
                                ${columns.map(column => `
                                    <th title="${column.name || column.id}">
                                        ${column.href ? `
                                            <a target="_blank" href="${column.href}">
                                                <img class="matrix-col-icon" src="icons/${column.icon}" alt="${column.name || column.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                            </a>
                                        ` : `
                                            <img class="matrix-col-icon" src="icons/${column.icon}" alt="${column.name || column.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                        `}
                                    </th>
                                `).join('')}
                            </tr>
                            <tr>
                                <th class="matrix-corner">Count</th>
                                ${columns.map(column => `
                                    <th class="matrix-col-count" title="Total dependencies shown for ${column.name || column.id}">
                                        ${dependencyCountForParticipant(column.id)}
                                    </th>
                                `).join('')}
                            </tr>
                        </thead>
                        <tbody>
                            ${rows.map(source => `
                                <tr>
                                    <td class="matrix-row-head">
                                        ${source.href ? `
                                            <a class="matrix-row-label" target="_blank" href="${source.href}">
                                                <img class="matrix-row-icon" src="icons/${source.icon}" alt="${source.name || source.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                                <span>${source.name || source.id}</span>
                                                <span class="matrix-row-count">${dependencyCountForParticipant(source.id)}</span>
                                            </a>
                                        ` : `
                                            <div class="matrix-row-label">
                                                <img class="matrix-row-icon" src="icons/${source.icon}" alt="${source.name || source.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                                <span>${source.name || source.id}</span>
                                                <span class="matrix-row-count">${dependencyCountForParticipant(source.id)}</span>
                                            </div>
                                        `}
                                    </td>
                                    ${columns.map(target => {
                                        const deps = (((matrixData.lookup[source.id] || {})[target.id]) || []);
                                        if (!deps.length) {
                                            return '<td class="matrix-empty-cell">.</td>';
                                        }
                                        if (source.kind === 'external' || target.kind === 'external') {
                                            const title = deps.map(dep => {
                                                if (dep.direction === 'capability_depends_on_external') {
                                                    return 'Capability depends on external system: ' + dep.type;
                                                }
                                                if (dep.direction === 'external_supports_capability') {
                                                    return 'External system supports capability dependency: ' + dep.type;
                                                }
                                                if (dep.direction === 'external_depends_on_capability') {
                                                    return 'External system depends on capability: ' + dep.type;
                                                }
                                                if (dep.direction === 'capability_used_by_external') {
                                                    return 'Capability is used by external system: ' + dep.type;
                                                }
                                                return dep.type;
                                            }).join(', ');
                                            return `<td class="matrix-hit-external" title="${title}">${deps.length}</td>`;
                                        }
                                        return `<td class="matrix-hit" title="${deps.map(dep => dep.type + (dep.direction === 'capability_reverse' ? ' (reverse link)' : '')).join(', ')}">${deps.length}</td>`;
                                    }).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderMatrixView() {
            const container = document.getElementById('MatrixContent');
            if (!container) {
                return;
            }

            const catalog = getMatrixCatalog();
            if (!matrixInitialized) {
                container.innerHTML = `
                    <div class="matrix-layout">
                        ${renderMatrixControls(catalog)}
                        <div class="matrix-shell">
                            <div class="matrix-summary" id="MatrixSummary"></div>
                            <div id="MatrixTable"></div>
                        </div>
                    </div>
                `;
                matrixInitialized = true;
            }

            const selectedDependencyTypes = new Set(Array.from(document.querySelectorAll('.matrix-type-checkbox'))
                .filter(input => input.checked)
                .map(input => input.value));

            const matrixData = buildMatrixData(catalog, selectedDependencyTypes);
            const dependencyCount = Object.values(matrixData.lookup).reduce((sum, row) => {
                return sum + Object.values(row).reduce((rowSum, deps) => rowSum + deps.length, 0);
            }, 0);

            document.getElementById('MatrixSummary').innerHTML = `
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${matrixData.columns.length}</div>
                    <div class="dependency-graph-stat-label">Columns</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${matrixData.rows.length}</div>
                    <div class="dependency-graph-stat-label">Rows</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${selectedDependencyTypes.size}</div>
                    <div class="dependency-graph-stat-label">Types Shown</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${dependencyCount}</div>
                    <div class="dependency-graph-stat-label">Dependency Hits</div>
                </div>
            `;

            document.getElementById('MatrixTable').innerHTML = renderMatrixTable(matrixData);
        }
    </script>
</head>
