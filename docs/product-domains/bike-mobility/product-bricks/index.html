and local availability.", "children": []}, {"id": "orde", "name": "Order Orchestration & Checkout", "type": "service", "description": "Runs the end-to-end ordering flow including approvals, signatures, reservations, order routing, and state transitions.", "children": []}]}]}, {"id": "rider-experience", "name": "rider_experience", "type": "group", "description": "", "children": [{"id": "rider-experience-rider-lifecycle-and-self-service", "name": "rider-lifecycle-and-self-service", "type": "group", "description": "", "children": [{"id": "ride", "name": "Rider Identity, Wallet & App Experience", "type": "full-stack", "description": "Provides rider login, document wallet, order and claim visibility, support entry points, and self-service lifecycle actions.", "children": []}]}]}, {"id": "partner-operations", "name": "partner_operations", "type": "group", "description": "", "children": [{"id": "partner-operations-dealer-and-service-ecosystem", "name": "dealer-and-service-ecosystem", "type": "group", "description": "", "children": [{"id": "dnet", "name": "Dealer & Service Partner Network Management", "type": "service", "description": "Onboards and governs dealer and service partners, manages coverage, credentials, SLAs, and partner performance.", "children": []}, {"id": "stav", "name": "Stock, Availability & Handover Planning", "type": "service", "description": "Tracks inventory, reservations, appointment capacity, and fulfillment readiness across dealers and service partners.", "children": []}]}]}, {"id": "service-and-claims", "name": "service_and_claims", "type": "group", "description": "", "children": [{"id": "service-and-claims-maintenance-repair-and-claims", "name": "maintenance-repair-and-claims", "type": "group", "description": "", "children": [{"id": "scmo", "name": "Service Case & Maintenance Orchestration", "type": "service", "description": "Coordinates diagnostics, maintenance, repair, inspections, replacement, and service closure workflows.", "children": []}, {"id": "insc", "name": "Insurance & Claims Administration", "type": "full-stack", "description": "Manages policy application, claim intake, evidence collection, approvals, reimbursement, and replacement workflows.", "children": []}]}]}, {"id": "leasing-finance", "name": "leasing_finance", "type": "group", "description": "", "children": [{"id": "leasing-finance-lease-origination-and-financial-control", "name": "lease-origination-and-financial-control", "type": "group", "description": "", "children": [{"id": "leor", "name": "Lease Origination & Credit Decisioning", "type": "service", "description": "Supports lease proposal creation, underwriting inputs, credit checks where applicable, and contract activation readiness.", "children": []}, {"id": "cont", "name": "Contract Lifecycle Management", "type": "service", "description": "Manages quotes, contracts, amendments, renewals, pauses, offboarding, and audit-ready contract history.", "children": []}, {"id": "sein", "name": "Settlement, Invoicing & Payroll Reconciliation", "type": "service", "description": "Handles employer invoicing, payroll deduction reconciliation, dealer settlement, and dispute-aware financial controls.", "children": []}]}]}, {"id": "lifecycle-value", "name": "lifecycle_value", "type": "group", "description": "", "children": [{"id": "lifecycle-value-renewal-refurbishment-and-resale", "name": "renewal-refurbishment-and-resale", "type": "group", "description": "", "children": [{"id": "rema", "name": "Remarketing, Refurbishment & Resale", "type": "full-stack", "description": "Captures residual value through bike return, refurbish, resale, and next-life inventory flows.", "children": []}]}]}, {"id": "fleet-operations", "name": "fleet_operations", "type": "group", "description": "", "children": [{"id": "fleet-operations-pooled-and-assigned-bike-fleets", "name": "pooled-and-assigned-bike-fleets", "type": "group", "description": "", "children": [{"id": "pbfm", "name": "Pool Bike & Fleet Management", "type": "service", "description": "Supports pooled and assigned bike assets with booking, assignment, access, policy enforcement, and asset-state management.", "children": []}, {"id": "trkm", "name": "Trip, Telematics & Asset Monitoring", "type": "service", "description": "Collects usage, trip, and asset telemetry where operationally justified and legally permitted.", "children": []}]}]}, {"id": "platform-foundation", "name": "platform_foundation", "type": "group", "description": "", "children": [{"id": "platform-foundation-shared-platform-services", "name": "shared-platform-services", "type": "group", "description": "", "children": [{"id": "idam", "name": "Identity & Access Management", "type": "service", "description": "Provides multi-tenant identity, authentication, authorization, and role-based access for riders, employers, partners, and internal teams.", "children": []}, {"id": "intg", "name": "Enterprise Integration Layer", "type": "integration", "description": "Offers connectors, canonical data models, and event-driven integration with HRIS, payroll, ERP, CRM, and finance systems.", "children": []}, {"id": "apix", "name": "API Gateway & Developer Experience", "type": "integration", "description": "Provides secure external and partner APIs, keys, throttling, documentation, and lifecycle governance.", "children": []}, {"id": "evtp", "name": "Eventing & Process Backbone", "type": "integration", "description": "Streams business events and coordinates asynchronous workflows across ordering, service, claims, and finance.", "children": []}, {"id": "wfcm", "name": "Workflow, Case & Exception Management", "type": "service", "description": "Supports multi-step back-office workflows, exception handling, SLA tracking, and coordinated resolution across teams.", "children": []}, {"id": "cmns", "name": "Communications & Notifications", "type": "full-stack", "description": "Handles triggered and human-in-the-loop communication across email, SMS, push, and in-app messages.", "children": []}, {"id": "odal", "name": "Operational Data, KPI & Analytics Platform", "type": "development", "description": "Creates the shared data foundation for operational reporting, unit economics, executive KPIs, and market-level performance analysis.", "children": []}, {"id": "cpco", "name": "Compliance, Privacy & Audit Controls", "type": "service", "description": "Implements privacy, consent, auditability, financial control, and tax-sensitive compliance requirements across markets.", "children": []}, {"id": "obsv", "name": "Observability & Reliability Operations", "type": "service", "description": "Provides logging, metrics, alerting, incident response, service health, and reliability management for the platform.", "children": []}]}]}]};
        const bricksMetadata = bricksPayload.metadata || {};
        const bricks = bricksPayload.bricks || [];
        const brickRendering = bricksMetadata.rendering || bricksMetadata.render || {};
        const brickTypes = bricksMetadata.types || [];
        const typeColorMap = {};

        brickTypes.forEach(type => {
            typeColorMap[type.id.toLowerCase()] = type;
            typeColorMap[type.name.toLowerCase()] = type;
        });

        function colorOf(type) {
            if (type && typeColorMap[type.toLowerCase()]) {
                return typeColorMap[type.toLowerCase()].color;
            }
            return 'var(--surface-fallback)';
        }

        function normalizeBrick(item) {
            return {
                ...item,
                color: colorOf(item.type),
                isHighlighted: Boolean(item.name && item.name.includes('*'))
            };
        }

        function normalizeGroup(group) {
            return {
                ...group,
                children: (group.children || []).map(child => {
                    if ((child.type || '').toLowerCase() === 'group') {
                        return normalizeGroup(child);
                    }
                    return normalizeBrick(child);
                })
            };
        }

        function renderBrick(item) {
            const brickCard = `
                <div class="brick-card${item.isHighlighted ? ' highlighted' : ''}" style="background-color: ${item.color}">
                    <img class="brick-icon" src="icons/${item.id}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                    <div class="brick-name">${item.name || ''}</div>
                </div>
            `;

            if (!item.id) {
                return brickCard;
            }

            return `<a target="_blank" href="landing_pages/${item.id}.html">${brickCard}</a>`;
        }

        function renderGroup(group) {
            return `
                <div class="group">
                    <div class="group-title">${group.name}</div>
                    <div class="group-items">${(group.children || []).map(renderBrick).join('')}</div>
                </div>
            `;
        }

        function renderDomain(domain) {
            return `
                <section class="domain-column">
                    <div class="domain-title">${domain.name}</div>
                    <div class="domain-groups">${(domain.children || []).map(renderGroup).join('')}</div>
                </section>
            `;
        }

        function buildGroupRowLookup() {
            const lookup = {};
            ((brickRendering.rows) || []).forEach(rowInfo => {
                const row = Number(rowInfo.row) || 1;
                (rowInfo.brickIds || []).forEach(brickId => {
                    lookup[String(brickId)] = row;
                });
            });
            return lookup;
        }

        function applyRowsToHierarchy(items, groupRows) {
            return items.map(group => ({
                ...normalizeGroup(group),
                row: groupRows[String(group.id)] || Number(group.row) || 1
            }));
        }

        function filterHierarchyForRow(items, targetRow) {
            return items.filter(group => group.row === targetRow);
        }

        function renderMap(items) {
            const groupRows = buildGroupRowLookup();
            const normalizedItems = applyRowsToHierarchy(items, groupRows);
            const rows = Array.from(new Set(
                Object.values(groupRows)
                    .map(value => Number(value) || 1)
                    .concat([1])
            )).sort((left, right) => left - right);

            console.log(normalizedItems)
            console.log(rows)

            return `
                <div class="map">
                    ${rows.map(row => {
                        const rowItems = filterHierarchyForRow(normalizedItems, row);
                        if (!rowItems.length) {
                            return '';
                        }
                        return `
                            <div class="map-row" data-row="${row}">
                                ${rowItems.map(renderDomain).join('')}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderLegend() {
            return `
                <div class="legend-title">Legend:</div>
                ${brickTypes.map(type => `
                    <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
                `).join('')}
            `;
        }

        function updateBricksView() {
            document.getElementById('Current').innerHTML = renderMap(bricks);
            document.getElementById('Legend').innerHTML = renderLegend();
        }
    </script>
