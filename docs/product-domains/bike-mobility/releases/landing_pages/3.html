<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Bike Mobility)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"date": "2026-01-31", "description": "Release of employer rollout improvements covering employer policy & program management, eligibility, payroll & HRIS sync, and settlement, invoicing & payroll reconciliation across Employer Admin Portal, Employer Integration API, and Employer KPI Cockpit.", "customerImpact": [{"customerId": "mobility_benefits_director", "customer": {"id": "mobility_benefits_director", "name": "Group Mobility and Benefits Director", "group": "Employers, HR and Mobility Leaders", "icon": "office-building.png"}, "customerKPIs": [{"kpi": "Program go-live lead time", "expectedImpact": "Improve program go-live lead time through stronger launch templates, payroll mapping, and employer onboarding workflows.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Enrollment conversion rate", "expectedImpact": "Improve enrollment conversion rate by giving employers cleaner launches and fewer early blockers.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Employers live on platform", "expectedImpact": "Improve employers live on platform by making launch completion more predictable.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Gross margin per active rider", "expectedImpact": "Improve gross margin per active rider by reducing manual back-office overhead in rollout and payroll handling.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "eppm", "change": "Released reusable employer rollout policy templates and market controls.", "brick": {"id": "eppm", "name": "Employer Policy & Program Management", "domain": "program_management", "group": "employer-rollout-and-governance", "icon": "eppm.png"}}, {"brickId": "elpy", "change": "Released cleaner payroll and eligibility synchronization workflows.", "brick": {"id": "elpy", "name": "Eligibility, Payroll & HRIS Sync", "domain": "program_management", "group": "employer-rollout-and-governance", "icon": "elpy.png"}}, {"brickId": "sein", "change": "Released improved employer invoicing and payroll reconciliation flows.", "brick": {"id": "sein", "name": "Settlement, Invoicing & Payroll Reconciliation", "domain": "leasing_finance", "group": "lease-origination-and-financial-control", "icon": "sein.png"}}, {"brickId": "intg", "change": "Released reusable HRIS and payroll integration patterns for employer onboarding.", "brick": {"id": "intg", "name": "Enterprise Integration Layer", "domain": "platform_foundation", "group": "shared-platform-services", "icon": "intg.png"}}], "deliveryChannels": [{"channelId": "prod_employer_platform-web", "change": "Deployed employer launch workflow updates in Employer Admin Portal.", "channel": {"productId": "prod_employer_platform", "productName": "Employer Mobility Platform", "name": "Employer Admin Portal", "type": "web", "icon": "web.png"}}, {"channelId": "prod_employer_platform-partner-api", "change": "Deployed rollout integration updates in Employer Integration API.", "channel": {"productId": "prod_employer_platform", "productName": "Employer Mobility Platform", "name": "Employer Integration API", "type": "partner_api", "icon": "partner_api.png"}}, {"channelId": "prod_employer_platform-dashboard", "change": "Deployed launch tracking and adoption visibility updates in Employer KPI Cockpit.", "channel": {"productId": "prod_employer_platform", "productName": "Employer Mobility Platform", "name": "Employer KPI Cockpit", "type": "dashboard", "icon": "dashboard.png"}}], "teams": {"primaryTeamIds": ["bike-employer-platform", "bike-employer-integrations", "bike-finance-reconciliation"], "supportingTeamIds": ["bike-data-platform"]}, "landingPageIndex": 3};
    const domainName = 'Bike Mobility';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
