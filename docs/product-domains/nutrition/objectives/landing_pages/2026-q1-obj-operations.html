    }
    if (pageData.period && pageData.period.quarter) {
        metaBits.push(escapeHtml(pageData.period.quarter));
    }
    document.getElementById('Meta').innerHTML = metaBits.join(' | ');

    document.getElementById('Content').innerHTML = pageKind === 'company-objective'
        ? renderCompanyObjective(pageData)
        : renderSourceObjective(pageData);
</script>
</body>
</html>
