    <style>

            margin-bottom: 14px;
        }

        h1 {

            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;

        .section {
            border-top: 1px solid #e5e7eb;

        .section-title {
            font-size: 14px;

        .metric {

        .metric-title {

        .metric-meta {

        .pill-name {

        .pill-meta {

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }

        .key-result {
            margin-bottom: 14px;
            padding: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background-color: #fafafa;
        }

        .key-result-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .subsection {
            margin-top: 12px;
        }

        .subsection-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>

        <td style="vertical-align: top; padding-top: 50px">

        <td>
            <div class="eyebrow" id="Eyebrow"></div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div style="margin-left: 12px">
    <div class="tab">
        <button class="tablinks active" id="tab_HomeTab" onclick="openTab('HomeTab')">Home</button>
        <button class="tablinks" id="tab_InitiativesTab" onclick="openTab('InitiativesTab')">Initiatives</button>
        <button class="tablinks" id="tab_DiscoveriesTab" onclick="openTab('DiscoveriesTab')">Discoveries</button>
        <button class="tablinks" id="tab_ReleasesTab" onclick="openTab('ReleasesTab')">Releases</button>
    </div>

    <div id="HomeTab" class="tabcontent" style="display: block;"></div>
    <div id="InitiativesTab" class="tabcontent"></div>
    <div id="DiscoveriesTab" class="tabcontent"></div>
    <div id="ReleasesTab" class="tabcontent"></div>
</div>

<script>
    const pageData = {"id": "nutrition-2024-q1-ntfm", "title": "2024-Q1 Nutritionist / Formulation Manager (Power User) outcome goal", "objective": "Improve Time to approved, compliant formula for Nutritionist / Formulation Manager (Power User) by advancing nail the daily formulation loop: trusted data \u2192 constraints \u2192 optimization \u2192 scenario compare \u2192 governed approval. through speed with rigor (solver + scenario workspace + auditability).", "okrStyle": "objective-and-key-results", "status": "archived", "period": {"quarter": "2024-Q1", "startDate": "2024-01-01", "endDate": "2024-03-31", "type": "archive"}, "linkedCustomers": [{"customerId": "ntfm", "customerName": "Nutritionist / Formulation Manager (Power User)", "customerGroup": "customers"}], "linkedCustomerKPIs": [{"customerId": "ntfm", "customerName": "Nutritionist / Formulation Manager (Power User)", "kpiId": "co-ntfm-top", "kpiName": "Time to approved, compliant formula", "description": "End-to-end cycle time from request to approved formula ready for production.", "unit": "days", "kind": "customer", "targetDirection": "decrease"}, {"customerId": "ntfm", "customerName": "Nutritionist / Formulation Manager (Power User)", "kpiId": "co-ntfm-b1", "kpiName": "Formulation & scenario work time", "description": "", "unit": "", "kind": "customer", "targetDirection": "decrease"}], "linkedBusinessKPIs": [{"customerId": "ntfm", "customerName": "Nutritionist / Formulation Manager (Power User)", "kpiId": "bo-ntfm-top", "kpiName": "ARR", "description": "Annual recurring revenue attributable to this persona segment/accounts.", "unit": "$", "kind": "business", "targetDirection": "increase"}], "keyResults": [{"id": "kr-1", "metric": "Time to approved, compliant formula", "kind": "customer", "targetDirection": "decrease", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Decrease Time to approved, compliant formula during the quarter.", "executingTeams": [{"teamId": "formulation-intelligence-constraints", "teamName": "Formulation Intelligence - Constraints", "role": "executing", "intent": "Lead the work to reduce time to approved, compliant formula via Constraints, Rules & Business Logic and Reformulation & Scenario Simulation."}], "supportingTeams": [{"teamId": "data-integration-platform-kpi-dashboards", "teamName": "Data & Integration Platform - Kpi Dashboards", "role": "supporting", "intent": "Support the KR by contributing capability for time to approved, compliant formula, aligned with its focus on provide the shared data model, APIs, eventing, analytics, and observability foundation used by all product teams. This team specifically focuses on kpi dashboards via Unified KPI Dashboards and API Gateway & Service Interfaces."}, {"teamId": "formulation-intelligence-ingredient-nutrient", "teamName": "Formulation Intelligence - Ingredient Nutrient", "role": "supporting", "intent": "Support the KR by contributing capability for time to approved, compliant formula, aligned with its focus on own the formulation workbench, optimization loop, and recipe governance for nutrition professionals. This team specifically focuses on ingredient nutrient via Ingredient & Nutrient Data Model and Spec Management (Product & Material)."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "This KR should be pursued as an outcome target with room for discovery, iteration, and tradeoff.", "status": "achieved"}, {"id": "kr-2", "metric": "Formulation & scenario work time", "kind": "customer", "targetDirection": "decrease", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Decrease Formulation & scenario work time during the quarter.", "executingTeams": [{"teamId": "formulation-intelligence-constraints", "teamName": "Formulation Intelligence - Constraints", "role": "executing", "intent": "Lead the work to reduce formulation & scenario work time via Constraints, Rules & Business Logic and Reformulation & Scenario Simulation."}], "supportingTeams": [{"teamId": "data-integration-platform-kpi-dashboards", "teamName": "Data & Integration Platform - Kpi Dashboards", "role": "supporting", "intent": "Support the KR by contributing capability for formulation & scenario work time, aligned with its focus on provide the shared data model, APIs, eventing, analytics, and observability foundation used by all product teams. This team specifically focuses on kpi dashboards via Unified KPI Dashboards and API Gateway & Service Interfaces."}, {"teamId": "formulation-intelligence-ingredient-nutrient", "teamName": "Formulation Intelligence - Ingredient Nutrient", "role": "supporting", "intent": "Support the KR by contributing capability for formulation & scenario work time, aligned with its focus on own the formulation workbench, optimization loop, and recipe governance for nutrition professionals. This team specifically focuses on ingredient nutrient via Ingredient & Nutrient Data Model and Spec Management (Product & Material)."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "This KR should be pursued as an outcome target with room for discovery, iteration, and tradeoff.", "status": "achieved"}, {"id": "kr-3", "metric": "ARR", "kind": "business", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Increase ARR during the quarter.", "executingTeams": [{"teamId": "commercial-collaboration-order-self", "teamName": "Commercial Collaboration - Order Self", "role": "executing", "intent": "Lead the work to improve aRR via Customer Order Self-Service and Service & Case Management (Lite)."}], "supportingTeams": [{"teamId": "data-integration-platform-kpi-dashboards", "teamName": "Data & Integration Platform - Kpi Dashboards", "role": "supporting", "intent": "Support the KR by contributing capability for aRR, aligned with its focus on provide the shared data model, APIs, eventing, analytics, and observability foundation used by all product teams. This team specifically focuses on kpi dashboards via Unified KPI Dashboards and API Gateway & Service Interfaces."}, {"teamId": "commercial-collaboration-document-certificate-center", "teamName": "Commercial Collaboration - Document Certificate Center", "role": "supporting", "intent": "Support the KR by contributing capability for aRR, aligned with its focus on own customer, supplier, and revenue-facing collaboration workflows across sales, service, and supplier networks. This team specifically focuses on document certificate center via Document & Certificate Center and Supplier Onboarding & Qualification."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "This KR should be pursued as an outcome target with room for discovery, iteration, and tradeoff.", "status": "achieved"}], "linkedInitiatives": [], "linkedReleases": [], "sourceReferences": {"customers": "customers/customers.json", "initiatives": "delivery/initiatives.json", "releases": "delivery/releases.json"}, "objectiveRole": "source_objective_for_company_okrs", "companyObjectiveIds": ["obj-growth", "obj-leverage"], "inspiredByInsights": [{"insightId": "discovery-nutrition-2025-04-06-01-formulation-workbench", "insightTitle": "Formulation Workbench: Nutritionist / Formulation Manager (Power User) validated discovery", "status": "archived", "howItInspiresObjective": "Provides evidence and product context for the objective's growth tradeoffs.", "landingPageIndex": 5}, {"insightId": "discovery-nutrition-2026-03-13-03-delivery-console-team-builds-a", "insightTitle": "Delivery Console (Team Builds-as-a-Service): IT Manager discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's growth tradeoffs.", "landingPageIndex": 0}], "landingPageId": "nutrition-2024-q1-ntfm", "companyObjectiveRefs": [{"id": "obj-growth", "title": "Archive Create stronger customer pull and adoption", "landingPageId": "archive-obj-growth"}, {"id": "obj-leverage", "title": "Archive Turn product progress into economic leverage", "landingPageId": "archive-obj-leverage"}]};
    const pageKind = 'source-objective';
    const domainName = 'Nutrition';

    function initTab() {
        if (window.location.hash) {
            const tabName = window.location.hash.substring(1);
            if (document.getElementById(tabName)) {
                openTab(tabName);
            }
        }
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) {
            return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        }
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        const title = metric.kpiName || metric.metric || '';
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(title) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderExecutionItem(item, typeName) {
        const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
            ? (typeName === 'initiative'
                ? '../../initiatives/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '../../releases/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html')
            : '';
        let html = '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(target, item.description || item.id, 'list-title') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(item.date || '') + '</div>';
        if (item.customerIds && item.customerIds.length) {
            html += '<div class="list-description">Customers: ' + escapeHtml(item.customerIds.join(', ')) + '</div>';
        }
        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="list-description">Channels: ' + escapeHtml(item.deliveryChannels.join(', ')) + '</div>';
        }
        if (item.productBricks && item.productBricks.length) {
            html += '<div class="list-description">Bricks: ' + escapeHtml(item.productBricks.join(', ')) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderEmptyState(message) {
        return '<div class="list-row"><div class="list-description">' + escapeHtml(message) + '</div></div>';
    }

    function renderTeams(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.teamName || item.teamId) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.role || '') + '</div>';
            if (item.intent) {
                html += '<div class="list-description">' + escapeHtml(item.intent) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderInsights(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.insightTitle || item.title) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function sameInsightSet(a, b) {
        const aIds = (a || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        const bIds = (b || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        return aIds && bIds && aIds === bIds;
    }

    function statusColor(status) {
        const map = {'on-track': '#16a34a', 'at-risk': '#d97706', 'off-track': '#dc2626', 'achieved': '#0284c7', 'planned': '#6b7280'};
        return map[status] || '#6b7280';
    }

    function statusBadge(status) {
        if (!status) return '';
        return '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + statusColor(status) + ';margin-left:8px">' + escapeHtml(status) + '</span>';
    }

    function renderKeyResult(item, options) {
        let html = '<div class="key-result">';
        html += '<div class="key-result-title">' + escapeHtml(item.metric) + statusBadge(item.status) + '</div>';
        html += '<div>' + escapeHtml(item.statement || '') + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(item.targetDirection || '') + (item.target ? ' | ' + escapeHtml(item.target) : '') + (item.commitmentLabel ? ' | ' + escapeHtml(item.commitmentLabel) : '') + '</div>';
        if (item.baseline) {
            html += '<div class="list-description">Baseline: ' + escapeHtml(item.baseline) + '</div>';
        }
        if (item.commitmentRationale) {
            html += '<div class="list-description">Commitment: ' + escapeHtml(item.commitmentRationale) + '</div>';
        }
        html += renderTeams('Executing Teams', item.executingTeams || [], true);
        html += renderTeams('Supporting Teams', item.supportingTeams || [], true);
        html += '</div>';
        return html;
    }

    function renderSourceObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.objective || '') + '</div></div>';

        if (page.companyObjectiveRefs && page.companyObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Mapped Company Objectives</div>';
            page.companyObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(item.id) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.linkedCustomers && page.linkedCustomers.length) {
            html += '<div class="section"><div class="section-title">Linked Customers</div>';
            page.linkedCustomers.forEach(customer => {
                html += '<div class="pill"><div><div class="pill-name">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.keyResults && page.keyResults.length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            page.keyResults.forEach(item => {
                html += renderKeyResult(item, {showObjective: true, showSource: false});
            });
            html += '</div>';
        }

        if ((page.linkedCustomerKPIs && page.linkedCustomerKPIs.length) || (page.linkedBusinessKPIs && page.linkedBusinessKPIs.length)) {
            html += '<div class="section"><div class="section-title">Linked KPIs</div>';
            (page.linkedCustomerKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            (page.linkedBusinessKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            html += '</div>';
        }

        if (page.sourceReferences) {
            html += '<div class="section"><div class="section-title">Source References</div>';
            Object.keys(page.sourceReferences).forEach(key => {
                if (page.sourceReferences[key]) {
                    html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(key) + '</div><div class="pill-meta">' + escapeHtml(page.sourceReferences[key]) + '</div></div></div>';
                }
            });
            html += '</div>';
        }
        return html;
    }

    function renderCompanyObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.statement || '') + '</div></div>';

        if (page.okrDesignNotes) {
            html += '<div class="section"><div class="section-title">Design Notes</div><div class="list-row"><div class="list-description">' + escapeHtml(page.okrDesignNotes) + '</div></div></div>';
        }

        if (page.sourceObjectiveRefs && page.sourceObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Source Objectives</div>';
            page.sourceObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' +
                    escapeHtml(String(item.keyResultsCount || 0) + ' key results') +
                    ((item.quarter ? ' | ' + escapeHtml(item.quarter) : '')) +
                    '</div></div></div>';
            });
            html += '</div>';
        }
        return html;
    }

    function renderActivityTab(items, typeName, emptyMessage) {
        if (!items || !items.length) {
            return renderEmptyState(emptyMessage);
        }
        let html = '';
        items.forEach(item => {
            html += renderExecutionItem(item, typeName);
        });
        return html;
    }

    function renderDiscoveriesTab(page, kind) {
        const items = page.inspiredByInsights || [];
        if (!items.length) {
            return renderEmptyState('No discoveries linked to this objective.');
        }
        let html = '';
        items.forEach(item => {
            const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '';
            html += '<div class="list-row">';
            html += '<div class="list-title">' + linkOf(target, item.insightTitle || item.title || item.id, 'list-title') + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || item.kind || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Eyebrow').innerHTML = escapeHtml(pageKind === 'company-objective' ? 'Company Objective' : 'Source Objective');
    document.getElementById('Title').innerHTML = escapeHtml(pageData.title || 'Objective');
    const metaBits = [escapeHtml(domainName)];
    if (pageData.status) {
        metaBits.push(escapeHtml(pageData.status));
    }
    if (pageData.period && pageData.period.quarter) {
        metaBits.push(escapeHtml(pageData.period.quarter));
    }
    document.getElementById('Meta').innerHTML = metaBits.join(' | ');

    document.getElementById('HomeTab').innerHTML = pageKind === 'company-objective'
        ? renderCompanyObjectiveHome(pageData)
        : renderSourceObjectiveHome(pageData);
    document.getElementById('InitiativesTab').innerHTML = renderActivityTab(
        pageData.linkedInitiatives || [],
        'initiative',
        'No initiatives linked to this objective.'
    );
    document.getElementById('DiscoveriesTab').innerHTML = renderDiscoveriesTab(pageData, pageKind);
    document.getElementById('ReleasesTab').innerHTML = renderActivityTab(
        pageData.linkedReleases || [],
        'release',
        'No releases linked to this objective.'
    );
    initTab();
</script>
</body>
</html>
