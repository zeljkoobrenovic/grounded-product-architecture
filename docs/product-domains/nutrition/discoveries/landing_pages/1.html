<script>
    const discovery = {"title": "Margin & Customer Assurance Workspace: operating discovery", "id": "discovery-nutrition-2026-01-31-01-margin-customer-assurance-workspace-", "name": "Margin & Customer Assurance Workspace: operating discovery", "status": "ongoing", "lastUpdated": "2026-03-14", "summary": "Discovery work is testing whether margin & customer assurance workspace can move the linked customer and business KPIs while addressing traceability, formula governance, and quality evidence under tighter customer and regulatory scrutiny.", "opportunity": "Clarify whether this bet is strong enough to scale in the next planning cycle, or whether the organization should narrow scope and protect focus.", "linkedInitiatives": [{"initiativeId": "initiative-nutrition-2026-02-12-01", "description": "Margin & Customer Assurance Workspace exists to Give leaders a tighter view of margin, service cost, and customer assurance so commercial tradeoffs stay grounded in reliable operational evidence. The quarter concentrates on traceability, formulation governance, quality-by-design, and sustainability evidence so the work reads like a realistic OKR-driven investment set for a company with roughly 250 product and technology people.", "landingPageIndex": 2, "initiativeDescription": "Margin & Customer Assurance Workspace exists to Give leaders a tighter view of margin, service cost, and customer assurance so commercial tradeoffs stay grounded in reliable operational evidence. The quarter concentrates on traceability, formulation governance, quality-by-design, and sustainability evidence so the work reads like a realistic OKR-driven investment set for a company with roughly 250 product and technology people."}], "teams": {"leadTeamId": "commercial-collaboration-order-self", "supportingTeamIds": ["data-integration-platform-kpi-dashboards"], "assignments": [{"teamId": "commercial-collaboration-order-self", "teamName": "Commercial Collaboration - Order Self", "role": "lead", "roleLabel": "Lead discovery team", "how": "Leads the discovery framing, evidence synthesis, and recommendation on how far this initiative should scale."}, {"teamId": "commercial-collaboration-document-certificate-center", "teamName": "Commercial Collaboration - Document Certificate Center", "role": "support", "roleLabel": "Supporting discovery team", "how": "Adds workflow, commercial, and implementation evidence needed to close the main delivery risks."}, {"teamId": "commercial-collaboration-specific-catalog-specs", "teamName": "Commercial Collaboration - Specific Catalog Specs", "role": "support", "roleLabel": "Supporting discovery team", "how": "Adds workflow, commercial, and implementation evidence needed to close the main delivery risks."}, {"teamId": "data-integration-platform-kpi-dashboards", "teamName": "Data & Integration Platform - Kpi Dashboards", "role": "support", "roleLabel": "Supporting discovery team", "how": "Adds workflow, commercial, and implementation evidence needed to close the main delivery risks."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers buy the product and/or choose to use it?", "hypothesis": "Customers will engage more consistently if margin & customer assurance workspace measurably improves gross margin stability.", "evidenceToCollect": ["Whether target users describe gross margin stability as a top-priority pain point.", "Whether the proposed workflow changes are strong enough to change behavior, not just preference."], "methods": ["Problem interviews", "Workflow walkthroughs", "Usage and funnel review"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "The investment is worth scaling when it improves arr without creating disproportionate operating cost or support load.", "evidenceToCollect": ["Which economic or operating constraints cap the upside.", "What minimum KPI movement would justify continued investment."], "methods": ["Business case review", "Unit economics analysis", "Operating model workshop"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Users can complete the redesigned workflow with less guidance and less back-and-forth than the current path.", "evidenceToCollect": ["Where users hesitate in the new flow.", "Which messages, states, or transitions remain unclear."], "methods": ["Task-based usability test", "Support case review", "Journey replay session"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The teams can deliver the smallest useful slice inside current architecture and staffing constraints without creating a long tail of one-off work.", "evidenceToCollect": ["Which dependencies create sequencing risk.", "What can be standardized versus localized or custom."], "methods": ["Technical spike", "Dependency mapping", "Incremental rollout planning"]}], "plannedActivities": ["Replay specification, quality, and document-change journeys across supplier and customer touchpoints.", "Compare how often teams rebuild evidence manually during audits, customer escalations, and change approvals.", "Test whether stronger traceability views improve confidence for both commercial and quality stakeholders."], "decisionToMake": "Decide whether to scale shared specification and evidence workflows broadly or keep the next wave focused on the highest-risk product lines.", "startDate": "2026-01-31", "endDate": "2026-03-14", "statusLabel": "Ongoing", "landingPageIndex": 1, "date": "2026-01-31", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'Nutrition';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {

        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome) {
        const decisionColors = {'proceed': '#16a34a', 'narrow': '#d97706', 'sequence': '#6366f1', 'pivot': '#d97706', 'park': '#6b7280', 'kill': '#dc2626'};
        const dColor = decisionColors[discovery.outcome.decision] || '#6b7280';
        html += '<div class="section"><div class="section-title">Outcome</div>';
        if (discovery.outcome.decision) {
            html += '<div style="margin-bottom:10px"><span style="display:inline-block;padding:4px 12px;border-radius:999px;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + dColor + '">' + escapeHtml(discovery.outcome.decision) + '</span></div>';
        }
        if (discovery.outcome.summary) {
            html += '<div class="description">' + escapeHtml(discovery.outcome.summary) + '</div>';
        }
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>

    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
