    function formatDate(dateValue) {

        const date = new Date(dateValue + 'T00:00:00');

        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function parseDate(dateValue) {

            return '<div class="date-card"><div class="date-card-day">-</div><div class="date-card-month">N/A</div><div class="date-card-year">' + escapeHtml(dateValue) + '</div></div>';
        }
        const day = date.toLocaleDateString('en-GB', {day: '2-digit'});
        const month = date.toLocaleDateString('en-GB', {month: 'short'}).toUpperCase();
        const year = date.toLocaleDateString('en-GB', {year: 'numeric'});
        return '<div class="date-card"><div class="date-card-day">' + escapeHtml(day) + '</div><div class="date-card-month">' + escapeHtml(month) + '</div><div class="date-card-year">' + escapeHtml(year) + '</div></div>';
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')

            .replaceAll("'", '&#39;');

            html += '<td style="min-width:180px">' + renderIconRow(productBrickIcons) + '</td>';
            html += '</tr>';
        });
        html += '</table></div>';
        document.getElementById('Table').innerHTML = html;
    }
    renderTimeline();
    renderTableTab();
</script>
</body>
