        body {

            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {

        .section-title {
            font-size: 14px;
            text-transform: uppercase;

            margin-bottom: 12px;
        }

            font-size: 19px;
            line-height: 1.55;

        .impact-block {

            margin-bottom: 14px;

        .impact-id {

            margin-bottom: 8px;
        }

        .entity-link {

            text-decoration: none;
        }

        }

        .impact-header {

            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;

        .pill {

            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>

oordinates the content blocks, tasks, and interaction logic shown by Hold/Release & Disposition.", "type": "content"}], "interfaces": [{"title": "User Experience Interface", "description": "Primary user-facing interface delivered by Hold/Release & Disposition.", "type": "ui"}, {"title": "Experience Backend API", "description": "API surface used to assemble state and content for Hold/Release & Disposition.", "type": "api"}, {"title": "Interaction Event Stream", "description": "Event interface capturing user actions and journey signals from Hold/Release & Disposition.", "type": "event"}], "brickDependencies": [{"targetBrickId": "cmac", "type": "identity", "interface": "Authentication API", "description": "Depends on Costing & Margin Accounting to provide identity capabilities required by Hold/Release & Disposition."}, {"targetBrickId": "cspc", "type": "event-subscription", "interface": "Catalog Update Feed", "description": "Depends on Customer-Specific Product Catalog & Specs to provide discovery capabilities required by Hold/Release & Disposition."}, {"targetBrickId": "otca", "type": "operator-control", "interface": "Operator Console", "description": "Depends on Order-to-Cash to provide operations capabilities required by Hold/Release & Disposition."}], "externalSystemsThisBrickDependsOn": [{"system": "Web and Mobile Clients", "type": "channel", "interface": "UI", "description": "User-facing clients consume Hold/Release & Disposition through browser or app experiences."}, {"system": "Notification Delivery Platforms", "type": "communication", "interface": "Email / Push APIs", "description": "Hold/Release & Disposition depends on outbound communication systems to notify users and continue journeys."}], "externalSystemsDependingOnThisBrick": [{"system": "Web and Mobile Clients", "type": "channel-consumer", "interface": "UI", "description": "Web and mobile clients rely on Hold/Release & Disposition as the user-facing surface for discovery, interaction, or task completion."}, {"system": "Marketing and Acquisition Platforms", "type": "traffic-source", "interface": "Deep Link / Landing Page Interface", "description": "Acquisition and campaign systems drive traffic into Hold/Release & Disposition to convert or retain users."}], "icon": "hrdi.png"}}], "deliveryChannels": [{"channelId": "prod_quality_lims_portal-web", "change": "Deployed workflow updates in web.", "channel": {"productId": "prod_quality_lims_portal", "productName": "Quality & Lab Portal", "name": "web", "type": "web", "icon": "web.png"}}, {"channelId": "prod_quality_lims_portal-mobile", "change": "Deployed workflow updates in mobile.", "channel": {"productId": "prod_quality_lims_portal", "productName": "Quality & Lab Portal", "name": "mobile", "type": "mobile_app", "icon": "mobile_app.png"}}, {"channelId": "prod_quality_lims_portal-api", "change": "Deployed workflow updates in Lab Results API.", "channel": {"productId": "prod_quality_lims_portal", "productName": "Quality & Lab Portal", "name": "COA API", "type": "api", "icon": "api.png"}}], "teams": {"primaryTeamIds": ["quality-compliance-hold-release-disposition", "quality-compliance-lab-instrument-external", "quality-compliance-results-spc"], "supportingTeamIds": ["trust-governance-platform-identity-sso-mfa"]}, "landingPageIndex": 7};
    const domainName = 'Nutrition';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
