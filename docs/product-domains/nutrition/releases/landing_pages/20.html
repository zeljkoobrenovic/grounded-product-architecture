<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Nutrition)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"date": "2025-07-27", "description": "Release of Delivery Console (Team Builds-as-a-Service) improvements covering ci/cd & release management, observability (logs/metrics/tracing) across web, Blueprint API.", "customerImpact": [{"customerId": "prtm", "customer": {"id": "prtm", "name": "Product Team (Internal)", "group": "internal customers", "icon": "product-team.png.png"}, "customerKPIs": [{"kpi": "Task success rate", "expectedImpact": "Improve task success rate through stronger ci/cd & release management support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Outcome confidence", "expectedImpact": "Improve outcome confidence through stronger observability (logs/metrics/tracing) support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Adoption rate", "expectedImpact": "Improve adoption rate through stronger ci/cd & release management support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Revenue growth", "expectedImpact": "Improve revenue growth through stronger observability (logs/metrics/tracing) support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}]}, {"customerId": "itmn", "customer": {"id": "itmn", "name": "IT Manager", "group": "customers", "icon": "it-manager.png.png"}, "customerKPIs": [{"kpi": "Security & governance posture", "expectedImpact": "Improve security & governance posture through stronger ci/cd & release management support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Audit finding count", "expectedImpact": "Improve audit finding count through stronger observability (logs/metrics/tracing) support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Net Revenue Retention (NRR)", "expectedImpact": "Improve net revenue retention (nrr) through stronger ci/cd & release management support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Weekly active users", "expectedImpact": "Improve weekly active users through stronger observability (logs/metrics/tracing) support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "ccrm", "change": "Released CI/CD & Release Management with domain-specific workflow improvements.", "brick": {"id": "ccrm", "name": "CI/CD & Release Management", "domain": "Infrastructure, Trust & Operations", "group": "Deployment, DevOps & Observability", "icon": "ccrm.png"}}, {"brickId": "olmt", "change": "Released Observability (Logs/Metrics/Tracing) with domain-specific workflow improvements.", "brick": {"id": "olmt", "name": "Observability (Logs/Metrics/Tracing)", "domain": "Infrastructure, Trust & Operations", "group": "Deployment, DevOps & Observability", "icon": "olmt.png"}}, {"brickId": "agsi", "change": "Released API Gateway & Service Interfaces with domain-specific workflow improvements.", "brick": {"id": "agsi", "name": "API Gateway & Service Interfaces", "domain": "Data & Integration Foundation", "group": "Integration & API Fabric (EDI/Events/Connectors)", "icon": "agsi.png"}}, {"brickId": "cmsl", "change": "Released Connectors (MES/SCADA/Lab/Market Feeds) with domain-specific workflow improvements.", "brick": {"id": "cmsl", "name": "Connectors (MES/SCADA/Lab/Market Feeds)", "domain": "Data & Integration Foundation", "group": "Integration & API Fabric (EDI/Events/Connectors)", "icon": "cmsl.png"}}], "deliveryChannels": [{"channelId": "prod_internal_delivery_console-web", "change": "Deployed workflow updates in web.", "channel": {"productId": "prod_internal_delivery_console", "productName": "Delivery Console (Team Builds-as-a-Service)", "name": "web", "type": "web", "icon": "web.png"}}, {"channelId": "prod_internal_delivery_console-api", "change": "Deployed workflow updates in Blueprint API.", "channel": {"productId": "prod_internal_delivery_console", "productName": "Delivery Console (Team Builds-as-a-Service)", "name": "Tenant Provisioning API", "type": "api", "icon": "api.png"}}, {"channelId": "prod_internal_delivery_console-api", "change": "Deployed workflow updates in Tenant Provisioning API.", "channel": {"productId": "prod_internal_delivery_console", "productName": "Delivery Console (Team Builds-as-a-Service)", "name": "Tenant Provisioning API", "type": "api", "icon": "api.png"}}]};
    const domainName = 'Nutrition';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
