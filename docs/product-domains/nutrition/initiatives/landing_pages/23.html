<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Nutrition)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"date": "2025-06-15", "description": "Integration & API Fabric initiative focused on improving api gateway & service interfaces, event streaming & messaging, strengthening customer value for Mother Earth (Environmental Stakeholder), and evolving delivery across web, Unified API Gateway.", "customerImpact": [{"customerId": "itmn", "customer": {"id": "itmn", "name": "IT Manager", "group": "customers", "icon": "it-manager.png"}, "customerKPIs": [{"kpi": "Integration success rate", "expectedImpact": "Increase integration success rate through stronger api gateway & service interfaces support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Replay success rate", "expectedImpact": "Increase replay success rate through stronger event streaming & messaging support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Proof-of-value success rate", "expectedImpact": "Increase proof-of-value success rate through stronger api gateway & service interfaces support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Stakeholder coverage", "expectedImpact": "Increase stakeholder coverage through stronger event streaming & messaging support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}]}, {"customerId": "prtm", "customer": {"id": "prtm", "name": "Product Team (Internal)", "group": "internal customers", "icon": "product-team.png"}, "customerKPIs": [{"kpi": "Outcome confidence", "expectedImpact": "Increase outcome confidence through stronger api gateway & service interfaces support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Task success rate", "expectedImpact": "Increase task success rate through stronger event streaming & messaging support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Revenue growth", "expectedImpact": "Increase revenue growth through stronger api gateway & service interfaces support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Adoption rate", "expectedImpact": "Increase adoption rate through stronger event streaming & messaging support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "agsi", "change": "Extended API Gateway & Service Interfaces with domain-specific workflow improvements.", "brick": {"id": "agsi", "name": "API Gateway & Service Interfaces", "domain": "Data & Integration Foundation", "group": "Integration & API Fabric (EDI/Events/Connectors)", "icon": "agsi.png"}}, {"brickId": "esme", "change": "Extended Event Streaming & Messaging with domain-specific workflow improvements.", "brick": {"id": "esme", "name": "Event Streaming & Messaging", "domain": "Data & Integration Foundation", "group": "Integration & API Fabric (EDI/Events/Connectors)", "icon": "esme.png"}}, {"brickId": "cmsl", "change": "Extended Connectors (MES/SCADA/Lab/Market Feeds) with domain-specific workflow improvements.", "brick": {"id": "cmsl", "name": "Connectors (MES/SCADA/Lab/Market Feeds)", "domain": "Data & Integration Foundation", "group": "Integration & API Fabric (EDI/Events/Connectors)", "icon": "cmsl.png"}}, {"brickId": "epco", "change": "Extended EDI & Partner Connectivity with domain-specific workflow improvements.", "brick": {"id": "epco", "name": "EDI & Partner Connectivity", "domain": "Data & Integration Foundation", "group": "Integration & API Fabric (EDI/Events/Connectors)", "icon": "epco.png"}}], "deliveryChannels": [{"channelId": "prod_platform_api_fabric-web", "change": "Introduced workflow updates in web.", "channel": {"productId": "prod_platform_api_fabric", "productName": "Integration & API Fabric", "name": "web", "type": "web", "icon": "web.png"}}, {"channelId": "prod_platform_api_fabric-api", "change": "Introduced workflow updates in Unified API Gateway.", "channel": {"productId": "prod_platform_api_fabric", "productName": "Integration & API Fabric", "name": "Event Subscription API", "type": "api", "icon": "api.png"}}, {"channelId": "prod_platform_api_fabric-api", "change": "Introduced workflow updates in Event Subscription API.", "channel": {"productId": "prod_platform_api_fabric", "productName": "Integration & API Fabric", "name": "Event Subscription API", "type": "api", "icon": "api.png"}}], "teams": {"primaryTeamIds": ["data-integration-platform-kpi-dashboards", "data-integration-platform-cost-margin-drivers", "data-integration-platform-trend-detection"], "supportingTeamIds": []}, "initiativeId": "initiative-nutrition-2025-06-15-06", "landingPageIndex": 23, "discoveryLinks": []};
    const domainName = 'Nutrition';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
