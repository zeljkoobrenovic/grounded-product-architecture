    <script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

te": "2025-12-15", "source_type": "official_documentation"}]}, {"id": "insight-focus-turns-billing-data-into-platform-interface", "title": "Standardized billing data is becoming a platform interface", "summary": "The FOCUS v1.2 specification covers billed cost, commitment usage and under-usage, cost allocation, marketplace purchases, provider services, resource usage, and unit-price verification. Multicloud FinOps teams need these concepts represented in data assets and customer KPIs.", "implication": "Treat cost-and-usage data quality, commitment utilization, allocation metadata, and marketplace spend normalization as core data products for cloud operations.", "priority": "medium", "tags": ["focus", "billing-data", "data-products", "multicloud", "finops"], "sourceIds": ["finops_focus_1_2"], "linkedCustomers": [{"customerId": "cg5-p1", "jobIds": ["jtbd-cg5-1"], "kpis": ["Tagged spend coverage", "Commitment coverage"]}, {"customerId": "cg2-p1", "jobIds": ["jtbd-cg2-2"], "kpis": ["Enterprise cloud net retention"]}, {"customerId": "cg3-p1", "jobIds": ["jtbd-cg3-1"], "kpis": ["Audit-ready cloud workload coverage"]}], "sources": [{"id": "finops_focus_1_2", "title": "FOCUS Specification v1.2", "url": "https://focus.finops.org/focus-specification/v1-2/", "publisher": "FinOps Foundation", "date": "2026", "source_type": "standards_specification"}]}, {"id": "insight-sustainability-is-now-coupled-to-cost-efficiency", "title": "Sustainability is increasingly coupled to cost efficiency", "summary": "Flexera reported that 57% of respondents had or planned a cloud sustainability initiative within twelve months, while the AWS Well-Architected Framework includes sustainability alongside operational excellence, security, reliability, performance efficiency, and cost optimization. Cloud optimization therefore affects both spend and environmental reporting.", "implication": "Expose workload efficiency, idle resource cleanup, region and architecture choices, and carbon-aware reporting through the same operating rhythms used for FinOps.", "priority": "medium", "tags": ["sustainability", "cost-efficiency", "well-architected", "reporting", "optimization"], "sourceIds": ["flexera_2025_state_cloud", "aws_well_architected_pillars"], "linkedCustomers": [{"customerId": "cg2-p1", "jobIds": ["jtbd-cg2-2"], "kpis": ["Enterprise cloud net retention"]}, {"customerId": "cg5-p1", "jobIds": ["jtbd-cg5-1"], "kpis": ["Rightsizing recommendation acceptance", "Cloud operating margin protection"]}, {"customerId": "cg4-p1", "jobIds": ["jtbd-cg4-1"], "kpis": ["Observable service coverage"]}], "sources": [{"id": "flexera_2025_state_cloud", "title": "New Flexera Report Finds that 84% of Organizations Struggle to Manage Cloud Spend", "url": "https://www.flexera.com/about-us/press-center/new-flexera-report-finds-84-percent-of-organizations-struggle-to-manage-cloud-spend", "publisher": "Flexera", "date": "2025-03-19", "source_type": "industry_research_press_release"}, {"id": "aws_well_architected_pillars", "title": "The pillars of the AWS Well-Architected Framework", "url": "https://docs.aws.amazon.com/wellarchitected/latest/framework/the-pillars-of-the-framework.html", "publisher": "Amazon Web Services", "date": "2026", "source_type": "official_documentation"}]}, {"id": "insight-retention-depends-on-supportable-modernization", "title": "Retention depends on supportable modernization, not static workload hosting", "summary": "Cloud discount programs emphasize modernization flexibility, while AI and agent platforms keep adding higher-level managed services. Customers are retained when the provider helps them move from raw infrastructure into managed databases, serverless runtimes, AI services, marketplace solutions, and commitment-optimized usage.", "implication": "Tie customer success, support, marketplace, and managed-service attach into the retention journey rather than measuring renewal only as a commercial event.", "priority": "high", "tags": ["retention", "modernization", "managed-services", "support", "marketplace"], "sourceIds": ["aws_savings_plans", "azure_savings_plans", "google_cloud_cuds", "aws_bedrock"], "linkedCustomers": [{"customerId": "cg1-p1", "jobIds": ["jtbd-cg1-1", "jtbd-cg1-2"], "kpis": ["Startup retained consumption"]}, {"customerId": "cg2-p1", "jobIds": ["jtbd-cg2-1"], "kpis": ["Modernized workload portfolio share", "Enterprise cloud net retention"]}, {"customerId": "cg4-p1", "jobIds": ["jtbd-cg4-1", "jtbd-cg4-2"], "kpis": ["Managed application services attach", "Application workload retention"]}], "sources": [{"id": "aws_savings_plans", "title": "Savings Plans", "url": "https://aws.amazon.com/savingsplans/", "publisher": "Amazon Web Services", "date": "2026", "source_type": "official_product_page"}, {"id": "azure_savings_plans", "title": "What are savings plans?", "url": "https://learn.microsoft.com/en-us/azure/cost-management-billing/savings-plan/savings-plan-overview", "publisher": "Microsoft Learn", "date": "2026-03-18", "source_type": "official_documentation"}, {"id": "google_cloud_cuds", "title": "Committed use discounts", "url": "https://cloud.google.com/docs/cuds", "publisher": "Google Cloud", "date": "2026", "source_type": "official_documentation"}, {"id": "aws_bedrock", "title": "Amazon Bedrock", "url": "https://aws.amazon.com/bedrock/", "publisher": "Amazon Web Services", "date": "2026", "source_type": "official_product_page"}]}]};
    const customerCount = customers.reduce((total, group) => total + ((group.customers || []).length), 0);
    const insightCount = (insights.items || []).length;

    function updateTabLabels() {
        document.getElementById('tab_customers').textContent = 'Customers (' + customerCount + ')';
        document.getElementById('tab_insights').textContent = 'Insights (' + insightCount + ')';
    }

    function topCustomerKpi(customer) {
        return (((customer || {}).kpiPyramids || {}).customerOutcomes || {}).top || null;
    }

    function formatCurrentValue(kpi) {
        if (!kpi || !kpi.currentValue) {
            return '';
        }
        return String(kpi.currentValue) + (kpi.unit ? ' (' + String(kpi.unit) + ')' : '');
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function customerLookup() {
        const lookup = {};
        customers.forEach(group => {
            group.customers.forEach(customer => {
                lookup[customer.id] = customer;
            });
        });
        return lookup;
    }

    function renderAttribute(iconFile, label, items) {
        if (!items || !items.length) return '';
        let html = '<div class="customer-attribute">';
        html += '<img class="customer-attribute-icon" src="icons/' + escapeHtml(iconFile) + '" onerror="this.onerror=null;this.src=\'icons/logo.png\'">';
        html += '<div class="customer-attribute-body">';
        html += '<div class="customer-attribute-label">' + escapeHtml(label) + '</div>';
        items.forEach(item => {
            html += '<div class="customer-attribute-item">' + escapeHtml(item) + '</div>';
        });
        html += '</div></div>';
        return html;
    }

    function update() {
        let html = '<div style="padding: 12px">';

        customers.forEach(group => {
            html += '<div class="customer-group">';
            html += '<div class="customer-group-label">' + escapeHtml(group.group) + '</div>';
            group.customers.forEach(customer => {
                html += '<a target="_blank" href="landing_pages/' + escapeHtml(customer.id) + '.html">';
                html += '<div class="customer-card">';
                html += '<img class="customer-card-photo" src="icons/' + escapeHtml(customer.icon) + '" onerror="this.onerror=null;this.src=\'icons/customer.png\'">';
                html += '<div class="customer-card-name">' + escapeHtml(customer.name) + '</div>';
                const topKpi = topCustomerKpi(customer);
                if (topKpi && topKpi.name) {
                    html += '<div class="kpi-badge">';
                    html += '<div>KPI: ' + escapeHtml(topKpi.name) + '</div>';
                    html += '</div>';
                }
                html += renderAttribute('care.png', 'Care about', customer.careAbout);
                html += renderAttribute('win.png', 'Wins them', customer.winsThem);
                html += renderAttribute('fear.png', 'Their fear', customer.theirFear);
                html += '</div></a>';
            });
            html += '</div>';
        });

        html += '</div>';
        document.getElementById('tab_content_customers').innerHTML = html;
    }

    function renderInsights() {
        const lookup = customerLookup();

        if (!insights.items || insights.items.length === 0) {
            document.getElementById('tab_content_insights').innerHTML = '<div style="padding:16px;color:#6b7280">No customer insights defined for this domain yet.</div>';
            return;
        }

        let html = '<div class="insight-grid">';
        insights.items.forEach(insight => {
            html += '<div class="insight-card">';
            html += '<div class="insight-title">' + escapeHtml(insight.title) + '</div>';
            html += '<div class="insight-summary">' + escapeHtml(insight.summary) + '</div>';
            if (insight.implication) {
                html += '<div style="margin-bottom:12px"><b>Product implication:</b> ' + escapeHtml(insight.implication) + '</div>';
            }
            if (insight.tags && insight.tags.length) {
                html += '<div style="margin-bottom:10px">';
                insight.tags.forEach(tag => {
                    html += '<span class="insight-tag">' + escapeHtml(tag) + '</span>';
                });
                html += '</div>';
            }
            if (insight.linkedCustomers && insight.linkedCustomers.length) {
                html += '<div style="margin-bottom:8px"><b>Connected customers:</b></div>';
                insight.linkedCustomers.forEach(link => {
                    const customer = lookup[link.customerId];
                    html += '<div class="insight-customer-link">';
                    if (customer) {
                        html += '<a target="_blank" href="landing_pages/' + escapeHtml(customer.id) + '.html" style="color:#315b7c;font-weight:bold">' + escapeHtml(customer.name) + '</a>';
                    } else {
                        html += '<span style="font-weight:bold">' + escapeHtml(link.customerId) + '</span>';
                    }
                    if (link.jobIds && link.jobIds.length) {
                        html += '<div class="insight-source"><b>Jobs:</b> ' + escapeHtml(link.jobIds.join(', ')) + '</div>';
                    }
                    if (link.kpis && link.kpis.length) {
                        html += '<div class="insight-source"><b>KPIs:</b> ' + escapeHtml(link.kpis.join(', ')) + '</div>';
                    }
                    html += '</div>';
                });
            }
            if (insight.sources && insight.sources.length) {
                html += '<div><b>Sources:</b></div>';
                insight.sources.forEach(source => {
                    html += '<div class="insight-source">';
                    html += '<a target="_blank" href="' + escapeHtml(source.url) + '" style="color:#315b7c">' + escapeHtml(source.title) + '</a>';
                    html += ' <span style="color:#6b7280">(' + escapeHtml(source.publisher || '') + (source.date ? ', ' + escapeHtml(source.date) : '') + ')</span>';
                    html += '</div>';
                });
            }
            html += '</div>';
        });
        html += '</div>';
        document.getElementById('tab_content_insights').innerHTML = html;
    }

    update();
    renderInsights();
    updateTabLabels();
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../start/index.html",
      "label": "Public Cloud Services Home"
    },
    {
      "label": "Customers"
    }
  ]
};
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
