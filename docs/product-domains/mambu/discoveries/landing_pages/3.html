    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;

            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Embedded Finance Partner Platform: operating discovery", "id": "discovery-mambu-2026-04-21-01-embedded-finance-partner-platform-op", "name": "Embedded Finance Partner Platform: operating discovery", "status": "ongoing", "lastUpdated": "2026-03-29", "summary": "Discovery work is testing whether embedded finance partner platform can move the linked customer and business KPIs while addressing scaling banking workflows through cleaner data, lower servicing effort, and stronger partner readiness.", "opportunity": "Clarify whether this bet is strong enough to scale in the next planning cycle, or whether the organization should narrow scope and protect focus.", "linkedInitiatives": [{"initiativeId": "initiative-mambu-2026-05-14-01", "description": "Embedded Finance Partner Platform Initiative is the quarter's focused investment to move Partner Go-Live Time and Partner Platform ARR, anchored in scaling banking workflows through cleaner data, lower servicing effort, and stronger partner readiness and led through Partner Onboarding and Tenant Setup. The quarter concentrates on data-driven banking operations, embedded-finance readiness, and lower servicing complexity so the work reads like a realistic OKR-driven investment set for a company with roughly 250 product and technology people.", "landingPageIndex": 0, "initiativeDescription": "Embedded Finance Partner Platform Initiative is the quarter's focused investment to move Partner Go-Live Time and Partner Platform ARR, anchored in scaling banking workflows through cleaner data, lower servicing effort, and stronger partner readiness and led through Partner Onboarding and Tenant Setup. The quarter concentrates on data-driven banking operations, embedded-finance readiness, and lower servicing complexity so the work reads like a realistic OKR-driven investment set for a company with roughly 250 product and technology people."}], "teams": {"leadTeamId": "partner-platform-baas-developer-public", "supportingTeamIds": ["risk-finance-platform-reusable-templates"], "assignments": [{"teamId": "partner-platform-baas-developer-public", "teamName": "Partner Platform & BaaS - Developer Public", "role": "lead", "roleLabel": "Lead discovery team", "how": "Leads the discovery framing, evidence synthesis, and recommendation on how far this initiative should scale."}, {"teamId": "partner-platform-baas-multi-tenant-runtime", "teamName": "Partner Platform & BaaS - Multi Tenant Runtime", "role": "support", "roleLabel": "Supporting discovery team", "how": "Adds workflow, commercial, and implementation evidence needed to close the main delivery risks."}, {"teamId": "partner-platform-baas-partner-onboarding-tenant", "teamName": "Partner Platform & BaaS - Partner Onboarding Tenant", "role": "support", "roleLabel": "Supporting discovery team", "how": "Adds workflow, commercial, and implementation evidence needed to close the main delivery risks."}, {"teamId": "risk-finance-platform-reusable-templates", "teamName": "Risk, Finance & Expansion Platform - Reusable Templates", "role": "support", "roleLabel": "Supporting discovery team", "how": "Adds workflow, commercial, and implementation evidence needed to close the main delivery risks."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers buy the product and/or choose to use it?", "hypothesis": "Customers will engage more consistently if embedded finance partner platform measurably improves partner go-live time.", "evidenceToCollect": ["Whether target users describe partner go-live time as a top-priority pain point.", "Whether the proposed workflow changes are strong enough to change behavior, not just preference."], "methods": ["Problem interviews", "Workflow walkthroughs", "Usage and funnel review"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "The investment is worth scaling when it improves partner platform arr without creating disproportionate operating cost or support load.", "evidenceToCollect": ["Which economic or operating constraints cap the upside.", "What minimum KPI movement would justify continued investment."], "methods": ["Business case review", "Unit economics analysis", "Operating model workshop"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Users can complete the redesigned workflow with less guidance and less back-and-forth than the current path.", "evidenceToCollect": ["Where users hesitate in the new flow.", "Which messages, states, or transitions remain unclear."], "methods": ["Task-based usability test", "Support case review", "Journey replay session"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The teams can deliver the smallest useful slice inside current architecture and staffing constraints without creating a long tail of one-off work.", "evidenceToCollect": ["Which dependencies create sequencing risk.", "What can be standardized versus localized or custom."], "methods": ["Technical spike", "Dependency mapping", "Incremental rollout planning"]}], "plannedActivities": ["Review where servicing, reconciliation, or compliance exceptions still require manual intervention.", "Interview lenders and embedded-finance teams about which operational delays most affect growth confidence.", "Test whether more explicit product, risk, and servicing controls improve launch confidence without slowing change."], "decisionToMake": "Decide whether to prioritize scale in existing lending and banking motions or concentrate the next quarter on reducing servicing and compliance drag first.", "startDate": "2026-04-21", "endDate": "2026-05-23", "statusLabel": "Ongoing", "landingPageIndex": 3, "date": "2026-04-21", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'Mambu';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome) {
        const decisionColors = {'proceed': '#16a34a', 'narrow': '#d97706', 'sequence': '#6366f1', 'pivot': '#d97706', 'park': '#6b7280', 'kill': '#dc2626'};
        const dColor = decisionColors[discovery.outcome.decision] || '#6b7280';
        html += '<div class="section"><div class="section-title">Outcome</div>';
        if (discovery.outcome.decision) {
            html += '<div style="margin-bottom:10px"><span style="display:inline-block;padding:4px 12px;border-radius:999px;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;color:white;background-color:' + dColor + '">' + escapeHtml(discovery.outcome.decision) + '</span></div>';
        }
        if (discovery.outcome.summary) {
            html += '<div class="description">' + escapeHtml(discovery.outcome.summary) + '</div>';
        }
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Mambu Home"
    },
    {
      "link": "../index.html",
      "label": "Discoveries"
    },
    {
      "label": "Embedded Finance Partner Platform: operating discovery"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
