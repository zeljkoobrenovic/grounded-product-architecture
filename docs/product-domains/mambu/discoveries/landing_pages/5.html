<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discovery (Mambu)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Composable Core Banking Platform: Chief Digital Banking / Transformation Executive validated discovery", "id": "discovery-mambu-2025-04-06-01-composable-core-banking-platfo", "name": "Composable Core Banking Platform: Chief Digital Banking / Transformation Executive validated discovery", "status": "archived", "lastUpdated": "2025-04-06", "summary": "Discovery work for Composable Core Banking Platform is reducing uncertainty before delivery investment by testing demand, business fit, usability, and buildability for Chief Digital Banking / Transformation Executive.", "opportunity": "Clarify whether stronger product configuration engine and modular domain architecture create enough customer and business value to justify further delivery across Operations and Product Console, Core Banking APIs.", "linkedInitiatives": [{"initiativeId": "initiative-mambu-2025-04-06-00", "description": "Composable Core Banking Platform initiative focused on improving product configuration engine, modular domain architecture, strengthening customer value for Chief Digital Banking / Transformation Executive, and evolving delivery across Operations and Product Console, Core Banking APIs.", "landingPageIndex": 29, "initiativeDescription": "Composable Core Banking Platform initiative focused on improving product configuration engine, modular domain architecture, strengthening customer value for Chief Digital Banking / Transformation Executive, and evolving delivery across Operations and Product Console, Core Banking APIs."}], "teams": {"leadTeamId": "core-banking-foundations-account-migration-toolkit", "supportingTeamIds": ["core-banking-foundations-configuration", "core-banking-foundations-ledger-accounting", "risk-finance-platform-reusable-templates"], "assignments": [{"teamId": "core-banking-foundations-account-migration-toolkit", "teamName": "Core Banking Foundations - Account Migration Toolkit", "role": "lead", "roleLabel": "Lead discovery team", "how": "Led the discovery framing, synthesis, and recommendation that shaped how Composable Core Banking Platform moved forward for Chief Digital Banking / Transformation Executive."}, {"teamId": "core-banking-foundations-configuration", "teamName": "Core Banking Foundations - Configuration", "role": "support", "roleLabel": "Supporting discovery team", "how": "Supported the discovery with validation on product configuration engine and modular domain architecture, helping close the main delivery risks."}, {"teamId": "core-banking-foundations-ledger-accounting", "teamName": "Core Banking Foundations - Ledger Accounting", "role": "support", "roleLabel": "Supporting discovery team", "how": "Supported the discovery with validation on product configuration engine and modular domain architecture, helping close the main delivery risks."}, {"teamId": "risk-finance-platform-reusable-templates", "teamName": "Risk, Finance & Expansion Platform - Reusable Templates", "role": "support", "roleLabel": "Supporting discovery team", "how": "Supported the discovery with validation on product configuration engine and modular domain architecture, helping close the main delivery risks."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will customers buy the product and/or choose to use it?", "hypothesis": "Chief Digital Banking / Transformation Executive will choose Composable Core Banking Platform because product configuration engine and modular domain architecture solve a high-friction workflow.", "evidenceToCollect": ["Whether Chief Digital Banking / Transformation Executive describes product configuration engine as a top priority problem.", "Whether concept tests show intent to adopt or pay for the improved Composable Core Banking Platform experience."], "methods": ["Problem interviews", "Concept walkthroughs", "Demand or adoption signal review"]}, {"riskType": "viable", "question": "Will the solution meet the needs of the business?", "hypothesis": "The business can justify investment in Composable Core Banking Platform if product configuration engine and modular domain architecture improve target KPIs without creating unacceptable operating cost.", "evidenceToCollect": ["What commercial, compliance, or operational constraints affect the Composable Core Banking Platform case.", "Which KPI movement did make the solution worth funding."], "methods": ["Business case review", "KPI trade-off review", "Commercial and operational constraint check"]}, {"riskType": "usable", "question": "Can customers figure out how to use it?", "hypothesis": "Chief Digital Banking / Transformation Executive can understand and complete the core Composable Core Banking Platform workflow with minimal guidance.", "evidenceToCollect": ["Where users hesitate or need explanation in prototypes covering product configuration engine and modular domain architecture.", "Whether the workflow language, navigation, and sequencing are clear enough for first-time use."], "methods": ["Workflow prototype test", "Task-based usability session", "Support and friction review"]}, {"riskType": "feasible", "question": "Can we build it within given resources and constraints?", "hypothesis": "The teams can deliver the smallest useful version of Composable Core Banking Platform within current technology, staffing, and dependency constraints.", "evidenceToCollect": ["Which architecture, integration, or data constraints sit behind product configuration engine and modular domain architecture.", "Whether delivery can be sliced into a realistic first release."], "methods": ["Technical spike", "Architecture and dependency review", "Delivery slicing workshop"]}], "plannedActivities": ["Interview target users from the Chief Digital Banking / Transformation Executive segment about current workflow pain and willingness to switch.", "Prototype and test the end-to-end journey covering product configuration engine and modular domain architecture.", "Run a business and delivery review to define the smallest viable slice across Operations and Product Console, Core Banking APIs."], "decisionToMake": "Decide whether to proceed, narrow, or stop further investment in this Composable Core Banking Platform opportunity.", "outcome": {"decision": "proceed", "summary": "Discovery confirmed enough signal to proceed into scoped delivery with clearer risk boundaries."}, "startDate": "2025-03-09", "endDate": "2025-04-06", "statusLabel": "Archived", "landingPageIndex": 5, "date": "2025-03-09", "customerImpact": [], "productBricks": [], "deliveryChannels": []};
    const domainName = 'Mambu';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome && discovery.outcome.summary) {
        html += '<div class="section"><div class="section-title">Outcome</div><div class="description">' + escapeHtml(discovery.outcome.summary) + '</div></div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
