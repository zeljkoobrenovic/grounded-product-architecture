    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function renderKpis(items) {
        let html = '';
        items.forEach(item => {
            html += '<div><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span class="activity-muted">(' + escapeHtml(item.unit) + ')</span>';
            }
            if (item.expectedImpact) {
                html += ': ' + escapeHtml(item.expectedImpact);
            }
            if (item.description) {
                html += '<div class="activity-muted">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

            html += '<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">';
            html += '<img class="activity-icon activity-icon-round" src="../icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../icons/customer.png\'">';
            html += '<div><div style="font-weight:bold; color:' + (isCurrent ? '#1d4ed8' : '#111827') + '">' + escapeHtml(impact.customer.name) + ' <span class="activity-muted">(' + escapeHtml(impact.customerId) + ')</span></div></div>';
            html += '</div>';
            html += renderKpis(impact.customerKPIs || []);
            html += renderKpis(impact.businessKPIs || []);
            html += '</div>';
        });
        return html || '<span class="activity-muted">No customer impact listed</span>';

        (item.deliveryChannels || []).forEach(channel => {
            html += '<div class="activity-pill">';
            html += '<img class="activity-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'">';
            html += '<div><div><b>' + escapeHtml(channel.channel.name) + '</b> <span class="activity-muted">(' + escapeHtml(channel.channelId) + ')</span></div><div class="activity-muted">' + escapeHtml(channel.change) + '</div></div>';
            html += '</div>';
        });
        return html || '<span class="activity-muted">No delivery channels listed</span>';
    }

    function renderActivityTable(data, kind, currentCustomerId) {
        const items = (data && data.items) ? data.items : [];
        let html = '';
        html += '<div class="activity-summary">';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.length + '</div><div class="activity-stat-label">' + kind + '</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.customerImpact || []).length > 0).length + '</div><div class="activity-stat-label">With customer impact</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.productBricks || []).length > 0).length + '</div><div class="activity-stat-label">With bricks</div></div>';
        html += '</div>';

        if (!items.length) {
            html += '<div class="group" style="margin-top:0">No related ' + kind.toLowerCase() + ' found for this customer.</div>';
            return html;
        }

        html += '<table class="activity-table">';
        html += '<tr><th>Date</th><th>Description</th><th>Customer Impact</th><th>Product Bricks</th><th>Delivery Channels</th></tr>';
        items.forEach(item => {
            html += '<tr>';
            html += '<td style="white-space:nowrap">' + escapeHtml(formatDate(item.date)) + '</td>';
            html += '<td><a class="activity-link" target="_blank" rel="noopener noreferrer" href="../../' + kind.toLowerCase() + '/landing_pages/' + item.landingPageIndex + '.html">' + escapeHtml(item.description || item.name || kind) + '</a></td>';
            html += '<td>' + renderImpactCell(item, currentCustomerId) + '</td>';
            html += '<td>' + renderBrickCell(item) + '</td>';
            html += '<td>' + renderChannelCell(item) + '</td>';
            html += '</tr>';
        });
        html += '</table>';
        return html;
    }

    addHeader();
    addHome();
    addJBTD();
    addKPIs();
    addProductVision();
    document.getElementById('Discoveries').innerHTML = renderActivityTable(discoveries, 'Discoveries', customer.id);
    document.getElementById('Initiatives').innerHTML = renderActivityTable(initiatives, 'Initiatives', customer.id);
    document.getElementById('Releases').innerHTML = renderActivityTable(releases, 'Releases', customer.id);


</script>

</body>
</html>
