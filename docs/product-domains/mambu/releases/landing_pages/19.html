    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>

ion and Decisioning Workflow."}, {"targetBrickId": "cadm", "type": "event-subscription", "interface": "Domain Event Feed", "description": "Depends on Collections and Delinquency Management to provide service capabilities required by Origination and Decisioning Workflow."}], "externalSystemsThisBrickDependsOn": [{"system": "Back-Office Policy Systems", "type": "back-office", "interface": "Configuration API", "description": "Origination and Decisioning Workflow synchronizes rules, policies, or decision parameters with external policy systems."}, {"system": "Compliance and Regulatory Services", "type": "compliance", "interface": "Validation API", "description": "Origination and Decisioning Workflow may call regulatory or compliance services to validate decisions and exceptions."}], "externalSystemsDependingOnThisBrick": [{"system": "Operational Decision Flows", "type": "decision-consumer", "interface": "Decision API", "description": "Execution flows depend on Origination and Decisioning Workflow to evaluate rules, policies, eligibility, or pricing outcomes."}, {"system": "Administration and Governance Tools", "type": "policy-consumer", "interface": "Configuration Interface", "description": "Governance and admin tooling depend on Origination and Decisioning Workflow to maintain controlled rule and policy changes."}], "icon": "oadw.png"}}, {"brickId": "paci", "change": "Released Partner and Channel Integration Layer with domain-specific workflow improvements.", "brick": {"id": "paci", "name": "Partner and Channel Integration Layer", "type": "integration", "description": "Exposes APIs and onboarding controls for merchants, brokers, or embedded-finance partners.", "domain": "Lenders and Consumer Finance Providers", "group": "launch-and-tune-loan-products-quickly", "internalModules": [{"title": "Contract and Mapping Layer", "description": "Maintains schemas, field mappings, and versioned contracts used by Partner and Channel Integration Layer.", "type": "integration"}, {"title": "Transformation and Routing Engine", "description": "Transforms messages and routes requests or events through Partner and Channel Integration Layer.", "type": "service"}, {"title": "Access and Observability Controls", "description": "Applies authentication, throttling, retry handling, and monitoring for Partner and Channel Integration Layer.", "type": "platform"}], "interfaces": [{"title": "Inbound API", "description": "API entry point used to submit requests or payloads into Partner and Channel Integration Layer.", "type": "api"}, {"title": "Outbound Event Feed", "description": "Event or webhook surface used by Partner and Channel Integration Layer to publish downstream updates.", "type": "event"}, {"title": "Partner Connector Surface", "description": "Connector interface for external systems exchanging data through Partner and Channel Integration Layer.", "type": "integration"}], "brickDependencies": [{"targetBrickId": "caam", "type": "identity", "interface": "Authentication API", "description": "Depends on Customer and Account Migration Toolkit to provide identity capabilities required by Partner and Channel Integration Layer."}, {"targetBrickId": "waac", "type": "event-subscription", "interface": "Lifecycle Status Events", "description": "Depends on Workflow Automation and Case Management to provide operations capabilities required by Partner and Channel Integration Layer."}, {"targetBrickId": "ooas", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Operational Observability and SLA Monitoring to provide analytics capabilities required by Partner and Channel Integration Layer."}], "externalSystemsThisBrickDependsOn": [{"system": "Partner Platforms", "type": "external-integration", "interface": "Partner API", "description": "Partner and Channel Integration Layer exchanges operational data with external partner platforms and adjacent systems."}, {"system": "Event Broker or Messaging Infrastructure", "type": "platfor ngPageIndex": 19};
    const domainName = 'Mambu';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
