    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>

nts.", "brick": {"id": "laac", "name": "Ledger and Accounting Core", "type": "service", "description": "Maintains accurate product-level balances, postings, and accounting events during coexistence and migration.", "domain": "Banks and Credit Unions", "group": "modernize-retail-banking-without-destabilizing-the-bank", "internalModules": [{"title": "Identity and Policy Engine", "description": "Authenticates actors, evaluates access policies, and manages trust rules for Ledger and Accounting Core.", "type": "identity"}, {"title": "Entitlements and Lifecycle Management", "description": "Manages roles, permissions, account state, and lifecycle changes within Ledger and Accounting Core.", "type": "service"}, {"title": "Audit and Compliance Controls", "description": "Records security-relevant actions and compliance evidence produced by Ledger and Accounting Core.", "type": "compliance"}], "interfaces": [{"title": "Authentication API", "description": "Programmatic interface for authentication, authorization, or account checks exposed by Ledger and Accounting Core.", "type": "api"}, {"title": "Administration Console", "description": "Operational interface for managing identity settings and access policies in Ledger and Accounting Core.", "type": "ui"}, {"title": "Audit Event Stream", "description": "Event interface that publishes security and compliance signals from Ledger and Accounting Core.", "type": "event"}], "brickDependencies": [{"targetBrickId": "cadm", "type": "service-api", "interface": "Service API", "description": "Depends on Collections and Delinquency Management to provide service capabilities required by Ledger and Accounting Core."}, {"targetBrickId": "agai", "type": "event-routing", "interface": "Outbound Event Feed", "description": "Depends on API Gateway and Integration Layer to provide integration capabilities required by Ledger and Accounting Core."}, {"targetBrickId": "ooas", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Operational Observability and SLA Monitoring to provide analytics capabilities required by Ledger and Accounting Core."}], "externalSystemsThisBrickDependsOn": [{"system": "Corporate Identity Provider", "type": "identity", "interface": "OIDC / SAML", "description": "Ledger and Accounting Core integrates with an external identity provider for authentication and federation."}, {"system": "Compliance Screening Services", "type": "compliance", "interface": "Screening API", "description": "Ledger and Accounting Core may call external screening or verification services to enforce trust and compliance checks."}], "externalSystemsDependingOnThisBrick": [{"system": "Customer and Operator Applications", "type": "identity-consumer", "interface": "Authentication / Authorization Interface", "description": "Internal and external applications depend on Ledger and Accounting Core for authentication, authorization, and trusted account state."}, {"system": "Audit and Risk Systems", "type": "control-consumer", "interface": "Audit / Event Interface", "description": "Governance and risk systems depend on Ledger and Accounting Core to emit trust, access, and compliance events."}], "icon": "laac.png"}}], "deliveryChannels": [{"channelId": "P1-operations-and-product-console", "change": "Deployed workflow updates in Operations and Product Console.", "channel": {"productId": "P1", "productName": "Composable Core Banking Platform", "name": "Operations and Product Console", "type": "web", "icon": "web.png"}}, {"channelId": "P1-api", "change": "Deployed workflow updates in Core Banking APIs.", "channel": {"productId": "P1", "productName": "", "name": "P1-api", "type": "product", "icon": "product.png"}}, {"channelId": "P1-dashboard", "change": "Deployed workflow updates in Migration and Platform Dashboard.", "channel": {"productId": "P1", "productName": "Composable Core Banking Platform", "name": "Migration and Platform Dashboard", "type": "dashboard", "icon": "dashboard.png"}}], "teams": {"primaryTeamIds": ["core-banking-foundations-account-migration-toolkit", "core-banking-foundations-configuration", "core-banking-foundations-ledger-accounting"], "supportingTeamIds": ["risk-finance-platform-reusable-templates"]}, "landingPageIndex": 23};
    const domainName = 'Mambu';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
