<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html" xmlns="http://www.w3.org/1999/html">

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            --text-color: #111;
            --surface-muted: #f0f0f0;
            --surface-fallback: #f3f3f3;
            --group-border: lightgrey;
            --card-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
            --highlight-color: crimson;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
            max-width: 960px;
            line-height: 1.4;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }

        .bricks-panel {
            padding: 18px;
            background-color: white;
        }

        .map {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .map-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            overflow-x: auto;
        }

        .domain-column {
            min-width: 220px;
            width: 100%;
        }

        .domain-title {
            background-color: var(--surface-muted);
            font-size: 12px;
            padding: 4px;
            text-align: center;
        }

        .domain-groups {
            text-align: center;
        }

        .group {
            border: 1px dashed var(--group-border);
            display: inline-block;
            margin: 4px;
            vertical-align: top;
        }

        .group-title {
            font-size: 80%;
            margin-top: 12px;
        }

        .group-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .brick-card {
            margin: 4px;
            padding: 3px;
            font-size: 12px;
            width: 140px;
            max-width: 144px;
            overflow: hidden;
            background-color: var(--surface-fallback);
            box-shadow: var(--card-shadow);
            text-align: left;
            min-height: 52px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
            border: 1px solid white;
        }

        .brick-card.highlighted {
            border: 4px solid var(--highlight-color);
        }

        .brick-icon {
            width: 36px;
        }

        .brick-name {
            overflow: hidden;
            width: calc(100% - 40px);
        }

        .legend {
            width: 160px;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 80%;
            display: inline-block;
        }

        .legend-title {
            margin-bottom: 3px;
        }

        .legend-item {
            padding: 8px;
        }

        .dependencies-panel {
            padding: 18px;
            background-color: white;
        }

        .capabilities-panel {
            padding: 18px;
            background-color: white;
        }

        .capabilities-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .capability-area {
            margin-bottom: 24px;
            display: inline-block;
            vertical-align: top;
        }

        .capability-area-title {
            font-size: 14px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 8px;
        }

        .capability-grid {
            display: inline-block;
            width: 350px;
            margin: 6px;
        }

        .capability-card {
            border: 1px solid #fed7aa;
            border-radius: 12px;
            padding: 16px;
            background: linear-gradient(180deg, #fff7ed 0%, #ffffff 100%);
            box-shadow: rgba(0, 0, 0, 0.05) 0px 4px 12px;
            margin-bottom: 12px;
        }

        .capability-card-title {
            font-size: 20px;
            color: #9a3412;
            margin-bottom: 8px;
        }

        .capability-card-copy {
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .capability-card-subtitle {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 12px;
            margin-bottom: 8px;
        }

        .capability-list {
            margin: 0;
            padding-left: 18px;
            color: #374151;
        }

        .capability-list li {
            margin-bottom: 6px;
        }

        .capability-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .capability-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid #bfdbfe;
            background-color: #eff6ff;
            color: #1e3a8a;
        }

        .capability-pill.external {
            border-color: #bbf7d0;
            background-color: #f0fdf4;
            color: #166534;
        }

        .capability-pill img {
            width: 18px;
            height: 18px;
        }

        .dependencies-layout {
            display: grid;
            grid-template-columns: 340px minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .dependency-controls {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
            padding: 14px;
        }

        .dependency-control-group {
            margin-bottom: 18px;
        }

        .dependency-control-title {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .dependency-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .dependency-action {
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: white;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .dependency-checklist {
            max-height: 260px;
            overflow: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background-color: white;
            padding: 8px;
        }

        .dependency-check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 4px;
            font-size: 13px;
            border-bottom: 1px solid #f3f4f6;
        }

        .dependency-check-item:last-child {
            border-bottom: none;
        }

        .dependency-check-item input {
            margin: 0;
        }

        .dependency-check-meta {
            color: #6b7280;
            font-size: 11px;
        }

        .dependency-graph-shell {
            min-width: 0;
        }

        .dependency-node-legend {
            border-top: 1px solid #e5e7eb;
            padding-top: 14px;
            margin-top: 6px;
        }

        .dependency-node-legend-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .dependency-node-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .dependency-node-legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid #9ca3af;
            flex: 0 0 auto;
        }

        .dependency-graph-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .dependency-graph-stat {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
            padding: 10px 12px;
            min-width: 120px;
        }

        .dependency-graph-stat-value {
            font-size: 24px;
            color: #1d4ed8;
        }

        .activity-muted {
            color: #6b7280;
            font-size: 90%;
        }

        .dependency-graph-stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .dependency-graph {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: white;
            padding: 14px;
            overflow: auto;
            min-height: 420px;
        }

        .dependency-empty {
            color: #6b7280;
            font-style: italic;
        }

        .matrix-panel {
            padding: 18px;
            background-color: white;
        }

        .matrix-layout {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .matrix-controls {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
            padding: 14px;
        }

        .matrix-shell {
            min-width: 0;
        }

        .matrix-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .matrix-table-wrap {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: white;
            overflow: auto;
            max-height: 75vh;
        }

        .matrix-table {
            border-collapse: collapse;
            width: max-content;
            min-width: 100%;
        }

        .matrix-table th,
        .matrix-table td {
            border-bottom: 1px solid #e5e7eb;
            border-right: 1px solid #f3f4f6;
            padding: 6px;
            text-align: center;
            vertical-align: middle;
        }

        .matrix-table th {
            position: sticky;
            top: 0;
            background-color: #f8fafc;
            z-index: 1;
        }

        .matrix-row-head {
            position: sticky;
            left: 0;
            background-color: white;
            min-width: 220px;
            text-align: left;
            z-index: 1;
        }

        .matrix-corner {
            position: sticky;
            left: 0;
            top: 0;
            z-index: 2;
            background-color: #f8fafc;
            min-width: 220px;
            text-align: left;
        }

        .matrix-col-icon {
            width: 14px;
            height: 14px;
            object-fit: contain;
        }

        .matrix-col-count {
            font-size: 10px;
            color: #6b7280;
            min-width: 24px;
        }

        .matrix-row-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 80%;
            text-align: left;
        }

        .matrix-row-count {
            margin-left: auto;
            font-size: 11px;
            color: #6b7280;
            padding-left: 8px;
            white-space: nowrap;
        }

        .matrix-row-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .matrix-hit {
            background-color: #dbeafe;
            color: #1e3a8a;
            font-size: 11px;
            line-height: 1.2;
            max-width: 6px;
        }

        .matrix-hit-external {
            background-color: #ecfccb;
            color: #365314;
            font-size: 10px;
            line-height: 1.2;
            max-width: 6px;
        }

        .matrix-empty-cell {
            color: #d1d5db;
        }

        @media (max-width: 1080px) {
            .dependencies-layout {
                grid-template-columns: 1fr;
            }

            .matrix-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>

        function initTab() {
            if (window.location.hash) {
                tabName = window.location.hash.substring(1);
                if (document.getElementById('tab_' + tabName)) {
                    openTab(tabName);
                }
            }
        }

        function updateTabLabels() {
            const brickCount = getBrickCatalog().length;
            const experienceCount = getCapabilityCatalogItems().length;
            document.getElementById('tab_BigPicture').textContent = 'Functional Bricks (' + brickCount + ')';
            document.getElementById('tab_Experiences').textContent = 'Experience Bricks (' + experienceCount + ')';
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            history.pushState({}, '', '#' + tabName);
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
            if (tabName === 'Dependencies') {
                renderDependenciesView();
            }
            if (tabName === 'Matrix') {
                renderMatrixView();
            }
            if (tabName === 'Experiences') {
                renderCapabilitiesView();
            }
        }

                    <div class="domain-groups">${(domain.children || []).map(renderGroup).join('')}</div>
                </section>
            `;
        }

        function buildGroupRowLookup() {
            const lookup = {};
            ((brickRendering.rows) || []).forEach(rowInfo => {
                const row = Number(rowInfo.row) || 1;
                (rowInfo.brickIds || []).forEach(brickId => {
                    lookup[String(brickId)] = row;
                });
            });
            return lookup;
        }

        function applyRowsToHierarchy(items, groupRows) {
            return items.map(group => ({
                ...normalizeGroup(group),
                row: groupRows[String(group.id)] || Number(group.row) || 1
            }));
        }

        function filterHierarchyForRow(items, targetRow) {
            return items.filter(group => group.row === targetRow);
        }

        function renderMap(items) {
            const groupRows = buildGroupRowLookup();
            const normalizedItems = applyRowsToHierarchy(items, groupRows);
            const rows = Array.from(new Set(
                Object.values(groupRows)
                    .map(value => Number(value) || 1)
                    .concat([1])
            )).sort((left, right) => left - right);

            return `
                <div class="map">
                    ${rows.map(row => {
                const rowItems = filterHierarchyForRow(normalizedItems, row);
                if (!rowItems.length) {
                    return '';
                }
                return `
                            <div class="map-row" data-row="${row}">
                                ${rowItems.map(renderDomain).join('')}
                            </div>
                        `;
            }).join('')}
                </div>
            `;
        }

        function renderLegend() {
            return `
                <div class="legend-title">Legend:</div>
                ${brickTypes.map(type => `
                    <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
                `).join('')}
            `;
        }

        function escapeMermaidLabel(value) {
            return String(value || '')
                .replaceAll('&', 'and')
                .replaceAll('"', '')
                .replaceAll("'", '')
                .replaceAll('<', '')
                .replaceAll('>', '')
                .replaceAll('[', '(')
                .replaceAll(']', ')')
                .replaceAll('{', '(')
                .replaceAll('}', ')')
                .replaceAll('|', '/');
        }

        function flattenBricks(items, ancestors = []) {
            let leaves = [];
            (items || []).forEach(item => {
                const children = item.children || [];
                if ((item.type || '').toLowerCase() === 'group' && children.length) {
                    leaves = leaves.concat(flattenBricks(children, ancestors.concat(item)));
                    return;
                }
                const domain = ancestors[0] ? ancestors[0].name : (item.domain || '');
                const group = ancestors.length ? ancestors[ancestors.length - 1].name : (item.group || '');
                leaves.push({
                    ...item,
                    domain: domain,
                    group: group
                });
            });
            return leaves;
        }

        function getBrickCatalog() {
            return flattenBricks(bricks);
        }

        function getCapabilityCatalogItems() {
            const fallbackCapabilities = getBrickCatalog().map(item => ({
                ...item,
                sourceType: 'brick-fallback',
                externalSystemsThisCapabilityDependsOn: item.externalSystemsThisBrickDependsOn || item.externalSystemDependencies || [],
                externalSystemsDependingOnThisCapability: item.externalSystemsDependingOnThisBrick || []
            }));

            return explicitCapabilities.length ? explicitCapabilities : fallbackCapabilities;
        }

        function buildBrickLookup() {
            const lookup = {};
            getBrickCatalog().forEach(item => {
                lookup[item.id] = item;
            });
            return lookup;
        }

        function capabilityAreaOf(capability, brickLookup) {
            if (capability.group) {
                return capability.group;
            }
            const groups = {};
            (capability.brickDependencies || []).forEach(dep => {
                const brick = brickLookup[dep.targetBrickId] || {};
                const area = brick.group || brick.domain || 'General';
                groups[area] = (groups[area] || 0) + 1;
            });
            const ranked = Object.entries(groups).sort((left, right) => {
                if (right[1] !== left[1]) {
                    return right[1] - left[1];
                }
                return left[0].localeCompare(right[0]);
            });
            return ranked.length ? ranked[0][0] : 'General';
        }

        function renderCapabilityPills(capability, brickLookup) {
            const brickPills = (capability.brickDependencies || []).map(dep => {
                if (!dep.targetBrickId) {
                    return '';
                }
                const brick = brickLookup[dep.targetBrickId] || {};
                return `
                    <a class="capability-pill" target="_blank" href="landing_pages/${dep.targetBrickId}.html" title="${dep.description || ''}">
                        <img src="icons/${dep.targetBrickId}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                        <span>${brick.name || dep.targetBrickId}</span>
                    </a>
                `;
            }).filter(Boolean).join('');

            const externalPills = (((capability.externalSystemsThisCapabilityDependsOn || capability.externalSystemsThisBrickDependsOn) || [])).map(dep => `
                <span class="capability-pill external" title="${dep.description || ''}">
                    <img src="icons/external-system.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                    <span>${dep.system || 'External System'}</span>
                </span>
            `).join('');

            return `
                <div class="capability-card-subtitle">Product Bricks</div>
                <div class="capability-pills">${brickPills || '<span class="activity-muted">No linked product bricks.</span>'}</div>
                <div class="capability-card-subtitle">External Systems</div>
                <div class="capability-pills">${externalPills || '<span class="activity-muted">No external systems listed.</span>'}</div>
            `;
        }

        function renderCapabilitiesView() {
            const container = document.getElementById('ExperiencesContent');
            if (!container) {
                return;
            }

            const capabilities = getCapabilityCatalogItems();
            const brickLookup = buildBrickLookup();
            const grouped = {};
            capabilities.forEach(capability => {
                const area = capabilityAreaOf(capability, brickLookup);
                if (!grouped[area]) {
                    grouped[area] = [];
                }
                grouped[area].push(capability);
            });

            function summarizeCapabilityStory(capability) {
                const firstFlow = (capability.flows || [])[0] || {};
                const firstStep = (firstFlow.steps || [])[0] || {};
                const actor = firstFlow.primaryActor || firstStep.actor || '';
                const trigger = firstFlow.trigger || firstStep.trigger || '';
                return {actor, trigger};
            }

            const areas = Object.keys(grouped).sort((left, right) => left.localeCompare(right));
            container.innerHTML = `
                <div class="capabilities-summary">
                    <div class="dependency-graph-stat">
                        <div class="dependency-graph-stat-value">${capabilities.length}</div>
                        <div class="dependency-graph-stat-label">Experiences</div>
                    </div>
                    <div class="dependency-graph-stat">
                        <div class="dependency-graph-stat-value">${areas.length}</div>
                        <div class="dependency-graph-stat-label">Experience Areas</div>
                    </div>
                    <div class="dependency-graph-stat">
                        <div class="dependency-graph-stat-value">${capabilities.reduce((sum, item) => sum + ((item.flows || []).length), 0)}</div>
                        <div class="dependency-graph-stat-label">Flows Listed</div>
                    </div>
                    <div class="dependency-graph-stat">
                        <div class="dependency-graph-stat-value">${capabilities.reduce((sum, item) => sum + ((item.brickDependencies || []).length), 0)}</div>
                        <div class="dependency-graph-stat-label">Brick Links</div>
                    </div>
                </div>
                ${areas.map(area => `
                    <section class="capability-area">
                        <div class="capability-area-title">${area}</div>
                        <div class="capability-grid">
                            ${grouped[area].map(capability => {
                                const story = summarizeCapabilityStory(capability);
                                return `
                                <article class="capability-card" id="capability-${capability.id}">
                                    <div class="capability-card-title"><a target="_blank" href="capability_pages/${capability.id}.html">${capability.name || capability.id}</a></div>
                                    <div class="capability-card-copy">${capability.description || ''}</div>
                                    ${story.actor ? `<div class="capability-card-copy"><strong>Actor:</strong> ${story.actor}</div>` : ''}
                                    ${story.trigger ? `<div class="capability-card-copy"><strong>Trigger:</strong> ${story.trigger}</div>` : ''}
                                    <div class="capability-card-subtitle">Flows Facilitated</div>
                                    <ul class="capability-list">
                                        ${((capability.flows || []).length ? capability.flows.map(flow => flow.title || flow.id) : ['No flows listed.']).map(flow => `<li>${flow}</li>`).join('')}
                                    </ul>
                                    <div class="capability-card-subtitle">Outcomes</div>
                                    <ul class="capability-list">
                                        ${((capability.outcomes || []).length ? capability.outcomes : ['No outcomes listed.']).map(outcome => `<li>${outcome}</li>`).join('')}
                                    </ul>
                                    ${renderCapabilityPills(capability, brickLookup)}
                                </article>
                            `;
                            }).join('')}
                        </div>
                    </section>
                `).join('')}
            `;
        }

        function getDependencyCatalog() {
            const capabilities = getCapabilityCatalogItems();
            const brickCatalog = getBrickCatalog();
            const referencedBrickIds = new Set();
            const dependencyTypes = new Set();
            const externalSystems = new Set();
            capabilities.forEach(capability => {
                (capability.brickDependencies || []).forEach(dep => dependencyTypes.add(dep.type || 'unspecified'));
                (capability.brickDependencies || []).forEach(dep => referencedBrickIds.add(dep.targetBrickId || ''));
                ((capability.externalSystemsThisCapabilityDependsOn || capability.externalSystemsThisBrickDependsOn) || []).forEach(dep => {
                    dependencyTypes.add(dep.type || 'unspecified');
                    externalSystems.add(dep.system || 'External System');
                });
                ((capability.externalSystemsDependingOnThisCapability || capability.externalSystemsDependingOnThisBrick) || []).forEach(dep => {
                    dependencyTypes.add(dep.type || 'unspecified');
                    externalSystems.add(dep.system || 'External System');
                });
            });
            return {
                capabilities: capabilities,
                bricks: brickCatalog.filter(item => referencedBrickIds.has(item.id)),
                dependencyTypes: Array.from(dependencyTypes).sort((left, right) => left.localeCompare(right)),
                externalSystems: Array.from(externalSystems).sort((left, right) => left.localeCompare(right))
            };
        }

        function buildDependencyGraph(catalog, selectedCapabilityIds, selectedDependencyTypes, selectedExternalSystems) {
            const selectedCapabilities = catalog.capabilities.filter(item => selectedCapabilityIds.has(item.id));
            const graphNodes = [];
            const graphEdges = [];
            const brickNodes = {};
            const externalNodes = {};

            selectedCapabilities.forEach(item => {
                graphNodes.push({
                    id: item.id,
                    label: item.name || item.id,
                    nodeClass: 'capabilityNode'
                });

                (item.brickDependencies || []).forEach(dep => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    const targetBrick = catalog.bricks.find(candidate => candidate.id === dep.targetBrickId) || {};
                    if (!dep.targetBrickId) {
                        return;
                    }
                    brickNodes[dep.targetBrickId] = {
                        id: dep.targetBrickId,
                        label: targetBrick.name || dep.targetBrickId,
                        nodeClass: 'brickNode'
                    };
                    graphEdges.push({
                        source: item.id,
                        target: dep.targetBrickId,
                        label: [dep.type, dep.interface].filter(Boolean).join(' / ')
                    });
                });

                ((item.externalSystemsThisCapabilityDependsOn || item.externalSystemsThisBrickDependsOn) || []).forEach((dep, index) => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    if (!selectedExternalSystems.has(dep.system || 'External System')) {
                        return;
                    }
                    const externalNodeId = 'external_out_' + item.id + '_' + index;
                    externalNodes[externalNodeId] = {
                        id: externalNodeId,
                        label: dep.system || 'External System',
                        nodeClass: 'externalNode'
                    };
                    graphEdges.push({
                        source: item.id,
                        target: externalNodeId,
                        label: [dep.type, dep.interface].filter(Boolean).join(' / ')
                    });
                });

                ((item.externalSystemsDependingOnThisCapability || item.externalSystemsDependingOnThisBrick) || []).forEach((dep, index) => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    if (!selectedExternalSystems.has(dep.system || 'External System')) {
                        return;
                    }
                    const externalNodeId = 'external_in_' + item.id + '_' + index;
                    externalNodes[externalNodeId] = {
                        id: externalNodeId,
                        label: dep.system || 'External System',
                        nodeClass: 'externalNode'
                    };
                    graphEdges.push({
                        source: externalNodeId,
                        target: item.id,
                        label: [dep.type, dep.interface].filter(Boolean).join(' / ')
                    });
                });
            });

            Object.values(brickNodes).forEach(item => graphNodes.push(item));
            Object.values(externalNodes).forEach(item => graphNodes.push(item));

            return {
                nodes: graphNodes,
                edges: graphEdges
            };
        }

        function renderDependencyGraphShell() {
            return `
                <div class="dependency-graph-shell">
                    <div class="dependency-graph-summary" id="DependenciesSummary"></div>
                    <div class="dependency-graph" id="DependenciesGraph"></div>
                </div>
            `;
        }

        function renderDependenciesView() {
            const container = document.getElementById('DependenciesContent');
            if (!container) {
                return;
            }

            const catalog = getDependencyCatalog();
            if (!dependenciesInitialized) {
                container.innerHTML = `
                    <div class="dependencies-layout">
                        ${renderDependenciesControls(catalog)}
                        ${renderDependencyGraphShell()}
                    </div>
                `;
                dependenciesInitialized = true;
            }

            const selectedCapabilityIds = selectedValues('.dependency-capability-checkbox');
            const selectedDependencyTypes = selectedValues('.dependency-type-checkbox');
            const selectedExternalSystems = selectedValues('.dependency-external-checkbox');
            const graph = buildDependencyGraph(catalog, selectedCapabilityIds, selectedDependencyTypes, selectedExternalSystems);

            document.getElementById('DependenciesSummary').innerHTML = `
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${selectedCapabilityIds.size}</div>
                    <div class="dependency-graph-stat-label">Experiences Shown</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${graph.nodes.length}</div>
                    <div class="dependency-graph-stat-label">Nodes</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${graph.edges.length}</div>
                    <div class="dependency-graph-stat-label">Dependencies</div>
                </div>
            `;

            if (!graph.nodes.length || !graph.edges.length) {
                document.getElementById('DependenciesGraph').innerHTML = '<div class="dependency-empty">Select capabilities and dependency types to render the dependency map.</div>';
                return;
            }

            let chart = 'flowchart LR\n\n';
            graph.nodes.forEach(node => {
                chart += node.id.replaceAll('-', '_') + '["' + escapeMermaidLabel(node.label) + '"]\n';
            });
            graph.edges.forEach(edge => {
                chart += edge.source.replaceAll('-', '_') + ' -->|' + escapeMermaidLabel(edge.label) + '| ' + edge.target.replaceAll('-', '_') + '\n';
            });
            chart += '\nclassDef capabilityNode fill:#fde68a,stroke:#d97706,color:#7c2d12,stroke-width:2px;\n';
            chart += 'classDef brickNode fill:#dbeafe,stroke:#2563eb,color:#1e3a8a,stroke-width:2px;\n';
            chart += 'classDef externalNode fill:#ecfccb,stroke:#65a30d,color:#365314;\n';
            const capabilityNodeIds = graph.nodes.filter(node => node.nodeClass === 'capabilityNode').map(node => node.id.replaceAll('-', '_'));
            const brickNodeIds = graph.nodes.filter(node => node.nodeClass === 'brickNode').map(node => node.id.replaceAll('-', '_'));
            const externalNodeIds = graph.nodes.filter(node => node.nodeClass === 'externalNode').map(node => node.id.replaceAll('-', '_'));
            if (capabilityNodeIds.length) {
                chart += 'class ' + capabilityNodeIds.join(',') + ' capabilityNode;\n';
            }
            if (brickNodeIds.length) {
                chart += 'class ' + brickNodeIds.join(',') + ' brickNode;\n';
            }
            if (externalNodeIds.length) {
                chart += 'class ' + externalNodeIds.join(',') + ' externalNode;\n';
            }

            document.getElementById('DependenciesGraph').innerHTML = '<div class="mermaid">' + chart + '</div>';
            mermaid.run({querySelector: '#DependenciesGraph .mermaid'});
        }

        function updateBricksView() {

            document.getElementById('Legend').innerHTML = renderLegend();

        function getMatrixCatalog() {
            const capabilities = getCapabilityCatalogItems();
            const brickCatalog = getBrickCatalog();
            const referencedBrickIds = new Set();
            const dependencyTypes = new Set();
            capabilities.forEach(capability => {
                (capability.brickDependencies || []).forEach(dep => dependencyTypes.add(dep.type || 'unspecified'));
                (capability.brickDependencies || []).forEach(dep => referencedBrickIds.add(dep.targetBrickId || ''));
                ((capability.externalSystemsThisCapabilityDependsOn || capability.externalSystemsThisBrickDependsOn) || []).forEach(dep => dependencyTypes.add(dep.type || 'unspecified'));
                ((capability.externalSystemsDependingOnThisCapability || capability.externalSystemsDependingOnThisBrick) || []).forEach(dep => dependencyTypes.add(dep.type || 'unspecified'));
            });
            return {
                capabilities: capabilities,
                bricks: brickCatalog.filter(item => referencedBrickIds.has(item.id)),
                dependencyTypes: Array.from(dependencyTypes).sort((left, right) => left.localeCompare(right))
            };

        function renderMatrixControls(catalog) {
            return `
                <div class="matrix-controls">
                    <div class="dependency-control-group">
                        <div class="dependency-control-title">Dependency Types</div>
                        <div class="dependency-actions">
                            <button class="dependency-action" type="button" onclick="setAllMatrixCheckboxes('.matrix-type-checkbox', true)">Show all</button>
                            <button class="dependency-action" type="button" onclick="setAllMatrixCheckboxes('.matrix-type-checkbox', false)">Hide all</button>
                        </div>
                        <div class="dependency-checklist">
                            ${catalog.dependencyTypes.map(item => `
                                <label class="dependency-check-item">
                                    <input type="checkbox" class="matrix-type-checkbox" value="${item}" checked onchange="renderMatrixView()">
                                    <span>${item}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function buildMatrixData(catalog, selectedDependencyTypes) {
            const capabilities = catalog.capabilities;
            const rows = [];
            const lookup = {};
            const rowIndex = {};

            function ensureRow(rowId, row) {
                if (!rowIndex[rowId]) {
                    rowIndex[rowId] = row;
                    rows.push(row);
                    lookup[rowId] = {};
                }
                return rowIndex[rowId];
            }

            function addMatrixDependency(sourceId, targetId, payload) {
                if (!lookup[sourceId]) {
                    lookup[sourceId] = {};
                }
                if (!lookup[sourceId][targetId]) {
                    lookup[sourceId][targetId] = [];
                }
                lookup[sourceId][targetId].push(payload);
            }

            capabilities.forEach(capability => {
                ensureRow(capability.id, {
                    id: capability.id,
                    kind: 'capability',
                    name: capability.name || capability.id,
                    icon: 'capability_404.png',
                    href: ''
                });

                (capability.brickDependencies || []).forEach(dep => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    if (!dep.targetBrickId) {
                        return;
                    }
                    const linkedBrick = catalog.bricks.find(item => item.id === dep.targetBrickId) || {};
                    ensureRow(dep.targetBrickId, {
                        id: dep.targetBrickId,
                        kind: 'brick',
                        name: linkedBrick.name || dep.targetBrickId,
                        icon: dep.targetBrickId + '.png',
                        href: dep.targetBrickId ? 'landing_pages/' + dep.targetBrickId + '.html' : ''
                    });
                    addMatrixDependency(capability.id, dep.targetBrickId, {
                        type: dep.type || 'unspecified',
                        direction: 'capability_to_brick'
                    });
                    addMatrixDependency(dep.targetBrickId, capability.id, {
                        type: dep.type || 'unspecified',
                        direction: 'brick_supports_capability'
                    });
                });

                ((capability.externalSystemsThisCapabilityDependsOn || capability.externalSystemsThisBrickDependsOn) || []).forEach(dep => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    const rowId = 'external:' + (dep.system || 'External System');
                    ensureRow(rowId, {
                        id: rowId,
                        kind: 'external',
                        name: dep.system || 'External System',
                        icon: 'external-system.png',
                        href: ''
                    });
                    addMatrixDependency(capability.id, rowId, {
                        type: dep.type || 'unspecified',
                        direction: 'capability_depends_on_external'
                    });
                    addMatrixDependency(rowId, capability.id, {
                        type: dep.type || 'unspecified',
                        direction: 'external_supports_capability'
                    });
                });

                ((capability.externalSystemsDependingOnThisCapability || capability.externalSystemsDependingOnThisBrick) || []).forEach(dep => {
                    if (!selectedDependencyTypes.has(dep.type || 'unspecified')) {
                        return;
                    }
                    const rowId = 'external:' + (dep.system || 'External System');
                    ensureRow(rowId, {
                        id: rowId,
                        kind: 'external',
                        name: dep.system || 'External System',
                        icon: 'external-system.png',
                        href: ''
                    });
                    addMatrixDependency(rowId, capability.id, {
                        type: dep.type || 'unspecified',
                        direction: 'external_depends_on_capability'
                    });
                    addMatrixDependency(capability.id, rowId, {
                        type: dep.type || 'unspecified',
                        direction: 'capability_used_by_external'
                    });
                });
            });

            rows.sort((left, right) => {
                if (left.kind !== right.kind) {
                    const order = {'capability': 0, 'brick': 1, 'external': 2};
                    return (order[left.kind] || 99) - (order[right.kind] || 99);
                }
                return (left.name || '').localeCompare(right.name || '');
            });

            return {
                columns: rows,
                rows: rows,
                lookup: lookup
            };
        }

        function renderMatrixTable(matrixData) {
            const columns = matrixData.columns || [];
            const rows = matrixData.rows || [];
            if (!columns.length || !rows.length) {
                return '<div class="dependency-empty">No matrix data available.</div>';
            }

            function dependencyCountForParticipant(participantId) {
                return Object.values(matrixData.lookup[participantId] || {}).reduce((sum, deps) => sum + deps.length, 0);
            }

            return `
                <div class="matrix-table-wrap">
                    <table class="matrix-table">
                        <thead>
                            <tr>
                                <th class="matrix-corner">Experience</th>
                                ${columns.map(column => `
                                    <th title="${column.name || column.id}">
                                        ${column.href ? `
                                            <a target="_blank" href="${column.href}">
                                                <img class="matrix-col-icon" src="icons/${column.icon}" alt="${column.name || column.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                            </a>
                                        ` : `
                                            <img class="matrix-col-icon" src="icons/${column.icon}" alt="${column.name || column.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                        `}
                                    </th>
                                `).join('')}
                            </tr>
                            <tr>
                                <th class="matrix-corner">Count</th>
                                ${columns.map(column => `
                                    <th class="matrix-col-count" title="Total dependencies shown for ${column.name || column.id}">
                                        ${dependencyCountForParticipant(column.id)}
                                    </th>
                                `).join('')}
                            </tr>
                        </thead>
                        <tbody>
                            ${rows.map(source => `
                                <tr>
                                    <td class="matrix-row-head">
                                        ${source.href ? `
                                            <a class="matrix-row-label" target="_blank" href="${source.href}">
                                                <img class="matrix-row-icon" src="icons/${source.icon}" alt="${source.name || source.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                                <span>${source.name || source.id}</span>
                                                <span class="matrix-row-count">${dependencyCountForParticipant(source.id)}</span>
                                            </a>
                                        ` : `
                                            <div class="matrix-row-label">
                                                <img class="matrix-row-icon" src="icons/${source.icon}" alt="${source.name || source.id}" onerror="this.onerror=null;this.src='icons/brick.png'">
                                                <span>${source.name || source.id}</span>
                                                <span class="matrix-row-count">${dependencyCountForParticipant(source.id)}</span>
                                            </div>
                                        `}
                                    </td>
                                    ${columns.map(target => {
                const deps = (((matrixData.lookup[source.id] || {})[target.id]) || []);
                if (!deps.length) {
                    return '<td class="matrix-empty-cell">.</td>';
                }
                if (source.kind === 'external' || target.kind === 'external') {
                    const title = deps.map(dep => {
                        if (dep.direction === 'capability_depends_on_external') {
                            return 'Experience depends on external system: ' + dep.type;
                        }
                        if (dep.direction === 'external_supports_capability') {
                            return 'External system supports experience dependency: ' + dep.type;
                        }
                        if (dep.direction === 'external_depends_on_capability') {
                            return 'External system depends on experience: ' + dep.type;
                        }
                        if (dep.direction === 'capability_used_by_external') {
                            return 'Experience is used by external system: ' + dep.type;
                        }
                        return dep.type;
                    }).join(', ');
                    return `<td class="matrix-hit-external" title="${title}">${deps.length}</td>`;
                }
                return `<td class="matrix-hit" title="${deps.map(dep => {
                    if (dep.direction === 'brick_supports_capability') {
                        return dep.type + ' (reverse link)';
                    }
                    return dep.type;
                }).join(', ')}">${deps.length}</td>`;
            }).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderMatrixView() {
            const container = document.getElementById('MatrixContent');
            if (!container) {
                return;
            }

            const catalog = getMatrixCatalog();
            if (!matrixInitialized) {
                container.innerHTML = `
                    <div class="matrix-layout">
                        ${renderMatrixControls(catalog)}
                        <div class="matrix-shell">
                            <div class="matrix-summary" id="MatrixSummary"></div>
                            <div id="MatrixTable"></div>
                        </div>
                    </div>
                `;
                matrixInitialized = true;
            }

            const selectedDependencyTypes = new Set(Array.from(document.querySelectorAll('.matrix-type-checkbox'))
                .filter(input => input.checked)
                .map(input => input.value));

            const matrixData = buildMatrixData(catalog, selectedDependencyTypes);
            const dependencyCount = Object.values(matrixData.lookup).reduce((sum, row) => {
                return sum + Object.values(row).reduce((rowSum, deps) => rowSum + deps.length, 0);
            }, 0);

            document.getElementById('MatrixSummary').innerHTML = `
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${matrixData.columns.length}</div>
                    <div class="dependency-graph-stat-label">Columns</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${matrixData.rows.length}</div>
                    <div class="dependency-graph-stat-label">Rows</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${selectedDependencyTypes.size}</div>
                    <div class="dependency-graph-stat-label">Types Shown</div>
                </div>
                <div class="dependency-graph-stat">
                    <div class="dependency-graph-stat-value">${dependencyCount}</div>
                    <div class="dependency-graph-stat-label">Dependency Hits</div>
                </div>
            `;

            document.getElementById('MatrixTable').innerHTML = renderMatrixTable(matrixData);
        }
    </script>
</head>
