": "Real-time Event Streaming", "type": "integration", "description": "Publishes business events so downstream systems can stay synchronized without brittle point-to-point coupling.", "children": []}, {"id": "craa", "name": "Compliance Rules and Audit Controls", "type": "service", "description": "Applies policy controls, audit trails, and configurable governance needed for regulated financial operations.", "children": []}, {"id": "ooas", "name": "Operational Observability and SLA Monitoring", "type": "service", "description": "Provides production visibility, incident response signals, and service-level evidence required for risk management.", "children": []}]}, {"id": "banks-and-credit-unions-launch-differentiated-deposit-and-payment-propositions-faster", "name": "launch-differentiated-deposit-and-payment-propositions-faster", "type": "group", "description": "", "children": [{"id": "dpaa", "name": "Deposit Product and Account Lifecycle Management", "type": "service", "description": "Handles account opening, funding, interest, fees, statements, and lifecycle states for deposit propositions.", "children": []}, {"id": "poas", "name": "Payment Orchestration and Scheme Connectivity", "type": "integration", "description": "Coordinates payment workflows and external scheme or processor integrations needed for modern money movement.", "children": []}, {"id": "waac", "name": "Workflow Automation and Case Management", "type": "service", "description": "Routes operational tasks, approvals, and exceptions so banking operations remain controlled as product volume grows.", "children": []}, {"id": "aapi", "name": "Analytics and Portfolio Insights", "type": "service", "description": "Provides cohort, product, and performance analytics so the bank can iterate based on actual customer and business outcomes.", "children": []}]}]}, {"id": "lenders-and-consumer-finance-providers", "name": "Lenders and Consumer Finance Providers", "type": "group", "description": "", "children": [{"id": " "Reusable Product Templates", "type": "development", "description": "Speeds cross-market rollout by reusing proven lending product blueprints with controlled local variation.", "children": []}, {"id": "graa", "name": "Governance, Risk, and Audit Controls", "type": "service", "description": "Ensures lending operations remain traceable, policy-compliant, and reviewable as the business expands.", "children": []}, {"id": "taem", "name": "Tenant and Environment Management", "type": "development", "description": "Supports structured separation, configuration, and promotion across environments and operating units.", "children": []}, {"id": "ueam", "name": "Unit Economics and Margin Analytics", "type": "service", "description": "Connects lending volumes to margin, servicing cost, and collections effort so expansion decisions stay grounded.", "children": []}]}]}, {"id": "fintechs-baas-and-embedded-finance-providers", "name": "Fintechs, BaaS, and Embedded Finance Providers", "type": "group", "description": "", "children": [{"id": "fintechs-baas-and-embedded-finance-providers-enable-partners-to-launch-financial-products-through-apis", "name": "enable-partners-to-launch-financial-products-through-apis", "type": "group", "description": "", "children": [{"id": "poat", "name": "Partner Onboarding and Tenant Setup", "type": "integration", "description": "Standardizes how new partners are provisioned, configured, and governed so scale does not require custom operational playbooks.", "children": []}, {"id": "mtrc", "name": "Multi-tenant Runtime Controls", "type": "development", "description": "Maintains tenant isolation, configuration boundaries, and operational control across many partner programs.", "children": []}, {"id": "dpap", "name": "Developer Platform and Public APIs", "type": "development", "description": "Provides secure, documented, and consumable APIs for accounts, lending, payments, and servicing actions.", "children": []}, {"id": "waed", "name": "Webhook and Event Distribution", "type": "integration", "description": "Allows partners to react to real-time banking events without polling or manual reconciliation.", "children": []}, {"id": "pohb", "name": "Partner Operations Hub", "type": "full-stack", "description": "Centralizes operational servicing, case handling, and exception management across partner programs.", "children": []}, {"id": "rasc", "name": "Reconciliation and Settlement Controls", "type": "service", "description": "Keeps balances, movements, and commercial obligations consistent across internal and external parties.", "children": []}, {"id": "prap", "name": "Partner Revenue and Performance Analytics", "type": "service", "description": "Connects partner activity to revenue, margin, adoption, and operational cost for platform steering.", "children": []}]}, {"id": "fintechs-baas-and-embedded-finance-providers-expand-the-platform-from-one-product-line-to-a-broader-banking-stack", "name": "expand-the-platform-from-one-product-line-to-a-broader-banking-stack", "type": "group", "description": "", "children": [{"id": "cpdr", "name": "Composable Product Domain Reuse", "type": "development", "description": "Lets the provider assemble new partner propositions from reusable lending, deposits, and payments modules.", "children": []}, {"id": "pbap", "name": "Proposition Bundling and Packaging", "type": "full-stack", "description": "Supports quick creation of reusable product packages aligned to partner types and go-to-market motions.", "children": []}, {"id": "saca", "name": "Security, Audit, Compliance, and Resilience", "type": "service", "description": "Keeps platform growth aligned with regulated operating expectations and partner trust requirements.", "children": []}, {"id": "edav", "name": "Ecosystem Demand and Value Intelligence", "type": "service", "description": "Surfaces which partner needs, propositions, and integrations create the most strategic value.", "children": []}]}]}]};
        const bricksMetadata = bricksPayload.metadata || {};
        const bricks = bricksPayload.bricks || [];
        const brickRendering = bricksMetadata.rendering || bricksMetadata.render || {};
        const brickTypes = bricksMetadata.types || [];
        const typeColorMap = {};

        brickTypes.forEach(type => {
            typeColorMap[type.id.toLowerCase()] = type;
            typeColorMap[type.name.toLowerCase()] = type;
        });

        function colorOf(type) {
            if (type && typeColorMap[type.toLowerCase()]) {
                return typeColorMap[type.toLowerCase()].color;
            }
            return 'var(--surface-fallback)';
        }

        function normalizeBrick(item) {
            return {
                ...item,
                color: colorOf(item.type),
                isHighlighted: Boolean(item.name && item.name.includes('*'))
            };
        }

        function normalizeGroup(group) {
            return {
                ...group,
                children: (group.children || []).map(child => {
                    if ((child.type || '').toLowerCase() === 'group') {
                        return normalizeGroup(child);
                    }
                    return normalizeBrick(child);
                })
            };
        }

        function renderBrick(item) {
            const brickCard = `
                <div class="brick-card${item.isHighlighted ? ' highlighted' : ''}" style="background-color: ${item.color}">
                    <img class="brick-icon" src="icons/${item.id}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                    <div class="brick-name">${item.name || ''}</div>
                </div>
            `;

            if (!item.id) {
                return brickCard;
            }

            return `<a target="_blank" href="landing_pages/${item.id}.html">${brickCard}</a>`;
        }

        function renderGroup(group) {
            return `
                <div class="group">
                    <div class="group-title">${group.name}</div>
                    <div class="group-items">${(group.children || []).map(renderBrick).join('')}</div>
                </div>
            `;
        }

        function renderDomain(domain) {
            return `
                <section class="domain-column">
                    <div class="domain-title">${domain.name}</div>
                    <div class="domain-groups">${(domain.children || []).map(renderGroup).join('')}</div>
                </section>
            `;
        }

        function buildGroupRowLookup() {
            const lookup = {};
            ((brickRendering.rows) || []).forEach(rowInfo => {
                const row = Number(rowInfo.row) || 1;
                (rowInfo.brickIds || []).forEach(brickId => {
                    lookup[String(brickId)] = row;
                });
            });
            return lookup;
        }

        function applyRowsToHierarchy(items, groupRows) {
            return items.map(group => ({
                ...normalizeGroup(group),
                row: groupRows[String(group.id)] || Number(group.row) || 1
            }));
        }

        function filterHierarchyForRow(items, targetRow) {
            return items.filter(group => group.row === targetRow);
        }

        function renderMap(items) {
            const groupRows = buildGroupRowLookup();
            const normalizedItems = applyRowsToHierarchy(items, groupRows);
            const rows = Array.from(new Set(
                Object.values(groupRows)
                    .map(value => Number(value) || 1)
                    .concat([1])
            )).sort((left, right) => left - right);

            console.log(normalizedItems)
            console.log(rows)

            return `
                <div class="map">
                    ${rows.map(row => {
                        const rowItems = filterHierarchyForRow(normalizedItems, row);
                        if (!rowItems.length) {
                            return '';
                        }
                        return `
                            <div class="map-row" data-row="${row}">
                                ${rowItems.map(renderDomain).join('')}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderLegend() {
            return `
                <div class="legend-title">Legend:</div>
                ${brickTypes.map(type => `
                    <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
                `).join('')}
            `;
        }

        function updateBricksView() {
            document.getElementById('Current').innerHTML = renderMap(bricks);
            document.getElementById('Legend').innerHTML = renderLegend();
        }
    </script>
