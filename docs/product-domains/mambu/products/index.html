<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products (Mambu)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        .section {
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .group {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .doc {
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 11px;
            background-color: white;
            vertical-align: top;
        }

        a {
            text-decoration: none;
        }

        .icon {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 26px;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        body {
            margin: 40px;
        }

        ::placeholder {
            color: lightgrey;
            opacity: 1;
        }

        :-ms-input-placeholder {
            color: lightgrey;
        }

        ::-ms-input-placeholder {
            color: lightgrey;
        }


        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function openTab(evt, cityName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(cityName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</head>
<body>
<div style="" class="hidden">
    <div style="margin-bottom: 0px; margin-left: 6px">
        <img src="icons/logo.png" style="vertical-align: middle; height: 110px">
        <div style="width: calc(100% - 200px); display: inline-block; vertical-align: top; padding-left: 12px">
            <div style="padding-top: 0px; font-size: 64px">Products</div>
            <p style="color: #a0a0a0; font-size: 20px; margin-top: 8px">Mambu</p>
        </div>
    </div>
    <br>
</div>

<div class="tab">
    <button class="tablinks active" id="tab_products" onclick="openTab('products')">Products</button>
</div>
<div>
    <div id="products" style="display: block" class="tabcontent"></div>
</div>

<script>
    const products = {"portfolio": {"name": "Mambu Portfolio", "version": "1.0", "products": [{"id": "P1", "name": "Composable Core Banking Platform", "type": "Core Banking SaaS", "primaryCustomers": [{"id": "bank_transform_exec", "name": "Chief Digital Banking / Transformation Executive"}], "interfaces": [{"type": "web", "name": "Operations and Product Console", "description": "Primary browser workspace for configuring banking products, monitoring operations, and managing controlled change.", "users": ["Bank Product Teams", "Operations Teams"], "availabilityHorizon": "live"}, {"type": "public_api", "name": "Core Banking APIs", "description": "External-facing APIs for product, account, and transaction services used by channels and enterprise systems.", "users": ["Channels", "Enterprise Systems", "Integration Teams"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Migration and Platform Dashboard", "description": "Operational visibility for migration waves, service health, and platform utilization.", "users": ["Transformation Leaders", "Risk and Operations Leaders"], "availabilityHorizon": "1_year"}, {"type": "partner_api", "name": "Event and Integration Layer", "description": "Reusable event and integration layer for payments, CRM, general ledger, and surrounding banking services.", "users": ["Partner Systems", "Internal Engineering Teams"], "availabilityHorizon": "live"}], "neededCapabilities": [{"capabilityCode": "pcen", "capabilityName": "Product Configuration Engine", "whyNeeded": "Needed to configure and evolve banking products without high-cost core code changes.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "mdar", "capabilityName": "Modular Domain Architecture", "whyNeeded": "Needed to support phased modernization across lending, deposits, payments, and surrounding services.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "caam", "capabilityName": "Customer and Account Migration Toolkit", "whyNeeded": "Needed to move portfolios and balances safely from legacy cores into the new platform.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "laac", "capabilityName": "Ledger and Accounting Core", "whyNeeded": "Needed to keep balances, postings, and accounting events accurate during coexistence and scale-up.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "agai", "capabilityName": "API Gateway and Integration Layer", "whyNeeded": "Needed to connect channels and surrounding banking systems through reusable APIs.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "rtes", "capabilityName": "Real-time Event Streaming", "whyNeeded": "Needed to distribute core business events reliably across the target banking stack.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "craa", "capabilityName": "Compliance Rules and Audit Controls", "whyNeeded": "Needed to demonstrate regulated control, traceability, and policy enforcement.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "ooas", "capabilityName": "Operational Observability and SLA Monitoring", "whyNeeded": "Needed to provide production resilience evidence and operational response signals.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "dpaa", "capabilityName": "Deposit Product and Account Lifecycle Management", "whyNeeded": "Needed to support current accounts, savings, and term-deposit propositions on the platform.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "poas", "capabilityName": "Payment Orchestration and Scheme Connectivity", "whyNeeded": "Needed to embed payment capabilities into modern deposit-led banking propositions.", "mappingType": "curated_for_mambu"}]}, {"id": "P2", "name": "Digital Lending Operating Layer", "type": "Lending Platform", "primaryCustomers": [{"id": "lending_gm", "name": "General Manager of Digital Lending"}], "interfaces": [{"type": "web", "name": "Lending Configuration and Servicing Workspace", "description": "Browser workspace for launching loan products, managing servicing workflows, and controlling exceptions.", "users": ["Lending Product Teams", "Servicing Operations Teams"], "availabilityHorizon": "live"}, {"type": "partner_api", "name": "Origination and Partner API Layer", "description": "APIs used by direct channels, brokers, merchants, and embedded-finance partners for origination and servicing actions.", "users": ["Direct Channels", "Merchants", "Broker Platforms", "Embedded Partners"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Portfolio and Unit Economics Dashboard", "description": "Analytics surface for portfolio growth, delinquency, servicing efficiency, and cohort economics.", "users": ["General Managers", "Risk Leaders", "Finance Leaders"], "availabilityHorizon": "live"}, {"type": "api", "name": "Servicing Automation API", "description": "Internal and ecosystem API surface for repayment changes, collections actions, and loan-servicing workflows.", "users": ["Operations Automation", "Collections Systems"], "availabilityHorizon": "1_year"}], "neededCapabilities": [{"capabilityCode": "lpas", "capabilityName": "Loan Product and Servicing Engine", "whyNeeded": "Needed to support configurable digital loan products and lifecycle servicing.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "papr", "capabilityName": "Pricing and Policy Rules", "whyNeeded": "Needed to change rates, fees, and eligibility rules without engineering bottlenecks.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "oadw", "capabilityName": "Origination and Decisioning Workflow", "whyNeeded": "Needed to coordinate direct and partner application flows through a shared backend process.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "paci", "capabilityName": "Partner and Channel Integration Layer", "whyNeeded": "Needed to support multiple lending channels and embedded origination models.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "sowr", "capabilityName": "Servicing Operations Workspace", "whyNeeded": "Needed to keep manual servicing actions controlled as loan complexity increases.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "cadm", "capabilityName": "Collections and Delinquency Management", "whyNeeded": "Needed to manage arrears and collections without margin erosion.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "paac", "capabilityName": "Portfolio Analytics and Cohort Reporting", "whyNeeded": "Needed to understand growth quality, delinquency, and channel performance by cohort.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "rptm", "capabilityName": "Reusable Product Templates", "whyNeeded": "Needed to replicate winning product structures across markets and segments faster.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "graa", "capabilityName": "Governance, Risk, and Audit Controls", "whyNeeded": "Needed to keep growth aligned with market-specific control requirements.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "taem", "capabilityName": "Tenant and Environment Management", "whyNeeded": "Needed to scale multiple brands, segments, or market variants on one operating base.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "ueam", "capabilityName": "Unit Economics and Margin Analytics", "whyNeeded": "Needed to connect originations growth to margin, servicing cost, and operating leverage.", "mappingType": "curated_for_mambu"}]}, {"id": "P3", "name": "Embedded Finance Partner Platform", "type": "BaaS and Embedded Finance", "primaryCustomers": [{"id": "embedded_finance_director", "name": "VP Product for Embedded Finance and BaaS"}], "interfaces": [{"type": "web", "name": "Partner Operations Portal", "description": "Operational workspace for onboarding partners, resolving exceptions, and managing live partner programs.", "users": ["Partner Success Teams", "Platform Operations Teams"], "availabilityHorizon": "live"}, {"type": "public_api", "name": "Partner Developer APIs", "description": "Public APIs for partners embedding accounts, lending, payments, and servicing flows into their own products.", "users": ["Partner Developers", "Platform Integrators"], "availabilityHorizon": "live"}, {"type": "partner_api", "name": "Webhook and Event Network", "description": "Real-time event and webhook distribution for embedded-finance partners.", "users": ["Partner Platforms", "Operations Automation"], "availabilityHorizon": "live"}, {"type": "dashboard", "name": "Partner Performance and Revenue Dashboard", "description": "Dashboard for partner go-live velocity, adoption, revenue contribution, and operating health.", "users": ["Product Leadership", "Commercial Leadership", "Operations Leadership"], "availabilityHorizon": "live"}], "neededCapabilities": [{"capabilityCode": "poat", "capabilityName": "Partner Onboarding and Tenant Setup", "whyNeeded": "Needed to make new partner launches repeatable and governable.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "mtrc", "capabilityName": "Multi-tenant Runtime Controls", "whyNeeded": "Needed to isolate and manage many live partner programs safely.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "dpap", "capabilityName": "Developer Platform and Public APIs", "whyNeeded": "Needed to expose composable banking capabilities to partner engineering teams.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "waed", "capabilityName": "Webhook and Event Distribution", "whyNeeded": "Needed to support real-time partner integration patterns and event-driven operations.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "pohb", "capabilityName": "Partner Operations Hub", "whyNeeded": "Needed to handle partner exceptions, servicing workflows, and operational visibility centrally.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "rasc", "capabilityName": "Reconciliation and Settlement Controls", "whyNeeded": "Needed to keep money movement, balances, and commercial obligations aligned across parties.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "prap", "capabilityName": "Partner Revenue and Performance Analytics", "whyNeeded": "Needed to prioritize the partner portfolio based on revenue, margin, and operating performance.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "cpdr", "capabilityName": "Composable Product Domain Reuse", "whyNeeded": "Needed to assemble broader partner propositions from reusable product domains.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "pbap", "capabilityName": "Proposition Bundling and Packaging", "whyNeeded": "Needed to turn reusable banking modules into partner-ready offerings.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "saca", "capabilityName": "Security, Audit, Compliance, and Resilience", "whyNeeded": "Needed to preserve regulated trust as the partner ecosystem expands.", "mappingType": "curated_for_mambu"}, {"capabilityCode": "edav", "capabilityName": "Ecosystem Demand and Value Intelligence", "whyNeeded": "Needed to steer platform investment toward the most valuable ecosystem opportunities.", "mappingType": "curated_for_mambu"}]}]}};

    console.log(products);

    function update() {
        let html = '';

        products.portfolio.products.forEach(product => {
            html += '<a target="_blank" href="landing_pages/' + product.id + '.html" onerror="">';
            html += '<div class="doc" style="text-align: left">';
            html += '<table style="margin-bottom: 24px">';
            html += '<tr>';
            html += '<td style="padding-right: 20px">';
            html += '<div style="text-align: left">';
            html += '<img src="icons/' + product.icon + '" style="height: 100px; border: 1px solid lightgrey; border-radius: 50%; box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;" onerror="this.onerror=null;this.src=\'icons/product.png\'">';
            html += '</div>';
            html += '</td>';
            html += '<td>';
            product.primaryCustomers.forEach(customer => {
                html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px">';
                html += customer.name;
                html += '</div>';
            });
            html += '<div style="color: blue; margin-bottom: 2px; margin-top: 2px; font-size: 240%">' + product.name + '</div>';
            html += '</td>';
            html += '</tr>';
            html += '</table>';

            html += '<table style="text-align: center">';
            html += '<tr>';
            html += '<td style="max-width: 200px; vertical-align: bottom">';
            product.interfaces.forEach(interface => {
                html += '<div style="text-align: center; max-width: 200px; vertical-align: bottom; display: inline-block">';
                html += '<div style="border: 2px solid white; padding: 8px; margin: 5px; margin-bottom: 20px; color: black; display: inline-block">';
                interface.users.forEach(user => {
                    html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px; font-size: 80%">';
                    html += user;
                    html += '</div>';
                });
                html += '</div>';
                html += '<div style="text-align: center; max-width: 200px; vertical-align: top">';
                html += '<div style="border: 2px solid grey; padding: 8px; margin: 5px; vertical-align: top">';
                html += '<img src="icons/' + interface.type + '.png" style="height: 42px; margin: 0; margin-top: -28px; background-color: rgba(255,255,255,1)">';
                html += '<div style="color: blue; margin-bottom: 0px; height: 2em; margin-top: 0; color: grey; font-size: 80%">' + interface.type + '</div>';
                html += '<div style="color: blue; margin-bottom: 10px; height: 2em; margin-top: 0px">' + interface.name + '</div>';

                html += '</div>';
                html += '</div>';

            html += '</td>';
            html += '</tr>';

            html += '<tr>';
            html += '<td colspan="100" style="text-align: center; padding: 0">';
            html += '<div style="text-align: center; border: 3px solid grey; margin: 10px; padding: 10px; margin-top: -3px">';
            if (product.neededCapabilities) {
                product.neededCapabilities.forEach(capability => {
                    html += '<div style="display: inline-block; width: 200px; vertical-align: bottom; margin: 3px;">';
                    html += '<div style="text-align: left; border: 1px dashed grey; padding: 8px;">';
                    html += '<div style="color: blue; margin-bottom: 4px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 90%">' + capability.capabilityName + '</div>';
                    html += '<div style="color: grey; margin-bottom: 10px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 70%">' + capability.whyNeeded + '</div>';
                    html += '</div>';
                    html += '</div>';
                });
            }
            html += '</div>';
            html += '</td>';
            html += '</tr>';
            html += '</table>';


            html += '</div>';
        });

        document.getElementById('products').innerHTML = html;
    }

    update();
</script>
</body>
</html>
