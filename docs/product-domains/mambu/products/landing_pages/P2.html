<script>
    function addNavigation() {
        let html = '';
        html += '<div style="margin: 20px 20px 10px 20px; font-size: 85%; color: black">';
        all_products.forEach(per => {
            html += '<a href="' + per.id + '.html">';
            const tabClass = per.id === product.id ? 'tab-image-selected' : 'tab-image';
            html += '<img src="../icons/' + per.icon + '" style="" class="' + tabClass + '" onerror="this.onerror=null;this.src=\'../icons/product.png\'">';
            html += '</a>';
        });
        html += '</div>';

        document.getElementById('Navigation').innerHTML = html;
    }

    addNavigation();

    function addHeader() {
        let html = '';

        html += '<table>';
        html += '<tr>';
        html += '<td>';
        html += '<div>';
        html += '<img src="../icons/' + product.icon + '" style="width: 110px" onerror="this.onerror=null;this.src=\'../icons/product.png\'">';
        html += '</div>';
        html += '</td>';
        html += '<td style="vertical-align: top">';
        html += '<div style="margin-left: 20px; font-size: 90%; color: grey; vertical-align: top">';
        html += product.primaryCustomers.map(c => c.name).join(' | ');
        html += ' / <span style="color: blue; font-weight: bold;">' + product.id.toUpperCase() + '</span>';
        html += '</div>';
        html += '<div style="font-size: 50px; margin-left: 20px">';
        html += product.name;
        html += '</div>';
        html += '<div style="font-size: 16px; margin-left: 20px; color: grey; margin-top: 3px">';
        html += product.description ? product.description : '';
        html += '</div>';
        html += '</td>';
        html += '</tr>';
        html += '</table>';

        document.getElementById('Header').innerHTML = html;
    }

    function addHome() {
        let html = '';

        html += '<table style="text-align: center">';
        html += '<tr>';
        html += '<td style="max-width: 200px; vertical-align: bottom">';
        product.interfaces.forEach(interface => {
            html += '<div style="text-align: center; max-width: 200px; vertical-align: bottom; display: inline-block">';
            html += '<div style="border: 2px solid white; padding: 8px; margin: 5px; margin-bottom: 20px; color: black; display: inline-block">';
            interface.users.forEach(user => {
                html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px; font-size: 80%">';
                html += user;
                html += '</div>';
            });
            html += '</div>';
            html += '<div style="text-align: center; max-width: 200px; vertical-align: top">';
            html += '<div style="border: 2px solid grey; padding: 8px; margin: 5px; vertical-align: top">';
            html += '<img src="../icons/' + interface.type + '.png" style="height: 42px; margin: 0; margin-top: -28px; background-color: rgba(255,255,255,1)">';
            html += '<div style="color: blue; margin-bottom: 0px; height: 2em; margin-top: 0; color: grey; font-size: 80%">' + interface.type + '</div>';
            html += '<div style="color: blue; margin-bottom: 10px; height: 2em; margin-top: 0px">' + interface.name + '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';

        });
        html += '</td>';
        html += '</tr>';

        html += '<tr>';
        html += '<td colspan="100" style="text-align: center; padding: 0">';
        html += '<div style="text-align: center; border: 3px solid grey; margin: 10px; padding: 10px; margin-top: -3px">';
        if (product.neededCapabilities) {
            product.neededCapabilities.forEach(capability => {
                html += '<div style="display: inline-block; width: 200px; vertical-align: bottom; margin: 3px;">';
                html += '<div style="text-align: left; border: 1px dashed grey; padding: 8px;">';
                html += '<div style="color: blue; margin-bottom: 4px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 90%">' + capability.capabilityName + '</div>';
                html += '<div style="color: grey; margin-bottom: 10px; margin-top: 0px; text-align: center; font-size: 70%">' + capability.whyNeeded + '</div>';
                html += renderDeliveryPathsSummary(capability.deliveryPaths);
                html += '</div>';
                html += '</div>';
            });
        }
        html += '</div>';
        html += '</td>';
        html += '</tr>';
        html += '</table>';

        if (product.neededCapabilities && product.neededCapabilities.some(capability => (capability.deliveryPaths || []).length > 0)) {
            html += '<div class="group">';
            html += '<h2>Capability Delivery Paths</h2>';
            product.neededCapabilities.forEach(capability => {
                html += '<div style="border: 1px solid #d1d5db; border-radius: 12px; padding: 14px; margin-bottom: 16px; background: #fff;">';
                html += '<div style="font-size: 120%; color: #1d4ed8; font-weight: bold; margin-bottom: 6px;">' + escapeHtml(capability.capabilityName) + '</div>';
                html += '<div style="color: #6b7280; margin-bottom: 12px;">' + escapeHtml(capability.whyNeeded) + '</div>';
                html += renderDeliveryPathsDetailed(capability.deliveryPaths);
                html += '</div>';
            });
            html += '</div>';
        }


        html += '</div>';

        document.getElementById('Home').innerHTML = html;
    }

    function addJobs() {
        const jobs = product.jobsToBeDone || [];
        if (!jobs.length) {
            document.getElementById('Jobs').innerHTML = '<div class="group">No product jobs defined for this product yet.</div>';
            return;
        }

        let html = '';
        jobs.forEach(job => {
            html += '<div class="group">';
            html += '<div style="font-size: 170%; color: #1d4ed8; margin-bottom: 10px;">' + escapeHtml(job.name) + '</div>';
            if (job.what_it_is) {
                html += '<div style="margin-bottom: 10px;"><b>What it is:</b> ' + escapeHtml(job.what_it_is) + '</div>';
            }
            if (job.outcome) {
                html += '<div style="margin-bottom: 16px;"><b>Outcome:</b> ' + escapeHtml(job.outcome) + '</div>';
            }
            (job.steps || []).forEach(step => {
                html += '<div class="step">';
                html += '<div style="font-size: 120%; color: #1d4ed8; margin-bottom: 8px;">' + escapeHtml(step.step) + '</div>';
                html += '<div style="font-size: 90%; margin-bottom: 10px;">' + escapeHtml(step.description || '') + '</div>';
                ((step.capabilitiesNeeded) || []).forEach(capability => {
                    html += '<div style="margin-top: 8px; padding: 8px; background: #f8fafc; border: 1px solid #d1d5db; border-radius: 8px;">';
                    html += '<div><b>' + escapeHtml(capability.name) + '</b> <span class="activity-muted">(#' + escapeHtml(capability.id) + ')</span></div>';
                    html += '<div class="activity-muted">' + escapeHtml(capability.how_it_supports || '') + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            });
            html += '</div>';
        });

        document.getElementById('Jobs').innerHTML = html;
    }

    function addKPIChild(child, color) {
        let html = '';
        html += '<div class="kpi" style="background-color: ' + color + '">';
        html += '<div style="font-size: 100%; padding: 4px">';
        html += escapeHtml(child.name || '');
        html += '</div>';
        html += '<div style="background-color: white; font-size: 80%; padding: 2px">';
        html += escapeHtml(child.description || '');
        html += '</div>';
        html += '</div>';

        if (child.children && child.children.length) {
            html += '<table style="width: 100%"><tr>';
            child.children.forEach(c => {
                html += '<td style="vertical-align: top;">';
                html += addKPIChild(c, color);
                html += '</td>';
            });
            html += '</tr></table>';
        }
        return html;
    }

    function addKPIPyramid(pyramid, color) {
        if (!pyramid || !pyramid.top || !(pyramid.branches || []).length) {
            return '<div class="group">No KPI pyramid defined.</div>';
        }

        let html = '';
        html += '<div style="text-align: center; vertical-align: top">';
        html += '<table style="vertical-align: top">';
        html += '<tr>';
        html += '<td colspan="' + pyramid.branches.length + '">';
        html += '<div class="kpi" style="background-color: ' + color + '">';
        html += '<div style="font-size: 120%; padding: 4px">' + escapeHtml(pyramid.top.name || '') + '</div>';
        html += '<div style="background-color: white; font-size: 80%; padding: 2px">' + escapeHtml(pyramid.top.description || '') + '</div>';
        html += '</div>';
        html += '</td>';
        html += '</tr>';
        html += '<tr>';
        pyramid.branches.forEach(c => {
            html += '<td style="vertical-align: top;">' + addKPIChild(c, color) + '</td>';
        });
        html += '</tr>';
        html += '</table>';
        html += '</div>';
        return html;
    }

    function addKPIs() {
        if (!product.kpiPyramids || !product.kpiPyramids.customerOutcomes || !product.kpiPyramids.businessOutcomes) {
            document.getElementById('KPI').innerHTML = '<div class="group">No KPI pyramid defined for this product yet.</div>';
            return;
        }

        let html = '';
        html += '<div class="group">';
        html += '<div style="text-align: left; font-size: 150%; color: blue; margin-bottom: 12px">Customer Outcomes</div>';
        html += addKPIPyramid(product.kpiPyramids.customerOutcomes, '#C0F3EA');
        html += '</div>';
        html += '<div class="group">';
        html += '<div style="text-align: left; font-size: 150%; color: blue; margin-bottom: 12px">Business Outcomes</div>';
        html += addKPIPyramid(product.kpiPyramids.businessOutcomes, '#B7BDF7');
        html += '</div>';
        document.getElementById('KPI').innerHTML = html;
    }

    function normalizeRoadmapKpi(value, supportingKey) {
        if (!value) {
            return {northStar: '', [supportingKey]: []};
        }
        if (typeof value === 'string') {
            return {northStar: value, [supportingKey]: []};
        }
        const normalized = Object.assign({}, value);
        normalized.northStar = normalized.northStar || normalized.name || '';
        normalized[supportingKey] = normalized[supportingKey] || [];
        return normalized;
    }

    function addProductVision() {
        if (!product.productStrategy || !product.productStrategy.timeHorizons) {
            document.getElementById('Roadmap').innerHTML = '<div class="group">No product vision defined for this product yet.</div>';
            return;
        }

        const strategy = product.productStrategy;
        const timeHorizon1 = strategy.timeHorizons['1_year'];
        const timeHorizon2 = strategy.timeHorizons['3_year'];
        const timeHorizon3 = strategy.timeHorizons['5_year'];
        const businessKpi1 = normalizeRoadmapKpi(timeHorizon1.businessKPI, 'revenueStreams');
        const businessKpi2 = normalizeRoadmapKpi(timeHorizon2.businessKPI, 'revenueStreams');
        const businessKpi3 = normalizeRoadmapKpi(timeHorizon3.businessKPI, 'revenueStreams');
        const customerKpi1 = normalizeRoadmapKpi(timeHorizon1.customerKPI, 'supporting');
        const customerKpi2 = normalizeRoadmapKpi(timeHorizon2.customerKPI, 'supporting');
        const customerKpi3 = normalizeRoadmapKpi(timeHorizon3.customerKPI, 'supporting');

        let html = '';
        html += '<div class="group">';
        html += '<table>';
        html += '<tr style="font-size: 80%; color: #a0a0a0">';
        html += '<td></td><td style="padding-left: 16px">Year 1</td><td style="padding-left: 16px">Year 3</td><td style="padding-left: 16px">Year 5</td><td style="padding-left: 16px"></td>';
        html += '<td rowspan="10" style="width: 280px; vertical-align: top; padding: 20px">';
        html += '<div style="font-size: 120%; margin-bottom: 24px">VISION</div>';
        html += '<div style="font-size: 140%">' + escapeHtml(strategy.vision || '') + '</div>';
        html += '</td>';
        html += '</tr>';
        html += '<tr>';
        [timeHorizon1, timeHorizon2, timeHorizon3].forEach((h, index) => {
            html += '<td' + (index === 0 ? '' : ' style="display:none"') + '></td>';
            html += '<td style="padding: 6px; width: 250px; border-left: 2px solid grey; vertical-align: top">';
            html += '<div style="padding: 6px; width: 250px">' + escapeHtml(h.productTheme || '') + '</div>';
            html += '<div style="padding: 10px; font-size: 80%">' + escapeHtml(h.focus || '') + '</div>';
            html += '</td>';
        });
        html += '<td style="padding: 10px"></td>';
        html += '</tr>';
        html += '<tr><td></td><td style="height: 40px; background-color: black; color: #f0f0f0; padding: 20px">Milestone 1 (Year 1)</td><td style="height: 40px; background-color: black; color: #f0f0f0; padding: 20px">Milestone 2 (Year 3)</td><td style="height: 40px; background-color: black; color: #f0f0f0; padding: 20px">Milestone 3 (Year 5)</td><td></td></tr>';
        html += '<tr><td>Business<br>KPI</td>';
        [businessKpi1, businessKpi2, businessKpi3].forEach(kpi => {
            html += '<td style="padding: 6px; width: 250px; border-left: 2px solid grey; vertical-align: top">';
            html += '<div style="padding: 6px; width: 250px">' + escapeHtml(kpi.northStar || '') + '</div>';
            html += '<div style="padding: 6px; width: 250px; font-size: 80%">';
            (kpi.revenueStreams || []).forEach(stream => {
                html += '<div style="margin-top: 2px; margin-bottom: 2px; padding: 2px; border: 1px solid lightgrey; border-radius: 7px">' + escapeHtml(stream) + '</div>';
            });
            html += '</div></td>';
        });
        html += '<td></td></tr>';
        html += '<tr><td>Customer<br>KPI</td>';
        [customerKpi1, customerKpi2, customerKpi3].forEach(kpi => {
            html += '<td style="padding: 6px; width: 250px; border-left: 2px solid grey; vertical-align: top">';
            html += '<div style="padding: 6px; width: 250px">' + escapeHtml(kpi.northStar || '') + '</div>';
            html += '<div style="padding: 6px; width: 250px; font-size: 80%">';
            (kpi.supporting || []).forEach(item => {
                html += '<div style="margin-top: 2px; margin-bottom: 2px; padding: 2px; border: 1px solid lightgrey; border-radius: 7px">' + escapeHtml(item) + '</div>';
            });
            html += '</div></td>';
        });
        html += '<td></td></tr>';
        html += '</table></div>';
        document.getElementById('Roadmap').innerHTML = html;
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderDeliveryPathsSummary(deliveryPaths) {
        if (!deliveryPaths || !deliveryPaths.length) {
            return '<div style="font-size: 70%; color: grey; text-align: center;">No delivery paths defined</div>';
        }

        let html = '';
        html += '<div style="margin-top: 8px; border-top: 1px solid #e5e7eb; padding-top: 8px;">';
        html += '<div style="font-size: 70%; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; margin-bottom: 6px;">Delivery Paths</div>';
        deliveryPaths.forEach(path => {
            html += '<div style="text-align: left; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px; margin-bottom: 6px; background: #f9fafb;">';
            html += '<div style="font-size: 75%; color: #1d4ed8; font-weight: bold;">' + escapeHtml(path.pathName) + '</div>';
            html += '<div style="font-size: 68%; color: #374151; margin-top: 3px;"><b>Part:</b> ' + escapeHtml(path.part) + '</div>';
            html += '<div style="font-size: 68%; color: #374151;"><b>Target:</b> ' + escapeHtml(path.target) + '</div>';
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderDeliveryPathsDetailed(deliveryPaths) {
        if (!deliveryPaths || !deliveryPaths.length) {
            return '<div class="activity-muted">No delivery paths defined.</div>';
        }

        let html = '';
        deliveryPaths.forEach(path => {
            html += '<div style="border-top: 1px solid #e5e7eb; padding: 10px 0;">';
            html += '<div style="font-weight: bold; color: #111827;">' + escapeHtml(path.pathName) + ' <span class="activity-muted">(' + escapeHtml(path.pathId) + ')</span></div>';
            html += '<div style="margin-top: 4px;"><b>Part:</b> ' + escapeHtml(path.part) + '</div>';
            html += '<div><b>Deployment unit:</b> ' + escapeHtml(path.deploymentUnit) + '</div>';
            html += '<div><b>Pipeline:</b> ' + escapeHtml(path.pipeline) + '</div>';
            html += '<div><b>Target:</b> ' + escapeHtml(path.target) + '</div>';
            html += '<div><b>Supports interfaces:</b> ' + escapeHtml((path.supportsInterfaces || []).join(', ')) + '</div>';
            html += '</div>';
        });
        return html;
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function renderKpis(items) {
        let html = '';
        items.forEach(item => {
            html += '<div><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span class="activity-muted">(' + escapeHtml(item.unit) + ')</span>';
            }
            if (item.expectedImpact) {
                html += ': ' + escapeHtml(item.expectedImpact);
            }
            if (item.description) {
                html += '<div class="activity-muted">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function renderImpactCell(item) {
        let html = '';
        (item.customerImpact || []).forEach(impact => {
            html += '<div class="activity-block">';
            html += '<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">';
            html += '<img class="activity-icon activity-icon-round" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div><div style="font-weight:bold;">' + escapeHtml(impact.customer.name) + ' <span class="activity-muted">(' + escapeHtml(impact.customerId) + ')</span></div></div>';
            html += '</div>';
            html += renderKpis(impact.customerKPIs || []);
            html += renderKpis(impact.businessKPIs || []);
            html += '</div>';
        });
        return html || '<span class="activity-muted">No customer impact listed</span>';
    }

    function renderBrickCell(item) {
        let html = '';
        (item.productBricks || []).forEach(brick => {
            html += '<div class="activity-pill">';
            html += '<img class="activity-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'">';
            html += '<div><div><b>' + escapeHtml(brick.brick.name) + '</b> <span class="activity-muted">(#' + escapeHtml(brick.brickId) + ')</span></div><div class="activity-muted">' + escapeHtml(brick.change) + '</div></div>';
            html += '</div>';
        });
        return html || '<span class="activity-muted">No product bricks listed</span>';
    }

    function renderChannelCell(item, currentProductId) {
        let html = '';
        (item.deliveryChannels || []).forEach(channel => {
            const isCurrent = channel.channel && channel.channel.productId === currentProductId;
            html += '<div class="activity-pill' + (isCurrent ? ' activity-pill-highlight' : '') + '">';
            html += '<img class="activity-icon" src="../icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../icons/product.png\'">';
            html += '<div><div><b style="color:' + (isCurrent ? '#1d4ed8' : '#111827') + '">' + escapeHtml(channel.channel.name) + '</b> <span class="activity-muted">(' + escapeHtml(channel.channelId) + ')</span></div><div class="activity-muted">' + escapeHtml(channel.change) + '</div></div>';
            html += '</div>';
        });
        return html || '<span class="activity-muted">No delivery channels listed</span>';
    }

    function renderActivityTable(data, kind, currentProductId) {
        const items = (data && data.items) ? data.items : [];
        let html = '';
        html += '<div class="activity-summary">';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.length + '</div><div class="activity-stat-label">' + kind + '</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.deliveryChannels || []).length > 0).length + '</div><div class="activity-stat-label">With channels</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.productBricks || []).length > 0).length + '</div><div class="activity-stat-label">With bricks</div></div>';
        html += '</div>';

        if (!items.length) {
            html += '<div class="group" style="margin-top:0">No related ' + kind.toLowerCase() + ' found for this product.</div>';
            return html;
        }

        html += '<table class="activity-table">';
        html += '<tr><th>Date</th><th>Description</th><th>Customer Impact</th><th>Product Bricks</th><th>Delivery Channels</th></tr>';
        items.forEach(item => {
            html += '<tr>';
            html += '<td style="white-space:nowrap">' + escapeHtml(formatDate(item.date)) + '</td>';
            html += '<td><a class="activity-link" target="_blank" rel="noopener noreferrer" href="../../' + kind.toLowerCase() + '/landing_pages/' + item.landingPageIndex + '.html">' + escapeHtml(item.description || kind) + '</a></td>';
            html += '<td>' + renderImpactCell(item) + '</td>';
            html += '<td>' + renderBrickCell(item) + '</td>';
            html += '<td>' + renderChannelCell(item, currentProductId) + '</td>';
            html += '</tr>';
        });
        html += '</table>';
        return html;
    }

    addHeader();
    addHome();
    addJobs();
    addKPIs();
    addProductVision();
    document.getElementById('Initiatives').innerHTML = renderActivityTable(initiatives, 'Initiatives', product.id);
    document.getElementById('Releases').innerHTML = renderActivityTable(releases, 'Releases', product.id);

</script>

</body>
</html>
