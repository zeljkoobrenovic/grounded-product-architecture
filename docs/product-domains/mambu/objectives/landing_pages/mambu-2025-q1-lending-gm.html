<!DOCTYPE html>

    <style>

            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;

        .meta {

        .section {

        .section-title {

        .objective {

        .metric {

        }

        .metric-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
        }

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 4px;

        .metric-description {

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }

        .key-result {
            margin-bottom: 14px;
            padding: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background-color: #fafafa;
        }

        .key-result-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .subsection {
            margin-top: 12px;
        }

        .subsection-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>

        <td>
            <div class="eyebrow" id="Eyebrow"></div>

            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div style="margin-left: 12px">
    <div class="tab">
        <button class="tablinks active" id="tab_HomeTab" onclick="openTab('HomeTab')">Home</button>
        <button class="tablinks" id="tab_InitiativesTab" onclick="openTab('InitiativesTab')">Initiatives</button>
        <button class="tablinks" id="tab_DiscoveriesTab" onclick="openTab('DiscoveriesTab')">Discoveries</button>
        <button class="tablinks" id="tab_ReleasesTab" onclick="openTab('ReleasesTab')">Releases</button>
    </div>

    <div id="HomeTab" class="tabcontent" style="display: block;"></div>
    <div id="InitiativesTab" class="tabcontent"></div>
    <div id="DiscoveriesTab" class="tabcontent"></div>
    <div id="ReleasesTab" class="tabcontent"></div>
</div>

<script>
    const pageData = {"id": "mambu-2025-q1-lending-gm", "title": "2025-Q1 General Manager of Digital Lending outcome goal", "objective": "Improve Lending Product Launch Velocity for General Manager of Digital Lending by advancing rapid launch capability with servicing control through configurable lending products, partner connectivity, and automated servicing basics.", "okrStyle": "objective-and-key-results", "status": "archived", "period": {"quarter": "2025-Q1", "startDate": "2025-01-01", "endDate": "2025-03-31", "type": "archive"}, "linkedCustomers": [{"customerId": "lending_gm", "customerName": "General Manager of Digital Lending", "customerGroup": "Lenders and Consumer Finance Providers"}], "linkedCustomerKPIs": [{"customerId": "lending_gm", "customerName": "General Manager of Digital Lending", "kpiId": "cust_launch_velocity", "kpiName": "Lending Product Launch Velocity", "description": "Speed at which new lending products or variants can be launched and iterated.", "unit": "launches/quarter", "kind": "customer", "targetDirection": "increase"}, {"customerId": "lending_gm", "customerName": "General Manager of Digital Lending", "kpiId": "branch_growth_quality", "kpiName": "Growth Quality", "description": "", "unit": "", "kind": "customer", "targetDirection": "increase"}], "linkedBusinessKPIs": [{"customerId": "lending_gm", "customerName": "General Manager of Digital Lending", "kpiId": "biz_portfolio_margin", "kpiName": "Portfolio Contribution Margin", "description": "Margin created by the lending portfolio after servicing and collections costs.", "unit": "EUR", "kind": "business", "targetDirection": "increase"}], "keyResults": [{"id": "kr-1", "metric": "Lending Product Launch Velocity", "kind": "customer", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Increase Lending Product Launch Velocity during the quarter.", "executingTeams": [{"teamId": "lending-originat gTeams": [{"teamId": "risk-finance-platform-reusable-templates", "teamName": "Risk, Finance & Expansion Platform - Reusable Templates", "role": "supporting", "intent": "Support the KR by contributing capability for growth Quality, aligned with its focus on provide regulatory reporting, accounting, tenant governance, and adjacent-product expansion capabilities. This team specifically focuses on reusable templates via Reusable Product Templates and Composable Product Domain Reuse."}, {"teamId": "lending-origination-servicing-loan-servicing", "teamName": "Lending Origination & Servicing - Loan Servicing", "role": "supporting", "intent": "Support the KR by contributing capability for growth Quality, aligned with its focus on own loan product configuration, origination workflows, servicing, and credit policy execution. This team specifically focuses on loan servicing via Loan Product and Servicing Engine and Servicing Operations Workspace."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "This KR should be pursued as an outcome target with room for discovery, iteration, and tradeoff."}, {"id": "kr-3", "metric": "Portfolio Contribution Margin", "kind": "business", "targetDirection": "increase", "target": "Improve quarter over quarter", "baseline": "Baseline to be confirmed from quarterly reporting", "statement": "Increase Portfolio Contribution Margin during the quarter.", "executingTeams": [{"teamId": "lending-origination-servicing-origination-decisioning", "teamName": "Lending Origination & Servicing - Origination Decisioning", "role": "executing", "intent": "Lead the work to improve portfolio Contribution Margin via Origination and Decisioning Workflow and Portfolio Analytics and Cohort Reporting."}], "supportingTeams": [{"teamId": "risk-finance-platform-reusable-templates", "teamName": "Risk, Finance & Expansion Platform - Reusable Templates", "role": "supporting", "intent": "Support the KR by contributing capability for portfolio Contribution Margin, aligned with its focus on provide regulatory reporting, accounting, tenant governance, and adjacent-product expansion capabilities. This team specifically focuses on reusable templates via Reusable Product Templates and Composable Product Domain Reuse."}, {"teamId": "lending-origination-servicing-partner-channel-integration", "teamName": "Lending Origination & Servicing - Partner Channel Integration", "role": "supporting", "intent": "Support the KR by contributing capability for portfolio Contribution Margin, aligned with its focus on own loan product configuration, origination workflows, servicing, and credit policy execution. This team specifically focuses on partner channel integration via Partner and Channel Integration Layer."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "This KR should be pursued as an outcome target with room for discovery, iteration, and tradeoff."}], "linkedInitiatives": [], "linkedReleases": [], "sourceReferences": {"customers": "customers/customers.json", "initiatives": "delivery/initiatives.json", "releases": "delivery/releases.json"}, "objectiveRole": "source_objective_for_company_okrs", "companyObjectiveIds": ["obj-leverage", "obj-operations"], "inspiredByInsights": [{"insightId": "discovery-mambu-2026-03-13-02-digital-lending-operating-laye", "insightTitle": "Digital Lending Operating Layer: General Manager of Digital Lending discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's operations tradeoffs.", "landingPageIndex": 1}, {"insightId": "discovery-mambu-2025-04-15-02-digital-lending-operating-laye", "insightTitle": "Digital Lending Operating Layer: General Manager of Digital Lending validated discovery", "status": "archived", "howItInspiresObjective": "Provides evidence and product context for the objective's operations tradeoffs.", "landingPageIndex": 4}, {"insightId": "discovery-mambu-2026-03-13-03-embedded-finance-partner-platf", "insightTitle": "Embedded Finance Partner Platform: VP Product for Embedded Finance and BaaS discovery", "status": "ongoing", "howItInspiresObjective": "Provides evidence and product context for the objective's leverage tradeoffs.", "landingPageIndex": 0}], "landingPageId": "mambu-2025-q1-lending-gm", "companyObjectiveRefs": [{"id": "obj-leverage", "title": "Archive Turn product progress into economic leverage", "landingPageId": "archive-obj-leverage"}, {"id": "obj-operations", "title": "Archive Make execution reliably repeatable", "landingPageId": "archive-obj-operations"}]};
    const pageKind = 'source-objective';
    const domainName = 'Mambu';

    function initTab() {
        if (window.location.hash) {
            const tabName = window.location.hash.substring(1);
            if (document.getElementById(tabName)) {
                openTab(tabName);
            }
        }
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) {
            return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        }
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        const title = metric.kpiName || metric.metric || '';
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(title) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderExecutionItem(item, typeName) {
        const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
            ? (typeName === 'initiative'
                ? '../../initiatives/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '../../releases/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html')
            : '';
        let html = '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(target, item.description || item.id, 'list-title') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(item.date || '') + '</div>';
        if (item.customerIds && item.customerIds.length) {
            html += '<div class="list-description">Customers: ' + escapeHtml(item.customerIds.join(', ')) + '</div>';
        }
        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="list-description">Channels: ' + escapeHtml(item.deliveryChannels.join(', ')) + '</div>';
        }
        if (item.productBricks && item.productBricks.length) {
            html += '<div class="list-description">Bricks: ' + escapeHtml(item.productBricks.join(', ')) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderEmptyState(message) {
        return '<div class="list-row"><div class="list-description">' + escapeHtml(message) + '</div></div>';
    }

    function renderTeams(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.teamName || item.teamId) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.role || '') + '</div>';
            if (item.intent) {
                html += '<div class="list-description">' + escapeHtml(item.intent) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderInsights(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.insightTitle || item.title) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function sameInsightSet(a, b) {
        const aIds = (a || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        const bIds = (b || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        return aIds && bIds && aIds === bIds;
    }

    function renderKeyResult(item, options) {
        let html = '<div class="key-result">';
        html += '<div class="key-result-title">' + escapeHtml(item.metric) + '</div>';
        html += '<div>' + escapeHtml(item.statement || '') + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(item.targetDirection || '') + (item.target ? ' | ' + escapeHtml(item.target) : '') + (item.commitmentLabel ? ' | ' + escapeHtml(item.commitmentLabel) : '') + '</div>';
        if (item.baseline) {
            html += '<div class="list-description">Baseline: ' + escapeHtml(item.baseline) + '</div>';
        }
        if (item.commitmentRationale) {
            html += '<div class="list-description">Commitment: ' + escapeHtml(item.commitmentRationale) + '</div>';
        }
        html += renderTeams('Executing Teams', item.executingTeams || [], true);
        html += renderTeams('Supporting Teams', item.supportingTeams || [], true);
        html += '</div>';
        return html;
    }

    function renderSourceObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.objective || '') + '</div></div>';

        if (page.companyObjectiveRefs && page.companyObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Mapped Company Objectives</div>';
            page.companyObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(item.id) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.linkedCustomers && page.linkedCustomers.length) {
            html += '<div class="section"><div class="section-title">Linked Customers</div>';
            page.linkedCustomers.forEach(customer => {
                html += '<div class="pill"><div><div class="pill-name">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.keyResults && page.keyResults.length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            page.keyResults.forEach(item => {
                html += renderKeyResult(item, {showObjective: true, showSource: false});
            });
            html += '</div>';
        }

        if ((page.linkedCustomerKPIs && page.linkedCustomerKPIs.length) || (page.linkedBusinessKPIs && page.linkedBusinessKPIs.length)) {
            html += '<div class="section"><div class="section-title">Linked KPIs</div>';
            (page.linkedCustomerKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            (page.linkedBusinessKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            html += '</div>';
        }

        if (page.sourceReferences) {
            html += '<div class="section"><div class="section-title">Source References</div>';
            Object.keys(page.sourceReferences).forEach(key => {
                if (page.sourceReferences[key]) {
                    html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(key) + '</div><div class="pill-meta">' + escapeHtml(page.sourceReferences[key]) + '</div></div></div>';
                }
            });
            html += '</div>';
        }
        return html;
    }

    function renderCompanyObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.statement || '') + '</div></div>';

        if (page.okrDesignNotes) {
            html += '<div class="section"><div class="section-title">Design Notes</div><div class="list-row"><div class="list-description">' + escapeHtml(page.okrDesignNotes) + '</div></div></div>';
        }

        if (page.sourceObjectiveRefs && page.sourceObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Source Objectives</div>';
            page.sourceObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' +
                    escapeHtml(String(item.keyResultsCount || 0) + ' key results') +
                    ((item.quarter ? ' | ' + escapeHtml(item.quarter) : '')) +
                    '</div></div></div>';
            });
            html += '</div>';
        }
        return html;
    }

    function renderActivityTab(items, typeName, emptyMessage) {
        if (!items || !items.length) {
            return renderEmptyState(emptyMessage);
        }
        let html = '';
        items.forEach(item => {
            html += renderExecutionItem(item, typeName);
        });
        return html;
    }

    function renderDiscoveriesTab(page, kind) {
        const items = page.inspiredByInsights || [];
        if (!items.length) {
            return renderEmptyState('No discoveries linked to this objective.');
        }
        let html = '';
        items.forEach(item => {
            const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '';
            html += '<div class="list-row">';
            html += '<div class="list-title">' + linkOf(target, item.insightTitle || item.title || item.id, 'list-title') + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || item.kind || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Eyebrow').innerHTML = escapeHtml(pageKind === 'company-objective' ? 'Company Objective' : 'Source Objective');
    document.getElementById('Title').innerHTML = escapeHtml(pageData.title || 'Objective');
    const metaBits = [escapeHtml(domainName)];
    if (pageData.status) {
        metaBits.push(escapeHtml(pageData.status));
    }
    if (pageData.period && pageData.period.quarter) {
        metaBits.push(escapeHtml(pageData.period.quarter));
    }
    document.getElementById('Meta').innerHTML = metaBits.join(' | ');

    document.getElementById('HomeTab').innerHTML = pageKind === 'company-objective'
        ? renderCompanyObjectiveHome(pageData)
        : renderSourceObjectiveHome(pageData);
    document.getElementById('InitiativesTab').innerHTML = renderActivityTab(
        pageData.linkedInitiatives || [],
        'initiative',
        'No initiatives linked to this objective.'
    );
    document.getElementById('DiscoveriesTab').innerHTML = renderDiscoveriesTab(pageData, pageKind);
    document.getElementById('ReleasesTab').innerHTML = renderActivityTab(
        pageData.linkedReleases || [],
        'release',
        'No releases linked to this objective.'
    );
    initTab();
</script>
</body>
</html>
