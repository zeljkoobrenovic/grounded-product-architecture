    <style>

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

nd administrative controls required by Audience management layer.", "type": "operations"}, {"title": "Reporting and Exception Handling", "description": "Supports visibility, diagnostics, and manual handling of exceptions in Audience management layer.", "type": "analytics"}], "interfaces": [{"title": "Service API", "description": "API surface for interacting with the business capabilities implemented by Audience management layer.", "type": "api"}, {"title": "Operations Workspace", "description": "User interface for administration and operational control of Audience management layer.", "type": "ui"}, {"title": "Domain Event Feed", "description": "Event interface that publishes notable business changes from Audience management layer.", "type": "event"}], "dataDependencies": [{"assetId": "audience-management-layer", "role": "own", "description": "Acts as the primary owning brick for Audience Management Layer.", "storeIds": ["audience-management-layer-db"]}, {"assetId": "unified-revenue-data-model", "role": "read", "description": "Reads Unified Revenue Data Model to support domain workflows.", "storeIds": ["unified-revenue-data-model-db"]}], "brickDependencies": [{"targetBrickId": "iaam", "type": "identity", "interface": "Authentication API", "description": "Depends on Identity and account matching to provide identity capabilities required by Audience management layer."}, {"targetBrickId": "otbi", "type": "event-routing", "interface": "Outbound Event Feed", "description": "Depends on Order-to-booking integration to provide integration capabilities required by Audience management layer."}, {"targetBrickId": "fasp", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Forecasting and scenario planning to provide analytics capabilities required by Audience management layer."}], "externalSystemsThisBrickDependsOn": [{"system": "Back-Office Systems", "type": "back-office", "interface": "Service API", "description": "Audience management layer exchanges operational state and business records with external back-office systems."}, {"system": "Notification and Communication Platforms", "type": "communication", "interface": "Messaging API", "description": "Audience management layer uses external communication channels to notify users, operators, or partners."}], "externalSystemsDependingOnThisBrick": [{"system": "Business Workflows", "type": "service-consumer", "interface": "Service API", "description": "Upstream business workflows depend on Audience management layer for core domain capabilities and state transitions."}, {"system": "Operations and Support Teams", "type": "operations-consumer", "interface": "Operations Workspace / Events", "description": "Operations consumers depend on Audience management layer for administration, visibility, and exception resolution."}], "icon": "amla.png"}}, {"brickId": "cowo", "change": "Extended the brick with domain-specific workflow improvements.", "brick": {"id": "cowo", "name": "Campaign orchestration workflow", "type": "service", "description": "Coordinates content, channel timing, budget allocation, and approvals.", "links": [], "domain": "Revenue & Growth", "group": "Demand generation & qualification", "internalModules": [{"title": "Workflow and State Engine", "description": "Orchestrates the main lifecycle, state transitions, and task flow handled by Campaign orchestration workflow.", "type": "service"}, {"title": "Capacity and Exception Management", "description": "Manages inventory, reservations, workload, and exception handling inside Campaign orchestration workflow.", "type": "operations"}, {"title": "Operations Console Logic", "description": "Supports operator actions, escalations, and manual interventions required by Campaign orchestration workflow.", "type": "full-stack"}], "interfaces": [{"title": "Workflow API", "description": "API for starting, updating, or querying operational workflows managed by Campaign orchestration workflow.", "type": "api"}, {"title": "Operator Console", "description": "User interface for task handling, interventions, and operational control within Campaign orchestration workflow.", "type": "ui"}, {"title": "Lifecycle Status Events", "description": "Event stream exposing state changes and exceptions produced by Campaign orchestration workflow.", "type": "event"}], "dataDependencies": [{"assetId": "order-to-booking-integration", "role": "read", "description": "Reads Order To Booking Integration to support domain workflows.", "storeIds": ["order-to-booking-integration-db"]}, {"assetId": "transaction", "role": "read", "description": "Reads Transaction to support domain workflows.", "storeIds": ["transaction-db"]}], "brickDependencies": [{"targetBrickId": "rbre", "type": "decisioning", "interface": "Decision API", "description": "Depends on Rules-based routing engine to provide policy capabilities required by Campaign orchestration workflow."}, {"targetBrickId": "iaam", "type": "event-subscription", "interface": "Audit Event Stream", "description": "Depends on Identity and account matching to provide identity capabilities required by Campaign orchestration workflow."}, {"targetBrickId": "otbi", "type": "partner-connectivity", "interface": "Partner Connector Surface", "description": "Depends on Order-to-booking integration to provide integration capabilities required by Campaign orchestration workflow."}], "externalSystemsThisBrickDependsOn": [{"system": "ERP and Operational Systems", "type": "back-office", "interface": "Operational API", "description": "Campaign orchestration workflow coordinates execution with external ERP, servicing, or operations platforms."}, {"system": "CRM and Case Management Tools", "type": "workflow", "interface": "Case Interface", "description": "Campaign orchestration workflow exchanges tasks, statuses, or escalations with customer and operations tooling."}], "externalSystemsDependingOnThisBrick": [{"system": "Operator Workflows", "type": "workflow-consumer", "interface": "Workflow / Status API", "description": "Operational teams and services depend on Campaign orchestration workflow to coordinate task flow, status, and exception handling."}, {"system": "Customer and Partner Touchpoints", "type": "journey-consumer", "interface": "Lifecycle Event Interface", "description": "Customer and partner-facing journeys depend on Campaign orchestration workflow to advance fulfillment, servicing, or case progress."}], "icon": "cowo.png"}}], "deliveryChannels": [{"channelId": "p2-seller-workflow-workspace-web-workspace", "change": "Introduced workflow updates in Seller Workflow Workspace Web Workspace.", "channel": {"productId": "p2", "productName": "Seller Workflow Workspace", "name": "Seller Workflow Workspace Web Workspace", "type": "web", "icon": "web.png"}}], "teams": {"primaryTeamIds": ["marketing-and-brand-systems-audience-layer"], "supportingTeamIds": ["enterprise-data-office-enterprise-metric-layer"]}, "initiativeId": "initiative-internal-2025-08-21-archived-01", "discoveryIds": ["discovery-initiative-internal-2025-08-21-archived-01"], "discoveryLinks": [{"discoveryId": "discovery-initiative-internal-2025-08-21-archived-01", "discoveryName": "Demand Engine Control Tower: operating discovery", "status": "archived", "landingPageIndex": 8}], "priority": "p1", "keyResultId": "internal-2025-q3-cmmo/kr-marketing-sourced-pipel", "landingPageIndex": 8, "objectiveLandingPageUrl": ""};
    const domainName = 'Big Enterprise';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Big Enterprise Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Demand Engine Control Tower"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
