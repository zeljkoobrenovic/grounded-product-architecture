    const period = 'ktlo';

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function objectiveItems(data) {
        return data && (data.objectives || data.goals || []) || [];
    }

    function companyObjectiveItems(data) {
        return data && (data.companyObjectives || []) || [];
    }

    function statusColor(status) {
        const map = {
            'on-track': '#16a34a',
            'at-risk': '#d97706',
            'off-track': '#dc2626',
            'achieved': '#0284c7',
            'planned': '#6b7280'
        };
        return map[status] || '#6b7280';
    }

    function statusBadge(status) {
        if (!status) return '';
        return '<span class="kr-status" style="background-color:' + statusColor(status) + '">' + escapeHtml(status) + '</span>';
    }

    function confidenceColor(confidence) {
        const map = {
            'green': '#16a34a',
            'amber': '#d97706',
            'red': '#dc2626',
            'undefined': '#6b7280'
        };
        return map[confidence] || '#6b7280';
    }

    function confidenceChip(confidence) {
        if (!confidence) return '';
        return '<span class="confidence-chip" style="background-color:' + confidenceColor(confidence) + '">' + escapeHtml(confidence) + '</span>';
    }

    function renderTargetSummary(label, target) {
        if (!target) return '';
        let html = '<div class="key-result-target">';
        html += '<div class="key-result-target-label">' + escapeHtml(label) + '</div>';
        if (target.date) {
            html += '<div class="key-result-target-date">' + escapeHtml(target.date) + '</div>';
        }
        if (target.target) {
            html += '<div class="key-result-statement">' + escapeHtml(target.target) + '</div>';
        }
        html += confidenceChip(target.confidence);
        html += '</div>';
        return html;
    }

        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
