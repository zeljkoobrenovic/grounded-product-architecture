    <script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Technical Design Collaboration Platform Home"
    },
    {
      "label": "Business Scorecard"
    }

;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

<script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

<script>
    const data = {"company": {"name": "Technical Design Collaboration Software Company", "industry": "AI technical design collaboration software", "reporting_period": "2026-q2", "mission": "Help engineering organizations design, explain, and govern complex systems faster through diagrams, docs, and code-connected workflows.", "vision": "Compound durable recurring growth by becoming the default system for technical design knowledge, from first draft through enterprise governance and embedded delivery.", "strategic_themes": ["seat expansion in engineering organizations", "enterprise trust and governance", "code-connected workflow depth", "usage-based platform monetization"]}, "balanced_scorecard": {"owner": "chief executive officer", "review_frequency": "monthly", "status_scale": ["off_track", "at_risk", "on_track", "exceeding"], "perspectives": [{"name": "Financial", "purpose": "Grow recurring revenue across seat-based and usage-based products while improving unit economics.", "objectives": [{"id": "grow_profitable_recurring_revenue", "name": "Grow profitable recurring revenue", "description": "Expand engineering-team seat adoption and enterprise packaging while maintaining healthy SaaS margins.", "kpis": [{"id": "annual_recurring_revenue", "name": "Annual recurring revenue", "unit": "USD", "baseline": "$18m", "target": "$24m", "actual": "$21m", "status": "at_risk", "trend": "up"}, {"id": "arr_growth", "name": "ARR growth", "unit": "%", "baseline": "28%", "target": "35%", "actual": "31%", "status": "at_risk", "trend": "up"}, {"id": "gross_margin", "name": "Gross margin", "unit": "%", "baseline": "81%", "target": "85%", "actual": "83%", "status": "on_track", "trend": "up"}], "initiatives": [{"id": "enterprise_packaging_and_expansion", "name": "Enterprise packaging and expansion", "owner": "chief revenue officer", "due_date": "2026-06-30", "status": "in_progress"}]}, {"id": "grow_usage_based_platform_revenue", "name": "Grow usage-based platform revenue", "description": "Turn API and AI-assisted workflows into a meaningful second revenue stream without harming margin discipline.", "kpis": [{"id": "api_revenue_share", "name": "API and metered revenue share", "unit": "% of ARR", "baseline": "6%", "target": "12%", "actual": "9%", "status": "at_risk", "trend": "up"}, {"id": "ai_compute_margin", "name": "AI workflow gross margin", "unit": "%", "baseline": "49%", "target": "61%", "actual": "55%", "status": "at_risk", "trend": "up"}, {"id": "burn_multiple", "name": "Burn multiple", "unit": "ratio", "baseline": "1.9x", "target": "1.3x", "actual": "1.5x", "status": "at_risk", "trend": "down"}], "initiatives": [{"id": "metering_and_packaging_program", "name": "Metering and packaging program", "owner": "chief product officer", "due_date": "2026-06-28", "status": "in_progress"}]}]}, {"name": "Customer", "purpose": "Increase active usage, retention, and workflow depth inside engineering organizations.", "objectives": [{"id": "increase_retention_and_depth", "name": "Increase retention and workflow depth", "description": "Expand from single-diagram usage into recurring design-system and documentation workflows.", "kpis": [{"id": "net_revenue_retention", "name": "Net revenue retention", "unit": "%", "baseline": "108%", "target": "118%", "actual": "114%", "status": "on_track", "trend": "up"}, {"id": "weekly_active_paid_seats", "name": "Weekly active paid seats", "unit": "% of paid seats", "baseline": "61%", "target": "72%", "actual": "68%", "status": "at_risk", "trend": "up"}, {"id": "connected_workspace_rate", "name": "Paid workspaces with repo or enterprise integration connected", "unit": "%", "baseline": "24%", "target": "38%", "actual": "31%", "status": "at_risk", "trend": "up"}], "initiatives": [{"id": "review_and_sync_adoption_program", "name": "Review and sync adoption program", "owner": "chief customer officer", "due_date": "2026-06-30", "status": "in_progress"}]}]}]}};

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatLabel(value) {
        return String(value || '')
            .replaceAll('_', ' ')
            .replace(/\b\w/g, char => char.toUpperCase());
    }

    function formatMetricValue(value, unit) {
        if (value === undefined || value === null || value === '') return 'N/A';
        return String(value);
    }

    function slugify(value) {
        return String(value || '')
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '');
    }

    function perspectiveTabId(perspective) {
        return slugify(perspective.name || 'perspective');
    }

    function countObjectives(perspectives) {
        return perspectives.reduce((sum, perspective) => sum + ((perspective.objectives || []).length), 0);
    }

    function countKpis(perspectives) {
        return perspectives.reduce((sum, perspective) => {
            return sum + (perspective.objectives || []).reduce((inner, objective) => inner + ((objective.kpis || []).length), 0);
        }, 0);
    }

    function countInitiatives(perspectives) {
        return perspectives.reduce((sum, perspective) => {
            return sum + (perspective.objectives || []).reduce((inner, objective) => inner + ((objective.initiatives || []).length), 0);
        }, 0);
    }

    function countByStatus(perspectives) {
        const counts = {};
        perspectives.forEach(perspective => {
            (perspective.objectives || []).forEach(objective => {
                (objective.kpis || []).forEach(kpi => {
                    const key = kpi.status || 'undefined';
                    counts[key] = (counts[key] || 0) + 1;
                });
            });
        });
        return counts;
    }

    function statusPill(status, showLabel = true) {
        if (!status) return '';
        const safe = slugify(status);
        return '<span class="status-pill status-' + safe + '">' + (showLabel ? escapeHtml(formatLabel(status)) : '&nbsp;') + '</span>';
    }

    function trendPill(trend) {
        if (!trend) return '';
        return '<span class="trend-pill">' + escapeHtml(formatLabel(trend)) + '</span>';
    }

    function renderHero() {
        const company = data.company || {};
        const scorecard = data.balanced_scorecard || {};
        const meta = [
            company.industry,
            company.reporting_period,
            scorecard.owner ? 'Owner: ' + scorecard.owner : '',
            scorecard.review_frequency ? 'Review: ' + formatLabel(scorecard.review_frequency) : ''
        ].filter(Boolean);

        let html = '<div class="hero-layout">';
        html += '<div><img class="hero-logo" src="icons/logo.png" alt="' + escapeHtml(company.name || 'Domain') + ' logo"></div>';
        html += '<div>';
        html += '<h1 class="hero-title">Business Scorecard</h1>';
        html += '<div class="hero-subtitle">' + escapeHtml(company.mission || company.vision || 'A balanced scorecard view across financial, customer, internal process, and learning outcomes.') + '</div>';
        html += '</div>';
        html += '</div>';
        document.getElementById('hero').innerHTML = html;
        document.title = (company.name ? company.name + ' ' : '') + 'Scorecard';
    }

    function renderSummary() {
        const company = data.company || {};
        const scorecard = data.balanced_scorecard || {};
        const perspectives = scorecard.perspectives || [];
        const statusCounts = countByStatus(perspectives);
        const summaryItems = [
            {
                label: 'Perspectives',
                value: perspectives.length,
                copy: 'The number of perspectives.'
            },
            {
                label: 'Objectives',
                value: countObjectives(perspectives),
                copy: 'Outcome statements tracked across all perspectives.'
            },
            {
                label: 'KPIs',
                value: countKpis(perspectives),
                copy: 'Metrics with baseline, target, and actual performance.'
            },
            {
                label: 'Initiatives',
                value: countInitiatives(perspectives),
                copy: 'Execution work tied directly to scorecard objectives.'
            },
            {
                label: 'On Track',
                value: statusCounts.on_track || 0,
                copy: escapeHtml(company.vision || 'Vision not defined.')
            }
        ];

        let html = '';
        summaryItems.forEach(item => {
            html += '<div class="" style="text-align: center; max-width: 120px; display: inline-block; margin-left: 10px; margin-right: 10px;">';
            html += '<div class="summary-value">' + escapeHtml(String(item.value)) + '</div>';
            html += '<div class="summary-label">' + escapeHtml(item.label) + '</div>';
            html += '</div>';
        });
        document.getElementById('summary-grid').innerHTML = html;
    }

    function renderThemes() {
        const company = data.company || {};
        const themes = company.strategic_themes || [];
        let html = '<div class="section-title">Strategic Themes</div>';
        html += '<div class="governance-copy">The scorecard links operational measures to company direction. Themes create the organizing spine for interpreting performance across perspectives.</div>';
        if (themes.length) {
            html += '<div class="theme-row">';
            themes.forEach(theme => {
                html += '<div class="theme-pill">' + escapeHtml(theme) + '</div>';
            });
            html += '</div>';
        } else {
            html += '<div class="empty">No strategic themes defined.</div>';
        }
        document.getElementById('themes-panel').innerHTML = html;
    }

    function renderGovernance() {
        const governance = data.governance || {};
        const scorecard = data.balanced_scorecard || {};
        let html = '<div class="section-title">Governance</div>';
        html += '<div class="governance-copy">Ownership, operating cadence, and source systems for maintaining scorecard integrity.</div>';
        html += '<div class="governance-list">';
        [
            ['Executive Sponsor', governance.executive_sponsor],
            ['Scorecard Manager', governance.scorecard_manager],
            ['Scorecard Owner', scorecard.owner],
            ['Review Frequency', formatLabel(scorecard.review_frequency)],
            ['Last Updated', governance.last_updated]
        ].forEach(entry => {
            if (!entry[1]) return;
            html += '<div class="governance-item"><div class="governance-key">' + escapeHtml(entry[0]) + '</div><div class="governance-value">' + escapeHtml(entry[1]) + '</div></div>';
        });
        html += '</div>';
        html += '<div class="block-title">Data Sources</div>';
        if ((governance.data_sources || []).length) {
            html += '<div class="source-row">';
            governance.data_sources.forEach(source => {
                html += '<div class="source-pill">' + escapeHtml(source) + '</div>';
            });
            html += '</div>';
        } else {
            html += '<div class="empty">No data sources defined.</div>';
        }
        document.getElementById('governance-panel').innerHTML = html;
    }

    function renderThresholds(thresholds) {
        if (!thresholds || !Object.keys(thresholds).length) return '';
        const parts = Object.entries(thresholds).map(([key, value]) => formatLabel(key) + ': ' + formatMetricValue(value));
        return '<div class="threshold-row"><strong>Thresholds:</strong> ' + escapeHtml(parts.join(' | ')) + '</div>';
    }

    function renderKpi(kpi) {
        let html = '<div class="kpi-item">';
        html += '<div class="kpi-topline">';
        html += '<div class="kpi-name">' + escapeHtml(kpi.name || kpi.id || 'KPI') + '</div>';
        html += '<div>' + statusPill(kpi.status) + ' ' + trendPill(kpi.trend) + '</div>';
        html += '</div>';
        html += '<div class="kpi-values">';
        [
            ['Baseline', formatMetricValue(kpi.baseline, kpi.unit)],
            ['Target', formatMetricValue(kpi.target, kpi.unit)],
            ['Actual', formatMetricValue(kpi.actual, kpi.unit)]
        ].forEach(item => {
            html += '<div class="kpi-value"><div class="kpi-value-label">' + escapeHtml(item[0]) + '</div><div class="kpi-value-number">' + escapeHtml(item[1]) + '</div></div>';
        });
        html += '</div>';
        html += '<div class="kpi-meta">';
        if (kpi.id) html += '<div>' + escapeHtml(kpi.id) + '</div>';
        if (kpi.unit) html += '<div>Unit: ' + escapeHtml(kpi.unit) + '</div>';
        html += '</div>';
        if (kpi.formula) {
            html += '<div class="formula-row"><strong>Formula:</strong> ' + escapeHtml(kpi.formula) + '</div>';
        }
        html += renderThresholds(kpi.thresholds);
        html += '</div>';
        return html;
    }

    function renderInitiative(initiative) {
        let html = '<div class="initiative-item">';
        html += '<div class="initiative-topline">';
        html += '<div class="initiative-name">' + escapeHtml(initiative.name || initiative.id || 'Initiative') + '</div>';
        html += '<div>' + statusPill(initiative.status) + '</div>';
        html += '</div>';
        html += '<div class="initiative-meta">';
        if (initiative.id) html += '<div>' + escapeHtml(initiative.id) + '</div>';
        if (initiative.owner) html += '<div>Owner: ' + escapeHtml(initiative.owner) + '</div>';
        if (initiative.due_date) html += '<div>Due: ' + escapeHtml(initiative.due_date) + '</div>';
        html += '</div>';
        html += '</div>';
        return html;
    }

    function renderKpiSummaryTable(perspectives) {
        const rows = [];
        perspectives.forEach(perspective => {
            (perspective.objectives || []).forEach(objective => {
                (objective.kpis || []).forEach(kpi => {
                    rows.push({perspective, objective, kpi});
                });
            });
        });

        if (!rows.length) {
            return '<div class="empty">No KPI summary available.</div>';
        }

        let html = '<div class="kpi-summary-wrap"><table class="kpi-summary-table">';
        html += '<thead><tr><th>KPI</th><th>Baseline</th><th>Target</th><th>Current</th></tr></thead><tbody>';
        rows.forEach(row => {
            const perspective = row.perspective;
            const objective = row.objective;
            const kpi = row.kpi;
            html += '<tr>';
            html += '<td class="kpi-summary-name" data-label="KPI">' + escapeHtml(kpi.name || kpi.id || 'KPI');
            html += '<div class="kpi-summary-objective">' + escapeHtml(perspective.name || 'Perspective') + '</div>';
            html += '<div class="kpi-summary-objective">' + escapeHtml(objective.name || objective.id || 'Objective') + '</div>';
            html += '</td>';
            html += '<td data-label="Baseline">' + escapeHtml(formatMetricValue(kpi.baseline, kpi.unit)) + '</td>';
            html += '<td data-label="Target">' + escapeHtml(formatMetricValue(kpi.target, kpi.unit)) + '</td>';
            html += '<td data-label="Current">' + escapeHtml(formatMetricValue(kpi.actual, kpi.unit)) + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div>';
        return html;
    }

    function renderHomeKpiTitleTable(perspective) {
        const objectives = perspective.objectives || [];
        const hasKpis = objectives.some(objective => (objective.kpis || []).length);

        if (!hasKpis) {
            return '<div class="empty">No KPIs defined for this perspective.</div>';
        }

        let html = '<div class="kpi-summary-wrap"><table class="kpi-summary-table kpi-summary-table-home">';
        html += '<thead><tr><th>KPI</th><th>Baseline</th><th>Target</th><th>Current</th><th>Trend</th></tr></thead><tbody>';
        objectives.forEach(objective => {
            if (!(objective.kpis || []).length) return;
            html += '<tr class="kpi-summary-objective-row">';
            html += '<td colspan="5">' + escapeHtml(objective.name || objective.id || 'Objective') + '</td>';
            html += '</tr>';
            (objective.kpis || []).forEach(kpi => {
                html += '<tr class="kpi-summary-title-row">';
                html += '<td colspan="5" data-label="KPI"><div class="kpi-summary-title-wrap"><span class="kpi-summary-name">' + escapeHtml(kpi.name || kpi.id || 'KPI') + '</span><span class="kpi-summary-pill-wrap">' + '</span></div></td>';
                html += '</tr>';
                html += '<tr>';
                html += '<td data-label="" style="text-align: right">' + statusPill(kpi.status, false) + '</td>';
                html += '<td data-label="Baseline"><div class="kpi-summary-value-number">' + escapeHtml(formatMetricValue(kpi.baseline, kpi.unit)) + '</div></td>';
                html += '<td data-label="Target"><div class="kpi-summary-value-number">' + escapeHtml(formatMetricValue(kpi.target, kpi.unit)) + '</div></td>';
                html += '<td data-label="Current"><div class="kpi-summary-value-number" style="color: black">' + escapeHtml(formatMetricValue(kpi.actual, kpi.unit)) + '</div></td>';
                html += '<td data-label="Trend">' + trendPill(kpi.trend) + '</td>';
                html += '</tr>';
            });
        });
        html += '</tbody></table></div>';
        return html;
    }

    function renderObjective(objective) {
        let html = '<div class="objective-card">';
        html += '<div class="objective-id">' + escapeHtml(objective.id || 'Objective') + '</div>';
        html += '<div class="objective-name">' + escapeHtml(objective.name || 'Untitled Objective') + '</div>';
        if (objective.description) {
            html += '<div class="objective-description">' + escapeHtml(objective.description) + '</div>';
        }

        html += '<div class="block-title">KPIs</div>';
        if ((objective.kpis || []).length) {
            html += '<div class="kpi-list">' + objective.kpis.map(renderKpi).join('') + '</div>';
        } else {
            html += '<div class="empty">No KPIs defined for this objective.</div>';
        }

        html += '<div class="block-title" style="margin-top:14px;">Initiatives</div>';
        if ((objective.initiatives || []).length) {
            html += '<div class="initiative-list">' + objective.initiatives.map(renderInitiative).join('') + '</div>';
        } else {
            html += '<div class="empty">No initiatives defined for this objective.</div>';
        }

        html += '</div>';
        return html;
    }

    function renderPerspective(perspective) {
        const nameSlug = slugify(perspective.name);
        const objectives = perspective.objectives || [];
        const kpiCount = objectives.reduce((sum, objective) => sum + ((objective.kpis || []).length), 0);
        let html = '<section class="perspective-card">';
        html += '<div class="perspective-header ' + escapeHtml(nameSlug) + '">';
        html += '<div class="perspective-name">' + escapeHtml(perspective.name || 'Perspective') + '</div>';
        if (perspective.purpose) {
            html += '<div class="perspective-purpose">' + escapeHtml(perspective.purpose) + '</div>';
        }
        html += '<div class="perspective-stats">';
        html += '<div class="perspective-stat">' + objectives.length + ' objectives</div>';
        html += '<div class="perspective-stat">' + kpiCount + ' KPIs</div>';
        html += '</div>';
        html += '</div>';
        html += '<div class="objective-list">';
        if (objectives.length) {
            html += objectives.map(renderObjective).join('');
        } else {
            html += '<div class="empty">No objectives defined for this perspective.</div>';
        }
        html += '</div>';
        html += '</section>';
        return html;
    }

    function renderObjectiveSummary(objective) {
        let html = '<div class="objective-summary-item">';
        html += '<div class="objective-summary-name">' + escapeHtml(objective.name || objective.id || 'Objective') + '</div>';
        if (objective.description) {
            html += '<div class="objective-summary-copy">' + escapeHtml(objective.description) + '</div>';
        }
        html += '<div class="objective-summary-meta">';
        html += '<div class="objective-summary-chip">' + (objective.kpis || []).length + ' KPIs</div>';
        html += '<div class="objective-summary-chip">' + (objective.initiatives || []).length + ' Initiatives</div>';
        html += '</div>';
        html += '</div>';
        return html;
    }

    function renderHomePerspectiveCard(perspective) {
        const objectives = perspective.objectives || [];
        const kpiCount = objectives.reduce((sum, objective) => sum + ((objective.kpis || []).length), 0);
        const nameSlug = slugify(perspective.name);
        let html = '<section class="home-perspective-card">';
        html += '<div class="perspective-header ' + escapeHtml(nameSlug) + '">';
        html += '<div class="perspective-name">' + escapeHtml(perspective.name || 'Perspective') + '</div>';
        if (perspective.purpose) {
            html += '<div class="perspective-purpose">' + escapeHtml(perspective.purpose) + '</div>';
        }
        html += '<div class="perspective-stats">';
        html += '<div class="perspective-stat">' + objectives.length + ' objectives</div>';
        html += '<div class="perspective-stat">' + kpiCount + ' KPIs</div>';
        html += '</div>';
        html += '</div>';
        html += '<div class="home-perspective-body">';
        if (objectives.length) {
            html += '<div class="block-title">Current KPIs</div>';
            html += '<div class="home-kpi-table">' + renderHomeKpiTitleTable(perspective) + '</div>';
        } else {
            html += '<div class="empty">No objectives defined for this perspective.</div>';
        }
        html += '</div></section>';
        return html;
    }

    function renderHomePerspectiveSummaries() {
        const perspectives = (data.balanced_scorecard || {}).perspectives || [];
        let html = '<div class="section-title"></div>';
        html += perspectives.length
            ? '<div class="home-perspectives-grid">' + perspectives.map(renderHomePerspectiveCard).join('') + '</div>'
            : '<div class="empty">No scorecard perspectives defined.</div>';
        document.getElementById('home-perspectives').innerHTML = html;
    }

    function renderTabNav() {
        const perspectives = (data.balanced_scorecard || {}).perspectives || [];
        let html = '<button class="tablinks active" id="tab_home" onclick="openTab(\'home\')">Home</button>';
        perspectives.forEach(perspective => {
            const tabId = perspectiveTabId(perspective);
            html += '<button class="tablinks" id="tab_' + tabId + '" onclick="openTab(\'' + tabId + '\')">' + escapeHtml(perspective.name || 'Perspective') + '</button>';
        });
        document.getElementById('tab-nav').innerHTML = html;
    }

    function renderPerspectiveTabs() {
        const perspectives = (data.balanced_scorecard || {}).perspectives || [];
        let html = '';
        perspectives.forEach(perspective => {
            html += '<div class="tabcontent" id="tab_content_' + perspectiveTabId(perspective) + '">';
            html += renderPerspective(perspective);
            html += '</div>';
        });
        document.getElementById('tab-panels').innerHTML = html;
    }

    renderHero();
    renderTabNav();
    renderSummary();
    renderThemes();
    renderGovernance();
    renderHomePerspectiveSummaries();
    renderPerspectiveTabs();
</script>
</body>
</html>
