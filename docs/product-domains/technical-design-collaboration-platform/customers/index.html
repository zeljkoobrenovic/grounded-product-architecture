    <script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

ps://eraser.io/", "publisher": "Eraser", "date": "2026-04-17"}, {"id": "eraser-docs", "title": "Eraser documentation", "url": "https://docs.eraser.io/", "publisher": "Eraser", "date": "2026-04-17"}]}, {"id": "tdcp-07", "title": "Embeds and cross-tool distribution matter because technical design work happens across many surfaces", "summary": "Engineering knowledge is consumed in wikis, pull requests, docs, and internal tools, so distribution quality affects retention.", "implication": "Include export, embed, and API-driven delivery bricks instead of modeling authoring only.", "priority": "medium", "tags": ["distribution", "embeds"], "sourceIds": ["eraser-docs"], "linkedCustomers": [{"customerId": "plat", "jobIds": ["stdz"], "kpis": ["Platform standard leverage"]}], "sources": [{"id": "eraser-docs", "title": "Eraser documentation", "url": "https://docs.eraser.io/", "publisher": "Eraser", "date": "2026-04-17"}]}, {"id": "tdcp-08", "title": "Reference libraries and standards programs are a credible expansion path in larger accounts", "summary": "Once teams start using technical diagrams, platform or architecture teams often try to standardize notation, templates, and review patterns.", "implication": "Model shared template and reference-library adoption as a strategic expansion vector.", "priority": "medium", "tags": ["standards", "expansion"], "sourceIds": ["eraser-home", "eraser-docs"], "linkedCustomers": [{"customerId": "plat", "jobIds": ["stdz"], "kpis": ["Reference reuse"]}], "sources": [{"id": "eraser-home", "title": "Eraser homepage", "url": "https://eraser.io/", "publisher": "Eraser", "date": "2026-04-17"}, {"id": "eraser-docs", "title": "Eraser documentation", "url": "https://docs.eraser.io/", "publisher": "Eraser", "date": "2026-04-17"}]}, {"id": "tdcp-09", "title": "Async review quality is a major product value lever for engineering managers", "summary": "The more design review can happen with context in-product, the less teams rely on calendar time and fragm     const customerCount = customers.reduce((total, group) => total + ((group.customers || []).length), 0);
    const insightCount = (insights.items || []).length;

    function updateTabLabels() {
        document.getElementById('tab_customers').textContent = 'Customers (' + customerCount + ')';
        document.getElementById('tab_insights').textContent = 'Insights (' + insightCount + ')';
    }

    function topCustomerKpi(customer) {
        return (((customer || {}).kpiPyramids || {}).customerOutcomes || {}).top || null;
    }

    function formatCurrentValue(kpi) {
        if (!kpi || !kpi.currentValue) {
            return '';
        }
        return String(kpi.currentValue) + (kpi.unit ? ' (' + String(kpi.unit) + ')' : '');
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function customerLookup() {
        const lookup = {};
        customers.forEach(group => {
            group.customers.forEach(customer => {
                lookup[customer.id] = customer;
            });
        });
        return lookup;
    }

    function renderAttribute(iconFile, label, items) {
        if (!items || !items.length) return '';
        let html = '<div class="customer-attribute">';
        html += '<img class="customer-attribute-icon" src="icons/' + escapeHtml(iconFile) + '" onerror="this.onerror=null;this.src=\'icons/logo.png\'">';
        html += '<div class="customer-attribute-body">';
        html += '<div class="customer-attribute-label">' + escapeHtml(label) + '</div>';
        items.forEach(item => {
            html += '<div class="customer-attribute-item">' + escapeHtml(item) + '</div>';
        });
        html += '</div></div>';
        return html;
    }

    function update() {
        let html = '<div style="padding: 12px">';

        customers.forEach(group => {
            html += '<div class="customer-group">';
            html += '<div class="customer-group-label">' + escapeHtml(group.group) + '</div>';
            group.customers.forEach(customer => {
                html += '<a target="_blank" href="landing_pages/' + escapeHtml(customer.id) + '.html">';
                html += '<div class="customer-card">';
                html += '<img class="customer-card-photo" src="icons/' + escapeHtml(customer.icon) + '" onerror="this.onerror=null;this.src=\'icons/customer.png\'">';
                html += '<div class="customer-card-name">' + escapeHtml(customer.name) + '</div>';
                const topKpi = topCustomerKpi(customer);
                if (topKpi && topKpi.name) {
                    html += '<div class="kpi-badge">';
                    html += '<div>KPI: ' + escapeHtml(topKpi.name) + '</div>';
                    html += '</div>';
                }
                html += renderAttribute('care.png', 'Care about', customer.careAbout);
                html += renderAttribute('win.png', 'Wins them', customer.winsThem);
                html += renderAttribute('fear.png', 'Their fear', customer.theirFear);
                html += '</div></a>';
            });
            html += '</div>';
        });

        html += '</div>';
        document.getElementById('tab_content_customers').innerHTML = html;
    }

    function renderInsights() {
        const lookup = customerLookup();

        if (!insights.items || insights.items.length === 0) {
            document.getElementById('tab_content_insights').innerHTML = '<div style="padding:16px;color:#6b7280">No customer insights defined for this domain yet.</div>';
            return;
        }

        let html = '<div class="insight-grid">';
        insights.items.forEach(insight => {
            html += '<div class="insight-card">';
            html += '<div class="insight-title">' + escapeHtml(insight.title) + '</div>';
            html += '<div class="insight-summary">' + escapeHtml(insight.summary) + '</div>';
            if (insight.implication) {
                html += '<div style="margin-bottom:12px"><b>Product implication:</b> ' + escapeHtml(insight.implication) + '</div>';
            }
            if (insight.tags && insight.tags.length) {
                html += '<div style="margin-bottom:10px">';
                insight.tags.forEach(tag => {
                    html += '<span class="insight-tag">' + escapeHtml(tag) + '</span>';
                });
                html += '</div>';
            }
            if (insight.linkedCustomers && insight.linkedCustomers.length) {
                html += '<div style="margin-bottom:8px"><b>Connected customers:</b></div>';
                insight.linkedCustomers.forEach(link => {
                    const customer = lookup[link.customerId];
                    html += '<div class="insight-customer-link">';
                    if (customer) {
                        html += '<a target="_blank" href="landing_pages/' + escapeHtml(customer.id) + '.html" style="color:#315b7c;font-weight:bold">' + escapeHtml(customer.name) + '</a>';
                    } else {
                        html += '<span style="font-weight:bold">' + escapeHtml(link.customerId) + '</span>';
                    }
                    if (link.jobIds && link.jobIds.length) {
                        html += '<div class="insight-source"><b>Jobs:</b> ' + escapeHtml(link.jobIds.join(', ')) + '</div>';
                    }
                    if (link.kpis && link.kpis.length) {
                        html += '<div class="insight-source"><b>KPIs:</b> ' + escapeHtml(link.kpis.join(', ')) + '</div>';
                    }
                    html += '</div>';
                });
            }
            if (insight.sources && insight.sources.length) {
                html += '<div><b>Sources:</b></div>';
                insight.sources.forEach(source => {
                    html += '<div class="insight-source">';
                    html += '<a target="_blank" href="' + escapeHtml(source.url) + '" style="color:#315b7c">' + escapeHtml(source.title) + '</a>';
                    html += ' <span style="color:#6b7280">(' + escapeHtml(source.publisher || '') + (source.date ? ', ' + escapeHtml(source.date) : '') + ')</span>';
                    html += '</div>';
                });
            }
            html += '</div>';
        });
        html += '</div>';
        document.getElementById('tab_content_insights').innerHTML = html;
    }

    update();
    renderInsights();
    updateTabLabels();
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../start/index.html",
      "label": "Technical Design Collaboration Platform Home"
    },
    {
      "label": "Customers"
    }
  ]
};
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
