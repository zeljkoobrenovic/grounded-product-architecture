<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discovery (Platform Engineering)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Exception governance without ticket queues", "id": "discovery-platform-engineering-2026-03-12-02-exception-governance", "name": "Exception governance without ticket queues", "status": "ongoing", "lastUpdated": "2026-03-26", "summary": "Discovery work is testing which policy exceptions should be automated, time-bound, and productized rather than handled through long-running manual review processes.", "opportunity": "Clarify how to keep governance strong while preventing exception handling from becoming a hidden platform bottleneck.", "linkedInitiatives": [{"initiativeId": "initiative-platform-engineering-2026-03-03-03", "description": "Platform controls by default initiative focused on improving identity, policy, artifact, observability, and reliability workflows.", "landingPageIndex": 0, "initiativeDescription": "Initiative focused on improving identity, secrets and access guardrails, policy as code and compliance controls, artifact supply chain and base images, observability and telemetry foundation, and reliability workflows and incident automation so the standard path is also the safest and most operable path."}], "teams": {"leadTeamId": "plat-identity-guardrails", "supportingTeamIds": ["plat-observability-reliability", "plat-delivery-automation", "plat-enablement"], "assignments": [{"teamId": "plat-identity-guardrails", "teamName": "Platform Identity and Guardrails", "role": "lead", "roleLabel": "Lead discovery team", "how": "Leads discovery on policy types, evidence requirements, and exception workflow design."}, {"teamId": "plat-observability-reliability", "teamName": "Platform Observability and Reliability", "role": "support", "roleLabel": "Supporting discovery team", "how": "Provides operational evidence about incidents and risks linked to missing or delayed controls."}, {"teamId": "plat-delivery-automation", "teamName": "Platform Delivery Automation", "role": "support", "roleLabel": "Supporting discovery team", "how": "Shows where policy checks and exception states should attach to the normal delivery workflow."}, {"teamId": "plat-enablement", "teamName": "Platform Enablement and Field Engineering", "role": "support", "roleLabel": "Supporting discovery team", "how": "Brings direct team feedback on exception friction, confusion, and support needs."}]}, "riskFocus": [{"riskType": "usable", "question": "Can teams understand and complete platform workflows without bespoke support?", "hypothesis": "Teams will comply more consistently when exception paths are explicit, fast, and understandable inside normal tooling.", "evidenceToCollect": ["Which control failures ordinary software engineers can understand and resolve without escalation.", "Where teams fail to understand current exception options.", "How often manual governance interactions block delivery."], "methods": ["Workflow walkthroughs", "Support-ticket review", "Exception-path usability testing"]}, {"riskType": "feasible", "question": "Can the platform teams build and operate this reliably within current constraints?", "hypothesis": "Only the high-frequency and low-ambiguity exception classes should be productized first.", "evidenceToCollect": ["Which exception classes recur often enough to automate.", "Where ambiguity or risk remains too high for full self-service."], "methods": ["Exception clustering analysis", "Risk review", "Platform-team design workshop"]}], "statusLabel": "Ongoing", "landingPageIndex": 1, "date": "2026-03-26", "customerImpact": [], "productBricks": [], "deliveryChannels": [], "plannedActivities": []};
    const domainName = 'Platform Engineering';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome && discovery.outcome.summary) {
        html += '<div class="section"><div class="section-title">Outcome</div><div class="description">' + escapeHtml(discovery.outcome.summary) + '</div></div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
