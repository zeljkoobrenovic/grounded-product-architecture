<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discovery (Platform Engineering)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Discovery">
</td>
<td>
<div class="eyebrow">Discovery</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const discovery = {"title": "Platform onboarding friction: validated discovery", "id": "discovery-platform-engineering-2026-01-10-01-onboarding-friction", "name": "Platform onboarding friction: validated discovery", "status": "archived", "lastUpdated": "2026-01-18", "summary": "Discovery confirmed that mainstream product teams were willing to standardize, but onboarding still depended too much on hidden platform knowledge and manual support.", "opportunity": "Clarify whether a better portal, clearer templates, and measurable onboarding telemetry would move the platform from optional to preferred for both engineering managers and ordinary software engineers.", "linkedInitiatives": [{"initiativeId": "initiative-platform-engineering-2026-01-20-01", "description": "Golden path adoption initiative focused on portal, template, and onboarding telemetry improvements.", "landingPageIndex": 2, "initiativeDescription": "Initiative focused on improving developer portal and service catalog, golden path templates, and developer experience and workflow telemetry so mainstream product teams can onboard to the platform without bespoke setup work."}], "teams": {"leadTeamId": "plat-golden-paths", "supportingTeamIds": ["plat-portal-catalog", "plat-enablement", "plat-insights-finops"], "assignments": [{"teamId": "plat-golden-paths", "teamName": "Platform Golden Paths", "role": "lead", "roleLabel": "Lead discovery team", "how": "Led customer interviews, template analysis, and the recommendation to treat onboarding as a first-class product workflow."}, {"teamId": "plat-portal-catalog", "teamName": "Platform Portal and Catalog", "role": "support", "roleLabel": "Supporting discovery team", "how": "Validated discoverability and documentation issues in the current portal experience."}, {"teamId": "plat-enablement", "teamName": "Platform Enablement and Field Engineering", "role": "support", "roleLabel": "Supporting discovery team", "how": "Provided direct evidence from onboarding support sessions and migration work."}, {"teamId": "plat-insights-finops", "teamName": "Platform Insights and FinOps", "role": "support", "roleLabel": "Supporting discovery team", "how": "Measured where the onboarding flow stalled and where repeated support work was concentrated."}]}, "riskFocus": [{"riskType": "valuable", "question": "Will internal teams adopt and keep using the platform path?", "hypothesis": "Platform adoption rises when onboarding becomes the easiest path rather than the most governed path.", "evidenceToCollect": ["Whether ordinary software engineers can complete common onboarding tasks without tribal knowledge.", "What proportion of support effort is caused by poor discovery versus true platform gaps.", "Whether teams return to bespoke local tooling after onboarding."], "methods": ["Onboarding diary study", "Support-ticket review", "Platform adoption analysis"]}], "statusLabel": "Archived", "landingPageIndex": 3, "date": "2026-01-18", "customerImpact": [], "productBricks": [], "deliveryChannels": [], "plannedActivities": []};
    const domainName = 'Platform Engineering';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    document.getElementById('Title').innerHTML = escapeHtml(discovery.title || discovery.name || 'Discovery');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domainName)
        + ' | ' + escapeHtml(discovery.statusLabel || discovery.status || 'Discovery')
        + ' | ' + escapeHtml(formatDate(discovery.startDate))
        + ' -> ' + escapeHtml(formatDate(discovery.endDate));

    let html = '';
    if (discovery.name && discovery.title && discovery.name !== discovery.title) {
        html += '<div class="section"><div class="section-title">Name</div><div class="description">' + escapeHtml(discovery.name) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(discovery.summary || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Opportunity</div><div class="description">' + escapeHtml(discovery.opportunity || '') + '</div></div>';

    if (discovery.riskFocus && discovery.riskFocus.length) {
        html += '<div class="section"><div class="section-title">Risk Focus</div>';
        discovery.riskFocus.forEach(risk => {
            html += '<div class="impact-block">';
            html += '<div class="impact-id">' + escapeHtml(risk.riskType || 'Risk') + '</div>';
            html += '<div class="impact-line"><b>Question:</b> ' + escapeHtml(risk.question || '') + '</div>';
            html += '<div class="impact-line"><b>Hypothesis:</b> ' + escapeHtml(risk.hypothesis || '') + '</div>';
            (risk.evidenceToCollect || []).forEach(evidence => {
                html += '<div class="impact-line"><b>Evidence:</b> ' + escapeHtml(evidence) + '</div>';
            });
            (risk.methods || []).forEach(method => {
                html += '<div class="impact-line"><b>Method:</b> ' + escapeHtml(method) + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    }

    if (discovery.teams && discovery.teams.assignments && discovery.teams.assignments.length) {
        html += '<div class="section"><div class="section-title">Teams</div>';
        discovery.teams.assignments.forEach(assignment => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div>' + escapeHtml(assignment.how || '') + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.linkedInitiatives && discovery.linkedInitiatives.length) {
        html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
        discovery.linkedInitiatives.forEach(linked => {
            const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                ? '../../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><div><div class="pill-name">' + linkOf(href, linked.initiativeDescription || linked.description || linked.initiativeId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(linked.initiativeId || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    if (discovery.plannedActivities && discovery.plannedActivities.length) {
        html += '<div class="section"><div class="section-title">Planned Activities</div>';
        discovery.plannedActivities.forEach(activity => {
            html += '<div class="impact-line">' + escapeHtml(activity) + '</div>';
        });
        html += '</div>';
    }

    if (discovery.outcome && discovery.outcome.summary) {
        html += '<div class="section"><div class="section-title">Outcome</div><div class="description">' + escapeHtml(discovery.outcome.summary) + '</div></div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
