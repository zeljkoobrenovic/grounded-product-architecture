<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archive Raise the safety and operability baseline</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1180px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #eaf1f7;
            color: #315b7c;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .objective {
            font-size: 19px;
            line-height: 1.55;
        }

        .metric {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 12px;
        }

        .metric-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
        }

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metric-description {
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
        }

        .list-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #315b7c;
            line-height: 1.4;
        }

        .list-meta {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .list-description {
            line-height: 1.45;
        }

        .key-result {
            margin-bottom: 14px;
            padding: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background-color: #fafafa;
        }

        .key-result-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .subsection {
            margin-top: 12px;
        }

        .subsection-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #d1d5db;
            background-color: #f8fafc;
            border-radius: 10px 10px 0 0;
            margin-top: 24px;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 12px 16px;
            transition: 0.2s;
            font-size: 15px;
        }

        .tab button:hover {
            background-color: #e5e7eb;
        }

        .tab button.active {
            background-color: #dbeafe;
            color: #1d4ed8;
            font-weight: bold;
        }

        .tabcontent {
            display: none;
            border: 1px solid #d1d5db;
            border-top: none;
            padding: 18px;
            border-radius: 0 0 10px 10px;
            background: white;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 50px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Objectives">
        </td>
        <td>
            <div class="eyebrow" id="Eyebrow"></div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div style="margin-left: 12px">
    <div class="tab">
        <button class="tablinks active" id="tab_HomeTab" onclick="openTab('HomeTab')">Home</button>
        <button class="tablinks" id="tab_InitiativesTab" onclick="openTab('InitiativesTab')">Initiatives</button>
        <button class="tablinks" id="tab_DiscoveriesTab" onclick="openTab('DiscoveriesTab')">Discoveries</button>
        <button class="tablinks" id="tab_ReleasesTab" onclick="openTab('ReleasesTab')">Releases</button>
    </div>

    <div id="HomeTab" class="tabcontent" style="display: block;"></div>
    <div id="InitiativesTab" class="tabcontent"></div>
    <div id="DiscoveriesTab" class="tabcontent"></div>
    <div id="ReleasesTab" class="tabcontent"></div>
</div>

<script>
    const pageData = {"id": "obj-controls-archive", "title": "Archive Raise the safety and operability baseline", "statement": "Focus archived periods on embedding guardrails, telemetry, and incident discipline into the standard path rather than relying on manual governance and heroics.", "objectiveType": "company", "status": "archived", "keyResultIds": ["platform-engineering-2025-q2-srel-kr-1-controls", "platform-engineering-2025-q4-srel-kr-2-controls"], "keyResults": [{"id": "kr-1", "metric": "Production services with baseline controls", "kind": "customer", "targetDirection": "increase", "target": "Increase standard identity, artifact, and policy coverage across production services", "baseline": "Control coverage depended on local team maturity and manual reviews", "statement": "Increase baseline control coverage by encoding more security and compliance expectations into the shared path.", "companyKeyResultId": "platform-engineering-2025-q2-srel-kr-1-controls", "companyObjectiveId": "obj-controls-archive", "companyObjectiveTitle": "Raise the safety and operability baseline", "executingTeams": [{"teamId": "plat-identity-guardrails", "teamName": "Platform Identity and Guardrails", "role": "executing", "intent": "Move common controls into templates, delivery automation, and supported runtime defaults."}], "supportingTeams": [{"teamId": "plat-golden-paths", "teamName": "Platform Golden Paths", "role": "supporting", "intent": "Bake stronger controls into the default service path."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "Archived outcome was achieved through incremental guardrail improvements.", "inspiredByInsights": []}, {"id": "kr-2", "metric": "Incident MTTR for common platform failure classes", "kind": "customer", "targetDirection": "decrease", "target": "Make response to shared-platform incidents more repeatable and less improvisational", "baseline": "Telemetry quality and ownership data varied across the estate", "statement": "Reduce incident MTTR by standardizing service telemetry, routing, and remediation workflows.", "companyKeyResultId": "platform-engineering-2025-q4-srel-kr-2-controls", "companyObjectiveId": "obj-controls-archive", "companyObjectiveTitle": "Raise the safety and operability baseline", "executingTeams": [{"teamId": "plat-observability-reliability", "teamName": "Platform Observability and Reliability", "role": "executing", "intent": "Improve telemetry, routing, and incident response automation."}], "supportingTeams": [{"teamId": "plat-portal-catalog", "teamName": "Platform Portal and Catalog", "role": "supporting", "intent": "Provide service ownership and dependency visibility used during response."}], "commitmentType": "standard", "commitmentLabel": "Standard KR", "commitmentRationale": "Archived outcome came from repeated operational hardening rather than a single change.", "inspiredByInsights": []}], "landingPageId": "archive-obj-controls-archive", "inspiredByInsights": [], "linkedInitiatives": [], "linkedReleases": []};
    const pageKind = 'company-objective';
    const domainName = 'Platform Engineering';

    function initTab() {
        if (window.location.hash) {
            const tabName = window.location.hash.substring(1);
            if (document.getElementById(tabName)) {
                openTab(tabName);
            }
        }
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
    }

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) {
            return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        }
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderMetric(metric) {
        const title = metric.kpiName || metric.metric || '';
        let html = '<div class="metric">';
        html += '<div class="metric-title">' + escapeHtml(title) + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(metric.kind || '') + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + (metric.targetDirection ? ' | ' + escapeHtml(metric.targetDirection) : '') + '</div>';
        if (metric.description) {
            html += '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderExecutionItem(item, typeName) {
        const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
            ? (typeName === 'initiative'
                ? '../../initiatives/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '../../releases/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html')
            : '';
        let html = '<div class="list-row">';
        html += '<div class="list-title">' + linkOf(target, item.description || item.id, 'list-title') + '</div>';
        html += '<div class="list-meta">' + escapeHtml(item.date || '') + '</div>';
        if (item.customerIds && item.customerIds.length) {
            html += '<div class="list-description">Customers: ' + escapeHtml(item.customerIds.join(', ')) + '</div>';
        }
        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="list-description">Channels: ' + escapeHtml(item.deliveryChannels.join(', ')) + '</div>';
        }
        if (item.productBricks && item.productBricks.length) {
            html += '<div class="list-description">Bricks: ' + escapeHtml(item.productBricks.join(', ')) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function renderEmptyState(message) {
        return '<div class="list-row"><div class="list-description">' + escapeHtml(message) + '</div></div>';
    }

    function renderTeams(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.teamName || item.teamId) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.role || '') + '</div>';
            if (item.intent) {
                html += '<div class="list-description">' + escapeHtml(item.intent) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderInsights(title, items, compact) {
        if (!items || !items.length) {
            return '';
        }
        let html = '<div class="' + (compact ? 'subsection' : 'section') + '"><div class="' + (compact ? 'subsection-title' : 'section-title') + '">' + escapeHtml(title) + '</div>';
        items.forEach(item => {
            html += '<div class="list-row">';
            html += '<div class="list-title">' + escapeHtml(item.insightTitle || item.title) + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function sameInsightSet(a, b) {
        const aIds = (a || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        const bIds = (b || []).map(item => item.insightId || item.id).filter(Boolean).sort().join('|');
        return aIds && bIds && aIds === bIds;
    }

    function renderKeyResult(item, options) {
        let html = '<div class="key-result">';
        html += '<div class="key-result-title">' + escapeHtml(item.metric) + '</div>';
        html += '<div>' + escapeHtml(item.statement || '') + '</div>';
        html += '<div class="metric-meta">' + escapeHtml(item.targetDirection || '') + (item.target ? ' | ' + escapeHtml(item.target) : '') + (item.commitmentLabel ? ' | ' + escapeHtml(item.commitmentLabel) : '') + '</div>';

        if (options.showObjective && item.companyObjectiveTitle) {
            html += '<div class="list-description">Company objective: ' + escapeHtml(item.companyObjectiveTitle) + '</div>';
        }
        if (options.showSource && item.sourceObjectiveTitle) {
            const href = item.sourceObjectivePageId ? (item.sourceObjectivePageId + '.html') : '';
            html += '<div class="list-description">Source objective: ' + linkOf(href, item.sourceObjectiveTitle, 'entity-link') + '</div>';
        }
        if (item.baseline) {
            html += '<div class="list-description">Baseline: ' + escapeHtml(item.baseline) + '</div>';
        }
        if (item.commitmentRationale) {
            html += '<div class="list-description">Commitment: ' + escapeHtml(item.commitmentRationale) + '</div>';
        }
        html += renderTeams('Executing Teams', item.executingTeams || [], true);
        html += renderTeams('Supporting Teams', item.supportingTeams || [], true);
        if (!(options.suppressRepeatedInsights && sameInsightSet(options.pageInsights, item.inspiredByInsights || []))) {
            html += renderInsights('Inspired By Insights', item.inspiredByInsights || [], true);
        }
        html += '</div>';
        return html;
    }

    function renderSourceObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.objective || '') + '</div></div>';

        if (page.companyObjectiveRefs && page.companyObjectiveRefs.length) {
            html += '<div class="section"><div class="section-title">Mapped Company Objectives</div>';
            page.companyObjectiveRefs.forEach(item => {
                const href = item.landingPageId ? item.landingPageId + '.html' : '';
                html += '<div class="pill"><div><div class="pill-name">' + linkOf(href, item.title, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(item.id) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.linkedCustomers && page.linkedCustomers.length) {
            html += '<div class="section"><div class="section-title">Linked Customers</div>';
            page.linkedCustomers.forEach(customer => {
                html += '<div class="pill"><div><div class="pill-name">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (page.keyResults && page.keyResults.length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            page.keyResults.forEach(item => {
                html += renderKeyResult(item, {showObjective: true, showSource: false});
            });
            html += '</div>';
        }

        if ((page.linkedCustomerKPIs && page.linkedCustomerKPIs.length) || (page.linkedBusinessKPIs && page.linkedBusinessKPIs.length)) {
            html += '<div class="section"><div class="section-title">Linked KPIs</div>';
            (page.linkedCustomerKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            (page.linkedBusinessKPIs || []).forEach(metric => {
                html += renderMetric(metric);
            });
            html += '</div>';
        }

        if (page.sourceReferences) {
            html += '<div class="section"><div class="section-title">Source References</div>';
            Object.keys(page.sourceReferences).forEach(key => {
                if (page.sourceReferences[key]) {
                    html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(key) + '</div><div class="pill-meta">' + escapeHtml(page.sourceReferences[key]) + '</div></div></div>';
                }
            });
            html += '</div>';
        }
        return html;
    }

    function renderCompanyObjectiveHome(page) {
        let html = '';
        html += '<div class="section"><div class="section-title">Objective</div><div class="objective">' + escapeHtml(page.statement || '') + '</div></div>';

        if (page.okrDesignNotes) {
            html += '<div class="section"><div class="section-title">Design Notes</div><div class="list-row"><div class="list-description">' + escapeHtml(page.okrDesignNotes) + '</div></div></div>';
        }

        if (page.keyResults && page.keyResults.length) {
            html += '<div class="section"><div class="section-title">Key Results</div>';
            page.keyResults.forEach(item => {
                html += renderKeyResult(item, {
                    showObjective: false,
                    showSource: true,
                    suppressRepeatedInsights: true,
                    pageInsights: page.inspiredByInsights || []
                });
            });
            html += '</div>';
        }
        return html;
    }

    function renderActivityTab(items, typeName, emptyMessage) {
        if (!items || !items.length) {
            return renderEmptyState(emptyMessage);
        }
        let html = '';
        items.forEach(item => {
            html += renderExecutionItem(item, typeName);
        });
        return html;
    }

    function collectCompanyDiscoveries(page) {
        const lookup = {};
        (page.inspiredByInsights || []).forEach(item => {
            const key = item.insightId || item.id || item.insightTitle || item.title;
            if (key) {
                lookup[key] = item;
            }
        });
        (page.keyResults || []).forEach(item => {
            (item.inspiredByInsights || []).forEach(insight => {
                const key = insight.insightId || insight.id || insight.insightTitle || insight.title;
                if (key) {
                    lookup[key] = insight;
                }
            });
        });
        return Object.values(lookup);
    }

    function renderDiscoveriesTab(page, kind) {
        const items = kind === 'company-objective'
            ? collectCompanyDiscoveries(page)
            : (page.inspiredByInsights || []);
        if (!items.length) {
            return renderEmptyState('No discoveries linked to this objective.');
        }
        let html = '';
        items.forEach(item => {
            const target = item.landingPageIndex !== undefined && item.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html'
                : '';
            html += '<div class="list-row">';
            html += '<div class="list-title">' + linkOf(target, item.insightTitle || item.title || item.id, 'list-title') + '</div>';
            html += '<div class="list-meta">' + escapeHtml(item.status || item.kind || '') + '</div>';
            if (item.howItInspiresObjective) {
                html += '<div class="list-description">' + escapeHtml(item.howItInspiresObjective) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Eyebrow').innerHTML = escapeHtml(pageKind === 'company-objective' ? 'Company Objective' : 'Source Objective');
    document.getElementById('Title').innerHTML = escapeHtml(pageData.title || 'Objective');
    const metaBits = [escapeHtml(domainName)];
    if (pageData.status) {
        metaBits.push(escapeHtml(pageData.status));
    }
    if (pageData.period && pageData.period.quarter) {
        metaBits.push(escapeHtml(pageData.period.quarter));
    }
    document.getElementById('Meta').innerHTML = metaBits.join(' | ');

    document.getElementById('HomeTab').innerHTML = pageKind === 'company-objective'
        ? renderCompanyObjectiveHome(pageData)
        : renderSourceObjectiveHome(pageData);
    document.getElementById('InitiativesTab').innerHTML = renderActivityTab(
        pageData.linkedInitiatives || [],
        'initiative',
        'No initiatives linked to this objective.'
    );
    document.getElementById('DiscoveriesTab').innerHTML = renderDiscoveriesTab(pageData, pageKind);
    document.getElementById('ReleasesTab').innerHTML = renderActivityTab(
        pageData.linkedReleases || [],
        'release',
        'No releases linked to this objective.'
    );
    initTab();
</script>
</body>
</html>
