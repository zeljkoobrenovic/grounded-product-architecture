<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Platform Engineering)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "runtime self-service release", "date": "2026-02-28", "description": "Release of runtime self-service improvements covering environment provisioning and ephemeral environments, delivery pipelines and release automation, and runtime connectivity and integration patterns across Runtime Provisioning API and CI/CD Pipeline Library.", "customerImpact": [{"customerId": "swtl", "customer": {"id": "swtl", "name": "Staff Software Engineer / Tech Lead", "group": "Product and Application Delivery Teams", "icon": "code.png"}, "customerKPIs": [{"kpi": "Time from repo creation to first production deployment", "expectedImpact": "Improve time to first production deployment through reusable runtime and pipeline patterns.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Bespoke pipeline maintenance effort", "expectedImpact": "Improve maintainability by shifting teams onto common delivery and runtime paths.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Lead time for change", "expectedImpact": "Improve lead time by reducing delivery setup variance.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Environment provisioning wait time", "expectedImpact": "Improve provisioning turnaround through standardized workflows.", "description": "", "unit": "", "kind": "business"}]}, {"customerId": "swen", "customer": {"id": "swen", "name": "Software Engineer", "group": "Product and Application Delivery Teams", "icon": "code.png"}, "customerKPIs": [{"kpi": "Time from repo creation to first production deployment", "expectedImpact": "Improve speed of everyday delivery through reusable runtime and release workflows.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Environment provisioning wait time", "expectedImpact": "Improve turnaround for common preview and test environment requests.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Lead time for change", "expectedImpact": "Improve throughput by lowering waiting and setup variance.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "envp", "change": "Released self-service provisioning and ephemeral environment workflows.", "brick": {"id": "envp", "name": "Environment Provisioning and Ephemeral Environments", "type": "service", "description": "Automates creation and lifecycle management of developer, test, preview, and production environments with policy-aware defaults.", "domain": "runtime_foundation", "group": "runtime-and-delivery", "internalModules": [{"title": "Provisioning Control Plane", "description": "Creates and updates environments from standard definitions.", "type": "service"}, {"title": "Environment Definition Library", "description": "Stores reusable runtime configurations and supported environment types.", "type": "infrastructure"}], "interfaces": [{"title": "Provisioning API", "description": "API used to request or update environments.", "type": "api"}, {"title": "Environment Lifecycle Events", "description": "Events emitted when environments are created, changed, or removed.", "type": "event"}], "brickDependencies": [{"targetBrickId": "iden", "type": "security", "interface": "Identity Policy API", "description": "Applies approved identity and access defaults when environments are provisioned."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "envp.png"}}, {"brickId": "cicd", "change": "Released standard promotion, rollback, and release evidence workflows.", "brick": {"id": "cicd", "name": "Delivery Pipelines and Release Automation", "type": "service", "description": "Reusable build, test, deploy, promote, and rollback workflows that encode the expected delivery path.", "domain": "runtime_foundation", "group": "runtime-and-delivery", "internalModules": [{"title": "Pipeline Library", "description": "Stores reusable CI/CD workflows and quality gates.", "type": "automation"}, {"title": "Release Evidence Store", "description": "Captures deployment, promotion, and rollback evidence.", "type": "service"}], "interfaces": [{"title": "Pipeline Actions", "description": "Workflow actions used by teams to build, test, and deploy software.", "type": "workflow"}, {"title": "Release API", "description": "API for promotion, rollback, and release evidence.", "type": "api"}], "brickDependencies": [{"targetBrickId": "arti", "type": "supply-chain", "interface": "Artifact Registry API", "description": "Depends on trusted artifacts and provenance for secure releases."}, {"targetBrickId": "poli", "type": "governance", "interface": "Policy Check API", "description": "Runs required controls as part of the normal delivery path."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "cicd.png"}}, {"brickId": "inte", "change": "Released runtime connectivity and dependency access reference patterns.", "brick": {"id": "inte", "name": "Runtime Connectivity and Integration Patterns", "type": "integration", "description": "Defines approved runtime patterns for networking, service discovery, dependency access, and platform-service integration.", "domain": "runtime_foundation", "group": "runtime-and-delivery", "internalModules": [{"title": "Connectivity Policy Library", "description": "Defines supported network and access patterns between services and shared dependencies.", "type": "policy"}, {"title": "Reference Integration Pack", "description": "Documents and automates common ways to connect to platform and infrastructure services.", "type": "integration"}], "interfaces": [{"title": "Runtime Pattern Catalog", "description": "Catalog of approved integration and connectivity patterns.", "type": "ui"}, {"title": "Network and Access Policies", "description": "Policy interfaces consumed by runtime automation.", "type": "api"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "inte.png"}}], "deliveryChannels": [{"channelId": "prod_run-api", "change": "Deployed runtime provisioning improvements in Runtime Provisioning API.", "channel": {"productId": "prod_run", "productName": "Runtime and Delivery Foundation", "name": "Runtime Provisioning API", "type": "api", "icon": "api.png"}}, {"channelId": "prod_run-workflow", "change": "Deployed reusable rollout workflows in CI/CD Pipeline Library.", "channel": {"productId": "prod_run", "productName": "Runtime and Delivery Foundation", "name": "CI/CD Pipeline Library", "type": "workflow", "icon": "workflow.png"}}], "teams": {"primaryTeamIds": ["plat-environment-provisioning", "plat-delivery-automation", "plat-runtime-connectivity"], "supportingTeamIds": ["plat-identity-guardrails"]}, "landingPageIndex": 1};
    const domainName = 'Platform Engineering';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
