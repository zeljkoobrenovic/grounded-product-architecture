<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Platform Engineering)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "platform onboarding release", "date": "2026-01-31", "description": "Release of onboarding improvements covering developer portal and service catalog, golden path templates, and developer experience and workflow telemetry across Developer Portal, Platform Self-Service API, and Developer Platform CLI.", "customerImpact": [{"customerId": "penm", "customer": {"id": "penm", "name": "Product Engineering Manager", "group": "Product and Application Delivery Teams", "icon": "engineering.png"}, "customerKPIs": [{"kpi": "Median team onboarding time", "expectedImpact": "Improve onboarding time through clearer templates, ownership defaults, and self-service guidance.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Self-service completion rate", "expectedImpact": "Improve self-service completion rate by making onboarding actions easier to discover and finish.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Platform adoption across product teams", "expectedImpact": "Improve adoption by increasing confidence in the platform onboarding flow.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Support tickets per onboarding", "expectedImpact": "Reduce onboarding support demand through better default flows.", "description": "", "unit": "", "kind": "business"}]}, {"customerId": "swen", "customer": {"id": "swen", "name": "Software Engineer", "group": "Product and Application Delivery Teams", "icon": "code.png"}, "customerKPIs": [{"kpi": "Self-service completion rate", "expectedImpact": "Improve the percentage of routine onboarding and setup tasks engineers finish without platform intervention.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Developer satisfaction with platform experience", "expectedImpact": "Improve confidence that the portal and templates are useful for daily engineering work.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Platform support load per active team", "expectedImpact": "Reduce repeated onboarding help demand.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "port", "change": "Released improved service discovery, ownership metadata, and self-service actions.", "brick": {"id": "port", "name": "Developer Portal and Service Catalog", "type": "full-stack", "description": "The front door to the platform, combining service catalog metadata, documentation, ownership, templates, and self-service actions.", "domain": "developer_experience", "group": "portal-and-engineering-standards", "internalModules": [{"title": "Service Metadata Model", "description": "Stores service ownership, lifecycle state, dependency, and documentation metadata.", "type": "service"}, {"title": "Portal Experience Layer", "description": "Provides browse, search, workflow, and support entry points for platform customers.", "type": "ui"}, {"title": "Workflow Adapter Layer", "description": "Connects the portal to provisioning, template, and governance workflows.", "type": "integration"}], "interfaces": [{"title": "Portal UI", "description": "User interface for catalog, docs, ownership, and self-service actions.", "type": "ui"}, {"title": "Catalog API", "description": "API for service metadata, template actions, and platform workflow integration.", "type": "api"}, {"title": "Lifecycle Events", "description": "Events emitted for ownership, service, and workflow changes.", "type": "event"}], "brickDependencies": [{"targetBrickId": "vccs", "type": "source-control", "interface": "Repository APIs and Webhooks", "description": "Uses repository and ownership metadata from Version Control and Code Collaboration to keep the catalog current."}, {"targetBrickId": "gold", "type": "workflow", "interface": "Template Action API", "description": "Uses Golden Path Templates to scaffold and evolve services."}, {"targetBrickId": "devx", "type": "analytics", "interface": "Usage Telemetry Feed", "description": "Consumes usage signals to understand portal adoption and friction."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "port.png"}}, {"brickId": "gold", "change": "Released first-party templates for the most common service archetypes.", "brick": {"id": "gold", "name": "Golden Path Templates", "type": "development", "description": "Opinionated templates and reference implementations for common service, UI, and automation patterns used by product teams.", "domain": "developer_experience", "group": "portal-and-engineering-standards", "internalModules": [{"title": "Template Registry", "description": "Stores versioned templates, documentation, and lifecycle states.", "type": "service"}, {"title": "Quality Validation Harness", "description": "Tests whether templates remain deployable, secure, and usable.", "type": "automation"}, {"title": "Migration Guidance Pack", "description": "Explains how teams move from older patterns to newer supported paths.", "type": "documentation"}], "interfaces": [{"title": "Scaffolding Actions", "description": "Creates new services or platform assets from supported templates.", "type": "workflow"}, {"title": "Template Registry API", "description": "API for discovering, versioning, and consuming templates.", "type": "api"}], "brickDependencies": [{"targetBrickId": "apps", "type": "development", "interface": "Application Spec API", "description": "Uses supported application definitions so generated services carry the expected workload and dependency model."}, {"targetBrickId": "cicd", "type": "delivery", "interface": "Pipeline Template Library", "description": "Embeds supported delivery workflows into generated starting points."}, {"targetBrickId": "poli", "type": "governance", "interface": "Policy Bundles", "description": "Applies guardrails to supported templates by default."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "gold.png"}}, {"brickId": "devx", "change": "Released onboarding and self-service telemetry dashboards.", "brick": {"id": "devx", "name": "Developer Experience and Workflow Telemetry", "type": "service", "description": "Measures adoption, onboarding friction, self-service completion, and engineering workflow effectiveness across the platform.", "domain": "developer_experience", "group": "portal-and-engineering-standards", "internalModules": [{"title": "Workflow Event Ingestion", "description": "Captures events from the portal, pipelines, and platform workflows.", "type": "service"}, {"title": "DevEx Metrics Model", "description": "Computes onboarding, cycle-time, and platform-value metrics.", "type": "analytics"}], "interfaces": [{"title": "Platform Insights Dashboard", "description": "Dashboard for adoption, lead-time, and friction metrics.", "type": "ui"}, {"title": "Usage Metrics API", "description": "API for platform health and usage analytics.", "type": "api"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "devx.png"}}], "deliveryChannels": [{"channelId": "prod_idp-web", "change": "Deployed onboarding improvements in Developer Portal.", "channel": {"productId": "prod_idp", "productName": "Internal Developer Platform", "name": "Developer Portal", "type": "web", "icon": "web.png"}}, {"channelId": "prod_idp-api", "change": "Deployed onboarding workflow actions in Platform Self-Service API.", "channel": {"productId": "prod_idp", "productName": "Internal Developer Platform", "name": "Platform Self-Service API", "type": "api", "icon": "api.png"}}, {"channelId": "prod_idp-cli", "change": "Deployed local setup and diagnostics support in Developer Platform CLI.", "channel": {"productId": "prod_idp", "productName": "Internal Developer Platform", "name": "Developer Platform CLI", "type": "cli", "icon": "cli.png"}}], "teams": {"primaryTeamIds": ["plat-portal-catalog", "plat-golden-paths"], "supportingTeamIds": ["plat-insights-finops"]}, "landingPageIndex": 2};
    const domainName = 'Platform Engineering';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
