<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Platform Engineering)</title>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;
        padding: 6px 4px;
        font-size: 80%;
        color: #a0a0a0;
    }

    .breadcrumb {
    }

    .breadcrumb a {
        text-decoration: none;
        color: #343434;;
    }
</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Runtime Delivery Self-Service", "date": "2025-11-12", "description": "Runtime Delivery Self-Service exists to Shorten the path from repo to production by making the standard runtime and delivery path more complete, visible, and self-service. The quarter concentrates on paved-road adoption, default guardrails, AI-era runtime readiness, and cost visibility so the work reads like a realistic OKR-driven investment set for a company with roughly 250 product and technology people.", "customerImpact": [{"customerId": "swtl", "customer": {"id": "swtl", "name": "Staff Software Engineer / Tech Lead", "group": "Product and Application Delivery Teams", "icon": "code.png"}, "customerKPIs": [{"kpi": "Time from repo creation to first production deployment", "expectedImpact": "Decrease time from repo creation to first production deployment by improving environment provisioning, release automation, and runtime connectivity patterns and removing avoidable workflow friction.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Bespoke pipeline maintenance effort", "expectedImpact": "Decrease bespoke pipeline maintenance effort by improving environment provisioning, release automation, and runtime connectivity patterns and removing avoidable workflow friction.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Lead time for change", "expectedImpact": "Reduce lead time for change by improving environment provisioning, release automation, and runtime connectivity patterns and removing avoidable workflow friction.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "envp", "change": "Released self-service provisioning and ephemeral environment workflows.", "brick": {"id": "envp", "name": "Environment Provisioning and Ephemeral Environments", "type": "service", "description": "Automates creation and lifecycle management of developer, test, preview, and production environments with policy-aware defaults.", "domain": "runtime_foundation", "group": "runtime-orchestration-and-infrastructure-control", "internalModules": [{"title": "Provisioning Control Plane", "description": "Creates and updates environments from standard definitions.", "type": "service"}, {"title": "Environment Definition Library", "description": "Stores reusable runtime configurations and supported environment types.", "type": "infrastructure"}], "interfaces": [{"title": "Provisioning API", "description": "API used to request or update environments.", "type": "api"}, {"title": "Environment Lifecycle Events", "description": "Events emitted when environments are created, changed, or removed.", "type": "event"}], "brickDependencies": [{"targetBrickId": "plor", "type": "orchestration", "interface": "Orchestration API", "description": "Uses the platform orchestrator to resolve which resources and bindings belong in each environment."}, {"targetBrickId": "iden", "type": "security", "interface": "Identity Policy API", "description": "Applies approved identity and access defaults when environments are provisioned."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "envp.png"}}, {"brickId": "cicd", "change": "Released standard promotion, rollback, and release evidence workflows.", "brick": {"id": "cicd", "name": "Delivery Pipelines and Release Automation", "type": "service", "description": "Reusable build, test, deploy, promote, and rollback workflows that encode the expected delivery path.", "domain": "runtime_foundation", "group": "artifact-and-delivery-chain", "internalModules": [{"title": "Pipeline Library", "description": "Stores reusable CI/CD workflows and quality gates.", "type": "automation"}, {"title": "Release Evidence Store", "description": "Captures deployment, promotion, and rollback evidence.", "type": "service"}], "interfaces": [{"title": "Pipeline Actions", "description": "Workflow actions used by teams to build, test, and deploy software.", "type": "workflow"}, {"title": "Release API", "description": "API for promotion, rollback, and release evidence.", "type": "api"}], "brickDependencies": [{"targetBrickId": "arti", "type": "supply-chain", "interface": "Artifact Registry API", "description": "Depends on trusted artifacts and provenance for secure releases."}, {"targetBrickId": "vccs", "type": "source-control", "interface": "Repository APIs and Webhooks", "description": "Uses repository and merge-state events from Version Control and Code Collaboration to trigger and govern CI workflows."}, {"targetBrickId": "regy", "type": "registry", "interface": "Registry API", "description": "Publishes build outputs and release artifacts into the standard artifact distribution path."}, {"targetBrickId": "poli", "type": "governance", "interface": "Policy Check API", "description": "Runs required controls as part of the normal delivery path."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "cicd.png"}}, {"brickId": "inte", "change": "Released runtime connectivity and dependency access reference patterns.", "brick": {"id": "inte", "name": "Runtime Connectivity and Integration Patterns", "type": "integration", "description": "Defines approved runtime patterns for networking, service discovery, dependency access, and platform-service integration.", "domain": "runtime_foundation", "group": "runtime-orchestration-and-infrastructure-control", "internalModules": [{"title": "Connectivity Policy Library", "description": "Defines supported network and access patterns between services and shared dependencies.", "type": "policy"}, {"title": "Reference Integration Pack", "description": "Documents and automates common ways to connect to platform and infrastructure services.", "type": "integration"}], "interfaces": [{"title": "Runtime Pattern Catalog", "description": "Catalog of approved integration and connectivity patterns.", "type": "ui"}, {"title": "Network and Access Policies", "description": "Policy interfaces consumed by runtime automation.", "type": "api"}], "brickDependencies": [{"targetBrickId": "plor", "type": "orchestration", "interface": "Orchestration API", "description": "Uses orchestration and resource-binding decisions to keep runtime connectivity patterns aligned with the deployed topology."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "inte.png"}}], "deliveryChannels": [{"channelId": "prod_run-api", "change": "Deployed runtime provisioning improvements in Runtime Provisioning API.", "channel": {"productId": "prod_run", "productName": "Runtime and Delivery Foundation", "name": "Runtime Provisioning API", "type": "api", "icon": "api.png"}}, {"channelId": "prod_run-workflow", "change": "Deployed reusable rollout workflows in CI/CD Pipeline Library.", "channel": {"productId": "prod_run", "productName": "Runtime and Delivery Foundation", "name": "CI/CD Pipeline Library", "type": "workflow", "icon": "workflow.png"}}], "teams": {"primaryTeamIds": ["plat-environment-provisioning", "plat-delivery-automation", "plat-runtime-connectivity"], "supportingTeamIds": ["plat-identity-guardrails"]}, "initiativeId": "initiative-platform-engineering-2025-11-12-01", "priority": "p2", "keyResultId": "platform-engineering-2025-q4-swtl/kr-q4-swtl-first-prod", "discoveryIds": ["discovery-platform-engineering-2025-10-27-01-runtime-delivery-self-service-operat"], "discoveryLinks": [{"discoveryId": "discovery-platform-engineering-2025-10-27-01-runtime-delivery-self-service-operat", "discoveryName": "Runtime Delivery Self-Service: operating discovery", "status": "archived", "landingPageIndex": 4}], "landingPageIndex": 4, "objectiveLandingPageUrl": ""};
    const domainName = 'Platform Engineering';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Platform Engineering Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Runtime Delivery Self-Service"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
