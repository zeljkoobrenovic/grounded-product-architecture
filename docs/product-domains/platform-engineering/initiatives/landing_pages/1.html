<!DOCTYPE html>

    <style>
    .page-type-badge {

</style>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table>

</td>
<td>

<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "Team Onboarding Paved Road", "date": "2026-04-16", "description": "Team Onboarding Paved Road exists to Make the default team setup path fast enough that product teams stop treating onboarding as a local project. The quarter concentrates on paved-road adoption, default guardrails, AI-era runtime readiness, and cost visibility so the work reads like a realistic OKR-driven investment set for a company with roughly 250 product and technology people.", "customerImpact": [{"customerId": "penm", "customer": {"id": "penm", "name": "Product Engineering Manager", "group": "Product and Application Delivery Teams", "icon": "engineering.png"}, "customerKPIs": [{"kpi": "Median team onboarding time", "expectedImpact": "Decrease median team onboarding time by improving portal onboarding, service catalog, and golden-path templates and removing avoidable workflow friction.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Self-service completion rate", "expectedImpact": "Increase self-service completion rate by strengthening portal onboarding, service catalog, and golden-path templates and making the core workflow more reliable end to end.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Platform adoption across product teams", "expectedImpact": "Increase platform adoption across product teams by strengthening portal onboarding, service catalog, and golden-path templates and making the core workflow more reliable end to end.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "port", "change": "Released improved service discovery, ownership metadata, and self-service actions.", "brick": {"id": "port", "name": "Developer Portal and Service Catalog", "type": "full-stack", "description": "The front door to the platform, combining service catalog metadata, documentation, ownership, templates, and self-service actions.", "domain": "developer_experience", "group": "portal-and-engineering-standards", "internalModules": [{"title": "Service Metadata Model", "description": "Stores service ownership, lifecycle state, dependency, and documentation metadata.", "type": "service"}, {"title": "Portal Experience Layer", "description": "Provides browse, search, workflow, and support entry points for platform customers.", "type": "ui"}, {"title": "Workflow Adapter Layer", "description": "Connects the portal to provisioning, template, and governance workflows.", "type": "integration"}], "interfaces": [{"title": "Portal UI", "description": "User interface for catalog, docs, ownership, and self-service actions.", "type": "ui"}, {"title": "Catalog API", "description": "API for service metadata, template actions, and platform workflow integration.", "type": "api"}, {"title": "Lifecycle Events", "description": "Events emitted for ownership, service, and workflow changes.", "type": "event"}], "brickDependencies": [{"targetBrickId": "vccs", "type": "source-control", "interface": "Repository APIs and Webhooks", "description": "Uses repository and ownership metadata from Version Control and Code Collaboration to keep the catalog current."}, {"targetBrickId": "gold", "type": "workflow", "interface": "Template Action API", "description": "Uses Golden Path Templates to scaffold and evolve services."}, {"targetBrickId": "devx", "type": "analytics", "interface": "Usage Telemetry Feed", "description": "Consumes usage signals to understand portal adoption and friction."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "port.png"}}, {"brickId": "gold", "change": "Released first-party templates for the most common service archetypes.", "brick": {"id": "gold", "name": "Golden Path Templates", "type": "development", "description": "Opinionated templates and reference implementations for common service, UI, and automation patterns used by product teams.", "domain": "developer_experience", "group": "portal-and-engineering-standards", "internalModules": [{"title": "Template Registry", "description": "Stores versioned templates, documentation, and lifecycle states.", "type": "service"}, {"title": "Quality Validation Harness", "description": "Tests whether templates remain deployable, secure, and usable.", "type": "automation"}, {"title": "Migration Guidance Pack", "description": "Explains how teams move from older patterns to newer supported paths.", "type": "documentation"}], "interfaces": [{"title": "Scaffolding Actions", "description": "Creates new services or platform assets from supported templates.", "type": "workflow"}, {"title": "Template Registry API", "description": "API for discovering, versioning, and consuming templates.", "type": "api"}], "brickDependencies": [{"targetBrickId": "apps", "type": "development", "interface": "Application Spec API", "description": "Uses supported application definitions so generated services carry the expected workload and dependency model."}, {"targetBrickId": "cicd", "type": "delivery", "interface": "Pipeline Template Library", "description": "Embeds supported delivery workflows into generated starting points."}, {"targetBrickId": "poli", "type": "governance", "interface": "Policy Bundles", "description": "Applies guardrails to supported templates by default."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "gold.png"}}, {"brickId": "devx", "change": "Released onboarding and self-service telemetry dashboards.", "brick": {"id": "devx", "name": "Developer Experience and Workflow Telemetry", "type": "service", "description": "Measures adoption, onboarding friction, self-service completion, and engineering workflow effectiveness across the platform.", "domain": "developer_experience", "group": "portal-and-engineering-standards", "internalModules": [{"title": "Workflow Event Ingestion", "description": "Captures events from the portal, pipelines, and platform workflows.", "type": "service"}, {"title": "DevEx Metrics Model", "description": "Computes onboarding, cycle-time, and platform-value metrics.", "type": "analytics"}], "interfaces": [{"title": "Platform Insights Dashboard", "description": "Dashboard for adoption, lead-time, and friction metrics.", "type": "ui"}, {"title": "Usage Metrics API", "description": "API for platform health and usage analytics.", "type": "api"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "devx.png"}}], "deliveryChannels": [{"channelId": "prod_idp-web", "change": "Deployed onboarding improvements in Developer Portal.", "channel": {"productId": "prod_idp", "productName": "Internal Developer Platform", "name": "Developer Portal", "type": "web", "icon": "web.png"}}, {"channelId": "prod_idp-api", "change": "Deployed onboarding workflow actions in Platform Self-Service API.", "channel": {"productId": "prod_idp", "productName": "Internal Developer Platform", "name": "Platform Self-Service API", "type": "api", "icon": "api.png"}}, {"channelId": "prod_idp-cli", "change": "Deployed local setup and diagnostics support in Developer Platform CLI.", "channel": {"productId": "prod_idp", "productName": "Internal Developer Platform", "name": "Developer Platform CLI", "type": "cli", "icon": "cli.png"}}], "teams": {"primaryTeamIds": ["plat-portal-catalog", "plat-golden-paths"], "supportingTeamIds": ["plat-insights-finops"]}, "initiativeId": "initiative-platform-engineering-2026-04-16-00", "priority": "p1", "keyResultId": "platform-engineering-2026-q2-penm/kr-q2-penm-onboarding-time", "discoveryIds": ["discovery-platform-engineering-2026-03-29-00-team-onboarding-paved-road-operating"], "discoveryLinks": [{"discoveryId": "discovery-platform-engineering-2026-03-29-00-team-onboarding-paved-road-operating", "discoveryName": "Team Onboarding Paved Road: operating discovery", "status": "ongoing", "landingPageIndex": 2}], "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Platform Engineering';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Platform Engineering Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Team Onboarding Paved Road"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
