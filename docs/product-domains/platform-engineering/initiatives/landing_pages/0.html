<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (Platform Engineering)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"title": "platform controls by default initiative", "date": "2026-03-03", "description": "Initiative focused on improving identity, secrets and access guardrails, policy as code and compliance controls, artifact supply chain and base images, observability and telemetry foundation, and reliability workflows and incident automation so the standard path is also the safest and most operable path.", "customerImpact": [{"customerId": "srel", "customer": {"id": "srel", "name": "Site Reliability and Security Lead", "group": "Risk, Reliability and Specialist Engineering Partners", "icon": "shield.png"}, "customerKPIs": [{"kpi": "Production services with baseline controls", "expectedImpact": "Increase control coverage by embedding identity, policy, and artifact standards in the normal delivery path.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Incident MTTR for common platform failure classes", "expectedImpact": "Decrease MTTR through shared telemetry and automation.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Change failure rate", "expectedImpact": "Reduce failure caused by inconsistent controls, weak baselines, and unclear rollback paths.", "description": "", "unit": "", "kind": "business"}, {"kpi": "Manual governance workload", "expectedImpact": "Reduce review overhead by shifting common controls into code and workflow automation.", "description": "", "unit": "", "kind": "business"}]}, {"customerId": "swen", "customer": {"id": "swen", "name": "Software Engineer", "group": "Product and Application Delivery Teams", "icon": "code.png"}, "customerKPIs": [{"kpi": "Self-service completion rate", "expectedImpact": "Improve engineers' ability to satisfy normal control requirements without leaving the supported workflow.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Developer satisfaction with platform experience", "expectedImpact": "Increase trust that policy and artifact checks are understandable and actionable instead of opaque blockers.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Platform support load per active team", "expectedImpact": "Reduce exception-related help demand by productizing the most common control interactions.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "iden", "change": "Extended workload identity and secret-delivery defaults across the platform estate.", "brick": {"id": "iden", "name": "Identity, Secrets and Access Guardrails", "type": "service", "description": "Provides workload identity, secret delivery, least-privilege defaults, and access-control patterns used across the platform.", "domain": "platform_controls", "group": "source-quality-and-policy-control", "internalModules": [{"title": "Workload Identity Broker", "description": "Issues and manages service identities and access bindings.", "type": "security"}, {"title": "Secret Delivery Integrations", "description": "Distributes and rotates secrets through approved platform paths.", "type": "integration"}], "interfaces": [{"title": "Identity Policy API", "description": "Used by provisioning and runtime systems to apply access rules.", "type": "api"}, {"title": "Secret Access Workflows", "description": "Controlled workflows for secret creation, access, and rotation.", "type": "workflow"}], "brickDependencies": [{"targetBrickId": "vccs", "type": "source-control", "interface": "Repository APIs and Webhooks", "description": "Uses repository and ownership metadata to scope secrets, access policies, and service identity defaults."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "iden.png"}}, {"brickId": "poli", "change": "Extended policy checks and exception workflows in pipelines and runtime provisioning.", "brick": {"id": "poli", "name": "Policy as Code and Compliance Controls", "type": "service", "description": "Encodes engineering, security, and compliance requirements into reusable checks, evidence, and exception workflows.", "domain": "platform_controls", "group": "source-quality-and-policy-control", "internalModules": [{"title": "Policy Engine", "description": "Evaluates delivery and runtime policies against declared platform standards.", "type": "service"}, {"title": "Exception Workflow Manager", "description": "Tracks, approves, expires, and audits policy exceptions.", "type": "workflow"}, {"title": "Evidence Collector", "description": "Aggregates automated compliance evidence from pipelines and runtime systems.", "type": "analytics"}], "interfaces": [{"title": "Policy Check API", "description": "API used by templates, pipelines, and provisioning workflows.", "type": "api"}, {"title": "Control Evidence Dashboard", "description": "Dashboard for control coverage and exception posture.", "type": "ui"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "poli.png"}}, {"brickId": "arti", "change": "Extended trusted base-image and artifact provenance workflows.", "brick": {"id": "arti", "name": "Artifact Supply Chain and Base Images", "type": "service", "description": "Manages trusted build artifacts, base images, provenance, and update workflows for secure software delivery.", "domain": "platform_controls", "group": "source-quality-and-policy-control", "internalModules": [{"title": "Trusted Base Image Factory", "description": "Builds, scans, and publishes approved runtime bases.", "type": "automation"}, {"title": "Artifact Provenance Service", "description": "Stores signatures, attestations, and lineage for released artifacts.", "type": "security"}], "interfaces": [{"title": "Artifact Registry API", "description": "Registry access for trusted images, packages, and provenance metadata.", "type": "api"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "arti.png"}}, {"brickId": "obsv", "change": "Extended standard telemetry and alerting bundles for platform-adopting services.", "brick": {"id": "obsv", "name": "Observability and Telemetry Foundation", "type": "full-stack", "description": "Shared logging, metrics, tracing, alerting, and dashboarding foundation used across services and platform workflows.", "domain": "platform_controls", "group": "observability-reliability-and-economics", "internalModules": [{"title": "Telemetry Collection Layer", "description": "Collects and routes logs, metrics, and traces from services and platform systems.", "type": "service"}, {"title": "Dashboard and Alert Model", "description": "Defines standard dashboards, alerts, and service-health views.", "type": "analytics"}], "interfaces": [{"title": "Telemetry APIs", "description": "Ingestion and query interfaces for observability data.", "type": "api"}, {"title": "Operations Dashboards", "description": "Operational visibility into service and platform health.", "type": "ui"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "obsv.png"}}, {"brickId": "reli", "change": "Extended incident routing, runbooks, and remediation automation.", "brick": {"id": "reli", "name": "Reliability Workflows and Incident Automation", "type": "service", "description": "Coordinates incidents, runbooks, rollback patterns, ownership, and follow-up automation across the platform estate.", "domain": "platform_controls", "group": "observability-reliability-and-economics", "internalModules": [{"title": "Incident Router", "description": "Routes alerts and incidents using service ownership and severity policies.", "type": "service"}, {"title": "Automation and Runbook Engine", "description": "Runs supported remediation, rollback, and notification actions.", "type": "automation"}], "interfaces": [{"title": "Incident Event Stream", "description": "Events for alerts, incidents, and response lifecycle changes.", "type": "event"}, {"title": "Runbook Workflow API", "description": "Automation entry points for response and remediation actions.", "type": "api"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "reli.png"}}], "deliveryChannels": [{"channelId": "prod_sec-api", "change": "Introduced identity, policy, and artifact workflow improvements in Policy and Identity Control API.", "channel": {"productId": "prod_sec", "productName": "Secure Software Supply Chain", "name": "Policy and Identity Control API", "type": "api", "icon": "api.png"}}, {"channelId": "prod_sec-dashboard", "change": "Introduced platform-control posture views in Security and Compliance Posture Dashboard.", "channel": {"productId": "prod_sec", "productName": "Secure Software Supply Chain", "name": "Security and Compliance Posture Dashboard", "type": "dashboard", "icon": "dashboard.png"}}, {"channelId": "prod_obs-dashboard", "change": "Introduced incident and observability improvements in Platform Operations Dashboard.", "channel": {"productId": "prod_obs", "productName": "Reliability and Engineering Insights", "name": "Platform Operations Dashboard", "type": "dashboard", "icon": "dashboard.png"}}, {"channelId": "prod_obs-event", "change": "Introduced enriched automation events in Incident and Telemetry Event Streams.", "channel": {"productId": "prod_obs", "productName": "Reliability and Engineering Insights", "name": "Incident and Telemetry Event Streams", "type": "event", "icon": "event.png"}}], "teams": {"primaryTeamIds": ["plat-identity-guardrails", "plat-observability-reliability"], "supportingTeamIds": ["plat-delivery-automation", "plat-insights-finops"]}, "initiativeId": "initiative-platform-engineering-2026-03-03-03", "discoveryIds": ["discovery-platform-engineering-2026-03-12-02-exception-governance"], "discoveryLinks": [{"discoveryId": "discovery-platform-engineering-2026-03-12-02-exception-governance", "discoveryName": "Exception governance without ticket queues", "status": "ongoing", "landingPageIndex": 1}], "priority": "p1", "keyResultId": "", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Platform Engineering';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
