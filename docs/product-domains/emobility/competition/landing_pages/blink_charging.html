    <script>
    function resolveHashTabName() {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById('tab_' + hash) && document.getElementById('tab_content_' + hash)) {
                return hash;
            }
        }

        return '';
    }

    function resolveFallbackTabName(tabName) {
        if (tabName && document.getElementById('tab_' + tabName) && document.getElementById('tab_content_' + tabName)) {
            return tabName;
        }

        const firstTab = document.querySelector('.tablinks[id^="tab_"]');
        if (firstTab) {
            return firstTab.id.substring(4);
        }

        return '';
    }

    function initTab(tabName) {
        const resolvedTabName = resolveHashTabName() || resolveFallbackTabName(tabName);
        openTab(resolvedTabName, { updateHistory: false });
    }

    function openTab(tabName, options) {
        const resolvedTabName = resolveFallbackTabName(tabName);
        if (!resolvedTabName) {
            return '';
        }

        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }

        const shouldUpdateHistory = !options || options.updateHistory !== false;
        if (shouldUpdateHistory && window.location.hash !== '#' + resolvedTabName) {
            history.pushState({}, '', '#' + resolvedTabName);
        }

        document.getElementById('tab_content_' + resolvedTabName).style.display = 'block';
        document.getElementById('tab_' + resolvedTabName).className += ' active';
        if (typeof window.afterOpenTab === 'function') {
            window.afterOpenTab(resolvedTabName);
        }

        return resolvedTabName;
    }
</script>

            + '<div><strong>' + escapeHtml(titleCase(key)) + '</strong></div>'
            + '<div class="link-meta">' + escapeHtml(value) + '</div>'
            + '</a>'
        ).join('');
    }

    function renderStats() {
        document.getElementById('statsTableBody').innerHTML = (player.business_stats || []).map(stat => ''
            + '<tr>'
            + '<td><strong>' + escapeHtml(titleCase(stat.metric || '')) + '</strong></td>'
            + '<td>' + escapeHtml(stat.value || '') + '</td>'
            + '<td>' + escapeHtml(stat.period || '') + '</td>'
            + '<td>' + escapeHtml(titleCase(stat.scope || '')) + '</td>'
            + '<td><div>' + escapeHtml(stat.source_title || '') + '</div><div class="stat-source"><a href="' + escapeHtml(stat.source_url || '#') + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(stat.source_url || '') + '</a></div></td>'
            + '</tr>'
        ).join('');
    }

    function renderSources() {
        const seen = {};
        (player.business_stats || []).forEach(stat => {
            if (stat.source_url && !seen[stat.source_url]) {
                seen[stat.source_url] = stat.source_title || stat.source_url;
            }
        });
        document.getElementById('sourcesGrid').innerHTML = Object.entries(seen).map(([url, title]) => ''
            + '<a class="pill" href="' + escapeHtml(url) + '" target="_blank" rel="noopener noreferrer">'
            + escapeHtml(title)
            + '</a>'
        ).join('');
    }

    function renderGeography() {
        const hq = parseHq(player.hq);
        const hqRegionId = inferHqRegion(hq.country, player.primary_regions || []);
        document.getElementById('hqCity').textContent = hq.city || 'Unknown';
        document.getElementById('hqCountry').textContent = hq.country || 'Unknown';
        document.getElementById('hqRegion').textContent = (regionMeta[hqRegionId] && regionMeta[hqRegionId].label) || titleCase(hqRegionId) || 'Unknown';
        document.getElementById('geographyRegions').innerHTML = (player.primary_regions || []).map(region => '<div class="pill">' + escapeHtml((regionMeta[region] && regionMeta[region].label) || titleCase(region)) + '</div>').join('');
        document.getElementById('geographyCopy').textContent = (competitionScope.notes || [])[1] || 'Region labels reflect the operating footprint captured in the competition dataset.';

        const orderedRegions = [
            'north_america', 'latin_america', 'europe',
            'middle_east', 'africa', 'asia_pacific',
            'southeast_asia', 'china', 'india',
            'spain', 'cis', 'indonesia',
            'singapore', 'north_africa', 'pakistan'
        ];
        const activeRegions = new Set(player.primary_regions || []);
        document.getElementById('regionMap').innerHTML = orderedRegions.map(regionId => {
            const meta = regionMeta[regionId] || {label: titleCase(regionId), copy: ''};
            const classes = ['region-tile'];
            let stateClass = '';
            let stateLabel = 'Not highlighted';
            if (activeRegions.has(regionId)) {
                classes.push('region-tile-active');
                stateClass = ' region-state-active';
                stateLabel = 'Active region';
            }
            if (hqRegionId === regionId) {
                classes.push('region-tile-hq');
                stateClass = ' region-state-hq';
                stateLabel = activeRegions.has(regionId) ? 'HQ + active region' : 'Headquarters region';
            }
            return ''
                + '<div class="' + classes.join(' ') + '">'
                + '<div class="region-name">' + escapeHtml(meta.label) + '</div>'
                + '<div class="region-meta">' + escapeHtml(meta.copy) + '</div>'
                + '<div class="region-state' + stateClass + '">' + escapeHtml(stateLabel) + '</div>'
                + '</div>';
        }).join('');
    }

    renderHeroLogo();
    renderHero();
    renderSummary();
    renderOverview();
    renderLinks();
    renderStats();
    renderSources();
    renderGeography();
</script>
</body>
</html>
