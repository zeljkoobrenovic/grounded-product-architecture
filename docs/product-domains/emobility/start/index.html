<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>eMobility</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .group {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .group-title {
            font-size: 90%;
            margin-top: 4px;
            color: grey;
        }

        .app {
            margin: 10px;
            padding-top: 10px;
            border: solid lightgrey 1px;
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.2), 0 3px 10px 0 rgba(0, 0, 0, 0.19);
            display: inline-block;
            height: 320px;
            width: 220px;
            object-fit: cover;
            text-align: center;
            vertical-align: top;
            border-radius: 12px;
            background-color: white;
        }

        .name {
            font-weight: bold;
            font-size: 18px;
            margin-top: 12px;
            color: #5009DC;
            white-space: nowrap;
            overflow: hidden;
        }

        .source {
            font-size: 11px;
            color: grey;
            margin: 3px;
        }

        .description {
            font-size: 14px;
            color: grey;
            margin: 3px;
            line-height: 21px;
        }

        a {
            text-decoration: none;
        }

        .icon {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 26px;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        body {
            margin: 40px;
            text-align: center;
        }

        ::placeholder {
            color: lightgrey;
            opacity: 1;
        }

        :-ms-input-placeholder {
            color: lightgrey;
        }

        ::-ms-input-placeholder {
            color: lightgrey;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function openTab(evt, cityName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(cityName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</head>
<body>
<div style="margin-top: 10px"><img src="icons/logo.png" style="height: 124px"></div>
<div style="margin: 8px; margin-top: 0; font-size: 40px; color: #8c8c8c">eMobility</div>
<div style="margin-bottom: 36px; font-size: 20px; color: #8c8c8c">The eMobility domain covers the platforms, operations, and customer journeys required to run charging networks, roaming services, driver experiences, and fleet electrification at scale.</div>
<div class="tab">
    <button id="overview_tab" class="tablinks active" onclick="openTab(event, 'apps_tab')">Product Domain</button>
    <button id="current_tab" class="tablinks" onclick="openTab(event, 'apps')">Explorers</button>
</div>

<div id="apps_tab" class="tabcontent" style="margin: 0; padding: 6px; display: block">
    <div id="apps"></div>
</div>
<script>
    function parseStartGroup(group) {
        group = group.trim();
        if (group.startsWith('[')) {
            const label = group.replace(/\(.*/g, '').replace(/\[/g, '').replace(/\]/g, '').trim();
            const href = group.replace(/.*\(/g, '').replace(/\)/g, '').trim();
            return {label, href};
        } else {
            return {label: group};
        }
    }

    const apps = [
        {
            "group": "strategy",
            "apps": [
                {
                    "name": "Customers",
                    "link": "../customers/index.html",
                    "icon": "customers.png",
                    "description": "customer model and personas",
                    "source": "configuration file"
                }
            ]
        },
        {
            "group": "product",
            "apps": [
                {
                    "name": "Product Bricks",
                    "link": "../product-bricks/index.html",
                    "icon": "bricks.png",
                    "description": "capability map and bricks",
                    "source": "configuration file"
                },
                {
                    "name": "Products",
                    "link": "../products/index.html",
                    "icon": "delivery.png",
                    "description": "product and interface model",
                    "source": "configuration file"
                }
            ]
        },
        {
            "group": "delivery",
            "apps": [
                {
                    "name": "Goals",
                    "link": "../goals/index.html",
                    "icon": "goals.png",
                    "description": "quarterly goals and OKR links",
                    "source": "configuration file"
                },
                {
                    "name": "Initiatives",
                    "link": "../initiatives/index.html",
                    "icon": "initiative.png",
                    "description": "initiatives over the past year",
                    "source": "configuration file"
                },
                {
                    "name": "Releases",
                    "link": "../releases/index.html",
                    "icon": "releases.png",
                    "description": "releases over the past year",
                    "source": "configuration file"
                }
            ]
        }
    ];

    function update(divId) {
        let html = '';
        apps.forEach(group => {
            html += '<div class="group">';
            html += '<div class="group-title">' + group.group + '</div>';
            group.apps.forEach(app => {
                html += '<div class="app">';
                html += '    <a target="_blank" href="' + app.link + '">\n';
                html += '    <div style="height: 38px">\n';
                html += '    <div class="name">' + app.name + '</div>\n';
                if (app.source) {
                    html += '    <div class="source">source: ' + app.source + '</div>\n';
                } else {
                    html += '    <div class="source"></div>\n';
                }
                html += '    </div>\n';
                html += '    <div><img class="icon" src="icons/' + app.icon + '"></div>\n';
                html += '    <div class="description">' + app.description + '</div>\n';
                html += '    </a>\n';
                html += '    <br>\n';
                html += '</div>';
            });
            html += '</div>';
        });

        document.getElementById(divId).innerHTML = html;
    }

    function updateAll() {
        update('apps');
    }

    updateAll();
</script>
</body>
</html>
