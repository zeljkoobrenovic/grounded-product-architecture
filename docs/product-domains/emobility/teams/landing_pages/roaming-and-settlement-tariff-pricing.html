<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roaming & Settlement - Tariff Pricing</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1180px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #ecfdf5;
            color: #047857;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 38px;
            line-height: 1.2;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .mission {
            font-size: 20px;
            line-height: 1.55;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            min-width: 150px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        .stat-value {
            font-size: 28px;
            color: #1d4ed8;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
        }

        .card {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background-color: white;
            padding: 14px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .role-table {
            width: 100%;
            border-collapse: collapse;
        }

        .role-table th,
        .role-table td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: top;
            text-align: left;
        }

        .role-table th {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .kpi-list {
            margin-top: 6px;
            color: #4b5563;
            font-size: 13px;
        }

        .activity-block {
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid #d7dce1;
        }

        .activity-link {
            color: #1d4ed8;
            font-weight: bold;
        }

        .activity-meta {
            color: #6b7280;
            font-size: 12px;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #d1d5db;
            background-color: #f8fafc;
            border-radius: 10px 10px 0 0;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 12px 16px;
            transition: 0.2s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #eef2f7;
        }

        .tab button.active {
            background-color: white;
            font-weight: bold;
        }

        .tabcontent {
            display: none;
            padding: 16px;
            border: 1px solid #d1d5db;
            border-top: none;
            border-radius: 0 0 10px 10px;
            background-color: white;
        }

        .empty-state {
            color: #6b7280;
            font-style: italic;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 40px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Team">
        </td>
        <td>
            <div class="eyebrow">Team</div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div id="Mission" class="mission"></div>
<div class="tab">
    <button class="tablinks active" onclick="openTab(event, 'home-tab')">Home</button>
    <button class="tablinks" onclick="openTab(event, 'discoveries-tab')">Discoveries</button>
    <button class="tablinks" onclick="openTab(event, 'initiatives-tab')">Initiatives</button>
    <button class="tablinks" onclick="openTab(event, 'releases-tab')">Releases</button>
</div>
<div id="home-tab" class="tabcontent" style="display:block"></div>
<div id="discoveries-tab" class="tabcontent"></div>
<div id="initiatives-tab" class="tabcontent"></div>
<div id="releases-tab" class="tabcontent"></div>

<script>
    const team = {"id": "roaming-and-settlement-tariff-pricing", "name": "Roaming & Settlement - Tariff Pricing", "teamType": "stream-aligned", "teamFamilyId": "roaming-and-settlement", "teamFamilyName": "Roaming & Settlement", "orgLayer": "team", "mission": "Own interoperability, transaction routing, and billing settlement across roaming partners and eMSPs. This team specifically focuses on tariff pricing.", "primaryCustomers": [{"customerId": "emsp_product_lead", "customerName": "Head of Product at eMSP", "relatedKPIs": ["Driver NPS", "Session Reliability", "Charging Transaction Volume", "Revenue Growth"], "icon": "mobile-app.png"}], "ownedProductBricks": [{"brickId": "tpma", "brickName": "Tariff & Pricing Management", "brick": {"id": "tpma", "name": "Tariff & Pricing Management", "domain": "pricing_billing", "group": "pricing_billing", "icon": "tpma.png"}}], "supportingProductBricks": [], "dependsOnTeamIds": ["mobility-platform-foundation-gateway-developer"], "defaultSupportingTeamIds": ["mobility-platform-foundation-gateway-developer", "fleet-and-enterprise-solutions-fleet"], "staffing": {"suggestedHeadcount": 10, "staffingGuidance": "Each customer-facing team is intentionally kept near 10 FTE so it can own a narrow journey or capability slice with clear accountability and fast decision-making.", "roles": [{"role": "Product Manager", "count": 1, "responsibility": "Own the roadmap, prioritization, and KPI tradeoffs for this team scope."}, {"role": "Engineering Manager", "count": 1, "responsibility": "Lead delivery execution, staffing, and engineering health for the team."}, {"role": "Staff Engineer", "count": 1, "responsibility": "Set technical direction and guard long-term architecture quality across the team scope."}, {"role": "Backend Engineer", "count": 3, "responsibility": "Build and evolve backend services, business logic, and integration points."}, {"role": "Frontend Engineer", "count": 1, "responsibility": "Build user-facing workflows and maintain a high-quality interaction model."}, {"role": "QA / Test Automation Engineer", "count": 1, "responsibility": "Own regression depth, release confidence, and automated quality coverage."}, {"role": "Product Designer", "count": 1, "responsibility": "Shape the end-to-end workflow, information architecture, and UX quality."}, {"role": "Data / Domain Specialist", "count": 1, "responsibility": "Bridge product decisions with domain semantics, data quality, and operational fit."}]}, "relatedDiscoveries": [], "groupId": "value-streams-roaming-and-settlement", "groupName": "Value Streams / Roaming & Settlement", "groupLeadership": {"orgLayer": "group", "includedInDomainHeadcountEstimate": false, "purpose": "Provide cross-team direction, architectural coherence, and craft leadership for the teams in this group.", "leadershipModel": "Directors own the operating cadence and people leadership for the group; principal roles work as group-level individual contributors who coach teams and shape standards.", "suggestedHeadcount": 5, "roles": [{"role": "Product Director", "count": 1, "responsibility": "Own the strategy, portfolio tradeoffs, and outcome accountability across the team group.", "reportsTo": "Domain Head of Product / CPO"}, {"role": "Engineering Director", "count": 1, "responsibility": "Own engineering execution, system health, and staffing quality across the team group.", "reportsTo": "Domain Head of Engineering / CTO"}, {"role": "Principal Engineer", "count": 1, "responsibility": "Provide cross-team architecture leadership and coach senior engineers across the group.", "reportsTo": "Engineering Director"}, {"role": "Principal Product Designer", "count": 1, "responsibility": "Drive cross-team UX coherence, workflow quality, and design standards across the group.", "reportsTo": "Product Director"}, {"role": "Principal Data / Domain Architect", "count": 1, "responsibility": "Shape the shared domain model, KPI semantics, and analytical consistency used by the teams in the group.", "reportsTo": "Product Director"}]}, "dependsOnTeams": [{"id": "mobility-platform-foundation-gateway-developer", "name": "Mobility Platform Foundation - Gateway Developer", "teamType": "platform", "groupId": "platform", "groupName": "Platform"}], "defaultSupportingTeams": [{"id": "mobility-platform-foundation-gateway-developer", "name": "Mobility Platform Foundation - Gateway Developer", "teamType": "platform", "groupId": "platform", "groupName": "Platform"}, {"id": "fleet-and-enterprise-solutions-fleet", "name": "Fleet & Enterprise Solutions - Fleet", "teamType": "stream-aligned", "groupId": "value-streams-fleet-and-enterprise-solutions", "groupName": "Value Streams / Fleet & Enterprise Solutions"}], "relatedInitiatives": [], "relatedReleases": []};
    const domainName = 'eMobility';

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderActivity(items, sectionType) {
        if (!items || !items.length) {
            return '<div class="empty-state">No ' + escapeHtml(sectionType.toLowerCase()) + ' linked to this team.</div>';
        }
        let html = '';
        items.forEach(item => {
            html += '<div class="activity-block">';
            html += '<div class="activity-link">' + linkOf('../../' + item.sectionFolder + '/landing_pages/' + item.landingPageKey + '.html', item.description || sectionType, 'activity-link') + '</div>';
            html += '<div class="activity-meta">' + escapeHtml(item.date || '') + ' | ' + escapeHtml(item.teamRoleLabel || '') + '</div>';
            if (item.how) {
                html += '<div class="activity-meta" style="margin-top:4px">' + escapeHtml(item.how) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function openTab(evt, tabId) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        document.getElementById(tabId).style.display = 'block';
        evt.currentTarget.className += ' active';
    }

    document.getElementById('Title').innerHTML = escapeHtml(team.name || 'Team');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(team.groupName || '') + ' | ' + escapeHtml(team.teamType || '');
    document.getElementById('Mission').innerHTML = escapeHtml(team.mission || '');

    const staffing = team.staffing || {};
    const groupLeadership = team.groupLeadership || {};

    let homeHtml = '';
    homeHtml += '<div class="section"><div class="section-title">Summary</div><div class="stats">';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String(staffing.suggestedHeadcount || 0)) + '</div><div class="stat-label">Suggested Headcount</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((staffing.roles || []).length)) + '</div><div class="stat-label">Role Blocks</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String(groupLeadership.suggestedHeadcount || 0)) + '</div><div class="stat-label">Group Leadership Headcount</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((groupLeadership.roles || []).length)) + '</div><div class="stat-label">Group Role Blocks</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((team.primaryCustomers || []).length)) + '</div><div class="stat-label">Primary Customers</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((team.ownedProductBricks || []).length)) + '</div><div class="stat-label">Owned Bricks</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((team.relatedDiscoveries || []).length)) + '</div><div class="stat-label">Discoveries</div></div>';
    homeHtml += '<div class="stat"><div class="stat-value">' + escapeHtml(String((team.relatedInitiatives || []).length + (team.relatedReleases || []).length)) + '</div><div class="stat-label">Linked Delivery Items</div></div>';
    homeHtml += '</div></div>';

    if (staffing.staffingGuidance || (staffing.roles || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Staffing Model</div>';
        if (staffing.staffingGuidance) {
            homeHtml += '<div style="margin-bottom:12px; line-height:1.5">' + escapeHtml(staffing.staffingGuidance) + '</div>';
        }
        homeHtml += '<table class="role-table"><thead><tr><th>Role</th><th>Count</th><th>Responsibility</th></tr></thead><tbody>';
        (staffing.roles || []).forEach(role => {
            homeHtml += '<tr><td>' + escapeHtml(role.role) + '</td><td>' + escapeHtml(String(role.count || 0)) + '</td><td>' + escapeHtml(role.responsibility || '') + '</td></tr>';
        });
        homeHtml += '</tbody></table></div>';
    }

    if (team.groupLeadership && ((team.groupLeadership.roles || []).length || team.groupLeadership.leadershipModel)) {
        homeHtml += '<div class="section"><div class="section-title">Group Leadership</div>';
        if (team.groupLeadership.purpose) {
            homeHtml += '<div style="margin-bottom:12px; line-height:1.5">' + escapeHtml(team.groupLeadership.purpose) + '</div>';
        }
        if (team.groupLeadership.leadershipModel) {
            homeHtml += '<div style="margin-bottom:12px; line-height:1.5; color:#6b7280">' + escapeHtml(team.groupLeadership.leadershipModel) + '</div>';
        }
        homeHtml += '<table class="role-table"><thead><tr><th>Role</th><th>Count</th><th>Responsibility</th><th>Reports To</th></tr></thead><tbody>';
        (team.groupLeadership.roles || []).forEach(role => {
            homeHtml += '<tr><td>' + escapeHtml(role.role) + '</td><td>' + escapeHtml(String(role.count || 0)) + '</td><td>' + escapeHtml(role.responsibility || '') + '</td><td>' + escapeHtml(role.reportsTo || '') + '</td></tr>';
        });
        homeHtml += '</tbody></table></div>';
    }

    if ((team.primaryCustomers || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Primary Customers and KPIs</div><div class="grid">';
        (team.primaryCustomers || []).forEach(customer => {
            homeHtml += '<div class="card">';
            homeHtml += '<div class="pill"><img class="linked-icon" src="../../customers/icons/' + escapeHtml(customer.icon || 'customer.png') + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">' + linkOf('../../customers/landing_pages/' + customer.customerId + '.html', customer.customerName || customer.customerId, '') + '</div>';
            if ((customer.relatedKPIs || []).length) {
                homeHtml += '<div class="kpi-list">' + (customer.relatedKPIs || []).map(kpi => escapeHtml(kpi)).join('<br>') + '</div>';
            }
            homeHtml += '</div>';
        });
        homeHtml += '</div></div>';
    }

    if ((team.ownedProductBricks || []).length || (team.supportingProductBricks || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Product Brick Scope</div>';
        if ((team.ownedProductBricks || []).length) {
            homeHtml += '<div style="margin-bottom:8px; color:#6b7280">Owned product bricks</div>';
            (team.ownedProductBricks || []).forEach(brick => {
                homeHtml += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml((brick.brick || {}).icon || 'capability_404.png') + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brickName || brick.brickId, '') + '</div>';
            });
        }
        if ((team.supportingProductBricks || []).length) {
            homeHtml += '<div style="margin:14px 0 8px 0; color:#6b7280">Supporting product bricks</div>';
            (team.supportingProductBricks || []).forEach(brick => {
                homeHtml += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml((brick.brick || {}).icon || 'capability_404.png') + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brickName || brick.brickId, '') + '</div>';
            });
        }
        homeHtml += '</div>';
    }

    if ((team.dependsOnTeams || []).length || (team.defaultSupportingTeams || []).length) {
        homeHtml += '<div class="section"><div class="section-title">Team Relationships</div>';
        if ((team.dependsOnTeams || []).length) {
            homeHtml += '<div style="margin-bottom:8px; color:#6b7280">Depends on</div>';
            (team.dependsOnTeams || []).forEach(otherTeam => {
                homeHtml += '<div class="pill">' + linkOf(otherTeam.id + '.html', otherTeam.name, '') + '</div>';
            });
        }
        if ((team.defaultSupportingTeams || []).length) {
            homeHtml += '<div style="margin:14px 0 8px 0; color:#6b7280">Default supporting teams</div>';
            (team.defaultSupportingTeams || []).forEach(otherTeam => {
                homeHtml += '<div class="pill">' + linkOf(otherTeam.id + '.html', otherTeam.name, '') + '</div>';
            });
        }
        homeHtml += '</div>';
    }
    document.getElementById('home-tab').innerHTML = homeHtml;
    document.getElementById('discoveries-tab').innerHTML = renderActivity(team.relatedDiscoveries || [], 'Discoveries');
    document.getElementById('initiatives-tab').innerHTML = renderActivity(team.relatedInitiatives || [], 'Initiatives');
    document.getElementById('releases-tab').innerHTML = renderActivity(team.relatedReleases || [], 'Releases');
</script>
</body>
</html>
