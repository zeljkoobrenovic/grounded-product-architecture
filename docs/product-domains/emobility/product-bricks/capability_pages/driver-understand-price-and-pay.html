<div id="Header"></div>

<div class="page">

    <div id="ReleasesTab" class="tabcontent"></div>
</div>

<script>
    let headerHtml = '<div class="nav-strip">';
    all_capabilities.forEach(item => {
        const activeClass = item.id === capability.id ? 'nav-link active' : 'nav-link';
        headerHtml += '<a class="' + activeClass + '" href="' + escapeHtml(item.id) + '.html">' + escapeHtml(item.name || item.id) + '</a>';
    });
    headerHtml += '</div>';

    headerHtml += '<div class="page">';
    headerHtml += '<div class="header">';
    headerHtml += '<img class="header-icon" src="../icons/capability_404.png" alt="" onerror="this.onerror=null;this.src=\'../icons/logo.png\'">';
    headerHtml += '<div>';
    headerHtml += '<div class="header-meta">' + escapeHtml(capability.group || 'Capability') + ' / <span style="color:#c2410c;font-weight:bold;">' + escapeHtml((capability.id || '').toUpperCase()) + '</span></div>';
    headerHtml += '<div class="header-title">' + escapeHtml(capability.name || capability.id) + '</div>';
    headerHtml += '<div class="header-copy">' + escapeHtml(capability.description || '') + '</div>';
    headerHtml += '<div class="header-copy"><a href="../index.html#Capabilities">Back to capability catalog</a></div>';
    headerHtml += '</div></div></div>';
    document.getElementById('Header').innerHTML = headerHtml;

    function renderOverview() {
        let html = '';
        html += '<div class="summary">';
        html += '<div class="summary-stat"><div class="summary-stat-value">' + (capability.flows || []).length + '</div><div class="summary-stat-label">Flows</div></div>';
        html += '<div class="summary-stat"><div class="summary-stat-value">' + (capability.outcomes || []).length + '</div><div class="summary-stat-label">Outcomes</div></div>';
        html += '<div class="summary-stat"><div class="summary-stat-value">' + related_bricks.length + '</div><div class="summary-stat-label">Supporting Bricks</div></div>';
        html += '<div class="summary-stat"><div class="summary-stat-value">' + ((capability.externalSystemsThisCapabilityDependsOn || []).length) + '</div><div class="summary-stat-label">External Systems</div></div>';
        html += '</div>';

        html += '<div class="section"><div class="section-title">Flows Facilitated</div>';
        if (!(capability.flows || []).length) {
            html += '<div class="muted">No flows listed for this capability.</div>';
        } else {
            html += '<div class="card"><ul class="list">' + capability.flows.map(flow => '<li>' + escapeHtml(flow) + '</li>').join('') + '</ul></div>';
        }
        html += '</div>';

        html += '<div class="section"><div class="section-title">Outcomes</div>';
        if (!(capability.outcomes || []).length) {
            html += '<div class="muted">No outcomes listed for this capability.</div>';
        } else {
            html += '<div class="card"><ul class="list">' + capability.outcomes.map(outcome => '<li>' + escapeHtml(outcome) + '</li>').join('') + '</ul></div>';
        }
        html += '</div>';

        html += '<div class="section"><div class="section-title">Supporting Product Bricks</div>';
        if (!related_bricks.length) {
            html += '<div class="muted">No linked product bricks.</div>';
        } else {
            html += '<div class="card-grid">';
            related_bricks.forEach(brick => {
                html += '<a class="card" target="_blank" rel="noopener noreferrer" href="../landing_pages/' + escapeHtml(brick.id) + '.html">';
                html += '<div class="card-meta">' + escapeHtml((brick.group || brick.domain || 'Product Brick')) + '</div>';
                html += '<div class="card-title">' + escapeHtml(brick.name || brick.id) + '</div>';
                html += '<div class="card-copy">' + escapeHtml(brick.description || '') + '</div>';
                html += '</a>';
            });
            html += '</div>';
        }
        html += '</div>';

        html += '<div class="section"><div class="section-title">External Systems</div>';
        if (!((capability.externalSystemsThisCapabilityDependsOn || []).length)) {
            html += '<div class="muted">No external systems listed.</div>';
        } else {
            html += '<div class="pill-row">';
            capability.externalSystemsThisCapabilityDependsOn.forEach(system => {
                html += '<span class="pill"><img src="../icons/external-system.png" alt="" onerror="this.onerror=null;this.src=\'../icons/logo.png\'"><span>' + escapeHtml(system.system || 'External System') + '</span></span>';
            });
            html += '</div>';
        }
        html += '</div>';

        html += '<div class="section"><div class="section-title">Linked Products</div>';
        if (!linked_products.length) {
            html += '<div class="muted">No linked products were inferred from the supporting bricks.</div>';
        } else {
            html += '<div class="card-grid">';
            linked_products.forEach(product => {
                html += '<a class="card" target="_blank" rel="noopener noreferrer" href="../../products/landing_pages/' + escapeHtml(product.id) + '.html">';
                html += '<div class="card-meta">' + escapeHtml(product.type || 'Product') + '</div>';
                html += '<div class="card-title">' + escapeHtml(product.name || product.id) + '</div>';
                html += '<div class="card-copy">' + escapeHtml(product.whyUsed || '') + '</div>';
                html += '</a>';
            });
            html += '</div>';
        }
        html += '</div>';

        html += '<div class="section"><div class="section-title">Related Teams</div>';
        if (!related_teams.length) {
            html += '<div class="muted">No teams were inferred from the supporting bricks.</div>';
        } else {
            html += '<div class="card-grid">';
            related_teams.forEach(team => {
                html += '<a class="card" target="_blank" rel="noopener noreferrer" href="../../teams/landing_pages/' + escapeHtml(team.teamId) + '.html">';
                html += '<div class="card-meta">' + escapeHtml(team.roleLabel || team.teamType || 'Team') + '</div>';
                html += '<div class="card-title">' + escapeHtml(team.teamName || team.teamId) + '</div>';
                html += '<div class="card-copy">' + escapeHtml(team.groupName || '') + '</div>';
                html += '</a>';
            });
            html += '</div>';
        }
        html += '</div>';

        html += '<div class="section"><div class="section-title">Supported Customer Jobs</div>';
        if (!supported_jobs.length) {
            html += '<div class="muted">No customer jobs were inferred from the supporting bricks.</div>';
        } else {
            html += '<div class="card-grid">';
            supported_jobs.forEach(job => {
                html += '<div class="card">';
                html += '<div class="card-meta">' + escapeHtml(job.customerGroup || '') + (job.productName ? ' | ' + escapeHtml(job.productName) : '') + '</div>';
                html += '<div class="card-title">' + escapeHtml(job.jobName || job.jobId) + '</div>';
                html += '<div class="card-copy">' + escapeHtml(job.jobOutcome || job.jobWhatItIs || '') + '</div>';
                if ((job.usedInSteps || []).length) {
                    html += '<ul class="list">' + job.usedInSteps.map(step => '<li>' + escapeHtml(step.step || step.description || '') + '</li>').join('') + '</ul>';
                }
                html += '</div>';
            });
            html += '</div>';
        }
        html += '</div>';

        document.getElementById('OverviewTab').innerHTML = html;
    }

    function renderDependencies() {
        const container = document.getElementById('DependenciesTab');
        const capabilityId = 'capability_' + (capability.id || 'unknown').replace(/[^a-zA-Z0-9]/g, '_');
        let chart = 'flowchart LR\\n';
        chart += capabilityId + '["' + escapeHtml(capability.name || capability.id) + '"]\\n';
        related_bricks.forEach(brick => {
            const brickId = 'brick_' + brick.id.replace(/[^a-zA-Z0-9]/g, '_');
            chart += brickId + '["' + escapeHtml(brick.name || brick.id) + '"]\\n';
            chart += capabilityId + ' --> ' + brickId + '\\n';
        });
        (capability.externalSystemsThisCapabilityDependsOn || []).forEach((system, index) => {
            const systemId = 'external_' + index;
            chart += systemId + '["' + escapeHtml(system.system || 'External System') + '"]\\n';
            chart += capabilityId + ' --> ' + systemId + '\\n';
        });
        container.innerHTML = '<div class="dependency-diagram"><div class="mermaid">' + chart + '</div></div>';
        mermaid.run({querySelector: '#DependenciesTab .mermaid'}).catch(error => console.error('Failed to render dependency diagram', error));
    }

    function renderActivityTab(elementId, items, emptyText) {
        let html = '';
        if (!items.length) {
            html = '<div class="muted">' + emptyText + '</div>';
        } else {
            html = '<div class="card-grid">';
            items.forEach(item => {
                html += '<div class="card">';
                html += '<div class="card-meta">' + escapeHtml(item.date || item.timeline || item.status || '') + '</div>';
                html += '<div class="card-title">' + escapeHtml(item.name || item.title || item.description || 'Item') + '</div>';
                html += '<div class="card-copy">' + escapeHtml(item.description || item.summary || '') + '</div>';
                html += '</div>';
            });
            html += '</div>';
        }
        document.getElementById(elementId).innerHTML = html;
    }

    renderOverview();
    renderActivityTab('InitiativesTab', initiatives, 'No initiatives were inferred from the supporting bricks.');
    renderActivityTab('ReleasesTab', releases, 'No releases were inferred from the supporting bricks.');
</script>
