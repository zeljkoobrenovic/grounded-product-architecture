<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Capabilities</title>
    <style type="text/css" media="all">
        :root {
            --text-color: #111;
            --surface-muted: #f0f0f0;
            --surface-fallback: #f3f3f3;
            --group-border: lightgrey;
            --card-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
            --highlight-color: crimson;
        }

        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            color: var(--text-color);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .map {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .map-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            overflow-x: auto;
        }

        .domain-column {
            min-width: 220px;
        }

        .domain-title {
            background-color: var(--surface-muted);
            font-size: 12px;
            padding: 4px;
            text-align: center;
        }

        .domain-groups {
            text-align: center;
        }

        .group {
            border: 1px dashed var(--group-border);
            display: inline-block;
            margin: 4px;
            vertical-align: top;
        }

        .group-title {
            font-size: 80%;
            margin-top: 12px;
        }

        .group-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .brick-card {
            margin: 4px;
            padding: 3px;
            font-size: 12px;
            width: 140px;
            max-width: 144px;
            overflow: hidden;
            background-color: var(--surface-fallback);
            box-shadow: var(--card-shadow);
            text-align: left;
            min-height: 52px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
            border: 1px solid white;
        }

        .brick-card.highlighted {
            border: 4px solid var(--highlight-color);
        }

        .brick-icon {
            width: 36px;
        }

        .brick-name {
            overflow: hidden;
            width: calc(100% - 40px);
        }

        .legend {
            width: 160px;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 80%;
            display: inline-block;
        }

        .legend-title {
            margin-bottom: 3px;
        }

        .legend-item {
            padding: 8px;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>

<div id="Current"></div>

<script>
    const config = {"types": [{"id": "full-stack", "name": "full-stack capability", "color": "#b6d7a8ff"}, {"id": "service", "name": "service", "color": "#fff2ccff"}, {"id": "integration", "name": "complex integration", "color": "#ead1dcff"}, {"id": "development", "name": "development/design", "color": "#c9daf8ff"}, {"id": "other", "name": "other", "color": "#f3f3f3ff"}]};
    const bricks = [{"domain": "network_operations", "group": "network_operations", "type": "full-stack", "id": "cpcp", "name": "Charge Point Connectivity & Protocol Gateway", "description": "Securely connects to chargers via OCPP/OCPP-compliant protocols and manages real-time device interactions."}, {"domain": "network_operations", "group": "network_operations", "type": "full-stack", "id": "cpma", "name": "Charge Point Management", "description": "Platform tools for commissioning, configuring, monitoring, and maintaining large inventories of EV charge points and network assets. It supports multi-tenant and global scale management. (CP Management product) :contentReference[oaicite:1]{index=1}"}, {"domain": "network_operations", "group": "network_operations", "type": "full-stack", "id": "maro", "name": "Monitoring, Alarms & Remote Operations", "description": "Provides real-time visibility, diagnostics, alerting, and remote actions across deployed infrastructure."}, {"domain": "network_operations", "group": "network_operations", "type": "full-stack", "id": "seor", "name": "Session Orchestration", "description": "Manages charging sessions end-to-end including start/stop actions, status correlation, and session data aggregation."}, {"domain": "identity_access", "group": "identity_access", "type": "full-stack", "id": "dase", "name": "Driver Authorization Service", "description": "Validates tokens, RFID users, and credentials to authorize EV drivers to start charging with policy checks."}, {"domain": "identity_access", "group": "identity_access", "type": "full-stack", "id": "iama", "name": "Identity & Access Management", "description": "Handles multi-tenant user identities, roles, permissions, and access control for operators, partners, and admins."}, {"domain": "identity_access", "group": "identity_access", "type": "full-stack", "id": "alpu", "name": "Accessibility & Location Publishing", "description": "Manages visibility and accessibility of charge points for drivers and partners, including external APIs."}, {"domain": "network_operations", "group": "network_operations", "type": "full-stack", "id": "flma", "name": "Fleet Management", "description": "Tools tailored to support charging operations for vehicle fleets, including usage tracking, driver assignments, and billing incentives. (Fleet Management product) :contentReference[oaicite:2]{index=2}"}, {"domain": "smart_charging", "group": "smart_charging", "type": "full-stack", "id": "scen", "name": "Smart Charging Engine", "description": "Optimizes charging power and schedules based on grid capacity, renewable generation, and site constraints. (Smart Charging product) :contentReference[oaicite:3]{index=3}"}, {"domain": "smart_charging", "group": "smart_charging", "type": "full-stack", "id": "semc", "name": "Site Energy Model & Constraints Management", "description": "Models site grid constraints, energy usage, and power distribution preferences for optimized charging."}, {"domain": "pricing_billing", "group": "pricing_billing", "type": "full-stack", "id": "tpma", "name": "Tariff & Pricing Management", "description": "Supports flexible tariff creation, pricing schemes, dynamic pricing, and contract-level rate plans. (Billing & Payments product) :contentReference[oaicite:4]{index=4}"}, {"domain": "pricing_billing", "group": "pricing_billing", "type": "full-stack", "id": "mrtl", "name": "Metering, Rating & Transaction Ledger", "description": "Converts metered energy data into billing quantities, applies tariffs, and maintains a financial ledger for reconciliation."}, {"domain": "pricing_billing", "group": "pricing_billing", "type": "full-stack", "id": "bise", "name": "Billing, Invoicing & Settlement", "description": "Generates invoices, manages payments, supports pre/post-paid models and settlement between parties. (Billing & Payments product) :contentReference[oaicite:5]{index=5}"}, {"domain": "roaming", "group": "roaming", "type": "full-stack", "id": "rhig", "name": "Roaming Hub & Interoperability Gateway", "description": "Connects CPOs and eMSPs enabling seamless roaming, supporting multiple roaming standards to extend driver access. (Roaming product) :contentReference[oaicite:6]{index=6}"}, {"domain": "roaming", "group": "roaming", "type": "full-stack", "id": "pama", "name": "Partner Management", "description": "Onboards roaming partners, manages credentials, routing rules, and agreements for cross-network services."}, {"domain": "roaming", "group": "roaming", "type": "full-stack", "id": "rted", "name": "Roaming Transaction Exchange & Dispute Handling", "description": "Handles roaming session exchanges (CDRs), validations, settlements, and dispute workflows."}, {"domain": "customer_experience", "group": "customer_experience", "type": "full-stack", "id": "edap", "name": "EV Driver App", "description": "Driver-facing mobile/web application for locating chargers, session control, account management, and payments. (EV Driver app product) :contentReference[oaicite:7]{index=7}"}, {"domain": "platform_foundation", "group": "platform_foundation", "type": "full-stack", "id": "agdp", "name": "API Gateway & Developer Platform", "description": "Unified APIs, keys, throttling, and documentation for external integrations and partner ecosystems."}, {"domain": "platform_foundation", "group": "platform_foundation", "type": "full-stack", "id": "etpi", "name": "Eventing & Telemetry Pipeline", "description": "Streams charger telemetry, session events, and roaming messages for real-time processing and analytics."}, {"domain": "platform_foundation", "group": "platform_foundation", "type": "full-stack", "id": "oads", "name": "Operational & Analytical Data Stores", "description": "Transactional and analytical data stores for reporting, KPIs, business intelligence, and forecasting."}, {"domain": "platform_foundation", "group": "platform_foundation", "type": "full-stack", "id": "oima", "name": "Observability & Incident Management", "description": "Platform-wide metrics, logging, alerting, and incident response to ensure reliability and uptime."}, {"domain": "platform_foundation", "group": "platform_foundation", "type": "full-stack", "id": "scau", "name": "Security, Compliance & Audit", "description": "Manages secure communications, certificates, compliance auditing, and platform security controls."}, {"domain": "enterprise_integration", "group": "enterprise_integration", "type": "full-stack", "id": "eila", "name": "Enterprise Integration Layer", "description": "Connectors and canonical models to integrate with ERP, CRM, payment systems, and enterprise platforms."}, {"domain": "enterprise_integration", "group": "enterprise_integration", "type": "full-stack", "id": "ccma", "name": "Contract & Customer Management", "description": "Manages customer accounts, contractual relationships, tokens, and customer lifecycle."}, {"domain": "platform_foundation", "group": "platform_foundation", "type": "full-stack", "id": "anre", "name": "Analytics & Reporting", "description": "Dashboards, performance metrics, financial and operational reporting across the platform."}];

    const typeColorMap = {};

    config.types.forEach(type => {
        typeColorMap[type.id.toLowerCase()] = type;
        typeColorMap[type.name.toLowerCase()] = type;
    });

    function colorOf(type) {
        if (type && typeColorMap[type.toLowerCase()]) {
            return typeColorMap[type.toLowerCase()].color;
        }
        return 'var(--surface-fallback)';
    }

</script>

<script>
    function normalizeBricks(items) {
        const maxRows = 1000;

        return items.map(item => {
            const rowNumber = Number(item.row) || 1;

            return {
                ...item,
                row: Math.min(rowNumber, maxRows),
                domain: item.domain || 'Other',
                group: item.group || 'Ungrouped',
                color: colorOf(item.type),
                isHighlighted: Boolean(item.name && item.name.includes('*'))
            };
        });
    }

    function groupBricks(items) {
        const rows = new Map();

        items.forEach(item => {
            if (!rows.has(item.row)) {
                rows.set(item.row, new Map());
            }

            const domains = rows.get(item.row);
            if (!domains.has(item.domain)) {
                domains.set(item.domain, new Map());
            }

            const groups = domains.get(item.domain);
            if (!groups.has(item.group)) {
                groups.set(item.group, []);
            }

            groups.get(item.group).push(item);
        });

        return Array.from(rows.entries())
            .sort((left, right) => left[0] - right[0])
            .map(([, domains]) => Array.from(domains.entries()).map(([domain, groups]) => ({
                domain,
                groups: Array.from(groups.entries()).map(([group, itemsInGroup]) => ({
                    name: group,
                    items: itemsInGroup
                }))
            })));
    }

    function renderBrick(item) {
        const brickCard = `
            <div class="brick-card${item.isHighlighted ? ' highlighted' : ''}" style="background-color: ${item.color}">
                <img class="brick-icon" src="icons/${item.id}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                <div class="brick-name">${item.name || ''}</div>
            </div>
        `;

        if (!item.id) {
            return brickCard;
        }

        return `<a target="_blank" href="landing_pages/${item.id}.html">${brickCard}</a>`;
    }

    function renderGroup(group) {
        return `
            <div class="group">
                <div class="group-title">${group.name}</div>
                <div class="group-items">${group.items.map(renderBrick).join('')}</div>
            </div>
        `;
    }

    function renderDomain(domain) {
        return `
            <section class="domain-column">
                <div class="domain-title">${domain.domain}</div>
                <div class="domain-groups">${domain.groups.map(renderGroup).join('')}</div>
            </section>
        `;
    }

    function renderMap(items) {
        return `
            <div class="map">
                ${groupBricks(normalizeBricks(items)).map(row => `
                    <div class="map-row">
                        ${row.map(renderDomain).join('')}
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderLegend() {
        return `
            <div class="legend-title">Legend:</div>
            ${config.types.map(type => `
                <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
            `).join('')}
        `;
    }

    function update() {
        document.getElementById('Current').innerHTML = renderMap(bricks);
        document.getElementById('Legend').innerHTML = renderLegend();
    }

</script>
<div class="legend" id="Legend">
</div>

<script>
    update();
</script>

</body>
</html>
