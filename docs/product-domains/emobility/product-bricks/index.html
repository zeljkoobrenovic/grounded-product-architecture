        a {
            color: inherit;
            text-decoration: none;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {

            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
            max-width: 960px;
            line-height: 1.4;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }

        .bricks-panel {
            padding: 18px;
            background-color: white;
        }

        .map {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .map-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            overflow-x: auto;
        }

        .domain-column {
            min-width: 220px;
            width: 100%;
        }

        .domain-title {
            background-color: var(--surface-muted);
            font-size: 12px;
            padding: 4px;
            text-align: center;
        }

        .domain-groups {
            text-align: center;
        }

        .group {
            border: 1px dashed var(--group-border);
            display: inline-block;
            margin: 4px;
            vertical-align: top;
        }

        .group-title {
            font-size: 80%;
            margin-top: 12px;
        }

        .group-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .brick-card {
            margin: 4px;
            padding: 3px;
            font-size: 12px;
            width: 140px;
            max-width: 144px;
            overflow: hidden;
            background-color: var(--surface-fallback);
            box-shadow: var(--card-shadow);
            text-align: left;
            min-height: 52px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
            border: 1px solid white;
        }

        .brick-card.highlighted {
            border: 4px solid var(--highlight-color);
        }

        .brick-icon {
            width: 36px;
        }

        .brick-name {
            overflow: hidden;
            width: calc(100% - 40px);
        }

        .legend {
            width: 160px;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 80%;
            display: inline-block;
        }

        .legend-title {
            margin-bottom: 3px;
        }

        .legend-item {
            padding: 8px;
        }

        const bricksMetadata = bricksPayload.metadata || {};
        const bricks = bricksPayload.bricks || [];
        const brickRendering = bricksMetadata.rendering || bricksMetadata.render || {};
        const brickTypes = bricksMetadata.types || [];
        const typeColorMap = {};

        brickTypes.forEach(type => {
            typeColorMap[type.id.toLowerCase()] = type;
            typeColorMap[type.name.toLowerCase()] = type;
        });

        function colorOf(type) {
            if (type && typeColorMap[type.toLowerCase()]) {
                return typeColorMap[type.toLowerCase()].color;
            }
            return 'var(--surface-fallback)';
        }

        function normalizeBrick(item) {
            return {
                ...item,
                color: colorOf(item.type),
                isHighlighted: Boolean(item.name && item.name.includes('*'))
            };
        }

        function normalizeGroup(group) {
            return {
                ...group,
                children: (group.children || []).map(child => {
                    if ((child.type || '').toLowerCase() === 'group') {
                        return normalizeGroup(child);
                    }
                    return normalizeBrick(child);
                })
            };
        }

        function renderBrick(item) {
            const brickCard = `
                <div class="brick-card${item.isHighlighted ? ' highlighted' : ''}" style="background-color: ${item.color}">
                    <img class="brick-icon" src="icons/${item.id}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                    <div class="brick-name">${item.name || ''}</div>
                </div>
            `;

            if (!item.id) {
                return brickCard;
            }

            return `<a target="_blank" href="landing_pages/${item.id}.html">${brickCard}</a>`;
        }

        function renderGroup(group) {
            return `
                <div class="group">
                    <div class="group-title">${group.name}</div>
                    <div class="group-items">${(group.children || []).map(renderBrick).join('')}</div>
                </div>
            `;
        }

        function renderDomain(domain) {
            return `
                <section class="domain-column">
                    <div class="domain-title">${domain.name}</div>
                    <div class="domain-groups">${(domain.children || []).map(renderGroup).join('')}</div>
                </section>
            `;
        }

        function buildGroupRowLookup() {
            const lookup = {};
            ((brickRendering.rows) || []).forEach(rowInfo => {
                const row = Number(rowInfo.row) || 1;
                (rowInfo.brickIds || []).forEach(brickId => {
                    lookup[String(brickId)] = row;
                });
            });
            return lookup;
        }

        function applyRowsToHierarchy(items, groupRows) {
            return items.map(group => ({
                ...normalizeGroup(group),
                row: groupRows[String(group.id)] || Number(group.row) || 1
            }));
        }

        function filterHierarchyForRow(items, targetRow) {
            return items.filter(group => group.row === targetRow);
        }

        function renderMap(items) {
            const groupRows = buildGroupRowLookup();
            const normalizedItems = applyRowsToHierarchy(items, groupRows);
            const rows = Array.from(new Set(
                Object.values(groupRows)
                    .map(value => Number(value) || 1)
                    .concat([1])
            )).sort((left, right) => left - right);

            console.log(normalizedItems)
            console.log(rows)

            return `
                <div class="map">
                    ${rows.map(row => {
                        const rowItems = filterHierarchyForRow(normalizedItems, row);
                        if (!rowItems.length) {
                            return '';
                        }
                        return `
                            <div class="map-row" data-row="${row}">
                                ${rowItems.map(renderDomain).join('')}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderLegend() {
            return `
                <div class="legend-title">Legend:</div>
                ${brickTypes.map(type => `
                    <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
                `).join('')}
            `;
        }

        function updateBricksView() {
            document.getElementById('Current').innerHTML = renderMap(bricks);
            document.getElementById('Legend').innerHTML = renderLegend();
        }
    </script>
