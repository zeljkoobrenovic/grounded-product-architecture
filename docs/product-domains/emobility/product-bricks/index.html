        function initTab() {

        function openTab(tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            history.pushState({}, "", '#' + tabName);
            document.getElementById(tabName).style.display = "block";
            document.getElementById('tab_' + tabName).className += " active";
        }

        const bricksPayload = {"metadata": {"title": "Product Bricks", "description": "Hierarchical product brick map for the emobility domain.", "types": [{"id": "full-stack", "name": "full-stack capability", "color": "#b6d7a8ff"}, {"id": "service", "name": "service", "color": "#fff2ccff"}, {"id": "integration", "name": "complex integration", "color": "#ead1dcff"}, {"id": "development", "name": "development/design", "color": "#c9daf8ff"}, {"id": "other", "name": "other", "color": "#f3f3f3ff"}]}, "bricks": [{"id": "network-operations", "name": "network_operations", "type": "group", "description": "", "children": [{"id": "network-operations-network-operations", "name": "network_operations", "type": "group", "description": "", "children": [{"id": "cpcp", "name": "Charge Point Connectivity & Protocol Gateway", "type": "integration", "description": "Securely connects to chargers via OCPP/OCPP-compliant protocols and manages real-time device interactions.", "children": []}, {"id": "cpma", "name": "Charge Point Management", "type": "service", "description": "Platform tools for commissioning, configuring, monitoring, and maintaining large inventories of EV charge points and network assets. It supports multi-tenant and global scale management. (CP Management product) :contentReference[oaicite:1]{index=1}", "children": []}, {"id": "maro", "name": "Monitoring, Alarms & Remote Operations", "type": "service", "description": "Provides real-time visibility, diagnostics, alerting, and remote actions across deployed infrastructure.", "children": []}, {"id": "seor", "name": "Session Orchestration", "type": "service", "description": "Manages charging sessions end-to-end including start/stop actions, status correlation, and session data aggregation.", "children": []}, {"id": "flma", "name": "Fleet Management", "type": "service", "description": "Tools tailored to support charging operations for vehicle fleets, including usage tracking, driver assignments, and billing incentives. (Fleet Management product) :contentReference[oaicite:2]{index=2}", "children": []}]}]}, {"id": "identity-access", "name": "identity_access", "type": "group", "description": "", "children": [{"id": "identity-access-identity-access", "name": "identity_access", "type": "group", "description": "", "children": [{"id": "dase", "name": "Driver Authorization Service", "type": "service", "description": "Validates tokens, RFID users, and credentials to authorize EV drivers to start charging with policy checks.", "children": []}, {"id": "iama", "name": "Identity & Access Management", "type": "service", "description": "Handles multi-tenant user identities, roles, permissions, and access control for operators, partners, and admins.", "children": []}, {"id": "alpu", "name": "Accessibility & Location Publishing", "type": "integration", "description": "Manages visibility and accessibility of charge points for drivers and partners, including external APIs.", "children": []}]}]}, {"id": "smart-charging", "name": "smart_charging", "type": "group", "description": "", "children": [{"id": "smart-charging-smart-charging", "name": "smart_charging", "type": "group", "description": "", "children": [{"id": "scen", "name": "Smart Charging Engine", "type": "service", "description": "Optimizes charging power and schedules based on grid capacity, renewable generation, and site constraints. (Smart Charging product) :contentReference[oaicite:3]{index=3}", "children": []}, {"id": "semc", "name": "Site Energy Model & Constraints Management", "type": "service", "description": "Models site grid constraints, energy usage, and power distribution preferences for optimized charging.", "children": []}]}]}, {"id": "pricing-billing", "name": "pricing_billing", "type": "group", "description": "", "children": [{"id": "pricing-billing-pricing-billing", "name": "pricing_billing", "type": "group", "description": "", "children": [{"id": "tpma", "name": "Tariff & Pricing Management", "type": "service", "description": "Supports flexible tariff creation, pricing schemes, dynamic pricing, and contract-level rate plans. (Billing & Payments product) :contentReference[oaicite:4]{index=4}", "children": []}, {"id": "mrtl", "name": "Metering, Rating & Transaction Ledger", "type": "service", "description": "Converts metered energy data into billing quantities, applies tariffs, and maintains a financial ledger for reconciliation.", "children": []}, {"id": "bise", "name": "Billing, Invoicing & Settlement", "type": "service", "description": "Generates invoices, manages payments, supports pre/post-paid models and settlement between parties. (Billing & Payments product) :contentReference[oaicite:5]{index=5}", "children": []}]}]}, {"id": "roaming", "name": "roaming", "type": "group", "description": "", "children": [{"id": "roaming-roaming", "name": "roaming", "type": "group", "description": "", "children": [{"id": "rhig", "name": "Roaming Hub & Interoperability Gateway", "type": "integration", "description": "Connects CPOs and eMSPs enabling seamless roaming, supporting multiple roaming standards to extend driver access. (Roaming product) :contentReference[oaicite:6]{index=6}", "children": []}, {"id": "pama", "name": "Partner Management", "type": "service", "description": "Onboards roaming partners, manages credentials, routing rules, and agreements for cross-network services.", "children": []}, {"id": "rted", "name": "Roaming Transaction Exchange & Dispute Handling", "type": "integration", "description": "Handles roaming session exchanges (CDRs), validations, settlements, and dispute workflows.", "children": []}]}]}, {"id": "customer-experience", "name": "customer_experience", "type": "group", "description": "", "children": [{"id": "customer-experience-customer-experience", "name": "customer_experience", "type": "group", "description": "", "children": [{"id": "edap", "name": "EV Driver App", "type": "full-stack", "description": "Driver-facing mobile/web application for locating chargers, session control, account management, and payments. (EV Driver app product) :contentReference[oaicite:7]{index=7}", "children": []}]}]}, {"id": "platform-foundation", "name": "platform_foundation", "type": "group", "description": "", "children": [{"id": "platform-foundation-platform-foundation", "name": "platform_foundation", "type": "group", "description": "", "children": [{"id": "agdp", "name": "API Gateway & Developer Platform", "type": "development", "description": "Unified APIs, keys, throttling, and documentation for external integrations and partner ecosystems.", "children": []}, {"id": "etpi", "name": "Eventing & Telemetry Pipeline", "type": "integration", "description": "Streams charger telemetry, session events, and roaming messages for real-time processing and analytics.", "children": []}, {"id": "oads", "name": "Operational & Analytical Data Stores", "type": "development", "description": "Transactional and analytical data stores for reporting, KPIs, business intelligence, and forecasting.", "children": []}, {"id": "oima", "name": "Observability & Incident Management", "type": "service", "description": "Platform-wide metrics, logging, alerting, and incident response to ensure reliability and uptime.", "children": []}, {"id": "scau", "name": "Security, Compliance & Audit", "type": "service", "description": "Manages secure communications, certificates, compliance auditing, and platform security controls.", "children": []}, {"id": "anre", "name": "Analytics & Reporting", "type": "service", "description": "Dashboards, performance metrics, financial and operational reporting across the platform.", "children": []}]}]}, {"id": "enterprise-integration", "name": "enterprise_integration", "type": "group", "description": "", "children": [{"id": "enterprise-integration-enterprise-integration", "name": "enterprise_integration", "type": "group", "description": "", "children": [{"id": "eila", "name": "Enterprise Integration Layer", "type": "integration", "description": "Connectors and canonical models to integrate with ERP, CRM, payment systems, and enterprise platforms.", "children": []}, {"id": "ccma", "name": "Contract & Customer Management", "type": "service", "description": "Manages customer accounts, contractual relationships, tokens, and customer lifecycle.", "children": []}]}]}]};
        const bricksMetadata = bricksPayload.metadata || {};
        const bricks = bricksPayload.bricks || [];
        const brickRendering = bricksMetadata.rendering || bricksMetadata.render || {};
        const brickTypes = bricksMetadata.types || [];
        const typeColorMap = {};

        brickTypes.forEach(type => {
            typeColorMap[type.id.toLowerCase()] = type;
            typeColorMap[type.name.toLowerCase()] = type;
        });

        function colorOf(type) {
            if (type && typeColorMap[type.toLowerCase()]) {
                return typeColorMap[type.toLowerCase()].color;
            }
            return 'var(--surface-fallback)';
        }

        function normalizeBrick(item) {
            return {
                ...item,
                color: colorOf(item.type),
                isHighlighted: Boolean(item.name && item.name.includes('*'))
            };
        }

        function normalizeGroup(group) {
            return {
                ...group,
                children: (group.children || []).map(child => {
                    if ((child.type || '').toLowerCase() === 'group') {
                        return normalizeGroup(child);
                    }
                    return normalizeBrick(child);
                })
            };
        }

        function renderBrick(item) {
            const brickCard = `
                <div class="brick-card${item.isHighlighted ? ' highlighted' : ''}" style="background-color: ${item.color}">
                    <img class="brick-icon" src="icons/${item.id}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                    <div class="brick-name">${item.name || ''}</div>
                </div>
            `;

            if (!item.id) {
                return brickCard;
            }

            return `<a target="_blank" href="landing_pages/${item.id}.html">${brickCard}</a>`;
        }

        function renderGroup(group) {
            return `
                <div class="group">
                    <div class="group-title">${group.name}</div>
                    <div class="group-items">${(group.children || []).map(renderBrick).join('')}</div>
                </div>
            `;
        }

        function renderDomain(domain) {
            return `
                <section class="domain-column">
                    <div class="domain-title">${domain.name}</div>
                    <div class="domain-groups">${(domain.children || []).map(renderGroup).join('')}</div>
                </section>
            `;
        }

        function buildGroupRowLookup() {
            const lookup = {};
            ((brickRendering.rows) || []).forEach(rowInfo => {
                const row = Number(rowInfo.row) || 1;
                (rowInfo.brickIds || []).forEach(brickId => {
                    lookup[String(brickId)] = row;
                });
            });
            return lookup;
        }

        function applyRowsToHierarchy(items, groupRows) {
            return items.map(group => ({
                ...normalizeGroup(group),
                row: groupRows[String(group.id)] || Number(group.row) || 1
            }));
        }

        function filterHierarchyForRow(items, targetRow) {
            return items.filter(group => group.row === targetRow);
        }

        function renderMap(items) {
            const groupRows = buildGroupRowLookup();
            const normalizedItems = applyRowsToHierarchy(items, groupRows);
            const rows = Array.from(new Set(
                Object.values(groupRows)
                    .map(value => Number(value) || 1)
                    .concat([1])
            )).sort((left, right) => left - right);

            console.log(normalizedItems)
            console.log(rows)

            return `
                <div class="map">
                    ${rows.map(row => {
                        const rowItems = filterHierarchyForRow(normalizedItems, row);
                        if (!rowItems.length) {
                            return '';
                        }
                        return `
                            <div class="map-row" data-row="${row}">
                                ${rowItems.map(renderDomain).join('')}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderLegend() {
            return `
                <div class="legend-title">Legend:</div>
                ${brickTypes.map(type => `
                    <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
                `).join('')}
            `;
        }

        function updateBricksView() {
            document.getElementById('Current').innerHTML = renderMap(bricks);
            document.getElementById('Legend').innerHTML = renderLegend();
        }
    </script>
