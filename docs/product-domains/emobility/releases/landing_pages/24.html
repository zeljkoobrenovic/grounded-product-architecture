        body {

        .eyebrow {

        .section {

        .section-title {
            font-size: 14px;
            text-transform: uppercase;

        }

            line-height: 1.55;
        }

        .impact-block {

        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;

        .impact-line {

            line-height: 1.45;

        .pill {

            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>

e Handling."}, {"targetBrickId": "maro", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Monitoring, Alarms & Remote Operations to provide analytics capabilities required by Roaming Transaction Exchange & Dispute Handling."}], "externalSystemsThisBrickDependsOn": [{"system": "Partner Platforms", "type": "external-integration", "interface": "Partner API", "description": "Roaming Transaction Exchange & Dispute Handling exchanges operational data with external partner platforms and adjacent systems."}, {"system": "Event Broker or Messaging Infrastructure", "type": "platform", "interface": "Event / Queue Interface", "description": "Roaming Transaction Exchange & Dispute Handling depends on messaging infrastructure to route and buffer integration traffic."}], "externalSystemsDependingOnThisBrick": [{"system": "Internal Domain Services", "type": "integration-consumer", "interface": "API / Event Gateway", "description": "Internal services depend on Roaming Transaction Exchange & Dispute Handling to connect reliably with partner systems and adjacent platforms."}, {"system": "Partner Operations", "type": "partner-consumer", "interface": "Connector Interface", "description": "Partner-facing workflows depend on Roaming Transaction Exchange & Dispute Handling to exchange data and synchronize state with external parties."}], "icon": "rted.png"}}, {"brickId": "dase", "change": "Released Driver Authorization Service with domain-specific workflow improvements.", "brick": {"id": "dase", "name": "Driver Authorization Service", "type": "service", "description": "Validates tokens, RFID users, and credentials to authorize EV drivers to start charging with policy checks.", "domain": "identity_access", "group": "identity_access", "internalModules": [{"title": "Identity and Policy Engine", "description": "Authenticates actors, evaluates access policies, and manages trust rules for Driver Authorization Service.", "type": "identity"}, {"title": "Entitlements and Lifecycle Management", "description": "Manages roles, permissions, account state, and lifecycle changes within Driver Authorization Service.", "type": "service"}, {"title": "Audit and Compliance Controls", "description": "Records security-relevant actions and compliance evidence produced by Driver Authorization Service.", "type": "compliance"}], "interfaces": [{"title": "Authentication API", "description": "Programmatic interface for authentication, authorization, or account checks exposed by Driver Authorization Service.", "type": "api"}, {"title": "Administration Console", "description": "Operational interface for managing identity settings and access policies in Driver Authorization Service.", "type": "ui"}, {"title": "Audit Event Stream", "description": "Event interface that publishes security and compliance signals from Driver Authorization Service.", "type": "event"}], "brickDependencies": [{"targetBrickId": "cpma", "type": "service-api", "interface": "Service API", "description": "Depends on Charge Point Management to provide service capabilities required by Driver Authorization Service."}, {"targetBrickId": "cpcp", "type": "event-routing", "interface": "Outbound Event Feed", "description": "Depends on Charge Point Connectivity & Protocol Gateway to provide integration capabilities required by Driver Authorization Service."}, {"targetBrickId": "maro", "type": "operator-insight", "interface": "Dashboard Interface", "description": "Depends on Monitoring, Alarms & Remote Operations to provide analytics capabilities required by Driver Authorization Service."}], "externalSystemsThisBrickDependsOn": [{"system": "Corporate Identity Provider", "type": "identity", "interface": "OIDC / SAML", "description": "Driver Authorization Service integrates with an external identity provider for authentication and federation."}, {"system": "Compliance Screening Services", "type": "compliance", "interface": "Screening API", "description": "Driver Authorization Service may call external screening or verification services to enforce trust and compliance checks."}], "externalSystemsDependingOnThisBrick": [{"system": "Customer and Operator Applications", "type": "identity-consumer", "interface": "Authentication / Authorization Interface", "description": "Internal and external applications depend on Driver Authorization Service for authentication, authorization, and trusted account state."}, {"system": "Audit and Risk Systems", "type": "control-consumer", "interface": "Audit / Event Interface", "description": "Governance and risk systems depend on Driver Authorization Service to emit trust, access, and compliance events."}], "icon": "dase.png"}}], "deliveryChannels": [{"channelId": "prod_roaming_hub-public-api", "change": "Deployed workflow updates in Public APIs.", "channel": {"productId": "prod_roaming_hub", "productName": "Roaming & Settlement Hub", "name": "Public API", "type": "public_api", "icon": "public_api.png"}}, {"channelId": "prod_roaming_hub-partner-portal", "change": "Deployed workflow updates in Partner Portal.", "channel": {"productId": "prod_roaming_hub", "productName": "Roaming & Settlement Hub", "name": "Partner Portal", "type": "web", "icon": "web.png"}}, {"channelId": "prod_roaming_hub-api", "change": "Deployed workflow updates in OCPI Gateway API.", "channel": {"productId": "prod_roaming_hub", "productName": "Roaming & Settlement Hub", "name": "API", "type": "api", "icon": "api.png"}}], "teams": {"primaryTeamIds": ["driver-identity-experience-driver-authorization", "roaming-and-settlement-partner", "roaming-and-settlement-roaming-hub-interoperability"], "supportingTeamIds": ["mobility-platform-foundation-gateway-developer", "fleet-and-enterprise-solutions-fleet"]}, "initiativeId": "initiative-emobility-2025-04-15-01", "landingPageIndex": 24};
    const domainName = 'eMobility';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
