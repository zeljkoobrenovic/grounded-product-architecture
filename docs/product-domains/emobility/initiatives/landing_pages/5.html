<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Initiative (eMobility)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #fdecec;
            color: #9f2d2d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/initiative.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Initiative</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const initiative = {"date": "2026-01-24", "description": "Enterprise Charge Point Management Platform initiative focused on improving charge point connectivity & protocol gateway, charge point management, strengthening customer value for Enterprise CPO Operations Director, and evolving delivery across Web Portal, Public APIs.", "customerImpact": [{"customerId": "cpo_enterprise_ops_director", "customer": {"id": "cpo_enterprise_ops_director", "name": "Enterprise CPO Operations Director", "group": "Charge Point Operators (CPOs)", "icon": "charging-station.png.png"}, "customerKPIs": [{"kpi": "Roaming Session Share", "expectedImpact": "Increase roaming session share through stronger charge point connectivity & protocol gateway support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}, {"kpi": "Operational Reliability", "expectedImpact": "Increase operational reliability through stronger charge point management support and cleaner workflow execution.", "description": "", "unit": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Annual Recurring Revenue from CPMS", "expectedImpact": "Increase annual recurring revenue from cpms through stronger charge point connectivity & protocol gateway support and cleaner workflow execution.", "description": "Recurring SaaS revenue generated from CPO contracts.", "unit": "\u20ac", "kind": "business"}, {"kpi": "Account Expansion", "expectedImpact": "Increase account expansion through stronger charge point management support and cleaner workflow execution.", "description": "", "unit": "", "kind": "business"}]}], "productBricks": [{"brickId": "cpcp", "change": "Extended Charge Point Connectivity & Protocol Gateway with domain-specific workflow improvements.", "brick": {"id": "cpcp", "name": "Charge Point Connectivity & Protocol Gateway", "domain": "network_operations", "group": "network_operations", "icon": "cpcp.png"}}, {"brickId": "cpma", "change": "Extended Charge Point Management with domain-specific workflow improvements.", "brick": {"id": "cpma", "name": "Charge Point Management", "domain": "network_operations", "group": "network_operations", "icon": "cpma.png"}}, {"brickId": "maro", "change": "Extended Monitoring, Alarms & Remote Operations with domain-specific workflow improvements.", "brick": {"id": "maro", "name": "Monitoring, Alarms & Remote Operations", "domain": "network_operations", "group": "network_operations", "icon": "maro.png"}}, {"brickId": "seor", "change": "Extended Session Orchestration with domain-specific workflow improvements.", "brick": {"id": "seor", "name": "Session Orchestration", "domain": "network_operations", "group": "network_operations", "icon": "seor.png"}}], "deliveryChannels": [{"channelId": "prod_cpms_enterprise-web-portal", "change": "Introduced workflow updates in Web Portal.", "channel": {"productId": "prod_cpms_enterprise", "productName": "Enterprise CPMS", "name": "Web Portal", "type": "web", "icon": "web.png"}}, {"channelId": "prod_cpms_enterprise-public-api", "change": "Introduced workflow updates in Public APIs.", "channel": {"productId": "prod_cpms_enterprise", "productName": "Enterprise CPMS", "name": "Public API", "type": "public_api", "icon": "public_api.png"}}, {"channelId": "prod_cpms_enterprise-partner-integrations", "change": "Introduced workflow updates in Partner Integrations.", "channel": {"productId": "prod_cpms_enterprise", "productName": "Enterprise CPMS", "name": "Partner Integrations", "type": "partner_api", "icon": "partner_api.png"}}]};
    const domainName = 'eMobility';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
