<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Payments and Revenue Infrastructure)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="eyebrow">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Finance Trust and Tax Release", "date": "2026-06-25", "description": "Release focused on tax obligation visibility, revenue reporting trust, and lower reconciliation exceptions across merchant and recurring-revenue customers.", "customerImpact": [{"customerId": "cg2-p1", "customer": {"id": "cg2-p1", "name": "SaaS Revenue Operations Lead", "group": "Recurring Revenue Operators", "icon": "revops_lead.png"}, "customerKPIs": [{"kpi": "Tax coverage on obligated jurisdictions", "expectedImpact": "Improve confidence in global monetization readiness.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Revenue export accuracy", "expectedImpact": "Reduce material discrepancies in recurring-revenue reporting.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Revenue automation suite expansion", "expectedImpact": "Increase product trust and attach in finance-sensitive accounts.", "description": "Grow multi-product Billing, Tax, and Revenue Recognition adoption to 32% of target recurring-revenue accounts.", "unit": "% of target recurring-revenue accounts", "currentValue": "55.6", "link": "https://dashboard.example.com/payments-and-revenue-infrastructure/customers/cg2-p1/kpis/bo-cg2-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "taxx", "change": "Improve obligation monitoring and registration workflow support.", "brick": {"id": "taxx", "name": "Tax Determination and Registration", "type": "full-stack", "description": "Tax obligation monitoring, calculation, and registration support across geographies.", "domain": "Revenue Automation", "group": "Tax and accounting automation", "internalModules": [{"title": "Tax rules and obligation engine", "description": "Evaluates tax applicability and registration thresholds.", "type": "service"}], "interfaces": [{"title": "Tax dashboard", "description": "Operator workflow for registrations and tax monitoring.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "invo", "type": "context", "interface": "Invoice and transaction context", "description": "Uses billing and transaction details for tax calculation."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "taxx.png"}}, {"brickId": "revn", "change": "Improve recognition visibility and export reliability.", "brick": {"id": "revn", "name": "Revenue Recognition", "type": "full-stack", "description": "Automates revenue schedules and accounting treatment from Stripe event data.", "domain": "Revenue Automation", "group": "Tax and accounting automation", "internalModules": [{"title": "Recognition rules engine", "description": "Applies accounting logic to billing and payment events.", "type": "service"}], "interfaces": [{"title": "Revenue reporting UI", "description": "Operator workflow for revenue schedules and accounting review.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "ledg", "type": "data", "interface": "Money-state ledger data", "description": "Uses payment and settlement event history for accounting outputs."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "revn.png"}}, {"brickId": "reca", "change": "Improve balance and payout investigation workflows.", "brick": {"id": "reca", "name": "Reconciliation and Balance Operations", "type": "full-stack", "description": "Exception handling, payout understanding, and finance-operations workflows built on Stripe's money-state model.", "domain": "Shared Financial Foundations", "group": "Trust and financial operations", "internalModules": [{"title": "Reconciliation exception workflow", "description": "Explains and resolves mismatches between financial events and cash movement.", "type": "service"}], "interfaces": [{"title": "Reconciliation UI", "description": "Finance and operations workflow for investigating balance and payout issues.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "ledg", "type": "composition", "interface": "Ledger event model", "description": "Uses shared ledger events and balances as the basis for exception handling."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "reca.png"}}], "deliveryChannels": [{"channelId": "dashboard-web", "change": "Release updated tax, reporting, and reconciliation workflows.", "channel": {"productId": "dashboard", "productName": "", "name": "dashboard-web", "type": "product", "icon": "product.png"}}, {"channelId": "api-gateway", "change": "Release updated exports and finance-facing data surfaces.", "channel": {"productId": "api", "productName": "", "name": "api-gateway", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["finance-automation", "finance-ops"], "supportingTeamIds": ["developer-foundations"]}, "initiativeId": "initiative-payments-revenue-infrastructure-2026-05-02-04", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Payments and Revenue Infrastructure';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../products/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../products/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
