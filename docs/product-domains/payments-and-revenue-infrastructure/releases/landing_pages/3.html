<!DOCTYPE html>

    <style>

    <style>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;

            padding: 5px 10px;
            border-radius: 999px;

        }

        .meta {
            color: #6b7280;

        }

        .section {
            border-top: 1px solid #e5e7eb;

        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;

        }

        .description {

        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Global Checkout Conversion Release", "date": "2026-05-14", "description": "Release focused on better checkout completion and authorization success through payment-method ordering, buyer UX refinement, and approval optimization.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Growth Commerce GM", "group": "Direct Merchants", "icon": "commerce_gm.png"}, "customerKPIs": [{"kpi": "Successful payment conversion", "expectedImpact": "Increase the share of legitimate payment attempts that become captured payments.", "description": "Increase the share of legitimate checkout attempts that become captured payments to 97.5%.", "unit": "% of legitimate payment attempts", "currentValue": "82.1", "link": "https://dashboard.example.com/payments-and-revenue-infrastructure/customers/cg1-p1/kpis/co-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Issuer authorization rate", "expectedImpact": "Improve card and wallet payment success on legitimate demand.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Enterprise merchant GPV retention", "expectedImpact": "Improve retained merchant volume through better conversion quality.", "description": "Keep net GPV retention above 118% on scaled commerce cohorts by improving conversion and cross-product depth.", "unit": "% net GPV retention", "currentValue": "81.8", "link": "https://dashboard.example.com/payments-and-revenue-infrastructure/customers/cg1-p1/kpis/bo-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "chck", "change": "Improve hosted checkout conversion patterns and localization.", "brick": {"id": "chck", "name": "Hosted Checkout", "type": "full-stack", "description": "Hosted payment session experience optimized for fast launch and ongoing conversion improvements.", "links": [], "domain": "Merchant Payments", "group": "Checkout and conversion", "internalModules": [{"title": "Session orchestration", "description": "Creates and manages buyer-facing hosted payment sessions.", "type": "service"}], "interfaces": [{"title": "Hosted buyer payment UI", "description": "Stripe-hosted checkout interface.", "type": "ui"}], "dataDependencies": [{"assetId": "identity-credential", "role": "read", "description": "Reads Identity Credential to support domain workflows.", "storeIds": ["identity-credential-db"]}, {"assetId": "session-token", "role": "own", "description": "Acts as the primary owning brick for Session Token.", "storeIds": ["session-token-db"]}, {"assetId": "access-policy", "role": "own", "description": "Acts as the primary owning brick for Access Policy.", "storeIds": ["access-policy-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}], "brickDependencies": [{"targetBrickId": "pmtd", "type": "composition", "interface": "Payment method availability service", "description": "Uses market-aware payment method selection."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "chck.png"}}, {"brickId": "pmtd", "change": "Improve market-aware payment method ordering.", "brick": {"id": "pmtd", "name": "Payment Method Orchestration", "type": "full-stack", "description": "Selection, ordering, and eligibility logic for cards, wallets, and local payment methods.", "links": [], "domain": "Merchant Payments", "group": "Checkout and conversion", "internalModules": [{"title": "Method eligibility engine", "description": "Determines available methods by geography, device, and merchant configuration.", "type": "service"}], "interfaces": [{"title": "Method configuration UI", "description": "Operator controls for payment method availability and preferences.", "type": "ui"}], "dataDependencies": [{"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "payment-method-orchestration", "role": "own", "description": "Acts as the primary owning brick for Payment Method Orchestration.", "storeIds": ["payment-method-orchestration-stream"]}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "pmtd.png"}}, {"brickId": "auth", "change": "Improve recovery and approval optimization on legitimate attempts.", "brick": {"id": "auth", "name": "Authorization Optimization", "type": "full-stack", "description": "Improves legitimate payment success through retries, tokens, and issuer-aware optimization.", "links": [], "domain": "Merchant Payments", "group": "Payment performance and omnichannel", "internalModules": [{"title": "Authorization decision optimizer", "description": "Tunes retries, network tokens, and confirmation paths.", "type": "service"}], "interfaces": [{"title": "Authorization analytics UI", "description": "Shows approval, decline, and recovery diagnostics.", "type": "ui"}], "dataDependencies": [{"assetId": "identity-credential", "role": "read", "description": "Reads Identity Credential to support domain workflows.", "storeIds": ["identity-credential-db"]}, {"assetId": "session-token", "role": "own", "description": "Acts as the primary owning brick for Session Token.", "storeIds": ["session-token-db"]}, {"assetId": "access-policy", "role": "own", "description": "Acts as the primary owning brick for Access Policy.", "storeIds": ["access-policy-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}], "brickDependencies": [{"targetBrickId": "rada", "type": "context", "interface": "Risk scoring inputs", "description": "Uses fraud and risk signals to preserve good approvals."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "auth.png"}}], "deliveryChannels": [{"channelId": "hosted-checkout", "change": "Release updated hosted checkout experiences.", "channel": {"productId": "hosted", "productName": "", "name": "hosted-checkout", "type": "product", "icon": "product.png"}}, {"channelId": "api-gateway", "change": "Release updated payment method and authorization APIs.", "channel": {"productId": "api", "productName": "", "name": "api-gateway", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["checkout-conversion", "payment-network-performance"], "supportingTeamIds": ["trust-ops", "developer-foundations"]}, "initiativeId": "initiative-payments-revenue-infrastructure-2026-04-12-01", "landingPageIndex": 3, "objectiveLandingPageUrl": ""};
    const domainName = 'Payments and Revenue Infrastructure';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Payments and Revenue Infrastructure Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Global Checkout Conversion Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
