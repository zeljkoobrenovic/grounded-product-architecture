<script>

kflow for registrations and tax monitoring.", "type": "ui"}], "dataDependencies": [{"assetId": "customer-contact-point", "role": "read", "description": "Reads Customer Contact Point to support domain workflows.", "storeIds": ["customer-contact-point-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}], "brickDependencies": [{"targetBrickId": "invo", "type": "context", "interface": "Invoice and transaction context", "description": "Uses billing and transaction details for tax calculation."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "taxx.png"}}, {"brickId": "revn", "change": "Improve recognition outputs and accounting visibility.", "brick": {"id": "revn", "name": "Revenue Recognition", "type": "full-stack", "description": "Automates revenue schedules and accounting treatment from Stripe event data.", "domain": "Revenue Automation", "group": "Tax and accounting automation", "internalModules": [{"title": "Recognition rules engine", "description": "Applies accounting logic to billing and payment events.", "type": "service"}], "interfaces": [{"title": "Revenue reporting UI", "description": "Operator workflow for revenue schedules and accounting review.", "type": "ui"}], "dataDependencies": [{"assetId": "customer-profile", "role": "own", "description": "Acts as the primary owning brick for Customer Profile.", "storeIds": ["customer-profile-db"]}, {"assetId": "customer-contact-point", "role": "write", "description": "Writes or updates Customer Contact Point during domain workflows.", "storeIds": ["customer-contact-point-db"]}, {"assetId": "consent-record", "role": "read", "description": "Reads Consent Record to support domain workflows.", "storeIds": ["consent-record-db"]}, {"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}], "brickDependencies": [{"targetBrickId": "ledg", "type": "data", "interface": "Money-state ledger data", "description": "Uses payment and settlement event history for accounting outputs."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "revn.png"}}, {"brickId": "reca", "change": "Improve investigation workflows for financial exceptions.", "brick": {"id": "reca", "name": "Reconciliation and Balance Operations", "type": "full-stack", "description": "Exception handling, payout understanding, and finance-operations workflows built on Stripe's money-state model.", "domain": "Shared Financial Foundations", "group": "Trust and financial operations", "internalModules": [{"title": "Reconciliation exception workflow", "description": "Explains and resolves mismatches between financial events and cash movement.", "type": "service"}], "interfaces": [{"title": "Reconciliation UI", "description": "Finance and operations workflow for investigating balance and payout issues.", "type": "ui"}], "dataDependencies": [{"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "terminal-and-reader-operations", "role": "read", "description": "Reads Terminal And Reader Operations to support domain workflows.", "storeIds": ["terminal-and-reader-operations-db"]}], "brickDependencies": [{"targetBrickId": "ledg", "type": "composition", "interface": "Ledger event model", "description": "Uses shared ledger events and balances as the basis for exception handling."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "reca.png"}}], "deliveryChannels": [{"channelId": "dashboard-web", "change": "Release updated tax and reporting workflows.", "channel": {"productId": "dashboard", "productName": "", "name": "dashboard-web", "type": "product", "icon": "product.png"}}, {"channelId": "api-gateway", "change": "Release updated exports and event data.", "channel": {"productId": "api", "productName": "", "name": "api-gateway", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["finance-automation", "finance-ops"], "supportingTeamIds": ["developer-foundations"]}, "initiativeId": "initiative-payments-revenue-infrastructure-2026-05-02-04", "discoveryIds": ["discovery-payments-revenue-infrastructure-2026-04-15-04-finance-trust"], "priority": "p1", "keyResultId": "payments-and-revenue-infrastructure-2026-q2-cg2-p1/kr-2", "landingPageIndex": 2, "discoveryLinks": [], "objectiveLandingPageUrl": ""};
    const domainName = 'Payments and Revenue Infrastructure';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(initiative.title || initiative.description || 'Initiative');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(initiative.date));

    let html = '';
    if (initiative.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(initiative.description) + '</div></div>';
    }

    if (initiative.customerImpact && initiative.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        initiative.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiative.productBricks && initiative.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        initiative.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.deliveryChannels && initiative.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        initiative.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (initiative.discoveryLinks && initiative.discoveryLinks.length) {
        html += '<div class="section"><div class="section-title">Linked Discoveries</div>';
        initiative.discoveryLinks.forEach(discovery => {
            const href = discovery.landingPageIndex !== undefined && discovery.landingPageIndex !== null
                ? '../../discoveries/landing_pages/' + escapeHtml(String(discovery.landingPageIndex)) + '.html'
                : '';
            html += '<div class="pill"><img class="pill-icon" src="../../discoveries/icons/discovery.svg" onerror="this.onerror=null;this.src=\'../../initiatives/icons/initiative.png\'"><div><div class="pill-name">' + linkOf(href, discovery.discoveryName || discovery.discoveryId, 'pill-name') + '</div><div class="pill-meta">' + escapeHtml(discovery.status || '') + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Payments and Revenue Infrastructure Home"
    },
    {
      "link": "../index.html",
      "label": "Initiatives"
    },
    {
      "label": "Finance Trust and Tax Initiative"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
