    function escapeHtml(value) {
        return (value || '')

            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');

            'achieved': '#0284c7',

        const map = {
            'green': '#16a34a',
            'amber': '#d97706',
            'red': '#dc2626',
            'undefined': '#6b7280'
        };
        return map[confidence] || '#6b7280';
