<script>
    const release = {"title": "Revenue Flow Compression Release", "date": "2026-05-29", "description": "Release focused on configuration quality, faster quote approvals, and smoother contract-to-billing handoff.", "customerImpact": [{"customerId": "cg2-p1", "customer": {"id": "cg2-p1", "name": "Enterprise Account Executive / Sales Manager", "group": "Frontline Sellers", "icon": "cg2-p1.png"}, "customerKPIs": [{"kpi": "Quote first-pass completion", "expectedImpact": "Reduce quote rework and rep wait time.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Average proposal turnaround", "expectedImpact": "Speed proposal turnaround for complex deals.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Installed-base expansion attach", "expectedImpact": "Improve conversion of complex commercial motions.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "conf", "change": "Improve guided configuration and rule validation.", "brick": {"id": "conf", "name": "Guided Solution Configuration", "type": "full-stack", "description": "Evaluates bundle rules, constraints, and guided configuration choices during enterprise quote assembly.", "domain": "CPQ, Contracting, and Billing", "group": "Configuration and pricing", "internalModules": [{"title": "Bundle management", "description": "Supports guided bundle assembly inside the quote flow.", "type": "service"}, {"title": "Constraints and validations", "description": "Validates combinations and packaging rules before quote creation.", "type": "service"}], "interfaces": [{"title": "Configuration workspace", "description": "Guided configuration interface used by sellers and deal desk teams.", "type": "ui"}], "dataDependencies": [{"assetId": "catalog-and-bundle", "role": "query", "description": "Queries Catalog And Bundle to support search, analytics, or decision flows.", "storeIds": ["catalog-and-bundle-stream"]}], "brickDependencies": [{"targetBrickId": "cata", "type": "composition", "interface": "Catalog and bundle model", "description": "Uses the commercial catalog as the source of valid offerings."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "conf.png"}}, {"brickId": "quot", "change": "Improve quote assembly and approval routing.", "brick": {"id": "quot", "name": "Quote and Proposal Management", "type": "full-stack", "description": "Creates quotes, proposals, approvals, expiration control, and signature-ready sales documents.", "domain": "CPQ, Contracting, and Billing", "group": "Quote to cash lifecycle", "internalModules": [{"title": "Quote creation", "description": "Builds the live customer quote from validated commercial inputs.", "type": "service"}, {"title": "Quote expiration management", "description": "Controls quote validity windows and lifecycle state.", "type": "service"}, {"title": "Proposal and e-signatures", "description": "Supports proposal packaging and signature-ready sales documents.", "type": "service"}], "interfaces": [{"title": "Quote workspace", "description": "Seller and deal-desk quote-building interface.", "type": "ui"}], "dataDependencies": [{"assetId": "account-management-and-360", "role": "read", "description": "Reads Account Management And 360 to support domain workflows.", "storeIds": ["account-management-and-360-db"]}, {"assetId": "opportunity-and-sales", "role": "read", "description": "Reads Opportunity And Sales to support domain workflows.", "storeIds": ["opportunity-and-sales-db"]}], "brickDependencies": [{"targetBrickId": "conf", "type": "composition", "interface": "Guided configuration", "description": "Uses valid configuration results inside quote creation."}, {"targetBrickId": "pric", "type": "composition", "interface": "Pricing policy", "description": "Uses approved pricing and discount logic during quote assembly."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "quot.png"}}, {"brickId": "bill", "change": "Improve billing handoff and renewal continuity.", "brick": {"id": "bill", "name": "Billing, Invoicing, and Subscription Lifecycle", "type": "full-stack", "description": "Handles billing, invoicing, renewals, amendments, cancellations, and subscription continuity after booking.", "domain": "CPQ, Contracting, and Billing", "group": "Quote to cash lifecycle", "internalModules": [{"title": "Billing", "description": "Maintains core billing and charge-generation logic.", "type": "service"}, {"title": "Automated invoicing", "description": "Creates and distributes invoices from approved commercial records.", "type": "service"}, {"title": "Renew / amend / cancel", "description": "Manages subscription lifecycle changes after booking.", "type": "service"}, {"title": "Dunning management", "description": "Supports collections and delinquency workflows tied to revenue operations.", "type": "service"}], "interfaces": [{"title": "Billing operations workspace", "description": "Finance and revenue-operations workspace for invoices and subscriptions.", "type": "ui"}], "dataDependencies": [{"assetId": "payment-instrument-reference", "role": "read", "description": "Reads Payment Instrument Reference to support domain workflows.", "storeIds": ["payment-instrument-reference-db"]}, {"assetId": "transaction", "role": "write", "description": "Writes or updates Transaction during domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "audit-log", "role": "publish", "description": "Publishes events or audit records related to Audit Log.", "storeIds": ["audit-log-stream"]}, {"assetId": "billing-invoicing-and-subscription-lifecycle", "role": "own", "description": "Acts as the primary owning brick for Billing Invoicing And Subscription Lifecycle.", "storeIds": ["billing-invoicing-and-subscription-lifecycle-db"]}], "brickDependencies": [{"targetBrickId": "cont", "type": "composition", "interface": "Contract and order state", "description": "Uses contract and commercial state as the basis for billing and subscription flows."}, {"targetBrickId": "apii", "type": "integration", "interface": "Finance and invoicing connectors", "description": "Connects billing operations to external finance systems."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "bill.png"}}], "deliveryChannels": [{"channelId": "seller-web", "change": "Roll out updated quote workspace.", "channel": {"productId": "seller", "productName": "", "name": "seller-web", "type": "product", "icon": "product.png"}}, {"channelId": "revenue-runtime", "change": "Deploy updated quote and billing services.", "channel": {"productId": "revenue", "productName": "", "name": "revenue-runtime", "type": "product", "icon": "product.png"}}, {"channelId": "api-event-runtime", "change": "Roll out updated revenue APIs and events.", "channel": {"productId": "api", "productName": "", "name": "api-event-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["configuration-and-pricing", "billing-and-renewals"], "supportingTeamIds": ["platform-connectivity"]}, "initiativeId": "initiative-enterprise-crm-and-revenue-operations-2026-04-23-02", "landingPageIndex": 2, "objectiveLandingPageUrl": ""};
    const domainName = 'Enterprise CRM and Revenue Operations';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Enterprise CRM and Revenue Operations Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Revenue Flow Compression Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>
