    <style>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;

            border-radius: 999px;

            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Digital Service and AI Release", "date": "2026-06-12", "description": "Release focused on better self-service success, tighter routing, and safer AI-led routine resolution.", "customerImpact": [{"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "VP Customer Service / Contact Center Operations Leader", "group": "Service Operations Leaders", "icon": "cg3-p1.png"}, "customerKPIs": [{"kpi": "First-contact resolution rate", "expectedImpact": "Improve resolution quality for supported contact types.", "description": "Increase first-contact resolution to 78% across eligible case types.", "unit": "% of eligible contacts", "currentValue": "69", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Customer self-service success rate", "expectedImpact": "Increase digital containment on routine issues.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "AI-assisted service leverage", "expectedImpact": "Increase AI-led or AI-assisted service coverage.", "description": "Increase AI-assisted or AI-resolved service work to 36% of eligible demand.", "unit": "% of eligible contacts", "currentValue": "25", "link": "", "linkLabel": "", "kind": "business"}]}], "productBricks": [{"brickId": "rout", "change": "Improve skill and capacity routing quality.", "brick": {"id": "rout", "name": "Omnichannel Routing and Contact Center Control", "type": "full-stack", "description": "Routes demand across queues, channels, and capacities while preserving case and interaction context.", "links": [], "domain": "Customer Care Operations", "group": "Case and service orchestration", "internalModules": [{"title": "Routing", "description": "Matches contacts to the right service queue or resolver.", "type": "service"}], "interfaces": [{"title": "Routing control API", "description": "Runtime surface for omnichannel queueing and assignment.", "type": "api"}], "dataDependencies": [{"assetId": "contact-and-relationship", "role": "read", "description": "Reads Contact And Relationship to support domain workflows.", "storeIds": ["contact-and-relationship-db"]}], "brickDependencies": [{"targetBrickId": "case", "type": "composition", "interface": "Case and service state", "description": "Uses case state and priority to assign work."}, {"targetBrickId": "hist", "type": "context", "interface": "Interaction history", "description": "Uses prior interaction context during routing decisions."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "rout.png"}}, {"brickId": "self", "change": "Improve portal and messaging flows.", "brick": {"id": "self", "name": "self", "domain": "", "group": "", "icon": "capability_404.png"}}, {"brickId": "agnt", "change": "Improve agentic routine resolution workflows.", "brick": {"id": "agnt", "name": "Agentforce and Agentic AI", "type": "full-stack", "description": "Provides Agentforce and agentic AI orchestration over trusted data, governed actions, and reusable workflow runtime.", "links": [], "domain": "Platform, Data, and Agentforce", "group": "Automation and agentic execution", "internalModules": [{"title": "Agentforce", "description": "Provides configurable agentic workflow execution.", "type": "service"}, {"title": "Agentic AI", "description": "Coordinates AI reasoning and actioning inside governed business flows.", "type": "service"}], "interfaces": [{"title": "Agent orchestration workspace", "description": "Admin and operator interface for configuring and observing agentic workflows.", "type": "ui"}], "dataDependencies": [{"assetId": "account-management-and-360", "role": "read", "description": "Reads Account Management And 360 to support domain workflows.", "storeIds": ["account-management-and-360-db"]}, {"assetId": "billing-invoicing-and-subscription-lifecycle", "role": "read", "description": "Reads Billing Invoicing And Subscription Lifecycle to support domain workflows.", "storeIds": ["billing-invoicing-and-subscription-lifecycle-db"]}], "brickDependencies": [{"targetBrickId": "data", "type": "context", "interface": "Unified profile and event context", "description": "Uses trusted customer data as the basis for AI actions."}, {"targetBrickId": "flow", "type": "composition", "interface": "Workflow runtime", "description": "Executes governed actions through reusable workflow automation."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "agnt.png"}}], "deliveryChannels": [{"channelId": "service-console", "change": "Roll out updated agent and supervisor workflows.", "channel": {"productId": "service", "productName": "", "name": "service-console", "type": "product", "icon": "product.png"}}, {"channelId": "customer-digital", "change": "Roll out updated self-service and digital AI assistance.", "channel": {"productId": "customer", "productName": "", "name": "customer-digital", "type": "product", "icon": "product.png"}}, {"channelId": "data-ai-runtime", "change": "Deploy updated AI action and workflow models.", "channel": {"productId": "data", "productName": "", "name": "data-ai-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["case-and-routing", "digital-service", "automation-and-ai"], "supportingTeamIds": ["data-platform"]}, "initiativeId": "initiative-enterprise-crm-and-revenue-operations-2026-05-02-03", "landingPageIndex": 1, "objectiveLandingPageUrl": ""};
    const domainName = 'Enterprise CRM and Revenue Operations';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Enterprise CRM and Revenue Operations Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Digital Service and AI Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
