<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Online Retail Marketplace)</title>
    <style>
    .page-type-badge {
        display: inline-block;
        padding: 2px 10px;

</style>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;
        padding: 6px 4px;
        font-size: 80%;

    .breadcrumb {
    }

</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Prime Promise Reliability Release", "date": "2026-05-30", "description": "Release focused on improving promise precision, order-tracking clarity, and self-service issue recovery.", "customerImpact": [{"customerId": "cg1-p1", "customer": {"id": "cg1-p1", "name": "Prime Household Shopper", "group": "Demand-Side Consumers", "icon": "shopper.png"}, "customerKPIs": [{"kpi": "On-time promise adherence", "expectedImpact": "Increase the share of shipments delivered inside the communicated window.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}, {"kpi": "Self-service issue resolution rate", "expectedImpact": "Reduce the need for live-agent support on common order issues.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Prime paid retention", "expectedImpact": "Increase renewal confidence through more reliable post-purchase convenience.", "description": "Keep paid Prime household retention above 93% in mature cohorts by making shopping and fulfillment habit-forming.", "unit": "% of paid Prime households", "currentValue": "91.3", "link": "https://dashboard.example.com/online-retail-marketplace/customers/cg1-p1/kpis/bo-cg1-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "deli", "change": "Improve promise accuracy and exception visibility.", "brick": {"id": "deli", "name": "Delivery Promise & Last Mile", "type": "full-stack", "description": "Promise calculation, carrier routing, last-mile eventing, and shopper-visible delivery commitments.", "links": [], "domain": "Shopper Experience", "group": "Conversion and service", "internalModules": [{"title": "Promise calculation engine", "description": "Converts network capacity and inventory into shopper-visible promise windows.", "type": "service"}], "interfaces": [{"title": "Promise APIs", "description": "Delivery promise and shipment event interfaces.", "type": "api"}], "dataDependencies": [{"assetId": "transaction", "role": "read", "description": "Reads Transaction to support domain workflows.", "storeIds": ["transaction-db"]}, {"assetId": "search-browse-facets", "role": "read", "description": "Reads Search Browse Facets to support domain workflows.", "storeIds": ["search-browse-facets-db"]}], "brickDependencies": [{"targetBrickId": "invn", "type": "data", "interface": "Inventory availability feed", "description": "Uses current inventory and node allocation state."}, {"targetBrickId": "fbao", "type": "composition", "interface": "Fulfillment network services", "description": "Uses Amazon fulfillment network capabilities."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "deli.png"}}, {"brickId": "orde", "change": "Improve order-state explanations and tracking events.", "brick": {"id": "orde", "name": "Order Management & Tracking", "type": "full-stack", "description": "Order history, shipment visibility, exception handling, and delivery event communication.", "links": [], "domain": "Shopper Experience", "group": "Conversion and service", "internalModules": [{"title": "Order state timeline", "description": "Tracks order progression and exception states after purchase.", "type": "service"}], "interfaces": [{"title": "Orders UI", "description": "Order visibility and tracking surface.", "type": "ui"}], "dataDependencies": [{"assetId": "order-management-tracking", "role": "own", "description": "Acts as the primary owning brick for Order Management Tracking.", "storeIds": ["order-management-tracking-stream"]}], "brickDependencies": [{"targetBrickId": "deli", "type": "event", "interface": "Delivery event feed", "description": "Uses network and shipment events to show promise status."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "orde.png"}}, {"brickId": "retu", "change": "Improve self-service return and refund flows.", "brick": {"id": "retu", "name": "Returns, Refunds & Exchanges", "type": "full-stack", "description": "Reverse-logistics workflows, refund handling, exchange logic, and policy-aware issue recovery.", "links": [], "domain": "Shopper Experience", "group": "Conversion and service", "internalModules": [{"title": "Reverse-logistics orchestration", "description": "Coordinates return method, refund state, and item disposition.", "type": "service"}], "interfaces": [{"title": "Returns UI", "description": "Self-service return and refund experience.", "type": "ui"}], "dataDependencies": [{"assetId": "returns-refunds-exchanges", "role": "own", "description": "Acts as the primary owning brick for Returns Refunds Exchanges.", "storeIds": ["returns-refunds-exchanges-stream"]}], "brickDependencies": [{"targetBrickId": "care", "type": "fallback", "interface": "Case management API", "description": "Escalates complex exceptions into support resolution."}, {"targetBrickId": "risk", "type": "policy", "interface": "Abuse policy API", "description": "Uses return-abuse and fraud checks."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "retu.png"}}], "deliveryChannels": [{"channelId": "web-cdn-edge", "change": "Release improved order and returns flows on web.", "channel": {"productId": "web", "productName": "", "name": "web-cdn-edge", "type": "product", "icon": "product.png"}}, {"channelId": "core-commerce-runtime", "change": "Release supporting promise and post-purchase services.", "channel": {"productId": "core", "productName": "", "name": "core-commerce-runtime", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["prime-delivery", "returns-resolution"], "supportingTeamIds": ["seller-fulfillment", "trust-and-identity"]}, "initiativeId": "initiative-online-retail-marketplace-2026-04-22-02", "landingPageIndex": 2, "objectiveLandingPageUrl": ""};
    const domainName = 'Online Retail Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Online Retail Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Prime Promise Reliability Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
