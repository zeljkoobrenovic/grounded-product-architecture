<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release (Online Retail Marketplace)</title>
    <style>
    .page-type-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        border: 1px solid grey;
        text-transform: uppercase;
        margin-right: 6px;
        color: #8c8c8c;
    }
</style>
    <style>
    .breadcrumbs-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin: 0;
        padding: 6px 4px;
        font-size: 80%;
        color: #a0a0a0;
    }

    .breadcrumb {
    }

    .breadcrumb a {
        text-decoration: none;
        color: #343434;;
    }
</style>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 8px 28px 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f4ea;
            color: #2f6b3b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: blue;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .linked-icon {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: blue;
        }

        .pill-meta {
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<div id="breadcrumbs"></div>
<table style="margin-top: 10px">
<tr>
<td style="vertical-align: top; padding-top: 0;">
    <img src="../icons/release.png" style="width:108px; height:108px; margin-right:12px">
</td>
<td>
<div class="page-type-badge" style="margin-bottom: 0px;">Release</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const release = {"title": "Retail Media Measurement Release", "date": "2026-06-27", "description": "Release focused on reducing wasted spend from retail mismatches and improving advertiser measurement clarity.", "customerImpact": [{"customerId": "cg3-p1", "customer": {"id": "cg3-p1", "name": "Performance Brand Marketer", "group": "Retail Media Advertisers", "icon": "advertiser.png"}, "customerKPIs": [{"kpi": "Attributed incremental sales ROAS", "expectedImpact": "Increase retail-media efficiency on strategic accounts.", "description": "Increase blended incremental sales return on ad spend for strategic advertisers to 4.5x.", "unit": "x ROAS", "currentValue": "207", "link": "https://dashboard.example.com/online-retail-marketplace/customers/cg3-p1/kpis/co-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "customer"}, {"kpi": "Reporting actionability score", "expectedImpact": "Improve marketer confidence in budget reallocation decisions.", "description": "", "unit": "", "currentValue": "", "link": "", "linkLabel": "", "kind": "customer"}], "businessKPIs": [{"kpi": "Advertising services revenue growth", "expectedImpact": "Improve advertiser retention and budget depth through stronger measurement trust.", "description": "Grow advertising services revenue by 17% year over year through stronger budget retention, measurement trust, and retail-aware performance.", "unit": "% YoY growth", "currentValue": "41", "link": "https://dashboard.example.com/online-retail-marketplace/customers/cg3-p1/kpis/bo-cg3-top", "linkLabel": "Open KPI dashboard", "kind": "business"}]}], "productBricks": [{"brickId": "spon", "change": "Improve campaign safeguards against unbuyable product states.", "brick": {"id": "spon", "name": "Sponsored Ads & Retail Media", "type": "full-stack", "description": "Sponsored Products, Sponsored Brands, Sponsored Display, and related retail-intent ad products.", "domain": "Seller Growth", "group": "Operations and demand generation", "internalModules": [{"title": "Retail media serving and optimization", "description": "Handles campaign delivery, bidding, and placement optimization.", "type": "service"}], "interfaces": [{"title": "Ads console UI", "description": "Campaign setup and optimization workflow.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "price", "type": "context", "interface": "Offer health feed", "description": "Uses buyability context to avoid poor retail outcomes."}, {"targetBrickId": "invn", "type": "context", "interface": "Inventory availability feed", "description": "Uses availability context to limit wasted spend."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "spon.png"}}, {"brickId": "repr", "change": "Improve retail and media performance reporting alignment.", "brick": {"id": "repr", "name": "Retail Analytics & Reporting", "type": "full-stack", "description": "Operational and commercial reporting across traffic, conversion, sales, inventory, and campaign performance.", "domain": "Seller Growth", "group": "Operations and demand generation", "internalModules": [{"title": "Commerce reporting model", "description": "Builds seller and advertiser-facing performance reporting views.", "type": "service"}], "interfaces": [{"title": "Reporting UI", "description": "Operational and commercial analytics surface.", "type": "ui"}], "brickDependencies": [{"targetBrickId": "anal", "type": "platform", "interface": "Measurement warehouse", "description": "Uses shared measurement and experiment data."}], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "repr.png"}}, {"brickId": "anal", "change": "Improve incrementality and measured spend workflows.", "brick": {"id": "anal", "name": "Commerce Measurement & Experimentation", "type": "full-stack", "description": "Shared measurement, experimentation, incrementality analysis, and decision-support platform across commerce flows.", "domain": "Marketplace Foundations", "group": "Shared intelligence and integration", "internalModules": [{"title": "Experiment and measurement platform", "description": "Runs experiments and builds shared commerce reporting datasets.", "type": "service"}], "interfaces": [{"title": "Measurement APIs", "description": "Experiment, reporting, and causal measurement interfaces.", "type": "api"}], "brickDependencies": [], "externalSystemsThisBrickDependsOn": [], "externalSystemsDependingOnThisBrick": [], "icon": "anal.png"}}], "deliveryChannels": [{"channelId": "web-cdn-edge", "change": "Release updated Amazon Ads reporting and optimization views.", "channel": {"productId": "web", "productName": "", "name": "web-cdn-edge", "type": "product", "icon": "product.png"}}, {"channelId": "partner-api-gateway", "change": "Release expanded measurement outputs for enterprise workflows.", "channel": {"productId": "partner", "productName": "", "name": "partner-api-gateway", "type": "product", "icon": "product.png"}}], "teams": {"primaryTeamIds": ["ads-performance", "measurement-insights"], "supportingTeamIds": ["seller-growth", "commerce-intelligence"]}, "initiativeId": "initiative-online-retail-marketplace-2026-05-08-04", "landingPageIndex": 0, "objectiveLandingPageUrl": ""};
    const domainName = 'Online Retail Marketplace';

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function renderImpactLines(items) {
        let html = '';
        items.forEach(item => {
            html += '<div class="impact-line"><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(item.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(item.expectedImpact);
            if (item.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(release.title || release.description || 'Release');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(formatDate(release.date));

    let html = '';
    if (release.description) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(release.description) + '</div></div>';
    }

    if (release.customerImpact && release.customerImpact.length) {
        html += '<div class="section"><div class="section-title">Customer Impact</div>';
        release.customerImpact.forEach(impact => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header">';
            html += '<img class="linked-icon" src="../../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../../customers/icons/customer.png\'">';
            html += '<div class="impact-id">' + linkOf('../../customers/landing_pages/' + impact.customer.id + '.html', impact.customer.name, '') + ' <span style="color:#6b7280; font-weight:normal">(' + escapeHtml(impact.customerId) + ')</span></div>';
            html += '</div>';
            html += renderImpactLines(impact.customerKPIs || []);
            html += renderImpactLines(impact.businessKPIs || []);
            html += '</div>';
        });
        html += '</div>';
    }

    if (release.productBricks && release.productBricks.length) {
        html += '<div class="section"><div class="section-title">Product Bricks</div>';
        release.productBricks.forEach(brick => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + linkOf('../../product-bricks/landing_pages/' + brick.brickId + '.html', brick.brick.name, 'pill-name') + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    if (release.deliveryChannels && release.deliveryChannels.length) {
        html += '<div class="section"><div class="section-title">Delivery Channels</div>';
        release.deliveryChannels.forEach(channel => {
            html += '<div class="pill"><img class="pill-icon" src="../../product-deployments/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../../product-deployments/icons/product.png\'"><div><div class="pill-name">' + linkOf('../../product-deployments/landing_pages/' + channel.channel.productId + '.html', channel.channel.name, 'pill-name') + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
<script>
    const breadcrumbs_context = {
  "breadcrumbs": [
    {
      "link": "../../start/index.html",
      "label": "Online Retail Marketplace Home"
    },
    {
      "link": "../index.html",
      "label": "Releases"
    },
    {
      "label": "Retail Media Measurement Release"
    }
  ]
}
;
    const divId = "breadcrumbs";

    function renderBreadcrumbs() {
        const container = document.getElementById(divId);
        if (!container) {
            console.log('Breadcrumbs container with id "' + divId + '" not found.');
            return;
        }
        container.innerHTML = '';
        let html = '';
        html += '<div class="breadcrumbs-container">';
        if (breadcrumbs_context && breadcrumbs_context.breadcrumbs && breadcrumbs_context.breadcrumbs.length) {
            breadcrumbs_context.breadcrumbs.forEach((crumb, index) => {
                html += '<div class="breadcrumb">';
                let suffix = index < breadcrumbs_context.breadcrumbs.length - 1 ? '&nbsp;&nbsp;>&nbsp;&nbsp;' : '';
                if (crumb.link) {
                    html += '<a href="' + crumb.link + '">' + crumb.label + '</a>';
                } else {
                    html += '<span>' + crumb.label + '</span>';
                }
                html += '<span>' + suffix + '</span>';
                html += '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    renderBreadcrumbs();
</script>

</body>
</html>
