        '        <div id="summary" style="display: inline-block"></div>\n' +
        '    </div>\n' +
        '</div>';
    document.getElementById('Header').innerHTML = html;

    function update() {
        let html = '';
        let filter = document.getElementById('filter').value.trim().toLowerCase().replace(/\*/g, '');
        console.log(filter);
        let filtered = array.filter(a => filter.length === 0 || a.service.toLowerCase().includes(filter));
        html += '<table>';
        html += '<tr style="font-size: 60%; color: grey;">';

        let maxTotal = 1;
        let allCostsTotal = 0;
        months.sort().reverse().forEach(month => {
            let value = getTotalCosts((month));
            maxTotal = Math.round(Math.max(maxTotal, value));
            allCostsTotal += value;
        });

        html += '<td style="background-color: white; vertical-align: middle">$' + numberWithCommas(allCostsTotal) + '</td>';

        months.sort().reverse().forEach(month => {
            let value = getTotalCosts(month);
            html += '<td style="background-color: white; padding: 6px; vertical-align: bottom">'
                + '<div style="color: blue">$' + numberWithCommas(value) + '</div>'
                + '<div style="width: 100%; background-color: #000000; height: ' + (56 * value / maxTotal) + 'px"></div>'
                + month
                + '</td>';
        })

        html += '</tr>';

        let max = 1;
        filtered.filter(m => m.usage >= 0).forEach(function (month) {
            months.sort().reverse().forEach(m => {
                max = Math.max(max, getCosts(month.service, m));
            });
        });

        filtered.filter(m => m.usage >= 0).sort((a, b) => b.costs - a.costs).forEach(function (month) {
                const style = month.usage > 0.01 ? '' : 'opacity: 0.7';
                html += '<tr>';
                html += '<td>';
                html += '<div class="domain" title="' + month.service + '" style="' + style + '">';
                html += '<div>';
                html += '<div style="color: grey; ">' + month.service + '</div>';
                html += '<img class="image" src="https://zeljkoobrenovic.github.io/sokrates-media/' + getImage(month.service) + '" onerror="this.onerror=null;this.src=\'../logos/general/aws.svg\';">';
                html += '</div>';
                html += '</div>';
                html += '</td>';

                const costs = [];
                months.sort().reverse().forEach(m => {
                    costs.push({
                        month: m,
                        costs: getCosts(month.service, m)
                    });
                });

                let index = 0;
                costs.forEach(cost => {
                    const m = cost.month;
                    const nextCost = index + 1 < costs.length ? costs[index + 1].costs : null;
                    html += '<td style="text-align: center; vertical-align: bottom; font-size: 12px">';
                    let value = getCosts(month.service, m);
                    let delta = nextCost ? ((value > nextCost ? '<span style="color: crimson">▲+</span>' : '<span style="color: green">▼</span>') + Math.round(100 * (value / nextCost - 1))) + '%' : '';
                    if (value > 0) {
                        color = (delta.includes('+')) ? 'crimson' : 'darkgreen';
                        html += '<div style="width: 100%; text-align: center; font-size: 90%; color: ' + color + '">' + delta + '</div>'
                        html += '$' + numberWithCommas(value);
                        html += '<div style="width: 100%; background-color: #1e73be; height: ' + (56 * value / max) + 'px"></div>'
                    }
                    html += '</td>';
                    index += 1;
                })


                html += '</tr>';
            }
        );
        html += ('</table>');
        html += ('<div style="color: grey; font-size: 80%">' + filtered.length + ' items</div>');
        document.getElementById('Content').innerHTML = html;
    }

    if (filterParam) {
        document.getElementById('filter').value = filterParam;
    }

    update();

</script>
