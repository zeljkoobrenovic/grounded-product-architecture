<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Governance (DKV)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero-title {
            font-size: 56px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            line-height: 1.4;
            max-width: 960px;
            margin-bottom: 18px;
        }

        .summary-strip {
            margin: 0 0 18px 0;
        }

        .stat {
            display: inline-block;
            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 30px;
            color: #34596b;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .section {
            margin-top: 24px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: #34596b;
        }

        .section-copy {
            color: #6b7280;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-topline {
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #ebf2f5;
            color: #34596b;
        }

        .meta {
            color: #6b7280;
            font-size: 13px;
        }

        .card-title {
            font-size: 22px;
            line-height: 1.3;
            margin: 0 0 10px 0;
            color: #34596b;
        }

        .card-copy {
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
        }

        .pill-meta {
            color: #6b7280;
        }

        .pill-name {
            font-weight: bold;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>

    <a class="section-link " href="../business/index.html">Business</a>
    <a class="section-link " href="../application/index.html">Application</a>
    <a class="section-link " href="../data/index.html">Data</a>
    <a class="section-link " href="../technology/index.html">Technology</a>
    <a class="section-link " href="../implementation/index.html">Implementation</a>
    <a class="section-link active" href="../governance/index.html">Governance</a>
    <a class="section-link " href="../rituals/index.html">Rituals</a>
</div>

<div class="hero-title">Governance</div>
<div class="hero-subtitle">DKV | Roles, forums, controls, and decision rights supporting architecture governance.</div>

<div id="Summary" class="summary-strip"></div>
<div id="Sections"></div>

<script>
    const page = {"stats": [{"label": "Entities", "value": 12}, {"label": "Roles", "value": 4}, {"label": "Forums", "value": 4}], "sections": [{"title": "Roles", "description": "Architecture and business roles participating in governance.", "items": [{"id": "enterprise-architect", "title": "Enterprise Architect", "subtitle": "", "summary": "Maintains enterprise-wide consistency across the DKV architecture landscape.", "description": "", "pills": [], "raw": {"name": "Enterprise Architect", "responsibility": "Maintains enterprise-wide consistency across the DKV architecture landscape.", "id": "enterprise-architect"}}, {"id": "domain-architect", "title": "Domain Architect", "subtitle": "", "summary": "Owns the target and transition architectures for DKV.", "description": "", "pills": [], "raw": {"name": "Domain Architect", "responsibility": "Owns the target and transition architectures for DKV.", "id": "domain-architect"}}, {"id": "business-owner", "title": "Business Owner", "subtitle": "", "summary": "Provides business accountability for capability and process decisions.", "description": "", "pills": [], "raw": {"name": "Business Owner", "responsibility": "Provides business accountability for capability and process decisions.", "id": "business-owner"}}, {"id": "technology-owner", "title": "Technology Owner", "subtitle": "", "summary": "Owns platform standards, lifecycle, and technical risk posture.", "description": "", "pills": [], "raw": {"name": "Technology Owner", "responsibility": "Owns platform standards, lifecycle, and technical risk posture.", "id": "technology-owner"}}]}, {"title": "Forums", "description": "Governance forums sustaining architecture decision-making.", "items": [{"id": "architecture-review-board", "title": "Architecture Review Board", "subtitle": "", "summary": "Detailed architecture element.", "description": "", "pills": [], "raw": {"name": "Architecture Review Board", "id": "architecture-review-board"}}, {"id": "data-governance-council", "title": "Data Governance Council", "subtitle": "", "summary": "Detailed architecture element.", "description": "", "pills": [], "raw": {"name": "Data Governance Council", "id": "data-governance-council"}}, {"id": "technology-standards-review", "title": "Technology Standards Review", "subtitle": "", "summary": "Detailed architecture element.", "description": "", "pills": [], "raw": {"name": "Technology Standards Review", "id": "technology-standards-review"}}, {"id": "portfolio-architecture-review", "title": "Portfolio Architecture Review", "subtitle": "", "summary": "Detailed architecture element.", "description": "", "pills": [], "raw": {"name": "Portfolio Architecture Review", "id": "portfolio-architecture-review"}}]}, {"title": "Controls", "description": "Controls used to steer and assure architecture quality.", "items": [{"id": "architecture-decision-records", "title": "Architecture decision records", "subtitle": "", "summary": "Detailed architecture element.", "description": "", "pills": [], "raw": {"name": "Architecture decision records", "id": "architecture-decision-records"}}, {"id": "reference-architecture-compliance-checks", "title": "Reference architecture compliance checks", "subtitle": "", "summary": "Detailed architecture element.", "description": "", "pills": [], "raw": {"name": "Reference architecture compliance checks", "id": "reference-architecture-compliance-checks"}}, {"id": "data-stewardship-and-classification-reviews", "title": "Data stewardship and classification reviews", "subtitle": "", "summary": "Detailed architecture element.", "description": "", "pills": [], "raw": {"name": "Data stewardship and classification reviews", "id": "data-stewardship-and-classification-reviews"}}, {"id": "technology-lifecycle-and-obsolescence-reviews", "title": "Technology lifecycle and obsolescence reviews", "subtitle": "", "summary": "Detailed architecture element.", "description": "", "pills": [], "raw": {"name": "Technology lifecycle and obsolescence reviews", "id": "technology-lifecycle-and-obsolescence-reviews"}}]}]};

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderSummary() {
        let html = '';
        (page.stats || []).forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function renderCard(item, sectionName) {
        let html = '<a href="landing_pages/' + encodeURIComponent(item.id) + '.html" target="_blank" rel="noopener noreferrer"><div class="card">';
        html += '<div class="card-topline"><span class="badge">' + escapeHtml(sectionName) + '</span><span class="meta">' + escapeHtml(item.subtitle || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title || '') + '</div>';
        html += '<div class="card-copy">' + escapeHtml(item.summary || '') + '</div>';
        (item.pills || []).forEach(pill => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(pill.name || '') + '</div><div class="pill-meta">' + escapeHtml(pill.meta || '') + '</div></div></div>';
        });
        html += '</div></a>';
        return html;
    }

    function renderSections() {
        let html = '';
        (page.sections || []).forEach(section => {
            html += '<div class="section">';
            html += '<div class="section-title">' + escapeHtml(section.title || '') + '</div>';
            if (section.description) {
                html += '<div class="section-copy">' + escapeHtml(section.description) + '</div>';
            }
            html += '<div class="grid">';
            (section.items || []).forEach(item => {
                html += renderCard(item, section.title || '');
            });
            html += '</div></div>';
        });
        document.getElementById('Sections').innerHTML = html;
    }

    renderSummary();
    renderSections();
</script>
</body>
</html>
