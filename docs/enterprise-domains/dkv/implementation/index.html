<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Implementation (DKV)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero-title {
            font-size: 56px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            line-height: 1.4;
            max-width: 960px;
            margin-bottom: 18px;
        }

        .summary-strip {
            margin: 0 0 18px 0;
        }

        .stat {
            display: inline-block;
            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 30px;
            color: #34596b;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .section {
            margin-top: 24px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: #34596b;
        }

        .section-copy {
            color: #6b7280;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-topline {
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #ebf2f5;
            color: #34596b;
        }

        .meta {
            color: #6b7280;
            font-size: 13px;
        }

        .card-title {
            font-size: 22px;
            line-height: 1.3;
            margin: 0 0 10px 0;
            color: #34596b;
        }

        .card-copy {
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
        }

        .pill-meta {
            color: #6b7280;
        }

        .pill-name {
            font-weight: bold;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<div class="domain-label">DKV</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link " href="../motivation/index.html">Motivation</a>
    <a class="section-link " href="../business/index.html">Business</a>
    <a class="section-link " href="../application/index.html">Application</a>
    <a class="section-link " href="../data/index.html">Data</a>
    <a class="section-link " href="../technology/index.html">Technology</a>
    <a class="section-link active" href="../implementation/index.html">Implementation</a>
    <a class="section-link " href="../governance/index.html">Governance</a>
    <a class="section-link " href="../rituals/index.html">Rituals</a>
</div>

<div class="hero-title">Implementation</div>
<div class="hero-subtitle">DKV | Transition architectures, work packages, milestones, and governance checkpoints for change.</div>

<div id="Summary" class="summary-strip"></div>
<div id="Sections"></div>

<script>
    const page = {"stats": [{"label": "Entities", "value": 4}, {"label": "Work Packages", "value": 1}, {"label": "Milestones", "value": 0}], "sections": [{"title": "Transition Architectures", "description": "Baseline, transition, and target architecture stages.", "items": [{"id": "baseline-architecture", "title": "Baseline Architecture", "subtitle": "", "summary": "Current-state applications, data domains, and technology patterns.", "description": "", "pills": [], "raw": {"name": "Baseline Architecture", "focus": "Current-state applications, data domains, and technology patterns.", "id": "baseline-architecture"}}, {"id": "transition-architecture", "title": "Transition Architecture", "subtitle": "", "summary": "Sequenced change packages reducing fragmentation and target-state gaps.", "description": "", "pills": [], "raw": {"name": "Transition Architecture", "focus": "Sequenced change packages reducing fragmentation and target-state gaps.", "id": "transition-architecture"}}, {"id": "target-architecture", "title": "Target Architecture", "subtitle": "", "summary": "Coherent business, application, data, and technology landscape.", "description": "", "pills": [], "raw": {"name": "Target Architecture", "focus": "Coherent business, application, data, and technology landscape.", "id": "target-architecture"}}]}, {"title": "Work Packages", "description": "Sequenced change packages that implement the architecture.", "items": [{"id": "wp-1", "title": "Establish baseline, target, and transition architectures", "subtitle": "architecture-work-package", "summary": "Detailed architecture element.", "description": "", "pills": [], "raw": {"id": "wp-1", "name": "Establish baseline, target, and transition architectures", "type": "architecture-work-package", "targetDate": "", "impactedBuildingBlocks": [], "deliveryTouchpoints": []}}]}]};

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderSummary() {
        let html = '';
        (page.stats || []).forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function renderCard(item, sectionName) {
        let html = '<a href="landing_pages/' + encodeURIComponent(item.id) + '.html" target="_blank" rel="noopener noreferrer"><div class="card">';
        html += '<div class="card-topline"><span class="badge">' + escapeHtml(sectionName) + '</span><span class="meta">' + escapeHtml(item.subtitle || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title || '') + '</div>';
        html += '<div class="card-copy">' + escapeHtml(item.summary || '') + '</div>';
        (item.pills || []).forEach(pill => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(pill.name || '') + '</div><div class="pill-meta">' + escapeHtml(pill.meta || '') + '</div></div></div>';
        });
        html += '</div></a>';
        return html;
    }

    function renderSections() {
        let html = '';
        (page.sections || []).forEach(section => {
            html += '<div class="section">';
            html += '<div class="section-title">' + escapeHtml(section.title || '') + '</div>';
            if (section.description) {
                html += '<div class="section-copy">' + escapeHtml(section.description) + '</div>';
            }
            html += '<div class="grid">';
            (section.items || []).forEach(item => {
                html += renderCard(item, section.title || '');
            });
            html += '</div></div>';
        });
        document.getElementById('Sections').innerHTML = html;
    }

    renderSummary();
    renderSections();
</script>
</body>
</html>
