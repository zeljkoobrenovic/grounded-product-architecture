<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application (Mambu)</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero-title {
            font-size: 56px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            line-height: 1.4;
            max-width: 960px;
            margin-bottom: 18px;
        }

        .summary-strip {
            margin: 0 0 18px 0;
        }

        .stat {
            display: inline-block;
            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 30px;
            color: #34596b;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .section {
            margin-top: 24px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: #34596b;
        }

        .section-copy {
            color: #6b7280;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-topline {
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #ebf2f5;
            color: #34596b;
        }

        .meta {
            color: #6b7280;
            font-size: 13px;
        }

        .card-title {
            font-size: 22px;
            line-height: 1.3;
            margin: 0 0 10px 0;
            color: #34596b;
        }

        .card-copy {
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
        }

        .pill-meta {
            color: #6b7280;
        }

        .pill-name {
            font-weight: bold;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<div class="domain-label">Mambu</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link " href="../motivation/index.html">Motivation</a>
    <a class="section-link " href="../business/index.html">Business</a>
    <a class="section-link active" href="../application/index.html">Application</a>
    <a class="section-link " href="../data/index.html">Data</a>
    <a class="section-link " href="../technology/index.html">Technology</a>
    <a class="section-link " href="../implementation/index.html">Implementation</a>
    <a class="section-link " href="../governance/index.html">Governance</a>
    <a class="section-link " href="../rituals/index.html">Rituals</a>
</div>

<div class="hero-title">Application</div>
<div class="hero-subtitle">Mambu | Application components, services, and interactions across the domain landscape.</div>

<div id="Summary" class="summary-strip"></div>
<div id="Sections"></div>

<script>
    const page = {"stats": [{"label": "Entities", "value": 5}, {"label": "Components", "value": 3}, {"label": "Interactions", "value": 2}], "sections": [{"title": "Application Components", "description": "The core application components in the domain.", "items": [{"id": "P1", "title": "Composable Core Banking Platform", "subtitle": "Core Banking SaaS", "summary": "Application component supporting the Composable Core Banking Platform service landscape.", "description": "Application component supporting the Composable Core Banking Platform service landscape.", "pills": [], "raw": {"id": "P1", "name": "Composable Core Banking Platform", "type": "Core Banking SaaS", "description": "Application component supporting the Composable Core Banking Platform service landscape.", "supportsBusinessServices": ["service-1"], "applicationServices": [{"id": "P1-svc-1", "name": "Operations and Product Console", "channelType": "web", "description": "Primary browser workspace for configuring banking products, monitoring operations, and managing controlled change."}, {"id": "P1-svc-2", "name": "Core Banking APIs", "channelType": "public_api", "description": "External-facing APIs for product, account, and transaction services used by channels and enterprise systems."}, {"id": "P1-svc-3", "name": "Migration and Platform Dashboard", "channelType": "dashboard", "description": "Operational visibility for migration waves, service health, and platform utilization."}, {"id": "P1-svc-4", "name": "Event and Integration Layer", "channelType": "partner_api", "description": "Reusable event and integration layer for payments, CRM, general ledger, and surrounding banking services."}]}}, {"id": "P2", "title": "Digital Lending Operating Layer", "subtitle": "Lending Platform", "summary": "Application component supporting the Digital Lending Operating Layer service landscape.", "description": "Application component supporting the Digital Lending Operating Layer service landscape.", "pills": [], "raw": {"id": "P2", "name": "Digital Lending Operating Layer", "type": "Lending Platform", "description": "Application component supporting the Digital Lending Operating Layer service landscape.", "supportsBusinessServices": ["service-2"], "applicationServices": [{"id": "P2-svc-1", "name": "Lending Configuration and Servicing Workspace", "channelType": "web", "description": "Browser workspace for launching loan products, managing servicing workflows, and controlling exceptions."}, {"id": "P2-svc-2", "name": "Origination and Partner API Layer", "channelType": "partner_api", "description": "APIs used by direct channels, brokers, merchants, and embedded-finance partners for origination and servicing actions."}, {"id": "P2-svc-3", "name": "Portfolio and Unit Economics Dashboard", "channelType": "dashboard", "description": "Analytics surface for portfolio growth, delinquency, servicing efficiency, and cohort economics."}, {"id": "P2-svc-4", "name": "Servicing Automation API", "channelType": "api", "description": "Internal and ecosystem API surface for repayment changes, collections actions, and loan-servicing workflows."}]}}, {"id": "P3", "title": "Embedded Finance Partner Platform", "subtitle": "BaaS and Embedded Finance", "summary": "Application component supporting the Embedded Finance Partner Platform service landscape.", "description": "Application component supporting the Embedded Finance Partner Platform service landscape.", "pills": [], "raw": {"id": "P3", "name": "Embedded Finance Partner Platform", "type": "BaaS and Embedded Finance", "description": "Application component supporting the Embedded Finance Partner Platform service landscape.", "supportsBusinessServices": ["service-3"], "applicationServices": [{"id": "P3-svc-1", "name": "Partner Operations Portal", "channelType": "web", "description": "Operational workspace for onboarding partners, resolving exceptions, and managing live partner programs."}, {"id": "P3-svc-2", "name": "Partner Developer APIs", "channelType": "public_api", "description": "Public APIs for partners embedding accounts, lending, payments, and servicing flows into their own products."}, {"id": "P3-svc-3", "name": "Webhook and Event Network", "channelType": "partner_api", "description": "Real-time event and webhook distribution for embedded-finance partners."}, {"id": "P3-svc-4", "name": "Partner Performance and Revenue Dashboard", "channelType": "dashboard", "description": "Dashboard for partner go-live velocity, adoption, revenue contribution, and operating health."}]}}]}, {"title": "Application Interactions", "description": "How major components exchange information or coordinate behavior.", "items": [{"id": "application-2-1", "title": "application-2-1", "subtitle": "serves-and-exchanges-information-with", "summary": "Composable Core Banking Platform exchanges domain information with Digital Lending Operating Layer as part of the end-to-end operating model.", "description": "Composable Core Banking Platform exchanges domain information with Digital Lending Operating Layer as part of the end-to-end operating model.", "pills": [], "raw": {"source": "P1", "target": "P2", "relationship": "serves-and-exchanges-information-with", "description": "Composable Core Banking Platform exchanges domain information with Digital Lending Operating Layer as part of the end-to-end operating model.", "id": "application-2-1"}}, {"id": "application-2-2", "title": "application-2-2", "subtitle": "serves-and-exchanges-information-with", "summary": "Digital Lending Operating Layer exchanges domain information with Embedded Finance Partner Platform as part of the end-to-end operating model.", "description": "Digital Lending Operating Layer exchanges domain information with Embedded Finance Partner Platform as part of the end-to-end operating model.", "pills": [], "raw": {"source": "P2", "target": "P3", "relationship": "serves-and-exchanges-information-with", "description": "Digital Lending Operating Layer exchanges domain information with Embedded Finance Partner Platform as part of the end-to-end operating model.", "id": "application-2-2"}}]}]};

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderSummary() {
        let html = '';
        (page.stats || []).forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function renderCard(item, sectionName) {
        let html = '<a href="landing_pages/' + encodeURIComponent(item.id) + '.html" target="_blank" rel="noopener noreferrer"><div class="card">';
        html += '<div class="card-topline"><span class="badge">' + escapeHtml(sectionName) + '</span><span class="meta">' + escapeHtml(item.subtitle || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title || '') + '</div>';
        html += '<div class="card-copy">' + escapeHtml(item.summary || '') + '</div>';
        (item.pills || []).forEach(pill => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(pill.name || '') + '</div><div class="pill-meta">' + escapeHtml(pill.meta || '') + '</div></div></div>';
        });
        html += '</div></a>';
        return html;
    }

    function renderSections() {
        let html = '';
        (page.sections || []).forEach(section => {
            html += '<div class="section">';
            html += '<div class="section-title">' + escapeHtml(section.title || '') + '</div>';
            if (section.description) {
                html += '<div class="section-copy">' + escapeHtml(section.description) + '</div>';
            }
            html += '<div class="grid">';
            (section.items || []).forEach(item => {
                html += renderCard(item, section.title || '');
            });
            html += '</div></div>';
        });
        document.getElementById('Sections').innerHTML = html;
    }

    renderSummary();
    renderSections();
</script>
</body>
</html>
