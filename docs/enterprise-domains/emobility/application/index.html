        body {

        a {
            color: inherit;

        .domain-label {
            margin-bottom: 10px;

        .section-nav {

        .section-link {
            display: inline-block;
            padding: 8px 14px;

            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;

        .section-link:hover {
            background-color: #eef2f7;

            color: #6b7280;

            line-height: 1.4;
            max-width: 960px;
            margin-bottom: 18px;
        }

        .summary-strip {
            margin: 0 0 18px 0;
        }

        .stat {
            display: inline-block;
            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 30px;
            color: #34596b;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .section {
            margin-top: 24px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: #34596b;
        }

        .section-copy {
            color: #6b7280;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-topline {
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #ebf2f5;
            color: #34596b;
        }

        .meta {
            color: #6b7280;
            font-size: 13px;
        }

        .card-title {
            font-size: 22px;
            line-height: 1.3;
            margin: 0 0 10px 0;
            color: #34596b;
        }

        .card-copy {
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
        }

        .pill-meta {
            color: #6b7280;
        }

        .pill-name {
            font-weight: bold;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">

eet_energy", "name": "Fleet Charging & Energy Manager", "type": "B2B SaaS", "description": "Application component supporting the Fleet Charging & Energy Manager service landscape.", "supportsBusinessServices": ["service-4"], "applicationServices": [{"id": "prod_fleet_energy-svc-1", "name": "Web Portal", "channelType": "web", "description": "Primary fleet workspace for access control, charging policy management, reimbursement, and cost analytics."}, {"id": "prod_fleet_energy-svc-2", "name": "Public API", "channelType": "public_api", "description": "External APIs for fleet data exchange, policy integration, and cross-system reporting."}, {"id": "prod_fleet_energy-svc-3", "name": "ERP Integrations", "channelType": "partner_api", "description": "Enterprise integration interfaces for expense, HR, accounting, and reimbursement systems."}]}}]}, {"title": "Application Interactions", "description": "How major components exchange information or coordinate behavior.", "items": [{"id": "application-2-1", "title": "application-2-1", "subtitle": "serves-and-exchanges-information-with", "summary": "Enterprise CPMS exchanges domain information with Roaming & Settlement Hub as part of the end-to-end operating model.", "description": "Enterprise CPMS exchanges domain information with Roaming & Settlement Hub as part of the end-to-end operating model.", "pills": [], "raw": {"source": "prod_cpms_enterprise", "target": "prod_roaming_hub", "relationship": "serves-and-exchanges-information-with", "description": "Enterprise CPMS exchanges domain information with Roaming & Settlement Hub as part of the end-to-end operating model.", "id": "application-2-1"}}, {"id": "application-2-2", "title": "application-2-2", "subtitle": "serves-and-exchanges-information-with", "summary": "Roaming & Settlement Hub exchanges domain information with EV Driver Experience as part of the end-to-end operating model.", "description": "Roaming & Settlement Hub exchanges domain information with EV Driver Experience as part of the end-to-end operating model.", "pills": [], "raw": {"source": "prod_roaming_hub", "target": "prod_driver_experience", "relationship": "serves-and-exchanges-information-with", "description": "Roaming & Settlement Hub exchanges domain information with EV Driver Experience as part of the end-to-end operating model.", "id": "application-2-2"}}, {"id": "application-2-3", "title": "application-2-3", "subtitle": "serves-and-exchanges-information-with", "summary": "EV Driver Experience exchanges domain information with Fleet Charging & Energy Manager as part of the end-to-end operating model.", "description": "EV Driver Experience exchanges domain information with Fleet Charging & Energy Manager as part of the end-to-end operating model.", "pills": [], "raw": {"source": "prod_driver_experience", "target": "prod_fleet_energy", "relationship": "serves-and-exchanges-information-with", "description": "EV Driver Experience exchanges domain information with Fleet Charging & Energy Manager as part of the end-to-end operating model.", "id": "application-2-3"}}]}]};

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderSummary() {
        let html = '';
        (page.stats || []).forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function renderCard(item, sectionName) {
        let html = '<a href="landing_pages/' + encodeURIComponent(item.id) + '.html" target="_blank" rel="noopener noreferrer"><div class="card">';
        html += '<div class="card-topline"><span class="badge">' + escapeHtml(sectionName) + '</span><span class="meta">' + escapeHtml(item.subtitle || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title || '') + '</div>';
        html += '<div class="card-copy">' + escapeHtml(item.summary || '') + '</div>';
        (item.pills || []).forEach(pill => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(pill.name || '') + '</div><div class="pill-meta">' + escapeHtml(pill.meta || '') + '</div></div></div>';
        });
        html += '</div></a>';
        return html;
    }

    function renderSections() {
        let html = '';
        (page.sections || []).forEach(section => {
            html += '<div class="section">';
            html += '<div class="section-title">' + escapeHtml(section.title || '') + '</div>';
            if (section.description) {
                html += '<div class="section-copy">' + escapeHtml(section.description) + '</div>';
            }
            html += '<div class="grid">';
            (section.items || []).forEach(item => {
                html += renderCard(item, section.title || '');
            });
            html += '</div></div>';
        });
        document.getElementById('Sections').innerHTML = html;
    }

    renderSummary();
    renderSections();
</script>
