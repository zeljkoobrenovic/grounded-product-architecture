<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data and Analytics Platform</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #ebf2f5;
            color: #34596b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .lead {
            font-size: 19px;
            line-height: 1.55;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }

        .detail-card {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 14px;
            background-color: #fafafa;
        }

        .detail-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 6px;
        }

        .detail-value {
            line-height: 1.5;
        }

        .list-row {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background-color: #fafafa;
            line-height: 1.5;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<div class="domain-label">eMobility</div>
<div class="eyebrow">Technology Domains</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
<div id="Content"></div>
<script>
    const entity = {"id": "data-analytics", "title": "Data and Analytics Platform", "subtitle": "", "summary": "Operational telemetry, analytics, and reporting services supporting SLA, optimization, and settlement insight.", "description": "Operational telemetry, analytics, and reporting services supporting SLA, optimization, and settlement insight.", "pills": [], "raw": {"id": "data-analytics", "name": "Data and Analytics Platform", "description": "Operational telemetry, analytics, and reporting services supporting SLA, optimization, and settlement insight.", "enablingBuildingBlocks": ["Driver Authorization Service", "Identity & Access Management", "Accessibility & Location Publishing", "Fleet Management"], "standardsProfile": ["Security by design", "API-first integration", "Observable operations", "Lifecycle-managed platforms"]}};
    const pageMeta = {"domainName": "eMobility", "pageTitle": "Technology", "subtitle": ""};

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function isPrimitive(value) {
        return value === null || ['string', 'number', 'boolean'].includes(typeof value);
    }

    function renderValue(value) {
        if (Array.isArray(value)) {
            if (!value.length) {
                return '';
            }
            if (value.every(isPrimitive)) {
                let html = '';
                value.forEach(item => {
                    html += '<div class="list-row">' + escapeHtml(String(item)) + '</div>';
                });
                return html;
            }
            let html = '';
            value.forEach(item => {
                html += '<div class="list-row">' + renderObject(item) + '</div>';
            });
            return html;
        }
        if (value && typeof value === 'object') {
            return renderObject(value);
        }
        return '<div class="detail-value">' + escapeHtml(String(value)) + '</div>';
    }

    function renderObject(obj) {
        let primitiveEntries = [];
        let complexEntries = [];
        Object.keys(obj || {}).forEach(key => {
            const value = obj[key];
            if (['id', 'name', 'title', 'description'].includes(key)) {
                return;
            }
            if (isPrimitive(value)) {
                primitiveEntries.push([key, value]);
            } else {
                complexEntries.push([key, value]);
            }
        });
        let html = '';
        if (primitiveEntries.length) {
            html += '<div class="detail-grid">';
            primitiveEntries.forEach(entry => {
                html += '<div class="detail-card"><div class="detail-label">' + escapeHtml(entry[0]) + '</div><div class="detail-value">' + escapeHtml(String(entry[1])) + '</div></div>';
            });
            html += '</div>';
        }
        complexEntries.forEach(entry => {
            html += '<div class="section"><div class="section-title">' + escapeHtml(entry[0]) + '</div>' + renderValue(entry[1]) + '</div>';
        });
        return html;
    }

    document.getElementById('Title').innerHTML = escapeHtml(entity.title || entity.name || 'Entity');
    document.getElementById('Meta').innerHTML = escapeHtml(pageMeta.domainName) + ' | ' + escapeHtml(pageMeta.pageTitle) + (pageMeta.subtitle ? ' | ' + escapeHtml(pageMeta.subtitle) : '');

    let html = '';
    if (entity.description || entity.summary) {
        html += '<div class="section"><div class="section-title">Overview</div><div class="lead">' + escapeHtml(entity.description || entity.summary) + '</div></div>';
    }
    html += '<div class="section"><div class="section-title">Details</div>' + renderObject(entity.raw || {}) + '</div>';
    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
