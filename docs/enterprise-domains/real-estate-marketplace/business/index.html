        .stat {

            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;

            color: #34596b;
        }

            margin-bottom: 14px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;

        .card-topline {
            margin-bottom: 10px;

            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #ebf2f5;
            color: #34596b;

            color: #6b7280;
            font-size: 13px;
        }

        .card-title {
            font-size: 22px;
            line-height: 1.3;
            margin: 0 0 10px 0;
            color: #34596b;
        }

        .card-copy {
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
        }

        .pill-meta {
            color: #6b7280;
        }

        .pill-name {
            font-weight: bold;

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderSummary() {
        let html = '';
        (page.stats || []).forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function renderCard(item, sectionName) {
        let html = '<a href="landing_pages/' + encodeURIComponent(item.id) + '.html" target="_blank" rel="noopener noreferrer"><div class="card">';
        html += '<div class="card-topline"><span class="badge">' + escapeHtml(sectionName) + '</span><span class="meta">' + escapeHtml(item.subtitle || '') + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(item.title || '') + '</div>';
        html += '<div class="card-copy">' + escapeHtml(item.summary || '') + '</div>';
        (item.pills || []).forEach(pill => {
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(pill.name || '') + '</div><div class="pill-meta">' + escapeHtml(pill.meta || '') + '</div></div></div>';
        });
        html += '</div></a>';
        return html;
    }

    function renderSections() {
        let html = '';
        (page.sections || []).forEach(section => {
            html += '<div class="section">';
            html += '<div class="section-title">' + escapeHtml(section.title || '') + '</div>';
            if (section.description) {
                html += '<div class="section-copy">' + escapeHtml(section.description) + '</div>';
            }
            html += '<div class="grid">';
            (section.items || []).forEach(item => {
                html += renderCard(item, section.title || '');
            });
            html += '</div></div>';
        });
        document.getElementById('Sections').innerHTML = html;
    }

    renderSummary();
    renderSections();
