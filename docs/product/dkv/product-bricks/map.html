<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Capabilities</title>
    <style type="text/css" media="all">
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .image-small {

    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function isFalse(value) {
            return !value || (value + '').toLowerCase().trim() === 'false' || (value + '').toLowerCase().trim() === 'no';
        }

        function isTrue(value) {
            return !isFalse(value);
        }
    </script>
</head>
<body>

<div style="padding: 5px; font-size: 80%; text-align: center">

    <div style="text-align: left; margin: 5px; border: 1px solid lightgrey; padding: 8px; opacity: 0.9; display: inline-block">

                </div>

        <div style="display: inline-block; margin-left: 20px; padding-top: 6px; padding: 8px">

</div>
<div id="Current"></div>

<script>

    const array = [{"domain": "Fuel & Energy Payment Solutions", "groups": [{"group": "energy payments", "items": [{"capability": "Fuel Card Management", "domain": "Fuel & Energy Payment Solutions", "id": "1101", "type": "full-stack", "group": "energy payments", "code": "FUCA", "short_description": "Lifecycle management of fuel and service cards including issuance, blocking, limits, and cross-border acceptance.", "in_flight": "true", "live": "true", "programs": "Core\nEnergy\nFraud", "inflight": true}, {"capability": "EV Charge Card & Access Management", "domain": "Fuel & Energy Payment Solutions", "id": "1102", "type": "full-stack", "group": "energy payments", "code": "EVCA", "short_description": "Provisioning and management of EV charge cards and digital access to public and semi-public charging networks.", "in_flight": "true", "live": "true", "programs": "Energy\nEV", "inflight": true}, {"capability": "Digital Payment Authorization (APP & GO)", "domain": "Fuel & Energy Payment Solutions", "id": "1103", "type": "service", "group": "energy payments", "code": "DPAY", "short_description": "Mobile-based fueling and charging authorization replacing physical cards and improving fraud prevention.", "in_flight": "true", "live": "true", "programs": "Core\nFraud\nEnergy", "inflight": true}]}, {"group": "network", "items": [{"capability": "Acceptance Network Directory", "domain": "Fuel & Energy Payment Solutions", "id": "1104", "type": "service", "group": "network", "code": "ACND", "short_description": "Centralized directory of fuel stations, EV charge points, and service partners with eligibility and pricing metadata.", "in_flight": "true", "live": "true", "programs": "Core\nEnergy\nEcosystem", "inflight": true}]}]}, {"domain": "Tolling Solutions", "groups": [{"group": "toll management", "items": [{"capability": "European Toll Coverage Management", "domain": "Tolling Solutions", "id": "1201", "type": "service", "group": "toll management", "code": "ETCM", "short_description": "Activation and administration of multi-country electronic toll services across Europe.", "in_flight": "true", "live": "true", "programs": "Toll\nCore", "inflight": true}, {"capability": "DKV BOX Device Management", "domain": "Tolling Solutions", "id": "1202", "type": "full-stack", "group": "toll management", "code": "DKVB", "short_description": "Provisioning, monitoring, and lifecycle management of DKV BOX toll devices.", "in_flight": "true", "live": "true", "programs": "Toll", "inflight": true}]}, {"group": "billing & settlement", "items": [{"capability": "Toll Event Processing & Settlement", "domain": "Tolling Solutions", "id": "1203", "type": "service", "group": "billing & settlement", "code": "TOEP", "short_description": "Collection, validation, reconciliation, and billing of toll events across national systems.", "in_flight": "true", "live": "true", "programs": "Toll\nFinance", "inflight": true}]}]}, {"domain": "Fleet & Mobility Services", "groups": [{"group": "fleet operations", "items": [{"capability": "Digital Fleet Portal", "domain": "Fleet & Mobility Services", "id": "1301", "type": "full-stack", "group": "fleet operations", "code": "DFPO", "short_description": "Central web portal for managing cards, vehicles, drivers, invoices, toll products, and reporting.", "in_flight": "true", "live": "true", "programs": "Core", "inflight": true}, {"capability": "Telematics Integration Hub", "domain": "Fleet & Mobility Services", "id": "1302", "type": "integration", "group": "fleet operations", "code": "TELH", "short_description": "Integration layer for telematics providers enabling vehicle data ingestion and operational insights.", "in_flight": "true", "live": "true", "programs": "Core\nAI", "inflight": true}, {"capability": "Vehicle Services Coordination", "domain": "Fleet & Mobility Services", "id": "1303", "type": "service", "group": "fleet operations", "code": "VESE", "short_description": "Access orchestration for roadside assistance, repair services, transport service", "group": "sustainability", "code": "ETAT", "short_description": "Analytics identifying electrification opportunities, energy mix optimization, and cost-emission trade-offs.", "in_flight": "true", "live": "false", "programs": "Energy\nAI\nESG", "inflight": true}]}]}, {"domain": "Financial Services", "groups": [{"group": "billing & settlement", "items": [{"capability": "Consolidated Mobility Invoicing", "domain": "Financial Services", "id": "1501", "type": "service", "group": "billing & settlement", "code": "CMIN", "short_description": "Cross-service invoice consolidation covering fuel, EV, toll, and ancillary services.", "in_flight": "true", "live": "true", "programs": "Finance\nCore", "inflight": true}]}, {"group": "tax services", "items": [{"capability": "VAT & Excise Refund Services", "domain": "Financial Services", "id": "1502", "type": "service", "group": "tax services", "code": "VREF", "short_description": "Automated cross-border VAT and excise duty refund processing for transport companies.", "in_flight": "true", "live": "true", "programs": "Finance\nTax", "inflight": true}]}, {"group": "embedded finance", "items": [{"capability": "Financial Management & Credit Services", "domain": "Financial Services", "id": "1503", "type": "service", "group": "embedded finance", "code": "FMCS", "short_description": "Mobility-specific financial products such as payment terms, credit management, and liquidity support.", "in_flight": "true", "live": "true", "programs": "Finance", "inflight": true}]}]}, {"domain": "Platform Core", "groups": [{"group": "core infrastructure", "items": [{"capability": "Mobility Transaction Ledger", "domain": "Platform Core", "id": "9001", "type": "service", "group": "core infrastructure", "code": "MTLD", "short_description": "Unified ledger for fuel, EV charging, toll, and vehicle service transactions.", "in_flight": "true", "live": "true", "programs": "Core", "inflight": true}, {"capability": "Identity & Access Management", "domain": "Platform Core", "id": "9002", "type": "service", "group": "core infrastructure", "code": "IAMG", "short_description": "Authentication, role-based access control, and policy enforcement across fleet, driver, and partner domains.", "in_flight": "true", "live": "true", "programs": "Core", "inflight": true}]}, {"group": "ecosystem infrastructure", "items": [{"capability": "Developer & Partner API Gateway", "domain": "Platform Core", "id": "9003", "type": "integration", "group": "ecosystem infrastructure", "code": "APIG", "short_description": "API management layer enabling integrations with fuel networks, CPOs, ERP systems, and telematics providers.", "in_flight": "true", "live": "true", "programs": "Core\nEcosystem", "inflight": true}]}, {"group": "data platform", "items": [{"capability": "Data & Analytics Platform", "domain": "Platform Core", "id": "9004", "type": "service", "group": "data platform", "code": "DAPL", "short_description": "Central data platform consolidating transaction, fleet, toll, and sustainability datasets for analytics and reporting.", "in_flight": "true", "live": "true", "programs": "Core\nAI\nESG", "inflight": true}]}]}];
    const targets = {"metadata": {"exportDate": "2025-05-21"}, "data": []};

    const typeColorMap = {};

    config.types.forEach(type => {
        typeColorMap[type.id.toLowerCase()] = type;
        typeColorMap[type.name.toLowerCase()] = type;
    });

    function colorOf(type) {
        if (type && typeColorMap[type.toLowerCase()]) {
            return typeColorMap[type.toLowerCase()].color;
        }
        return '#f3f3f3ff';
    }

    function targetByCapability(name) {
        let result = targets.data.filter(c => c.source.toLowerCase() === name.toLowerCase())[0];
        return result ? result.data : [];
    }

    array.forEach(domain => {
        domain.groups.forEach(group => {
            group.items.forEach(capability => {
                capability.targets = targetByCapability(capability.capability);
                console.log(capability.targets);
                capability.targets_okr = capability.targets.filter(t => t.okr_target + '' === 'true');
                console.log(capability.targets_okr);
                capability.targets_okr_done = capability.targets_okr.filter(t => t.status && t.status.toLowerCase().startsWith("live"));
                capability.targets_okr_partially = capability.targets_okr.filter(t => t.status && t.status.toLowerCase().startsWith("part"));
                capability.targets_okr_not_done = capability.targets_okr.filter(t => !t.status || t.status === '' || t.status.toLowerCase().startsWith("not"));

</script>

<script>
    function count(capabilities) {
        const showLive = document.getElementById('LiveChecked').checked;
        const showInFlight = document.getElementById('InFlightChecked').checked;
        const showNotInFlight = document.getElementById('NotInFlightChecked').checked;
        const targetChecked = document.getElementById('TargetChecked').checked;
        let n = 0;

        capabilities.forEach(function (source) {
            source.groups.forEach(function (group) {
                let items = group.items;
                items = items.filter(c => !targetChecked || c.targets_okr.length > 0);
                items = items.filter(c => (showLive && isTrue(c.live)) || (showInFlight && isTrue(c.in_flight)) || (showNotInFlight && isFalse(c.in_flight)));
                n += items.length;
            });
        });

        return n;
    }

    function countGroupItem(groups) {
        const showLive = document.getElementById('LiveChecked').checked;
        const showInFlight = document.getElementById('InFlightChecked').checked;
        const showNotInFlight = document.getElementById('NotInFlightChecked').checked;
        const targetChecked = document.getElementById('TargetChecked').checked;
        let n = 0;

        groups.forEach(function (group) {
            let items = group.items;
            items = items.filter(c => !targetChecked || (c.targets_okr.length > 0));
            items = items.filter(c => (showLive && isTrue(c.live)) || (showInFlight && isTrue(c.in_flight)) || (showNotInFlight && isFalse(c.in_flight)));
            n += items.length;
        });

        return n;
    }

    function processCapabilities(capabilities, showChannels) {
        const showLive = document.getElementById('LiveChecked').checked;
        const showInFlight = document.getElementById('InFlightChecked').checked;
        const showNotInFlight = document.getElementById('NotInFlightChecked').checked;

        let html = '';
        html += '<div style="padding: 8px">';

        let targetChecked = document.getElementById('TargetChecked').checked;

        let totalTarget = 0;
        let totalPartiallyReached = 0;
        let totalReached = 0;
        capabilities.filter(source => source.domain).forEach(function (source) {
            source.groups.forEach(function (group) {
                let items = group.items;
                items = items.filter(c => !targetChecked || c.targets_okr.length > 0);
                items.forEach(function (item) {
                    if (targetChecked) {
                        totalTarget += item.targets_okr.length;
                        totalPartiallyReached += item.targets_okr_partially.length;
                        totalReached += item.targets_okr_done.length;
                    }
                });
            });
        });

        const goal = 146; // Math.floor(totalTarget * 0.8);

        const reachedPerc = Math.round(100 * totalReached / goal);
        const partiallyReachedPerc = Math.round(100 * totalPartiallyReached / goal);


        function checkForGoal(index) {
            if (index === goal) {
                html += '<div style="border: 1px dotted black; display:inline-block; height: 14px; width: 20px; border-radius: 5px; margin: 2px; background-color: blue; font-size: 7px; padding-top: 5px; color: white">GOAL</div>';
            }
        }

        if (totalTarget) {
            html += '<div style="margin-left: 6px">';
            html += '<div style="padding: 5px; border: 1px solid black; display:inline-block; border-radius: 5px; margin: 2px; background-color: green; font-size: 12px; padding-top: 5px; color: white; vertical-align: top">';
            html += '<span style="font-size: 140%">' + reachedPerc + '%</span> ';
            html += ' REACHED (' + totalReached + ')</div>';
            html += '<div style="padding: 5px; border: 1px solid black; display:inline-block; border-radius: 5px; margin: 2px; background-color: orange; font-size: 12px; padding-top: 5px; color: black; vertical-align: top">';
            html += '<span style="font-size: 140%">' + partiallyReachedPerc + '%</span> ';
            html += ' PARTIALLY REACHED (' + totalPartiallyReached + ')</div>';
            html += '</div>';

            let index = 0;
            html += '<div style="text-align: center; margin-top: 8px;">';
            const totalNotReached = totalTarget - totalReached - totalPartiallyReached;
            for (let i = 0; i < totalReached; i++) {
                index += 1;
                html += '<div style="border: 1px solid black; display:inline-block; height: 14px; width: 20px; border-radius: 5px; margin: 2px; background-color: green; font-size: 7px; padding-top: 5px; color: white">' + index + '</div>';
                checkForGoal(index);
            }
            for (let i = 0; i < totalPartiallyReached; i++) {
                index += 1;
                html += '<div style="border: 1px solid grey; display:inline-block; height: 14px; width: 20px; border-radius: 5px; margin: 2px; background-color: orange; font-size: 7px; padding-top: 5px">' + index + '</div>';
                checkForGoal(index);
            }
            for (let i = 0; i < totalNotReached; i++) {
                index += 1;
                html += '<div style="border: 1px dotted black; display:inline-block; height: 14px; width: 20px; border-radius: 5px; margin: 2px; background-color: lightgrey; font-size: 7px; padding-top: 5px; color: #323232">' + index + '</div>';
                checkForGoal(index);
            }
            html += '</div>';
        }

        function addGroupedCapabilities(source) {
            source.groups.forEach(function (group) {
                let items = group.items;
                items = items.filter(c => !targetChecked || (c.targets_okr.length > 0));
                items = items.filter(c => (showLive && isTrue(c.live)) || (showInFlight && isTrue(c.in_flight)) || (showNotInFlight && isFalse(c.in_flight)));
                if (items.length === 0) return;
                html += '<div class="container">';
                if (group.group) {
                    html += '<div style="font-size: 90%; color: blue; text-align: center">' + group.group.toLowerCase() + ' (' + items.length + ')</div>';
                }

                items.forEach(function (item) {
                    if (item.id) {
                        html += '<a target="_blank" href="landing_pages/' + item.id + '.html">';
                    }
                    let style = 'border: 1px solid white; opacity: 0.6';
                    if (isTrue(item.live)) {
                        style = 'border: 1px solid black';
                    } else if (isTrue(item.in_flight)) {
                        style = 'border: 1px dashed black';
                    }
                    html += '<div class="image-small" style="' + style + '; display: inline-block; vertical-align: top; ';
                    html += 'background-color: ' + colorOf(item.type);
                    html += (item.capability.includes('*') ? '; border: 4px solid crimson' : '');
                    html += '">' + '<img style="width: 36px" src="icons/' + item.id + '.png">';
                    html += '<div style="margin-left: 4px; overflow: hidden; vertical-align: top; display: inline-block; width: calc(100% - 40px)">';
                    html += item.capability;
                    html += '</div>';

                    function titleOf(target) {
                        let title = 'Target: Live ';
                        title += target.brand_or_country ? ' on ' + target.brand_or_country : '';
                        title += target.channel ? ' via ' + target.channel : '';
                        title += target.capability ? ' on ' + target.capability : '';
                        return title;
                    }

                    if (targetChecked) {
                        html += '<div style="text-align: center; margin-top: 8px;">';
                        item.targets_okr_done.forEach(target => {
                            html += '<div style="border: 1px solid black; display:inline-block; height: 20px; width: 20px; border-radius: 5px; margin: 2px; background-color: green" title="' + titleOf(target) + '"></div>';
                        });
                        item.targets_okr_partially.forEach(target => {
                            html += '<div style="border: 1px solid black; display:inline-block; height: 20px; width: 20px; border-radius: 5px; margin: 2px; background-color: orange" title="' + titleOf(target) + '"></div>';
                        });
                        item.targets_okr_not_done.forEach(target => {
                            html += '<div style="border: 1px dotted black; display:inline-block; height: 20px; width: 20px; border-radius: 5px; margin: 2px; background-color: lightgrey" title="' + titleOf(target) + '"></div>';
                        });
                        html += '</div>';
                    }
                    html += '</div>';

                    if (item.id) {
                        html += '</a>';
                    }
                });
                html += '</div>';
            });
        }

        capabilities.filter(source => source.domain).forEach(function (source) {
            html += '<div style="border-left: 1px solid grey; height: 100%; padding: 6px; margin: 5px; width: calc(100% - 30px); display: inline-block; vertical-align: top; text-align: center" class="container">';
            html += '<div style="font-size: 70%; color: black; text-align: left; width">' + source.domain.toLowerCase() + ' (' + countGroupItem(source.groups) + ')</div>';
            if (showChannels) {
                html += '<div class="channel"></div>';
            }
            addGroupedCapabilities(source);

            html += '</div>';
        });
        html += '</div>';

        return html;
    }

    function update() {
        document.getElementById('Current').innerHTML = processCapabilities(array, true);

        let liveCount = 0;
        let inFlightCount = 0;
        let notInFlight = 0;

        array.forEach(function (source) {
            source.groups.forEach(function (group) {
                group.items.forEach(function (item) {
                    if (isTrue(item.in_flight)) inFlightCount += 1;
                    else notInFlight += 1;

                    if (isTrue(item.live)) liveCount += 1;
                });
            });
        });

        document.getElementById('LiveBlock').innerHTML = 'LIVE (' + liveCount + ')';
        document.getElementById('InFlightBlock').innerHTML = 'In-flight + LIVE (' + inFlightCount + ')';
        document.getElementById('NotInFlightBlock').innerHTML = 'Not In-flight (' + notInFlight + ')';
    }

</script>
<div style="width: 160px; padding: 15px; margin-top: 20px; margin-bottom: 20px; font-size: 80%; display: inline-block"
     id="Legend">
</div>

<script>
    update();

    const addLegend = () => {
        let html = '<div style="margin-bottom: 3px">Legend:</div>';

        config.types.forEach(type => {
            html += '    <div style="background-color: ' + type.color + '; padding: 8px">' + type.name + '</div>';
        });

        document.getElementById("Legend").innerHTML = html;
    };

    addLegend();

</script>
