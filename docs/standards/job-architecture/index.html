            background-color: #eef2f6;
            font-size: 13px;

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function openTab(evt, tabId) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        document.getElementById(tabId).style.display = 'block';
        evt.currentTarget.className += ' active';
    }

    function formatMoney(value) {
        return new Intl.NumberFormat('en-IE', {style: 'currency', currency: 'EUR', maximumFractionDigits: 0}).format(value || 0);

        '<div class="stat"><div class="stat-value">' + escapeHtml(architecture.metadata.currency || 'EUR') + '</div><div class="stat-label">Salary Currency</div></div>';

    let overviewHtml = '<div class="tab-intro">A shared product and technology career framework for a mid-size EU company, covering tracks, levels, promotion principles, and salary bands.</div>';
    overviewHtml += '<div class="grid">';
    overviewHtml += '<div class="section"><div class="section-title">Compensation Philosophy</div><div class="section-name">How Pay Works</div><div class="section-copy">' + escapeHtml((architecture.compensationPhilosophy || {}).payPositioning || '') + '</div>' + renderList([
        (architecture.compensationPhilosophy || {}).geographicApproach || '',
        ((architecture.compensationPhilosophy || {}).equityPolicy || ''),
        ((architecture.compensationPhilosophy || {}).reviewCycle || '')
    ].filter(Boolean)) + '</div>';
    overviewHtml += '<div class="section"><div class="section-title">Architecture Standards</div><div class="section-name">What Every Job Profile Includes</div>' + renderList(((architecture.jobArchitectureStandards || {}).requiredJobProfileElements || [])) + '</div>';
    overviewHtml += '</div>';
    overviewHtml += '<div class="section"><div class="section-title">Scope</div><div class="section-copy">';
    (architecture.metadata.scope || []).forEach(item => {
        overviewHtml += '<span class="pill">' + escapeHtml(item) + '</span>';
    });
    overviewHtml += '</div></div>';
    document.getElementById('overview-tab').innerHTML = overviewHtml;

    let frameworkHtml = '<div class="tab-intro">The shared level language and promotion rules used across product and technology careers.</div>';
    frameworkHtml += '<div class="section"><div class="section-title">Tracks</div>';
    (architecture.careerFramework.tracks || []).forEach(track => {
        frameworkHtml += '<div class="card" style="margin-bottom:12px"><div class="card-title">' + escapeHtml(track.name) + '</div><div class="card-copy">' + escapeHtml(track.description || '') + '</div></div>';
    });
    frameworkHtml += '</div>';
    frameworkHtml += '<div class="section"><div class="section-title">Level Definitions</div><div class="table-wrap"><table><thead><tr><th>Level</th><th>Track</th><th>Scope</th><th>Impact</th><th>Autonomy</th><th>Promotion Window</th></tr></thead><tbody>';
    allLevels.forEach(level => {
        frameworkHtml += '<tr><td>' + escapeHtml(level.id + ' | ' + level.name) + '</td><td>' + escapeHtml(level.track || '') + '</td><td>' + escapeHtml(level.scope || '') + '</td><td>' + escapeHtml(level.impact || '') + '</td><td>' + escapeHtml(level.autonomy || '') + '</td><td>' + escapeHtml(level.typicalPromotionWindowMonths || '') + '</td></tr>';
    });
    frameworkHtml += '</tbody></table></div></div>';
    frameworkHtml += '<div class="grid">';
    frameworkHtml += '<div class="section"><div class="section-title">Promotion Criteria</div>' + renderList((architecture.careerFramework || {}).promotionCriteria || []) + '</div>';
    frameworkHtml += '<div class="section"><div class="section-title">Evaluation Dimensions</div>' + renderList((architecture.careerFramework || {}).evaluationDimensions || []) + '</div>';
    frameworkHtml += '</div>';
    document.getElementById('framework-tab').innerHTML = frameworkHtml;

    function renderFamilies(familiesToRender, emptyLabel) {
        if (!familiesToRender.length) {
            return '<div class="tab-intro">' + escapeHtml(emptyLabel) + '</div>';
        }

        let html = '<div class="tab-intro">Representative titles and salary bands by family and level.</div>';
        familiesToRender.forEach(family => {
            html += '<div class="family-block">';
            html += '<div class="family-header"><div class="family-title">' + escapeHtml(family.name) + '</div><div class="family-meta">' + escapeHtml(family.discipline || '') + '</div><div class="section-copy">' + escapeHtml(family.familyMission || '') + '</div></div>';
            html += '<div class="section"><div class="section-title">Core Competencies</div>';
            (family.coreCompetencies || []).forEach(item => {
                html += '<span class="pill">' + escapeHtml(item) + '</span>';
            });
            html += '</div>';
            html += '<div class="table-wrap"><table><thead><tr><th>Level</th><th>Title</th><th>Salary Range</th><th>Midpoint</th></tr></thead><tbody>';
            (family.levels || []).forEach(level => {
                html += '<tr><td>' + escapeHtml(level.levelId || '') + '</td><td>' + escapeHtml(level.title || '') + '</td>';
                html += '<td>' + renderSalaryRange(level.salaryRange) + '';
                html += '<div style="width: 100%; white-space: nowrap">';
                const minPerc = level.salaryRange && level.salaryRange.min ? ((level.salaryRange.min / maxSalary) * 100) : 0;
                const maxPerc = level.salaryRange && level.salaryRange.max ? ((level.salaryRange.max / maxSalary) * 100) : 0;
                html += '<div style="height: 4px; width: ' + minPerc + '%; background-color: lightgrey; display: inline-block"></div>';
                const color = level.levelId.toLowerCase().startsWith('m') ? 'green' : 'blue';
                html += '<div style="height: 4px; width: ' + (maxPerc - minPerc) + '%; background-color: ' + color + '; display: inline-block"></div>';
                html += '<div style="height: 4px; width: ' + (100 - maxPerc) + '%; background-color: lightgrey; display: inline-block"></div>';
                html += '</div>';
                html += '</td>';
                html += '<td class="money">' + escapeHtml(formatMoney((level.salaryRange || {}).mid || 0)) + '</td></tr>';
            });
            html += '</tbody></table></div>';
            html += '</div>';
        });
        return html;
    }

    document.getElementById('product-tab').innerHTML = renderFamilies(productFamilies, 'No product job families defined.');
    document.getElementById('technology-tab').innerHTML = renderFamilies(technologyFamilies, 'No technology job families defined.');

    let compensationHtml = '<div class="tab-intro">Compensation assumptions and market calibration notes for salary band design.</div>';
    compensationHtml += '<div class="grid">';
    compensationHtml += '<div class="section"><div class="section-title">Bonus Policy</div><div class="card-copy">' +
        '<div class="pill">IC target: ' + escapeHtml(((architecture.compensationPhilosophy || {}).bonusPolicy || {}).icTypicalTargetPercent || '') + '%</div>' +
        '<div class="pill">Manager target: ' + escapeHtml(((architecture.compensationPhilosophy || {}).bonusPolicy || {}).managerTypicalTargetPercent || '') + '%</div>' +
        '<div class="pill">Director target: ' + escapeHtml(((architecture.compensationPhilosophy || {}).bonusPolicy || {}).directorTypicalTargetPercent || '') + '%</div>' +
        '</div></div>';
    compensationHtml += '<div class="section"><div class="section-title">Market Notes</div>' + renderList(((architecture.marketCalibrationNotes || {}).notes || [])) + '</div>';
    compensationHtml += '</div>';
    compensationHtml += '<div class="section"><div class="section-title">Sources</div>';
    (((architecture.marketCalibrationNotes || {}).sources) || []).forEach(source => {
        compensationHtml += '<div class="card" style="margin-bottom:12px"><div class="card-title">' + escapeHtml(source.name || '') + '</div><div class="card-copy"><a href="' + escapeHtml(source.url || '#') + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(source.url || '') + '</a></div></div>';
    });
    compensationHtml += '</div>';
    document.getElementById('compensation-tab').innerHTML = compensationHtml;
</script>
</body>
</html>
