<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checklists</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        .section {
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .group {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .doc {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 11px;
            background-color: white;
            width: 220px;
            vertical-align: top;
        }

        a {
            text-decoration: none;
        }

        .icon {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 26px;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        body {
            margin: 40px;
        }

        ::placeholder {
            color: lightgrey;
            opacity: 1;
        }

        :-ms-input-placeholder {
            color: lightgrey;
        }

        ::-ms-input-placeholder {
            color: lightgrey;
        }


        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function openTab(evt, cityName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(cityName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</head>

<script>
    const data = [{"tab": "Managing Self", "resources": [{"title": "Lead Yourself First (Self-Mastery)", "items": [{"type": "Exercise", "title": "Self Awareness", "icon": "self-awareness.png", "link": "https://docs.google.com/document/d/11JU94o3lxJDN9AJ1cmzSXtYaLm-zhR0G2SM8fGHmWzk/edit?usp=sharing", "summary": "Defining your personal values requires identifying what drives you, explaining their underlying importance, and grounding them in real-world experiences to illustrate their impact on your life and career."}, {"type": "Exercise", "title": "Identify Your Strengths", "icon": "your-strengths.png", "link": "https://docs.google.com/document/d/10yN2K6JbxmcntZW-N19WPB6p3-e_mGExNTNRERRZFpA/edit?usp=sharing", "summary": "Categorizing your strengths into innate and acquired skills and capabilities helps distinguish between natural talents and learned expertise, providing a clear roadmap for personal development and professional growth."}, {"type": "Exercise", "title": "Understand Your Values", "icon": "your-values.png", "link": "https://docs.google.com/document/d/1L_dcmLnjwSvMrd_HepsUnpPG9504lHT398zPGYJpp48/edit?usp=sharing", "summary": "Uncovering core values involves a selective process of narrowing down life priorities, identifying the specific behaviors that embody them, and weighing the positive outcomes against the inevitable trade-offs they require in a professional setting."}, {"type": "Template", "title": "Working With Me", "icon": "me.png", "link": "https://docs.google.com/document/d/1TQHPjAPfLoAu6ohva9rXO2JMyxrHgLr9F-poLJz9G1I/edit?usp=sharing", "summary": "A template that clarifies your role and priorities, how you communicate and operate day-to-day, your management style, and how you\u2019ll support and grow your team so everyone knows what to expect and how to work with you effectively."}, {"type": "Example", "title": "Working With Me Example", "icon": "me-example.png", "link": "https://docs.google.com/document/d/1zgpqDtUhH0xnKHZVtnBWqBxwgL5WbEU1QSDmmt_hrr0/edit?usp=sharing", "summary": "The person runs a results-driven, people-first team with clear ownership, regular structured communication, data-informed decisions, and high accountability\u2014all while keeping work collaborative, transparent, and genuinely fun."}]}, {"title": "Daring Leadership", "items": [{"type": "Exercise", "title": "Rumbling Tools", "icon": "rumble.png", "link": "https://docs.google.com/document/d/1XJEst3MQq9MovPz1qwX2l872C6tbSYbbFUEp9FJMKaU/edit?usp=sharing", "summary": "This exercise provides conversation starters and reflective tools designed to support constructive \u201crumbling\u201d by encouraging curiosity, shared understanding, accountability, and problem-focused dialogue."}, {"type": "Checklist", "title": "Braving Trust", "icon": "trust.png", "link": "https://docs.google.com/document/d/1h2_P2sVkkiCFdFH-2nkOA4Oc5pcE3YqohfSVEu8tPi4/edit?usp=sharing", "summary": "This checklist defines trust through the BRAVING framework\u2014boundaries, reliability, accountability, vault, integrity, nonjudgment, and generosity\u2014and presents it as a practical tool for fostering open, values-driven conversations and stronger trust at work."}, {"type": "Exercise", "title": "Atlas of Emotions", "icon": "emotions.png", "link": "https://docs.google.com/presentation/d/1kuuWhKTDsDnr3vXHqV_pHfsEhLlXElb2ZwvTmJVd8W8/edit?usp=sharing", "summary": "Explores thirteen categories of human emotions and experiences, mapping the internal \"places we go\" when dealing with uncertainty, comparison, disappointment, connection, hurt, and self-assessment."}]}, {"title": "Speed of Trust", "items": [{"type": "Evaluation", "title": "Speed of Trust: Self-Trust", "icon": "self-trust.png", "link": "https://docs.google.com/document/d/1GO8OkwWtg2KH-6k4bWqqXrEumOyvbRZJi_bGFhVNAUU/edit?usp=sharing", "summary": "An evaluation tool that breaks down personal trust into four core components\u2014Integrity, Intent, Capabilities, and Results\u2014each assessed through a series of statements ranging from low to high-end."}, {"type": "Checklist", "title": "13 Behaviors That Increase Trust", "icon": "trust-heart.png", "link": "https://docs.google.com/document/d/1PI_J6iVIP6EpDsevBcgYyFl362Dje8FvWGpdCLBRfz8/edit?usp=sharing", "summary": "Outlines 13 key behaviors, such as \"Talk Straight,\" \"Keep Commitments,\" and \"Extend Trust,\" that are essential for building and increasing trust."}]}, {"title": "Distancing", "items": [{"type": "Exercise", "title": "Distancing / Becoming Your Own Coach", "icon": "coach.png", "link": "https://docs.google.com/document/d/1KjWkQ3uCr894ZHTbZ8nm5YVWEtaCqKru6XHSlhml6lA/edit?usp=sharing", "summary": "Becoming Coach isn\u2019t about replacing mentors or external advice. It\u2019s about recognizing that you often already have the answers\u2014but can\u2019t see them because you\u2019re too immersed."}, {"type": "Exercise", "title": "Distancing / See the Big Picture", "icon": "big-picture.png", "link": "https://docs.google.com/document/d/1v_ldpmsDAT1BupMGfyoWqNgh7nXNIyVZY5WGDlEFmaw/edit?usp=sharing", "summary": "Spatial distancing helps us see problems more clearly by shifting perspective. Because cognition, emotion, and vision are closely linked, mental imagery allows us to view situations from a neutral, balanced perspective."}, {"type": "Exercise", "title": "Distancing / Be Your Future Self", "icon": "future.png", "link": "https://docs.google.com/document/d/1mSPvUhake25yUOy9FGyK8lJT_LGtwff6kd78EUVms8k/edit?usp=sharing", "summary": "Time-traveling to your future self (1) places you on the far side of decisions, triggering a healthy regret framework; (2) clarifies what truly matters\u2014your ideal self over what\u2019s merely practical; (3) mitigates failures of self-control."}, {"type": "Exercise", "title": "Distancing / Stop Time", "icon": "distancing.png", "link": "https://docs.google.com/document/d/10Fqy6oIJ47in2B-zh5fFyAOUUjs8x2FpgPyxI2pb85s/edit?usp=sharing", "summary": "Whether it\u2019s a $50 million text message or a difficult conversation with a team member, sometimes the best move is to pause. Blow the whistle for a time-out and become Coach."}]}, {"title": "Hidden Blockers", "items": [{"type": "Exercise", "title": "Hidden Blocker: I Need to Be Involved", "icon": "control.png", "link": "https://docs.google.com/document/d/1fsmrClrhM17S7LrmUdYS207RYQ6Xl_HKK3nzDuxBFlc/edit?usp=sharing", "summary": "It can be tempting to become overly involved. It can feel like you\u2019re doing the right thing by ensuring everything stays on course. Despite the best intentions, however, this hidden blocker can leave you too busy and scattered\u2014and prevent teams from owning their roles and growing."}, {"type": "Exercise", "title": "Hidden Blocker: I Need It Done Now", "icon": "immediate.png", "link": "https://docs.google.com/document/d/1rLOsAd9MqoTzACD7didiN1dqzUEuqFoUfwjmyxNji0w/edit?usp=sharing", "summary": "Moving on from the hidden blocker \u201cI need it done now\u201d requires letting go of a definition of success that ties self-worth solely to output and accomplishment. This shift means adopting a more balanced view\u2014one that supports well-being both inside and outside of work."}, {"type": "Exercise", "title": "Hidden Blocker: I Know I'm Right", "icon": "right.png", "link": "https://docs.google.com/document/d/1IBv5c3exntYuFq7QcAzAucoVjIcjpN81qcztSTut_CA/edit?usp=sharing", "summary": "You may be blocked by the belief that you have all the answers\u2014or that you are the only one with the right answers. If \u201cI know I\u2019m right\u201d feels like the hidden blocker holding you back, the first step is to identify how this belief shows up for you and name it."}, {"type": "Exercise", "title": "Hidden Blocker: I Can't Make a Mistake", "icon": "mistake.png", "link": "https://docs.google.com/document/d/157WEHG6WK-kEkd6UrLehCBYWrKPq6m56p8XA4RdsRjM/edit?usp=sharing", "summary": "Failure itself was not the catastrophe we believed it to be\u2014we all fall short from time to time. What makes the difference is how we respond to failures, large and small. Rather than using mistakes as reasons to beat ourselves up, give up, or despair, we can treat them as powerful opportunities for learning and growth."}, {"type": "Exercise", "title": "Hidden Blocker: If I Can Do It, So Can You", "icon": "easy.png", "link": "https://docs.google.com/document/d/196yZ0RS-FYR14O0w6kKfQQoFj1yvaj-2EDts4W-PPDQ/edit?usp=sharing", "summary": "Many successful people come to believe that what worked for them should work for everyone else\u2014that if others simply follow the same path, they\u2019ll achieve the same results. While this belief can be motivating, it does not hold up as a universal rule."}, {"type": "Exercise", "title": "Hidden Blocker: I Can't Say No", "icon": "agree.png", "link": "https://docs.google.com/document/d/1GaDoFVz5DUlSCpdSmV-RDcg3AMb_EWTKBv_pHN-zlKU/edit?usp=sharing", "summary": "Saying no is about setting boundaries and advocating for yourself. As writer and therapist Prentis Hemphill says, \u201cBoundaries are the distance at which I can love you and me simultaneously.\u201d In other words, boundaries can serve both you and others\u2014even when it means not doing what\u2019s asked."}, {"type": "Exercise", "title": "Hidden Blocker: I Don't Belong Here", "icon": "not-belonging.png", "link": "https://docs.google.com/document/d/1gJBmw7tJh79U-9zD8kx0qVixQolVzpY6NkOTmcZuqhE/edit?usp=sharing", "summary": "Have you ever struggled with the feeling that you don\u2019t fit in at work, don\u2019t belong among your peers or colleagues, or don\u2019t deserve to be where you are?"}]}]}, {"tab": "Managing Team", "resources": [{"title": "Lead a Team", "items": [{"type": "Checklist", "title": "Management Prerequisites", "icon": "management-checklist.png", "link": "https://docs.google.com/document/d/1JiU_wDd3NhfAMROWaiWY8X8EhUgF4mGfreUoGPniWkA/edit?usp=sharing", "summary": "Outlines the fundamental duties of a manager, covering legal compliance, structured communication with direct reports, team alignment, organizational clarity, and personal accountability with leadership."}, {"type": "Checklist", "title": "Work Rules", "icon": "work-rules.png", "link": "https://docs.google.com/document/d/1iNaRr41stHn741ggJqY_7zPoF4WNlGw8qwLYFRKhBRw/edit?usp=sharing", "summary": "This checklist outlines work rules for building a founder-mindset organization by emphasizing strong culture, exceptional hiring, broad empowerment, rigorous performance management, continuous learning, thoughtful incentives, and values-driven leadership."}, {"type": "Example", "title": "Team Charter", "icon": "team-charter.png", "link": "https://docs.google.com/document/d/19boTY_5TA_xc9UNyGpqPRWGWT45gF2cOAsOiikMsBKo/edit?usp=sharing", "summary": "This example team charter outlines a mission to deliver best-in-class dashboard account security through strong authentication and authorization, protecting users and merchants from account takeovers while building trust, reducing losses, supporting enterprise needs, and managing risks through defined metrics, interfaces, and strategic priorities."}, {"type": "Example", "title": "Stripe\u2019s Operating Principles", "icon": "operating-principles.png", "link": "https://docs.google.com/document/d/1DDHyvZpZRD_SvPS7aKYauYLtGTuiQ1GHpbkyUd7dy50/edit?usp=sharing", "summary": "This document defines Stripe\u2019s operating principles by outlining how teams work, the values they embody, the expectations of leaders, and enduring guideposts that emphasize user focus, urgency, craftsmanship, accountability, optimism, and long-term ambition."}]}, {"title": "Five Dysfunction of a Team", "items": [{"type": "Checklist", "title": "Lack of Trust", "icon": "open-heart.png", "link": "https://docs.google.com/document/d/1_KNQzuSZuzaoLXT5sa4WdbaC23KLgeN_vukpajTPsqo/edit?usp=sharing", "summary": "A framework for evaluating and building vulnerability-based trust within a team by focusing on leader modeling, open communication, avoiding political behavior, and prioritizing emotional risk-taking over self-protection."}, {"type": "Checklist", "title": "Fear of Conflict", "icon": "conflict.png", "link": "https://docs.google.com/document/d/1q8IJBgCdyAwwuh4jo84Ve8mS4fY3ujcnEfrUHI8HS1g/edit?usp=sharing", "summary": "A framework to overcome the Avoidance of Conflict dysfunction, focusing on building trust, establishing clear norms, and actively encouraging passionate, issue-focused debate to foster a healthier and more engaged team environment."}, {"type": "Checklist", "title": "Lack of Commitment", "icon": "commitment.png", "link": "https://docs.google.com/document/d/1anUJgFUVVL_T2Gv75t3aCudAXIT9vzumrldJn_DBrnI/edit?usp=sharing", "summary": "A framework to overcome the Avoidance of Conflict dysfunction, focusing on building trust, establishing clear norms, and actively encouraging passionate, issue-focused debate to foster a healthier and more engaged team environment."}, {"type": "Checklist", "title": "Avoidance of Accountability", "icon": "accountability.png", "link": "https://docs.google.com/document/d/1Xv9zGoeB9zSTuW6x019ZSjziI4XFxiu3qrZKOYNm0Q4/edit?usp=sharing", "summary": "Practical steps across leader modeling, peer-to-peer accountability, a Team Effectiveness Exercise (TEE), meeting practices, and sustained cultural reinforcement to address and resolve this issue."}, {"type": "Checklist", "title": "Inattention to Results", "icon": "results.png", "link": "https://docs.google.com/document/d/1_pP1r0N1iI3xlWH2IwI6aaPS9OrUT14OUm_6hQKmKgs/edit?usp=sharing", "summary": "key areas for a team to address the dysfunction of \"Inattention to Results\" by focusing on clear goals, visible metrics, team-first mentality, transparency, accountability, and continuous focus."}]}]}, {"tab": "Organizations", "resources": [{"title": "Run & Scale the Organization", "items": [{"type": "Checklist", "title": "Transformation Sets", "icon": "transformation.png", "link": "https://docs.google.com/document/d/1DevRKQRo1lnUz1KEtaD_dPy9Q5n6v ership Team, covering initial debugging and establishment, ongoing operation and definition of team values and structure, setting clear expectations for team members, preventing peer competition, and maintaining the team over time."}, {"type": "Checklist", "title": "Build Your Network", "icon": "network.png", "link": "https://docs.google.com/document/d/1aLZNAlPjfmbqd846NhiGKqLgHtuYSxGPAKtLvY3rHQI/edit?usp=sharing", "summary": "An actionable guide for Engineering Executives on building, maintaining, and strategically leveraging a professional network by adopting the right mindset, clarifying goals, utilizing different relationship types (Founders, VCs, Recruiters), and avoiding common mistakes."}, {"type": "Checklist", "title": "Onboarding Peer Executives", "icon": "peer-onboarding.png", "link": "https://docs.google.com/document/d/1ozIS2__mwyPcG7-1NWp0B8f7GKrJo8oTETdJJBzB5Jc/edit?usp=sharing", "summary": "A detailed framework for an engineering executive to successfully onboard their peer executives, focusing on aligning expectations, sharing company context and priorities, defining roles explicitly, establishing a structured partnership cadence, and monitoring progress over the first three to six months."}, {"type": "Checklist", "title": "Inspected Trust", "icon": "trust.png", "link": "https://docs.google.com/document/d/1wOdcX_6zTPQetkTmlb6a9aHdk4SWDVcp8CfvHOgc80s/edit?usp=sharing", "summary": "Outlines a management philosophy for engineering executives, shifting from \"Blind Trust\" to \"Inspected Trust\" by separating process quality from outcomes, utilizing effective inspection tools like metric forums and learning spikes, and building trust through validation and reciprocal accountability."}, {"type": "Checklist", "title": "Calibrating Your Standards", "icon": "standards.png", "link": "https://docs.google.com/document/d/1YJ_-JPbV2Wa10XQ8X7ZpxFtNERlFKhj5Vt-8tiZEF90/edit?usp=sharing", "summary": "A guide to assess their personal professional standards, diagnose potential misalignment with organizational tolerance and strategy, and employ methods like strategic escalation, role modeling, and adaptation to improve outcomes without causing burnout."}, {"type": "Checklist", "title": "Running Engineering Processes", "icon": "processes.png", "link": "https://docs.google.com/document/d/1D2Y7dIoZ6kDjUbVlUbZbRGesJ_uwGv30yzqg_AMLOTc/edit?usp=sharing", "summary": "Outlines the steps for running engineering processes, focusing on clarifying process philosophy, identifying the current organizational pattern (with Baseline as the recommended default), evaluating trade-offs, and making strategic decisions to only increase process specialization when organizational scale makes it unavoidable."}, {"type": "Checklist", "title": "Hiring", "icon": "hiring.png", "link": "https://docs.google.com/document/d/1BoCi_OYTQztyViv5v4Ihs1JhNWoC3WGAbgk7SpYNjCg/edit?usp=sharing", "summary": "Outlines best practices for establishing, monitoring, debugging, and managing a healthy, efficient, and intentional hiring process, from setting up the infrastructure and leveling framework to closing key candidates and improving diversity."}, {"type": "Checklist", "title": "Engineering Onboarding", "icon": "onboarding.png", "link": "https://docs.google.com/document/d/1A1Fy46QO5WkfWkHk43dJ6BUQbrNPTNT4cCQT3nB0AXk/edit?usp=sharing", "summary": "Outlines how to establish a successful engineering onboarding program, covering everything from setting clear goals and assigning ownership roles to designing the curriculum, avoiding common pitfalls, and continuously measuring and improving the process."}]}, {"title": "Engineering Strategy", "items": [{"type": "Checklist", "title": "Engineering Strategy Basics", "icon": "engineering-strategy.png", "link": "https://docs.google.com/document/d/1LJvEVv4oAetnxvnCcPCQIJK2JgIEy58q1liAIvgz_3Y/edit?usp=sharing", "summary": "Outlines a structured, five-step process for developing a robust engineering strategy, focusing on thorough Exploration, evidence-based Diagnosis of the core problem, rigorous Refinement of ideas, clear Policy Setting with explicit tradeoffs, and the creation of operational Mechanisms."}, {"type": "Checklist", "title": "1. Strategy Exploration", "icon": "exploration.png", "link": "https://docs.google.com/document/d/125ZAVdCTn-OitPL5CntTEDBJip-PLwyorVxPJi6s2_I/edit?usp=sharing", "summary": "Provides a structured, nine-step process for engineers to adopt the right mindset, define scope, gather inputs, mine internal precedents, use their network, read widely, document as they go, and pressure-test their assumptions before committing to a technical approach."}, {"type": "Checklist", "title": "2. Strategy Diagnosis", "icon": "diagnosis.png", "link": "https://docs.google.com/document/d/13hj3Hfrlk4zV8cO3vlsMAh7gqQrYgOYOUE72DcGDva8/edit?usp=sharing", "summary": "Guiding the development of an effective engineering strategy diagnosis by systematically defining the problem, incorporating diverse and data-driven perspectives, and rigorously pressure-testing the resulting analysis."}, {"type": "Checklist", "title": "3. Strategy Refining", "icon": "refining.png", "link": "https://docs.google.com/document/d/1Oc74GoYPQtKchY9fAC2RoHKqbsUwmCk5z3UDWP5KXhY/edit?usp=sharing", "summary": "Outlines an eight-step process for rigorously refining an engineering strategy, covering problem definition, testing, systems modeling, ecosystem analysis, antipattern awareness, toolkit expansion, and a final evidence check before committing resources."}, {"type": "Checklist", "title": "4. Strategy Policy Setting", "icon": "policy.png", "link": "https://docs.google.com/document/d/1zptVA0CmaG8_PGcB8PeUHhDMRGl7HWQhvshY6SS1Jus/edit?usp=sharing", "summary": "Provides a structured process for setting engineering strategy policies, from clarifying the foundation and drafting policies that address the diagnosis to ensuring proper scope, simplifying, backtesting, checking for conflict, confirming enforceability, choosing the     function update() {
        const filter = document.getElementById('filter').value.toLowerCase().trim();
        let count = 0;

        function capitalize(val) {
            return String(val).charAt(0).toUpperCase() + String(val).slice(1);
        }

        function addDoc(item) {
            let docHtml = '';

            docHtml += '<div class="doc">';
            docHtml += '<table>';
            docHtml += '<tr>';
            docHtml += '<td style="width: 80px">';
            docHtml += '<img src="icons/' + item.icon + '" style="vertical-align: middle; height: 80px">';
            docHtml += '</td>';
            docHtml += '<td>';
            docHtml += '<a target="_blank" href="' + item.link + '">';
            docHtml += '<div style="font-size: 95%; color: grey">' + item.type + '</div>';
            if (filter) {
                docHtml += '<div style="color: blue; font-size: 110%">' + item.title.replace(new RegExp(filter, 'i'), '<span style="background-color: yellow">' + capitalize(filter) + '</span>') + '</div>';
            } else {
                docHtml += '<div style="color: blue; font-size: 110%">' + item.title + '</div>';
            }
            docHtml += '</a>';
            docHtml += '</td>';
            docHtml += '</tr>';
            docHtml += '<tr>';
            docHtml += '<tr>';
            if (filter) {
                docHtml += '<td colspan="2" style="font-size: 80%; color: grey; border-top: 1px dashed black; padding-top: 10px">' + item.summary.replace(filter, '<span style="background-color: yellow">' + filter + '</span>') + '</td>';
            } else {
                docHtml += '<td colspan="2" style="font-size: 80%; color: grey; border-top: 1px dashed black; padding-top: 10px">' + item.summary + '</td>';
            }
            docHtml += '</table>';
            docHtml += '</div>';

            return docHtml;
        }

        document.getElementById('filtered_content').innerHTML = '';
        document.getElementById('tabs').innerHTML = '';
        document.getElementById('tab_content').innerHTML = '';

        if (filter) {
            let html = '';
            data.forEach(tab => {
                tab.resources.forEach(group => {
                    group.items.filter(i => (i.type + ' ' + i.title + ' ' + i.summary).toLowerCase().includes(filter)).forEach(item => {
                        count += 1;
                        html += addDoc(item);
                    });
                });
            });
            document.getElementById('filtered_content').innerHTML = html;
        } else {
            let tabCount = 0;
            let tabHtml = ' ';
            let contentHtml = ' ';
            data.forEach(tab => {
                tabCount += 1;
                let tabItemCount = 0;
                const tabId = 'tab_' + tabCount;
                contentHtml += '<div id="' + tabId + '" class="tabcontent" style="' + (tabCount === 1 ? 'display: block; ' : '') + 'margin: 0; padding: 6px">';
                tab.resources.forEach(group => {
                    contentHtml += '<div class="section">';
                    contentHtml += '<div>&nbsp;&nbsp;&nbsp;';
                    contentHtml += group.title;
                    contentHtml += '</div>';
                    group.items.forEach(item => {
                        contentHtml += addDoc(item);
                        count += 1;
                        tabItemCount += 1
                    });
                    contentHtml += '</div>';
                });
                contentHtml += '</div>';
                tabHtml += '<button id="tab_' + tabId + '" class="tablinks' + (tabCount === 1 ? ' active' : '') + '" onclick="openTab(event, \'' + tabId + '\')">' + tab.tab + ' (' + tabItemCount + ')</button>\n';
            });
            document.getElementById('tabs').innerHTML = tabHtml;
            document.getElementById('tab_content').innerHTML = contentHtml;
        }
        document.getElementById('search-summary').innerHTML = ' = ' + count + ' ' + (count === 1 ? 'item' : 'items');
    }

    update();
</script>
