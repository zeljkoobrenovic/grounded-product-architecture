<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lawful Basis and Purpose Limitation</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #eef2ff;
            color: #3730a3;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat {
            min-width: 160px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        .stat-value {
            font-size: 24px;
            color: #1d4ed8;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .pill {
            display: inline-block;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .status-pill.red {
            background: #fbd5d5;
        }

        .status-pill.yellow {
            background: #fde68a;
        }

        .status-pill.green {
            background: #bbf7d0;
        }

        .criteria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }

        .criteria-card {
            border: 3px solid #d1d5db;
            border-radius: 10px;
            background-color: white;
            padding: 14px;
            vertical-align: top;
        }

        .criteria-card-inactive {
            border: 3px dashed #d1d5db;
            border-radius: 10px;
            background-color: white;
            padding: 14px;
            opacity: 0.2;
        }

        .criteria-card h3 {
            margin-top: 0;
        }

        .criteria-card.red h3 {
            color: #b91c1c;
        }

        .criteria-card.yellow h3 {
            color: darkorange;
        }

        .criteria-card.green h3 {
            color: #15803d;
        }

        .evidence-item,
        .detail-item {
            margin-bottom: 8px;
            line-height: 1.45;
        }

        a {
            color: #1d4ed8;
            word-break: break-all;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<table>
    <tr>
        <td style="vertical-align: top; padding-top: 40px">
            <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="Compliance">
        </td>
        <td>
            <div class="eyebrow">Compliance Control</div>
            <h1 id="Title"></h1>
            <div id="Meta" class="meta"></div>
        </td>
    </tr>
</table>

<div id="Content"></div>

<script>
    const control = {"id": "DP-02", "name": "Lawful Basis and Purpose Limitation", "description": "Document the lawful basis and specific purpose for each processing activity.", "priority": "high", "weight": 1.0, "status": "red", "score": 1, "owner": "", "last_reviewed": "", "target_date": "", "notes": "", "evidence_links": [], "evidence_examples": ["Lawful basis register", "Privacy notice mapping", "Consent model design"], "scoring_criteria": {"red": "Lawful basis is unclear or undocumented for one or more processing activities.", "yellow": "Lawful basis is documented for some but not all core processing activities.", "green": "Each processing activity has a documented lawful basis and purpose, aligned with notices."}};
    const domain = {"id": "DP", "name": "Data Protection & Privacy", "description": "GDPR-focused controls over customer and employee personal data.", "weight": 1.4};
    const scoringModel = {"status_to_score": {"red": 1, "yellow": 2, "green": 3}, "score_to_status": {"1": "red", "2": "yellow", "3": "green"}, "definitions": {"red": {"score": 1, "label": "High risk / non-compliant", "criteria": ["Control missing or ineffective", "Material legal, financial, operational, or breach exposure", "No reliable evidence, or evidence is ad hoc/outdated"]}, "yellow": {"score": 2, "label": "Partial / immature", "criteria": ["Control exists but is incomplete, inconsistent, or not enforced everywhere", "Evidence exists but is manual, partial, or not recent", "Process depends on individuals rather than systematic control"]}, "green": {"score": 3, "label": "Effective / audit-ready", "criteria": ["Control is documented, implemented, and enforced", "Evidence is recent, repeatable, and preferably automated", "Ownership, monitoring, and review cadence are in place"]}}, "overall_maturity_bands": [{"min": 1.0, "max": 1.5, "status": "red", "label": "High risk / urgent stabilization"}, {"min": 1.6, "max": 2.2, "status": "yellow", "label": "Developing / structured improvement needed"}, {"min": 2.3, "max": 3.0, "status": "green", "label": "Mature / optimize and certify"}]};

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function listOrEmpty(items, formatter) {
        if (!items || !items.length) return '<div class="detail-item">No details captured.</div>';
        return items.map(formatter).join('');
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'Not set';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    document.getElementById('Title').innerHTML = escapeHtml(control.name || control.id || 'Compliance Control');
    document.getElementById('Meta').innerHTML =
        escapeHtml(domain.name || '')
        + ' | ' + escapeHtml(control.id || '')
        + ' | ' + escapeHtml((control.status || '').toUpperCase())
        + ' | score ' + escapeHtml(control.score || '');

    let html = '';
    html += '<div class="section"><div class="section-title">Summary</div><div class="description">' + escapeHtml(control.description || '') + '</div></div>';
    html += '<div class="section"><div class="section-title">Control Snapshot</div><div class="stats">';
    html += '<div class="stat"><div class="stat-value">' + escapeHtml(control.priority || 'n/a') + '</div><div class="stat-label">Priority</div></div>';
    html += '<div class="stat"><div class="stat-value">' + escapeHtml(control.owner || 'Unassigned') + '</div><div class="stat-label">Owner</div></div>';
    html += '<div class="stat"><div class="stat-value">' + escapeHtml(formatDate(control.last_reviewed)) + '</div><div class="stat-label">Last Reviewed</div></div>';
    html += '<div class="stat"><div class="stat-value">' + escapeHtml(formatDate(control.target_date)) + '</div><div class="stat-label">Target Date</div></div>';
    html += '</div></div>';

    if (control.notes) {
        html += '<div class="section"><div class="section-title">Notes</div><div class="description">' + escapeHtml(control.notes) + '</div></div>';
    }

    html += '<div class="section"><div class="section-title">Status</div><div class="criteria-grid">';
    ['red', 'yellow', 'green'].forEach(status => {
        const text = control.scoring_criteria && control.scoring_criteria[status]
            ? control.scoring_criteria[status]
            : 'No criteria defined.';
        if (control.status === status) {
            html += '<div class="criteria-card ' + status + '" style="border: 3px solid black"><h3>' + escapeHtml(status.toUpperCase()) + '</h3><div style="font-size: 90%; color: grey">' + escapeHtml(text) + '</div></div>';
        } else {
            html += '<div class="criteria-card-inactive"><h3>' + escapeHtml(status.toUpperCase()) + '</h3><div>' + escapeHtml(text) + '</div></div>';
        }
    });
    html += '</div></div>';

    html += '<div class="section"><div class="section-title">Evidence Examples</div>';
    html += listOrEmpty(control.evidence_examples, item => '<div class="evidence-item">' + escapeHtml(item) + '</div>');
    html += '</div>';

    html += '<div class="section"><div class="section-title">Evidence Links</div>';
    html += listOrEmpty(control.evidence_links, item => '<div class="evidence-item"><a href="' + escapeHtml(item) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item) + '</a></div>');
    html += '</div>';

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
