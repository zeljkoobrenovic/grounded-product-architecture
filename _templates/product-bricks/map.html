<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Capabilities</title>
    <style type="text/css" media="all">
        :root {
            --text-color: #111;
            --surface-muted: #f0f0f0;
            --surface-fallback: #f3f3f3;
            --group-border: lightgrey;
            --card-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
            --highlight-color: crimson;
        }

        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            color: var(--text-color);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .map {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .map-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            overflow-x: auto;
        }

        .domain-column {
            min-width: 220px;
        }

        .domain-title {
            background-color: var(--surface-muted);
            font-size: 12px;
            padding: 4px;
            text-align: center;
        }

        .domain-groups {
            text-align: center;
        }

        .group {
            border: 1px dashed var(--group-border);
            display: inline-block;
            margin: 4px;
            vertical-align: top;
        }

        .group-title {
            font-size: 80%;
            margin-top: 12px;
        }

        .group-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .brick-card {
            margin: 4px;
            padding: 3px;
            font-size: 12px;
            width: 140px;
            max-width: 144px;
            overflow: hidden;
            background-color: var(--surface-fallback);
            box-shadow: var(--card-shadow);
            text-align: left;
            min-height: 52px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
            border: 1px solid white;
        }

        .brick-card.highlighted {
            border: 4px solid var(--highlight-color);
        }

        .brick-icon {
            width: 36px;
        }

        .brick-name {
            overflow: hidden;
            width: calc(100% - 40px);
        }

        .legend {
            width: 160px;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 80%;
            display: inline-block;
        }

        .legend-title {
            margin-bottom: 3px;
        }

        .legend-item {
            padding: 8px;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>

<div id="Current"></div>

<script>
    const config = ${config};
    const bricks = ${bricks};

    const typeColorMap = {};

    config.types.forEach(type => {
        typeColorMap[type.id.toLowerCase()] = type;
        typeColorMap[type.name.toLowerCase()] = type;
    });

    function colorOf(type) {
        if (type && typeColorMap[type.toLowerCase()]) {
            return typeColorMap[type.toLowerCase()].color;
        }
        return 'var(--surface-fallback)';
    }

</script>

<script>
    function normalizeBricks(items) {
        const maxRows = 1000;

        return items.map(item => {
            const rowNumber = Number(item.row) || 1;

            return {
                ...item,
                row: Math.min(rowNumber, maxRows),
                domain: item.domain || 'Other',
                group: item.group || 'Ungrouped',
                color: colorOf(item.type),
                isHighlighted: Boolean(item.name && item.name.includes('*'))
            };
        });
    }

    function groupBricks(items) {
        const rows = new Map();

        items.forEach(item => {
            if (!rows.has(item.row)) {
                rows.set(item.row, new Map());
            }

            const domains = rows.get(item.row);
            if (!domains.has(item.domain)) {
                domains.set(item.domain, new Map());
            }

            const groups = domains.get(item.domain);
            if (!groups.has(item.group)) {
                groups.set(item.group, []);
            }

            groups.get(item.group).push(item);
        });

        return Array.from(rows.entries())
            .sort((left, right) => left[0] - right[0])
            .map(([, domains]) => Array.from(domains.entries()).map(([domain, groups]) => ({
                domain,
                groups: Array.from(groups.entries()).map(([group, itemsInGroup]) => ({
                    name: group,
                    items: itemsInGroup
                }))
            })));
    }

    function renderBrick(item) {
        const brickCard = `
            <div class="brick-card${item.isHighlighted ? ' highlighted' : ''}" style="background-color: ${item.color}">
                <img class="brick-icon" src="icons/${item.id}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                <div class="brick-name">${item.name || ''}</div>
            </div>
        `;

        if (!item.id) {
            return brickCard;
        }

        return `<a target="_blank" href="landing_pages/${item.id}.html">${brickCard}</a>`;
    }

    function renderGroup(group) {
        return `
            <div class="group">
                <div class="group-title">${group.name}</div>
                <div class="group-items">${group.items.map(renderBrick).join('')}</div>
            </div>
        `;
    }

    function renderDomain(domain) {
        return `
            <section class="domain-column">
                <div class="domain-title">${domain.domain}</div>
                <div class="domain-groups">${domain.groups.map(renderGroup).join('')}</div>
            </section>
        `;
    }

    function renderMap(items) {
        return `
            <div class="map">
                ${groupBricks(normalizeBricks(items)).map(row => `
                    <div class="map-row">
                        ${row.map(renderDomain).join('')}
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderLegend() {
        return `
            <div class="legend-title">Legend:</div>
            ${config.types.map(type => `
                <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
            `).join('')}
        `;
    }

    function update() {
        document.getElementById('Current').innerHTML = renderMap(bricks);
        document.getElementById('Legend').innerHTML = renderLegend();
    }

</script>
<div class="legend" id="Legend">
</div>

<script>
    update();
</script>

</body>
</html>
