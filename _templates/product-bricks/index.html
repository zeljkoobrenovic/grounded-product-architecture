<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Product Bricks</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-129891352-1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());
        gtag('config', 'UA-129891352-1');
    </script>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            --text-color: #111;
            --surface-muted: #f0f0f0;
            --surface-fallback: #f3f3f3;
            --group-border: lightgrey;
            --card-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
            --highlight-color: crimson;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
            max-width: 960px;
            line-height: 1.4;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }

        .bricks-panel {
            padding: 18px;
            background-color: white;
        }

        .map {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .map-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            overflow-x: auto;
        }

        .domain-column {
            min-width: 220px;
        }

        .domain-title {
            background-color: var(--surface-muted);
            font-size: 12px;
            padding: 4px;
            text-align: center;
        }

        .domain-groups {
            text-align: center;
        }

        .group {
            border: 1px dashed var(--group-border);
            display: inline-block;
            margin: 4px;
            vertical-align: top;
        }

        .group-title {
            font-size: 80%;
            margin-top: 12px;
        }

        .group-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .brick-card {
            margin: 4px;
            padding: 3px;
            font-size: 12px;
            width: 140px;
            max-width: 144px;
            overflow: hidden;
            background-color: var(--surface-fallback);
            box-shadow: var(--card-shadow);
            text-align: left;
            min-height: 52px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
            border: 1px solid white;
        }

        .brick-card.highlighted {
            border: 4px solid var(--highlight-color);
        }

        .brick-icon {
            width: 36px;
        }

        .brick-name {
            overflow: hidden;
            width: calc(100% - 40px);
        }

        .legend {
            width: 160px;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 80%;
            display: inline-block;
        }

        .legend-title {
            margin-bottom: 3px;
        }

        .legend-item {
            padding: 8px;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function initTab() {
            if (window.location.hash) {
                tabName = window.location.hash.substring(1);
                if (document.getElementById('tab_' + tabName)) {
                    openTab(tabName);
                }
            }
        }

        function openTab(tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            history.pushState({}, "", '#' + tabName);
            document.getElementById(tabName).style.display = "block";
            document.getElementById('tab_' + tabName).className += " active";
        }

        const config = ${config};
        const bricks = ${bricks};
        const typeColorMap = {};

        config.types.forEach(type => {
            typeColorMap[type.id.toLowerCase()] = type;
            typeColorMap[type.name.toLowerCase()] = type;
        });

        function colorOf(type) {
            if (type && typeColorMap[type.toLowerCase()]) {
                return typeColorMap[type.toLowerCase()].color;
            }
            return 'var(--surface-fallback)';
        }

        function normalizeBricks(items) {
            const maxRows = 1000;

            return items.map(item => {
                const rowNumber = Number(item.row) || 1;

                return {
                    ...item,
                    row: Math.min(rowNumber, maxRows),
                    domain: item.domain || 'Other',
                    group: item.group || 'Ungrouped',
                    color: colorOf(item.type),
                    isHighlighted: Boolean(item.name && item.name.includes('*'))
                };
            });
        }

        function groupBricks(items) {
            const rows = new Map();

            items.forEach(item => {
                if (!rows.has(item.row)) {
                    rows.set(item.row, new Map());
                }

                const domains = rows.get(item.row);
                if (!domains.has(item.domain)) {
                    domains.set(item.domain, new Map());
                }

                const groups = domains.get(item.domain);
                if (!groups.has(item.group)) {
                    groups.set(item.group, []);
                }

                groups.get(item.group).push(item);
            });

            return Array.from(rows.entries())
                .sort((left, right) => left[0] - right[0])
                .map(([, domains]) => Array.from(domains.entries()).map(([domain, groups]) => ({
                    domain,
                    groups: Array.from(groups.entries()).map(([group, itemsInGroup]) => ({
                        name: group,
                        items: itemsInGroup
                    }))
                })));
        }

        function renderBrick(item) {
            const brickCard = `
                <div class="brick-card${item.isHighlighted ? ' highlighted' : ''}" style="background-color: ${item.color}">
                    <img class="brick-icon" src="icons/${item.id}.png" alt="" onerror="this.onerror=null;this.src='icons/brick.png'">
                    <div class="brick-name">${item.name || ''}</div>
                </div>
            `;

            if (!item.id) {
                return brickCard;
            }

            return `<a target="_blank" href="landing_pages/${item.id}.html">${brickCard}</a>`;
        }

        function renderGroup(group) {
            return `
                <div class="group">
                    <div class="group-title">${group.name}</div>
                    <div class="group-items">${group.items.map(renderBrick).join('')}</div>
                </div>
            `;
        }

        function renderDomain(domain) {
            return `
                <section class="domain-column">
                    <div class="domain-title">${domain.domain}</div>
                    <div class="domain-groups">${domain.groups.map(renderGroup).join('')}</div>
                </section>
            `;
        }

        function renderMap(items) {
            return `
                <div class="map">
                    ${groupBricks(normalizeBricks(items)).map(row => `
                        <div class="map-row">
                            ${row.map(renderDomain).join('')}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderLegend() {
            return `
                <div class="legend-title">Legend:</div>
                ${config.types.map(type => `
                    <div class="legend-item" style="background-color: ${type.color}">${type.name}</div>
                `).join('')}
            `;
        }

        function updateBricksView() {
            document.getElementById('Current').innerHTML = renderMap(bricks);
            document.getElementById('Legend').innerHTML = renderLegend();
        }
    </script>
</head>
<body onload="initTab(); updateBricksView();" onhashchange="initTab()">
<div class="domain-label">${domain_name}</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link" href="../customers/index.html">Customers</a>
    <a class="section-link active" href="../product-bricks/index.html">Product Bricks</a>
    <a class="section-link" href="../products/index.html">Products</a>
    <a class="section-link" href="../teams/index.html">Teams</a>
    <a class="section-link" href="../goals/index.html">Goals</a>
    <a class="section-link" href="../rituals/index.html">Rituals</a>
    <a class="section-link" href="../releases/index.html">Releases</a>
    <a class="section-link" href="../initiatives/index.html">Initiatives</a>
    <a class="section-link" href="../discoveries/index.html">Discoveries</a>
</div>

<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Product Bricks"></td>
            <td class="hero-copy-cell">
                <div class="hero-title">Product Bricks</div>
                <div class="hero-subtitle">${domain_name} | ${domain_description}</div>
            </td>
        </tr>
    </table>
</div>
<div>
    <div class="tab">
        <button class="tablinks active" id="tab_BigPicture" onclick="openTab('BigPicture')">Bricks</button>
    </div>
    <div id="BigPicture" class="tabcontent" style="display: block">
        <div class="bricks-panel">
            <div id="Current"></div>
            <div class="legend" id="Legend"></div>
        </div>
    </div>
</div>

</body>
</html>
