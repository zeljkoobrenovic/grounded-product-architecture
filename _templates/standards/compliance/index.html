<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>EU CTO Security & Compliance Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 20px;
        }

        h1, h2, h3 {
            margin-bottom: 0.3rem;
        }

        .muted {
            color: #666;
        }

        .hero {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .hero-logo {
            width: 96px;
            height: 96px;
            object-fit: contain;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 12px 0 20px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 14px;
            min-width: 180px;
            flex: 1;
        }

        .red {
            background: #fde8e8;
        }

        .yellow {
            background: #fff7d6;
        }

        .border.red {
            border: 3px solid crimson;
        }

        .border.yellow {
            border: 3px solid orange;
        }

        .border.green {
            border: 3px solid darkgreen;
        }

        .green {
            background: #e8f7ea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            vertical-align: top;
            text-align: left;
        }

        th {
            background: #f7f7f7;
        }

        .controls {
            margin-top: 24px;
        }

        input, select, button {
            padding: 8px;
        }

        .tag {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
        }

        .tag.red {
            background: #fbd5d5;
        }

        .tag.yellow {
            background: #fde68a;
        }

        .tag.green {
            background: #bbf7d0;
        }

        a {
            word-break: break-all;
        }

        .control-link {
            color: #1d4ed8;
            text-decoration: none;
        }

        .control-link:hover {
            text-decoration: underline;
        }

        details {
            margin: 12px 0;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<div class="hero">
    <img class="hero-logo" src="icons/logo.png" alt="Compliance">
    <div>
        <h1>EU CTO Security & Compliance Dashboard</h1>
    </div>
</div>
<div class="controls">
    <select id="statusFilter">
        <option value="">All statuses</option>
        <option value="red">Red</option>
        <option value="yellow">Yellow</option>
        <option value="green">Green</option>
    </select>
    <input type="text" id="searchBox" placeholder="Search controls, domains, owners..."/>
</div>

<div class="row" id="summary"></div>
<div id="domains"></div>

<script>
    let currentData = ${data};

    function safeScore(control) {
        if (typeof control.score === "number") return control.score;
        const map = {red: 1, yellow: 2, green: 3};
        return map[control.status] || 1;
    }

    function overallMaturity(data) {
        let weighted = 0, weights = 0;
        data.domains.forEach(domain => {
            const dw = domain.weight || 1;
            domain.controls.forEach(control => {
                const cw = control.weight || 1;
                const w = dw * cw;
                weighted += safeScore(control) * w;
                weights += w;
            });
        });
        return weights ? (weighted / weights) : 0;
    }

    function maturityBand(score, model) {
        const bands = model.overall_maturity_bands || [];
        for (const b of bands) {
            if (score >= b.min && score <= b.max) return b;
        }
        return null;
    }

    function countStatuses(data) {
        const counts = {red: 0, yellow: 0, green: 0};
        data.domains.forEach(d => d.controls.forEach(c => {
            counts[c.status] = (counts[c.status] || 0) + 1;
        }));
        return counts;
    }

    function domainAverage(domain) {
        let weighted = 0, weights = 0;
        domain.controls.forEach(control => {
            const w = control.weight || 1;
            weighted += safeScore(control) * w;
            weights += w;
        });
        return weights ? (weighted / weights) : 0;
    }

    function linkifyEvidence(links) {
        if (!links || !links.length) return "<span class='muted'>No evidence links</span>";
        return links.map(l => `<div><a href="${l}" target="_blank" rel="noopener noreferrer">${l}</a></div>`).join("");
    }

    function renderSummary(data) {
        const score = overallMaturity(data);
        const band = maturityBand(score, data.scoring_model);
        const counts = countStatuses(data);
        const totalControls = counts.red + counts.yellow + counts.green;
        document.getElementById("summary").innerHTML = `
        <div class="card">
          <h3>Overall maturity</h3>
          <div><strong>${score.toFixed(2)} / 3.00</strong></div>
          <div class="muted">${band ? band.label : "No maturity band found"}</div>
        </div>
        <div class="card red">
          <h3>Red</h3>
          <div><strong>${counts.red}</strong> controls</div>
        </div>
        <div class="card yellow">
          <h3>Yellow</h3>
          <div><strong>${counts.yellow}</strong> controls</div>
        </div>
        <div class="card green">
          <h3>Green</h3>
          <div><strong>${counts.green}</strong> controls</div>
        </div>
        <div class="card">
          <h3>Total controls</h3>
          <div><strong>${totalControls}</strong></div>
        </div>
      `;
    }

    function renderDomains(data) {
        const statusFilter = document.getElementById("statusFilter").value.trim().toLowerCase();
        const q = document.getElementById("searchBox").value.trim().toLowerCase();

        const html = data.domains.map(domain => {
            const controls = domain.controls.filter(c => {
                const matchesStatus = !statusFilter || c.status === statusFilter;
                const blob = [domain.name, c.id, c.name, c.description, c.owner, c.notes].join(" ").toLowerCase();
                const matchesSearch = !q || blob.includes(q);
                return matchesStatus && matchesSearch;
            });

            if (!controls.length) return "";

            const avg = domainAverage({controls});
            return `
          <details open>
            <summary><strong>${domain.name}</strong> — average ${avg.toFixed(2)} / 3.00</summary>
            <div class="muted">${domain.description || ""}</div>
            <table>
              <thead>
                <tr>
                  <th style="width: 42px;">Status</th>
                  <th>Control</th>
                </tr>
              </thead>
              <tbody>
                ${controls.map(c => `
                  <tr>
                    <td style="width: 42px;">
                      <div class="${c.status}" style="height: 42px; width: 42px; border-radius: 10px"></div>
                    </td>
                    <td>
                      <div><strong><a class="control-link" href="landing_pages/${encodeURIComponent(c.id)}.html" target="_blank" rel="noopener noreferrer">${c.name}</a></strong></div>
                      <div class="muted">${c.description || ""}</div>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </details>
        `;
        }).join("");

        document.getElementById("domains").innerHTML = html || "<p class='muted'>No controls match the current filters.</p>";
    }

    function render() {
        renderSummary(currentData);
        renderDomains(currentData);
    }

    render();

    document.getElementById("statusFilter").addEventListener("change", () => currentData && render(currentData));
    document.getElementById("searchBox").addEventListener("input", () => currentData && render(currentData));
</script>
</body>
</html>
