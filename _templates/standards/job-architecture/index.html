<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Architecture</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .hero {
            margin-bottom: 18px;
        }

        .eyebrow {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .hero-title {
            font-size: 56px;
            margin-bottom: 6px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            line-height: 1.45;
            max-width: 980px;
        }

        .summary-strip {
            margin: 0 0 18px 0;
        }

        .stat {
            display: inline-block;
            min-width: 160px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 28px;
            color: #1d4ed8;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }

        .tab-intro {
            margin-bottom: 18px;
            color: #4b5563;
            line-height: 1.5;
        }

        .section {
            margin: 0 0 18px 0;
            padding: 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background-color: #fbfbfc;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .section-name {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .section-copy {
            color: #4b5563;
            line-height: 1.55;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background-color: white;
            padding: 16px;
            box-shadow: rgba(0, 0, 0, 0.05) 0 1px 3px;
        }

        .card-title {
            font-size: 22px;
            margin-bottom: 8px;
            color: #1d4ed8;
        }

        .card-subtitle {
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .card-copy {
            color: #4b5563;
            line-height: 1.5;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background-color: white;
        }

        th {
            text-align: left;
            padding: 10px;
            border: 1px solid #ddd;
            background-color: #f0f0f0;
            white-space: nowrap;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
            vertical-align: top;
        }

        tr:nth-child(even) td {
            background-color: #fafafa;
        }

        .family-block {
            margin-bottom: 24px;
        }

        .family-header {
            margin-bottom: 12px;
        }

        .family-title {
            font-size: 30px;
            margin-bottom: 6px;
        }

        .family-meta {
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .money {
            white-space: nowrap;
        }

        ul {
            margin: 8px 0 0 18px;
            color: #4b5563;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body onload="initTab()" onhashchange="initTab()">
<div class="hero">
    <div class="eyebrow">Standards</div>
    <div class="hero-title">Job Architecture</div>
    <div id="HeroSubtitle" class="hero-subtitle"></div>
</div>

<div id="Summary" class="summary-strip"></div>

<div class="tab">
    <button id="tab_overview-tab" class="tablinks" onclick="openTab('overview-tab')">Overview</button>
    <button id="tab_framework-tab" class="tablinks" onclick="openTab('framework-tab')">Career Framework</button>
    <button id="tab_product-tab" class="tablinks" onclick="openTab('product-tab')">Product Jobs</button>
    <button id="tab_technology-tab" class="tablinks" onclick="openTab('technology-tab')">Technology Jobs</button>
    <button id="tab_compensation-tab" class="tablinks" onclick="openTab('compensation-tab')">Compensation</button>
</div>

<div id="overview-tab" class="tabcontent"></div>
<div id="framework-tab" class="tabcontent"></div>
<div id="product-tab" class="tabcontent"></div>
<div id="technology-tab" class="tabcontent"></div>
<div id="compensation-tab" class="tabcontent"></div>

<script>
    const architecture = ${job_architecture};

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function initTab() {
        let tabName = 'overview-tab';
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (document.getElementById('tab_' + hash)) {
                tabName = hash;
            }
        }
        openTab(tabName);
    }

    function openTab(tabName) {
        const tabcontent = document.getElementsByClassName('tabcontent');
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = 'none';
        }
        const tablinks = document.getElementsByClassName('tablinks');
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(' active', '');
        }
        history.pushState({}, '', '#' + tabName);
        document.getElementById(tabName).style.display = 'block';
        document.getElementById('tab_' + tabName).className += ' active';
    }

    function formatMoney(value) {
        return new Intl.NumberFormat('en-IE', {style: 'currency', currency: 'EUR', maximumFractionDigits: 0}).format(value || 0);
    }

    function renderList(items) {
        if (!items || !items.length) {
            return '<div class="section-copy">No items defined.</div>';
        }
        return '<ul>' + items.map(item => '<li>' + escapeHtml(item) + '</li>').join('') + '</ul>';
    }

    function renderSalaryRange(range) {
        if (!range) return '';
        return '<span class="money">' + escapeHtml(formatMoney(range.min)) + '</span> - <span class="money">' + escapeHtml(formatMoney(range.max)) + '</span>';
    }

    function levelRank(levelId) {
        const match = String(levelId || '').toUpperCase().match(/^([A-Z]+)(\d+)$/);
        if (!match) return -1;
        return Number(match[2]);
    }

    function renderFamilyLevelsTable(levels, title, color) {
        if (!levels.length) {
            return '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div><div class="section-copy">No levels defined.</div></div>';
        }

        const sortedLevels = [...levels].sort((a, b) =>
            levelRank(b.levelId || b.id) - levelRank(a.levelId || a.id) ||
            String(b.levelId || b.id || '').localeCompare(String(a.levelId || a.id || ''))
        );

        let html = '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div>';
        html += '<div class="table-wrap"><table><thead><tr><th>Level</th><th>Title</th><th>Salary Range</th><th>Midpoint</th></tr></thead><tbody>';
        sortedLevels.forEach(level => {
            html += '<tr>';
            html += '<td style="width: 100px">' + escapeHtml(level.levelId || '') + '</td>';
            html += '<td style="width: 400px">' + escapeHtml(level.title || '') + '</td>';
            html += '<td style="width: 300px">' + renderSalaryRange(level.salaryRange) + '';
            html += '<div style="width: 100%; white-space: nowrap">';
            const minPerc = level.salaryRange && level.salaryRange.min ? ((level.salaryRange.min / maxSalary) * 100) : 0;
            const maxPerc = level.salaryRange && level.salaryRange.max ? ((level.salaryRange.max / maxSalary) * 100) : 0;
            html += '<div style="height: 4px; width: ' + minPerc + '%; background-color: lightgrey; display: inline-block"></div>';
            html += '<div style="height: 4px; width: ' + (maxPerc - minPerc) + '%; background-color: ' + color + '; display: inline-block"></div>';
            html += '<div style="height: 4px; width: ' + (100 - maxPerc) + '%; background-color: lightgrey; display: inline-block"></div>';
            html += '</div>';
            html += '</td>';
            html += '<td class="money">' + escapeHtml(formatMoney((level.salaryRange || {}).mid || 0)) + '</td></tr>';
        });
        html += '</tbody></table></div></div>';
        return html;
    }

    function renderOverviewMatrix(trackPrefix, title, intro) {
        const familyColumns = families.filter(family =>
            (family.levels || []).some(level => String(level.levelId || '').toUpperCase().startsWith(trackPrefix))
        );

        if (!familyColumns.length) {
            return '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div><div class="section-copy">No levels defined.</div></div>';
        }

        const levelIds = Array.from(new Set(
            familyColumns.flatMap(family =>
                (family.levels || [])
                    .filter(level => String(level.levelId || '').toUpperCase().startsWith(trackPrefix))
                    .map(level => level.levelId)
            )
        )).sort((a, b) => levelRank(b) - levelRank(a) || String(b).localeCompare(String(a)));

        let html = '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div><div class="section-copy">' + escapeHtml(intro) + '</div>';
        html += '<div class="table-wrap"><table><thead><tr><th style="width: 120px">Level</th>';
        familyColumns.forEach(family => {
            html += '<th>' + escapeHtml(family.name) + '</th>';
        });
        html += '</tr></thead><tbody>';

        levelIds.forEach(levelId => {
            html += '<tr><td><strong>' + escapeHtml(levelId) + '</strong></td>';
            familyColumns.forEach(family => {
                const match = (family.levels || []).find(level => level.levelId === levelId);
                html += '<td>' + (match ? escapeHtml(match.title || '') : '<span style="color:#9ca3af">-</span>') + '</td>';
            });
            html += '</tr>';
        });

        html += '</tbody></table></div></div>';
        return html;
    }

    function renderLevelDefinitionsTable(levels, title) {
        if (!levels.length) {
            return '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div><div class="section-copy">No levels defined.</div></div>';
        }

        const sortedLevels = [...levels].sort((a, b) =>
            levelRank(b.id || b.levelId) - levelRank(a.id || a.levelId) ||
            String(b.id || b.levelId || '').localeCompare(String(a.id || a.levelId || ''))
        );

        let html = '<div class="section"><div class="section-title">' + escapeHtml(title) + '</div><div class="table-wrap"><table><thead><tr><th>Level</th><th>Track</th><th>Scope</th><th>Impact</th><th>Autonomy</th><th>Promotion Window</th></tr></thead><tbody>';
        sortedLevels.forEach(level => {
            html += '<tr><td>' + escapeHtml(level.id + ' | ' + level.name) + '</td><td>' + escapeHtml(level.track || '') + '</td><td>' + escapeHtml(level.scope || '') + '</td><td>' + escapeHtml(level.impact || '') + '</td><td>' + escapeHtml(level.autonomy || '') + '</td><td>' + escapeHtml(level.typicalPromotionWindowMonths || '') + '</td></tr>';
        });
        html += '</tbody></table></div></div>';
        return html;
    }

    const families = architecture.jobFamilies || [];
    const productFamilies = families.filter(family => family.discipline === 'product');
    const technologyFamilies = families.filter(family => family.discipline === 'technology');
    const allLevels = architecture.careerFramework.levelDefinitions || [];

    let maxSalary = 0;

    families.forEach(family => {
        family.levels.forEach(level => {
            if (level.salaryRange && level.salaryRange.max > maxSalary) {
                maxSalary = level.salaryRange.max;
            }
        });
    });

    document.getElementById('HeroSubtitle').innerHTML =
        escapeHtml(architecture.metadata.name) + ' | ' +
        escapeHtml(architecture.metadata.companyProfile) + ' | ' +
        escapeHtml(architecture.metadata.salaryUnit) + ' (' + escapeHtml(architecture.metadata.salaryReferenceYear) + ')';

    document.getElementById('Summary').innerHTML =
        '<div class="stat"><div class="stat-value">' + escapeHtml(String(families.length)) + '</div><div class="stat-label">Job Families</div></div>' +
        '<div class="stat"><div class="stat-value">' + escapeHtml(String(productFamilies.length)) + '</div><div class="stat-label">Product Families</div></div>' +
        '<div class="stat"><div class="stat-value">' + escapeHtml(String(technologyFamilies.length)) + '</div><div class="stat-label">Technology Families</div></div>' +
        '<div class="stat"><div class="stat-value">' + escapeHtml(String(allLevels.length)) + '</div><div class="stat-label">Level Definitions</div></div>' +
        '<div class="stat"><div class="stat-value">' + escapeHtml(architecture.metadata.currency || 'EUR') + '</div><div class="stat-label">Salary Currency</div></div>';

    let overviewHtml = '';
    overviewHtml += '<div class="grid">';
    overviewHtml += '<div class="section"><div class="section-title">Compensation Philosophy</div><div class="section-name">How Pay Works</div><div class="section-copy">' + escapeHtml((architecture.compensationPhilosophy || {}).payPositioning || '') + '</div>' + renderList([
        (architecture.compensationPhilosophy || {}).geographicApproach || '',
        ((architecture.compensationPhilosophy || {}).equityPolicy || ''),
        ((architecture.compensationPhilosophy || {}).reviewCycle || '')
    ].filter(Boolean)) + '</div>';
    overviewHtml += '<div class="section"><div class="section-title">Architecture Standards</div><div class="section-name">What Every Job Profile Includes</div>' + renderList(((architecture.jobArchitectureStandards || {}).requiredJobProfileElements || [])) + '</div>';
    overviewHtml += '</div>';
    overviewHtml += '<div class="section"><div class="section-title">Scope</div><div class="section-copy">';
    (architecture.metadata.scope || []).forEach(item => {
        overviewHtml += '<span class="pill">' + escapeHtml(item) + '</span>';
    });
    overviewHtml += '</div></div>';

    overviewHtml += '<div class="tab-intro">A cross-family view of the job architecture, with levels on rows and job families on columns.</div>';
    overviewHtml += renderOverviewMatrix('L', 'IC Track', 'Individual contributor roles across product and technology job families.');
    overviewHtml += renderOverviewMatrix('M', 'Management Track', 'Management roles across product and technology job families.');
    document.getElementById('overview-tab').innerHTML = overviewHtml;

    let frameworkHtml = '<div class="tab-intro">The shared level language and promotion rules used across product and technology careers.</div>';
    frameworkHtml += '<div class="section"><div class="section-title">Tracks</div>';
    (architecture.careerFramework.tracks || []).forEach(track => {
        frameworkHtml += '<div class="card" style="margin-bottom:12px"><div class="card-title">' + escapeHtml(track.name) + '</div><div class="card-copy">' + escapeHtml(track.description || '') + '</div></div>';
    });
    frameworkHtml += '</div>';
    frameworkHtml += renderLevelDefinitionsTable(
        allLevels.filter(level => String(level.id || '').toUpperCase().startsWith('L')),
        'IC Levels'
    );
    frameworkHtml += renderLevelDefinitionsTable(
        allLevels.filter(level => String(level.id || '').toUpperCase().startsWith('M')),
        'Management Levels'
    );
    frameworkHtml += '<div class="grid">';
    frameworkHtml += '<div class="section"><div class="section-title">Promotion Criteria</div>' + renderList((architecture.careerFramework || {}).promotionCriteria || []) + '</div>';
    frameworkHtml += '<div class="section"><div class="section-title">Evaluation Dimensions</div>' + renderList((architecture.careerFramework || {}).evaluationDimensions || []) + '</div>';
    frameworkHtml += '</div>';
    document.getElementById('framework-tab').innerHTML = frameworkHtml;

    function renderFamilies(familiesToRender, emptyLabel) {
        if (!familiesToRender.length) {
            return '<div class="tab-intro">' + escapeHtml(emptyLabel) + '</div>';
        }

        let html = '<div class="tab-intro">Representative titles and salary bands by family and level.</div>';
        familiesToRender.forEach(family => {
            const icLevels = (family.levels || []).filter(level => String(level.levelId || '').toLowerCase().startsWith('l'));
            const managementLevels = (family.levels || []).filter(level => String(level.levelId || '').toLowerCase().startsWith('m'));

            html += '<div class="family-block">';
            html += '<div class="family-header"><div class="family-title">' + escapeHtml(family.name) + '</div><div class="family-meta">' + escapeHtml(family.discipline || '') + '</div><div class="section-copy">' + escapeHtml(family.familyMission || '') + '</div></div>';
            html += '<div class="section"><div class="section-title">Core Competencies</div>';
            (family.coreCompetencies || []).forEach(item => {
                html += '<span class="pill">' + escapeHtml(item) + '</span>';
            });
            html += '</div>';
            html += renderFamilyLevelsTable(icLevels, 'IC Levels', 'blue');
            html += renderFamilyLevelsTable(managementLevels, 'Management Levels', 'green');
            html += '</div>';
        });
        return html;
    }

    document.getElementById('product-tab').innerHTML = renderFamilies(productFamilies, 'No product job families defined.');
    document.getElementById('technology-tab').innerHTML = renderFamilies(technologyFamilies, 'No technology job families defined.');

    let compensationHtml = '<div class="tab-intro">Compensation assumptions and market calibration notes for salary band design.</div>';
    compensationHtml += '<div class="grid">';
    compensationHtml += '<div class="section"><div class="section-title">Bonus Policy</div><div class="card-copy">' +
        '<div class="pill">IC target: ' + escapeHtml(((architecture.compensationPhilosophy || {}).bonusPolicy || {}).icTypicalTargetPercent || '') + '%</div>' +
        '<div class="pill">Manager target: ' + escapeHtml(((architecture.compensationPhilosophy || {}).bonusPolicy || {}).managerTypicalTargetPercent || '') + '%</div>' +
        '<div class="pill">Director target: ' + escapeHtml(((architecture.compensationPhilosophy || {}).bonusPolicy || {}).directorTypicalTargetPercent || '') + '%</div>' +
        '</div></div>';
    compensationHtml += '<div class="section"><div class="section-title">Market Notes</div>' + renderList(((architecture.marketCalibrationNotes || {}).notes || [])) + '</div>';
    compensationHtml += '</div>';
    compensationHtml += '<div class="section"><div class="section-title">Sources</div>';
    (((architecture.marketCalibrationNotes || {}).sources) || []).forEach(source => {
        compensationHtml += '<div class="card" style="margin-bottom:12px"><div class="card-title">' + escapeHtml(source.name || '') + '</div><div class="card-copy"><a href="' + escapeHtml(source.url || '#') + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(source.url || '') + '</a></div></div>';
    });
    compensationHtml += '</div>';
    document.getElementById('compensation-tab').innerHTML = compensationHtml;
</script>
</body>
</html>
