<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strategic Tech Golden Path</title>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }

        .frame {
            width: 100%;
            height: calc(100vh - 280px);
        }

        .map {
            margin: 10px;
            padding-top: 10px;
            border: solid lightgrey 1px;
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.2), 0 3px 10px 0 rgba(0, 0, 0, 0.19);
            border-radius: 2px;
            display: inline-block;
            text-align: center;
        }

        .mapThumb {
            height: 330px;
            width: 450px;
            object-fit: contain;
        }

        .flag {
            opacity: 0.9;
            height: 42px;
            border-radius: 50%;
            border: 1px solid lightgrey;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <script>
        function initTab() {
            let tabName = 'Overview';
            if (window.location.hash) {
                const hash = window.location.hash.substring(1);
                if (document.getElementById('tab_' + hash)) {
                    tabName = hash;
                }
            }
            openTab(tabName);
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            history.pushState({}, '', '#' + tabName);
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
        }
    </script>
</head>
<body onload="initTab()" onhashchange="initTab()">
<div style="margin-left: 24px; margin-top: 10px; text-align: left; margin-bottom: 12px;">
    <h1 style="font-size: 50px; margin-bottom: 0px; margin-left: 6px">
        <img src="icons/logo.png" style="vertical-align: middle; height: 100px">
        <div style="display: inline-block; vertical-align: middle">
            <b>Golden Guidelines & Processes</b>
        </div>
    </h1>
    <div style="margin-top: 6px; margin-left: 4px; font-size: 16px; color: grey">
        A curated list of key guidelines and processes
        (<a target="_blank"
            href="https://docs.google.com/presentation/d/1MD3bSf6RoNG3WeiT2n5AsLi2jIUUkFDZb1FyMhSaP5w/edit?usp=sharing">golden
        paths</a>).
    </div>
</div>
<div style="margin-left: 30px">
    <div class="tab">
        <button id="tab_Overview" class="tablinks" onclick="openTab('Overview')">Overview</button>
        <button id="tab_Summaries" class="tablinks" onclick="openTab('Summaries')">Summaries</button>
        <button id="tab_Owners" class="tablinks" onclick="openTab('Owners')">Owners</button>
        <button id="tab_Legend" class="tablinks" onclick="openTab('Legend')">About</button>
    </div>
    <div id="Overview" class="tabcontent">
        <div>
            <iframe id="Model0Frame" src="overview.html"
                    style="border: none; width: calc(100%); height: calc(100vh - 250px)">
            </iframe>
        </div>
    </div>
    <div id="Summaries" class="tabcontent" style="">
        <div>
            <iframe id="Model1Frame" src="summaries.html"
                    style="border: none; width: calc(100%); height: calc(100vh - 250px)">
            </iframe>
        </div>
    </div>

    <div id="Owners" class="tabcontent" style="">
        <div>
            <iframe id="OwnersFrame" src="owners.html"
                    style="border: none; width: calc(100%); height: calc(100vh - 250px)">
            </iframe>
        </div>
    </div>

    <div id="Legend" class="tabcontent">
        <div>
            <img src="slides/img_1.png">
        </div>
        <div>
            <img src="slides/img_2.png">
        </div>
    </div>
</div>
<script>
</script>
<div style="margin-left: 27px; color: #a0a0a0; font-size: 80%">

                                      href="https://docs.google.com/spreadsheets/d/1v3ndbeTOcLl74llWOFoze-P6x4J-M7MlZndhAQfO2zc/edit?usp=sharing">data
    sheet</a>
</div>
</body>
</html>
