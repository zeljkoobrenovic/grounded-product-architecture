<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>${page_title}</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
            max-width: 1100px;
        }

        .eyebrow {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background-color: #e8f1ff;
            color: #1d4ed8;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 34px;
            line-height: 1.25;
            margin: 0 0 8px 0;
        }

        .meta {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .section {
            border-top: 1px solid #e5e7eb;
            padding-top: 18px;
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .description {
            font-size: 19px;
            line-height: 1.55;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 12px;
            margin-bottom: 14px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: #315b7c;
        }

        .impact-line {
            margin-bottom: 6px;
            line-height: 1.45;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 11px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 13px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .pill-name {
            font-weight: bold;
            color: #315b7c;
        }

        .pill-meta {
            color: #6b7280;
        }

        .entity-link {
            color: inherit;
            text-decoration: none;
        }

        .entity-link:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>
<table>
<tr>
<td style="vertical-align: top; padding-top: 50px">
    <img src="../icons/logo.png" style="width:108px; height:108px; margin-right:12px" alt="KTLO">
</td>
<td>
<div class="eyebrow">KTLO</div>
<h1 id="Title"></h1>
<div id="Meta" class="meta"></div>
</td>
</tr>
</table>
<div id="Content" style="margin-left: 12px"></div>

<script>
    const objective = ${ktlo_objective};
    const initiatives = ${initiatives};
    const domainName = '${domain_name}';

    function escapeHtml(value) {
        return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function linkOf(href, label, className) {
        if (!href) return '<span class="' + className + '">' + escapeHtml(label) + '</span>';
        return '<a class="entity-link ' + className + '" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
    }

    function initiativeHref(item) {
        if (item.landingPageId) {
            return encodeURIComponent(item.landingPageId) + '.html';
        }
        if (item.initiativeId) {
            return 'initiative-' + encodeURIComponent(item.initiativeId) + '.html';
        }
        return '';
    }

    document.getElementById('Title').innerHTML = escapeHtml(objective.title || objective.id || 'KTLO Objective');
    document.getElementById('Meta').innerHTML = escapeHtml(domainName) + ' | ' + escapeHtml(objective.status || 'active') + ' | ' + escapeHtml((objective.period || {}).type || 'rolling');

    let html = '';
    if (objective.objective) {
        html += '<div class="section"><div class="section-title">Description</div><div class="description">' + escapeHtml(objective.objective) + '</div></div>';
    }

    if (objective.keyResults && objective.keyResults.length) {
        html += '<div class="section"><div class="section-title">Key Results</div>';
        objective.keyResults.forEach(item => {
            html += '<div class="impact-block">';
            html += '<div class="impact-header"><div class="impact-id">' + escapeHtml(item.metric || item.category || item.id) + '</div></div>';
            html += '<div class="impact-line"><b>Statement:</b> ' + escapeHtml(item.statement || '') + '</div>';
            html += '<div class="impact-line"><b>Target:</b> ' + escapeHtml(item.target || '') + '</div>';
            html += '<div class="impact-line"><b>Baseline:</b> ' + escapeHtml(item.baseline || '') + '</div>';
            html += '<div class="impact-line"><b>Commitment:</b> ' + escapeHtml(item.commitmentType || 'standard') + '</div>';
            html += '</div>';
        });
        html += '</div>';
    }

    if (initiatives && initiatives.length) {
        html += '<div class="section"><div class="section-title">Initiatives</div>';
        initiatives.forEach(item => {
            html += '<div class="pill">';
            html += '<img class="pill-icon" src="../../ktlo/icons/logo.png" onerror="this.onerror=null;this.src=\'../icons/logo.png\'">';
            html += '<div>';
            html += '<div class="pill-name">' + linkOf(initiativeHref(item), item.title || item.initiativeId || 'Initiative', 'pill-name') + '</div>';
            html += '<div>' + escapeHtml(item.description || '') + '</div>';
            html += '<div class="pill-meta">' + escapeHtml(item.category || '') + (item.priority ? ' | ' + escapeHtml(item.priority) : '') + (item.date ? ' | ' + escapeHtml(item.date) : '') + '</div>';
            html += '</div>';
            html += '</div>';
        });
        html += '</div>';
    }

    document.getElementById('Content').innerHTML = html;
</script>
</body>
</html>
