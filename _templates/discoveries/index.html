<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discoveries (${domain_name})</title>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
            border: none;
        }

        .hero-subtitle {
            border: none;
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }

        .summary-strip {
            margin: 0 0 14px 0;
        }

        .stat {
            display: inline-block;
            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 30px;
            color: #9f2d2d;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-header {
            margin-bottom: 12px;
        }

        .card-type {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #fdecec;
            color: #9f2d2d;
        }

        .card-date {
            color: #6b7280;
            font-size: 13px;
        }

        .card-description {
            font-size: 22px;
            line-height: 1.35;
            margin-bottom: 10px;
        }

        .card-summary {
            color: #374151;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .section {
            margin-top: 14px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            background-color: white;
            border: 1px solid #d7dce1;
            flex: 0 0 auto;
        }

        .pill-name {
            font-weight: bold;
        }

        .pill-meta {
            color: #6b7280;
        }

        .risk-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .risk-pill {
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #fff6f6;
            color: #9f2d2d;
            font-size: 12px;
            border: 1px solid #f1d0d0;
        }

        .open-link {
            display: inline-block;
            margin-top: 12px;
            color: #315b7c;
            font-size: 14px;
        }

        .empty {
            color: #6b7280;
            border: 1px dashed #d7dce1;
            border-radius: 8px;
            padding: 18px;
            background-color: #fafafa;
        }

        @media (max-width: 720px) {
            body {
                margin: 12px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .tab button {
                width: 100%;
                text-align: left;
            }
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function initTab() {
            let tabName = 'Ongoing';
            if (window.location.hash) {
                const hash = window.location.hash.substring(1);
                if (document.getElementById('tab_' + hash)) {
                    tabName = hash;
                }
            }
            openTab(tabName);
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            history.pushState({}, '', '#' + tabName);
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
        }
    </script>
</head>
<body onload="initTab()" onhashchange="initTab()">
<div class="domain-label">${domain_name}</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link" href="../customers/index.html">Customers</a>
    <a class="section-link" href="../product-bricks/index.html">Product Bricks</a>
    <a class="section-link" href="../products/index.html">Products</a>
    <a class="section-link" href="../teams/index.html">Teams</a>
    <a class="section-link" href="../goals/index.html">Goals</a>
    <a class="section-link" href="../rituals/index.html">Rituals</a>
    <a class="section-link" href="../releases/index.html">Releases</a>
    <a class="section-link" href="../initiatives/index.html">Initiatives</a>
    <a class="section-link active" href="../discoveries/index.html">Discoveries</a>
</div>

<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Discoveries"></td>
            <td class="hero-copy-cell">
                <div class="hero-title">Discoveries</div>
                <div class="hero-subtitle">${domain_name} | ${domain_description}</div>
            </td>
        </tr>
    </table>
</div>

<div id="Summary" class="summary-strip"></div>

<div class="tab">
    <button class="tablinks" id="tab_Ongoing" onclick="openTab('Ongoing')">Ongoing</button>
    <button class="tablinks" id="tab_Archived" onclick="openTab('Archived')">Archived</button>
</div>

<div id="Ongoing" class="tabcontent"></div>
<div id="Archived" class="tabcontent"></div>

<script>
    const discoveries = ${discoveries};

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderSummary() {
        const ongoing = (discoveries.ongoing || []).length;
        const archived = (discoveries.archived || []).length;
        const total = ongoing + archived;
        let html = '';
        html += '<div class="stat"><div class="stat-value">' + total + '</div><div class="stat-label">Discoveries</div></div>';
        html += '<div class="stat"><div class="stat-value">' + ongoing + '</div><div class="stat-label">Ongoing</div></div>';
        html += '<div class="stat"><div class="stat-value">' + archived + '</div><div class="stat-label">Archived</div></div>';
        document.getElementById('Summary').innerHTML = html;
    }

    function renderCards(items, emptyLabel) {
        if (!items || !items.length) {
            return '<div class="empty">' + escapeHtml(emptyLabel) + '</div>';
        }
        let html = '<div class="grid">';
        items.forEach(item => {
            html += '<div class="card">';
            html += '<div class="card-header"><span class="card-type">' + escapeHtml(item.statusLabel || item.status || 'Discovery') + '</span><span class="card-date">' + escapeHtml(formatDate(item.startDate)) + ' -> ' + escapeHtml(formatDate(item.endDate)) + '</span></div>';
            html += '<div class="card-description">' + escapeHtml(item.title || item.name || 'Discovery') + '</div>';
            if (item.name && item.title && item.name !== item.title) {
                html += '<div class="card-summary" style="margin-bottom:8px">' + escapeHtml(item.name) + '</div>';
            }
            html += '<div class="card-summary">' + escapeHtml(item.summary || '') + '</div>';

            if (item.linkedInitiatives && item.linkedInitiatives.length) {
                html += '<div class="section"><div class="section-title">Linked Initiatives</div>';
                item.linkedInitiatives.forEach(linked => {
                    const href = linked.landingPageIndex !== undefined && linked.landingPageIndex !== null
                        ? '../initiatives/landing_pages/' + escapeHtml(String(linked.landingPageIndex)) + '.html'
                        : '';
                    html += '<div class="pill"><img class="pill-icon" src="../initiatives/icons/initiative.png" onerror="this.onerror=null;this.src=\'icons/logo.png\'"><div><div class="pill-name">' + (href ? '<a target="_blank" rel="noopener noreferrer" href="' + href + '">' + escapeHtml(linked.initiativeDescription || linked.description || linked.initiativeId) + '</a>' : escapeHtml(linked.initiativeDescription || linked.description || linked.initiativeId)) + '</div></div></div>';
                });
                html += '</div>';
            }

            if (item.riskFocus && item.riskFocus.length) {
                html += '<div class="section"><div class="section-title">Risks Being Reduced</div><div class="risk-list">';
                item.riskFocus.forEach(risk => {
                    html += '<div class="risk-pill">' + escapeHtml(risk.riskType) + '</div>';
                });
                html += '</div></div>';
            }

            if (item.teams && item.teams.assignments && item.teams.assignments.length) {
                html += '<div class="section"><div class="section-title">Teams</div>';
                item.teams.assignments.forEach(assignment => {
                    html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(assignment.teamName || assignment.teamId) + '</div><div class="pill-meta">' + escapeHtml(assignment.roleLabel || assignment.role) + '</div></div></div>';
                });
                html += '</div>';
            }

            html += '<a class="open-link" target="_blank" href="landing_pages/' + escapeHtml(String(item.landingPageIndex)) + '.html">Open details...</a>';
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    renderSummary();
    document.getElementById('Ongoing').innerHTML = renderCards(discoveries.ongoing || [], 'No ongoing discoveries available.');
    document.getElementById('Archived').innerHTML = renderCards(discoveries.archived || [], 'No archived discoveries available.');
</script>
</body>
</html>
