<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>${domain_name}</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        .group {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .group-title {
            font-size: 90%;
            margin-top: 4px;
            color: grey;
        }

        .app {
            margin: 10px;
            padding-top: 10px;
            border: solid lightgrey 1px;
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.2), 0 3px 10px 0 rgba(0, 0, 0, 0.19);
            display: inline-block;
            height: 320px;
            width: 220px;
            object-fit: cover;
            text-align: center;
            vertical-align: top;
            border-radius: 12px;
            background-color: white;
        }

        .name {
            font-weight: bold;
            font-size: 18px;
            margin-top: 12px;
            color: #5009DC;
            white-space: nowrap;
            overflow: hidden;
        }

        .source {
            font-size: 11px;
            color: grey;
            margin: 3px;
        }

        .description {
            font-size: 14px;
            color: grey;
            margin: 3px;
            line-height: 21px;
        }

        a {
            text-decoration: none;
        }

        .icon {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 26px;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        body {
            margin: 40px;
            text-align: center;
        }

        ::placeholder {
            color: lightgrey;
            opacity: 1;
        }

        :-ms-input-placeholder {
            color: lightgrey;
        }

        ::-ms-input-placeholder {
            color: lightgrey;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <script>
        function openTab(evt, cityName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(cityName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</head>
<body>
<div style="margin-top: 10px"><img src="icons/logo.png" style="height: 124px"></div>
<div style="margin: 8px; margin-top: 0; font-size: 40px; color: #8c8c8c">${domain_name}</div>
<div style="margin-bottom: 36px; font-size: 20px; color: #8c8c8c">${domain_description}</div>
<div class="tab">
    <button id="overview_tab" class="tablinks active" onclick="openTab(event, 'apps_tab')">Enterprise Domain</button>
    <button id="current_tab" class="tablinks" onclick="openTab(event, 'apps')">Explorers</button>
</div>

<div id="apps_tab" class="tabcontent" style="margin: 0; padding: 6px; display: block">
    <div id="apps"></div>
</div>
<script>
    const apps = [
        {
            "group": "strategy",
            "apps": [
                {
                    "name": "Motivation",
                    "link": "../motivation/index.html",
                    "icon": "logo.png",
                    "description": "vision, principles, goals and stakeholders",
                    "source": "configuration file"
                },
                {
                    "name": "Business",
                    "link": "../business/index.html",
                    "icon": "logo.png",
                    "description": "actors, capabilities, services and value streams",
                    "source": "configuration file"
                }
            ]
        }, {
            "group": "enterprise architecture",
            "apps": [
                {
                    "name": "Application",
                    "link": "../application/index.html",
                    "icon": "logo.png",
                    "description": "application components and interactions",
                    "source": "configuration file"
                },
                {
                    "name": "Data",
                    "link": "../data/index.html",
                    "icon": "logo.png",
                    "description": "data domains, information objects and records",
                    "source": "configuration file"
                },
                {
                    "name": "Technology",
                    "link": "../technology/index.html",
                    "icon": "logo.png",
                    "description": "technology domains and platform services",
                    "source": "configuration file"
                }
            ]
        },
        {
            "group": "change and control",
            "apps": [
                {
                    "name": "Implementation",
                    "link": "../implementation/index.html",
                    "icon": "logo.png",
                    "description": "transition architectures and work packages",
                    "source": "configuration file"
                },
                {
                    "name": "Governance",
                    "link": "../governance/index.html",
                    "icon": "logo.png",
                    "description": "roles, forums, controls and decision rights",
                    "source": "configuration file"
                },
                {
                    "name": "Rituals",
                    "link": "../rituals/index.html",
                    "icon": "logo.png",
                    "description": "architecture meetings and governance rituals",
                    "source": "configuration file"
                }
            ]
        }
    ];

    function update(divId) {
        let html = '';
        apps.forEach(group => {
            html += '<div class="group">';
            html += '<div class="group-title">' + group.group + '</div>';
            group.apps.forEach(app => {
                html += '<div class="app">';
                html += '    <a target="_blank" href="' + app.link + '">\n';
                html += '    <div style="height: 38px">\n';
                html += '    <div class="name">' + app.name + '</div>\n';
                if (app.source) {
                    html += '    <div class="source">source: ' + app.source + '</div>\n';
                } else {
                    html += '    <div class="source"></div>\n';
                }
                html += '    </div>\n';
                html += '    <div><img class="icon" src="icons/' + app.icon + '"></div>\n';
                html += '    <div class="description">' + app.description + '</div>\n';
                html += '    </a>\n';
                html += '    <br>\n';
                html += '</div>';
            });
            html += '</div>';
        });

        document.getElementById(divId).innerHTML = html;
    }

    update('apps');
</script>
</body>
</html>
