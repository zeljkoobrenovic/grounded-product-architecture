<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GCP Usage Trend</title>
    <style type="text/css" media="all">
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .domain {
            padding-top: 5px;
            text-align: center;
            font-size: 10px;
            width: 82px;

            overflow: hidden;
            margin-right: 8px;
        }

        .image {
            height: 64px;
            width: 80px;
            object-fit: contain;
        }

        th {
            horiz-align: center;
            background-color: #f0f0f0;
        }

        td {
            vertical-align: top;
            text-align: center;
            background-color: #f0f0f0;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>

<script>
    const getImage = function (service) {
        const id = service.toLowerCase().trim();

        if (id.endsWith('-db')) return 'db.png'
        if (id.startsWith('aviv-')) return 'aviv.png'
        if (id.startsWith('aviv ')) return 'aviv.png'
        if (id.startsWith('ma ')) return 'ma.png'
        if (id.startsWith('ma-')) return 'ma.png'
        if (id.startsWith('ma_')) return 'ma.png'
        if (id.startsWith('asg ')) return 'geo.png'
        if (id.startsWith('asg-')) return 'geo.png'
        if (id.includes('meilleursagents')) return 'ma.png'
        if (id === 'compute') return 'compute.png'
        if (id === 'storage') return 'storage.png'
        if (id === 'network') return 'network.png'
        if (id === 'log') return 'logging.png'
        if (id === 'services') return 'service.png'
        if (id === 'licencing') return 'licence.png'

        if (id.includes('compute engine')) return 'gcp/compute_engine.png'
        if (id.includes('n1')) return 'gcp/compute_engine.png'
        if (id.includes('n2')) return 'gcp/compute_engine.png'
        if (id.includes('e2')) return 'gcp/compute_engine.png'
        if (id.includes('load balancing')) return 'gcp/compute_engine.png'
        if (id.includes('cloud logging')) return 'gcp/cloud_logging.png'
        if (id.includes('cloud storage')) return 'gcp/cloud_storage.png'
        if (id.includes('storage')) return 'gcp/cloud_storage.png'
        if (id.includes('snapshot')) return 'gcp/cloud_storage.png'
        if (id.includes('ssd')) return 'gcp/cloud_storage.png'
        if (id.includes('bigquery')) return 'gcp/bigquery.png'
        if (id.includes('networking')) return 'gcp/cloud_network.png'
        if (id.includes('memorystore')) return 'gcp/memorystore.png'
        if (id.includes('kubernetes')) return 'gcp/google_kubernetes_engine.png'
        if (id.includes('cloud sql')) return 'gcp/cloud_sql.png'
        if (id.includes('vertex')) return 'gcp/vertexai.png'
        if (id.includes('notebooks')) return 'gcp/vertexai.png'
        if (id.includes('cloud dns')) return 'gcp/cloud_dns.png'
        if (id.includes('secret manager')) return 'gcp/secret_manager.png'
        if (id.includes('container registry')) return 'gcp/container_registry.png'
        if (id.includes('app engine')) return 'gcp/app_engine.png'
        if (id.includes('composer')) return 'gcp/cloud_composer.png'
        if (id.includes('stackdriver')) return 'gcp/stackdriver.png'
        if (id.includes('maps ')) return 'gcp/google_maps_platform.png'
        if (id.includes('street ')) return 'gcp/google_maps_platform.png'
        if (id.includes('geocoding ')) return 'gcp/google_maps_platform.png'
        if (id.includes('support')) return 'gcp/support.png'
        if (id.includes('support')) return 'gcp/support.png'
        if (id.includes('cloud cdn')) return 'gcp/cloud_cdn.png'
        if (id.includes('key management')) return 'gcp/key_management_service.png'
        if (id.includes('cloud functions')) return 'gcp/cloud_functions.png'
        if (id.includes('pub/sub')) return 'gcp/pubsub.png'
        if (id.includes('artifact ')) return 'gcp/artifact_registry.png'
        if (id.includes('source repository')) return 'gcp/cloud_code.png'
        if (id.includes('data catalog')) return 'gcp/data_catalog.png'
        if (id.includes('cloud scheduler')) return 'gcp/cloud_scheduler.png'
        if (id.includes(' deploy')) return 'gcp/cloud_deploy.png'
        if (id.includes(' monitoring')) return 'gcp/cloud_monitoring.png'

        if (id.includes('kafka')) return 'general/kafka.png'
        if (id.includes('airflow')) return 'general/airflow.png'
        if (id.includes('mongodb')) return 'general/mongodb.png'
        if (id.includes('datadog')) return 'general/datadog.png'

        if (id.includes('europe-west1')) return 'flags/be.svg'
        if (id.includes('europe-west3')) return 'flags/de.svg'
        if (id.includes('europe-west4')) return 'flags/nl.svg'
        if (id.includes('europe-west8')) return 'flags/it.svg'
        if (id.includes('europe-west9')) return 'flags/fr.svg'
        if (id.includes('europe-north1')) return 'flags/fi.svg'
        if (id.includes('asia-southeast1')) return 'flags/sg.svg'
        if (id.includes('asia-east1')) return 'flags/tw.svg'
        if (id.includes('europe')) return 'flags/eu.svg'
        if (id.includes('global')) return 'flags/un.svg'
        if (id.includes('asia-northeast1')) return 'flags/jp.svg'
        if (id.includes('us-')) return 'flags/us.svg'
        if (id.includes('australia-')) return 'flags/au.svg'
        if (id.includes('northamerica-')) return 'flags/ca.svg'
        if (id.includes('asia-south1')) return 'flags/in.svg'
        if (id.includes('southamerica-east1')) return 'flags/br.svg'
        if (id.includes('asia-east2')) return 'flags/hk.svg'
        if (id.includes('asia-southeast2')) return 'flags/id.svg'
        if (id === 'us') return 'flags/us.svg'

        return 'general/gcp.png';
    }
</script>
<div id="Header"></div>
<div id="Content"></div>
<script>
    function findGetParameter(parameterName) {
        var result = null, tmp = [];
        location.search.substr(1).split("&").forEach(function (item) {
            tmp = item.split("=");
            if (tmp[0] === parameterName) result = decodeURIComponent(tmp[1]);
        });
        return result;
    }

    const filterParam = findGetParameter('filter');

    const all = ${all};
    const array = ${data};
    const months = ${months};
    const mediaLinkPrefix = "${media-link-prefix}";

    const numberWithCommas = function (x) {
        return Math.round(x).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    const getCosts = function (service, month) {
        let filtered = all.filter(m => m.month === month)[0].services.filter(s => s.service === service);

        if (filtered.length > 0) return filtered[0].costs;

        return 0;
    }

    const getLatestCosts = function (service) {
        let filtered = all[0].services.filter(s => s.service === service);

        if (filtered.length > 0) return filtered[0].costs;

        return 0;
    }

    const getTotalCosts = function (month) {
        let filter = document.getElementById('filter').value.trim().toLowerCase().replace(/\*/g, '');

        let costs = 0;

        all.filter(m => m.month === month).forEach(month => {
            let services = month.services.filter(s => filter.length === 0 || s.service.toLowerCase().includes(filter));
            if (services && services.length) {
                costs += services.map(s => s.costs).reduce((a, b) => a + b);
            }
        });

        return costs;
    }

    let html = '';

    html += '<div style="margin-left: 6px; margin-bottom: 28px; white-space: nowrap">';

    const params = filterParam ? '?filter=' + filterParam : '';

    html += '<a href="trends.html' + params + '" style="background-color: #c0c0c0; margin-right: 8px; padding: 14px; padding-bottom: 9px">Trend</a>';
    months.forEach(month => {
        html += '<a href="' + month + '.html' + params + '" style="background-color: #f6f6f6; margin-right: 8px; padding: 14px; padding-bottom: 9px">';
        html += month + '</a>';
    });
    html += '</div>';
    html += '<div style="margin-left: 10px; margin-top: 20px; margin-bottom: 4px; color: grey">\n' +
        '    <div>\n' +
        '        <input id="filter" type="text" placeholder="search..."\n' +
        '               style="font-size: 16px; height: 32px; width: 320px; margin-bottom: 10px" onkeyup="update()">\n' +
        '        <div id="summary" style="display: inline-block"></div>\n' +
        '    </div>\n' +
        '</div>';
    document.getElementById('Header').innerHTML = html;

    function update() {
        let html = '';
        let filter = document.getElementById('filter').value.trim().toLowerCase().replace(/\*/g, '');
        console.log(filter);
        let filtered = array.filter(a => filter.length === 0 || a.service.toLowerCase().includes(filter));
        html += '<table>';
        html += '<tr style="font-size: 60%; color: grey;">';

        let maxTotal = 1;
        let allCostsTotal = 0;
        months.sort().reverse().forEach(month => {
            let value = getTotalCosts((month));
            maxTotal = Math.round(Math.max(maxTotal, value));
            allCostsTotal += value;
        });

        html += '<td style="background-color: white; vertical-align: middle">$' + numberWithCommas(allCostsTotal) + '</td>';

        months.sort().reverse().forEach(month => {
            let value = getTotalCosts(month);
            html += '<td style="background-color: white; padding: 6px; vertical-align: bottom">'
                + '<div style="color: blue">$' + numberWithCommas(value) + '</div>'
                + '<div style="width: 100%; background-color: #000000; height: ' + (56 * value / maxTotal) + 'px"></div>'
                + month
                + '</td>';
        })

        html += '</tr>';

        let max = 1;
        filtered.filter(m => m.usage >= 0).forEach(function (month) {
            months.sort().reverse().forEach(m => {
                max = Math.max(max, getCosts(month.service, m));
            });
        });

        filtered.sort((a, b) => getLatestCosts(b.service) - getLatestCosts(a.service)).forEach(function (month) {
                const style = '';
                html += '<tr>';
                html += '<td>';
                html += '<div class="domain" title="' + month.service + '" style="' + style + '">';
                let link = 'https://www.google.com/search?q=Google GCP ' + month.service + '';
                html += '<div>';
                let addLink = true;
                if (addLink) {
                    html += '<a target="_blank" href="' + link + '">';
                }
                html += '<div style="color: grey; ">' + month.service + '</div>';
                html += '<img class="image" src="${media-link-prefix}' + getImage(month.service) + '" onerror="this.onerror=null;this.src=\'../logos/general/gcp.png\';">';
                if (addLink) {
                    html += '</a>';
                }
                html += '</div>';
                html += '</div>';
                html += '</td>';

                const costs = [];
                months.sort().reverse().forEach(m => {
                    costs.push({
                        month: m,
                        costs: getCosts(month.service, m)
                    });
                });

                let index = 0;
                costs.forEach(cost => {
                    const m = cost.month;
                    const nextCost = index + 1 < costs.length ? costs[index + 1].costs : null;
                    html += '<td style="text-align: center; vertical-align: bottom; font-size: 12px">';
                    let value = getCosts(month.service, m);
                    let delta = nextCost ? ((value > nextCost ? '<span style="color: crimson">▲+</span>' : '<span style="color: green">▼</span>') + Math.round(100 * (value / nextCost - 1))) + '%' : '';
                    if (value > 0) {
                        color = (delta.includes('+')) ? 'crimson' : 'darkgreen';
                        html += '<div style="width: 100%; text-align: center; font-size: 90%; color: ' + color + '">' + delta + '</div>'
                        html += '$' + numberWithCommas(value);
                        html += '<div style="width: 100%; background-color: #1e73be; height: ' + (56 * value / max) + 'px"></div>'
                    }
                    html += '</td>';
                    index += 1;
                })


                html += '</tr>';
            }
        );
        html += ('</table>');
        html += ('<div style="color: grey; font-size: 80%">' + filtered.length + ' items</div>');
        document.getElementById('Content').innerHTML = html;
    }

    if (filterParam) {
        document.getElementById('filter').value = filterParam;
    }

    update();

</script>

<div style="margin-top: 27px; color: #a0a0a0; font-size: 60%">
    generated on ${date}
</div>
</body>
</html>
