<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>${product_name}</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-129891352-1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());
        gtag('config', 'UA-129891352-1');
    </script>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        a {
            text-decoration: none;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }

        .review-image {
            box-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
            width: 400px;
            margin: 10px;
            padding: 10px
        }

        .review-image-small {
            box-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
            width: 180px;
            margin: 6px;
            padding: 6px;
        }

        .tab-image {
            width: 24px;
            margin: 2px;
            padding: 2px;
        }

        .tab-image-selected {
            width: 24px;
            margin: 2px;
            padding: 2px;
            border-bottom: 4px solid blue;
        }

        .group {
            margin-top: 2px;
            margin-bottom: 40px;
            padding: 20px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 2px 8px;
            overflow: hidden;
            border: 1px solid lightgrey;
            vertical-align: top;
        }

        .kpi {
            margin-top: -3px;
            margin-bottom: -6px;
            padding: 0px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 2px 8px;
            overflow: hidden;
            border-top: 1px solid black;
            border-bottom: 1px solid black;
            vertical-align: top;
            display: block;
            background-color: #f0f0f0;
        }

        .step {
            margin: 12px;
            padding: 20px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 2px 8px;
            overflow: hidden;
            border: 1px solid lightgrey;
            display: inline-block;
            width: 280px;
            vertical-align: top;
        }

        .outcome {
            margin: 12px;
            padding: 20px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 2px 8px;
            overflow: hidden;
            border: 3px solid blue;
            vertical-align: top;
            font-size: 130%;
            display: inline-block;
        }

        .repo {
            overflow: hidden;
            margin: 10px;
            padding: 7px;
            border-radius: 6px;
            box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px, rgb(209, 213, 219) 0px 0px 0px 1px inset;
        }

        .aws {
            overflow: hidden;
            margin: 10px;
            padding: 7px;
            border-radius: 6px;
            box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px, rgb(209, 213, 219) 0px 0px 0px 1px inset;
        }


        .person {
            text-align: center;
            padding: 6px;
            margin: 4px;
            display: inline-block;
            font-size: 11px;
            width: 110px;
            overflow: hidden;
            white-space: nowrap;
            vertical-align: top;
        }

        .docs {
            text-align: center;
            padding: 6px;
            margin: 4px;
            display: inline-block;
            font-size: 11px;
            width: 110px;
            overflow: hidden;
            vertical-align: top;
        }

        .team {
            text-align: center;
            padding: 6px;
            margin: 8px;
            border-radius: 5px;
            display: inline-block;
            font-size: 13px;
            width: 110px;
            overflow: hidden;
            box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 12px;
            white-space: nowrap;
            vertical-align: top;
            border: 2px solid grey;
            height: 140px;
        }

        .legacy-team {
            text-align: center;
            padding: 6px;
            margin: 8px;
            border-radius: 5px;
            display: inline-block;
            font-size: 13px;
            width: 110px;
            overflow: hidden;
            box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 12px;
            white-space: nowrap;
            vertical-align: top;
            border: 2px dashed grey;
            height: 140px;
        }

        .number {
            display: inline-block;
            box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px, rgb(209, 213, 219) 0px 0px 0px 1px inset;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
            margin: 8px;
            width: 100px;
        }

        .dependency-icon {
            height: 32px;
            margin-left: 8px;
            margin-right: 8px;
            box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px, rgb(209, 213, 219) 0px 0px 0px 1px inset;
            padding: 4px;
            border-radius: 5px;
        }

        .triangle {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 40px 0px 40px 80px;
            border-color: transparent transparent transparent black;
            transform: rotate(0deg);
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function initTab() {
            if (window.location.hash) {
                tabName = window.location.hash.substring(1);
                if (document.getElementById('tab_' + tabName)) {
                    openTab(tabName);
                }
            }
        }

        function openTab(tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            history.pushState({}, "", '#' + tabName);
            document.getElementById(tabName).style.display = "block";
            document.getElementById('tab_' + tabName).className += " active";
        }

        function initTab() {
            if (window.location.hash) {
                tabName = window.location.hash.substring(1);
                if (document.getElementById(tabName)) {
                    openTab(tabName);
                }
            }
        }

        function openTab(tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            history.pushState({}, "", '#' + tabName);
            document.getElementById(tabName).style.display = "block";
            document.getElementById('tab_' + tabName).className += " active";
        }
    </script>
</head>
<body onload="initTab()" onhashchange="initTab()">

<script>
    const config = ${config};
    const all_products = ${all_products};
    const product = ${product};
</script>
<div id="Navigation"></div>
<div style="margin: 20px">
    <div id="Header"></div>

    <div style="margin: 0; margin-top: 12px">
        <div class="tab">
            <button class="tablinks active" id="tab_HomeTab" onclick="openTab('HomeTab')">Home</button>
            <button class="tablinks" id="tab_JobsTab" onclick="openTab('JobsTab')">Jobs To Be Done</button>
            <button class="tablinks" id="tab_KPITab" onclick="openTab('KPITab')">KPIs</button>
            <button class="tablinks" id="tab_RoadmapTab" onclick="openTab('RoadmapTab')">Product Vision</button>
            <button class="tablinks" id="tab_ResourcesTab" onclick="openTab('ResourcesTab')">Resources</button>
        </div>

        <div id="HomeTab" class="tabcontent" style="display: block; padding: 10px">
            <div id="Home"></div>
        </div>
        <div id="JobsTab" class="tabcontent" style="padding: 10px;">
            <div id="Jobs"></div>
        </div>
        <div id="KPITab" class="tabcontent" style="padding: 10px;">
            <div id="KPI"></div>
        </div>
        <div id="RoadmapTab" class="tabcontent" style="padding: 10px;">
            <div id="Roadmap"></div>
        </div>
        <div id="ResourcesTab" class="tabcontent" style="padding: 10px;">
            <div id="Resources"></div>
        </div>
    </div>
</div>

<script>
    function addNavigation() {
        let html = '';
        html += '<div style="margin: 20px 20px 10px 20px; font-size: 85%; color: black">';
        all_products.forEach(per => {
            html += '<a href="' + per.id + '.html">';
            const tabClass = per.id === product.id ? 'tab-image-selected' : 'tab-image';
            html += '<img src="../icons/' + per.icon + '" style="" class="' + tabClass + '" onerror="this.onerror=null;this.src=\'../icons/product.png\'">';
            html += '</a>';
        });
        html += '</div>';

        document.getElementById('Navigation').innerHTML = html;
    }

    addNavigation();

    function addHeader() {
        let html = '';

        html += '<table>';
        html += '<tr>';
        html += '<td>';
        html += '<div>';
        html += '<img src="../icons/' + product.icon + '" style="width: 110px" onerror="this.onerror=null;this.src=\'../icons/product.png\'">';
        html += '</div>';
        html += '</td>';
        html += '<td style="vertical-align: top">';
        html += '<div style="margin-left: 20px; font-size: 90%; color: grey; vertical-align: top">';
        html += product.primaryCustomers.map(c => c.name).join(' | ');
        html += ' / <span style="color: blue; font-weight: bold;">' + product.id.toUpperCase() + '</span>';
        html += '</div>';
        html += '<div style="font-size: 50px; margin-left: 20px">';
        html += product.name;
        html += '</div>';
        html += '<div style="font-size: 16px; margin-left: 20px; color: grey; margin-top: 3px">';
        html += product.description ? product.description : '';
        html += '</div>';
        html += '</td>';
        html += '</tr>';
        html += '</table>';

        document.getElementById('Header').innerHTML = html;
    }

    function addHome() {
        let html = '';

        html += '<table style="text-align: center">';
        html += '<tr>';
        html += '<td style="max-width: 200px; vertical-align: bottom">';
        product.interfaces.forEach(interface => {
            html += '<div style="text-align: center; max-width: 200px; vertical-align: bottom; display: inline-block">';
            html += '<div style="border: 2px solid white; padding: 8px; margin: 5px; margin-bottom: 20px; color: black; display: inline-block">';
            interface.users.forEach(user => {
                html += '<div style="display: inline-block; border: 1px solid grey; padding: 3px; margin: 2px; border-radius: 9px; font-size: 80%">';
                html += user;
                html += '</div>';
            });
            html += '</div>';
            html += '<div style="text-align: center; max-width: 200px; vertical-align: top">';
            html += '<div style="border: 2px solid grey; padding: 8px; margin: 5px; vertical-align: top">';
            html += '<img src="../icons/' + interface.type + '.png" style="height: 42px; margin: 0; margin-top: -28px; background-color: rgba(255,255,255,1)">';
            html += '<div style="color: blue; margin-bottom: 0px; height: 2em; margin-top: 0; color: grey; font-size: 80%">' + interface.type + '</div>';
            html += '<div style="color: blue; margin-bottom: 10px; height: 2em; margin-top: 0px">' + interface.name + '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';

        });
        html += '</td>';
        html += '</tr>';

        html += '<tr>';
        html += '<td colspan="100" style="text-align: center; padding: 0">';
        html += '<div style="text-align: center; border: 3px solid grey; margin: 10px; padding: 10px; margin-top: -3px">';
        if (product.neededCapabilities) {
            product.neededCapabilities.forEach(capability => {
                html += '<div style="display: inline-block; width: 200px; vertical-align: bottom; margin: 3px;">';
                html += '<div style="text-align: left; border: 1px dashed grey; padding: 8px;">';
                html += '<div style="color: blue; margin-bottom: 4px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 90%">' + capability.capabilityName + '</div>';
                html += '<div style="color: grey; margin-bottom: 10px; max-height: 2em; margin-top: 0px; text-align: center; font-size: 70%">' + capability.whyNeeded + '</div>';
                html += '</div>';
                html += '</div>';
            });
        }
        html += '</div>';
        html += '</td>';
        html += '</tr>';
        html += '</table>';


        html += '</div>';

        document.getElementById('Home').innerHTML = html;
    }

    addHeader();
    addHome();

</script>

</body>
</html>
