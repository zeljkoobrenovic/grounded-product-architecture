<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goals (${domain_name})</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
            border: none;
        }

        .hero-subtitle {
            border: none;
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
            max-width: 960px;
            line-height: 1.4;
        }

        .summary-strip {
            margin: 0 0 14px 0;
        }

        .stat {
            display: inline-block;
            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 30px;
            color: #315b7c;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-header {
            margin-bottom: 12px;
        }

        .card-badge {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #eaf1f7;
            color: #315b7c;
        }

        .card-period {
            color: #6b7280;
            font-size: 13px;
        }

        .card-title {
            font-size: 22px;
            line-height: 1.35;
            margin: 0 0 10px 0;
            color: #315b7c;
        }

        .card-objective {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .section {
            margin-top: 14px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
            max-width: 100%;
        }

        .pill-name {
            font-weight: bold;
        }

        .pill-meta {
            color: #6b7280;
        }

        .metric {
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 3px solid #d7dce1;
        }

        .metric-name {
            font-weight: bold;
            line-height: 1.35;
        }

        .metric-meta {
            color: #6b7280;
            font-size: 12px;
        }

        .open-link {
            display: inline-block;
            margin-top: 12px;
            color: #315b7c;
            font-size: 14px;
        }

        .empty {
            color: #6b7280;
            border: 1px dashed #d7dce1;
            border-radius: 8px;
            padding: 18px;
            background-color: #fafafa;
        }

        @media (max-width: 720px) {
            body {
                margin: 12px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .tab button {
                width: 100%;
                text-align: left;
            }
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function initTab() {
            let tabName = 'Current';
            if (window.location.hash) {
                const hash = window.location.hash.substring(1);
                if (document.getElementById('tab_' + hash)) {
                    tabName = hash;
                }
            }
            openTab(tabName);
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            history.pushState({}, '', '#' + tabName);
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
        }
    </script>
</head>
<body onload="initTab()" onhashchange="initTab()">
<div class="domain-label">${domain_name}</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link" href="../customers/index.html">Customers</a>
    <a class="section-link" href="../product-bricks/index.html">Product Bricks</a>
    <a class="section-link" href="../products/index.html">Products</a>
    <a class="section-link" href="../teams/index.html">Teams</a>
    <a class="section-link active" href="../goals/index.html">Goals</a>
    <a class="section-link" href="../rituals/index.html">Rituals</a>
    <a class="section-link" href="../releases/index.html">Releases</a>
    <a class="section-link" href="../initiatives/index.html">Initiatives</a>
    <a class="section-link" href="../discoveries/index.html">Discoveries</a>
</div>

<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Goals"></td>
            <td class="hero-copy-cell">
                <div class="hero-title">Goals</div>
                <div class="hero-subtitle">${domain_name} | ${domain_description}</div>
            </td>
        </tr>
    </table>
</div>

<div id="Summary" class="summary-strip"></div>

<div class="tab">
    <button class="tablinks" id="tab_Current" onclick="openTab('Current')">Current</button>
    <button class="tablinks" id="tab_Next" onclick="openTab('Next')">Next</button>
    <button class="tablinks" id="tab_Archive" onclick="openTab('Archive')">Archive</button>
</div>

<div id="Current" class="tabcontent"></div>
<div id="Next" class="tabcontent"></div>
<div id="Archive" class="tabcontent"></div>

<script>
    const currentGoals = ${current_goals};
    const nextGoals = ${next_goals};
    const archiveGoals = ${archive_goals};

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderSummary() {
        const stats = [
            {value: (currentGoals.goals || []).length, label: 'Current goals'},
            {value: (nextGoals.goals || []).length, label: 'Next goals'},
            {value: (archiveGoals.goals || []).length, label: 'Archived goals'},
            {value: ((archiveGoals.quartersCovered || []).length || 0), label: 'Archived quarters'}
        ];
        let html = '';
        stats.forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function renderMetric(metric) {
        return '<div class="metric">' +
            '<div class="metric-name">' + escapeHtml(metric.kpiName) + '</div>' +
            '<div class="metric-meta">' + escapeHtml(metric.kind) + (metric.unit ? ' | ' + escapeHtml(metric.unit) : '') + ' | ' + escapeHtml(metric.targetDirection) + '</div>' +
            '</div>';
    }

    function renderCustomer(customer) {
        return '<div class="pill"><div><div class="pill-name">' + escapeHtml(customer.customerName) + '</div><div class="pill-meta">' + escapeHtml(customer.customerGroup || customer.customerId || '') + '</div></div></div>';
    }

    function renderGoalCard(goal) {
        let html = '<a target="_blank" rel="noopener noreferrer" href="landing_pages/' + encodeURIComponent(goal.id) + '.html">';
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-badge">' + escapeHtml(goal.status || 'goal') + '</span><span class="card-period">' + escapeHtml(goal.period.quarter) + '</span></div>';
        html += '<div class="card-title">' + escapeHtml(goal.title) + '</div>';
        html += '<div class="card-objective">' + escapeHtml(goal.objective) + '</div>';

        html += '<div class="section"><div class="section-title">Customers</div>';
        (goal.linkedCustomers || []).forEach(customer => {
            html += renderCustomer(customer);
        });
        html += '</div>';

        html += '<div class="section"><div class="section-title">Linked KPIs</div>';
        (goal.linkedCustomerKPIs || []).slice(0, 2).forEach(metric => {
            html += renderMetric(metric);
        });
        (goal.linkedBusinessKPIs || []).slice(0, 1).forEach(metric => {
            html += renderMetric(metric);
        });
        html += '</div>';

        html += '<div class="section"><div class="section-title">Execution Links</div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((goal.linkedInitiatives || []).length)) + ' initiatives</div><div class="pill-meta">Connected delivery change</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((goal.linkedReleases || []).length)) + ' releases</div><div class="pill-meta">Connected shipped change</div></div></div>';
        html += '</div>';

        html += '<div class="open-link">Open goal details</div>';
        html += '</div></a>';
        return html;
    }

    function renderTab(divId, payload, emptyText) {
        const goals = (payload && payload.goals) ? payload.goals : [];
        if (!goals.length) {
            document.getElementById(divId).innerHTML = '<div class="empty">' + escapeHtml(emptyText) + '</div>';
            return;
        }
        let html = '<div class="grid">';
        goals.forEach(goal => {
            html += renderGoalCard(goal);
        });
        html += '</div>';
        document.getElementById(divId).innerHTML = html;
    }

    renderSummary();
    renderTab('Current', currentGoals, 'No current-quarter goals are defined.');
    renderTab('Next', nextGoals, 'No next-quarter preparation goals are defined.');
    renderTab('Archive', archiveGoals, 'No archived goals are defined.');
</script>
</body>
</html>
