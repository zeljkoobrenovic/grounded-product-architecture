<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rituals (${domain_name})</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .hero {
            margin-bottom: 18px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            max-width: 960px;
            line-height: 1.4;
        }

        .summary-strip {
            margin: 0 0 18px 0;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: block;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 860px;
            font-size: 13px;
            background-color: white;
        }

        th {
            background-color: #f0f0f0;
            text-align: left;
            padding: 10px;
            border: 1px solid #ddd;
            white-space: nowrap;
        }

        td {
            border: 1px solid #ddd;
            padding: 10px;
            vertical-align: top;
        }

        .matrix-meeting {
            min-width: 260px;
        }

        .matrix-role {
            text-align: left;
            overflow: hidden;
            font-size: 60%;
            padding: 0;
            max-width: 10px;
            vertical-align: middle
        }

        .matrix-required {
            display: inline-block;
            padding: 3px;
            border-radius: 999px;
            background-color: #eadfd8;
            color: #6d4c41;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .matrix-optional {
            display: inline-block;
            padding: 3px;
            border-radius: 999px;
            background-color: #eef2f6;
            color: #6b7280;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .matrix-empty {
            color: #c4c4c4;
        }

        .matrix-shared {
            text-align: center;
            font-weight: bold;
            color: #6d4c41;
        }

        .matrix-self {
            background-color: #f7f3f0;
        }

        .stat {
            display: inline-block;
            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 30px;
            color: #6d4c41;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .section {
            margin-top: 24px;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: #6d4c41;
        }

        .section-copy {
            color: #6b7280;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-topline {
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #f3ece8;
            color: #6d4c41;
        }

        .meta {
            color: #6b7280;
            font-size: 13px;
        }

        .card-title {
            font-size: 22px;
            line-height: 1.3;
            margin: 0 0 10px 0;
            color: #6d4c41;
        }

        .card-copy {
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
        }

        .pill-name {
            font-weight: bold;
        }

        .pill-meta {
            color: #6b7280;
        }

        .open-link {
            display: inline-block;
            margin-top: 10px;
            color: #6d4c41;
            font-size: 14px;
        }

        @media (max-width: 720px) {
            body {
                margin: 12px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function openTab(evt, tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            document.getElementById(tabName).style.display = 'block';
            evt.currentTarget.className += ' active';
        }
    </script>
</head>
<body>
<div class="domain-label">${domain_name}</div>
<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Rituals"></td>
            <td class="hero-copy-cell">
                <div class="hero-title">Rituals</div>
                <div class="hero-subtitle">${domain_name} | ${domain_description}</div>
            </td>
        </tr>
    </table>
</div>

<div class="tab">
    <button class="tablinks active" onclick="openTab(event, 'OverviewTab')">Overview</button>
    <button class="tablinks" onclick="openTab(event, 'RitualsTab')">Rituals</button>
    <button class="tablinks" onclick="openTab(event, 'ParticipantsTab')">Participants</button>
    <button class="tablinks" onclick="openTab(event, 'ParticipantMatrixTab')">Participant Matrix</button>
</div>

<div id="OverviewTab" class="tabcontent" style="display: block">
    <div id="Summary" class="summary-strip"></div>
    <div id="Overview"></div>
</div>

<div id="RitualsTab" class="tabcontent" style="display: none">
    <div id="Rituals"></div>
</div>

<div id="ParticipantsTab" class="tabcontent" style="display: none">
    <div id="Participants"></div>
</div>

<div id="ParticipantMatrixTab" class="tabcontent" style="display: none">
    <div id="ParticipantMatrix"></div>
</div>

<script>
    const rituals = ${rituals};

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function titleCase(value) {
        return String(value || '')
            .split('-')
            .map(part => part ? part[0].toUpperCase() + part.slice(1) : part)
            .join(' ');
    }

    function renderSummary(meetings) {
        const cadenceCounts = {};
        let totalDuration = 0;
        meetings.forEach(meeting => {
            const cadence = meeting.cadence || 'unknown';
            cadenceCounts[cadence] = (cadenceCounts[cadence] || 0) + 1;
            totalDuration += Number(meeting.durationMinutes || 0);
        });

        const stats = [
            {value: meetings.length, label: 'Meetings'},
            {value: Object.keys(new Set(meetings.map(item => item.category || 'other'))).length, label: 'Categories'},
            {value: Math.round(totalDuration / Math.max(meetings.length, 1)), label: 'Avg minutes'},
            {value: cadenceCounts.weekly || 0, label: 'Weekly rituals'}
        ];

        let html = '';
        stats.forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function categoryIntro(category) {
        const copy = {
            'strategy-and-planning': 'Meetings that set direction, priorities, and investment choices.',
            'portfolio-governance': 'Leadership rituals that align the broader portfolio and cross-team trade-offs.',
            'product-delivery': 'Core product leadership coordination for the squad or domain.',
            'delivery': 'Recurring delivery syncs that keep execution moving.',
            'delivery-planning': 'Meetings that shape near-term commitments and implementation readiness.',
            'delivery-learning': 'Reviews that turn shipped work into feedback and learning.',
            'team-health': 'Rituals that improve collaboration, process, and team effectiveness.',
            'performance-management': 'Metric reviews that connect work to outcome movement.',
            'discovery': 'Evidence-focused meetings that keep product choices grounded in customer reality.',
            'technical-governance': 'Meetings that protect architecture, platform quality, and long-term technical health.',
            'release-management': 'Rituals that make launches safer and more coordinated.',
            'operations': 'Operational reviews that convert incidents and risk signals into prevention work.',
            'business-governance': 'Executive reviews that connect product and technology to business performance.'
        };
        return copy[category] || 'Recurring meetings in this operating area.';
    }

    function renderMeetingCard(meeting) {
        let html = '<a href="landing_pages/' + encodeURIComponent(meeting.id) + '.html" target="_blank" rel="noopener noreferrer"><div class="card">';
        html += '<div class="card-topline"><span class="badge">' + escapeHtml(titleCase(meeting.category || 'ritual')) + '</span><span class="meta">' + escapeHtml(meeting.cadence || '') + ' | ' + escapeHtml(String(meeting.durationMinutes || '')) + ' min</span></div>';
        html += '<div class="card-title">' + escapeHtml(meeting.title) + '</div>';
        html += '<div class="card-copy">' + escapeHtml(meeting.goal || meeting.description || '') + '</div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(meeting.owner || '') + '</div><div class="pill-meta">Owner</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((meeting.participants && meeting.participants.required ? meeting.participants.required.length : 0))) + '</div><div class="pill-meta">Required roles</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(meeting.format || '') + '</div><div class="pill-meta">Format</div></div></div>';
        html += '<div class="open-link">Open ritual details</div>';
        html += '</div></a>';
        return html;
    }

    function renderOverview(meetings) {
        const categories = [];
        const grouped = {};

        meetings.forEach(meeting => {
            const category = meeting.category || 'other';
            if (!grouped[category]) {
                grouped[category] = [];
                categories.push(category);
            }
            grouped[category].push(meeting);
        });

        let html = '';
        const cadences = ['daily', 'weekly', 'biweekly', 'monthly', 'quarterly'];
        cadences.forEach(cadence => {
            categories.forEach(category => {
                html += '<div class="section">';
                html += '<div class="">';
                console.log(cadence);
                grouped[category].filter(m => m.cadence === cadence).forEach(meeting => {
                    html += '<div style="">';
                    html += '<div style="font-size: 70%; display: inline-block; max-width: 200px; width: 200px; white-space: nowrap; overflow: hidden">';
                    html += '' + meeting.title + ' ' + meeting.cadence;
                    html += '</div>';
                    html += '<div style="display: inline-block; max-width: calc(100% - 240px); width: calc(100% - 240px); white-space: nowrap; overflow: hidden">';
                    for (let quarter = 0; quarter < 1; quarter++) {
                        html += '<div style="display: inline-block; height: 12px; width: 3px; margin-left: 1px; background-color: white;"></div>';
                        for (let month = 0; month < 3; month++) {
                            html += '<div style="display: inline-block; height: 12px; width: 13px; margin-left: 1px; background-color: white;"></div>';
                            for (let week = 0; week < 4; week++) {
                                html += '<div style="display: inline-block; height: 12px; width: 5px; margin-left: 1px; background-color: white;"></div>';
                                for (let day = 0; day < 5; day++) {
                                    let color = '#f0f0f0';
                                    if (meeting.cadence === 'daily') {
                                        color = 'blue';
                                    } else if (meeting.cadence === 'weekly' && day === 2) {
                                        color = 'blue';
                                    } else if (meeting.cadence === 'biweekly' && week % 2 === 0 && day === 2) {
                                        color = 'blue';
                                    } else if (meeting.cadence === 'monthly' && week === 0 && day === 2) {
                                        color = 'blue';
                                    } else if (meeting.cadence === 'quarterly' && month === 0 && week === 0 && day === 2) {
                                        color = 'blue';
                                    }

                                    html += '<div style="border-radius: 50%; display: inline-block; height: 10px; width: 10px; margin-left: 1px; background-color: ' + color + ';"></div>';
                                }
                            }
                        }
                    }
                    html += '</div>';
                    html += '</div>';
                });
            });
            html += '</div></div>';
        });

        document.getElementById('Overview').innerHTML = html;
    }

    function renderRitualList(meetings) {
        let html = '<div class="grid">';
        meetings.forEach(meeting => {
            html += renderMeetingCard(meeting);
        });
        html += '</div>';
        document.getElementById('Rituals').innerHTML = html;
    }

    function renderParticipantsMatrix(meetings) {
        const roleAttendance = {};
        const sortedMeetings = meetings.slice().sort((left, right) => {
            const leftCount = (((left.participants && left.participants.required) || []).length + ((left.participants && left.participants.optional) || []).length);
            const rightCount = (((right.participants && right.participants.required) || []).length + ((right.participants && right.participants.optional) || []).length);
            if (rightCount !== leftCount) {
                return rightCount - leftCount;
            }
            return String(left.title || '').localeCompare(String(right.title || ''));
        });

        sortedMeetings.forEach(meeting => {
            ((meeting.participants && meeting.participants.required) || []).forEach(role => {
                roleAttendance[role] = (roleAttendance[role] || 0) + 1;
            });
            ((meeting.participants && meeting.participants.optional) || []).forEach(role => {
                roleAttendance[role] = (roleAttendance[role] || 0) + 1;
            });
        });

        const roles = Object.keys(roleAttendance).sort((left, right) => {
            if (roleAttendance[right] !== roleAttendance[left]) {
                return roleAttendance[right] - roleAttendance[left];
            }
            return left.localeCompare(right);
        });

        let html = '<div class="table-wrap"><table>';
        html += '<tr><th class="matrix-meeting">Meeting</th>';
        roles.forEach(role => {
            html += '<th class="matrix-role">' + escapeHtml(role) + '</th>';
        });
        html += '</tr>';

        sortedMeetings.forEach(meeting => {
            const required = new Set((meeting.participants && meeting.participants.required) || []);
            const optional = new Set((meeting.participants && meeting.participants.optional) || []);
            html += '<tr>';
            html += '<td class="matrix-meeting"><div><b>' + escapeHtml(meeting.title || '') + '</b></div><div class="meta">' + escapeHtml(meeting.cadence || '') + ' | ' + escapeHtml(String(meeting.durationMinutes || '')) + ' min</div></td>';
            roles.forEach(role => {
                html += '<td class="matrix-role">';
                if (required.has(role)) {
                    html += '<span class="matrix-required">R</span>';
                } else if (optional.has(role)) {
                    html += '<span class="matrix-optional">O</span>';
                } else {
                    html += '<span class="matrix-empty">-</span>';
                }
                html += '</td>';
            });
            html += '</tr>';
        });

        html += '</table></div>';
        document.getElementById('Participants').innerHTML = html;
    }

    function renderParticipantSharedMatrix(meetings) {
        const attendance = {};

        meetings.forEach(meeting => {
            const roles = [
                ...((meeting.participants && meeting.participants.required) || []),
                ...((meeting.participants && meeting.participants.optional) || [])
            ];
            roles.forEach(role => {
                attendance[role] = (attendance[role] || 0) + 1;
            });
        });

        const roles = Object.keys(attendance).sort((left, right) => {
            if (attendance[right] !== attendance[left]) {
                return attendance[right] - attendance[left];
            }
            return left.localeCompare(right);
        });

        const sharedCounts = {};
        roles.forEach(left => {
            sharedCounts[left] = {};
            roles.forEach(right => {
                sharedCounts[left][right] = 0;
            });
        });

        meetings.forEach(meeting => {
            const rolesInMeeting = [
                ...((meeting.participants && meeting.participants.required) || []),
                ...((meeting.participants && meeting.participants.optional) || [])
            ];
            rolesInMeeting.forEach(left => {
                rolesInMeeting.forEach(right => {
                    sharedCounts[left][right] += 1;
                });
            });
        });

        let maxShared = 0;
        roles.forEach(left => {
            roles.forEach(right => {
                if (left !== right && sharedCounts[left][right] > maxShared) {
                    maxShared = sharedCounts[left][right];
                }
            });
        });

        let html = '<div class="table-wrap"><table>';
        html += '<tr><th class="matrix-meeting">Participant</th>';
        roles.forEach(role => {
            html += '<th class="matrix-role">' + escapeHtml(role) + '</th>';
        });
        html += '</tr>';

        roles.forEach(left => {
            html += '<tr>';
            html += '<td class="matrix-meeting" style="max-width: 160px"><div><b>' + escapeHtml(left) + '</b> (' + escapeHtml(String(attendance[left])) + ')</div></td>';
            roles.forEach(right => {
                const count = sharedCounts[left][right];
                const selfClass = left === right ? ' matrix-self' : '';
                let style = '';
                if (left !== right && count > 0 && maxShared > 0) {
                    const opacity = 0.12 + (0.58 * (count / maxShared));
                    style = ' style="background-color: rgba(37, 99, 235, ' + opacity.toFixed(2) + '); color: #0f172a;"';
                }
                html += '<td class="matrix-role matrix-shared' + selfClass + '"' + style + '>';
                if (left === right) {
                    html += '<span class="matrix-empty">-</span>';
                } else {
                    html += count ? escapeHtml(String(count)) : '<span class="matrix-empty">0</span>';
                }
                html += '</td>';
            });
            html += '</tr>';
        });

        html += '</table></div>';
        document.getElementById('ParticipantMatrix').innerHTML = html;
    }

    renderSummary(rituals.meetings || []);
    renderOverview(rituals.meetings || []);
    renderRitualList(rituals.meetings || []);
    renderParticipantsMatrix(rituals.meetings || []);
    renderParticipantSharedMatrix(rituals.meetings || []);
</script>
</body>
</html>
