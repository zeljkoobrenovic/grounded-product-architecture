<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rituals (${domain_name})</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 18px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            max-width: 960px;
            line-height: 1.4;
        }

        .summary-strip {
            margin: 0 0 18px 0;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: block;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }

        .stat {
            display: inline-block;
            min-width: 150px;
            margin: 0 10px 10px 0;
            padding: 12px 14px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            background-color: #f8f8f8;
            vertical-align: top;
        }

        .stat-value {
            font-size: 30px;
            color: #6d4c41;
        }

        .stat-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .section {
            margin-top: 24px;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: #6d4c41;
        }

        .section-copy {
            color: #6b7280;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-topline {
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #f3ece8;
            color: #6d4c41;
        }

        .meta {
            color: #6b7280;
            font-size: 13px;
        }

        .card-title {
            font-size: 22px;
            line-height: 1.3;
            margin: 0 0 10px 0;
            color: #6d4c41;
        }

        .card-copy {
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
        }

        .pill-name {
            font-weight: bold;
        }

        .pill-meta {
            color: #6b7280;
        }

        .open-link {
            display: inline-block;
            margin-top: 10px;
            color: #6d4c41;
            font-size: 14px;
        }

        @media (max-width: 720px) {
            body {
                margin: 12px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
</head>
<body>
<div class="domain-label">${domain_name}</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link" href="../customers/index.html">Customers</a>
    <a class="section-link" href="../product-bricks/index.html">Product Bricks</a>
    <a class="section-link" href="../products/index.html">Products</a>
    <a class="section-link" href="../goals/index.html">Goals</a>
    <a class="section-link active" href="../rituals/index.html">Rituals</a>
    <a class="section-link" href="../initiatives/index.html">Initiatives</a>
    <a class="section-link" href="../releases/index.html">Releases</a>
</div>

<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Rituals"></td>
            <td class="hero-copy-cell">
                <div class="hero-title">Rituals</div>
                <div class="hero-subtitle">${domain_name} | ${domain_description}</div>
            </td>
        </tr>
    </table>
</div>

<div class="tab">
    <button class="tablinks active">Rituals</button>
</div>

<div class="tabcontent">
    <div id="Summary" class="summary-strip"></div>
    <div id="Overview"></div>
</div>

<script>
    const rituals = ${rituals};

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function titleCase(value) {
        return String(value || '')
            .split('-')
            .map(part => part ? part[0].toUpperCase() + part.slice(1) : part)
            .join(' ');
    }

    function renderSummary(meetings) {
        const cadenceCounts = {};
        let totalDuration = 0;
        meetings.forEach(meeting => {
            const cadence = meeting.cadence || 'unknown';
            cadenceCounts[cadence] = (cadenceCounts[cadence] || 0) + 1;
            totalDuration += Number(meeting.durationMinutes || 0);
        });

        const stats = [
            { value: meetings.length, label: 'Meetings' },
            { value: Object.keys(new Set(meetings.map(item => item.category || 'other'))).length, label: 'Categories' },
            { value: Math.round(totalDuration / Math.max(meetings.length, 1)), label: 'Avg minutes' },
            { value: cadenceCounts.weekly || 0, label: 'Weekly rituals' }
        ];

        let html = '';
        stats.forEach(stat => {
            html += '<div class="stat"><div class="stat-value">' + escapeHtml(String(stat.value)) + '</div><div class="stat-label">' + escapeHtml(stat.label) + '</div></div>';
        });
        document.getElementById('Summary').innerHTML = html;
    }

    function categoryIntro(category) {
        const copy = {
            'strategy-and-planning': 'Meetings that set direction, priorities, and investment choices.',
            'portfolio-governance': 'Leadership rituals that align the broader portfolio and cross-team trade-offs.',
            'product-delivery': 'Core product leadership coordination for the squad or domain.',
            'delivery': 'Recurring delivery syncs that keep execution moving.',
            'delivery-planning': 'Meetings that shape near-term commitments and implementation readiness.',
            'delivery-learning': 'Reviews that turn shipped work into feedback and learning.',
            'team-health': 'Rituals that improve collaboration, process, and team effectiveness.',
            'performance-management': 'Metric reviews that connect work to outcome movement.',
            'discovery': 'Evidence-focused meetings that keep product choices grounded in customer reality.',
            'technical-governance': 'Meetings that protect architecture, platform quality, and long-term technical health.',
            'release-management': 'Rituals that make launches safer and more coordinated.',
            'operations': 'Operational reviews that convert incidents and risk signals into prevention work.',
            'business-governance': 'Executive reviews that connect product and technology to business performance.'
        };
        return copy[category] || 'Recurring meetings in this operating area.';
    }

    function renderMeetingCard(meeting) {
        let html = '<a href="landing_pages/' + encodeURIComponent(meeting.id) + '.html" target="_blank" rel="noopener noreferrer"><div class="card">';
        html += '<div class="card-topline"><span class="badge">' + escapeHtml(titleCase(meeting.category || 'ritual')) + '</span><span class="meta">' + escapeHtml(meeting.cadence || '') + ' | ' + escapeHtml(String(meeting.durationMinutes || '')) + ' min</span></div>';
        html += '<div class="card-title">' + escapeHtml(meeting.title) + '</div>';
        html += '<div class="card-copy">' + escapeHtml(meeting.goal || meeting.description || '') + '</div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(meeting.owner || '') + '</div><div class="pill-meta">Owner</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(String((meeting.participants && meeting.participants.required ? meeting.participants.required.length : 0))) + '</div><div class="pill-meta">Required roles</div></div></div>';
        html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(meeting.format || '') + '</div><div class="pill-meta">Format</div></div></div>';
        html += '<div class="open-link">Open ritual details</div>';
        html += '</div></a>';
        return html;
    }

    function renderOverview(meetings) {
        const categories = [];
        const grouped = {};

        meetings.forEach(meeting => {
            const category = meeting.category || 'other';
            if (!grouped[category]) {
                grouped[category] = [];
                categories.push(category);
            }
            grouped[category].push(meeting);
        });

        let html = '';
        categories.forEach(category => {
            html += '<div class="section">';
            html += '<div class="section-title">' + escapeHtml(titleCase(category)) + '</div>';
            html += '<div class="section-copy">' + escapeHtml(categoryIntro(category)) + '</div>';
            html += '<div class="grid">';
            grouped[category].forEach(meeting => {
                html += renderMeetingCard(meeting);
            });
            html += '</div></div>';
        });

        document.getElementById('Overview').innerHTML = html;
    }

    renderSummary(rituals.meetings || []);
    renderOverview(rituals.meetings || []);
</script>
</body>
</html>
