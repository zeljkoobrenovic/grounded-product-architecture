<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customers (${domain_name})</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
            max-width: 960px;
            line-height: 1.4;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }

        .kpi-badge {
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            font-size: 12px;
            color: #4b5563;
            text-align: center;
        }

        .kpi-badge-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
            border-radius: 4px;
            background-color: white;
            border: 1px solid #d1d5db;
            padding: 2px;
        }

        .customer-group {
            display: inline-block;
            vertical-align: top;
            margin: 8px 18px 8px 0;
        }

        .customer-group-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .customer-card {
            display: inline-block;
            vertical-align: top;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            margin: 0 8px 8px 0;
            padding: 12px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.05) 0 1px 3px;
            width: 290px;
            text-align: left;
        }

        .customer-card-photo {
            display: block;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d1d5db;
            box-shadow: rgba(99, 99, 99, 0.2) 0 2px 8px 0;
            margin: 4px auto 10px;
        }

        .customer-card-name {
            font-size: 17px;
            font-weight: bold;
            color: #315b7c;
            text-align: center;
            margin-bottom: 10px;
        }

        .customer-attribute {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            align-items: flex-start;
        }

        .customer-attribute-icon {
            width: 28px;
            height: 28px;
            flex: 0 0 auto;
            margin-top: 2px;
        }

        .customer-attribute-body {
            border-left: 1px dashed #d1d5db;
            padding-left: 6px;
        }

        .customer-attribute-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #6b7280;
            margin-bottom: 2px;
        }

        .customer-attribute-item {
            font-size: 13px;
            color: #374151;
            margin-top: 3px;
            margin-bottom: 3px;
        }

        .insight-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            padding: 16px;
        }

        .insight-card {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.05) 0 1px 3px;
        }

        .insight-title {
            font-size: 18px;
            color: #315b7c;
            margin-bottom: 8px;
        }

        .insight-summary {
            color: #4b5563;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .insight-tag {
            display: inline-block;
            margin: 0 6px 6px 0;
            padding: 4px 10px;
            border-radius: 999px;
            background: #eef2f7;
            font-size: 12px;
            color: #4b5563;
        }

        .insight-customer-link {
            margin: 0 0 8px 0;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f8fafc;
        }

        .insight-source {
            font-size: 13px;
            margin-top: 4px;
        }

        @media (max-width: 720px) {
            body {
                margin: 12px;
            }

            .customer-group {
                flex-direction: column;
            }

            .customer-card {
                width: 100%;
            }

            .tab button {
                width: 100%;
                text-align: left;
            }
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function openTab(tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            document.getElementById('tab_' + tabName).className += " active";
        }
    </script>
</head>
<body>
<div class="domain-label">${domain_name}</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link active" href="../customers/index.html">Customers</a>
    <a class="section-link" href="../product-bricks/index.html">Product Bricks</a>
    <a class="section-link" href="../products/index.html">Products</a>
    <a class="section-link" href="../teams/index.html">Teams</a>
    <a class="section-link" href="../objectives/index.html">Objectives</a>
    <a class="section-link" href="../releases/index.html">Releases</a>
    <a class="section-link" href="../initiatives/index.html">Initiatives</a>
    <a class="section-link" href="../discoveries/index.html">Discoveries</a>
</div>

<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Customers"></td>
            <td class="hero-copy-cell">
                <div class="hero-title">Customers</div>
                <div class="hero-subtitle">${domain_name} | ${domain_description}</div>
            </td>
        </tr>
    </table>
</div>

<div class="tab">
    <button class="tablinks active" id="tab_customers" onclick="openTab('customers')">Customers</button>
    <button class="tablinks" id="tab_insights" onclick="openTab('insights')">Insights</button>
</div>
<div>
    <div id="customers" style="display: block" class="tabcontent"></div>
    <div id="insights" class="tabcontent"></div>
</div>

<script>
    const customers = ${customers};
    const insights = ${insights};

    function topCustomerKpi(customer) {
        return (((customer || {}).kpiPyramids || {}).customerOutcomes || {}).top || null;
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function customerLookup() {
        const lookup = {};
        customers.forEach(group => {
            group.customers.forEach(customer => {
                lookup[customer.id] = customer;
            });
        });
        return lookup;
    }

    function renderAttribute(iconFile, label, items) {
        if (!items || !items.length) return '';
        let html = '<div class="customer-attribute">';
        html += '<img class="customer-attribute-icon" src="icons/' + escapeHtml(iconFile) + '" onerror="this.onerror=null;this.src=\'icons/logo.png\'">';
        html += '<div class="customer-attribute-body">';
        html += '<div class="customer-attribute-label">' + escapeHtml(label) + '</div>';
        items.forEach(item => {
            html += '<div class="customer-attribute-item">' + escapeHtml(item) + '</div>';
        });
        html += '</div></div>';
        return html;
    }

    function update() {
        let html = '<div style="padding: 12px">';

        customers.forEach(group => {
            html += '<div class="customer-group">';
            html += '<div class="customer-group-label">' + escapeHtml(group.group) + '</div>';
            group.customers.forEach(customer => {
                html += '<a target="_blank" href="landing_pages/' + escapeHtml(customer.id) + '.html">';
                html += '<div class="customer-card">';
                html += '<img class="customer-card-photo" src="icons/' + escapeHtml(customer.icon) + '" onerror="this.onerror=null;this.src=\'icons/customer.png\'">';
                html += '<div class="customer-card-name">' + escapeHtml(customer.name) + '</div>';
                const topKpi = topCustomerKpi(customer);
                if (topKpi && topKpi.name) {
                    html += '<div class="kpi-badge">KPI: ' + escapeHtml(topKpi.name) + '</div>';
                }
                html += renderAttribute('care.png', 'Care about', customer.careAbout);
                html += renderAttribute('win.png', 'Wins them', customer.winsThem);
                html += renderAttribute('fear.png', 'Their fear', customer.theirFear);
                html += '</div></a>';
            });
            html += '</div>';
        });

        html += '</div>';
        document.getElementById('customers').innerHTML = html;
    }

    function renderInsights() {
        const lookup = customerLookup();

        if (!insights.items || insights.items.length === 0) {
            document.getElementById('insights').innerHTML = '<div style="padding:16px;color:#6b7280">No customer insights defined for this domain yet.</div>';
            return;
        }

        let html = '<div class="insight-grid">';
        insights.items.forEach(insight => {
            html += '<div class="insight-card">';
            html += '<div class="insight-title">' + escapeHtml(insight.title) + '</div>';
            html += '<div class="insight-summary">' + escapeHtml(insight.summary) + '</div>';
            if (insight.implication) {
                html += '<div style="margin-bottom:12px"><b>Product implication:</b> ' + escapeHtml(insight.implication) + '</div>';
            }
            if (insight.tags && insight.tags.length) {
                html += '<div style="margin-bottom:10px">';
                insight.tags.forEach(tag => {
                    html += '<span class="insight-tag">' + escapeHtml(tag) + '</span>';
                });
                html += '</div>';
            }
            if (insight.linkedCustomers && insight.linkedCustomers.length) {
                html += '<div style="margin-bottom:8px"><b>Connected customers:</b></div>';
                insight.linkedCustomers.forEach(link => {
                    const customer = lookup[link.customerId];
                    html += '<div class="insight-customer-link">';
                    if (customer) {
                        html += '<a target="_blank" href="landing_pages/' + escapeHtml(customer.id) + '.html" style="color:#315b7c;font-weight:bold">' + escapeHtml(customer.name) + '</a>';
                    } else {
                        html += '<span style="font-weight:bold">' + escapeHtml(link.customerId) + '</span>';
                    }
                    if (link.jobIds && link.jobIds.length) {
                        html += '<div class="insight-source"><b>Jobs:</b> ' + escapeHtml(link.jobIds.join(', ')) + '</div>';
                    }
                    if (link.kpis && link.kpis.length) {
                        html += '<div class="insight-source"><b>KPIs:</b> ' + escapeHtml(link.kpis.join(', ')) + '</div>';
                    }
                    html += '</div>';
                });
            }
            if (insight.sources && insight.sources.length) {
                html += '<div><b>Sources:</b></div>';
                insight.sources.forEach(source => {
                    html += '<div class="insight-source">';
                    html += '<a target="_blank" href="' + escapeHtml(source.url) + '" style="color:#315b7c">' + escapeHtml(source.title) + '</a>';
                    html += ' <span style="color:#6b7280">(' + escapeHtml(source.publisher || '') + (source.date ? ', ' + escapeHtml(source.date) : '') + ')</span>';
                    html += '</div>';
                });
            }
            html += '</div>';
        });
        html += '</div>';
        document.getElementById('insights').innerHTML = html;
    }

    update();
    renderInsights();
</script>
</body>
</html>
