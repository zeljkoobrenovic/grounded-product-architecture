<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customers (${domain_name})</title>
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        .section {
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .group {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 5px;
            background-color: #f8f8f8;
        }

        .doc {
            display: inline-block;
            border: 1px solid lightgrey;
            border-radius: 6px;
            margin: 8px 18px 8px 8px;
            padding: 11px;
            background-color: white;
            vertical-align: top;
            width: 300px;
            min-width: 300px;
            max-width: 300px;
        }

        a {
            text-decoration: none;
        }

        .icon {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 26px;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        a {
            color: inherit;
        }

        ::placeholder {
            color: lightgrey;
            opacity: 1;
        }

        :-ms-input-placeholder {
            color: lightgrey;
        }

        ::-ms-input-placeholder {
            color: lightgrey;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
            max-width: 960px;
            line-height: 1.4;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Lato">
    <script>
        function openTab(evt, cityName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(cityName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</head>
<body>
<div class="domain-label">${domain_name}</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link active" href="../customers/index.html">Customers</a>
    <a class="section-link" href="../product-bricks/index.html">Product Bricks</a>
    <a class="section-link" href="../products/index.html">Products</a>
    <a class="section-link" href="../teams/index.html">Teams</a>
    <a class="section-link" href="../objectives/index.html">Objectives</a>
    <a class="section-link" href="../rituals/index.html">Rituals</a>
    <a class="section-link" href="../releases/index.html">Releases</a>
    <a class="section-link" href="../initiatives/index.html">Initiatives</a>
    <a class="section-link" href="../discoveries/index.html">Discoveries</a>
</div>

<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Customers"></td>
            <td class="hero-copy-cell">
                <div class="hero-title">Customers</div>
                <div class="hero-subtitle">${domain_name} | ${domain_description}</div>
            </td>
        </tr>
    </table>
</div>

<div class="tab">
    <button class="tablinks active" id="tab_customers" onclick="openTab('customers')">Customers</button>
</div>
<div>
    <div id="customers" style="display: block" class="tabcontent"></div>
</div>

<script>
    const customers = ${customers};

    function update() {
        let html = '';

        customers.forEach(group => {
            html += '<div class="group" style="text-align: center">';
            html += '<div>' + group.group + '</div>';
            group.customers.forEach(customer => {
                html += '<a target="_blank" href="landing_pages/' + customer.id + '.html">';
                html += '<div class="doc" style="text-align: left">';
                html += '<div style="text-align: center">';
                html += '<img src="icons/' + customer.icon + '" style="height: 190px; border: 1px solid lightgrey; border-radius: 50%; box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;" onerror="this.onerror=null;this.src=\'icons/customer.png\'">';
                html += '</div>';
                html += '<div style="color: blue; margin-bottom: 10px; height: 2em; margin-top: 12px">' + customer.name + '</div>';

                html += '<table>';
                html += '<tr>';
                html += '<td style="width: 24px; vertical-align: middle">';
                html += '<img src="icons/care.png" style="width: 32px">';
                html += '</td>';
                html += '<td style="padding-left: 5px; border-left: 1px dashed darkgreen">';
                html += '<div style="color: darkgreen; font-size: 70%">care about</div>';
                html += '<div style="color: grey; font-size: 80%">';
                customer.careAbout.forEach(item => {
                    html += '<div style="margin-top: 4px; margin-bottom: 4px">';
                    html += item;
                    html += '</div>';
                });
                html += '</div>';
                html += '</td>';
                html += '</tr>';

                html += '<tr>';
                html += '<td style="height: 8px"></td>';
                html += '</tr>';
                html += '<tr>';
                html += '<td style="width: 24px; vertical-align: middle">';
                html += '<img src="icons/win.png" style="width: 32px">';
                html += '</td>';
                html += '<td style="padding-left: 5px; border-left: 1px dashed blue">';

                html += '<div style="color: blue; font-size: 70%">wins them</div>';
                html += '<div style="color: grey; font-size: 80%">';
                customer.winsThem.forEach(item => {
                    html += '<div style="margin-top: 4px; margin-bottom: 4px">';
                    html += item;
                    html += '</div>';
                });
                html += '</div>';
                html += '</td>';
                html += '</tr>';
                html += '<tr>';
                html += '<td style="height: 8px"></td>';
                html += '</tr>';

                html += '<tr>';
                html += '<td style="width: 24px; vertical-align: middle">';
                html += '<img src="icons/fear.png" style="width: 32px">';
                html += '</td>';
                html += '<td style="padding-left: 5px; border-left: 1px dashed crimson">';

                html += '<div style="color: crimson; font-size: 70%">their fear</div>';
                html += '<div style="color: grey; font-size: 80%">';
                customer.theirFear.forEach(item => {
                    html += '<div style="margin-top: 4px; margin-bottom: 4px">';
                    html += item;
                    html += '</div>';
                });
                html += '</div>';
                html += '</td>';
                html += '</tr>';
                html += '</table>';

                html += '</div>';
            });
            html += '</div>';
        });

        document.getElementById('customers').innerHTML = html;
    }

    update();
</script>
</body>
</html>
