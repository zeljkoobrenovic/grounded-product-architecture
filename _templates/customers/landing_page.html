<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>${customer_name}</title>
    ${common_style}
    ${tabs_style}
    ${breadcrumbs_style}
    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
        }

        a {
            text-decoration: none;
        }

        .review-image {
            box-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
            width: 400px;
            margin: 10px;
            padding: 10px
        }

        .review-image-small {
            width: 100%;
        }

        .tab-image {
            width: 24px;
            margin: 2px;
            padding: 2px;
        }

        .tab-image-selected {
            width: 24px;
            margin: 2px;
            padding: 2px;
            border-bottom: 4px solid blue;
        }

        .group {
            margin-top: 2px;
            margin-bottom: 40px;
            padding: 20px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 2px 8px;
            overflow: hidden;
            border: 1px solid lightgrey;
            vertical-align: top;
        }

        .kpi {
            margin-top: -3px;
            margin-bottom: -6px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 2px 8px;
            overflow: hidden;
            border-top: 1px solid black;
            border-bottom: 1px solid black;
            vertical-align: top;
            display: block;
            background-color: #f0f0f0;
        }

        .step {
            margin: 12px;
            padding: 20px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 2px 8px;
            overflow: hidden;
            border: 1px solid lightgrey;
            display: inline-block;
            width: 280px;
            vertical-align: top;
        }

        .outcome {
            margin: 12px;
            padding: 20px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 2px 8px;
            overflow: hidden;
            border: 3px solid blue;
            vertical-align: top;
            font-size: 130%;
            display: inline-block;
        }

        .repo {
            overflow: hidden;
            margin: 10px;
            padding: 7px;
            border-radius: 6px;
            box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px, rgb(209, 213, 219) 0px 0px 0px 1px inset;
        }

        .aws {
            overflow: hidden;
            margin: 10px;
            padding: 7px;
            border-radius: 6px;
            box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px, rgb(209, 213, 219) 0px 0px 0px 1px inset;
        }


        .person {
            text-align: center;
            padding: 6px;
            margin: 4px;
            display: inline-block;
            font-size: 11px;
            width: 110px;
            overflow: hidden;
            white-space: nowrap;
            vertical-align: top;
        }

        .docs {
            text-align: center;
            padding: 6px;
            margin: 4px;
            display: inline-block;
            font-size: 11px;
            width: 110px;
            overflow: hidden;
            vertical-align: top;
        }

        .team {
            text-align: center;
            padding: 6px;
            margin: 8px;
            border-radius: 5px;
            display: inline-block;
            font-size: 13px;
            width: 110px;
            overflow: hidden;
            box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 12px;
            white-space: nowrap;
            vertical-align: top;
            border: 2px solid grey;
            height: 140px;
        }

        .legacy-team {
            text-align: center;
            padding: 6px;
            margin: 8px;
            border-radius: 5px;
            display: inline-block;
            font-size: 13px;
            width: 110px;
            overflow: hidden;
            box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 12px;
            white-space: nowrap;
            vertical-align: top;
            border: 2px dashed grey;
            height: 140px;
        }

        .number {
            display: inline-block;
            box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px, rgb(209, 213, 219) 0px 0px 0px 1px inset;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
            margin: 8px;
            width: 100px;
        }

        .dependency-icon {
            height: 32px;
            margin-left: 8px;
            margin-right: 8px;
            box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px, rgb(209, 213, 219) 0px 0px 0px 1px inset;
            padding: 4px;
            border-radius: 5px;
        }

        .kpi-title {
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .kpi-icon {
            height: 50px;
            padding: 0;
        }

        .triangle {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 40px 0px 40px 80px;
            border-color: transparent transparent transparent black;
            transform: rotate(0deg);
        }

        .activity-summary {
            margin: 14px 0;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        .activity-stat {
            display: inline-block;
            margin-right: 18px;
            min-width: 110px;
        }

        .activity-stat-value {
            font-size: 30px;
            color: #1d4ed8;
        }

        .activity-stat-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .activity-table {
            width: 100%;
            border-collapse: collapse;
        }

        .activity-table th,
        .activity-table td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: top;
            text-align: left;
        }

        .activity-table th {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .activity-link {
            color: #1d4ed8;
            font-weight: bold;
        }

        .activity-muted {
            color: #6b7280;
            font-size: 12px;
        }

        .activity-block {
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 3px solid #d7dce1;
        }

        .activity-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 7px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
        }

        .activity-pill-highlight {
            background-color: #dbeafe;
            border: 1px solid #60a5fa;
        }

        .activity-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #d7dce1;
            background-color: white;
        }

        .activity-icon-round {
            border-radius: 50%;
            object-fit: cover;
        }

        .jobs-view-toggle {
            display: inline-flex;
            gap: 8px;
            margin: 0 0 18px 24px;
            padding: 6px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
        }

        .jobs-view-button {
            border: none;
            border-radius: 999px;
            padding: 10px 16px;
            background-color: transparent;
            color: #475569;
            cursor: pointer;
            font-size: 14px;
        }

        .jobs-view-button-active {
            background-color: #2563eb;
            color: white;
        }

        .job-summary-table {
            margin: 24px;
            font-size: 120%;
        }

        .job-detail-group {
            text-align: center;
            background-color: #f0f0f0;
        }

        .job-detail-hero {
            width: 300px;
            height: 200px;
            object-fit: contain;
            margin-top: 12px;
            margin-bottom: 12px;
            box-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
        }

        .job-step-image {
            max-width: 240px;
            margin-top: 12px;
            margin-bottom: 12px;
            box-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
        }

        .comic-job {
            margin: 20px 24px 36px 24px;
            padding: 24px;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            background-color: #f8fafc;
            box-shadow: rgba(0, 0, 0, 0.08) 0px 8px 24px;
        }

        .comic-job-title {
            color: #2563eb;
            font-size: 220%;
            margin-bottom: 16px;
            text-align: center;
        }

        .comic-job-media {
            text-align: center;
            margin-bottom: 20px;
        }

        .comic-job-media img {
            width: min(100%, 900px);
            max-height: 70vh;
            object-fit: contain;
            border-radius: 12px;
            background: white;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 8px 28px;
        }

        .comic-steps {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .comic-step {
            width: 500px;
            max-width: 100%;
            padding: 18px;
            border: 1px solid #d7dce1;
            border-radius: 14px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0px 6px 18px;
        }

        .comic-step-title {
            color: #2563eb;
            font-size: 135%;
            margin-bottom: 12px;
            text-align: center;
        }

        .comic-step-media {
            text-align: center;
        }

        .comic-step-media img {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            border-radius: 10px;
            background: #f8fafc;
            box-shadow: rgba(0, 0, 0, 0.12) 0px 4px 14px;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body onload="initTab('HomeTab')" onhashchange="initTab('HomeTab')">
<div id="breadcrumbs" style="margin-left: 18px"></div>
${tabs_script}

<script>
    const config = ${config};
    const all_customers = ${all_customers};
    const customer = ${customer};
    const customerInsights = ${customer_insights};
    const discoveries = ${discoveries};
    const initiatives = ${initiatives};
    const releases = ${releases};
</script>
<div id="Navigation"></div>
<div style="margin: 20px">
    <div id="Header"></div>

    <div style="margin: 0; margin-top: 12px">
        <div class="tab">
            <button class="tablinks active" id="tab_HomeTab" onclick="openTab('HomeTab')">Home</button>
            <button class="tablinks" id="tab_JobsTab" onclick="openTab('JobsTab')">Jobs To Be Done</button>
            <button class="tablinks" id="tab_JourneysTab" onclick="openTab('JourneysTab')">Journeys</button>
            <button class="tablinks" id="tab_KPITab" onclick="openTab('KPITab')">KPIs</button>
            <button class="tablinks" id="tab_RoadmapTab" onclick="openTab('RoadmapTab')">Product Vision</button>
            <button class="tablinks" id="tab_InsightsTab" onclick="openTab('InsightsTab')">Insights</button>
        </div>

        <div id="tab_content_HomeTab" class="tabcontent" style="padding: 10px">
            <div id="Home"></div>
        </div>
        <div id="tab_content_JobsTab" class="tabcontent" style="padding: 10px;">
            <div id="Jobs"></div>
        </div>
        <div id="tab_content_JourneysTab" class="tabcontent" style="padding: 10px;">
            <div id="Journeys"></div>
        </div>
        <div id="tab_content_KPITab" class="tabcontent" style="padding: 10px;">
            <div id="KPI"></div>
        </div>
        <div id="tab_content_RoadmapTab" class="tabcontent" style="padding: 10px;">
            <div id="Roadmap"></div>
        </div>
        <div id="tab_content_InsightsTab" class="tabcontent" style="padding: 10px;">
            <div id="Insights"></div>
        </div>
    </div>
</div>

<script>
    function addNavigation() {
        let html = '';
        html += '<div style="margin: 4px 20px 10px 20px; font-size: 85%; color: black">';
        let prev_domain = all_customers[0].domain;
        all_customers.forEach(per => {
            if (prev_domain.toLowerCase() !== per.domain.toLowerCase()) {
                prev_domain = per.domain;
                html += '<div style="margin-top: 5px; margin-left: 4px; vertical-align: top; display: inline-block; border-left: 2px solid lightgrey; height: 30px;">&nbsp;</div>';
            }
            html += '<a href="' + per.id + '.html">';
            const tabClass = per.id === customer.id ? 'tab-image-selected' : 'tab-image';
            html += '<img src="../icons/' + per.icon + '" style="" class="' + tabClass + '" onerror="this.onerror=null;this.src=\'../icons/customer.png\'">';
            html += '</a>';
        });
        html += '</div>';

        document.getElementById('Navigation').innerHTML = html;
    }

    addNavigation();

    function addHeader() {
        let html = '';

        html += '<table>';
        html += '<tr>';
        html += '<td>';
        html += '<div>';
        html += '<img src="../icons/' + customer.icon + '" style="width: 110px" onerror="this.onerror=null;this.src=\'../icons/customer.png\'">';
        html += '</div>';
        html += '</td>';
        html += '<td style="vertical-align: top">';
        html += '<div style="margin-left: 20px; font-size: 90%; color: grey; vertical-align: top">';
        html += '<div class="page-type-badge" style="">Customer</div>';
        html += '</div>';
        html += '<div style="font-size: 50px; margin-left: 20px">';
        html += customer.name;
        html += '</div>';
        html += '<div style="font-size: 16px; margin-left: 20px; color: grey; margin-top: 3px">';
        html += customer.description ? customer.description : '';
        html += '</div>';
        html += '</td>';
        html += '</tr>';
        html += '</table>';

        document.getElementById('Header').innerHTML = html;
    }

    function addHome() {
        let html = '';

        html += '<div class="doc" style="text-align: center; margin-bottom: 22px; margin-left: 24px">';
        html += '<table>';
        html += '<tr>';
        html += '<td style="width: 48px; vertical-align: top">';
        html += '<img src="../icons/care.png" style="height: 64px; margin: 8px">';
        html += '<div style="color: darkgreen; font-size: 90%">care about</div>';
        html += '<div style="color: black; font-size: 100%; width: 240px">';
        customer.careAbout.forEach(item => {
            html += '<div style="background-color: rgba(0, 100, 0, 0.1); margin-top: 4px; margin-bottom: 4px; padding: 6px; border: 1px solid lightgrey; border-radius: 7px">';
            html += item;
            html += '</div>';
        });
        html += '</div>';
        html += '</td>';

        html += '<td style="width: 22px"></td>';

        html += '<td style="width: 24px; vertical-align: top">';
        html += '<img src="../icons/win.png" style="height: 64px; margin: 8px">';

        html += '<div style="color: blue; font-size: 90%">wins them</div>';
        html += '<div style="color: black; font-size: 100%; width: 240px">';
        customer.winsThem.forEach(item => {
            html += '<div style="background-color: rgba(0, 0, 100, 0.1); margin-top: 4px; margin-bottom: 4px; padding: 6px; border: 1px solid lightgrey; border-radius: 7px">';
            html += item;
            html += '</div>';
        });
        html += '</div>';
        html += '</td>';
        html += '<td style="width: 22px"></td>';
        html += '<td style="width: 24px; vertical-align: top">';
        html += '<img src="../icons/fear.png" style="height: 64px; margin: 8px">';

        html += '<div style="color: crimson; font-size: 90%">their fear</div>';
        html += '<div style="color: black; font-size: 100%; width: 240px">';
        customer.theirFear.forEach(item => {
            html += '<div style="background-color: rgba(100, 0, 0, 0.1); margin-top: 4px; margin-bottom: 4px; padding: 6px; border: 1px solid lightgrey; border-radius: 7px">';
            html += item;
            html += '</div>';
        });
        html += '</div>';
        html += '</td>';
        html += '</tr>';
        html += '</table>';

        html += '</div>';

        html += '<hr>';

        html += '<table style="margin: 24px; font-size: 120%">';
        html += '<tr style="font-size: 80%; color: grey">';
        html += '<td>Job</td>';
        html += '<td></td>';
        html += '<td>Outcome</td>';
        html += '</tr>';

        customer.jobsToBeDone.forEach(job => {
            html += '<tr>';
            html += '<td>';
            html += '<div style="text-align: left">';
            html += '<div style="font-size: 100%; color: blue;">' + job.name + '</div>';
            html += '</div>';
            html += '<ul style="font-size: 70%">';
            job.steps.forEach(step => {
                html += '<li>';
                html += step.step;
                html += '</li>';
            });
            html += '</ul>';
            html += '</td>';
            html += '<td style="width: 20px; vertical-align: top">';
            html += '<div style=""><img src="../icons/right.png" style="width: 20px; margin-left: 20px; margin-right: 20px"></div>';
            html += '</td>';
            html += '<td style="vertical-align: top">';
            html += '<div style="">' + job.outcome + '</div>';
            html += '<div style="font-size: 80%; color: grey; margin-top: 8px;">(' + job.what_it_is + ')</div>';
            html += '</td>';
            html += '</tr>';
        });
        html += '</table>';

        document.getElementById('Home').innerHTML = html;
    }

    function addInsights() {
        let html = '';

        html += '<div style="margin: 24px">';

        if (!customerInsights || customerInsights.length === 0) {
            html += '<div class="group">No customer-linked insights defined for this domain yet.</div>';
        } else {
            customerInsights.forEach(insight => {
                html += '<div class="group" style="width: 250px; display: inline-block; margin: 8px; padding: 16px; background: white">';
                html += '<div style="font-size: 150%; color: #1d4ed8; margin-bottom: 8px">' + escapeHtml(insight.title) + '</div>';
                html += '<div style="margin-bottom: 10px">' + escapeHtml(insight.summary) + '</div>';
                if (insight.implication) {
                    html += '<div style="margin-bottom: 10px"><b>Product implication:</b> ' + escapeHtml(insight.implication) + '</div>';
                }
                if (insight.link) {
                    if (insight.link.jobIds && insight.link.jobIds.length) {
                        html += '<div style="font-size: 13px; color: #4b5563; margin-bottom: 4px"><b>Jobs:</b> ' + escapeHtml(insight.link.jobIds.join(', ')) + '</div>';
                    }
                    if (insight.link.kpis && insight.link.kpis.length) {
                        html += '<div style="font-size: 13px; color: #4b5563; margin-bottom: 4px"><b>KPIs:</b> ' + escapeHtml(insight.link.kpis.join(', ')) + '</div>';
                    }
                }
                if (insight.tags && insight.tags.length) {
                    html += '<div style="margin-top: 8px; margin-bottom: 10px">';
                    insight.tags.forEach(tag => {
                        html += '<span style="display:inline-block; margin:0 8px 6px 0; padding:4px 10px; border-radius:999px; background:#eef2f6; font-size:12px">' + escapeHtml(tag) + '</span>';
                    });
                    html += '</div>';
                }
                if (insight.sources && insight.sources.length) {
                    html += '<div style="margin-top: 8px">';
                    html += '<div style="font-size: 13px; color: #6b7280; margin-bottom: 4px">Sources</div>';
                    insight.sources.forEach(source => {
                        html += '<div style="font-size: 13px; margin-bottom: 4px">';
                        html += '<a class="activity-link" target="_blank" href="' + escapeHtml(source.url) + '">' + escapeHtml(source.title) + '</a>';
                        html += '<span class="activity-muted"> (' + escapeHtml(source.publisher || '') + (source.date ? ', ' + escapeHtml(source.date) : '') + ')</span>';
                        html += '</div>';
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
        }
        html += '</div>';

        document.getElementById('Insights').innerHTML = html;
    }

    function addJBTD() {
        let html = '';

        html += '<div class="jobs-view-toggle">';
        html += '<button id="jobs-view-default" class="jobs-view-button jobs-view-button-active" onclick="setJobsView(\'default\')">Default View</button>';
        html += '<button id="jobs-view-comic" class="jobs-view-button" onclick="setJobsView(\'comic\')">Comic View</button>';
        html += '</div>';

        html += '<div id="jobs-default-view">';
        html += '<table class="job-summary-table">';
        html += '<tr style="font-size: 80%; color: grey">';
        html += '<td>Job</td>';
        html += '<td></td>';
        html += '<td>Outcome</td>';
        html += '</tr>';

        customer.jobsToBeDone.forEach(job => {
            html += '<tr>';
            html += '<td>';
            html += '<div style="text-align: left">';
            html += '<div style="font-size: 100%; color: blue;">' + job.name + '</div>';
            html += '</div>';
            html += '<ul style="font-size: 70%">';
            job.steps.forEach(step => {
                html += '<li>';
                html += step.step;
                html += '</li>';
            });
            html += '</ul>';
            html += '</td>';
            html += '<td style="width: 20px">';
            html += '</td>';
            html += '<td style="vertical-align: top">';
            html += '<div style="">' + job.outcome + '</div>';
            html += '<div style="font-size: 80%; color: grey; margin-top: 8px;">(' + job.what_it_is + ')</div>';
            html += '</td>';
            html += '</tr>';
        });
        html += '</table>';

        html += '<div style="height: 50px"></div>';

        customer.jobsToBeDone.forEach(job => {
            html += '<div class="group job-detail-group">';
            if (job.media) {
                html += '<div style="margin-top: 10px">';
                job.media.forEach(item => {
                    html += '<div style="display: inline-block">';
                    const src = '../' + item.src;
                    html += '<a target="_blank" href="' + src + '">';
                    html += '<img src="' + src + '" class="job-detail-hero">';
                    html += '</a>';
                    html += '</div>';
                });
                html += '</div>';
            }
            html += '<div style="font-size: 210%; color: blue; margin-bottom: 12px">' + job.name + '</div>';
            html += '<div style="">' + job.what_it_is + '</div>';
            html += '<div style="text-align: center; margin-top: 24px; background-color: white" class="group">';
            html += '<div  class="outcome">';
            html += '<div style="">' + job.outcome + '</div>';
            html += '</div>';
            html += '<div style=""><img src="../icons/up.png" style="width: 60px"></div>';
            job.steps.forEach(step => {
                html += '<div style="" class="step">';
                html += '<div style="color: blue; font-size: 140%; margin-bottom: 20px">' + step.step + '</div>';
                html += '<div style="">' + step.description + '</div>';
                html += '<div style="margin-top: 14px">';
                html += '<table>';
                step.capabilitiesNeeded.forEach(cap => {
                    html += '<tr>';
                    html += '<td style=" text-align: left; padding: 0;">';
                    html += '<div style="margin: 6px; border: 1px dashed lightgrey; padding: 6px; ">';
                    html += '<div style="color: blue; font-size: 80%; white-space: nowrap; overflow: hidden; ">';
                    html += cap.name;
                    html += '</div>';
                    html += '<div style="font-size: 70%;">';
                    html += cap.how_it_supports;
                    html += '</div>';
                    html += '</div>';
                    html += '</td>';
                    html += '</tr>';
                });
                html += '</table>';
                html += '</div>';
                if (step.media) {
                    html += '<div style="margin-top: 10px">';
                    step.media.forEach(item => {
                        html += '<div style="display: inline-block">';
                        const src = '../' + item.src;
                        html += '<a target="_blank" href="' + src + '">';
                        html += '<img src="' + src + '" class="job-step-image">';
                        html += '</a>';
                        html += '</div>';
                    });
                    html += '</div>';
                }

    function kpiCurrentValue(node) {

        html += '<tr>';

    function normalizeRoadmapKpi(value, supportingKey) {
        if (!value) {
            return {northStar: '', [supportingKey]: []};
        }
        if (typeof value === 'string') {
            return {northStar: value, [supportingKey]: []};
        }
        const normalized = Object.assign({}, value);
        normalized.northStar = normalized.northStar || normalized.name || '';
        normalized[supportingKey] = normalized[supportingKey] || [];
        return normalized;
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function renderKpis(items) {
        let html = '';
        items.forEach(item => {
            html += '<div><b>' + escapeHtml(item.kpi) + '</b>';
            if (item.unit) {
                html += ' <span class="activity-muted">(' + escapeHtml(item.unit) + ')</span>';
            }
            if (item.expectedImpact) {
                html += ': ' + escapeHtml(item.expectedImpact);
            }
            if (item.currentValue) {
                html += '<div class="activity-muted"><b>Current:</b> ' + escapeHtml(String(item.currentValue)) + '</div>';
            }
            if (item.description) {
                html += '<div class="activity-muted">' + escapeHtml(item.description) + '</div>';
            }
            if (item.link) {
                html += '<div class="activity-muted"><a target="_blank" rel="noopener noreferrer" href="' + escapeHtml(item.link) + '">' + escapeHtml(item.linkLabel || 'Open link') + '</a></div>';
            }
            html += '</div>';
        });
        return html;
    }

    function renderImpactCell(item, currentCustomerId) {
        let html = '';
        (item.customerImpact || []).forEach(impact => {
            const isCurrent = impact.customerId === currentCustomerId;
            html += '<div class="activity-block' + (isCurrent ? ' activity-pill-highlight' : '') + '">';
            html += '<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">';
            html += '<img class="activity-icon activity-icon-round" src="../icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../icons/customer.png\'">';
            html += '<div><div style="font-weight:bold; color:' + (isCurrent ? '#1d4ed8' : '#111827') + '">' + escapeHtml(impact.customer.name) + ' <span class="activity-muted">(' + escapeHtml(impact.customerId) + ')</span></div></div>';
            html += '</div>';
            html += renderKpis(impact.customerKPIs || []);
            html += renderKpis(impact.businessKPIs || []);
            html += '</div>';
        });
        return html || '<span class="activity-muted">No customer impact listed</span>';
    }

    function renderBrickCell(item) {
        let html = '';
        (item.productBricks || []).forEach(brick => {
            html += '<div class="activity-pill">';
            html += '<img class="activity-icon" src="../../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../../product-bricks/icons/logo.png\'">';
            html += '<div><div><b>' + escapeHtml(brick.brick.name) + '</b> <span class="activity-muted">(#' + escapeHtml(brick.brickId) + ')</span></div><div class="activity-muted">' + escapeHtml(brick.change) + '</div></div>';
            html += '</div>';
        });
        return html || '<span class="activity-muted">No product bricks listed</span>';

    function renderChannelCell(item) {

        });
        return html || '<span class="activity-muted">No delivery channels listed</span>';
    }

    function renderActivityTable(data, kind, currentCustomerId) {
        const items = (data && data.items) ? data.items : [];
        let html = '';
        html += '<div class="activity-summary">';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.length + '</div><div class="activity-stat-label">' + kind + '</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.customerImpact || []).length > 0).length + '</div><div class="activity-stat-label">With customer impact</div></div>';
        html += '<div class="activity-stat"><div class="activity-stat-value">' + items.filter(item => (item.productBricks || []).length > 0).length + '</div><div class="activity-stat-label">With bricks</div></div>';
        html += '</div>';

        if (!items.length) {
            html += '<div class="group" style="margin-top:0">No related ' + kind.toLowerCase() + ' found for this customer.</div>';
            return html;
        }

        html += '<table class="activity-table">';
        html += '<tr><th>Date</th><th>Description</th><th>Customer Impact</th><th>Product Bricks</th><th>Delivery Channels</th></tr>';
        items.forEach(item => {
            html += '<tr>';
            html += '<td style="white-space:nowrap">' + escapeHtml(formatDate(item.date)) + '</td>';
            html += '<td><a class="activity-link" target="_blank" rel="noopener noreferrer" href="../../' + kind.toLowerCase() + '/landing_pages/' + item.landingPageIndex + '.html">' + escapeHtml(item.description || item.name || kind) + '</a></td>';
            html += '<td>' + renderImpactCell(item, currentCustomerId) + '</td>';
            html += '<td>' + renderBrickCell(item) + '</td>';
            html += '<td>' + renderChannelCell(item) + '</td>';
            html += '</tr>';
        });
        html += '</table>';
        return html;
    }

    addHome();

    addJourneys();
    addKPIs();
    addProductVision();
    addInsights();
