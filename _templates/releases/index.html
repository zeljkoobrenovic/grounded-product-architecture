<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Releases (${domain_name})</title>

    <style>
        body {
            font-family: Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin: 28px;
            color: #202124;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .section-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .domain-label {
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }

        .section-link {
            display: inline-block;
            padding: 8px 14px;
            color: #4b5563;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            background-color: #f8fafc;
            transition: 0.3s;
        }

        .section-link:hover {
            background-color: #eef2f7;
            border-color: #9ca3af;
        }

        .section-link.active {
            background-color: #202124;
            border-color: #202124;
            color: white;
        }

        .hero {
            margin-bottom: 14px;
        }

        .hero-table {
            border-collapse: collapse;
            width: auto;
        }

        .hero-logo {
            width: 108px;
            height: 108px;
            margin-right: 12px;
        }

        .hero-logo-cell {
            border: none;
            vertical-align: top;
            padding-top: 12px;
            padding-right: 12px;
        }

        .hero-copy-cell {
            vertical-align: top;
            border: none;
        }

        .hero-title {
            font-size: 64px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 14px;
            max-width: 960px;
            line-height: 1.4;
        }

        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 14px;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tabcontent {
            display: none;
            padding: 18px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            padding: 16px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.08) 0 1px 3px;
        }

        .card-header {
            margin-bottom: 12px;
        }

        .card-type {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 4px 8px;
            margin-right: 8px;
            background-color: #eaf1f7;
            color: #315b7c;
        }

        .card-date {
            color: #6b7280;
            font-size: 13px;
        }

        .card-description {
            font-size: 18px;
            line-height: 1.45;
            margin-bottom: 8px;
        }

        .card-copy {
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .section {
            margin-top: 14px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .impact-block {
            border-left: 3px solid #d7dce1;
            padding-left: 10px;
            margin-bottom: 10px;
        }

        .impact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .impact-id {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .impact-line {
            margin-bottom: 4px;
            font-size: 14px;
            line-height: 1.4;
        }

        .impact-line b {
            color: #374151;
        }

        .linked-icon {
            width: 26px;
            height: 26px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d7dce1;
            background-color: white;
            flex: 0 0 auto;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px 8px 0;
            padding: 6px 10px;
            border-radius: 999px;
            background-color: #eef2f6;
            font-size: 12px;
            max-width: 100%;
        }

        .pill-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 4px;
            background-color: white;
            border: 1px solid #d7dce1;
            flex: 0 0 auto;
        }

        .pill-name {
            font-weight: bold;
        }

        .pill-meta {
            color: #6b7280;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
        }

        th {
            background-color: #f0f0f0;
            text-align: left;
            padding: 10px;
            border: 1px solid #ddd;
            white-space: nowrap;
        }

        td {
            border: 1px solid #ddd;
            padding: 10px;
            vertical-align: top;
        }

        tr:nth-child(even) td {
            background-color: #fafafa;
        }

        .mini-list {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 16px;
        }

        .overview-card {
            border: 1px solid lightgrey;
            border-radius: 8px;
            background-color: #f8f8f8;
            padding: 14px;
            min-height: 180px;
        }

        .overview-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .overview-banner {
            border: 1px solid #c8d8e8;
            background: linear-gradient(135deg, #f6fbff, #f3f3f3);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .overview-banner-number {
            font-size: 62px;
            line-height: 1;
            color: #315b7c;
        }

        .overview-banner-text {
            color: #6b7280;
            margin-top: 4px;
        }

        .entity {
            display: inline-block;
            width: calc(50% - 12px);
            margin: 0 10px 10px 0;
            padding: 8px;
            border-radius: 6px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.05) 0 1px 2px;
            vertical-align: top;
        }

        .entity-wide {
            display: block;
            margin: 0 0 10px 0;
            padding: 8px;
            border-radius: 6px;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.05) 0 1px 2px;
        }

        .entity-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .entity-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #ddd;
            background-color: white;
        }

        .entity-name {
            font-weight: bold;
            line-height: 1.3;
        }

        .entity-meta {
            color: #6b7280;
            font-size: 12px;
        }

        .empty {
            color: #6b7280;
            border: 1px dashed #d7dce1;
            border-radius: 8px;
            padding: 18px;
            background-color: #fafafa;
        }

        .open-link {
            display: inline-block;
            margin-top: 12px;
            color: #315b7c;
            font-size: 14px;
        }

        @media (max-width: 1000px) {
            .overview-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            body {
                margin: 12px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .entity {
                width: 100%;
                margin-right: 0;
            }

            .tab button {
                width: 100%;
                text-align: left;
            }
        }
    </style>
    <link rel="stylesheet" target="_blank" href="https://fonts.googleapis.com/css?family=Ubuntu">
    <script>
        function initTab() {
            let tabName = 'Table';
            if (window.location.hash) {
                const hash = window.location.hash.substring(1);
                if (document.getElementById('tab_' + hash)) {
                    tabName = hash;
                }
            }
            openTab(tabName);
        }

        function openTab(tabName) {
            const tabcontent = document.getElementsByClassName('tabcontent');
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = 'none';
            }
            const tablinks = document.getElementsByClassName('tablinks');
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(' active', '');
            }
            history.pushState({}, '', '#' + tabName);
            document.getElementById(tabName).style.display = 'block';
            document.getElementById('tab_' + tabName).className += ' active';
        }
    </script>
</head>
<body onload="initTab()" onhashchange="initTab()">
<div class="domain-label">${domain_name}</div>
<div class="section-nav">
    <a class="section-link" href="../start/index.html">Home</a>
    <a class="section-link" href="../customers/index.html">Customers</a>
    <a class="section-link" href="../product-bricks/index.html">Product Bricks</a>
    <a class="section-link" href="../products/index.html">Products</a>
    <a class="section-link" href="../teams/index.html">Teams</a>
    <a class="section-link" href="../objectives/index.html">Objectives</a>
    <a class="section-link active" href="../releases/index.html">Releases</a>
    <a class="section-link" href="../initiatives/index.html">Initiatives</a>
    <a class="section-link" href="../discoveries/index.html">Discoveries</a>
</div>

<div class="hero">
    <table class="hero-table">
        <tr>
            <td class="hero-logo-cell"><img class="hero-logo" src="icons/logo.png" alt="Releases"></td>
            <td class="hero-copy-cell">
                <div class="hero-title">Releases</div>
                <div class="hero-subtitle">${domain_name} | ${domain_description}</div>
            </td>
        </tr>
    </table>
</div>

<div class="tab">
    <button class="tablinks" id="tab_Table" onclick="openTab('Table')">Table</button>
    <button class="tablinks" id="tab_Cards" onclick="openTab('Cards')">Cards</button>
    <button class="tablinks" id="tab_Overview" onclick="openTab('Overview')">Overview</button>
</div>

<div id="Table" class="tabcontent"></div>
<div id="Cards" class="tabcontent"></div>
<div id="Overview" class="tabcontent"></div>

<script>
    const releases = ${releases};
    const items = (releases && releases.items) ? releases.items.slice().sort((a, b) => (b.date || '').localeCompare(a.date || '')) : [];

    function formatDate(dateValue) {
        if (!dateValue) return 'No date';
        const date = new Date(dateValue + 'T00:00:00');
        if (isNaN(date.getTime())) return dateValue;
        return date.toLocaleDateString('en-GB', {year: 'numeric', month: 'short', day: 'numeric'});
    }

    function escapeHtml(value) {
        return (value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderImpactLines(lines) {
        let html = '';
        lines.forEach(line => {
            html += '<div class="impact-line"><b>' + escapeHtml(line.kpi) + '</b>';
            if (line.unit) {
                html += ' <span style="color:#6b7280">(' + escapeHtml(line.unit) + ')</span>';
            }
            html += ': ' + escapeHtml(line.expectedImpact);
            if (line.description) {
                html += '<div style="color:#6b7280; font-size:12px; margin-top:2px">' + escapeHtml(line.description) + '</div>';
            }
            html += '</div>';
        });
        return html;
    }

    function uniqueMap(items, keyFn, valueFn) {
        const map = {};
        items.forEach(item => {
            const key = keyFn(item);
            if (!map[key]) {
                map[key] = valueFn(item);
            }
        });
        return Object.values(map);
    }

    function collectCounts(getItems) {
        const counts = {};
        items.forEach(item => {
            getItems(item).forEach(entity => {
                const key = entity.key;
                if (!counts[key]) {
                    counts[key] = {
                        name: entity.name,
                        icon: entity.icon,
                        meta: entity.meta,
                        count: 0
                    };
                }
                counts[key].count += 1;
            });
        });
        return Object.values(counts).sort((a, b) => b.count - a.count).slice(0, 10);
    }

    function updateTabLabels() {
        const count = items.length;
        document.getElementById('tab_Table').textContent = 'Table (' + count + ')';
        document.getElementById('tab_Cards').textContent = 'Cards (' + count + ')';
        document.getElementById('tab_Overview').textContent = 'Overview (' + count + ')';
    }

    function renderCard(item, index) {
        let html = '';
        html += '<div class="card">';
        html += '<div class="card-header"><span class="card-type">Release</span><span class="card-date">' + formatDate(item.date) + '</span></div>';
        html += '<div class="card-description">' + escapeHtml(item.title || item.description || 'Release') + '</div>';
        if (item.description) {
            html += '<div class="card-copy">' + escapeHtml(item.description) + '</div>';
        }

        if (item.customerImpact && item.customerImpact.length) {
            html += '<div class="section"><div class="section-title">Customer Impact</div>';
            item.customerImpact.forEach(impact => {
                html += '<div class="impact-block">';
                html += '<div class="impact-header"><img class="linked-icon" src="../customers/icons/' + escapeHtml(impact.customer.icon) + '" onerror="this.onerror=null;this.src=\'../customers/icons/customer.png\'"><div class="impact-id">' + escapeHtml(impact.customer.name) + ' <span class="pill-meta">(' + escapeHtml(impact.customerId) + ')</span></div></div>';
                html += renderImpactLines(impact.customerKPIs || []);
                html += renderImpactLines(impact.businessKPIs || []);
                html += '</div>';
            });
            html += '</div>';
        }

        if (item.productBricks && item.productBricks.length) {
            html += '<div class="section"><div class="section-title">Product Bricks</div>';
            item.productBricks.forEach(brick => {
                html += '<div class="pill"><img class="pill-icon" src="../product-bricks/icons/' + escapeHtml(brick.brick.icon) + '" onerror="this.onerror=null;this.src=\'../product-bricks/icons/logo.png\'"><div><div class="pill-name">' + escapeHtml(brick.brick.name) + ' <span class="pill-meta">(#' + escapeHtml(brick.brickId) + ')</span></div><div>' + escapeHtml(brick.change) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (item.deliveryChannels && item.deliveryChannels.length) {
            html += '<div class="section"><div class="section-title">Delivery Channels</div>';
            item.deliveryChannels.forEach(channel => {
                html += '<div class="pill"><img class="pill-icon" src="../products/icons/' + escapeHtml(channel.channel.icon) + '" onerror="this.onerror=null;this.src=\'../products/icons/product.png\'"><div><div class="pill-name">' + escapeHtml(channel.channel.name) + ' <span class="pill-meta">(' + escapeHtml(channel.channelId) + ')</span></div><div>' + escapeHtml(channel.change) + '</div></div></div>';
            });
            html += '</div>';
        }

        if (item.initiativeId) {
            html += '<div class="section"><div class="section-title">Linked Initiative</div>';
            html += '<div class="pill"><div><div class="pill-name">' + escapeHtml(item.initiativeId) + '</div></div></div>';
            html += '</div>';
        }

        const detailUrl = item.objectiveLandingPageUrl || ('landing_pages/' + index + '.html');
        html += '<a class="open-link" target="_blank" href="' + escapeHtml(detailUrl) + '">Open details...</a>';
        html += '</div>';
        return html;
    }

    function renderCardsTab() {
        if (!items.length) {
            document.getElementById('Cards').innerHTML = '<div class="empty">No releases available.</div>';
            return;
        }
        let html = '<div class="grid">';
        items.forEach((item, index) => html += renderCard(item, index));
        html += '</div>';
        document.getElementById('Cards').innerHTML = html;
    }

    function renderTableTab() {
        if (!items.length) {
            document.getElementById('Table').innerHTML = '<div class="empty">No releases available.</div>';
            return;
        }
        let html = '<div class="table-wrap"><table>';
        html += '<tr><th>Date</th><th>Release</th><th>Customers & KPIs</th><th>Products & Channels</th><th>Product Bricks</th><th>Details</th></tr>';
        items.forEach((item, index) => {
            html += '<tr>';
            html += '<td style="white-space:nowrap">' + escapeHtml(formatDate(item.date)) + '</td>';
            html += '<td style="min-width:300px"><b>' + escapeHtml(item.title || item.description || 'Release') + '</b>';
            if (item.description) {
                html += '<div class="pill-meta" style="margin-top:6px">' + escapeHtml(item.description) + '</div>';
            }
            html += '</td>';
            html += '<td style="min-width:280px">';
            (item.customerImpact || []).forEach(impact => {
                html += '<div class="mini-list"><b>' + escapeHtml(impact.customer.name) + '</b><br>';
                const names = []
                    .concat((impact.customerKPIs || []).map(kpi => kpi.kpi))
                    .concat((impact.businessKPIs || []).map(kpi => kpi.kpi));
                html += '<span class="pill-meta">' + escapeHtml(names.slice(0, 4).join(' | ')) + '</span></div>';
            });
            html += '</td>';
            html += '<td style="min-width:220px">';
            (item.deliveryChannels || []).forEach(channel => {
                html += '<div class="mini-list"><b>' + escapeHtml(channel.channel.productName || channel.channel.name) + '</b><br><span class="pill-meta">' + escapeHtml(channel.channel.name) + '</span></div>';
            });
            html += '</td>';
            html += '<td style="min-width:240px">';
            (item.productBricks || []).forEach(brick => {
                html += '<div class="mini-list"><b>' + escapeHtml(brick.brick.name) + '</b><br><span class="pill-meta">' + escapeHtml(brick.change) + '</span></div>';
            });
            html += '</td>';
            const detailUrl = item.objectiveLandingPageUrl || ('landing_pages/' + index + '.html');
            html += '<td><a target="_blank" href="' + escapeHtml(detailUrl) + '">Open</a></td>';
            html += '</tr>';
        });
        html += '</table></div>';
        document.getElementById('Table').innerHTML = html;
    }

    function renderEntities(title, entities, wide) {
        let html = '<div class="overview-card"><h3>' + title + '</h3>';
        entities.forEach(entity => {
            html += '<div class="' + (wide ? 'entity-wide' : 'entity') + '">';
            html += '<div class="entity-header"><img class="entity-icon" src="' + escapeHtml(entity.iconPath || '../customers/icons/customer.png') + '" onerror="this.onerror=null;this.src=\'../customers/icons/customer.png\'"><div><div class="entity-name">' + escapeHtml(entity.name) + '</div><div class="entity-meta">' + escapeHtml(entity.meta || '') + '</div></div></div>';
            html += '<div class="entity-meta">' + entity.count + ' releases</div>';
            html += '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderOverviewTab() {
        if (!items.length) {
            document.getElementById('Overview').innerHTML = '<div class="empty">No releases available.</div>';
            return;
        }

        const products = collectCounts(item => (item.deliveryChannels || []).map(channel => ({
            key: (channel.channel.productId || '') + '|' + (channel.channel.productName || channel.channel.name),
            name: channel.channel.productName || channel.channel.name,
            iconPath: '../products/icons/' + (channel.channel.icon || 'product.png'),
            meta: channel.channel.name
        })));

        const bricks = collectCounts(item => (item.productBricks || []).map(brick => ({
            key: brick.brickId,
            name: brick.brick.name,
            iconPath: '../product-bricks/icons/' + (brick.brick.icon || 'logo.png'),
            meta: brick.brick.domain
        })));

        const customers = collectCounts(item => (item.customerImpact || []).map(impact => ({
            key: impact.customerId,
            name: impact.customer.name,
            iconPath: '../customers/icons/' + (impact.customer.icon || 'customer.png'),
            meta: impact.customer.group
        })));

        const kpis = collectCounts(item => {
            let values = [];
            (item.customerImpact || []).forEach(impact => {
                values = values.concat((impact.customerKPIs || []).map(kpi => ({key: 'c-' + kpi.kpi, name: kpi.kpi, iconPath: '../customers/icons/customer.png', meta: kpi.unit || 'customer KPI'})));
                values = values.concat((impact.businessKPIs || []).map(kpi => ({key: 'b-' + kpi.kpi, name: kpi.kpi, iconPath: '../products/icons/product.png', meta: kpi.unit || 'business KPI'})));
            });
            return values;
        });

        let html = '';
        html += '<div class="overview-banner"><div class="overview-banner-number">' + items.length + '</div><div class="overview-banner-text">releases across products, product bricks, customers, channels, and KPI themes in this domain</div></div>';
        html += '<div class="overview-grid">';
        html += '<div>';
        html += renderEntities('Products In Focus', products, true);
        html += renderEntities('Customers & Personas', customers, true);
        html += '</div>';
        html += '<div>';
        html += renderEntities('Most Referenced Product Bricks', bricks, false);
        html += '</div>';
        html += '<div>';
        html += renderEntities('Recurring KPI Themes', kpis, true);
        html += '</div>';
        html += '</div>';
        document.getElementById('Overview').innerHTML = html;
    }

    updateTabLabels();
    renderTableTab();
    renderCardsTab();
    renderOverviewTab();
</script>
</body>
</html>
